'fsa|intercorp':{
quickReview:['IFRS classification: financial assets (FVPL, FVOCI, amortized cost), associates (equity method, 20-50%), JVs (equity method under IFRS), business combinations (acquisition method), SPE/VIE (consolidate if control).','Equity method: investment on BS at cost ± share of earnings − dividends. Income = investor\'s % of investee NI.','Acquisition method: 100% of subsidiary\'s assets/liabilities at fair value on parent BS, with goodwill = purchase price − net fair value.','Key impact: method choice dramatically affects revenue, assets, liabilities, and leverage ratios — same economic reality, different pictures.'],
analogy:'Intercorporate investments are like <em>different levels of friendship</em>. Owning <20% of a company is like being acquaintances — you just record gifts received (dividends). Owning 20-50% is like being close friends — you share in their ups and downs (equity method). Owning >50% is like marriage — everything merges into one household (consolidation). The accounting method must match the depth of the relationship.',
los:[
{title:'Describe the classification, measurement, and disclosure under IFRS for investments in financial assets, associates, joint ventures, business combinations, and SPE/VIEs.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Category</div><div>Ownership / Control</div><div>Accounting Method</div><div>Key Treatment</div></div><div class="lo-compare-row lo-compare-4"><div>📄 Financial Assets</div><div>&lt;20%, no significant influence</div><div>FVPL, FVOCI, or Amortized Cost</div><div>FVPL: gains/losses in IS. FVOCI: gains/losses in OCI. Amortized cost: held-to-collect debt</div></div><div class="lo-compare-row lo-compare-4"><div>🤝 Associates</div><div>20-50%, significant influence</div><div>Equity Method</div><div>BS = cost ± share of NI − dividends. IS = investor\'s % of investee NI</div></div><div class="lo-compare-row lo-compare-4"><div>🔗 Joint Ventures</div><div>Shared control</div><div>Equity Method (IFRS)</div><div>No proportionate consolidation under IFRS. Same treatment as associates</div></div><div class="lo-compare-row lo-compare-4"><div>💍 Business Combinations</div><div>&gt;50%, control</div><div>Acquisition Method</div><div>Full consolidation at FV. Goodwill = price − net FV of identifiable assets</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ SPE/VIE</div><div>Control via risk/reward exposure</div><div>Consolidation</div><div>Consolidate if investor bears majority of risks/rewards, even without majority ownership</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">👫</div><div class="lo-mini-analogy-text">Acquaintances (&lt;20%) → just note the gifts (dividends). Close friends (20-50%) → share ups and downs (equity method). Marriage (&gt;50%) → merge everything into one household (consolidation).</div></div>'},
{title:'Compare and contrast IFRS and US GAAP in classification, measurement, and disclosure of intercorporate investments.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Area</div><div>IFRS</div><div>US GAAP</div><div>Key Difference</div></div><div class="lo-compare-row lo-compare-4"><div>📄 Financial Assets</div><div>Business model + cash flow characteristics test → FVPL, FVOCI, amortized cost</div><div>Trading, AFS, HTM classification</div><div>IFRS is more principles-based; GAAP more rules-based</div></div><div class="lo-compare-row lo-compare-4"><div>🤝 Associates</div><div>Equity method (20-50%)</div><div>Equity method (20-50%)</div><div style="color:#10B981;font-weight:700">Largely similar</div></div><div class="lo-compare-row lo-compare-4"><div>🔗 Joint Ventures</div><div>Equity method only</div><div>Equity method only</div><div style="color:#10B981;font-weight:700">Converged — proportionate consolidation not allowed</div></div><div class="lo-compare-row lo-compare-4"><div>💍 Goodwill Impairment</div><div>One-step test at CGU level</div><div>Simplified one-step at reporting unit level</div><div>IFRS tests cash-generating units; GAAP tests reporting units</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ SPE/VIE</div><div>Broader control model (power + variable returns)</div><div>Variable interest model (primary beneficiary bears majority risk)</div><div>IFRS broader; GAAP more specific about "primary beneficiary"</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Convergence trend:</strong> IFRS and US GAAP have moved closer on intercorporate investments in recent years — especially on consolidation and joint ventures. The biggest remaining differences are in financial asset classification and goodwill testing.</div></div>'},
{title:'Analyze how different accounting methods for intercorporate investments affect financial statements and ratios.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Metric</div><div>Equity Method</div><div>Consolidation</div><div>Why It Matters</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Revenue</div><div>Not affected (no sub revenue)</div><div style="color:#10B981;font-weight:700">↑ Add 100% of subsidiary revenue</div><div>Consolidation inflates top line</div></div><div class="lo-compare-row lo-compare-4"><div>📦 Total Assets</div><div>Lower (one-line investment)</div><div style="color:#10B981;font-weight:700">↑ Add all subsidiary assets</div><div>Balance sheet balloons</div></div><div class="lo-compare-row lo-compare-4"><div>💳 Total Liabilities</div><div>Lower (sub debt excluded)</div><div style="color:#EF4444;font-weight:700">↑ Add all subsidiary debt</div><div>Leverage appears higher</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Net Income</div><div>Same*</div><div>Same*</div><div>Bottom line unchanged (minority interest aside)</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Margins</div><div style="color:#10B981;font-weight:700">Higher (smaller revenue base)</div><div>Lower (revenue ↑ proportionally more)</div><div>Makes peers hard to compare</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Leverage (D/E)</div><div style="color:#10B981;font-weight:700">Lower (liabilities excluded)</div><div style="color:#EF4444;font-weight:700">Higher (all debt included)</div><div>Same economic risk, different optics</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Analyst trap:</strong> Crossing the 50% ownership threshold triggers a switch from equity method to consolidation — inflating the balance sheet and revenue, lowering margins, and raising apparent leverage, even though <em>nothing changed economically</em>. Always adjust for method differences when comparing companies with different ownership structures.</div></div>'}
]},

'fsa|employee-comp':{
quickReview:['Compensation types: salary, bonuses, stock options, restricted stock/RSUs, ESPPs, defined-benefit pensions, defined-contribution pensions.','Share-based comp: expense recognized over vesting period at grant-date fair value. Dilutes EPS via higher share count.','Forecasting share-based comp: project expense from unvested grants + estimate future grants. Model diluted shares for valuation.','Post-employment benefits: DB plans create a net pension asset/liability on BS. Pension cost flows through income + OCI.','Valuation considerations: adjust for off-BS pension obligations, normalize pension income/expense, compare funded status across peers.'],
analogy:'Employee compensation is like <em>paying for a house in installments</em>. Stock options are the mortgage — the company promises future value that it recognizes as expense gradually over the vesting period. A defined-benefit pension is like a lifetime maintenance contract on the house — the company promises to keep paying regardless of what it costs, and the actual cost keeps changing based on interest rates and life expectancy.',
los:[
{title:'Contrast types of employee compensation.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Type</div><div>How It Works</div><div>Accounting Complexity</div><div>Alignment with Shareholders</div></div><div class="lo-compare-row lo-compare-4"><div>💵 Cash (Salary/Bonus)</div><div>Fixed pay ± performance bonus</div><div style="color:#10B981;font-weight:700">Low — expense when earned</div><div>Weak — no link to share price</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Stock Options</div><div>Right to buy shares at fixed strike price after vesting</div><div style="color:#EF4444;font-weight:700">High — Black-Scholes valuation, dilution modeling</div><div>Strong — valuable only if share price rises above strike</div></div><div class="lo-compare-row lo-compare-4"><div>🔒 Restricted Stock / RSUs</div><div>Shares granted but vest over time (3-4 years typical)</div><div style="color:#F59E0B;font-weight:700">Medium — grant-date FV amortized</div><div>Good — retains value even if price drops</div></div><div class="lo-compare-row lo-compare-4"><div>🏦 Defined Contribution</div><div>Company contributes fixed amount to employee\'s plan (401k)</div><div style="color:#10B981;font-weight:700">Low — expense = contribution. No ongoing obligation</div><div>N/A — retirement benefit</div></div><div class="lo-compare-row lo-compare-4"><div>🏛️ Defined Benefit</div><div>Company promises specific retirement payment based on salary/years</div><div style="color:#EF4444;font-weight:700">Very high — actuarial assumptions, BS liability, OCI volatility</div><div>N/A — retirement benefit</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏠</div><div class="lo-mini-analogy-text">Options are a mortgage (promise of future value, expensed in installments). DB pensions are a lifetime maintenance contract — the company pays regardless of cost, and the bill keeps changing with interest rates and life expectancy.</div></div>'},
{title:'Explain how share-based compensation affects the financial statements.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">Income Statement</div><div class="lo-icon-card-desc">↑ compensation expense → ↓ operating income. Expense = grant-date FV amortized over vesting period</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Balance Sheet</div><div class="lo-icon-card-desc">Offset goes to additional paid-in capital (equity). No cash changes hands at grant.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Cash Flow Statement</div><div class="lo-icon-card-desc">SBC is non-cash → added back in CFO. Inflates operating cash flow vs. economic reality</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">EPS Dilution</div><div class="lo-icon-card-desc">Diluted EPS includes in-the-money options via treasury stock method: (shares × (P − K)) / P</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Cash flow trap:</strong> SBC reduces reported earnings but does NOT reduce operating cash flow (it\'s added back as a non-cash charge). Companies with heavy SBC can report strong CFO while actually diluting shareholders. Always check SBC as a % of CFO — if it\'s 20%+, cash flow quality is questionable.</div></div>'},
{title:'Explain how to forecast share-based compensation expense and shares outstanding in a financial statement model and their use in valuation.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">1</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Forecast SBC Expense</div><div class="lo-step-desc">Amortization of existing unvested grants (from footnote schedules) + estimated new annual grants (as % of revenue or headcount)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">2</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Forecast Diluted Shares</div><div class="lo-step-desc">Current diluted count + future option exercises (treasury stock method) + RSU vestings − expected buybacks</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">3</div></div><div class="lo-step-body"><div class="lo-step-title">Incorporate in Valuation</div><div class="lo-step-desc">Deduct SBC from FCF (it\'s a real economic cost) OR ignore SBC expense and adjust share count — but never ignore both</div></div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>CFA curriculum position:</strong> SBC is a <em>real economic cost</em> to existing shareholders. Ignoring it in both the cash flow AND the share count overstates intrinsic value. The most common analyst error is adding SBC back to FCF while also using basic (not diluted) share counts.</div></div><div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 Treasury Stock Method (Diluted Shares)</div><div class="formula-highlight-body">$$Shares added = Options outstanding - (Options \\times \\frac{Strike}{Market} Price)$$\n$$= Options \\times (Market Price - Strike) / Market Price$$</div><div class="formula-highlight-note">Only in-the-money options (strike &lt; market) are dilutive. As share price rises, dilution increases.</div></div>'},
{title:'Explain how post-employment benefits affect the financial statements.',explanation:'<div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 Funded Status (Balance Sheet)</div><div class="formula-highlight-body">$$\\text{Funded status} = FV of plan assets - PV of benefit obligation (PBO)$$\nSurplus → net pension asset | Deficit → net pension liability</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Component</div><div>Where It Appears</div><div>What It Represents</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Service Cost</div><div>Income Statement (operating)</div><div>PV of new benefits earned by employees this period</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Net Interest Cost</div><div>Income Statement (financing)</div><div>Discount rate × net pension obligation (or asset)</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Past Service Cost</div><div>OCI (IFRS) or amortized into IS (GAAP)</div><div>Cost of retroactive benefit changes from plan amendments</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Remeasurements</div><div>OCI</div><div>Actuarial gains/losses + actual vs. expected asset returns</div></div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🎛️</div><div class="lo-icon-card-title">Discount Rate</div><div class="lo-icon-card-desc">↑ rate → ↓ PBO → plan looks healthier. Management can tweak this</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Salary Growth Rate</div><div class="lo-icon-card-desc">↑ assumption → ↑ PBO. Conservative = higher assumed growth</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Expected Return on Assets</div><div class="lo-icon-card-desc">Higher assumed return → lower pension cost → higher reported earnings (GAAP)</div></div></div>'},
{title:'Explain financial modeling and valuation considerations for post-employment benefits.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">1</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Normalize Pension Expense</div><div class="lo-step-desc">Separate service cost (operating) from interest cost and expected return (financing). Only service cost belongs in operating income</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">2</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Adjust the Balance Sheet</div><div class="lo-step-desc">Treat net pension liability as debt (or net asset as an investment). Recalculate EV and leverage ratios accordingly</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">3</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Normalize Across Peers</div><div class="lo-step-desc">Different discount rate assumptions make plans look more/less funded. Equalize rates before comparing funded status</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">4</div></div><div class="lo-step-body"><div class="lo-step-title">Model Cash Contributions</div><div class="lo-step-desc">Required contributions to underfunded plans are real cash outflows that reduce FCFE — model explicitly</div></div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Key valuation adjustment:</strong> An underfunded pension is effectively a loan from employees. Add the unfunded portion to debt when calculating enterprise value. Also compare asset allocation — an equity-heavy plan is riskier than one in bonds, even if both show the same funded status today.</div></div>'}
]},

'fsa|multinational':{
quickReview:['Presentation (reporting) currency = parent\'s FS currency. Functional currency = currency of primary economic environment. Local currency = where subsidiary operates.','If functional = local ≠ presentation → current rate method (translate at current rate, equity at historical, CTA in OCI).','If functional = presentation ≠ local → temporal method (monetary items at current, non-monetary at historical, gains/losses in income).','Current rate method: all assets/liabilities at closing rate → no ratio distortion. Temporal: mixed rates → ratios change.','Hyperinflation: IFRS restates to price-level first, then translates. US GAAP uses temporal method directly.'],
analogy:'Currency translation is like <em>converting a recipe from metric to imperial</em>. The current rate method is like converting every measurement at today\'s exchange rate — the recipe\'s proportions stay perfect, but the numbers all shift together. The temporal method converts some at today\'s rate and others at the rate from when you first wrote the recipe — the proportions get distorted, and you have to account for the "measurement gain or loss" in the final dish.',
los:[
{title:'Compare and contrast presentation (reporting) currency, functional currency, and local currency.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Currency</div><div>Definition</div><div>Example (US parent, Japan sub)</div><div>Who Decides</div></div><div class="lo-compare-row lo-compare-4"><div>🏠 Local Currency</div><div>Currency of the country where the subsidiary physically operates</div><div>JPY (Japanese yen)</div><div>Determined by geography — no choice</div></div><div class="lo-compare-row lo-compare-4"><div>⚙️ Functional Currency</div><div>Currency of the primary economic environment where the sub generates and spends cash</div><div>JPY if sub operates independently; USD if it\'s just a branch of the parent</div><div style="color:#EF4444;font-weight:700">Management judgment — this is the critical decision</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Presentation Currency</div><div>Currency in which the parent presents consolidated financial statements</div><div>USD</div><div>Parent\'s home currency (typically)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Why this matters:</strong> The functional currency choice determines which translation method is used — and the two methods produce very different financial statements and ratios. This single judgment call cascades through every line item.</div></div>'},
{title:'Describe foreign currency transaction exposure, including accounting for and disclosures about transaction gains and losses.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">1</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Transaction Date</div><div class="lo-step-desc">US company sells goods for €1M. EUR/USD = 1.10. Records $1.1M receivable</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">2</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Reporting Date</div><div class="lo-step-desc">EUR/USD moves to 1.15. Receivable remeasured to $1.15M → $50K unrealized gain in IS</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">3</div></div><div class="lo-step-body"><div class="lo-step-title">Settlement Date</div><div class="lo-step-desc">EUR/USD at settlement = 1.12. Total realized gain/loss computed against original rate</div></div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Key rule:</strong> Transaction gains/losses flow through the <em>income statement</em> each period — creating earnings volatility from FX movements that have nothing to do with operational performance. Companies disclose their hedging strategies and net FX impact in the notes.</div></div>'},
{title:'Analyze how changes in exchange rates affect the translated sales of the subsidiary and parent company.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>FX Movement</div><div>Effect on Translated Revenue</div><div>Economic Reality</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Local currency appreciates</div><div>↑ Translated revenue (same local sales → more parent-currency units)</div><div>No change in local business performance</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Local currency depreciates</div><div>↓ Translated revenue</div><div>No change in local business performance</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>The illusion of growth:</strong> A subsidiary growing 3% in local terms can appear to grow 10% if its currency appreciates 7%. Analysts must decompose reported revenue into: <strong>organic growth + acquisition effects + currency translation effects</strong> to see the real picture.</div></div>'},
{title:'Compare the current rate method and the temporal method, evaluate how each affects the parent\'s BS and IS, and determine which method is appropriate.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Item</div><div>Current Rate Method</div><div>Temporal Method</div><div>Key Difference</div></div><div class="lo-compare-row lo-compare-4"><div>📋 When Used</div><div>Functional = local currency</div><div>Functional = parent\'s currency</div><div>Functional currency choice drives the method</div></div><div class="lo-compare-row lo-compare-4"><div>📦 Assets & Liabilities</div><div>All at closing (current) rate</div><div>Monetary → current; Non-monetary → historical</div><div>Temporal uses mixed rates → distortion</div></div><div class="lo-compare-row lo-compare-4"><div>🏛️ Equity</div><div>Historical rate</div><div>Historical rate</div><div>Same under both methods</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Revenue & Expenses</div><div>Average rate</div><div>Average rate (but COGS & depreciation at historical)</div><div>Temporal distorts margins</div></div><div class="lo-compare-row lo-compare-4"><div>⚖️ Translation Adjustment</div><div style="color:#3B82F6;font-weight:700">OCI → CTA in equity</div><div style="color:#EF4444;font-weight:700">Income Statement → earnings volatility</div><div>This is the biggest practical difference</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">📏</div><div class="lo-mini-analogy-text">Current rate = converting every recipe measurement at today\'s exchange rate. Proportions stay perfect, numbers shift together. Temporal = converting some at today\'s rate, some at the original rate — proportions get distorted.</div></div>'},
{title:'Calculate translation effects and evaluate the translation of a subsidiary\'s BS and IS into the parent\'s presentation currency.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Identify Exchange Rates</div><div class="lo-step-desc">Gather historical rate (when assets acquired), average rate (period), and closing rate (balance sheet date)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Apply Rates per Method</div><div class="lo-step-desc">Current rate: all A&L × closing rate, equity × historical, IS × average. Temporal: monetary × current, non-monetary × historical</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div></div><div class="lo-step-body"><div class="lo-step-title">Find the Balancing Figure</div><div class="lo-step-desc">Current rate: CTA = plug in equity (OCI). Temporal: remeasurement gain/loss = plug in income statement</div></div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Exam technique:</strong> Translate each line item, sum assets and sum L+E separately. The difference is the CTA (current rate) or remeasurement gain/loss (temporal). If translated assets > translated L+E before the plug → it\'s a positive CTA or gain.</div></div>'},
{title:'Analyze how the current rate method and the temporal method affect financial statements and ratios.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Ratio</div><div>Current Rate (FC depreciates)</div><div>Temporal (FC depreciates)</div><div>Why</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Current Ratio</div><div style="color:#10B981;font-weight:700">No change*</div><div>Mixed — monetary items shift</div><div>Current rate translates all at same rate → preserves proportions</div></div><div class="lo-compare-row lo-compare-4"><div>💳 Debt/Equity</div><div style="color:#10B981;font-weight:700">↓ (CTA reduces equity less than debt)</div><div style="color:#EF4444;font-weight:700">↑ (remeas. loss hits retained earnings)</div><div>CTA goes to OCI; temporal loss goes to IS → RE</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Gross Margin</div><div style="color:#10B981;font-weight:700">No change*</div><div style="color:#EF4444;font-weight:700">↓ (COGS at old higher rates, revenue at avg)</div><div>Temporal uses historical rate for COGS</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Net Margin</div><div style="color:#10B981;font-weight:700">No change*</div><div style="color:#EF4444;font-weight:700">↓ (remeasurement loss flows through IS)</div><div>Temporal creates IS volatility</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>* Current rate is "ratio-neutral"</strong> because all items translate at the same (or similar) rate — the subsidiary\'s local-currency ratios are preserved. The temporal method distorts ratios because different rates apply to different items.</div></div>'},
{title:'Analyze how alternative translation methods for subsidiaries in hyperinflationary economies affect financial statements and ratios.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Approach</div><div>IFRS</div><div>US GAAP</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Method</div><div>Restate to current purchasing power (price index) FIRST, then translate at current rate</div><div>Use temporal method directly (treat functional currency as parent\'s)</div></div><div class="lo-compare-row lo-compare-3"><div>📦 Asset Values</div><div style="color:#10B981;font-weight:700">Tend to be higher (inflation-adjusted before translation)</div><div>Lower (historical cost translated at current depreciated rate)</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Earnings Volatility</div><div>Moderate (CTA in OCI after restatement)</div><div style="color:#EF4444;font-weight:700">High (remeasurement gains/losses in IS)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Hyperinflation threshold:</strong> roughly &gt;100% cumulative inflation over 3 years. Without special treatment, translating historical-cost assets at a massively depreciated current rate produces absurdly low asset values — both methods aim to avoid this, but produce different results.</div></div>'},
{title:'Describe how multinational operations affect a company\'s effective tax rate.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Geographic Mix</div><div class="lo-icon-card-desc">Profits in low-tax jurisdictions (Ireland 12.5%, Singapore 17%) pull the blended rate down</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🔀</div><div class="lo-icon-card-title">Profit Shifting</div><div class="lo-icon-card-desc">Transfer pricing, IP licensing, intercompany loans used to move profits to low-tax locations</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">⏳</div><div class="lo-icon-card-title">Deferred Tax</div><div class="lo-icon-card-desc">Offshore profits may generate DTLs that never reverse if profits stay abroad permanently</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Red flags:</strong> (1) Unsustainably low effective tax rates from aggressive planning that regulators may challenge. (2) One-time tax benefits masking the true ongoing rate. (3) Large DTLs from unrepatriated earnings — if policy changes force repatriation, the tax bill arrives all at once.</div></div>'},
{title:'Explain how changes in the components of sales affect the sustainability of sales growth.',explanation:'<div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 Revenue Growth Decomposition</div><div class="formula-highlight-body">$$Total growth = Volume growth + Price growth + Currency effect + Acquisitions$$</div></div><div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Component</div><div>Sustainability</div><div>Analyst Action</div><div>Example</div></div><div class="lo-compare-row lo-compare-4"><div>📦 Volume Growth</div><div style="color:#10B981;font-weight:700">High — reflects real demand</div><div>Project forward using market share and industry growth</div><div>Selling 10% more units year-over-year</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Pricing Power</div><div style="color:#F59E0B;font-weight:700">Medium — depends on competitive moat</div><div>Assess elasticity and competitive dynamics</div><div>Raising prices 3% without losing volume</div></div><div class="lo-compare-row lo-compare-4"><div>💱 Currency Translation</div><div style="color:#EF4444;font-weight:700">Low — will reverse</div><div>Strip out FX effects to see organic growth</div><div>Reported 10% growth but 7% was currency tailwind</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 Acquisitions</div><div style="color:#EF4444;font-weight:700">One-time — won\'t repeat</div><div>Exclude from organic growth calculation</div><div>Bought a competitor adding $500M revenue</div></div></div>'},
{title:'Analyze how currency fluctuations potentially affect financial results, given a company\'s countries of operation.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🛡️</div><div class="lo-icon-card-title">Natural Hedge</div><div class="lo-icon-card-desc">Revenue AND costs in same foreign currency → both sides move together → minimal net impact</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⚡</div><div class="lo-icon-card-title">Mismatched Exposure</div><div class="lo-icon-card-desc">Revenue in EUR but costs in USD → EUR weakening crushes margins (revenue ↓, costs unchanged)</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏭</div><div class="lo-icon-card-title">Competitive Effect</div><div class="lo-icon-card-desc">Japanese exporter + strong yen → products more expensive abroad → volume loss beyond just translation</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">💳</div><div class="lo-icon-card-title">Balance Sheet Exposure</div><div class="lo-icon-card-desc">Foreign-currency debt creates gains/losses as FX rates move — can amplify or offset operating effects</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Analyst framework:</strong> Map where revenue is earned vs. where costs are incurred vs. where debt is denominated. The <em>mismatch</em> between these determines FX exposure. A company with 60% EUR revenue, 40% EUR costs, and USD debt has triple exposure: translation, transaction, AND economic.</div></div>'}
]},

'fsa|fin-inst':{
quickReview:['Financial institutions differ: highly leveraged, opaque assets, heavy regulation, systemic interconnection.','CAMELS: Capital adequacy, Asset quality, Management, Earnings, Liquidity, Sensitivity to market risk.','Bank analysis: NIM (net interest margin), provision for loan losses, efficiency ratio, NPL ratio, CET1 ratio.','Insurance analysis: combined ratio (<100% = underwriting profit), reserve adequacy, investment portfolio risk, RBC ratio.'],
analogy:'Analyzing a bank is like <em>inspecting an iceberg</em>. The small visible part above water is the equity; the massive submerged part is the deposits and borrowed funds (leverage). CAMELS is your sonar scan — it maps the full shape of the iceberg, checking whether the part you can\'t see is solid ice or riddled with cracks (bad loans, liquidity gaps).',
los:[
{title:'Describe how financial institutions differ from other companies.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Extreme Leverage</div><div class="lo-icon-card-desc">Banks: 10-15× leverage vs. 2-3× for industrials. A 7% asset loss wipes out equity entirely.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🔍</div><div class="lo-icon-card-title">Opaque Assets</div><div class="lo-icon-card-desc">Loan books are hard to value — quality depends on borrower creditworthiness. Unlike inventory, you can\'t inspect a loan.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Heavy Regulation</div><div class="lo-icon-card-desc">Basel III capital rules, liquidity requirements, stress tests — regulation shapes strategy and constrains growth.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🕸️</div><div class="lo-icon-card-title">Systemic Interconnection</div><div class="lo-icon-card-desc">Interbank lending, derivatives, payment systems — one failure can cascade through the entire system.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Unique Revenue Model</div><div class="lo-icon-card-desc">Revenue = spread income (NIM) + fee income. "Inventory" is money itself — fundamentally different from product companies.</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🧊</div><div class="lo-mini-analogy-text">The iceberg: the visible tip is equity; the massive submerged portion is deposits and borrowed funds. You need special tools (CAMELS) to see whether the underwater structure is solid ice or riddled with cracks.</div></div>'},
{title:'Describe key aspects of financial regulations of financial institutions.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Regulation</div><div>Applies To</div><div>Key Requirements</div><div>Purpose</div></div><div class="lo-compare-row lo-compare-4"><div>🏦 Basel III — Capital</div><div>Banks globally</div><div>CET1 ≥ 4.5%, Tier 1 ≥ 6%, Total ≥ 8% of RWA + buffers (conservation 2.5%, countercyclical 0-2.5%, G-SIB surcharge)</div><div>Absorb losses without failing</div></div><div class="lo-compare-row lo-compare-4"><div>💧 Basel III — Liquidity</div><div>Banks globally</div><div>LCR: liquid assets to survive 30-day stress. NSFR: stable funding for long-term assets</div><div>Prevent bank runs and funding crises</div></div><div class="lo-compare-row lo-compare-4"><div>🛡️ Solvency II (EU)</div><div>Insurers in EU</div><div>Capital based on risk profile: underwriting, market, credit, operational risk</div><div>Ensure claims-paying ability</div></div><div class="lo-compare-row lo-compare-4"><div>🇺🇸 RBC (US)</div><div>US insurers</div><div>Risk-based capital ratios by state regulators + AM Best ratings</div><div>Solvency protection for policyholders</div></div></div>'},
{title:'Explain the CAMELS approach to analyzing a bank, including key ratios and its limitations.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">C — Capital Adequacy</div><div class="lo-icon-card-desc">CET1 ratio, leverage ratio, tangible equity / assets</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">A — Asset Quality</div><div class="lo-icon-card-desc">NPL ratio, provision coverage (reserves / NPLs), loan loss trends</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">👔</div><div class="lo-icon-card-title">M — Management</div><div class="lo-icon-card-desc">Governance quality, risk culture, strategy execution, compensation alignment</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">E — Earnings</div><div class="lo-icon-card-desc">NIM, ROA, ROE, efficiency ratio (non-interest expense / revenue)</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">💧</div><div class="lo-icon-card-title">L — Liquidity</div><div class="lo-icon-card-desc">Loan-to-deposit ratio, LCR, funding mix (stable retail vs. volatile wholesale)</div></div><div class="lo-icon-card" style="border-top:3px solid #6366F1"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">S — Sensitivity</div><div class="lo-icon-card-desc">Duration gap, interest rate risk, FX exposure, VaR</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Limitations:</strong> CAMELS is backward-looking (reported data only), management quality is subjective and hard to quantify, off-balance-sheet risks may be missed, and rapid deterioration between reporting dates can go undetected. It\'s a framework, not a crystal ball.</div></div>'},
{title:'Analyze a bank based on financial statements and other factors.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">1</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Income Analysis</div><div class="lo-step-desc">Decompose revenue into net interest income (NII = spread × volume) vs. non-interest income (fees, trading). Track NIM trends and fee stability.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">2</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Credit Quality</div><div class="lo-step-desc">Track NPL ratio, provision expense trends, charge-off rates, and reserve adequacy (reserves/NPLs). Rising provisions = deteriorating loans.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">3</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Capital Position</div><div class="lo-step-desc">CET1 ratio vs. regulatory minimums and peers. Tangible book value per share as a floor valuation metric.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">4</div></div><div class="lo-step-body"><div class="lo-step-title">Efficiency</div><div class="lo-step-desc">Efficiency ratio = non-interest expense / total revenue. Lower = more efficient. Benchmark against peers (top quartile banks: ~55%).</div></div></div></div>'},
{title:'Describe other factors to consider in analyzing a bank.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Regulatory Environment</div><div class="lo-icon-card-desc">Upcoming capital requirements, stress test results, consent orders. Regulatory actions can force capital raises or limit dividends.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🏗️</div><div class="lo-icon-card-title">Business Model</div><div class="lo-icon-card-desc">Retail vs. wholesale, geographic concentration, fee vs. spread reliance. Diversified models are generally more stable.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">Risk Culture & Governance</div><div class="lo-icon-card-desc">History of risk failures, board independence, compensation structures. Bad risk culture → eventual large losses.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Macro Environment</div><div class="lo-icon-card-desc">Rising rates → help NIM but may hurt credit quality. Recession → loan losses surge. Fintech → competitive disruption.</div></div></div>'},
{title:'Describe key ratios and other factors to consider in analyzing an insurance company.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Category</div><div>Key Metrics</div><div>What to Watch For</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Underwriting</div><div>Combined ratio = (claims + expenses) / premiums. &lt;100% = profit, &gt;100% = loss</div><div>Trend direction; catastrophe exposure; pricing discipline in soft markets</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Profitability</div><div>ROE, operating ratio, investment yield on float</div><div>Investment income can mask underwriting losses — separate the two</div></div><div class="lo-compare-row lo-compare-3"><div>📦 Reserves</div><div>Reserve adequacy, reserve development (prior-year strengthening or releases)</div><div style="color:#EF4444;font-weight:700">Under-reserving inflates current earnings at the expense of future charges</div></div><div class="lo-compare-row lo-compare-3"><div>🏛️ Capital</div><div>RBC ratio, AM Best financial strength rating</div><div>Declining RBC → potential regulatory intervention or rating downgrade</div></div><div class="lo-compare-row lo-compare-3"><div>🏥 Life Insurance</div><div>Embedded value, interest rate sensitivity, mortality/morbidity assumptions</div><div>Duration mismatch between long-dated liabilities and investment portfolio</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Key risks:</strong> reserve manipulation (under-reserving to inflate earnings), catastrophe concentration, asset-liability duration mismatch, and reinsurance counterparty risk. Always check if reserve releases are driving earnings growth — that\'s borrowing from the future.</div></div>'}
]},

'fsa|quality':{
quickReview:['Quality spectrum: reporting quality (GAAP compliance, transparency) vs. earnings quality (sustainable, cash-backed).','High-quality earnings: persistent, backed by cash flows, from core operations, not inflated by aggressive assumptions.','Accruals vs. cash: high accruals ratio signals lower earnings quality. Earnings mean-revert faster when accrual-heavy.','Balance sheet quality: assets not overstated (impairment delays, aggressive capitalization), liabilities not understated (off-BS items).','Cash flow quality: high CFO relative to net income, operating (not investing/financing) sources, not inflated by working capital tricks.'],
analogy:'Financial report quality is like <em>food labeling</em>. Reporting quality asks: "Is the label accurate and complete?" Earnings quality asks: "Is the food actually nutritious?" A company can have perfectly GAAP-compliant statements (accurate label) but unsustainable earnings inflated by one-time gains and aggressive assumptions (junk food dressed up as health food). The analyst\'s job is to read past the label.',
los:[
{title:'Demonstrate the use of a conceptual framework for assessing the quality of a company\'s financial reports.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Dimension</div><div>Question It Answers</div><div>Quality Spectrum</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Reporting Quality (the "container")</div><div>Can I trust these numbers?</div><div style="color:#10B981">Compliant & transparent</div> → Compliant but biased → <span style="color:#F59E0B">Non-compliant</span> → <span style="color:#EF4444;font-weight:700">Fraudulent</span></div><div class="lo-compare-row lo-compare-3"><div>💰 Earnings Quality (the "content")</div><div>Even if accurate, are earnings real and repeatable?</div><div style="color:#10B981">High-quality & sustainable</div> → Adequate → <span style="color:#EF4444;font-weight:700">Low-quality & unsustainable</span></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🥫</div><div class="lo-mini-analogy-text">Reporting quality = is the nutrition label accurate? Earnings quality = is the food actually nutritious? Compliant junk food (accurate label, low-quality content) is common and dangerous for investors who don\'t look deeper.</div></div>'},
{title:'Explain potential problems that affect the quality of financial reports.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Premature Revenue</div><div class="lo-icon-card-desc">Bill-and-hold, channel stuffing, round-tripping, fictitious sales. Revenue booked before economic substance exists.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">Expense Manipulation</div><div class="lo-icon-card-desc">Capitalizing operating costs, understating depreciation, delaying impairments, under-reserving for warranties/litigation.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔀</div><div class="lo-icon-card-title">Classification Shifting</div><div class="lo-icon-card-desc">Moving recurring expenses to "non-recurring." Shifting operating outflows to investing/financing in the CFS.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏷️</div><div class="lo-icon-card-title">One-Time Gain Abuse</div><div class="lo-icon-card-desc">Selling assets to create gains that mask declining operational performance.</div></div><div class="lo-icon-card" style="border-top:3px solid #6366F1"><div class="lo-icon-card-emoji">🤝</div><div class="lo-icon-card-title">Related-Party Transactions</div><div class="lo-icon-card-desc">Non-arm\'s-length deals that inflate revenue or hide costs between affiliated entities.</div></div></div>'},
{title:'Describe how to evaluate the quality of a company\'s financial reports.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Check Type</div><div>What to Do</div><div>Red Flags</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Quantitative</div><div>Compare revenue growth vs. receivables growth; earnings vs. CFO; accruals ratios; changes in estimates</div><div>Revenue growing faster than receivables; persistent NI &gt;&gt; CFO; rising accruals ratio</div></div><div class="lo-compare-row lo-compare-3"><div>📝 Qualitative</div><div>Read auditor\'s report, check MD&A consistency, review for restatements, CFO/auditor turnover</div><div>Qualified opinions, emphasis of matter, frequent restatements, high turnover</div></div><div class="lo-compare-row lo-compare-3"><div>🚩 Structural</div><div>Examine corporate structure complexity, SPE usage, related-party transactions</div><div>Complex structures with many SPEs, large "other" line items, revenue growing faster than industry</div></div></div>'},
{title:'Evaluate the quality of a company\'s financial reports.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">1</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Start with the Auditor\'s Report</div><div class="lo-step-desc">Clean opinion? Qualified? Going concern? Key audit matters often reveal where the risks are.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">2</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Examine Accounting Policies</div><div class="lo-step-desc">Conservative or aggressive relative to peers? Any unexplained changes in methods or estimates?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">3</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Analyze Trends</div><div class="lo-step-desc">Are accruals growing? Is the gap between earnings and cash flow widening? Revenue outpacing industry?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">4</div></div><div class="lo-step-body"><div class="lo-step-title">Benchmark Against Peers</div><div class="lo-step-desc">If the company capitalizes more, depreciates slower, or recognizes revenue earlier than peers → quality concern.</div></div></div></div>'},
{title:'Describe indicators of earnings quality.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Indicator</div><div>High Quality</div><div>Low Quality</div></div><div class="lo-compare-row lo-compare-3"><div>🔄 Persistence</div><div style="color:#10B981;font-weight:700">Driven by recurring core operations</div><div style="color:#EF4444">Relies on one-time items, asset sales, accounting changes</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Cash Backing</div><div style="color:#10B981;font-weight:700">NI closely tracked by CFO (CFO/NI ≥ 1)</div><div style="color:#EF4444">NI &gt;&gt; CFO — accruing but not converting to cash</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Recognition</div><div style="color:#10B981;font-weight:700">Conservative policies at or below peer norms</div><div style="color:#EF4444">Aggressive: early revenue recognition, slow expense recognition</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Accruals Level</div><div style="color:#10B981;font-weight:700">Low accruals → less estimation, less manipulation room</div><div style="color:#EF4444">High accruals → more estimation, faster mean reversion</div></div></div>'},
{title:'Describe the concept of sustainable (persistent) earnings.',explanation:'<p><span class="key-term">Sustainable earnings</span> = the level a company can maintain from ongoing operations, excluding:</p><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🏷️</div><div class="lo-icon-card-title">One-Time Gains/Losses</div><div class="lo-icon-card-desc">Asset sales, litigation settlements, insurance recoveries</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">Restructuring Charges</div><div class="lo-icon-card-desc">"Non-recurring" charges that suspiciously recur every year</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">📝</div><div class="lo-icon-card-title">Accounting Changes</div><div class="lo-icon-card-desc">Method/standard changes that create one-time adjustments</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Valuation trap:</strong> Multiples should be applied to <em>sustainable</em> earnings. Applying 15× P/E to earnings inflated by a one-time asset sale gain dramatically overstates intrinsic value. Always normalize first.</div></div>'},
{title:'Explain mean reversion in earnings and how the accruals component affects the speed of mean reversion.',explanation:'<div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 Earnings Decomposition (Sloan 1996)</div><div class="formula-highlight-body">$$\\text{Earnings} = Cash Component + Accruals Component$$\n$$\\text{Accruals Ratio} = (NI - CFO) / Average Total Assets$$</div><div class="formula-highlight-note">The cash component is MORE persistent. The accruals component is LESS persistent and mean-reverts faster.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Earnings Profile</div><div>Mean Reversion Speed</div><div>Implication</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Cash-heavy (low accruals)</div><div>Slow — earnings sustain longer</div><div>More reliable base for valuation; less manipulation risk</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Accrual-heavy (high accruals)</div><div>Fast — earnings revert quickly</div><div>Current earnings overstate future performance; short opportunity</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🧲</div><div class="lo-mini-analogy-text">High-accrual earnings are like a ball thrown upward — gravity (mean reversion) pulls them back quickly. Cash-backed earnings are like a ball resting on a shelf — stable and sustainable.</div></div>'},
{title:'Evaluate the earnings quality of a company.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">1</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Cash Flow vs. Earnings</div><div class="lo-step-desc">Is CFO consistently near or above NI? Persistent NI &gt;&gt; CFO = accrual-heavy, lower quality.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">2</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Accruals Analysis</div><div class="lo-step-desc">Compute accruals ratio [(NI − CFO) / avg assets]. Rising over time → growing concern. Compare to peers.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">3</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Revenue Quality</div><div class="lo-step-desc">Is growth backed by volume or just price? Is receivables growth outpacing revenue? (→ channel stuffing)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">4</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Expense Quality</div><div class="lo-step-desc">Is SG&A declining because of efficiency or capitalization tricks? Check capitalized costs as % of assets.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">5</div></div><div class="lo-step-body"><div class="lo-step-title">Recurring vs. Non-Recurring</div><div class="lo-step-desc">What % of earnings are "special items"? If they appear every year, they\'re not special — they\'re core.</div></div></div></div>'},
{title:'Evaluate the cash flow quality of a company.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Dimension</div><div>High Quality</div><div>Low Quality / Red Flag</div></div><div class="lo-compare-row lo-compare-3"><div>📦 Source</div><div>From actual operations — collecting from customers, paying suppliers</div><div style="color:#EF4444">From working capital manipulation — stretching payables, securitizing receivables</div></div><div class="lo-compare-row lo-compare-3"><div>🔄 Sustainability</div><div>Stable and repeatable year-over-year</div><div style="color:#EF4444">One-time boosts from liquidating inventory or delaying payments</div></div><div class="lo-compare-row lo-compare-3"><div>🔀 Classification</div><div>Operating outflows properly in CFO</div><div style="color:#EF4444">Operating outflows hidden in investing (capitalizing expenses) or financing (factoring)</div></div><div class="lo-compare-row lo-compare-3"><div>📊 CFO/NI Ratio</div><div style="color:#10B981;font-weight:700">≥ 1.0 over time</div><div style="color:#EF4444;font-weight:700">Persistently &lt; 1.0 → earnings not converting to cash</div></div></div>'},
{title:'Describe indicators of balance sheet quality.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Dimension</div><div>High Quality</div><div>Warning Signs</div></div><div class="lo-compare-row lo-compare-3"><div>📦 Assets Not Overstated</div><div>Timely impairments, conservative inventory (no obsolete stock at cost), adequate AR allowances, properly tested goodwill</div><div style="color:#EF4444">Delayed impairments, rising goodwill/total assets, intangibles growing without clear value</div></div><div class="lo-compare-row lo-compare-3"><div>💳 Liabilities Not Understated</div><div>All obligations on BS, adequate litigation/warranty reserves, pension obligations fully reflected</div><div style="color:#EF4444">Off-BS items (guarantees, purchase commitments), thin reserves, SPE liabilities not consolidated</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Completeness</div><div>SPEs consolidated when appropriate, derivatives properly reflected, contingencies disclosed</div><div style="color:#EF4444">Complex SPE structures, large contingent liabilities in footnotes, Level 3 assets dominating</div></div></div>'},
{title:'Evaluate the balance sheet quality of a company.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">1</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Asset Hardness Test</div><div class="lo-step-desc">What % of assets are "hard" (cash, PP&E) vs. "soft" (goodwill, DTA, capitalized dev costs)? High soft-asset % → higher write-off risk.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">2</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Off-Balance-Sheet Review</div><div class="lo-step-desc">Operating leases (now mostly on-BS), unconsolidated VIEs, purchase obligations, contingent liabilities. Calculate adjusted leverage.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">3</div></div><div class="lo-step-body"><div class="lo-step-title">Fair Value Sensitivity</div><div class="lo-step-desc">For Level 2 and Level 3 assets — how sensitive are valuations to assumptions? Large Level 3 portfolios (mark-to-model) are inherently uncertain.</div></div></div></div>'},
{title:'Describe indicators of cash flow quality.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Signal</div><div>🟢 High Quality</div><div>🔴 Low Quality</div></div><div class="lo-compare-row lo-compare-3"><div>CFO vs. NI</div><div>CFO consistently ≥ NI</div><div>CFO persistently below NI → accruals not converting</div></div><div class="lo-compare-row lo-compare-3"><div>Source of CFO</div><div>Core business: customer collections minus supplier payments</div><div>Non-sustainable: stretching payables, selling receivables, inventory liquidation</div></div><div class="lo-compare-row lo-compare-3"><div>Capex Levels</div><div>Capex ≥ depreciation → maintaining productive capacity</div><div>Capex &lt;&lt; depreciation → asset base deteriorating</div></div><div class="lo-compare-row lo-compare-3"><div>Working Capital</div><div>Stable and predictable changes</div><div>Volatile swings used to inflate/deflate CFO as needed</div></div></div>'},
{title:'Describe sources of information about risk.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Financial Statements</div><div class="lo-icon-card-desc">Leverage, liquidity, coverage ratios, debt maturity profile, off-BS commitments in notes</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Auditor\'s Report</div><div class="lo-icon-card-desc">Going concern opinions, key audit matters, emphasis of matter — the auditor\'s "yellow flags"</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📝</div><div class="lo-icon-card-title">MD&A</div><div class="lo-icon-card-desc">Management\'s discussion of risk factors, known trends, uncertainties, and liquidity position</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Market-Based Signals</div><div class="lo-icon-card-desc">Credit ratings (Moody\'s/S&P), CDS spreads (market-implied default), stock volatility, short interest</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Regulatory Filings</div><div class="lo-icon-card-desc">SEC risk factor disclosures, bank stress tests, insurance regulatory filings</div></div></div>'}
]},

'fsa|integration':{
quickReview:['Framework: define purpose → collect data → analyze (adjust, normalize, compare) → interpret → conclude/recommend.','Reporting choices create comparability issues: capitalize vs. expense, FIFO vs. weighted average, depreciation methods, revenue timing.','Adjustments: operating leases (pre-IFRS 16), pension obligations, stock-based compensation, non-recurring items.','Accounting changes affect trends: compare old vs. new basis before drawing conclusions from ratio shifts.','Modifications: normalize earnings (remove one-time items), adjust BS for off-BS items, reclassify cash flow items for better comparability.'],
analogy:'Integration of FSA techniques is like being a <em>forensic detective assembling a crime scene</em>. Each financial statement is a witness with its own perspective. The balance sheet tells you what\'s there now, the income statement tells you what happened, and the cash flow statement tells you what\'s real. Your job is to cross-reference all three, spot inconsistencies, adjust for distortions, and piece together the true story — then present your case.',
los:[
{title:'Demonstrate the use of a framework for analysis of financial statements, given a particular problem, question, or purpose.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Purpose</div><div>Primary Focus</div><div>Key Adjustments</div><div>Output</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Equity Valuation</div><div>Normalize earnings, calculate comparable multiples</div><div>Standardize accounting across peers; adjust for capitalization, revenue timing, pensions</div><div>Justified P/E, EV/EBITDA, fair value estimate</div></div><div class="lo-compare-row lo-compare-4"><div>💳 Credit Analysis</div><div>Leverage, coverage, liquidity</div><div>Add off-BS obligations to debt; stress-test under downside scenarios</div><div>Credit rating assessment, default risk estimate</div></div><div class="lo-compare-row lo-compare-4"><div>⚖️ Comprehensive Leverage</div><div>True total obligations</div><div>Add operating leases, pension deficits, purchase commitments, guarantees to reported debt</div><div>Adjusted D/E, adjusted interest coverage</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 Management Credibility</div><div>Consistency of guidance vs. results</div><div>Compare MD&A forward guidance with actuals; check if estimates are consistently aggressive</div><div>Trust assessment for forecast reliability</div></div></div>'},
{title:'Identify financial reporting choices and biases that affect quality and comparability, and explain how they may affect financial decisions.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Area</div><div>Aggressive Choice</div><div>Conservative Choice</div><div>Decision Impact If Not Adjusted</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Revenue</div><div>Early recognition (% completion, bill-and-hold, gross reporting)</div><div>Completed contract, net reporting</div><div>Overstate revenue, inflate multiples vs. conservative peers</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Expenses</div><div>Capitalize development costs, long depreciation lives, FIFO (in rising prices)</div><div>Expense immediately, short lives, weighted average</div><div>Overstate earnings and assets; understate leverage</div></div><div class="lo-compare-row lo-compare-4"><div>🔀 CFS Classification</div><div>Interest paid in CFO (GAAP), operating outflows as investing</div><div>Interest in CFF (IFRS option), strict operating classification</div><div>Inflate CFO → overstate cash generation ability</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>The danger:</strong> An aggressive company looks more profitable, less leveraged, and more cash-generative than a conservative peer — leading to flawed valuation, credit, and investment decisions if the analyst doesn\'t adjust for comparability.</div></div>'},
{title:'Evaluate the quality of a company\'s financial data and recommend adjustments to improve quality and comparability.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Standardize Accounting Methods</div><div class="lo-step-desc">If Company A uses FIFO and Company B uses weighted average, adjust inventory and COGS to a common basis. Same for capitalization vs. expensing policies.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Remove Non-Recurring Items</div><div class="lo-step-desc">Strip restructuring charges, asset sale gains, litigation settlements. Calculate "clean" sustainable operating earnings.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Adjust for Off-BS Items</div><div class="lo-step-desc">Capitalize significant remaining operating leases (if not on-BS). Add unfunded pension obligations to debt. Include guarantees and commitments.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">4</div></div><div class="lo-step-body"><div class="lo-step-title">Normalize</div><div class="lo-step-desc">Use mid-cycle earnings for cyclicals. Adjust for unsustainable margins or one-time tax benefits. Goal: numbers reflecting ongoing economic reality.</div></div></div></div>'},
{title:'Evaluate how a given change in accounting standards, methods, or assumptions affects financial statements and ratios.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">1</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Understand the Mechanical Impact</div><div class="lo-step-desc">What line items change and by how much? e.g., IFRS 16 → higher assets, higher liabilities, higher EBITDA, lower lease expense but higher depreciation + interest</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">2</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Assess Trend Distortion</div><div class="lo-step-desc">Does the change break comparability with prior periods? Were priors restated, or was a cumulative catch-up booked? May need to manually restate.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">3</div></div><div class="lo-step-body"><div class="lo-step-title">Evaluate Motivation</div><div class="lo-step-desc">Required by new standard → neutral. Voluntary change toward aggressive policies → red flag. Voluntary change toward conservative → mildly positive signal.</div></div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>IFRS 16 example:</strong> Operating leases moved on-BS → assets ↑, liabilities ↑, EBITDA ↑ (rent expense replaced by depreciation + interest), leverage ↑. Companies didn\'t change — the reporting did. Analysts who didn\'t already capitalize leases saw big ratio jumps; those who did saw minimal change.</div></div>'},
{title:'Analyze and interpret how balance sheet modifications, earnings normalization, and cash flow modifications affect financial statements, ratios, and overall financial condition.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Modification</div><div>What You Do</div><div>Typical Impact</div><div>Why It Matters</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Balance Sheet</div><div>Add off-BS liabilities (pensions, leases, guarantees); reclassify items analytically</div><div style="color:#EF4444;font-weight:700">Leverage ratios worsen; asset quality metrics change</div><div>Reveals true economic obligations</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Earnings Normalization</div><div>Remove one-time items; adjust for accounting changes; calculate sustainable operating earnings</div><div style="color:#EF4444;font-weight:700">Often lowers headline earnings</div><div>Gives a truer base for valuation multiples</div></div><div class="lo-compare-row lo-compare-4"><div>💧 Cash Flow Modifications</div><div>Reclassify for comparability (e.g., remove SBC addback from CFO, adjust for securitizations)</div><div style="color:#EF4444;font-weight:700">Often lowers reported CFO</div><div>Reflects true operating cash generation</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The integration insight:</strong> The adjusted picture is typically less flattering but more accurate. Companies look more leveraged, less profitable, and less cash-generative after proper modifications — which is exactly the reality investors need for sound decisions.</div></div>'}
]},
