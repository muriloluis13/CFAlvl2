{title:'Explain the use of spreadsheet modeling to forecast dividends and to value common shares.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Forecast Year-by-Year</div><div class="lo-icon-card-desc">Revenue → margins → earnings → payout ratios → dividends, each modeled individually with changing assumptions</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">Maximum Flexibility</div><div class="lo-icon-card-desc">Model non-linear growth, changing capital structure, specific events (product launches, patent expirations)</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📐</div><div class="lo-icon-card-title">Terminal Value Still Needed</div><div class="lo-icon-card-desc">GGM or exit multiple at the end of the explicit forecast period — you can\'t model forever</div></div></div>'},
{title:'Calculate and interpret the sustainable growth rate and demonstrate DuPont analysis to estimate it.',explanation:'<div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 Sustainable Growth Rate</div><div class="formula-highlight-body">$$g = b \\times ROE = retention rate \\times return on equity$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>DuPont Component</div><div>Formula</div><div>What It Reveals</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Net Profit Margin</div><div>NI / Sales</div><div>Pricing power and cost efficiency</div></div><div class="lo-compare-row lo-compare-3"><div>🔄 Asset Turnover</div><div>Sales / Assets</div><div>Efficiency of asset utilization</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Financial Leverage</div><div>Assets / Equity</div><div>Degree of debt financing — amplifies ROE but adds risk</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Quality check:</strong> High ROE from leverage is riskier than high ROE from margins. DuPont reveals the <em>source</em> — and therefore the sustainability — of the growth rate. A company with g = 12% from 60% margins is more durable than one with g = 12% from 5× leverage.</div></div>'}
]},

'equity|fcf':{
quickReview:['FCFF = cash available to ALL capital providers (debt + equity). FCFE = cash available to equity holders only.','FCFF = NI + NCC + Int(1−t) − FCInv − WCInv.  FCFE = FCFF − Int(1−t) + Net borrowing.','FCFF approach: value firm → subtract debt → equity value. FCFE approach: value equity directly.','FCFE model vs. DDM: use FCFE when dividends don\'t reflect capacity to pay.','Stable-growth FCFF: V_firm = FCFF₁/(WACC−g). Stable-growth FCFE: V_equity = FCFE₁/(r−g).','Terminal value dominates — sensitivity analysis on g and WACC/r is essential.'],
analogy:'FCF valuation is like valuing a <em>rental property</em>. FCFF is the total rental income after maintenance and repairs (available to pay the mortgage AND keep profits). FCFE is what\'s left after the mortgage payments — the owner\'s actual take-home cash. If the property doesn\'t pay dividends (owner reinvests in renovations), FCF is the right way to measure its worth.',
los:[
{title:'Compare the FCFF and FCFE approaches to valuation.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>FCFF Approach</div><div>FCFE Approach</div><div>Key Difference</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Cash Flow</div><div>Cash to ALL providers (debt + equity)</div><div>Cash to EQUITY holders only</div><div>FCFE = FCFF after debt service</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Discount Rate</div><div>WACC</div><div>Cost of equity (r)</div><div>WACC blends debt + equity costs</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Result</div><div>Firm value → subtract debt → equity value</div><div>Equity value directly</div><div>FCFF requires extra step</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 Best When</div><div style="color:#10B981;font-weight:700">Leverage is changing, debt is complex</div><div style="color:#10B981;font-weight:700">Leverage is stable, simpler calculation</div><div>Both should give same answer if consistent</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏠</div><div class="lo-mini-analogy-text">FCFF = total rental income after maintenance (available for mortgage + owner profit). FCFE = what\'s left after mortgage payments — the owner\'s take-home cash.</div></div>'},
{title:'Explain the ownership perspective implicit in the FCFE approach.',explanation:'<div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>FCFE = equity holder\'s perspective.</strong> It measures cash flow after ALL obligations to debt holders (interest + principal) are met. It\'s the cash the company <em>could</em> pay as dividends. Discounting at the cost of equity gives equity value directly — no need to value the firm and subtract debt.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Perspective</div><div>What You\'re Valuing</div><div>Discount Rate</div></div><div class="lo-compare-row lo-compare-3"><div>🏢 FCFF (Firm)</div><div>The entire business — all capital providers\' claim</div><div>WACC (blended cost)</div></div><div class="lo-compare-row lo-compare-3"><div>👤 FCFE (Equity)</div><div>Only the equity holders\' residual claim after debt</div><div>Cost of equity (r)</div></div></div>'},
{title:'Explain the appropriate adjustments to NI, EBIT, EBITDA, and CFO to calculate FCFF and FCFE.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 FCFF — Multiple Starting Points</div><div class="formula-highlight-body">$$From NI:   FCFF = NI + NCC + Int(1-t) - FCInv - WCInv$$\n$$From EBIT:  FCFF = EBIT(1-t) + Dep - FCInv - WCInv$$\n$$From EBITDA: FCFF = EBITDA(1-t) + Dep\\times t - FCInv - WCInv$$\n$$From CFO:  FCFF = CFO + Int(1-t) - FCInv$$</div></div><div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 FCFE — From FCFF or NI</div><div class="formula-highlight-body">$$From FCFF: FCFE = FCFF - Int(1-t) + Net Borrowing$$\n$$From NI:  FCFE = NI + NCC - FCInv - WCInv + Net Borrowing$$</div><div class="formula-highlight-note">NCC = depreciation + amortization + non-cash charges | FCInv = capex − asset sale proceeds | WCInv = Δ non-cash CA − Δ non-debt CL | Net Borrowing = new debt − repayment</div></div>'},
{title:'Calculate FCFF and FCFE.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">1</div><div class="lo-step-connector" style="background:#EF4444;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Identify NCC</div><div class="lo-step-desc">Depreciation, amortization, non-cash restructuring charges, impairments, SBC</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">2</div><div class="lo-step-connector" style="background:#EF4444;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Calculate FCInv</div><div class="lo-step-desc">Capex − proceeds from asset sales. Or: ending net PP&E − beginning net PP&E + depreciation</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">3</div><div class="lo-step-connector" style="background:#EF4444;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Calculate WCInv</div><div class="lo-step-desc">Δ(non-cash current assets) − Δ(non-debt current liabilities). Exclude cash, notes payable, current portion of LTD.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">4</div></div><div class="lo-step-body"><div class="lo-step-title">Assemble the Formula</div><div class="lo-step-desc">Plug into FCFF or FCFE formula. For FCFE, add net borrowing (new debt issued − debt repaid).</div></div></div></div>'},
{title:'Describe approaches for forecasting FCFF and FCFE.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Approach</div><div>How It Works</div><div>Best For</div></div><div class="lo-compare-row lo-compare-3"><div>⬆️ Bottom-Up</div><div>Forecast revenue → EBITDA → EBIT → NI, then separately forecast capex, depreciation, WC changes</div><div style="color:#10B981;font-weight:700">Most detailed and flexible — standard approach</div></div><div class="lo-compare-row lo-compare-3"><div>⬇️ Top-Down</div><div>Macro/industry forecasts → company market share → revenue → cascade down</div><div>Linking valuation to economic outlook</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Historical Growth</div><div>Extrapolate recent FCF trends</div><div>Quick estimate; but assumes past patterns continue</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Watch for:</strong> FCF growth diverging from earnings growth — this signals changing capital intensity or working capital dynamics that simple extrapolation will miss.</div></div>'},
{title:'Explain how dividends, share repurchases, share issues, and changes in leverage may affect future FCFF and FCFE.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Capital Structure Decision</div><div>Effect on FCFF</div><div>Effect on FCFE</div></div><div class="lo-compare-row lo-compare-3"><div>💵 Dividends / Buybacks</div><div style="color:#10B981;font-weight:700">No effect (pre-financing)</div><div>No effect on aggregate FCFE (but per-share changes with buybacks)</div></div><div class="lo-compare-row lo-compare-3"><div>💳 New Debt Issued</div><div style="color:#10B981;font-weight:700">No effect</div><div style="color:#10B981;font-weight:700">↑ FCFE (more cash available to equity)</div></div><div class="lo-compare-row lo-compare-3"><div>💳 Debt Repaid</div><div style="color:#10B981;font-weight:700">No effect</div><div style="color:#EF4444;font-weight:700">↓ FCFE (cash used for repayment)</div></div><div class="lo-compare-row lo-compare-3"><div>📄 Share Issuance</div><div style="color:#10B981;font-weight:700">No effect</div><div>No change to aggregate FCFE; per-share value diluted</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Key insight:</strong> FCFF is capital-structure neutral — it measures cash before financing decisions. FCFE is directly affected by leverage changes. This is why FCFF is preferred when leverage is shifting.</div></div>'},
{title:'Compare the FCFE model and dividend discount models.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>DDM</div><div>FCFE Model</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Cash Flow Used</div><div>Actual dividends paid</div><div>Cash the firm COULD pay (capacity)</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Relationship</div><div>FCFE ≥ Dividends always</div><div>Captures full cash available to equity</div></div><div class="lo-compare-row lo-compare-3"><div>⚠️ When They Diverge</div><div>DDM may undervalue if firm retains significant cash (FCFE &gt;&gt; Div)</div><div>FCFE captures retained capacity</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Use DDM When</div><div style="color:#10B981;font-weight:700">Stable dividend payers, clear payout policy</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Use FCFE When</div><div>—</div><div style="color:#10B981;font-weight:700">Company retains significant FCF, no/erratic dividends</div></div></div>'},
{title:'Evaluate the use of net income and EBITDA as proxies for cash flow in valuation.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Proxy</div><div>What It Misses</div><div>Quality as FCF Proxy</div><div>Danger Zone</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Net Income</div><div>Non-cash charges, capex, working capital changes</div><div style="color:#EF4444;font-weight:700">Poor — can diverge significantly from cash</div><div>High-accrual firms: NI looks great, cash generation doesn\'t</div></div><div class="lo-compare-row lo-compare-4"><div>📈 EBITDA</div><div>Capex, WC changes, taxes</div><div style="color:#F59E0B;font-weight:700">Better than NI but still not FCF</div><div style="color:#EF4444;font-weight:700">Capital-intensive firms: EBITDA ignores massive capex needs</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>EBITDA is NOT free cash flow.</strong> It\'s a proxy for operating cash flow <em>before reinvestment</em>. Using EBITDA as FCF overvalues any firm that needs heavy reinvestment to maintain its business. Telecom, airlines, capital-intensive manufacturing — EBITDA can be 2-3× actual FCF.</div></div>'},
{title:'Explain the use of sensitivity analysis in FCFF and FCFE valuations.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">WACC / r Sensitivity</div><div class="lo-icon-card-desc">Vary discount rate ±1-2%. A 1% WACC change can shift value 15-25%.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Terminal Growth (g)</div><div class="lo-icon-card-desc">Vary g ±0.5-1%. The single most impactful assumption since TV dominates value.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Margin Assumptions</div><div class="lo-icon-card-desc">Test optimistic/base/pessimistic margin paths. Operating leverage amplifies margin sensitivity.</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Best practice:</strong> Create a WACC × terminal g matrix showing value at each combination. This reveals which assumptions matter most and provides a defensible range rather than a single point estimate.</div></div>'},
{title:'Explain the single-stage, two-stage, and three-stage FCFF and FCFE models and justify model selection.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Model</div><div>Formula (FCFF)</div><div>Formula (FCFE)</div><div>Best For</div></div><div class="lo-compare-row lo-compare-4"><div>1️⃣ Single-Stage</div><div>$$V = \\frac{FCFF_1}{WACC - g}$$</div><div>$$V = \\frac{FCFE_1}{r - g}$$</div><div>Mature, stable-growth firms</div></div><div class="lo-compare-row lo-compare-4"><div>2️⃣ Two-Stage</div><div>Explicit high-growth FCFF + GGM terminal value</div><div>Explicit high-growth FCFE + GGM terminal value</div><div>Temporary competitive advantage</div></div><div class="lo-compare-row lo-compare-4"><div>3️⃣ Three-Stage</div><div>Growth → transition → stable</div><div>Growth → transition → stable</div><div>Young, high-growth companies</div></div></div>'},
{title:'Estimate a company\'s value using the appropriate free cash flow model(s).',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Forecast Explicit-Period FCFs</div><div class="lo-step-desc">Revenue, margins, capex, depreciation, working capital assumptions for 5-10 years</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Calculate Terminal Value</div><div class="lo-step-desc">GGM: TV = FCF_{n+1}/(discount rate − g). Or exit multiple: $$TV = EBITDA_n \\times \\text{peer } EV/EBITDA$$.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Discount All Cash Flows</div><div class="lo-step-desc">At WACC (FCFF) or cost of equity (FCFE). For FCFF: subtract net debt → equity value.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">4</div></div><div class="lo-step-body"><div class="lo-step-title">Per-Share Value + Sensitivity</div><div class="lo-step-desc">Divide by diluted shares. Run sensitivity analysis. Cross-check against multiples and other models.</div></div></div></div>'},
{title:'Describe approaches for calculating the terminal value in a multistage valuation model.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Approach</div><div>Formula</div><div>Key Risk</div></div><div class="lo-compare-row lo-compare-3"><div>📐 GGM Terminal Value</div><div>$$TV = \\frac{FCF_{n+1}}{r - g}$$</div><div>Extremely sensitive to g. 0.5% change → 15-25% value swing.</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Exit Multiple</div><div>$$TV = \\text{metric}_n \\times \\text{peer multiple}$$</div><div>Embeds current market pricing into a long-term estimate.</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Terminal value = 60-80% of total estimated value.</strong> The assumptions about the distant future dominate the valuation — yet these are the assumptions we\'re least confident about. Best practice: use both GGM and exit multiple, compare, and explain the divergence.</div></div>'},
{title:'Evaluate whether a stock is overvalued, fairly valued, or undervalued based on a free cash flow valuation model.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Comparison</div><div>Signal</div><div>Confidence Check</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Estimated value > Market price</div><div>Undervalued (buy)</div><div>Is the discount wide enough to cover model uncertainty?</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">Estimated ≈ Market price</div><div>Fairly valued (hold)</div><div>Sensitivity range spans both sides of market price</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Estimated value < Market price</div><div>Overvalued (sell/avoid)</div><div>Does the market know something you don\'t?</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Margin of safety:</strong> Require the discount to be meaningful (20%+) before acting, to account for model uncertainty. A stock "undervalued" by 3% is within noise; one undervalued by 30% has a real margin of safety.</div></div>'}
]},

'equity|multiples':{
quickReview:['Method of comparables: relative to peers. Method of forecasted fundamentals: derive justified multiple from DCF inputs.','$$\\text{Justified } P/E = \\frac{1-b}{r-g}$$. Justified P/B = (ROE−g)/(r−g). Justified P/S = PM₀×(1−b)(1+g)/(r−g).','Normalize EPS: average over a cycle (Molodovsky method), or use historical average ROE × current BVPS.','PEG = (P/E)/g. PEG < 1 → "cheap for the growth." But ignores risk and assumes linear g-to-P/E relationship.','EV/EBITDA preferred for: comparing firms with different leverage, cross-border comparisons, capital-intensive sectors.','Harmonic mean of multiples is preferred for averaging P/Es (reduces upward bias from high outliers).'],
analogy:'Valuation multiples are like <em>price-per-square-meter for apartments</em>. A P/E of 15 means you pay $15 for every $1 of earnings, just like paying $5,000/m² for floor space. But not all square meters are equal — a penthouse with a view (high growth, low risk) justifies a higher price/m² than a basement unit (low growth, high risk). The art is judging whether the premium is warranted.',
los:[
{title:'Contrast the method of comparables and the method based on forecasted fundamentals.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>Method of Comparables</div><div>Forecasted Fundamentals</div><div>Key Difference</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Approach</div><div>Compare stock\'s multiple to peer average</div><div>Derive justified multiple from DCF framework</div><div>Market-anchored vs. theory-anchored</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Formula</div><div>No formula — just compare to peers</div><div>$$\\text{Justified } P/E = \\frac{1-b}{r-g}$$</div><div>Fundamentals give the "should be" value</div></div><div class="lo-compare-row lo-compare-4"><div>⚠️ Key Assumption</div><div>Peers are correctly valued on average</div><div>Inputs (r, g, b) are accurately estimated</div><div>Both can be wrong for different reasons</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 Speed vs. Rigor</div><div style="color:#10B981;font-weight:700">Faster, more market-anchored</div><div style="color:#10B981;font-weight:700">More rigorous, independent of market</div><div>Trade-off: ease vs. depth</div></div></div>'},
{title:'Calculate and interpret a justified price multiple.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Justified Multiples from Fundamentals</div><div class="formula-highlight-body">$$\\text{Leading }\\frac{P}{E} = \\frac{(1-b)}{r-g}$$\n$$\\text{Trailing }\\frac{P}{E} = \\frac{(1-b)(1+g)}{r-g}$$\n$$\\frac{P}{B} = \\frac{(ROE-g)}{r-g}$$\n$$\\frac{P}{S} = PM_0 \\times \\frac{(1-b)(1+g)}{r-g}$$</div><div class="formula-highlight-note">These show what the multiple SHOULD be given fundamentals. Compare to actual: if actual &lt; justified → undervalued.</div></div>'},
{title:'Describe rationales for and possible drawbacks to using alternative price multiples and dividend yield.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Multiple</div><div>Rationale</div><div>Key Drawback</div><div>Best For</div></div><div class="lo-compare-row lo-compare-4"><div>📊 P/E</div><div>Most widely used; earnings drive value</div><div>Earnings manipulable, distorted by non-recurring items, can be negative</div><div>Profitable companies with stable earnings</div></div><div class="lo-compare-row lo-compare-4"><div>📋 P/B</div><div>Anchored in balance sheet; less volatile</div><div>Meaningless for asset-light/tech firms; book value accounting-dependent</div><div>Banks, REITs, asset-heavy firms</div></div><div class="lo-compare-row lo-compare-4"><div>📈 P/S</div><div>Revenue harder to manipulate; always positive</div><div>Ignores cost structure entirely — two firms with same revenue but different margins get same P/S</div><div>Early-stage or loss-making firms</div></div><div class="lo-compare-row lo-compare-4"><div>💰 P/CF</div><div>Less susceptible to accounting manipulation than P/E</div><div>CF definitions vary; may include non-recurring items</div><div>Capital-intensive firms with high non-cash charges</div></div><div class="lo-compare-row lo-compare-4"><div>💵 Dividend Yield</div><div>Direct income measure; simple and intuitive</div><div>Meaningless for non-payers; doesn\'t capture capital gains</div><div>Income-focused investors; utilities, REITs</div></div></div>'},
{title:'Calculate and interpret alternative price multiples and dividend yield.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Multiple</div><div>Calculation</div><div>Interpretation</div></div><div class="lo-compare-row lo-compare-3"><div>P/E</div><div>Price / EPS (trailing or leading)</div><div>Higher = market pays more per $1 of earnings → expects higher growth or lower risk</div></div><div class="lo-compare-row lo-compare-3"><div>P/B</div><div>Price / Book Value per Share</div><div>P/B &gt; 1 → market sees value above book. P/B &lt; 1 → potential distress or undervaluation</div></div><div class="lo-compare-row lo-compare-3"><div>P/S</div><div>Price / Sales per Share</div><div>Compare only within same industry (margin structures differ hugely across sectors)</div></div><div class="lo-compare-row lo-compare-3"><div>Div Yield</div><div>D₁/P₀ (forward) or D₀/P₀ (trailing)</div><div>High yield may signal value OR distress (price has collapsed). Check coverage ratios.</div></div></div>'},
{title:'Calculate and interpret underlying earnings, explain methods of normalizing EPS, and calculate normalized EPS.',explanation:'<div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 Earnings Normalization</div><div class="formula-highlight-body">$$\\text{Underlying EPS} = Reported EPS - non-recurring items$$\n(restructuring, asset sales, litigation, tax windfalls)</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Method</div><div>How It Works</div><div>Best For</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Molodovsky (Historical Avg)</div><div>Average EPS over a full business cycle (5-10 years)</div><div>Cyclical companies (autos, commodities, construction)</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Average ROE Method</div><div>$$\\text{Avg ROE} \\times BVPS$$, e.g. 12\\% × \$25 = \$3.00</div><div>When book value is more stable than earnings</div></div></div>'},
{title:'Explain and justify the use of earnings yield (E/P).',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Works When E < 0</div><div class="lo-icon-card-desc">P/E is undefined for negative earnings. E/P can be computed and compared (it will be negative).</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Direct Ranking</div><div class="lo-icon-card-desc">Higher E/P = cheaper stock. Allows ranking without the non-linearity problems of P/E.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Bond Yield Comparison</div><div class="lo-icon-card-desc">E/P can be compared to bond yields for equity risk premium estimation (Fed model).</div></div></div>'},
{title:'Describe fundamental factors that influence alternative price multiples and dividend yield.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>If This ↑</div><div>P/E Effect</div><div>P/B Effect</div><div>P/S Effect</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Growth (g)</div><div style="color:#10B981;font-weight:700">↑ Higher</div><div style="color:#10B981;font-weight:700">↑ Higher</div><div style="color:#10B981;font-weight:700">↑ Higher</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Risk (r)</div><div style="color:#EF4444;font-weight:700">↓ Lower</div><div style="color:#EF4444;font-weight:700">↓ Lower</div><div style="color:#EF4444;font-weight:700">↓ Lower</div></div><div class="lo-compare-row lo-compare-4"><div>📊 ROE</div><div>$$g = b \\times ROE$$</div><div style="color:#10B981;font-weight:700">↑ Higher (ROE &gt; r → P/B &gt; 1)</div><div>Indirect (through margins/growth)</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Profit Margin</div><div>Through earnings impact</div><div>Through ROE impact</div><div style="color:#10B981;font-weight:700">$$P/S = \\text{margin} \\times P/E$$</div></div></div>'},
{title:'Calculate and interpret a predicted P/E from a cross-sectional regression on fundamentals.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Regress P/E on Fundamentals</div><div class="lo-step-desc">Across large sample: P/E = a + b₁(beta) + b₂(growth) + b₃(payout) + b₄(size) + ε</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Predict Target\'s P/E</div><div class="lo-step-desc">Plug target company\'s fundamentals into the regression → predicted "fair" P/E</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div></div><div class="lo-step-body"><div class="lo-step-title">Compare to Actual</div><div class="lo-step-desc">Actual P/E &lt; predicted → potentially undervalued. But coefficients change over time and multicollinearity is common.</div></div></div></div>'},
{title:'Calculate and interpret the justified P/E, P/B, and P/S for a stock based on forecasted fundamentals.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Worked Example: r=11%, g=5%, b=40%, ROE=14%, PM=8%</div><div class="formula-highlight-body">$$Justified \\frac{P}{E} = \\frac{(1-0.40)}{0.11-0.05} = 0.\\frac{60}{0}.06 = 10.0\\times$$\n$$Justified \\frac{P}{B} = \\frac{(0.14-0.05)}{0.11-0.05} = 0.\\frac{09}{0}.06 = 1.5\\times$$\n$$Justified \\frac{P}{S} = 0.08 \\times \\frac{(0.60)(1.05)}{0.11-0.05} = 0.\\frac{0504}{0}.06 = 0.84\\times$$</div><div class="formula-highlight-note">Compare each to the stock\'s actual multiple. If actual &lt; justified on all three → strong undervaluation signal.</div></div>'},
{title:'Calculate and interpret the PEG ratio and explain its use in relative valuation.',explanation:'<div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 PEG Ratio</div><div class="formula-highlight-body">$$PEG = \\frac{(\\frac{P)}{E})}{g \\times 100}$$\n$$\\text{Example: }\\frac{P}{E} = 20, g = 15\\% \\to PEG = \\frac{20}{15} = 1.33$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>PEG Value</div><div>Interpretation</div><div>Caveat</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">PEG &lt; 1</div><div>"Cheap relative to growth"</div><div>May reflect high risk that justifies the low P/E</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">PEG ≈ 1</div><div>Fairly priced for growth</div><div>Rule of thumb, not precise</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">PEG &gt; 1</div><div>"Expensive relative to growth"</div><div>May reflect low risk or quality premium</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Limitations:</strong> Assumes linear P/E-to-growth relationship (actually non-linear), ignores risk entirely, ignores duration of growth, fails when g is very low or negative. PEG is a quick screen, not a valuation model.</div></div>'},
{title:'Calculate and explain the use of price multiples in determining terminal value in a multistage DCF model.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Approach</div><div>Formula</div><div>Advantage vs. Limitation</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Exit P/E</div><div>$$TV = E_n \\times \\text{justified P/E}$$</div><div>Market-anchored, avoids perpetual g assumption. But embeds current multiples.</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Exit EV/EBITDA</div><div>$$TV = EBITDA_n \\times \\text{peer } EV/EBITDA$$</div><div>Capital-structure neutral. But current peer multiples may not persist.</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Best practice:</strong> Use both GGM and exit multiple terminal values in your DCF and compare. If they diverge significantly, investigate which assumptions are driving the gap.</div></div>'},
{title:'Evaluate whether a stock is overvalued, fairly valued, or undervalued based on comparisons of multiples.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">1</div><div class="lo-step-connector" style="background:#EF4444;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Compare to Peer Median</div><div class="lo-step-desc">Stock P/E vs. industry median — above or below? By how much?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">2</div><div class="lo-step-connector" style="background:#EF4444;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Compare to Own History</div><div class="lo-step-desc">Is the current multiple above or below its own 5-year average? Has anything fundamental changed?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">3</div><div class="lo-step-connector" style="background:#EF4444;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Compare to Justified Multiple</div><div class="lo-step-desc">Actual P/E vs. fundamentals-derived P/E — is the discount/premium warranted?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">4</div></div><div class="lo-step-body"><div class="lo-step-title">Ask "Why"</div><div class="lo-step-desc">A low P/E might reflect justified risk (value trap). Fundamental analysis must support the quantitative signal.</div></div></div></div>'},
{title:'Evaluate a stock by the method of comparables and explain the importance of fundamentals.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">1</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Select Comparable Companies</div><div class="lo-step-desc">Same industry, similar size, risk, and growth profile. Quality of the comp set is everything.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">2</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Calculate Peer Multiples & Median</div><div class="lo-step-desc">Compute P/E (or EV/EBITDA) for each comp. Use median to reduce outlier impact.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">3</div></div><div class="lo-step-body"><div class="lo-step-title">Adjust for Fundamental Differences</div><div class="lo-step-desc">If target has higher growth or lower risk than median → it deserves a premium. Blindly using the median ignores this.</div></div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Comparables provide a starting point; fundamental adjustment is required.</strong> Two firms in the same industry can have vastly different growth, margins, and risk — applying the same multiple to both is a common mistake.</div></div>'},
{title:'Explain alternative definitions of cash flow used in price and EV multiples and describe limitations.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Cash Flow Definition</div><div>What It Includes</div><div>Key Limitation</div></div><div class="lo-compare-row lo-compare-3"><div>💰 CFO</div><div>Cash from operations (from CFS)</div><div>Includes volatile working capital changes</div></div><div class="lo-compare-row lo-compare-3"><div>💧 FCFE</div><div>CFO − capex + net borrowing</div><div>Affected by capital structure decisions</div></div><div class="lo-compare-row lo-compare-3"><div>📊 EBITDA</div><div>Earnings before interest, tax, D&A (proxy, not true CF)</div><div style="color:#EF4444;font-weight:700">Ignores capex and taxes — overstates cash for capital-intensive firms</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The key is consistency:</strong> whichever definition you use, apply it consistently across the entire comparison set. Mixing CFO-based multiples for one firm with EBITDA-based for another invalidates the comparison.</div></div>'},
{title:'Calculate and interpret EV multiples and evaluate the use of EV/EBITDA.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Enterprise Value</div><div class="formula-highlight-body">$$EV = Market Cap + Debt - Cash (+ preferred + minority interest)$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>EV/EBITDA Feature</div><div>Advantage</div><div>Limitation</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Capital-Structure Neutral</div><div style="color:#10B981;font-weight:700">Comparable across firms with different leverage</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Rarely Negative</div><div style="color:#10B981;font-weight:700">EBITDA is positive for most firms</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Capex Treatment</div><div>—</div><div style="color:#EF4444;font-weight:700">Ignores capex needs — misleading for capital-intensive firms</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Tax Treatment</div><div>—</div><div style="color:#EF4444;font-weight:700">Ignores tax rate differences across jurisdictions</div></div></div>'},
{title:'Explain sources of differences in cross-border valuation comparisons.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Accounting Standards</div><div class="lo-icon-card-desc">IFRS vs. GAAP → different earnings, book values, revenue recognition</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Tax Rates</div><div class="lo-icon-card-desc">Different corporate tax rates → different after-tax earnings for same pre-tax profitability</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Growth Prospects</div><div class="lo-icon-card-desc">EM vs. DM growth expectations drive different justified multiples</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Country Risk Premium</div><div class="lo-icon-card-desc">Political, legal, economic risk differences → different discount rates → different multiples</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Adjustment required:</strong> Before concluding one market is "cheaper" than another, normalize for accounting differences, tax rates, growth, risk, and industry composition. Raw multiple comparisons across borders are misleading.</div></div>'},
{title:'Describe momentum indicators and their use in valuation.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Indicator</div><div>What It Measures</div><div>Use in Valuation</div></div><div class="lo-compare-row lo-compare-3"><div>⚡ Earnings Surprise</div><div>Actual EPS vs. consensus estimate</div><div>Positive surprise → upward earnings revision cascade → price momentum</div></div><div class="lo-compare-row lo-compare-3"><div>📝 Estimate Revisions</div><div>Direction and magnitude of analyst forecast changes</div><div>Rising estimates = improving fundamentals; falling = deteriorating</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Relative Strength</div><div>Price performance vs. market or sector</div><div>Outperformers tend to keep outperforming (short to medium term)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Momentum + Value:</strong> Not strictly valuation tools — they help with <em>timing</em>. A stock can be undervalued on fundamentals but still falling. Combining value (low multiple) with momentum (improving trend) often beats either alone.</div></div>'},
{title:'Explain the use of arithmetic mean, harmonic mean, weighted harmonic mean, and median to describe central tendency of multiples.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Measure</div><div>Formula</div><div>Key Property</div><div>When to Use</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Arithmetic Mean</div><div>Simple average</div><div style="color:#EF4444;font-weight:700">Upward-biased by high outliers</div><div>Rarely ideal for multiples</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Median</div><div>Middle value</div><div>Robust to outliers</div><div>Good general-purpose choice</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Harmonic Mean</div><div>n / Σ(1/Xᵢ)</div><div style="color:#10B981;font-weight:700">Weights lower multiples more → reduces outlier bias</div><div style="color:#10B981;font-weight:700">PREFERRED for averaging P/Es</div></div><div class="lo-compare-row lo-compare-4"><div>⚖️ Weighted Harmonic</div><div>Weighted by market cap or fundamentals</div><div>Avoids equal-weighting tiny firms with extreme multiples</div><div>Portfolio-level P/E calculation</div></div></div>'}
]},

'equity|residual':{
quickReview:['RI = Net Income − Equity Charge = NI − (r × B_{t-1}). Positive RI = firm earns more than cost of equity.','EVA = NOPAT − (WACC × Invested Capital). MVA = Market Value − Invested Capital.','RI model: V₀ = B₀ + Σ[RIₜ/(1+r)ᵗ]. Value = book value + PV of future excess returns.','Single-stage RI: V₀ = B₀ + RI₁/(r−g). Justified P/B = 1 + (ROE−r)/(r−g). If ROE=r → P/B=1.','Continuing RI at horizon: may persist (moat), decay to zero (competition), or be zero immediately.','Strengths: works with negative FCF, anchored in accounting data, less terminal value sensitivity. Weaknesses: accounting distortions, requires clean surplus.'],
analogy:'Residual income is like a <em>student loan analogy</em>. Your book value is the education investment (cost of your degree). Your salary is earnings (NI). The equity charge is like the minimum you need to earn to justify the investment (opportunity cost). Residual income is the salary ABOVE that minimum — it\'s the excess value your degree creates. If RI > 0, your education was a good investment. A company with persistently positive RI is creating wealth above its cost of capital.',
los:[
{title:'Calculate and interpret residual income, economic value added, and market value added.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Metric</div><div>Formula</div><div>Perspective</div><div>Interpretation</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Residual Income</div><div>$$RI = NI - r \\cdot B_{t-1} = (ROE - r) \\cdot B_{t-1}$$</div><div>Equity holders</div><div>Excess profit after equity "rent"</div></div><div class="lo-compare-row lo-compare-4"><div>📈 EVA</div><div>$$EVA = NOPAT - WACC \\times IC = (ROIC - WACC) \\times IC$$</div><div>All capital providers</div><div>Excess profit after total capital "rent"</div></div><div class="lo-compare-row lo-compare-4"><div>💰 MVA</div><div>MVA = Market Value − Total Invested Capital = PV of all future EVAs</div><div>All capital providers</div><div>Cumulative value created above capital invested</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Positive RI/EVA → value creation.</strong> The company earns more than its cost of capital. <strong>Negative → value destruction.</strong> Every dollar invested earns less than investors could get elsewhere at similar risk.</div></div>'},
{title:'Describe the uses of residual income models.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">Negative/Volatile FCF Firms</div><div class="lo-icon-card-desc">RI works when FCF is negative or unpredictable — early-stage firms, financial institutions</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Performance Measurement</div><div class="lo-icon-card-desc">EVA-based compensation aligns management with value creation, not just earnings growth</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏦</div><div class="lo-icon-card-title">Financial Institutions</div><div class="lo-icon-card-desc">Banks and insurers where "invested capital" and "book value" have clear economic meaning</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">✅</div><div class="lo-icon-card-title">Cross-Check</div><div class="lo-icon-card-desc">Complement to DCF and DDM — different lens on the same intrinsic value</div></div></div>'},
{title:'Calculate intrinsic value using the RI model and compare value recognition in RI and other present value models.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Residual Income Model</div><div class="formula-highlight-body">$$V_0 = B_0 + \\frac{\\sum[RI_t}{1+r}ᵗ] for t = 1 to \\infty$$\n$$= B_0 + \\sum[(ROE-r) \\times \\frac{B_{t-1}}{1+r}ᵗ]$$\n$$Value = Book Value + PV of Future Excess Earnings$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Model</div><div>Where Value Is Recognized</div><div>Terminal Value Dependence</div></div><div class="lo-compare-row lo-compare-3"><div>📋 RI Model</div><div style="color:#10B981;font-weight:700">Early — book value captures much upfront, RI adds excess returns</div><div>Lower — more value in near-term components</div></div><div class="lo-compare-row lo-compare-3"><div>💰 DDM / FCF</div><div>Later — only when cash is distributed or generated</div><div style="color:#EF4444;font-weight:700">Higher — TV often 60-80% of total value</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Practical advantage:</strong> Because RI front-loads value recognition, it\'s potentially less sensitive to terminal value assumptions — a significant benefit given how uncertain long-term forecasts are.</div></div>'},
{title:'Explain fundamental determinants of residual income.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">ROE − r Spread</div><div class="lo-icon-card-desc">The wider the gap between ROE and cost of equity, the larger RI. This is the primary driver.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Book Value (Scale)</div><div class="lo-icon-card-desc">$$RI = (ROE - r) \\times B$$</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Book Value Growth</div><div class="lo-icon-card-desc">If reinvestment earns ROE &gt; r, growing book value creates ever-larger RI.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏰</div><div class="lo-icon-card-title">Persistence of Excess Returns</div><div class="lo-icon-card-desc">Can the company maintain ROE &gt; r? Competition, disruption, and regulation erode advantages.</div></div></div>'},
{title:'Explain the relation between RI valuation and the justified price-to-book ratio.',explanation:'<div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 Justified P/B from RI Model</div><div class="formula-highlight-body">$$Justified \\frac{P}{B} = 1 + (ROE - \\frac{r}{r - g}$$</div><div class="formula-highlight-note">Example: ROE = 15%, r = 10%, g = 4% → P/B = 1 + (0.05)/(0.06) = 1 + 0.83 = 1.83×</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>ROE vs. r</div><div>Justified P/B</div><div>What It Means</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">ROE &gt; r</div><div>P/B &gt; 1</div><div>Market pays premium to book — company creates value above cost of equity</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">ROE = r</div><div>P/B = 1</div><div>No excess returns — company earns exactly its cost of capital</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">ROE &lt; r</div><div>P/B &lt; 1</div><div>Value destruction — market discounts below book value</div></div></div>'},
{title:'Calculate intrinsic value using single-stage and multistage residual income models.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Single-Stage (Constant Growth) RI</div><div class="formula-highlight-body">$$V_0 = B_0 + \\frac{RI_1}{r - g} = B_0 + [(ROE-r) \\times \\frac{B_0}{r - g}$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Terminal RI Assumption</div><div>When to Use</div><div>Terminal Value of RI</div></div><div class="lo-compare-row lo-compare-3"><div>🏰 RI persists forever</div><div>Durable moat (brand, patents, network effects)</div><div>Perpetuity: RI_n / r or growing perpetuity: RI_{n+1} / (r−g)</div></div><div class="lo-compare-row lo-compare-3"><div>📉 RI decays to zero</div><div>Competition gradually erodes excess returns</div><div>RI fades linearly over a specified period</div></div><div class="lo-compare-row lo-compare-3"><div>⛔ RI = 0 immediately</div><div>No competitive advantage remains at horizon</div><div>$$TV = B_n$$ (book value only)</div></div><div class="lo-compare-row lo-compare-3"><div>📊 RI partially persists</div><div>Some moat remains but narrower</div><div>RI continues at a reduced level</div></div></div>'},
{title:'Calculate the implied growth rate in residual income given the market P/B and estimated required return.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Implied Growth Rate from P/B</div><div class="formula-highlight-body">$$g = r - (ROE - \\frac{r}{\\frac{P}{B} - 1}$$</div><div class="formula-highlight-note">Example: P/B = 2.0, ROE = 14%, r = 10% → g = 0.10 − (0.04)/(1.0) = 6%. This tells you the growth rate the market is pricing in.</div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Application:</strong> If your estimate of sustainable growth is 8% but the market implies only 6%, the stock may be undervalued — the market is underestimating the company\'s reinvestment returns.</div></div>'},
{title:'Explain continuing residual income and justify an estimate at the forecast horizon.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Scenario</div><div>Continuing RI Assumption</div><div>Economic Logic</div><div>Valuation Impact</div></div><div class="lo-compare-row lo-compare-4"><div>🏰 Durable Moat</div><div>RI persists (perpetuity or growing)</div><div>Brand, patents, network effects protect excess returns indefinitely</div><div style="color:#10B981;font-weight:700">Highest terminal value</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Fading Advantage</div><div>RI decays linearly to zero</div><div>Competition gradually erodes the moat over 5-15 years</div><div>Moderate terminal value</div></div><div class="lo-compare-row lo-compare-4"><div>⛔ No Advantage</div><div>RI = 0 at horizon</div><div>All excess returns competed away; company earns exactly r</div><div>Terminal = book value only</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>This choice drives a huge portion of value.</strong> Be explicit about the economic reasoning. What specific competitive advantages persist? What forces threaten them? The fade period should match the expected durability of the moat.</div></div>'},
{title:'Compare residual income models to dividend discount and free cash flow models.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>RI Model</div><div>DDM / FCF Models</div><div>Implication</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Theoretical Equivalence</div><div colspan="2">All three are equivalent under clean surplus accounting</div><div>Should give same answer — if they don\'t, check assumptions</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Value Allocation</div><div style="color:#10B981;font-weight:700">More in near-term (BV + near-term RI)</div><div>More in terminal value (60-80%)</div><div>RI less sensitive to terminal assumptions</div></div><div class="lo-compare-row lo-compare-4"><div>💧 Works with Negative FCF?</div><div style="color:#10B981;font-weight:700">Yes — RI can be positive even with negative FCF</div><div style="color:#EF4444;font-weight:700">Harder — negative FCF creates valuation complications</div><div>RI preferred for high-reinvestment firms</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Accounting Dependence</div><div style="color:#EF4444;font-weight:700">High — requires reliable book values</div><div>Lower — cash flows less manipulable</div><div>DDM/FCF preferred when accounting quality is poor</div></div></div>'},
{title:'Explain strengths and weaknesses of RI models and justify selection.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Dimension</div><div>Strength</div><div>Weakness</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Negative FCF</div><div style="color:#10B981;font-weight:700">Works perfectly — RI can be positive regardless of FCF</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Terminal Value</div><div style="color:#10B981;font-weight:700">Less terminal dependence — more value in near-term</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Accounting Quality</div><div>Uses readily available accounting data</div><div style="color:#EF4444;font-weight:700">Sensitive to aggressive capitalization, off-BS items, accounting choices</div></div><div class="lo-compare-row lo-compare-3"><div>🔗 Clean Surplus</div><div>Focuses on economic profitability (ROE vs. r)</div><div style="color:#EF4444;font-weight:700">Requires clean surplus (comprehensive income → BV). OCI items violate this.</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Intangible-Heavy Firms</div><div>—</div><div style="color:#EF4444;font-weight:700">Book value understates invested capital when intangibles dominate (tech, pharma)</div></div></div>'},
{title:'Describe accounting issues in applying residual income models.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">Clean Surplus Violations</div><div class="lo-icon-card-desc">OCI items (FX translation, pension remeasurements) bypass income → break the clean surplus relation between BV and NI</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🧠</div><div class="lo-icon-card-title">Intangible Assets</div><div class="lo-icon-card-desc">Internally generated R&D, brands, and customer relationships not on BS → BV understated, ROE overstated</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Fair Value Accounting</div><div class="lo-icon-card-desc">Unrealized gains/losses in BV add volatility to RI calculations even without real economic change</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🎛️</div><div class="lo-icon-card-title">Aggressive vs. Conservative</div><div class="lo-icon-card-desc">Capitalization policies inflate BV and distort ROE. Analyst adjustments to both BV and earnings are often necessary.</div></div></div>'}
]},

'equity|private':{
quickReview:['Private vs. public: less liquidity, less information, concentrated ownership, potentially different risk profile.','Normalized earnings: adjust for owner compensation, related-party transactions, non-recurring items, non-operating assets.','Discount rate: CAPM + size premium + specific risk premium + illiquidity premium. Build-up approach common.','Control premium: additional value for controlling interest. Discount for lack of control (DLOC) for minority stakes.','Discount for lack of marketability (DLOM): 15-35% typical for private companies vs. public equivalents.','Three approaches: income (DCF, capitalized CF), market (guideline public companies, guideline transactions), asset-based (adjusted net assets).'],
analogy:'Valuing a private company is like <em>appraising a custom-built house in a neighborhood with no recent sales</em>. There\'s no ticker price (market value), so you must estimate from fundamentals (income approach = rental yield analysis), comparables (market approach = sales of similar houses in nearby neighborhoods, adjusted for differences), or replacement cost (asset approach = cost to rebuild from scratch). You also apply a "liquidity discount" — this house can\'t be sold in a day like a condo in Manhattan.',
los:[
{title:'Contrast important public and private company features for valuation purposes.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>Public Company</div><div>Private Company</div><div>Valuation Impact</div></div><div class="lo-compare-row lo-compare-4"><div>💧 Liquidity</div><div>Shares traded daily on exchange</div><div style="color:#EF4444;font-weight:700">Can\'t easily sell shares</div><div>Requires DLOM (15-35%)</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Information</div><div>SEC filings, analyst coverage, audited statements</div><div style="color:#EF4444;font-weight:700">Limited data, less audit quality</div><div>Higher uncertainty → wider valuation range</div></div><div class="lo-compare-row lo-compare-4"><div>👥 Ownership</div><div>Dispersed shareholders</div><div>Concentrated (founder, family)</div><div>Control premium/discount relevant</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Capital Access</div><div>Deep markets, equity/debt issuance</div><div>Limited → potentially suboptimal structure</div><div>Higher cost of capital</div></div><div class="lo-compare-row lo-compare-4"><div>👔 Management</div><div>Professional management, market-rate comp</div><div style="color:#EF4444;font-weight:700">Key-person risk; comp may not be market-rate</div><div>Normalize compensation; add specific risk premium</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Tax Strategy</div><div>Manage for shareholder value</div><div>May manage for tax minimization</div><div>Must normalize earnings to economic basis</div></div></div>'},
{title:'Describe uses of private business valuation and explain key areas of focus for financial analysts.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🤝</div><div class="lo-icon-card-title">M&A Transactions</div><div class="lo-icon-card-desc">Pricing for acquisitions, partner buyouts, or sales of the business</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Tax & Estate</div><div class="lo-icon-card-desc">Estate/gift tax compliance, charitable donations, estate planning</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Litigation & Disputes</div><div class="lo-icon-card-desc">Shareholder disputes, divorce proceedings, damages assessment</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">IPO & Financing</div><div class="lo-icon-card-desc">Pre-IPO pricing, venture capital rounds, bank loan collateral</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">👔</div><div class="lo-icon-card-title">ESOP & Compensation</div><div class="lo-icon-card-desc">Employee stock ownership plan valuations, equity-based comp for key hires</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Analyst focus:</strong> Normalized earnings (strip out owner quirks), appropriate discount rate (higher than public), applicable premiums/discounts, and clear documentation — private valuations are frequently challenged in disputes.</div></div>'},
{title:'Explain cash flow estimation issues related to private companies and adjustments required to estimate normalized earnings.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Owner Compensation</div><div class="lo-icon-card-desc">Replace above/below-market salary with market rate. Owner paying themselves $50K or $500K — neither reflects the true cost.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🤝</div><div class="lo-icon-card-title">Related-Party Transactions</div><div class="lo-icon-card-desc">Adjust to arm\'s-length pricing. Rent from owner\'s building, purchases from family company.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏷️</div><div class="lo-icon-card-title">Non-Recurring Items</div><div class="lo-icon-card-desc">Strip one-time gains/losses, litigation settlements, insurance recoveries</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🏠</div><div class="lo-icon-card-title">Non-Operating Assets</div><div class="lo-icon-card-desc">Separate real estate, excess cash, art, personal assets run through the business</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🎩</div><div class="lo-icon-card-title">Personal Expenses</div><div class="lo-icon-card-desc">Remove personal travel, vehicles, family members on payroll — common in closely-held businesses</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Goal:</strong> Reveal the true <em>economic earning power</em> of the business, independent of the current owner\'s choices. Normalized earnings should reflect what a hypothetical buyer would earn.</div></div>'},
{title:'Explain factors that require adjustment when estimating the discount rate for private companies.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Premium</div><div>Why It Applies</div><div>Typical Range</div></div><div class="lo-compare-row lo-compare-3"><div>📏 Size Premium</div><div>Private firms typically smaller → empirically higher returns required (Ibbotson data)</div><div>2-6% depending on size</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Specific-Company Risk</div><div>Key-person dependence, customer concentration, geographic/product concentration</div><div>1-5% (highly judgmental)</div></div><div class="lo-compare-row lo-compare-3"><div>💧 Illiquidity Premium</div><div>Can\'t sell shares quickly → demand compensation</div><div>2-4% (or embedded in DLOM instead)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Total impact:</strong> Private company cost of equity is typically 15-25% vs. 8-12% for comparable public companies — a 3-8% premium from these additional risk factors.</div></div>'},
{title:'Compare models used to estimate the required rate of return to private company equity.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Model</div><div>Formula</div><div>When to Use</div><div>Key Limitation</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Expanded CAPM</div><div>$$r = r_f + \\beta \\cdot ERP + SP + SCRP + ILP$$</div><div>When comparable public beta available</div><div>Beta must be unlevered/relevered from comps</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Build-Up Method</div><div>$$r = r_f + ERP + SP + SCRP + ILP$$</div><div style="color:#10B981;font-weight:700">When no reliable beta estimate available</div><div>All premiums are judgmental — wide range of defensible values</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Both methods</strong> layer premiums onto the public-market base rate. The build-up method is more common in practice for small private companies because finding truly comparable public betas is often impossible.</div></div>'},
{title:'Explain and evaluate the effects on private company valuations of discounts and premiums based on control and marketability.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Valuation Basis</div><div>Control?</div><div>Marketable?</div><div>Adjustments Needed</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Controlling, Marketable</div><div style="color:#10B981;font-weight:700">Yes</div><div style="color:#10B981;font-weight:700">Yes</div><div>Base case (public comparable value)</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Controlling, Non-Marketable</div><div style="color:#10B981;font-weight:700">Yes</div><div style="color:#EF4444;font-weight:700">No</div><div>Apply DLOM only</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Minority, Marketable</div><div style="color:#EF4444;font-weight:700">No</div><div style="color:#10B981;font-weight:700">Yes</div><div>Apply DLOC only</div></div><div class="lo-compare-row lo-compare-4"><div>🔻 Minority, Non-Marketable</div><div style="color:#EF4444;font-weight:700">No</div><div style="color:#EF4444;font-weight:700">No</div><div style="color:#EF4444;font-weight:700">Apply BOTH DLOC and DLOM (deepest discount)</div></div></div><div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 Key Formulas</div><div class="formula-highlight-body">Control Premium: typically 20-40% over minority value\n$$DLOC = 1 - \\frac{1}{1 + \\text{Control Premium}}$$\nDLOM: typically 15-35% (from restricted stock studies, IPO studies, or put option models)</div></div>'},
{title:'Explain the income, market, and asset-based approaches to private company valuation and factors relevant to selection.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Approach</div><div>Methods</div><div>Best When</div><div>Weakness</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Income</div><div>DCF, Capitalized Cash Flow, Excess Earnings</div><div style="color:#10B981;font-weight:700">Reliable projections available; business has operating history</div><div>Forecast-dependent; discount rate highly judgmental</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Market</div><div>Guideline Public Company, Guideline Transaction</div><div>Good comparables exist; active M&A market</div><div>Truly comparable firms may not exist; transactions may be dated</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ Asset-Based</div><div>Adjusted Net Asset Value (revalue A&L to FV)</div><div>Asset-intensive firms, holding companies, liquidation, or when earnings unreliable</div><div>Ignores going-concern value; misses intangibles</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Best practice:</strong> Use multiple approaches and reconcile — weight each based on reliability and relevance. Income approach is most theoretically sound; market provides a reality check; asset-based sets a floor.</div></div>'},
{title:'Calculate the value of a private company using income-based methods.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Method</div><div>Formula</div><div>Best For</div></div><div class="lo-compare-row lo-compare-3"><div>📈 DCF</div><div>$$V = \\sum \\frac{FCF_t}{(1+r)^t} + \\frac{TV}{(1+r)^n}$$</div><div>Companies with forecastable, growing cash flows</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Capitalized Cash Flow</div><div>$$V = \\frac{NCF_1}{r - g}$$</div><div>Stable, mature private businesses with steady growth</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Excess Earnings (Hybrid)</div><div>Value tangibles at FV + intangible value (excess earnings / cap rate)</div><div>When intangible assets drive value but can\'t be directly observed</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>NCF = normalized cash flow</strong> — after all the adjustments for owner compensation, related parties, and non-recurring items. The discount rate uses the expanded CAPM or build-up method.</div></div>'},
{title:'Calculate the value of a private company using market-based methods and describe advantages and disadvantages.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>Steps</div><div>Advantage</div><div>Disadvantage</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 Guideline Public Company</div><div>1. Find comparable publics → 2. Calculate multiples → 3. Apply median to subject → 4. Adjust for DLOM/DLOC</div><div>Market-based, objective, current</div><div>Truly comparable public firms may not exist for a small private company</div></div><div class="lo-compare-row lo-compare-4"><div>🤝 Guideline Transaction</div><div>1. Find recent M&A deals for similar privates → 2. Calculate implied multiples → 3. Apply to subject</div><div>Reflects actual prices paid (includes control premium)</div><div>Transactions may be dated; each deal has unique terms and motivations</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏠</div><div class="lo-mini-analogy-text">Guideline public = checking what similar apartments in other buildings sold for, adjusted for differences. Guideline transaction = checking what similar houses in nearby neighborhoods recently sold for — real deal prices, but each transaction has its own story.</div></div>'}
]},
