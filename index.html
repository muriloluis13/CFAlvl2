'equity|eq-process':{
quickReview:['Intrinsic value = PV of all future cash flows. Market price may differ → perceived mispricing → investment opportunity.','Going concern assumes indefinite operation. Liquidation value = asset disposal value − liabilities. Going concern > liquidation normally.','Absolute models (DCF, DDM, RI) estimate intrinsic value directly. Relative models (P/E, EV/EBITDA) compare to peers.','Sum-of-parts: value each segment separately → sum. Conglomerate discount = market cap < SOTP (diversification penalty).','Model choice depends on: dividend predictability, FCF stability, earnings quality, comparability of peers, data availability.'],
analogy:'Equity valuation is like <em>appraising a house</em>. The absolute approach (DCF) is like estimating value from expected future rental income. The relative approach (multiples) is like looking at what similar houses on the street sold for. Both have flaws — the rental estimate depends on assumptions about occupancy and rent growth; the comparable sale might have had a desperate seller. The best appraisers use both and triangulate.',
los:[
{title:'Define valuation and intrinsic value and explain sources of perceived mispricing.',explanation:'<p><span class="key-term">Valuation</span> = estimating the worth of an asset based on its fundamental characteristics. <span class="key-term">Intrinsic value</span> = the "true" value based on a complete understanding of the asset\'s investment characteristics.</p><p>Perceived mispricing occurs when an analyst\'s intrinsic value estimate differs from market price. Sources: different information, different models, different inputs/assumptions. The key question: is the mispricing real (market is wrong) or apparent (analyst\'s model is wrong)?</p>'},
{title:'Explain the going concern assumption and contrast going concern value to liquidation value.',explanation:'<p><strong>Going concern:</strong> assumes the company continues operating indefinitely → value = PV of future cash flows. <strong>Liquidation value:</strong> value if assets are sold off and liabilities settled. Going concern > liquidation normally because operating businesses create value above the sum of their parts. When liquidation > going concern → the company is worth more dead than alive → catalyst for activist intervention or takeover.</p>'},
{title:'Describe definitions of value and justify which is most relevant to public company valuation.',explanation:'<p>Definitions include: intrinsic value (analyst\'s estimate), market value (current price × shares), fair market value (arm\'s-length transaction), fair value (accounting/legal standard), investment value (value to a specific buyer including synergies). For public company valuation, <strong>intrinsic value</strong> is most relevant — it represents what the stock is worth based on fundamentals, independent of current market sentiment.</p>'},
{title:'Describe applications of equity valuation.',explanation:'<p>Valuation is used for: stock selection (buy if intrinsic > price), assessing corporate events (M&A pricing, IPOs, spin-offs), evaluating business strategies (does the strategy create value?), communication (sell-side target prices), fairness opinions (board evaluations of offers), compensation (equity-based comp requires valuation), and compliance (tax/estate purposes).</p>'},
{title:'Describe questions that should be addressed in conducting an industry and competitive analysis.',explanation:'<p>Before valuing a company, understand its context: What are the industry\'s growth prospects? What drives profitability (Porter\'s five forces: rivalry, buyers, suppliers, substitutes, new entrants)? Where is the industry in its life cycle (growth, mature, decline)? What is the company\'s competitive position — does it have a sustainable moat? How sensitive is the business to macroeconomic factors? What regulatory risks exist?</p>'},
{title:'Contrast absolute and relative valuation models and describe examples of each.',explanation:'<div class="formula-box"><span class="label">Valuation Model Types</span>ABSOLUTE (intrinsic value directly):\n  • Dividend Discount Model (DDM)\n  • Free Cash Flow (FCFF/FCFE) models\n  • Residual Income model\n  → Requires forecasting cash flows + discount rate\n\nRELATIVE (value by comparison):\n  • Price multiples: P/E, P/B, P/S, P/CF\n  • Enterprise value multiples: EV/EBITDA, EV/Sales\n  → Requires comparable companies/transactions</div>'},
{title:'Describe sum-of-the-parts valuation and conglomerate discounts.',explanation:'<p><strong>SOTP:</strong> value each business segment independently using the most appropriate method for each, then sum. Useful for diversified companies where a single multiple doesn\'t fit. <strong>Conglomerate discount:</strong> market cap < SOTP value. Causes: internal capital misallocation, complexity/opacity, lack of pure-play comparability, management stretched thin. Catalyst for spin-offs.</p>'},
{title:'Explain broad criteria for choosing an appropriate valuation approach.',explanation:'<p>Model choice depends on the company\'s characteristics: <strong>DDM</strong> — dividend-paying, mature, predictable payout. <strong>FCF</strong> — significant capex, volatile dividends, or non-dividend-payers. <strong>Residual income</strong> — negative FCF firms, financial institutions (hard to define capex), or when book value is meaningful. <strong>Multiples</strong> — abundant comparables, quick screen, terminal value calculation. Use multiple approaches and triangulate when possible.</p>'}
]},

'equity|ddm':{
quickReview:['DDM: V₀ = Σ Dₜ/(1+r)ᵗ. Value = PV of all expected future dividends.','Gordon Growth: V₀ = D₁/(r−g). Requires r > g, constant growth forever. Best for stable, mature firms.','Implied g = (D₁/P₀) − r rearranged: g = r − D₁/P₀. PVGO = P₀ − E₁/r.','Justified P/E: leading = (1−b)/(r−g) where b = retention ratio; trailing = (1−b)(1+g)/(r−g).','H-model: V₀ = D₀(1+g_L)/(r−g_L) + D₀×H×(g_S−g_L)/(r−g_L) where H = half-life of high-growth period.','Sustainable g = b × ROE = (retention rate)(return on equity). DuPont: ROE = margin × turnover × leverage.','Terminal value = D_{n+1}/(r−g_L) at the horizon. Often dominates total value → assumptions are critical.'],
analogy:'The DDM is like valuing a <em>fruit tree</em>. The tree\'s value equals the present value of all future fruit harvests (dividends). The Gordon Growth Model assumes the harvest grows at a constant rate forever — fine for a mature apple tree, but absurd for a sapling that might grow fast then stabilize. Multi-stage models handle this: the sapling (growth phase) eventually becomes a mature tree (stable growth).',
los:[
{title:'Compare dividends, free cash flow, and residual income as inputs to DCF models and identify situations for which each is suitable.',explanation:'<p><strong>Dividends:</strong> actual cash paid to shareholders. Best when: dividends exist, are stable, and bear a clear relation to earnings. Poorly suited for non-payers or firms with erratic payouts.</p><p><strong>FCFE/FCFF:</strong> cash the firm could pay (even if it doesn\'t). Best when: dividends don\'t reflect capacity to pay, or the company doesn\'t pay dividends. Used for most corporate valuations.</p><p><strong>Residual income:</strong> accounting-based (NI − equity charge). Best when: FCF is negative or volatile, book value is meaningful (banks), or for firms where near-term cash flows are minimal but book value captures value.</p>'},
{title:'Calculate and interpret the value of common stock using the DDM for single and multiple holding periods.',explanation:'<div class="formula-box"><span class="label">DDM Holding Period Models</span>Single period: V₀ = (D₁ + P₁) / (1 + r)\n\nMultiple periods: V₀ = Σ[Dₜ/(1+r)ᵗ] + Pₙ/(1+r)ⁿ\n\nInfinite horizon: V₀ = Σ[Dₜ/(1+r)ᵗ] for t=1 to ∞\n  (terminal price disappears — PV of Pₙ → 0 as n → ∞)</div><p>Key insight: even in the multi-period model, the terminal price Pₙ is itself the PV of dividends from n+1 onward. So all equity value ultimately derives from dividends.</p>'},
{title:'Calculate the value of common stock using the Gordon growth model and explain its assumptions.',explanation:'<div class="formula-box"><span class="label">Gordon Growth Model (GGM)</span>V₀ = D₁ / (r − g) = D₀(1+g) / (r − g)\n\nAssumptions:\n  1. Dividends grow at constant rate g forever\n  2. r > g (otherwise value is infinite/negative)\n  3. g is constant and sustainable\n  4. r is constant</div><p>Best suited for mature companies with a long, stable dividend history and growth rate close to the economy\'s long-run growth rate.</p>'},
{title:'Calculate the value of non-callable fixed-rate perpetual preferred stock.',explanation:'<div class="formula-box"><span class="label">Preferred Stock Valuation</span>V = D / r\n\nSimply a perpetuity — fixed dividend, no growth\nExample: $5 annual dividend, required return 8%\nV = $5 / 0.08 = $62.50</div>'},
{title:'Describe strengths and limitations of the Gordon growth model and justify its selection.',explanation:'<p><strong>Strengths:</strong> simple, intuitive, widely understood, provides quick estimate, useful as a terminal value formula in multi-stage models.</p><p><strong>Limitations:</strong> extremely sensitive to r−g (small changes → large value swings), constant growth assumption is unrealistic for most firms, cannot handle non-dividend payers, assumes perpetual stability that rarely exists.</p><p>Justified for: mature utilities, large consumer staples, REITs — firms with long dividend track records and growth rates close to GDP growth.</p>'},
{title:'Calculate and interpret the implied growth rate of dividends using the Gordon growth model and current stock price.',explanation:'<div class="formula-box"><span class="label">Implied Growth Rate</span>Rearranging GGM: g = r − (D₁/P₀)\n\nExample: P₀=$50, D₁=$2, r=10%\n  g = 10% − (2/50) = 10% − 4% = 6%</div><p>The implied g tells you what growth rate the market is pricing in. If your analysis suggests g should be higher, the stock may be undervalued.</p>'},
{title:'Calculate and interpret PVGO and the component of leading P/E related to PVGO.',explanation:'<div class="formula-box"><span class="label">Present Value of Growth Opportunities</span>PVGO = P₀ − (E₁/r)\n\nE₁/r = value as a no-growth perpetuity (100% payout)\nPVGO = premium the market pays for expected growth\n\nLeading P/E = P₀/E₁ = (1/r) + PVGO/E₁\n  First term = no-growth P/E\n  Second term = growth component</div><p>If PVGO is large relative to P₀, the market expects significant value creation from reinvestment. If PVGO ≈ 0, the stock is priced as an earnings stream with no growth premium.</p>'},
{title:'Calculate and interpret justified leading and trailing P/Es using the Gordon growth model.',explanation:'<div class="formula-box"><span class="label">Justified P/E Ratios</span>Leading P/E (P₀/E₁) = (1−b) / (r−g) = payout ratio / (r−g)\n\nTrailing P/E (P₀/E₀) = (1−b)(1+g) / (r−g)\n\nwhere b = retention ratio, g = b×ROE\n\nHigher justified P/E when:\n  • Higher payout (if ROE = r, payout doesn\'t matter)\n  • Lower required return\n  • Higher growth rate\n  • Higher ROE (growth creates more value)</div>'},
{title:'Estimate a required return based on any DDM, including the Gordon growth model and the H-model.',explanation:'<div class="formula-box"><span class="label">Implied Required Return</span>From GGM: r = D₁/P₀ + g\n\nFrom H-model:\nr = D₀/P₀ × [(1+g_L) + H×(g_S − g_L)] + g_L</div><p>These provide a market-implied cost of equity — useful for cross-checking CAPM estimates.</p>'},
{title:'Evaluate whether a stock is overvalued, fairly valued, or undervalued based on a DDM estimate.',explanation:'<p>Compare intrinsic value (V₀) to market price (P₀): V₀ > P₀ → undervalued (buy). V₀ < P₀ → overvalued (sell/avoid). V₀ ≈ P₀ → fairly valued. Always consider the sensitivity of your estimate to key assumptions (r, g) before making high-conviction calls.</p>'},
{title:'Explain the growth phase, transition phase, and maturity phase of a business.',explanation:'<p><strong>Growth phase:</strong> rapid earnings growth, high reinvestment, low/no dividends, ROE >> r. <strong>Transition phase:</strong> growth decelerates, competition intensifies, payout ratio increases, ROE converges toward r. <strong>Maturity phase:</strong> stable low growth (≈ GDP), high payout, ROE ≈ r. Multi-stage DDMs map these phases explicitly.</p>'},
{title:'Explain the assumptions and justify the selection of the two-stage DDM, H-model, three-stage DDM, or spreadsheet modeling.',explanation:'<div class="formula-box"><span class="label">Multi-Stage Model Selection</span>Two-stage: high growth → abrupt switch to stable\n  Best for: firms with a finite competitive advantage period\n\nH-model: growth declines linearly from g_S to g_L\n  Best for: firms with gradually fading growth advantage\n  V₀ = D₀(1+g_L)/(r−g_L) + D₀×H×(g_S−g_L)/(r−g_L)\n\nThree-stage: growth → transition → maturity\n  Best for: young, high-growth firms with extended runways\n\nSpreadsheet: fully flexible year-by-year forecasts\n  Best for: complex situations, non-linear transitions</div>'},
{title:'Describe terminal value and explain alternative approaches to determining terminal value in a DDM.',explanation:'<p><strong>Terminal value</strong> captures value beyond the explicit forecast period. Typically the largest component (60-80% of total value). Two approaches: (1) <strong>Gordon growth</strong>: TV = D_{n+1}/(r−g_L). (2) <strong>Multiple-based</strong>: TV = expected metric × justified multiple (e.g., E_n × target P/E). Both require careful assumption about the sustainable state.</p>'},
{title:'Calculate and interpret the value of common shares using the two-stage DDM, H-model, and three-stage DDM.',explanation:'<div class="formula-box"><span class="label">Two-Stage DDM</span>V₀ = Σ[D₀(1+g_S)ᵗ / (1+r)ᵗ] + [D₀(1+g_S)ⁿ(1+g_L) / (r−g_L)] / (1+r)ⁿ\n     for t=1 to n\n\nStage 1: discount each high-growth dividend explicitly\nStage 2: GGM terminal value at period n</div><p>For the H-model and three-stage DDM, the calculation layers in the transition dynamics — but the logic is the same: sum the PV of near-term dividends + PV of terminal value.</p>'},
{title:'Explain the use of spreadsheet modeling to forecast dividends and to value common shares.',explanation:'<p>Spreadsheet modeling allows maximum flexibility: forecast revenue, margins, earnings, payout ratios, and dividends year by year. Advantages: can model non-linear growth, changing capital structure, specific events (product launches, patent expirations). The terminal value is still typically calculated via GGM at the end of the explicit forecast period.</p>'},
{title:'Calculate and interpret the sustainable growth rate and demonstrate DuPont analysis to estimate it.',explanation:'<div class="formula-box"><span class="label">Sustainable Growth Rate</span>g = b × ROE = retention rate × return on equity\n\nDuPont decomposition of ROE:\nROE = (NI/Sales) × (Sales/Assets) × (Assets/Equity)\n    = Net Margin × Asset Turnover × Financial Leverage\n\nExtended DuPont:\nROE = (NI/EBT)×(EBT/EBIT)×(EBIT/Sales)×(Sales/Assets)×(Assets/Equity)\n    = Tax Burden × Interest Burden × EBIT Margin × Turnover × Leverage</div><p>DuPont reveals the <em>sources</em> of ROE — and therefore the quality and sustainability of the growth rate. High ROE from leverage is riskier than high ROE from margins.</p>'}
]},

'equity|fcf':{
quickReview:['FCFF = cash available to ALL capital providers (debt + equity). FCFE = cash available to equity holders only.','FCFF = NI + NCC + Int(1−t) − FCInv − WCInv.  FCFE = FCFF − Int(1−t) + Net borrowing.','FCFF approach: value firm → subtract debt → equity value. FCFE approach: value equity directly.','FCFE model vs. DDM: use FCFE when dividends don\'t reflect capacity to pay.','Stable-growth FCFF: V_firm = FCFF₁/(WACC−g). Stable-growth FCFE: V_equity = FCFE₁/(r−g).','Terminal value dominates — sensitivity analysis on g and WACC/r is essential.'],
analogy:'FCF valuation is like valuing a <em>rental property</em>. FCFF is the total rental income after maintenance and repairs (available to pay the mortgage AND keep profits). FCFE is what\'s left after the mortgage payments — the owner\'s actual take-home cash. If the property doesn\'t pay dividends (owner reinvests in renovations), FCF is the right way to measure its worth.',
los:[
{title:'Compare the FCFF and FCFE approaches to valuation.',explanation:'<div class="formula-box"><span class="label">FCFF vs. FCFE</span>FCFF Approach:\n  Discount FCFF at WACC → Firm value\n  Subtract market value of debt → Equity value\n  Divide by shares → Value per share\n\nFCFE Approach:\n  Discount FCFE at cost of equity (r) → Equity value directly\n  Divide by shares → Value per share\n\nBoth should give same answer if applied consistently.\nFCFF preferred when: leverage is changing, debt is complex.\nFCFE preferred when: leverage is stable, simpler calculation.</div>'},
{title:'Explain the ownership perspective implicit in the FCFE approach.',explanation:'<p>FCFE takes the <strong>equity holder\'s perspective</strong> — it measures cash flow after all obligations to debt holders (interest, principal repayments) are met. It\'s the cash the company <em>could</em> pay as dividends. Discounting at the cost of equity gives equity value directly, without needing to value the firm and subtract debt.</p>'},
{title:'Explain the appropriate adjustments to NI, EBIT, EBITDA, and CFO to calculate FCFF and FCFE.',explanation:'<div class="formula-box"><span class="label">FCFF Formulas</span>From NI:   FCFF = NI + NCC + Int(1−t) − FCInv − WCInv\nFrom EBIT: FCFF = EBIT(1−t) + Dep − FCInv − WCInv\nFrom EBITDA: FCFF = EBITDA(1−t) + Dep×t − FCInv − WCInv\nFrom CFO:  FCFF = CFO + Int(1−t) − FCInv\n\nFCFE from FCFF:\n  FCFE = FCFF − Int(1−t) + Net borrowing\nFCFE from NI:\n  FCFE = NI + NCC − FCInv − WCInv + Net borrowing</div>'},
{title:'Calculate FCFF and FCFE.',explanation:'<p>Application requires identifying each component: NCC (depreciation, amortization, non-cash restructuring), FCInv (capex − proceeds from asset sales), WCInv (change in non-cash current assets − change in non-debt current liabilities). Net borrowing = new debt issued − debt repaid. Practice identifying these from financial statements is essential for the exam.</p>'},
{title:'Describe approaches for forecasting FCFF and FCFE.',explanation:'<p><strong>Bottom-up:</strong> forecast revenue → EBITDA → EBIT → NI, then separately forecast capex, depreciation, and working capital changes. Most detailed and flexible.</p><p><strong>Top-down:</strong> start with macro/industry forecasts → company\'s market share → revenue → cascades down. Good for linking valuation to economic outlook.</p><p><strong>Historical growth rates:</strong> extrapolate recent FCF trends. Simple but assumes past patterns continue. Always compare FCF growth to earnings growth — divergence signals changing capital intensity or working capital dynamics.</p>'},
{title:'Explain how dividends, share repurchases, share issues, and changes in leverage may affect future FCFF and FCFE.',explanation:'<p>Key insight: <strong>FCFF is unaffected</strong> by capital structure decisions (dividends, buybacks, debt changes) because it measures cash before financing. <strong>FCFE is directly affected</strong> — more borrowing increases FCFE (more cash available to equity after debt service is reduced by new capital inflows), more repayment decreases it. Share issues don\'t change aggregate FCFE but affect per-share value.</p>'},
{title:'Compare the FCFE model and dividend discount models.',explanation:'<p>FCFE ≥ Dividends always (company can\'t pay more than it earns in cash). When FCFE >> Dividends, the DDM may undervalue the stock because it ignores capacity to pay. FCFE model captures this capacity. They give the same answer only when FCFE = Dividends (100% payout of available cash). Use DDM for stable dividend payers; FCFE for companies that retain significant free cash flow.</p>'},
{title:'Evaluate the use of net income and EBITDA as proxies for cash flow in valuation.',explanation:'<p><strong>NI as proxy:</strong> misses non-cash charges, capex, and working capital. Can diverge significantly from actual cash flow. Poor proxy.</p><p><strong>EBITDA as proxy:</strong> better than NI (adds back D&A and interest), but ignores capex and WC changes. Dangerous for capital-intensive businesses where capex is large. Also ignores tax payments. EBITDA is a proxy for <em>operating cash flow before reinvestment</em>, not free cash flow. Using EBITDA as FCF overvalues firms that need heavy reinvestment.</p>'},
{title:'Explain the use of sensitivity analysis in FCFF and FCFE valuations.',explanation:'<p>Because DCF values are highly sensitive to assumptions (especially the terminal growth rate and discount rate), <strong>sensitivity analysis</strong> is essential. Vary key inputs across a plausible range and observe the impact on value. Common: create a matrix with WACC on one axis and terminal g on the other, showing value at each combination. This reveals which assumptions matter most and the range of defensible values.</p>'},
{title:'Explain the single-stage, two-stage, and three-stage FCFF and FCFE models and justify model selection.',explanation:'<div class="formula-box"><span class="label">FCF Model Variants</span>Single-stage (stable growth):\n  V_firm = FCFF₁ / (WACC − g)\n  V_equity = FCFE₁ / (r − g)\n  For: mature, stable-growth firms\n\nTwo-stage: explicit high-growth + terminal (GGM)\n  For: firms with temporarily elevated growth\n\nThree-stage: growth → transition → stable\n  For: young firms with extended growth runways</div><p>Model choice follows the same logic as DDM: match the model\'s growth assumptions to the company\'s expected trajectory.</p>'},
{title:'Estimate a company\'s value using the appropriate free cash flow model(s).',explanation:'<p>The practical workflow: (1) Forecast explicit-period FCFs based on revenue/margin/capex assumptions. (2) Calculate terminal value using GGM or exit multiple. (3) Discount all cash flows at WACC (for FCFF) or r (for FCFE). (4) For FCFF: subtract net debt to get equity value. (5) Divide by diluted shares. (6) Run sensitivity analysis. (7) Cross-check against multiples and other models.</p>'},
{title:'Describe approaches for calculating the terminal value in a multistage valuation model.',explanation:'<p>Two main approaches: <strong>GGM terminal value:</strong> TV = FCF_{n+1}/(discount rate − g). Requires a sustainable long-run growth rate. <strong>Exit multiple:</strong> TV = FCF_n × appropriate multiple (e.g., EV/EBITDA from comparable firms). Both have drawbacks — GGM is sensitive to g; exit multiples embed current market conditions. Terminal value often represents 60-80% of total value, making these assumptions the most consequential in the entire valuation.</p>'},
{title:'Evaluate whether a stock is overvalued, fairly valued, or undervalued based on a free cash flow valuation model.',explanation:'<p>Compare estimated value per share to market price. If estimated > market → undervalued. But always consider: How sensitive is the estimate to key assumptions? How confident are you in the forecasts? Does the market know something you don\'t? A "margin of safety" approach requires the discount to be meaningful (e.g., 20%+) before acting, to account for model uncertainty.</p>'}
]},

'equity|multiples':{
quickReview:['Method of comparables: relative to peers. Method of forecasted fundamentals: derive justified multiple from DCF inputs.','Justified P/E = (1−b)/(r−g). Justified P/B = (ROE−g)/(r−g). Justified P/S = PM₀×(1−b)(1+g)/(r−g).','Normalize EPS: average over a cycle (Molodovsky method), or use historical average ROE × current BVPS.','PEG = (P/E)/g. PEG < 1 → "cheap for the growth." But ignores risk and assumes linear g-to-P/E relationship.','EV/EBITDA preferred for: comparing firms with different leverage, cross-border comparisons, capital-intensive sectors.','Harmonic mean of multiples is preferred for averaging P/Es (reduces upward bias from high outliers).'],
analogy:'Valuation multiples are like <em>price-per-square-meter for apartments</em>. A P/E of 15 means you pay $15 for every $1 of earnings, just like paying $5,000/m² for floor space. But not all square meters are equal — a penthouse with a view (high growth, low risk) justifies a higher price/m² than a basement unit (low growth, high risk). The art is judging whether the premium is warranted.',
los:[
{title:'Contrast the method of comparables and the method based on forecasted fundamentals.',explanation:'<p><strong>Comparables:</strong> compare a stock\'s multiple (P/E, EV/EBITDA) to the average of similar companies. If the stock trades below peer average, it\'s "relatively cheap." Assumption: peers are correctly valued on average.</p><p><strong>Forecasted fundamentals:</strong> derive the justified multiple from a DCF framework. The justified P/E = (1−b)/(r−g). If the actual P/E < justified P/E, the stock is undervalued. No assumption about peer pricing needed.</p><p>Comparables are faster and more market-anchored; fundamentals are more rigorous but require more inputs.</p>'},
{title:'Calculate and interpret a justified price multiple.',explanation:'<div class="formula-box"><span class="label">Justified Multiples from Fundamentals</span>Justified leading P/E = (1−b) / (r−g)\nJustified trailing P/E = (1−b)(1+g) / (r−g)\nJustified P/B = (ROE−g) / (r−g)\nJustified P/S = PM₀ × (1−b)(1+g) / (r−g)\nJustified EV/EBITDA derived from FCFF model</div><p>These show what the multiple <em>should be</em> given the company\'s fundamentals. Compare to actual multiples to assess over/undervaluation.</p>'},
{title:'Describe rationales for and possible drawbacks to using alternative price multiples and dividend yield.',explanation:'<p><strong>P/E:</strong> most widely used, intuitive, but earnings can be manipulated, distorted by non-recurring items, or negative. <strong>P/B:</strong> useful for asset-heavy firms (banks, REITs), less meaningful for asset-light/tech firms. <strong>P/S:</strong> useful when earnings are negative or volatile; revenue is harder to manipulate. <strong>P/CF:</strong> less susceptible to accounting manipulation than P/E. <strong>Dividend yield:</strong> relevant for income investors but meaningless for non-payers.</p>'},
{title:'Calculate and interpret alternative price multiples and dividend yield.',explanation:'<p>Calculation is straightforward: Price / relevant per-share metric. Trailing uses last 12 months; leading uses next 12 months forecast. Dividend yield = D₁/P₀ (forward) or D₀/P₀ (trailing). Higher multiples imply higher expected growth and/or lower risk. Compare to sector median, historical range, and fundamental justification.</p>'},
{title:'Calculate and interpret underlying earnings, explain methods of normalizing EPS, and calculate normalized EPS.',explanation:'<div class="formula-box"><span class="label">Earnings Normalization</span>Underlying earnings = reported earnings − non-recurring items\n  (restructuring charges, asset sales, litigation, tax windfalls)\n\nNormalization methods:\n  1. Historical average EPS (Molodovsky): average EPS over a full cycle\n  2. Average ROE method: avg ROE × current BVPS\n\nExample: avg ROE over cycle = 12%, current BVPS = $25\n  Normalized EPS = 0.12 × $25 = $3.00</div>'},
{title:'Explain and justify the use of earnings yield (E/P).',explanation:'<p>Earnings yield = E/P = inverse of P/E. Advantages: can be computed even when earnings are negative (P/E can\'t). Allows ranking stocks directly (higher E/P = "cheaper"). Can be compared to bond yields for equity risk premium estimation. Especially useful when P/E is extremely high (easier to interpret 2% E/P than 50x P/E).</p>'},
{title:'Describe fundamental factors that influence alternative price multiples and dividend yield.',explanation:'<p>All justified multiples are driven by the same fundamentals through different lenses: <strong>higher growth</strong> → higher P/E, P/B, P/S (more future value). <strong>Lower risk (lower r)</strong> → higher multiples. <strong>Higher ROE</strong> → higher P/B (value creation above cost of equity). <strong>Higher margins</strong> → higher P/S. <strong>Higher payout</strong> → higher dividend yield but not necessarily higher P/E (depends on ROE vs. r).</p>'},
{title:'Calculate and interpret a predicted P/E from a cross-sectional regression on fundamentals.',explanation:'<p>Regress P/E across a large sample of stocks on fundamental variables (beta, growth, payout, size). The regression equation predicts what P/E "should be" given a company\'s fundamentals. If actual P/E < predicted → potentially undervalued. <strong>Limitations:</strong> coefficients change over time, multicollinearity among fundamentals, assumes linear relationships, sample selection bias.</p>'},
{title:'Calculate and interpret the justified P/E, P/B, and P/S for a stock based on forecasted fundamentals.',explanation:'<p>Apply the justified formulas using company-specific inputs. Example: r=11%, g=5%, b=40%, ROE=14%, profit margin=8%.</p><div class="formula-box"><span class="label">Example</span>Justified P/E = (1−0.40)/(0.11−0.05) = 0.60/0.06 = 10.0×\nJustified P/B = (0.14−0.05)/(0.11−0.05) = 0.09/0.06 = 1.5×\nJustified P/S = 0.08×(0.60)(1.05)/(0.11−0.05) = 0.0504/0.06 = 0.84×</div>'},
{title:'Calculate and interpret the PEG ratio and explain its use in relative valuation.',explanation:'<div class="formula-box"><span class="label">PEG Ratio</span>PEG = (P/E) / (g × 100)\n\nExample: P/E = 20, g = 15% → PEG = 20/15 = 1.33\n\nPEG < 1 → "cheap relative to growth"\nPEG > 1 → "expensive relative to growth"</div><p><strong>Limitations:</strong> assumes linear P/E-to-growth relationship (it\'s actually non-linear), ignores risk, ignores duration of growth, doesn\'t work when g is very low or negative.</p>'},
{title:'Calculate and explain the use of price multiples in determining terminal value in a multistage DCF model.',explanation:'<p>Instead of GGM for terminal value, apply an exit multiple: TV = E_n × justified P/E, or TV = EBITDA_n × peer EV/EBITDA. Advantages: directly market-anchored, avoids perpetual growth rate assumption. Disadvantage: embeds current market pricing (which may itself be over/undervalued). Best practice: use both GGM and exit multiple terminal values and compare.</p>'},
{title:'Evaluate whether a stock is overvalued, fairly valued, or undervalued based on comparisons of multiples.',explanation:'<p>Compare the stock\'s multiple to: (1) peer median, (2) its own historical average, (3) justified multiple from fundamentals. If below on all three → strong undervaluation signal. But always ask WHY — a low P/E might reflect justified risk (value trap). Fundamental analysis must support the quantitative signal.</p>'},
{title:'Evaluate a stock by the method of comparables and explain the importance of fundamentals.',explanation:'<p>Steps: select comparable companies (same industry, similar size, risk, growth), calculate the multiple for each, compute the median, apply to target. <strong>Critical:</strong> if the target has higher growth or lower risk than the median peer, it deserves a premium to the peer multiple — blindly using the median ignores fundamental differences. Comparables provide a starting point; fundamental adjustment is required.</p>'},
{title:'Explain alternative definitions of cash flow used in price and EV multiples and describe limitations.',explanation:'<p>Cash flow definitions used in multiples: <strong>CFO</strong> (from cash flow statement), <strong>FCFE</strong> (CFO − capex + net borrowing), <strong>EBITDA</strong> (proxy, not true cash flow). CFO includes working capital changes (volatile). FCFE deducts capex (better measure of distributable cash). EBITDA ignores capex and taxes. All have limitations — the key is consistency across the comparison set.</p>'},
{title:'Calculate and interpret EV multiples and evaluate the use of EV/EBITDA.',explanation:'<div class="formula-box"><span class="label">Enterprise Value Multiples</span>EV = Market cap + Debt − Cash (+ preferred + minority interest)\n\nEV/EBITDA: most popular EV multiple\n  Advantages: capital-structure neutral, comparable across\n    firms with different leverage, less affected by depreciation\n    policy differences, rarely negative\n  Limitations: ignores capex needs, ignores tax rate differences,\n    EBITDA overstates cash flow for capital-intensive firms</div>'},
{title:'Explain sources of differences in cross-border valuation comparisons.',explanation:'<p>Cross-border multiples differ due to: different accounting standards (IFRS vs. GAAP → different earnings), different tax rates, different growth prospects, different risk premiums (country risk), different inflation rates, different industry composition within sectors, and different corporate governance environments. Adjustments for these differences are necessary before concluding one market is "cheaper" than another.</p>'},
{title:'Describe momentum indicators and their use in valuation.',explanation:'<p><strong>Momentum indicators</strong> identify trends in price or fundamentals: earnings surprise (actual vs. consensus), estimate revisions (direction and magnitude), relative strength (price performance vs. market/sector). Not strictly "valuation" tools — they help with timing. A stock may be undervalued on fundamentals but still falling (negative momentum). Many quantitative strategies combine value (low multiple) with momentum (improving trend) for better results.</p>'},
{title:'Explain the use of arithmetic mean, harmonic mean, weighted harmonic mean, and median to describe central tendency of multiples.',explanation:'<div class="formula-box"><span class="label">Averaging Multiples</span>Arithmetic mean: simple average — upward biased by outliers\nMedian: middle value — robust to outliers\nHarmonic mean: n / Σ(1/Xᵢ) — weights lower multiples more\n  → PREFERRED for averaging P/Es (reduces outlier bias)\nWeighted harmonic mean: weights by market cap or fundamentals\n  → avoids equal-weighting tiny firms with extreme multiples</div><p>For portfolio-level multiples, the harmonic mean is most appropriate because it gives the correct portfolio-weighted P/E.</p>'}
]},

'equity|residual':{
quickReview:['RI = Net Income − Equity Charge = NI − (r × B_{t-1}). Positive RI = firm earns more than cost of equity.','EVA = NOPAT − (WACC × Invested Capital). MVA = Market Value − Invested Capital.','RI model: V₀ = B₀ + Σ[RIₜ/(1+r)ᵗ]. Value = book value + PV of future excess returns.','Single-stage RI: V₀ = B₀ + RI₁/(r−g). Justified P/B = 1 + (ROE−r)/(r−g). If ROE=r → P/B=1.','Continuing RI at horizon: may persist (moat), decay to zero (competition), or be zero immediately.','Strengths: works with negative FCF, anchored in accounting data, less terminal value sensitivity. Weaknesses: accounting distortions, requires clean surplus.'],
analogy:'Residual income is like a <em>student loan analogy</em>. Your book value is the education investment (cost of your degree). Your salary is earnings (NI). The equity charge is like the minimum you need to earn to justify the investment (opportunity cost). Residual income is the salary ABOVE that minimum — it\'s the excess value your degree creates. If RI > 0, your education was a good investment. A company with persistently positive RI is creating wealth above its cost of capital.',
los:[
{title:'Calculate and interpret residual income, economic value added, and market value added.',explanation:'<div class="formula-box"><span class="label">RI, EVA, MVA</span>Residual Income (equity perspective):\n  RI = NI − (r × B_{t-1})\n  = (ROE − r) × B_{t-1}\n\nEVA (firm perspective):\n  EVA = NOPAT − (WACC × Invested Capital)\n  = (ROIC − WACC) × Invested Capital\n\nMVA = Market Value of Firm − Total Invested Capital\n  = PV of all future EVAs</div><p>Positive RI/EVA → value creation. Negative → value destruction.</p>'},
{title:'Describe the uses of residual income models.',explanation:'<p>RI models are used for: valuing companies with negative or volatile FCF (early-stage, financial institutions), performance measurement (EVA-based compensation), identifying value creators vs. destroyers, and as a complement/check on DCF and DDM. Particularly strong for banks and insurers where "invested capital" and "book value" have clear economic meaning.</p>'},
{title:'Calculate intrinsic value using the RI model and compare value recognition in RI and other present value models.',explanation:'<div class="formula-box"><span class="label">Residual Income Model</span>V₀ = B₀ + Σ[RIₜ / (1+r)ᵗ]  for t=1 to ∞\n   = B₀ + Σ[(ROE−r)×B_{t-1} / (1+r)ᵗ]\n\nValue = Book Value + PV of Future Excess Earnings</div><p><strong>Value recognition comparison:</strong> DDM and FCF models recognize value only when cash is distributed or generated. RI recognizes value earlier — when book value is recorded and excess returns are earned. This means less of total value sits in the terminal value component (more in near-term), making RI models potentially less sensitive to terminal assumptions.</p>'},
{title:'Explain fundamental determinants of residual income.',explanation:'<p>RI depends on: <strong>ROE vs. r</strong> — the wider the spread, the larger RI. <strong>Book value</strong> — larger equity base amplifies RI (for a given ROE-r spread). <strong>Growth in book value</strong> — if the company reinvests at ROE > r, growing book value creates more RI. The key driver is the <strong>persistence of excess returns</strong> — can the company maintain ROE > r, or will competition erode the advantage?</p>'},
{title:'Explain the relation between RI valuation and the justified price-to-book ratio.',explanation:'<div class="formula-box"><span class="label">Justified P/B from RI Model</span>Justified P/B = 1 + (ROE − r) / (r − g)\n\nIf ROE > r → P/B > 1 (market pays premium to book)\nIf ROE = r → P/B = 1 (no excess returns)\nIf ROE < r → P/B < 1 (value destruction)\n\nExample: ROE=15%, r=10%, g=4%\n  P/B = 1 + (0.15−0.10)/(0.10−0.04) = 1 + 0.83 = 1.83×</div>'},
{title:'Calculate intrinsic value using single-stage and multistage residual income models.',explanation:'<div class="formula-box"><span class="label">Single-Stage (Constant Growth) RI</span>V₀ = B₀ + RI₁/(r − g) = B₀ + [(ROE−r)×B₀]/(r−g)</div><p>For multistage: forecast RI explicitly for the high-growth period, then apply a terminal value for continuing RI. The terminal value of RI can be: (a) RI continues at current level forever, (b) RI decays linearly to zero over a fade period, (c) RI drops to zero immediately (competition eliminates excess returns), or (d) RI persists at a reduced level (partial moat).</p>'},
{title:'Calculate the implied growth rate in residual income given the market P/B and estimated required return.',explanation:'<div class="formula-box"><span class="label">Implied Growth Rate</span>From P/B = 1 + (ROE−r)/(r−g), solve for g:\n\ng = r − (ROE−r)/(P/B − 1)\n\nExample: P/B=2.0, ROE=14%, r=10%\n  g = 0.10 − (0.14−0.10)/(2.0−1.0) = 0.10 − 0.04 = 6%</div><p>This tells you what growth the market is pricing in — compare to your estimate of sustainable growth.</p>'},
{title:'Explain continuing residual income and justify an estimate at the forecast horizon.',explanation:'<p><span class="key-term">Continuing RI</span> = residual income beyond the explicit forecast period. The assumption about continuing RI reflects your view on competitive advantage durability:</p><p><strong>RI persists forever:</strong> company has a durable moat (brand, patents, network effects). Use perpetuity or growing perpetuity.</p><p><strong>RI decays to zero:</strong> competition gradually erodes excess returns. Use a fade factor.</p><p><strong>RI = 0 immediately:</strong> no competitive advantage remains. Terminal value = B_n (book value only).</p><p>The choice has a large impact on valuation — be explicit about the economic reasoning.</p>'},
{title:'Compare residual income models to dividend discount and free cash flow models.',explanation:'<p>All three are theoretically equivalent under clean surplus accounting. Practical differences: <strong>RI</strong> puts more value in near-term (book value + near-term RI) → less terminal value dependence. <strong>DDM/FCF</strong> concentrate more value in the terminal. RI works better when FCF is negative or unpredictable. DDM/FCF work better when cash flows are the economic reality (cash-generative businesses). RI is accounting-dependent (requires reliable book values).</p>'},
{title:'Explain strengths and weaknesses of RI models and justify selection.',explanation:'<p><strong>Strengths:</strong> works with negative FCF, less terminal value sensitivity, uses readily available accounting data, focuses on economic profitability (ROE vs. r), useful for financial institutions.</p><p><strong>Weaknesses:</strong> requires clean surplus relation (comprehensive income flows through book value), sensitive to accounting quality and choices (aggressive capitalization inflates book value and ROE), off-BS items distort book value, may not work well for firms with primarily intangible assets (book value understates true invested capital).</p>'},
{title:'Describe accounting issues in applying residual income models.',explanation:'<p>Key accounting issues: <strong>Clean surplus violations</strong> — items bypassing the income statement (OCI items like foreign currency translation, pension remeasurements) break the clean surplus relation. <strong>Intangible assets</strong> — internally generated intangibles (R&D, brands) not on the BS → book value understated, ROE overstated. <strong>Fair value accounting</strong> — unrealized gains/losses in book value can add volatility. <strong>Aggressive/conservative accounting</strong> — affects both book value and earnings, distorting RI calculations. Analyst adjustments to book value and earnings are often necessary.</p>'}
]},

'equity|private':{
quickReview:['Private vs. public: less liquidity, less information, concentrated ownership, potentially different risk profile.','Normalized earnings: adjust for owner compensation, related-party transactions, non-recurring items, non-operating assets.','Discount rate: CAPM + size premium + specific risk premium + illiquidity premium. Build-up approach common.','Control premium: additional value for controlling interest. Discount for lack of control (DLOC) for minority stakes.','Discount for lack of marketability (DLOM): 15-35% typical for private companies vs. public equivalents.','Three approaches: income (DCF, capitalized CF), market (guideline public companies, guideline transactions), asset-based (adjusted net assets).'],
analogy:'Valuing a private company is like <em>appraising a custom-built house in a neighborhood with no recent sales</em>. There\'s no ticker price (market value), so you must estimate from fundamentals (income approach = rental yield analysis), comparables (market approach = sales of similar houses in nearby neighborhoods, adjusted for differences), or replacement cost (asset approach = cost to rebuild from scratch). You also apply a "liquidity discount" — this house can\'t be sold in a day like a condo in Manhattan.',
los:[
{title:'Contrast important public and private company features for valuation purposes.',explanation:'<p>Key differences: <strong>Liquidity:</strong> private shares can\'t be easily sold → requires DLOM. <strong>Information:</strong> no SEC filings, limited audited data, less analyst coverage → higher uncertainty. <strong>Ownership:</strong> often concentrated (founder, family) → control premiums/discounts relevant. <strong>Capital access:</strong> limited → potentially suboptimal capital structure. <strong>Management:</strong> key-person risk is higher; compensation may not be market-rate. <strong>Tax reporting:</strong> private firms may manage earnings for tax minimization rather than shareholder value maximization.</p>'},
{title:'Describe uses of private business valuation and explain key areas of focus for financial analysts.',explanation:'<p>Uses: M&A transactions, estate/gift tax compliance, divorce proceedings, partner buyouts, IPO pricing, litigation (shareholder disputes, damages), strategic planning, ESOP valuations, financing negotiations.</p><p>Analyst focus areas: normalized earnings (strip out owner quirks), appropriate discount rate (higher than public comps), applicable premiums/discounts (control, marketability), selection of the right valuation approach given data availability, and clear documentation of assumptions (private valuations are frequently challenged in disputes).</p>'},
{title:'Explain cash flow estimation issues related to private companies and adjustments required to estimate normalized earnings.',explanation:'<div class="formula-box"><span class="label">Common Normalization Adjustments</span>Owner compensation: replace above/below-market salary with market rate\nRelated-party transactions: adjust to arm\'s-length pricing\nNon-recurring items: strip out one-time gains/losses\nNon-operating assets: separate (real estate, excess cash, art collections)\nRent: if owner owns the building, impute market rent\nPersonal expenses run through the business: remove\nDeferred maintenance: add back if reducing reported expenses\nInventory methods: standardize to match comparables</div><p>These adjustments reveal the true <em>economic earning power</em> of the business, independent of the current owner\'s choices.</p>'},
{title:'Explain factors that require adjustment when estimating the discount rate for private companies.',explanation:'<p>Private company discount rates must be higher than comparable public companies due to:</p><p><strong>Size premium:</strong> private companies are typically smaller → empirically higher returns required (Ibbotson data).</p><p><strong>Specific-company risk premium:</strong> key-person dependence, customer concentration, geographic concentration, product-line concentration — risks that can\'t be diversified away.</p><p><strong>Illiquidity premium:</strong> investors can\'t sell quickly → demand compensation. Estimated at 2-4% or embedded in DLOM.</p><p>Total required return for private equity is typically 15-25% vs. 8-12% for comparable public companies.</p>'},
{title:'Compare models used to estimate the required rate of return to private company equity.',explanation:'<div class="formula-box"><span class="label">Private Company Cost of Equity Models</span>Expanded CAPM:\n  r = r_f + β×ERP + SP + SCRP + ILP\n  SP = size premium, SCRP = specific company risk premium\n  ILP = illiquidity premium\n\nBuild-Up Method (no beta):\n  r = r_f + ERP + SP + SCRP + ILP + industry premium\n  Used when no reliable beta estimate available\n\nBoth methods layer premiums onto the public-market base rate\nJudgment required for SP, SCRP, and ILP magnitudes</div>'},
{title:'Explain and evaluate the effects on private company valuations of discounts and premiums based on control and marketability.',explanation:'<div class="formula-box"><span class="label">Premiums & Discounts</span>Control Premium:\n  Value of control = ability to set strategy, dividends, compensation\n  Typical: 20-40% over minority interest value\n  DLOC = 1 − [1/(1+control premium)]\n\nDiscount for Lack of Marketability (DLOM):\n  Private shares can\'t be sold on an exchange\n  Typical: 15-35% (estimated from restricted stock studies,\n    IPO studies, or put option models)\n\nApplication depends on perspective:\n  Controlling, marketable: base (public comparable)\n  Controlling, non-marketable: − DLOM\n  Minority, marketable: − DLOC\n  Minority, non-marketable: − DLOC − DLOM</div>'},
{title:'Explain the income, market, and asset-based approaches to private company valuation and factors relevant to selection.',explanation:'<p><strong>Income approach:</strong> DCF or capitalized cash flow. Best when: reliable cash flow projections available, business has operating history. Most theoretically sound.</p><p><strong>Market approach:</strong> guideline public company method (comparable multiples adjusted for private discounts) or guideline transaction method (M&A comps). Best when: good comparables exist, market is active.</p><p><strong>Asset-based approach:</strong> adjusted net asset value (revalue assets and liabilities to fair value). Best when: company is asset-intensive, holding company, liquidation scenario, or when earnings-based approaches produce unreliable results (start-ups, money-losing firms).</p><p>In practice, use multiple approaches and reconcile — weight based on reliability and relevance.</p>'},
{title:'Calculate the value of a private company using income-based methods.',explanation:'<div class="formula-box"><span class="label">Income-Based Methods</span>Free Cash Flow (DCF):\n  V = Σ[FCFₜ/(1+r)ᵗ] + TV/(1+r)ⁿ\n  Same as public DCF but with adjusted discount rate\n\nCapitalized Cash Flow (single-stage):\n  V = NCF₁ / (r − g)\n  NCF = normalized cash flow; r = expanded CAPM or build-up\n  Quick method for stable, mature private businesses\n\nExcess Earnings (hybrid):\n  Value tangible assets at FV\n  Remaining earnings = return on intangible assets\n  Intangible value = excess earnings / capitalization rate\n  Total = tangible asset value + intangible value</div>'},
{title:'Calculate the value of a private company using market-based methods and describe advantages and disadvantages.',explanation:'<div class="formula-box"><span class="label">Market-Based Methods</span>Guideline Public Company:\n  1. Identify comparable public companies\n  2. Calculate multiples (P/E, EV/EBITDA, P/Revenue)\n  3. Apply median multiple to subject company\'s metric\n  4. Adjust for DLOM (and DLOC if minority valuation)\n  Advantage: market-based, objective\n  Disadvantage: truly comparable firms may not exist\n\nGuideline Transaction:\n  1. Find recent M&A deals for similar private companies\n  2. Calculate implied multiples\n  3. Apply to subject company\n  Advantage: reflects actual prices paid (includes control premium)\n  Disadvantage: transactions may be dated, deal-specific factors</div>'}
]},
