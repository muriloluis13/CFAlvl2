    if (fcQueueIdx >= fcQueue.length) {
      body.className = 'fc-study';
      body.innerHTML = `<div class="fc-empty"><div class="fc-empty-icon">🎉</div><div class="fc-empty-title">Session Complete!</div><p style="color:var(--text-muted);font-size:13px;margin-top:8px">Reviewed ${fcSessionStats.total} card${fcSessionStats.total!==1?'s':''} · ${fcSessionStats.correct} correct (${fcSessionStats.total>0?Math.round(fcSessionStats.correct/fcSessionStats.total*100):0}%)</p><button class="fc-done-btn" onclick="${doneFn}">Done</button></div>`;
      return;
    }

    const ci = fcQueue[fcQueueIdx];
    const card = cards[ci];
    const statePrefix = fcConceptMode ? 'c:'+fcCurrentTopic+'|'+fcConceptLabel : fcCurrentTopic;
    const s = fcGetState(statePrefix, ci);
    const pct = Math.round((fcQueueIdx / fcQueue.length) * 100);

    body.className = 'fc-study';
    body.innerHTML = `
      <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${pct}%;background:${t.color}"></div></div>
      <div class="fc-card-wrapper" onclick="fcFlipCard()">
        <div class="fc-card ${fcFlipped ? 'flipped' : ''}" id="fcCard">
          <div class="fc-card-face fc-card-front">
            <div class="fc-card-label" style="color:${t.color}">${fcConceptMode?'Concept':'Question'} · Card ${fcQueueIdx+1}/${fcQueue.length}</div>
            <div class="fc-card-body">${card.q}</div>
            <div class="fc-card-hint">Tap to reveal answer</div>
          </div>
          <div class="fc-card-face fc-card-back">
            <div class="fc-card-label" style="color:${t.color}">Answer</div>
            <div class="fc-card-body">${card.a}</div>
          </div>
        </div>
      </div>
      <div class="fc-rating ${fcFlipped ? '' : 'hidden'}" id="fcRating">
        <button class="fc-rating-btn again" onclick="fcRate(0)"><span class="label" style="color:#EF4444">Again</span><span class="sub">&lt;1 min</span></button>
        <button class="fc-rating-btn hard" onclick="fcRate(1)"><span class="label" style="color:#F59E0B">Hard</span><span class="sub">${formatInterval(Math.max(1,Math.round(s.interval*1.2)))}</span></button>
        <button class="fc-rating-btn good" onclick="fcRate(2)"><span class="label" style="color:#10B981">Good</span><span class="sub">${formatInterval(Math.max(1,Math.round(s.interval*s.ef)))}</span></button>
        <button class="fc-rating-btn easy" onclick="fcRate(3)"><span class="label" style="color:#3B82F6">Easy</span><span class="sub">${formatInterval(Math.max(1,Math.round(s.interval*s.ef*1.3)))}</span></button>
      </div>`;
  }
}

function fcFlipCard() {
  fcFlipped = !fcFlipped;
  const card = document.getElementById('fcCard');
  if (card) card.classList.toggle('flipped', fcFlipped);
  const rating = document.getElementById('fcRating');
  if (rating) rating.classList.toggle('hidden', !fcFlipped);
}

function fcRate(quality) {
  const ci = fcQueue[fcQueueIdx];
  const statePrefix = fcConceptMode ? 'c:'+fcCurrentTopic+'|'+fcConceptLabel : fcCurrentTopic;
  fcReview(statePrefix, ci, quality);
  fcSessionStats.total++;
  if (quality >= 2) fcSessionStats.correct++;
  if (quality === 0) fcQueue.push(ci);
  fcQueueIdx++;
  fcFlipped = false;
  renderFC();
}

function fcBackToDecks() {
  fcMode = 'decks';
  renderFC();
}

// ═══ CONCEPT FLASHCARD STUDY (per-section) ═══
let fcConceptMode = false;
let fcConceptCards = [];
let fcConceptLabel = '';

function startConceptStudy(topicId, subId) {
  const key = topicId + '|' + subId;
  const stats = SECTION_STATS[key];
  if (!stats || !stats.conceptList || stats.conceptList.length === 0) return;
  const t = TOPICS.find(x => x.id === topicId);
  const st = t ? t.subtopics.find(x => x.id === subId) : null;
  
  fcConceptMode = true;
  fcConceptCards = stats.conceptList;
  fcConceptLabel = st ? st.name : key;
  fcCurrentTopic = topicId;
  fcQueue = fcConceptCards.map((_, i) => i);
  fcQueueIdx = 0;
  fcFlipped = false;
  fcSessionStats = { correct: 0, total: 0 };
  fcMode = 'study';
  
  document.getElementById('fcOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderFC();
}

// Override card access in study mode when in concept mode
function fcGetCurrentCard() {
  if (fcConceptMode && fcConceptCards.length > 0) {
    return fcConceptCards[fcQueue[fcQueueIdx]];
  }
  const cards = FLASHCARDS[fcCurrentTopic];
  return cards ? cards[fcQueue[fcQueueIdx]] : null;
}

function fcGetCurrentState() {
  const prefix = fcConceptMode ? 'c:' + fcCurrentTopic : fcCurrentTopic;
  const ci = fcQueue[fcQueueIdx];
  return fcGetState(prefix, ci);
}

function fcReviewCurrent(quality) {
  const prefix = fcConceptMode ? 'c:' + fcCurrentTopic : fcCurrentTopic;
  const ci = fcQueue[fcQueueIdx];
  fcReview(prefix, ci, quality);
}

function formatInterval(days) {
  if (days < 1) return '<1d';
  if (days === 1) return '1d';
  if (days < 30) return days + 'd';
  if (days < 365) return Math.round(days / 30) + 'mo';
  return Math.round(days / 365 * 10) / 10 + 'yr';
}

{q:'What does "independence of errors" mean in regression?',a:'Errors (residuals) must be uncorrelated with each other. Violation (serial correlation) means one error predicts the next, biasing standard errors downward and inflating t-statistics.'},
{q:'What is the independence of independent variables assumption?',a:'No independent variable should be a perfect linear combination of others (no perfect multicollinearity). Violation inflates standard errors, making individual coefficients unreliable even if the overall model fits well.'},
{q:'What does the linearity assumption require in multiple regression?',a:'The relationship between Y and the X variables must be linear in the parameters (bᵢ). Non-linear true relationships produce biased coefficient estimates and show as curved patterns in residual plots.'},
{q:'How does logistic regression differ from linear regression?',a:'Logistic regression models binary outcomes (0/1) using the log-odds: ln(p/(1−p)) = b₀ + b₁X₁ + … The output is a probability (0 to 1). Coefficients are interpreted as odds ratios: e^(bᵢ) = multiplicative effect on odds per unit change in Xᵢ.'},
{q:'What defines a multiple linear regression model?',a:'Y = b₀ + b₁X₁ + b₂X₂ + … + bₖXₖ + ε. Each bᵢ measures the partial effect of Xᵢ on Y, holding all other X\'s constant. It extends simple regression to multiple explanatory variables.'},
{q:'What is homoskedasticity and why does it matter?',a:'Constant variance of residuals across all levels of X. Violation (heteroskedasticity) makes standard errors unreliable → t-tests and confidence intervals become invalid. Detected by Breusch-Pagan or White test; fixed with robust standard errors.'},
{q:'What does a normal Q-Q plot of residuals show?',a:'Plots residual quantiles against theoretical normal quantiles. Points falling on a straight diagonal line → residuals are normally distributed (assumption met). Deviations (S-curves, fat tails) indicate non-normality, which affects hypothesis test validity in small samples.'}
]},
'quant|model-fit': {formulas:4,concepts:6,formulaList:['R² = SSR / SST','Adjusted R² = 1 − [(1−R²)(n−1)/(n−k−1)]','F = MSR / MSE','Partial F = [(SSEᵣ − SSEᵤ)/q] / [SSEᵤ/(n−k−1)]'],conceptList:[
{q:'What does R² measure in regression?',a:'The proportion of total variance in Y explained by the model: R² = SSR/SST. Ranges from 0 to 1. Always increases when adding variables — even useless ones — which is why adjusted R² is preferred for model comparison.'},
{q:'How does Adjusted R² improve on R²?',a:'Adjusted R² = 1 − [(1−R²)(n−1)/(n−k−1)]. It penalizes for adding variables that don\'t improve fit — it can decrease if a variable is useless. The only goodness-of-fit metric that accounts for model complexity.'},
{q:'What does the F-statistic test in regression?',a:'Tests whether the model as a whole is significant: H₀: b₁ = b₂ = … = bₖ = 0. F = MSR/MSE. A significant F (low p-value) means at least one independent variable has genuine explanatory power.'},
{q:'What is a joint (partial) F-test?',a:'Tests whether a SUBSET of coefficients are simultaneously zero. Compares restricted vs. unrestricted model: F = [(SSE_r − SSE_u)/q] / [SSE_u/(n−k−1)]. Needed because individual t-tests miss correlations between estimators.'},
{q:'What is the Bayesian Information Criterion (BIC)?',a:'Model selection criterion: BIC = n·ln(SSE/n) + k·ln(n). Lower = better. Penalizes complexity more heavily than AIC, especially for large samples. Useful for comparing non-nested models. Tends to select simpler models than AIC.'},
{q:'What is the Akaike Information Criterion (AIC)?',a:'Model selection criterion: AIC = n·ln(SSE/n) + 2k. Lower = better. Less severe complexity penalty than BIC. Balances goodness of fit against parsimony. Two models with ΔAIC < 2 are considered equally supported by the data.'}
]},
'quant|misspec': {formulas:3,concepts:6,formulaList:['BP χ² = n × R² (from auxiliary regression)','DW ≈ 2(1 − r̂)','VIF = 1 / (1 − R²ⱼ)'],conceptList:[
{q:'What is the Breusch-Pagan (BP) test?',a:'Tests for heteroskedasticity by regressing squared residuals on the independent variables. BP statistic = n × R² from that auxiliary regression, distributed as χ² with k degrees of freedom. Significant → reject homoskedasticity → use robust standard errors.'},
{q:'What is heteroskedasticity and why does it matter?',a:'Error variance is not constant across observations. OLS coefficients remain unbiased but standard errors are WRONG → t-tests, F-tests, and confidence intervals become unreliable. Conditional heteroskedasticity (variance related to X) is the problematic form.'},
{q:'What is serial correlation and how does it affect inference?',a:'Residuals are correlated across observations (common in time-series). Positive serial correlation → standard errors are understated → t-statistics inflated → too many false positives. Detected by Durbin-Watson test (DW ≈ 0 → positive). Fix: Newey-West standard errors.'},
{q:'How do invalid coefficient estimates arise from misspecification?',a:'Omitted variable bias: leaving out a relevant variable correlated with an included one → the included variable\'s coefficient absorbs the omitted effect, becoming biased. Wrong functional form produces biased estimates of the marginal effects.'},
{q:'What happens to standard errors when regression assumptions are violated?',a:'Heteroskedasticity: SE can be deflated OR inflated depending on the pattern. Serial correlation (positive): SE are typically deflated → inflated t-stats. Multicollinearity: SE are inflated → deflated t-stats. The direction of bias depends on the specific violation.'},

function renderSectionStats(topicId, subId, color) {

  const cCount = stats.conceptList ? stats.conceptList.length : stats.concepts;

DIAGRAMS['pm|market-risk|0'] = function(){
  const w=440,h=170;

  let curve='M30,150';
  for(let x=30;x<=410;x+=2){

    curve+=` L${x},${y.toFixed(1)}`;

  let s=`<path d="${curve}" fill="none" stroke="var(--text-secondary)" stroke-width="2"/>`;
  // VaR shading (left tail)

// Tab switching for tabbed diagrams
function switchDiagramTab(id, idx) {
  const tabs = document.querySelectorAll('#'+id+'_tabs .lo-diagram-tab');
  const views = document.querySelectorAll('[id^="'+id+'_"]');
  tabs.forEach((t,i) => t.classList.toggle('active', i===idx));
  views.forEach(v => {
    if(v.id === id+'_tabs') return;
    v.classList.toggle('active', v.id === id+'_'+idx);
  });
}

// Inject diagrams after peek or content render
function injectDiagrams(containerEl) {
  if(!containerEl) return;
  // Check current context
  const key = peekTopicId && peekSubId !== null ? `${peekTopicId}|${peekSubId}|${peekLoIdx}` : null;
  if(key && DIAGRAMS[key]) {
    const expEl = containerEl.querySelector('.peek-explanation') || containerEl.querySelector('.lo-explanation');
    if(expEl) {
      const div = document.createElement('div');
      div.innerHTML = DIAGRAMS[key]();
      expEl.appendChild(div);
    }
  }
}
