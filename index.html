<script>
const TOPICS=[{id:'quant',num:'01',name:'Quantitative Methods',color:'#3B82F6',dim:'#3B82F620',subtopics:[{id:'multi-reg',name:'Multiple Regression Basics',los:3},{id:'model-fit',name:'Evaluating Model Fit',los:3},{id:'misspec',name:'Model Misspecification',los:4},{id:'extensions',name:'Regression Extensions',los:3},{id:'timeseries',name:'Time-Series Analysis',los:14},{id:'ml',name:'Machine Learning',los:4},{id:'bigdata',name:'Big Data Projects',los:7}]},{id:'econ',num:'02',name:'Economics',color:'#10B981',dim:'#10B98120',subtopics:[{id:'fx',name:'Currency Exchange Rates',los:12},{id:'growth',name:'Economic Growth',los:12}]},{id:'fsa',num:'03',name:'Financial Statement Analysis',color:'#F59E0B',dim:'#F59E0B20',subtopics:[{id:'intercorp',name:'Intercorporate Investments',los:3},{id:'employee-comp',name:'Employee Compensation',los:5},{id:'multinational',name:'Multinational Operations',los:10},{id:'fin-inst',name:'Financial Institutions',los:6},{id:'quality',name:'Quality of Financial Reports',los:13},{id:'integration',name:'Integration of FSA Techniques',los:5}]},{id:'corp',num:'04',name:'Corporate Issuers',color:'#A855F7',dim:'#A855F720',subtopics:[{id:'dividends',name:'Dividends & Share Repurchases',los:14},{id:'esg',name:'ESG Considerations',los:4},{id:'cost-cap',name:'Cost of Capital: Advanced',los:6},{id:'restruct',name:'Corporate Restructurings',los:7}]},{id:'equity',num:'05',name:'Equity Valuation',color:'#EF4444',dim:'#EF444420',subtopics:[{id:'eq-process',name:'Applications & Processes',los:8},{id:'ddm',name:'Discounted Dividend Valuation',los:16},{id:'fcf',name:'Free Cash Flow Valuation',los:13},{id:'multiples',name:'Price & EV Multiples',los:18},{id:'residual',name:'Residual Income Valuation',los:11},{id:'private',name:'Private Company Valuation',los:9}]},{id:'fi',num:'06',name:'Fixed Income',color:'#14B8A6',dim:'#14B8A620',subtopics:[{id:'term-struct',name:'Term Structure & Rates',los:11},{id:'arb-free',name:'Arbitrage-Free Framework',los:9},{id:'embedded',name:'Bonds with Embedded Options',los:17},{id:'credit-models',name:'Credit Analysis Models',los:8},{id:'cds',name:'Credit Default Swaps',los:5}]},{id:'deriv',num:'07',name:'Derivatives',color:'#6366F1',dim:'#6366F120',subtopics:[{id:'forwards',name:'Pricing Forward Commitments',los:7},{id:'options',name:'Valuation of Contingent Claims',los:14}]},{id:'alt',num:'08',name:'Alternative Investments',color:'#F97316',dim:'#F9731620',subtopics:[{id:'commodities',name:'Commodities & Derivatives',los:10},{id:'re-overview',name:'Real Estate Overview',los:5},{id:'re-public',name:'Public Real Estate Securities',los:5},{id:'hedge-funds',name:'Hedge Fund Strategies',los:9}]},{id:'pm',num:'09',name:'Portfolio Management',color:'#64748B',dim:'#64748B20',subtopics:[{id:'econ-markets',name:'Economics & Investment Markets',los:11},{id:'active-mgmt',name:'Active Portfolio Management',los:6},{id:'etf',name:'ETF Mechanics & Applications',los:8},{id:'multifactor',name:'Using Multifactor Models',los:7},{id:'market-risk',name:'Measuring & Managing Market Risk',los:12},{id:'backtest',name:'Backtesting & Simulation',los:8}]},{id:'ethics',num:'10',name:'Ethical & Professional Standards',color:'#EAB308',dim:'#EAB30820',subtopics:[{id:'code',name:'Code of Ethics & Standards',los:2},{id:'guidance',name:'Guidance for Standards I–VII',los:2},{id:'application',name:'Application of Code & Standards',los:2}]}];

// ═══ CONTENT: TOPIC 01 — QUANTITATIVE METHODS ═══
const CONTENT={
'quant|multi-reg':{
quickReview:['Multiple regression extends simple regression to 2+ independent variables — same logic, more dimensions.','Y = b₀ + b₁X₁ + b₂X₂ + … + bₖXₖ + ε. Each bᵢ = marginal effect holding others constant.','Key assumptions: linearity, independence of errors, homoskedasticity, normality of residuals, no perfect multicollinearity.','Residual plots are the "health check" — look for patterns (curves, fans, clusters) that signal violations.'],
analogy:'Think of a multiple regression like a <em>recipe</em>. Simple regression says "more sugar → sweeter cake." Multiple regression says "sweetness depends on sugar, butter, AND baking time — each contributing independently." The coefficient on sugar tells you the effect of adding more sugar <em>while keeping butter and time unchanged</em>, just like a chef tweaking one ingredient at a time.',
los:[
{title:'Describe the types of investment problems addressed by multiple linear regression and the regression process.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Cross-Sectional</div><div class="lo-icon-card-desc">Explain stock returns using size, value, momentum at a point in time</div></div><div class="lo-icon-card"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Time-Series</div><div class="lo-icon-card-desc">Model how GDP, rates, inflation drive bond returns over time</div></div><div class="lo-icon-card"><div class="lo-icon-card-emoji">🔮</div><div class="lo-icon-card-title">Forecasting</div><div class="lo-icon-card-desc">Predict next-quarter earnings from financial ratios</div></div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:var(--active-color,#3B82F6)">1</div><div class="lo-step-connector" style="background:var(--active-color,#3B82F6);opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Specify the Model</div><div class="lo-step-desc">Choose Y and X variables grounded in economic theory</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:var(--active-color,#3B82F6)">2</div><div class="lo-step-connector" style="background:var(--active-color,#3B82F6);opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Estimate Coefficients (OLS)</div><div class="lo-step-desc">Minimize sum of squared residuals to find best-fit parameters</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:var(--active-color,#3B82F6)">3</div><div class="lo-step-connector" style="background:var(--active-color,#3B82F6);opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Check Assumptions</div><div class="lo-step-desc">Residual plots, DW test, VIF — diagnose violations</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:var(--active-color,#3B82F6)">4</div><div class="lo-step-connector" style="background:var(--active-color,#3B82F6);opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Evaluate Fit & Significance</div><div class="lo-step-desc">R², adjusted R², F-test, individual t-tests</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:var(--active-color,#3B82F6)">5</div></div><div class="lo-step-body"><div class="lo-step-title">Predict & Infer</div><div class="lo-step-desc">Use the model for forecasting or understanding relationships</div></div></div></div>'},
{title:'Formulate a multiple linear regression model, describe the relation between dependent and independent variables, and interpret estimated regression coefficients.',explanation:'<div class="formula-highlight" style="--active-color:var(--active-color,#3B82F6)"><div class="formula-highlight-title" style="color:var(--active-color,#3B82F6)">📐 Multiple Regression Model</div><div class="formula-highlight-body">$$Y = b_0 + b_1X_1 + b_2X_2 + \\cdots + b_kX_k + \\varepsilon$$</div><div class="formula-highlight-note">Each bᵢ = the change in Y for a 1-unit change in Xᵢ, holding ALL other X\'s constant (partial slope).</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Component</div><div>Meaning</div><div>Example</div></div><div class="lo-compare-row lo-compare-3"><div>b₀ (intercept)</div><div>Predicted Y when all X = 0</div><div>Baseline fund return with zero market exposure</div></div><div class="lo-compare-row lo-compare-3"><div>bᵢ (slope)</div><div>Marginal effect of Xᵢ, ceteris paribus</div><div>Fund return sensitivity to market, controlling for size</div></div><div class="lo-compare-row lo-compare-3"><div>ε (error)</div><div>Unexplained variation</div><div>Idiosyncratic return not captured by any X</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🍰</div><div class="lo-mini-analogy-text">Like a recipe: the coefficient on sugar tells you sweetness per spoonful — <em>holding butter and baking time constant</em>. Each ingredient\'s contribution is isolated.</div></div>'},
{title:'Explain the assumptions underlying a multiple linear regression model and interpret residual plots indicating potential violations.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📏</div><div class="lo-icon-card-title">Linearity</div><div class="lo-icon-card-desc">Y and X\'s are linear in parameters</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">Independence</div><div class="lo-icon-card-desc">Errors are uncorrelated with each other</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Homoskedasticity</div><div class="lo-icon-card-desc">Constant error variance across all X levels</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔔</div><div class="lo-icon-card-title">Normality</div><div class="lo-icon-card-desc">Residuals are normally distributed</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🚫</div><div class="lo-icon-card-title">No Multicollinearity</div><div class="lo-icon-card-desc">No X is a perfect linear combo of others</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Residual Pattern</div><div>Diagnosis</div><div>Action</div></div><div class="lo-compare-row lo-compare-3"><div>✅ Random scatter</div><div>Assumptions met</div><div>Proceed with confidence</div></div><div class="lo-compare-row lo-compare-3"><div>🔻 Funnel shape</div><div>Heteroskedasticity</div><div>Use White robust SE</div></div><div class="lo-compare-row lo-compare-3"><div>〰️ Curved pattern</div><div>Non-linearity</div><div>Add polynomial or transform X</div></div><div class="lo-compare-row lo-compare-3"><div>🌊 Waves/clusters</div><div>Serial correlation</div><div>Use Newey-West SE or add lags</div></div></div>'}
]},

'quant|model-fit':{
quickReview:['R² = proportion of variance in Y explained by the model. Adjusted R² penalizes for extra variables.','F-test checks if the model as a whole is significant (at least one slope ≠ 0).','Joint hypothesis tests (partial F-test) check if a subset of coefficients are simultaneously zero.','Predicted Ŷ = b₀ + b₁X₁ + … + bₖXₖ — plug in assumed values, but beware extrapolation.'],
analogy:'R² is like a <em>grade on how well your map matches the terrain</em>. An R² of 0.80 means your map captures 80% of the landscape — the other 20% is "uncharted territory" (residual variation). Adjusted R² is a harsher grader who penalizes you for adding unnecessary landmarks that clutter the map without improving accuracy.',
los:[
{title:'Evaluate how well a multiple regression model explains the dependent variable by analyzing ANOVA table results and measures of goodness of fit.',explanation:'<div class="formula-highlight" style="--active-color:var(--active-color,#3B82F6)"><div class="formula-highlight-title" style="color:var(--active-color,#3B82F6)">📐 ANOVA Decomposition</div><div class="formula-highlight-body">$$SST = SSR + SSE$$\n(Total)  (Explained)  (Error)</div></div><div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Metric</div><div>Formula</div><div>Meaning</div><div>Key Insight</div></div><div class="lo-compare-row lo-compare-4"><div>R²</div><div>SSR / SST</div><div>% of Y variance explained</div><div>Always ↑ with more variables — even useless ones</div></div><div class="lo-compare-row lo-compare-4"><div>Adjusted R²</div><div>1 − [(1−R²)(n−1)/(n−k−1)]</div><div>R² penalized for complexity</div><div>Can ↓ when useless variable added — use this for model comparison</div></div><div class="lo-compare-row lo-compare-4"><div>F-stat</div><div>MSR / MSE</div><div>Overall model significance</div><div>H₀: all slopes = 0. Large F → reject → model explains something</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Decision rule:</strong> If adjusted R² falls when you add a variable, drop it — it\'s not earning its keep.</div></div>'},
{title:'Formulate hypotheses on the significance of two or more coefficients and interpret joint hypothesis test results.',explanation:'<p>Individual t-tests can\'t test whether <em>multiple</em> coefficients are simultaneously zero — they ignore correlations between estimators.</p><div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 Partial F-test</div><div class="formula-highlight-body">$$F = \\frac{(SSE_R - SSE_U) / q}{SSE_U / (n - k - 1)}$$</div><div class="formula-highlight-note">q = number of restrictions (variables tested) · df₁ = q, df₂ = n−k−1</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Model</div><div>Description</div><div>SSE</div></div><div class="lo-compare-row lo-compare-3"><div>Restricted</div><div>Without the tested variables</div><div>SSEᵣ (higher — less fit)</div></div><div class="lo-compare-row lo-compare-3"><div>Unrestricted</div><div>Full model with all variables</div><div>SSEᵤ (lower — better fit)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">🎯</div><div class="lo-callout-text"><strong>Example:</strong> Testing whether both inflation AND GDP growth are zero in a bond return model. If F > critical value → at least one of these macro variables matters.</div></div>'},
{title:'Calculate and interpret a predicted value for the dependent variable, given estimated model and assumed values for independent variables.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Prediction Formula</div><div class="formula-highlight-body">$$\\hat{Y} = \\hat{b}_0 + \\hat{b}_1X_1 + \\hat{b}_2X_2 + \\cdots + \\hat{b}_kX_k$$</div><div class="formula-highlight-note">Plug in assumed values for each Xᵢ → the result is your point estimate of Y.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Interval Type</div><div>What It Captures</div><div>Width</div></div><div class="lo-compare-row lo-compare-3"><div>Confidence interval</div><div>Uncertainty in the mean of Y at those X values</div><div>Narrower</div></div><div class="lo-compare-row lo-compare-3"><div>Prediction interval</div><div>Uncertainty in an individual Y outcome (includes ε)</div><div>Wider</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Extrapolation danger:</strong> Predictions are only reliable within the range of the original data. Predicting for X values far beyond the sample is like driving off the edge of your map — the relationship may not hold.</div></div>'}
]},

'quant|misspec':{
quickReview:['Misspecification = wrong functional form, omitted variables, or extraneous variables → biased or inefficient estimates.','Heteroskedasticity: error variance isn\'t constant → wrong standard errors → unreliable t-tests. Use White-corrected SE.','Serial correlation: errors correlated across observations → understated SE → inflated t-stats. Use Newey-West SE.','Multicollinearity: X\'s highly correlated → coefficients unreliable, but model can still predict. Check VIF > 5–10.'],
analogy:'Model misspecification is like <em>using the wrong map for your terrain</em>. Omitted variables? You left out a mountain range. Wrong functional form? You drew straight roads where there are curves. Heteroskedasticity is like a map that\'s accurate in the city center but increasingly distorted at the edges — your confidence in directions varies by location.',
los:[
{title:'Describe how model misspecification affects regression results and how to avoid common forms.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Misspecification</div><div>What Happens</div><div>Effect on Coefficients</div><div>Effect on SE</div></div><div class="lo-compare-row lo-compare-4"><div>🚫 Omitted Variable</div><div>Relevant correlated X left out</div><div>Biased (absorbs omitted effect)</div><div>Wrong</div></div><div class="lo-compare-row lo-compare-4"><div>〰️ Wrong Functional Form</div><div>Linear model for non-linear data</div><div>Biased</div><div>Wrong</div></div><div class="lo-compare-row lo-compare-4"><div>➕ Extraneous Variable</div><div>Irrelevant X included</div><div>Unbiased ✓</div><div>Inflated (less efficient)</div></div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">1</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Ground in Theory</div><div class="lo-step-desc">Include variables that economic logic says matter</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">2</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Check Residual Plots</div><div class="lo-step-desc">Patterns signal non-linearity or heteroskedasticity</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">3</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Use Adj R² and AIC/BIC</div><div class="lo-step-desc">Penalize complexity — choose parsimonious model</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">4</div></div><div class="lo-step-body"><div class="lo-step-title">Ramsey RESET Test</div><div class="lo-step-desc">Formal test for omitted variables / wrong form</div></div></div></div>'},
{title:'Explain the types of heteroskedasticity and how it affects statistical inference.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Type</div><div>Description</div><div>Severity</div></div><div class="lo-compare-row lo-compare-3"><div>Unconditional</div><div>Variance differs but isn\'t related to X</div><div>Less serious — SE may still be approximate</div></div><div class="lo-compare-row lo-compare-3"><div>Conditional</div><div>Variance systematically related to X (e.g., bigger firms → more volatile)</div><div>Serious — SE are WRONG, all tests invalid</div></div></div><div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 Breusch-Pagan Test</div><div class="formula-highlight-body">$$BP \\chi^2 = n \\times R^2_{auxiliary}$$</div><div class="formula-highlight-note">Regress squared residuals on the X\'s. Significant χ² → reject homoskedasticity. Fix with White\'s robust standard errors.</div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Key impact:</strong> Coefficients stay unbiased, but SE are wrong → t-tests, F-tests, and confidence intervals become unreliable. You can\'t trust "significant" results without correcting for heteroskedasticity.</div></div>'},
{title:'Explain serial correlation and how it affects statistical inference.',explanation:'<p><span class="key-term">Serial correlation</span>: errors in one period are correlated with errors in another. Most common: <strong>positive</strong> serial correlation in time-series data.</p><div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Durbin-Watson Statistic</div><div class="formula-highlight-body">$$DW \\approx 2(1 - \\hat{r})$$</div><div class="formula-highlight-note">r̂ = estimated autocorrelation of residuals</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-title">DW ≈ 2</div><div class="lo-icon-card-desc">No serial correlation ✓</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-title">DW → 0</div><div class="lo-icon-card-desc">Positive serial correlation</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-title">DW → 4</div><div class="lo-icon-card-desc">Negative serial correlation</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">🔧</div><div class="lo-callout-text"><strong>Fix:</strong> Newey-West (Hansen) standard errors correct for both serial correlation AND heteroskedasticity simultaneously.</div></div>'},
{title:'Explain multicollinearity and how it affects regression analysis.',explanation:'<div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">👥</div><div class="lo-mini-analogy-text">Like asking two witnesses who always agree the same story — you can\'t tell who actually saw what. The combined testimony (model) is useful, but individual credibility (coefficients) is questionable.</div></div><div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Variance Inflation Factor</div><div class="formula-highlight-body">$$VIF = \\frac{1}{1 - R^2_j}$$</div><div class="formula-highlight-note">R²ⱼ = R² from regressing Xⱼ on all other X\'s. Higher R²ⱼ → higher VIF → worse multicollinearity.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>VIF Range</div><div>Severity</div><div>Action</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">1 – 5</div><div>Low concern</div><div>Proceed normally</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">5 – 10</div><div>Moderate concern</div><div>Investigate — may need adjustments</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">&gt; 10</div><div>Serious problem</div><div>Drop variable, combine, PCA, or more data</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Classic red flag:</strong> High R² + significant F-stat + few individually significant t-tests = multicollinearity is hiding the individual contributions.</div></div>'}
]},

'quant|extensions':{
quickReview:['Influence analysis: leverage (unusual X) + outlier (unusual Y) = influential point. Use Cook\'s D.','Dummy variables: k categories → k−1 dummies. Coefficients = difference from omitted base category.','Logistic regression: binary outcomes (default/no-default). Uses log-odds; coefficients interpreted via odds ratios.'],
analogy:'Dummy variables are like <em>light switches in a house</em>. Each switch is ON (1) or OFF (0). If you have 3 rooms, you need only 2 switches — because if the living room and bedroom are off, you know the kitchen must be on. That always-implied room is your base category.',
los:[
{title:'Describe influence analysis and methods of detecting influential data points.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Concept</div><div>Definition</div><div>Threshold</div><div>Analogy</div></div><div class="lo-compare-row lo-compare-4"><div>📌 Leverage</div><div>Extreme X values (far from mean of X)</div><div>hᵢᵢ > 2(k+1)/n</div><div>A person standing at the edge of a seesaw</div></div><div class="lo-compare-row lo-compare-4"><div>⚡ Outlier</div><div>Extreme residual (far from fitted line)</div><div>|Studentized resid| > 3</div><div>A data point that doesn\'t belong to the pattern</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 Influential Point</div><div>Removing it significantly changes coefficients</div><div>Cook\'s D > 0.5 (or > 1)</div><div>A voter who single-handedly swings an election</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Key insight:</strong> High leverage + large residual = influential. A point can have high leverage without being influential (if it falls on the regression line) or be an outlier without being influential (if it\'s near the center of X).</div></div>'},
{title:'Formulate and interpret a multiple regression model that includes qualitative independent variables.',explanation:'<div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">💡</div><div class="lo-mini-analogy-text">Light switches: 3 rooms need only 2 switches — if living room and bedroom are OFF, the kitchen must be ON. That implied room is the <em>base category</em>.</div></div><div class="formula-highlight" style="--active-color:var(--active-color,#3B82F6)"><div class="formula-highlight-title" style="color:var(--active-color,#3B82F6)">📐 Dummy Variable Example: Credit Rating → Yield</div><div class="formula-highlight-body">$$Yield = b_0 + b_1(Duration) + b_2(D_BBB) + b_3(D_BB) + \\varepsilon$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Rating</div><div>Equation</div><div>Interpretation</div></div><div class="lo-compare-row lo-compare-3"><div>A-rated (base)</div><div>$$Yield = b_0 + b_1 \\cdot Duration$$</div><div>Intercept captures A-rated yield level</div></div><div class="lo-compare-row lo-compare-3"><div>BBB-rated</div><div>$$Yield = (b_0+b_2) + b_1 \\cdot Duration$$</div><div>b₂ = yield premium of BBB over A</div></div><div class="lo-compare-row lo-compare-3"><div>BB-rated</div><div>$$Yield = (b_0+b_3) + b_1 \\cdot Duration$$</div><div>b₃ = yield premium of BB over A</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">🔧</div><div class="lo-callout-text"><strong>Interaction terms</strong> (e.g., D_BBB × Duration) allow the <em>slope</em> to differ across categories — not just the intercept.</div></div>'},
{title:'Formulate and interpret a logistic regression model.',explanation:'<div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 Logistic Regression</div><div class="formula-highlight-body">$$\\frac{\\ln(p)}{1-p}) = b_0 + b_1X_1 + b_2X_2 + \\cdots + b_kX_k$$\n$$\\text{Odds ratio for }X_i = e^{b_i}$$</div><div class="formula-highlight-note">If b₁ = 0.5 → odds ratio = e⁰·⁵ ≈ 1.65 → a 1-unit increase in X₁ raises odds of Y=1 by 65%.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>Linear Regression</div><div>Logistic Regression</div></div><div class="lo-compare-row lo-compare-3"><div>Dependent variable</div><div>Continuous (returns, prices)</div><div>Binary (0 or 1: default / no default)</div></div><div class="lo-compare-row lo-compare-3"><div>Output range</div><div>−∞ to +∞ (can be nonsensical)</div><div>0 to 1 (probability — always valid)</div></div><div class="lo-compare-row lo-compare-3"><div>Coefficient meaning</div><div>Marginal effect on Y</div><div>Change in log-odds → use odds ratio</div></div><div class="lo-compare-row lo-compare-3"><div>Evaluation metric</div><div>R², F-test, RMSE</div><div>Confusion matrix, ROC-AUC, accuracy</div></div></div>'}
]},

'quant|timeseries':{
quickReview:['Linear trend: yₜ = b₀ + b₁t. Log-linear: ln(yₜ) = b₀ + b₁t → constant growth rate ≈ b₁.','Covariance stationarity: constant mean, variance, and covariance structure. Required for AR models.','AR(1): xₜ = b₀ + b₁xₜ-₁ + εₜ. Stationary if |b₁| < 1. Mean-reverting level = b₀/(1−b₁).','Random walk: b₁ = 1 → unit root → non-stationary. First-difference to fix.','Dickey-Fuller: H₀ = unit root. Uses special critical values (NOT standard t-tables).','ARCH: volatility clusters — variance depends on past squared errors.','Cointegration: two I(1) series sharing a long-run equilibrium → can regress in levels.'],
analogy:'A stationary time series is like a <em>dog on a leash</em> — it wanders around but always stays near its owner (the mean). A random walk is a dog <em>off the leash</em> in an open field — it drifts wherever it pleases with no tendency to return. The Dickey-Fuller test asks: "Is this dog leashed or not?"',
los:[
{title:'Calculate and evaluate the predicted trend value for a time series, modeled as either a linear trend or a log-linear trend.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Model</div><div>Formula</div><div>Best For</div></div><div class="lo-compare-row lo-compare-3"><div>📏 Linear Trend</div><div>$$y_t = b_0 + b_1 t + \\varepsilon_t$$</div><div>Constant <strong>absolute</strong> change (e.g., +$10M/year)</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Log-Linear Trend</div><div>$$\\ln(y_t) = b_0 + b_1 t + \\varepsilon_t$$</div><div>Constant <strong>percentage</strong> change (e.g., +5%/year)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">🔢</div><div class="lo-callout-text"><strong>To predict:</strong> Linear → plug in t directly. Log-linear → compute ln(ŷ) = b₀ + b₁·t, then exponentiate: ŷₜ = e^(b₀+b₁·t).</div></div>'},
{title:'Describe factors determining whether a linear or log-linear trend should be used and evaluate limitations of trend models.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📏</div><div class="lo-icon-card-title">Use Linear When</div><div class="lo-icon-card-desc">Data increases by roughly constant amounts. Plot looks like a straight line.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Use Log-Linear When</div><div class="lo-icon-card-desc">Growth is exponential. Plot curves up, but ln(data) is linear.</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Limitations:</strong> Trend models assume the trend continues forever — can\'t capture structural breaks, regime changes, or cycles. Residuals are often serially correlated, leaving predictable information on the table.</div></div>'},
{title:'Explain the requirement for covariance stationarity and the significance of non-stationarity.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📌</div><div class="lo-icon-card-title">Constant Mean</div><div class="lo-icon-card-desc">The expected value doesn\'t drift over time</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Constant Variance</div><div class="lo-icon-card-desc">Volatility doesn\'t grow or shrink over time</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">Constant Covariance</div><div class="lo-icon-card-desc">Correlation between values at fixed lags stays the same</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Non-stationary series → spurious regressions:</strong> high R² and significant t-stats between completely unrelated variables. Like finding a "significant" link between ice cream sales and shark attacks — both just trend upward in summer.</div></div>'},
{title:'Describe the structure of an AR(p) model and calculate one- and two-period-ahead forecasts.',explanation:'<div class="formula-highlight" style="--active-color:var(--active-color,#3B82F6)"><div class="formula-highlight-title" style="color:var(--active-color,#3B82F6)">📐 Autoregressive Models</div><div class="formula-highlight-body">$$\\text{AR(1): }x_t = b_0 + b_1\\cdot x_{t-1} + \\varepsilon_t$$\n$$\\text{AR(2): }x_t = b_0 + b_1\\cdot x_{t-1} + b_2\\cdot x_{t-2} + \\varepsilon_t$$</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:var(--active-color,#3B82F6)">1</div><div class="lo-step-connector" style="background:var(--active-color,#3B82F6);opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">One-Step Forecast</div><div class="lo-step-desc">$$\\hat{x}_{t+1} = b_0 + b_1 x_t$$</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:var(--active-color,#3B82F6)">2</div></div><div class="lo-step-body"><div class="lo-step-title">Two-Step Forecast</div><div class="lo-step-desc">x̂ₜ+₂ = b₀ + b₁·x̂ₜ+₁ — uses the <em>predicted</em> value, so uncertainty compounds</div></div></div></div>'},
{title:'Explain how autocorrelations of residuals test whether the AR model fits the time series.',explanation:'<p>If the AR model is correct, residuals should be <span class="key-term">white noise</span> — no remaining pattern.</p><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Test</div><div>What It Checks</div><div>Decision Rule</div></div><div class="lo-compare-row lo-compare-3"><div>ACF of Residuals</div><div>Individual autocorrelations at each lag</div><div>Any |autocorrelation| > ±1.96/√n → add more lags</div></div><div class="lo-compare-row lo-compare-3"><div>Ljung-Box Q</div><div>Joint test: are ALL autocorrelations zero?</div><div>Significant Q → model is missing something</div></div></div>'},
{title:'Explain mean reversion and calculate a mean-reverting level.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Mean-Reverting Level</div><div class="formula-highlight-body">$$Level = \\frac{b_0}{1 - b_1}$$</div><div class="formula-highlight-note">Example: b₀ = 0.5, b₁ = 0.8 → Level = 0.5/0.2 = 2.5. The series gravitates toward 2.5.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>|b₁| Value</div><div>Speed</div><div>Analogy</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Close to 0</div><div>Fast reversion (strong pull)</div><div>🏃 Rubber band snaps back quickly</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">Close to 1</div><div>Slow reversion (weak pull)</div><div>🐌 Gentle gravity, wanders far before returning</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Equal to 1</div><div>No reversion (random walk)</div><div>🎈 Released balloon — drifts forever</div></div></div>'},
{title:'Contrast in-sample and out-of-sample forecasts and compare forecasting accuracy via RMSE.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Type</div><div>Description</div><div>Reliability</div></div><div class="lo-compare-row lo-compare-3"><div>📋 In-Sample</div><div>Fitted values from estimation period</div><div>Always looks good — model was designed to fit this data</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Out-of-Sample</div><div>Forecasts for data NOT used in estimation</div><div>The true test of predictive power</div></div></div><div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Root Mean Squared Error</div><div class="formula-highlight-body">$$RMSE = \\sqrt{\\frac{1}{n} \\sum(y_t - \\hat{y}_t)^2}$$</div><div class="formula-highlight-note">Lower RMSE = better accuracy. Compare models on the SAME out-of-sample period. Low in-sample RMSE + high out-of-sample RMSE = overfitting.</div></div>'},
{title:'Explain the instability of coefficients of time-series models.',explanation:'<div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Core problem:</strong> Time-series relationships shift due to structural breaks — policy changes, financial crises, regime shifts. A model that worked brilliantly for 2010–2019 may fail post-2020.</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">1</div><div class="lo-step-connector" style="background:#F59E0B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Split-Sample Test</div><div class="lo-step-desc">Estimate on subperiods and compare coefficients — do they stay stable?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F59E0B">2</div></div><div class="lo-step-body"><div class="lo-step-title">Chow Test</div><div class="lo-step-desc">Formal F-test for structural break at a suspected breakpoint</div></div></div></div>'},
{title:'Describe characteristics of random walk processes and contrast them to stationary processes.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Property</div><div>🐕 Stationary (leashed dog)</div><div>🎈 Random Walk (free balloon)</div></div><div class="lo-compare-row lo-compare-3"><div>b₁ value</div><div>|b₁| < 1</div><div>b₁ = 1 (unit root)</div></div><div class="lo-compare-row lo-compare-3"><div>Mean reversion</div><div>Yes — gravitates to b₀/(1−b₁)</div><div>No — drifts indefinitely</div></div><div class="lo-compare-row lo-compare-3"><div>Variance over time</div><div>Constant (finite)</div><div>Grows without bound</div></div><div class="lo-compare-row lo-compare-3"><div>Best forecast</div><div>Mean-reverting level (long-run)</div><div>Today\'s value (plus drift if any)</div></div><div class="lo-compare-row lo-compare-3"><div>Financial examples</div><div>Interest rates, valuation ratios</div><div>Stock prices, exchange rates</div></div></div>'},
{title:'Describe implications of unit roots, when they occur, and how to transform for AR analysis.',explanation:'<div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Unit root (b₁ = 1):</strong> series is non-stationary → standard AR analysis produces spurious results. Common in stock prices, exchange rates, GDP levels.</div></div><div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">🔧 The Fix: First-Differencing</div><div class="formula-highlight-body">$$y_t = x_t - x_{t-1} = \\Delta x_t$$</div><div class="formula-highlight-note">yₜ is typically stationary ("integrated of order 1" or I(1)). Now fit an AR model to yₜ instead of xₜ. In finance: prices have unit roots, but returns (changes) are stationary.</div></div>'},
{title:'Describe the unit root test steps and its relation to AR models.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Dickey-Fuller Test</div><div class="formula-highlight-body">$$\\Delta x_t = b_0 + \\delta\\cdot x_{t-1} + \\varepsilon_t \\quad \\text{where } \\delta = b_1 - 1$$\n$$H_0: \\delta = 0 \\to \\text{unit root (non-stationary)}$$\n$$H_1: \\delta < 0 \\to \\text{stationary}$$</div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Critical values are NOT standard t-tables</strong> — use Dickey-Fuller tables (e.g., −3.43 at 5%). The test statistic must be more negative than the critical value to reject H₀. Fail to reject → first-difference before modeling.</div></div>'},
{title:'Explain how to test and correct for seasonality and forecast using an AR model with a seasonal lag.',explanation:'<div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 AR with Seasonal Lag (Quarterly Data)</div><div class="formula-highlight-body">$$x_t = b_0 + b_1\\cdot x_{t-1} + b_4\\cdot x_{t-4} + \\varepsilon_t$$\n$$\\text{Forecast: }\\hat{x}_{t+1} = b_0 + b_1\\cdot x_t + b_4\\cdot x_{t-3}$$</div><div class="formula-highlight-note">Check lag-4 autocorrelation for quarterly, lag-12 for monthly. If the seasonal coefficient is significant, the model captures repeating patterns within the year.</div></div>'},
{title:'Explain ARCH and how ARCH models predict variance of a time series.',explanation:'<div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🌪️</div><div class="lo-mini-analogy-text">Volatility clustering: calm days follow calm days; stormy days follow stormy days. ARCH formalizes this — today\'s variance depends on yesterday\'s squared shock.</div></div><div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 ARCH(1) Model</div><div class="formula-highlight-body">$$\\sigma^2_t = a_0 + a_1\\cdot \\varepsilon^2_{t-1}$$</div><div class="formula-highlight-note">Test: regress squared residuals on their lag. If a₁ is significant → ARCH effects present → predicted variance = a₀ + a₁·ε²ₜ. Crucial for risk management and option pricing.</div></div>'},
{title:'Explain how to analyze time-series variables for nonstationarity/cointegration before regression; determine an appropriate model.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Test Each Series for Unit Root</div><div class="lo-step-desc">Run Dickey-Fuller on both X and Y</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Classify the Pair</div><div class="lo-step-desc">Both stationary? One? Both non-stationary?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div></div><div class="lo-step-body"><div class="lo-step-title">Choose Approach</div><div class="lo-step-desc">See decision table below</div></div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Scenario</div><div>Action</div><div>Rationale</div></div><div class="lo-compare-row lo-compare-3"><div>✅ Both stationary</div><div>Regress in levels — proceed normally</div><div>Standard regression valid</div></div><div class="lo-compare-row lo-compare-3"><div>⚠️ One stationary, one not</div><div>Do NOT regress</div><div>Results unreliable — mixed integration orders</div></div><div class="lo-compare-row lo-compare-3"><div>🔗 Both non-stationary + cointegrated</div><div>Regress in levels (valid)</div><div>Shared long-run equilibrium makes it OK</div></div><div class="lo-compare-row lo-compare-3"><div>🚫 Both non-stationary + NOT cointegrated</div><div>First-difference both, then regress</div><div>Avoid spurious regression</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🍻</div><div class="lo-mini-analogy-text">Cointegration: two drunken friends stumbling home — each follows a random walk individually, but they stay together because they\'re linked arm-in-arm. The spread between them is stationary.</div></div>'}
]},

'quant|ml':{
quickReview:['Supervised: labeled data → predict target. Unsupervised: no labels → find structure/patterns.','Overfitting: model learns noise. Combat with cross-validation, regularization, simpler models.','Penalized regression (LASSO/Ridge), SVM, KNN, CART, ensemble/random forest — each for different problems.','Unsupervised: PCA (dimensionality reduction), K-means & hierarchical clustering (grouping).'],
analogy:'Supervised learning is like <em>studying with an answer key</em> — you see questions and correct answers, then try to generalize. Unsupervised learning is like <em>sorting a box of unlabeled foreign coins</em> by size, color, and weight without knowing their names. Overfitting is memorizing the answer key word-for-word: you ace the practice test but bomb the real exam.',
los:[
{title:'Describe supervised ML, unsupervised ML, and deep learning.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Type</div><div>Data</div><div>Goal</div><div>Finance Examples</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 Supervised</div><div>Labeled (input–output pairs)</div><div>Map inputs → outputs (predict)</div><div>Return prediction, default classification</div></div><div class="lo-compare-row lo-compare-4"><div>🔍 Unsupervised</div><div>No labels</div><div>Discover hidden patterns</div><div>Cluster stocks into peer groups, reduce features</div></div><div class="lo-compare-row lo-compare-4"><div>🧠 Deep Learning</div><div>Often unstructured (text, images)</div><div>Learn feature hierarchies automatically</div><div>NLP sentiment analysis, HFT pattern recognition</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">📖</div><div class="lo-mini-analogy-text">Supervised = studying with an answer key. Unsupervised = sorting a box of unlabeled foreign coins by size, color, and weight without knowing their names.</div></div>'},
{title:'Describe overfitting and identify methods of addressing it.',explanation:'<div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Overfitting</strong> = model learns noise instead of signal. Symptoms: excellent in-sample, poor out-of-sample. Like memorizing the answer key — you ace the practice test but bomb the real exam.</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔄</div><div class="lo-icon-card-title">Cross-Validation</div><div class="lo-icon-card-desc">k folds: train on k−1, validate on 1, rotate</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🎛️</div><div class="lo-icon-card-title">Regularization</div><div class="lo-icon-card-desc">LASSO (L1) / Ridge (L2) penalize large coefficients</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">✂️</div><div class="lo-icon-card-title">Simpler Models</div><div class="lo-icon-card-desc">Fewer parameters, shallower trees</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">More Data</div><div class="lo-icon-card-desc">Dilutes noise — signal stands out</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🛑</div><div class="lo-icon-card-title">Early Stopping</div><div class="lo-icon-card-desc">Halt NN training before memorization</div></div><div class="lo-icon-card" style="border-top:3px solid #6366F1"><div class="lo-icon-card-emoji">🌲</div><div class="lo-icon-card-title">Ensembles</div><div class="lo-icon-card-desc">Combine models to cancel individual errors</div></div></div>'},
{title:'Describe supervised ML algorithms and determine problems for which they are best suited.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Algorithm</div><div>How It Works</div><div>Best For</div><div>Watch Out</div></div><div class="lo-compare-row lo-compare-4"><div>🎛️ LASSO / Ridge</div><div>Regression + complexity penalty (L1 shrinks to 0 → feature selection)</div><div>Many predictors, some irrelevant</div><div>LASSO can drop important correlated vars</div></div><div class="lo-compare-row lo-compare-4"><div>🛤️ SVM</div><div>Finds widest separating "highway" between classes</div><div>Classification with clear margins</div><div>Slow with large datasets, hard to interpret</div></div><div class="lo-compare-row lo-compare-4"><div>👥 KNN</div><div>Majority vote of k nearest neighbors</div><div>Small datasets, non-linear boundaries</div><div>Slow prediction, sensitive to k choice and scale</div></div><div class="lo-compare-row lo-compare-4"><div>🌳 CART</div><div>If-then splits into a decision tree</div><div>Interpretable rules, mixed data types</div><div>Overfits easily — must prune</div></div><div class="lo-compare-row lo-compare-4"><div>🌲 Random Forest</div><div>Many de-correlated trees → average predictions</div><div>Most tabular prediction tasks</div><div>Less interpretable than single tree</div></div></div>'},
{title:'Describe unsupervised ML algorithms and determine problems for which they are best suited.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Algorithm</div><div>How It Works</div><div>Best For</div><div>Key Limitation</div></div><div class="lo-compare-row lo-compare-4"><div>📉 PCA</div><div>Finds uncorrelated components capturing most variance</div><div>Reducing many correlated features to a few</div><div>Components lack economic interpretation</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 K-Means</div><div>Assigns points to k groups by nearest centroid</div><div>Grouping assets, identifying market regimes</div><div>Must pre-specify k; sensitive to initialization</div></div><div class="lo-compare-row lo-compare-4"><div>🌿 Hierarchical</div><div>Builds nested cluster tree (dendrogram)</div><div>Exploring natural groupings, unknown k</div><div>Doesn\'t scale well to very large datasets</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>PCA in practice:</strong> reduce 50 financial ratios down to 3–5 principal components that capture 80%+ of variation — then use those components as inputs for a supervised model.</div></div>'}
]},

{title:'Identify and explain steps in a data analysis project.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Conceptualize</div><div class="lo-step-desc">Define the problem, research question, and success metrics</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Collect Data</div><div class="lo-step-desc">Internal databases, APIs, web scraping, third-party vendors</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Prepare & Wrangle</div><div class="lo-step-desc">Clean, transform, and structure raw data into analysis-ready format</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">4</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Explore (EDA)</div><div class="lo-step-desc">Visualize distributions, correlations, anomalies — build intuition</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">5</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Model</div><div class="lo-step-desc">Select algorithms, train, tune hyperparameters, validate out-of-sample</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">6</div></div><div class="lo-step-body"><div class="lo-step-title">Communicate</div><div class="lo-step-desc">Present findings with clear visuals and actionable conclusions</div></div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">👨‍🍳</div><div class="lo-mini-analogy-text">Like cooking a gourmet meal: decide the menu (conceptualize), shop for ingredients (collect), wash/chop/measure (wrangle), taste-test (explore), cook (model), and plate beautifully (communicate). Skip the prep and even the best recipe fails.</div></div>'},
{title:'Describe objectives, steps, and examples of preparing and wrangling data.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🧹</div><div class="lo-icon-card-title">Cleaning</div><div class="lo-icon-card-desc">Handle missing values (impute, drop, flag), remove duplicates, fix data types, identify outliers</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🔄</div><div class="lo-icon-card-title">Transforming</div><div class="lo-icon-card-desc">Normalize/standardize, encode categoricals (one-hot), create derived features (log returns)</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">Merging</div><div class="lo-icon-card-desc">Join datasets on common keys (ticker + date). Handle mismatched fiscal year-ends</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">📄</div><div class="lo-callout-text"><strong>Example pipeline:</strong> Raw SEC filings → strip HTML → extract tables → parse numbers → handle fiscal year-end differences → merge with market data → final analysis-ready dataset.</div></div>'},
{title:'Evaluate the fit of a machine learning algorithm.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Task</div><div>Metric</div><div>Interpretation</div></div><div class="lo-compare-row lo-compare-3"><div rowspan="2">📈 Regression</div><div>RMSE</div><div>Average magnitude of error (same units as Y). Lower = better</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Regression</div><div>Out-of-sample R²</div><div>Variance explained on unseen data. Can be negative (worse than mean)</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Classification</div><div>$$\\text{Accuracy} = \\frac{TP+TN}{\\text{Total}}$$</div><div>% correct — can be misleading with imbalanced classes</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Classification</div><div>$$\\text{Precision} = \\frac{TP}{TP+FP}$$</div><div>Of those predicted positive, how many are truly positive?</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Classification</div><div>$$\\text{Recall} = \\frac{TP}{TP+FN}$$</div><div>Of true positives, how many did we catch?</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Classification</div><div>$$F_1 = \\frac{2 \\cdot P \\cdot R}{P+R}$$</div><div>Harmonic mean of precision and recall — balanced measure</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Classification</div><div>ROC-AUC</div><div>Area under ROC curve. 0.5 = random, 1.0 = perfect</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Always evaluate out-of-sample.</strong> The gap between in-sample and out-of-sample performance directly measures overfitting.</div></div>'},
{title:'Describe objectives, methods, and examples of data exploration.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Histograms</div><div class="lo-icon-card-desc">Distribution shape, skew, fat tails</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📦</div><div class="lo-icon-card-title">Box Plots</div><div class="lo-icon-card-desc">Outliers, median, quartile spread</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔵</div><div class="lo-icon-card-title">Scatter Matrices</div><div class="lo-icon-card-desc">Pairwise relationships, non-linearity</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🌡️</div><div class="lo-icon-card-title">Correlation Heatmaps</div><div class="lo-icon-card-desc">Multi-collinearity, redundant features</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Time-Series Plots</div><div class="lo-icon-card-desc">Trends, structural breaks, seasonality</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>EDA insight example:</strong> Plotting daily returns reveals fat tails → normality assumption underestimates risk. A P/E vs. forward-returns scatter shows non-linearity → consider log transformation.</div></div>'},
{title:'Describe methods for extracting, selecting and engineering features from textual data.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Method</div><div>How It Works</div><div>Strength / Weakness</div></div><div class="lo-compare-row lo-compare-3"><div>📝 Bag-of-Words</div><div>Count word frequencies → sparse matrix</div><div>Simple, but ignores word order and context</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ TF-IDF</div><div>Weight by importance: frequent here but rare overall → high score</div><div>Better signal than raw counts; still ignores order</div></div><div class="lo-compare-row lo-compare-3"><div>🔗 N-grams</div><div>Capture multi-word phrases ("interest rate", "credit risk")</div><div>Captures context; explodes feature space</div></div><div class="lo-compare-row lo-compare-3"><div>😊 Sentiment Scores</div><div>Map text to positive/negative via lexicons or ML models</div><div>Direct signal for trading strategies</div></div><div class="lo-compare-row lo-compare-3"><div>🏷️ NER</div><div>Extract company names, people, locations automatically</div><div>Structures unstructured data; needs good training data</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">✂️</div><div class="lo-callout-text"><strong>Feature selection is critical</strong> — raw text produces millions of features. Use chi-squared, mutual information, or LASSO to keep only the informative ones.</div></div>'},
{title:'Describe objectives, steps, and techniques in model training.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">1</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Split Data</div><div class="lo-step-desc">Train (60-70%) / Validation (15-20%) / Test (15-20%) — never touch test until final evaluation</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">2</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Select Algorithm + Hyperparameters</div><div class="lo-step-desc">Choose model type, set initial parameters based on problem characteristics</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">3</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Fit on Training Data</div><div class="lo-step-desc">Model learns patterns from the training set</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">4</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Evaluate on Validation</div><div class="lo-step-desc">Check for overfitting — is out-of-sample performance close to in-sample?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">5</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Tune Hyperparameters</div><div class="lo-step-desc">Grid search or random search to optimize (depth, learning rate, regularization strength)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">6</div></div><div class="lo-step-body"><div class="lo-step-title">Final Test Evaluation</div><div class="lo-step-desc">Run ONCE on held-out test set → this is the unbiased performance estimate</div></div></div></div>'},
