'pm|econ-markets':{
quickReview:['Market values change via 3 channels: (1) default-free rates, (2) expected cash flow timing/magnitude, (3) risk premiums.','Expectations AND changes in expectations drive prices. Anticipated events are already priced; only surprises move markets.','Higher long-run GDP growth → higher equilibrium real short-term rates. Higher growth volatility → higher risk premiums.','Business cycle effects: expansion → rising short rates, flatter curve, tighter credit spreads. Recession → opposite.','Break-even inflation (BEI) = nominal yield − TIPS yield. Affected by inflation expectations + inflation risk premium + liquidity premium.','Equity risk premium linked to consumption hedging: equities that pay off when consumption is low are more valuable → lower ERP.','Cyclical effects on multiples: P/Es expand in early recovery (expectations improve before earnings), compress in late cycle.'],
analogy:'Economics and investment markets are like <em>weather and agriculture</em>. The business cycle is the season — spring (early recovery) brings hope and planting (rising multiples on low earnings). Summer (expansion) is the harvest — earnings boom but expectations are already high. Autumn (late cycle) brings the first chill — rates rise, spreads widen, the market senses winter. And winter (recession) clears the field for next year\'s planting. The key insight: <em>you don\'t profit from the weather itself, but from correctly predicting how it will change</em>.',
los:[
{title:'Explain the notion that economic factors must affect default-free rates, expected cash flows, or risk premiums to affect market values.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Three Channels of Value Impact</div><div class="formula-highlight-body">$$V = \\sum \\frac{E(CF_t)}{1 + r_f + RP}^t$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">1. Default-Free Rates (r_f)</div><div class="lo-icon-card-desc">Central bank policy, inflation expectations, real growth → affects discount rate for ALL assets</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">2. Expected Cash Flows</div><div class="lo-icon-card-desc">Earnings, dividends, coupons, rents → affected by economic growth, sector trends, company-specific factors</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⚠️</div><div class="lo-icon-card-title">3. Risk Premiums (RP)</div><div class="lo-icon-card-desc">Credit spreads, ERP, liquidity premium → affected by uncertainty, risk appetite, volatility</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>If an economic factor doesn\'t change any of these three channels, it has NO effect on asset prices</strong> — no matter how dramatic the headline.</div></div>'},
{title:'Explain the role of expectations and changes in expectations in market valuation.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Scenario</div><div>Market Reaction</div><div>Example</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">Outcome = Expectations</div><div>No price change (already priced in)</div><div>Market expects 3% GDP; actual = 3%</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Outcome &gt; Expectations (positive surprise)</div><div>Price rises</div><div>Market expects 3% GDP; actual = 4%</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Outcome &lt; Expectations (negative surprise)</div><div>Price falls</div><div>"Good" earnings of +10% → stock drops because market expected +15%</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Valuation is about the gap between reality and expectations, not reality alone.</strong> This is why a company can report "good earnings" and see its stock fall — the market expected even better.</div></div>'},
{title:'Explain the relationship between long-term economic growth rate, growth volatility, and average real short-term interest rates.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>If This ↑</div><div>Real Rates</div><div>Risk Premiums</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">📈 Trend GDP Growth</div><div>↑ Higher (investment opportunities better → demand for capital ↑)</div><div>No direct effect on RP</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">🌊 Growth Volatility</div><div>Debated (precautionary savings effect)</div><div>↑ Higher (more uncertainty → more compensation demanded)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Cross-country implication:</strong> Fast-growing, volatile emerging markets tend to have higher real rates AND higher risk premiums than stable, slow-growing developed markets. This framework explains the difference.</div></div>'},
{title:'Explain how the phase of the business cycle affects policy and short-term rates, the slope of the term structure, and relative bond performance.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Phase</div><div>Policy / Short Rates</div><div>Yield Curve</div><div>Best Bond Strategy</div></div><div class="lo-compare-row lo-compare-4"><div>🌱 Early Expansion</div><div>Accommodative (low rates)</div><div style="color:#10B981;font-weight:700">Steep (short low, long rising)</div><div>Long bonds outperform (ride steep curve)</div></div><div class="lo-compare-row lo-compare-4"><div>☀️ Late Expansion</div><div style="color:#EF4444;font-weight:700">Tightening (raising rates)</div><div>Flattening</div><div>Short bonds outperform (less rate sensitivity)</div></div><div class="lo-compare-row lo-compare-4"><div>❄️ Recession</div><div style="color:#10B981;font-weight:700">Easing (cutting rates)</div><div>Steepening</div><div>Long bonds rally hard (rates falling + flight to quality)</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The CHANGE in policy matters most for returns, not the level.</strong> Anticipate the pivot — the transition from tightening to easing is when long bonds deliver the biggest gains.</div></div>'},
{title:'Describe the factors that affect yield spreads between non-inflation-adjusted and inflation-indexed bonds.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Break-Even Inflation (BEI)</div><div class="formula-highlight-body">$$BEI = Nominal yield - TIPS yield$$\n$$\\approx Expected inflation + Inflation risk premium - Liquidity premium$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Expected Inflation</div><div class="lo-icon-card-desc">Core driver. Higher expected inflation → wider BEI.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">⚠️</div><div class="lo-icon-card-title">Inflation Risk Premium</div><div class="lo-icon-card-desc">Compensation for inflation uncertainty (positive). Makes BEI slightly overstate expected inflation.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💧</div><div class="lo-icon-card-title">Liquidity Premium</div><div class="lo-icon-card-desc">TIPS are less liquid → higher TIPS yield → BEI slightly understates expected inflation.</div></div></div>'},
{title:'Explain how the phase of the business cycle affects credit spreads and performance of credit-sensitive instruments.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Phase</div><div>Credit Spreads</div><div>Credit Bond Performance</div></div><div class="lo-compare-row lo-compare-3"><div>☀️ Expansion</div><div style="color:#10B981;font-weight:700">Tighten (improving fundamentals, falling defaults)</div><div>Outperform Treasuries — HY benefits most (more spread to compress)</div></div><div class="lo-compare-row lo-compare-3"><div>❄️ Recession</div><div style="color:#EF4444;font-weight:700">Widen sharply (rising defaults, fear)</div><div>Underperform Treasuries — HY suffers most. Flight to quality.</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Spreads are countercyclical:</strong> tightest at cycle peaks (when risk is actually highest), widest at troughs (when forward returns are best). This creates a contrarian value opportunity — buy credit during maximum fear, sell during maximum complacency.</div></div>'},
{title:'Explain how the characteristics of markets for a company\'s products affect credit quality.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>Favorable for Credit</div><div>Unfavorable for Credit</div></div><div class="lo-compare-row lo-compare-3"><div>📦 Demand</div><div style="color:#10B981;font-weight:700">Stable (essential goods, utilities)</div><div style="color:#EF4444;font-weight:700">Cyclical (autos, construction, luxury)</div></div><div class="lo-compare-row lo-compare-3"><div>🏰 Competition</div><div style="color:#10B981;font-weight:700">High barriers (patents, regulation, network effects)</div><div style="color:#EF4444;font-weight:700">Commoditized, price competition, low switching costs</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Pricing</div><div style="color:#10B981;font-weight:700">Strong pricing power (brand, limited substitutes)</div><div style="color:#EF4444;font-weight:700">Price-taker, rapid tech change (obsolescence)</div></div><div class="lo-compare-row lo-compare-3"><div>👥 Customers</div><div style="color:#10B981;font-weight:700">Diversified base, long-term contracts</div><div style="color:#EF4444;font-weight:700">Concentrated customers, spot/short-term contracts</div></div></div>'},
{title:'Explain the relationship between consumption hedging properties of equity and the equity risk premium.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Asset Type</div><div>Consumption Hedging</div><div>Required Return</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Defensive Stocks (utilities, staples)</div><div style="color:#10B981;font-weight:700">Better hedge — hold up when consumption falls</div><div>Lower ERP (investors value the protection)</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Cyclical Stocks (tech, discretionary)</div><div style="color:#EF4444;font-weight:700">Poor hedge — fail when consumption falls most</div><div>Higher ERP (must compensate for failing when needed)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Consumption CAPM logic:</strong> Equities generally do well when consumption is high and poorly in recessions. They are poor hedges against consumption risk → investors demand a high equity risk premium. The ERP reflects this aggregate consumption risk, not just volatility.</div></div>'},
{title:'Explain how the phase of the business cycle affects short-term and long-term earnings growth expectations.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Phase</div><div>Short-Term Earnings</div><div>Long-Term Earnings</div><div>What Drives Stock Prices</div></div><div class="lo-compare-row lo-compare-4"><div>🌱 Early Recovery</div><div style="color:#10B981;font-weight:700">Surge (low base, operating leverage)</div><div>Improve moderately</div><div>Long-term expectations improving → multiples expand</div></div><div class="lo-compare-row lo-compare-4"><div>☀️ Mid-Expansion</div><div>Normalize (base rises)</div><div>Stable/slightly optimistic</div><div>Earnings growth drives returns more than multiple expansion</div></div><div class="lo-compare-row lo-compare-4"><div>🍂 Late Cycle</div><div>Positive but decelerating</div><div style="color:#EF4444;font-weight:700">Start declining (margin pressure)</div><div>Long-term downgrades → multiples compress</div></div><div class="lo-compare-row lo-compare-4"><div>❄️ Recession</div><div style="color:#EF4444;font-weight:700">Collapse</div><div>Stabilize (looking through the trough)</div><div>Long-term expectations stabilizing → eventual multiple floor</div></div></div>'},
{title:'Describe cyclical effects on valuation multiples.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Cycle Phase</div><div>P/E Level</div><div>Why (Seems Paradoxical)</div></div><div class="lo-compare-row lo-compare-3"><div>❄️ Recession Trough</div><div style="color:#10B981;font-weight:700">HIGH P/E</div><div>Prices hold up (forward-looking recovery), but current E is depressed → high ratio</div></div><div class="lo-compare-row lo-compare-3"><div>☀️ Cycle Peak</div><div style="color:#EF4444;font-weight:700">LOW P/E</div><div>Prices moderate (forward-looking decline), but current E is elevated → low ratio</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Valuation trap:</strong> A low P/E at the cycle peak may signal <em>overvaluation</em> (earnings about to fall). A high P/E at the trough may signal <em>undervaluation</em> (earnings about to recover). Use normalized/cyclically-adjusted earnings (Shiller CAPE) for better cross-cycle comparisons.</div></div>'},
{title:'Describe the economic factors affecting investment in commercial real estate.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Demand: GDP & Employment</div><div class="lo-icon-card-desc">GDP drives space demand. Employment drives office. Consumer spending drives retail. Trade drives industrial.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏗️</div><div class="lo-icon-card-title">Supply: Construction Pipeline</div><div class="lo-icon-card-desc">2-3 year lag → creates boom-bust cycles. Supply-constrained markets hold value better.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Capital Markets: Rates & Credit</div><div class="lo-icon-card-desc">Cap rates track long-term rates + spread. Credit availability drives transaction volume.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Inflation: Partial Hedge</div><div class="lo-icon-card-desc">Rents adjust over time but with a lag. Short-lease properties (multifamily, hotels) hedge faster.</div></div></div>'}
]},

'pm|active-mgmt':{
quickReview:['Value added = active return = R_portfolio − R_benchmark. Information ratio = active return / active risk (tracking error).','IR vs. Sharpe: Sharpe measures total risk-adjusted return; IR measures skill at generating active return per unit of active risk.','Fundamental law: E(R_A) = TC × IC × √BR × σ_A. Transfer coefficient, info coefficient, breadth, aggressiveness.','IC = correlation between forecasts and actual outcomes. BR = number of independent bets. TC = ability to implement (constraints reduce TC).','Market timing: few large bets (low BR, need high IC). Security selection: many small bets (high BR, lower IC needed).','Limitations: assumes independent bets (often correlated), IC hard to measure, constraints reduce TC below 1.'],
analogy:'Active management is like <em>target shooting</em>. The information ratio is your score per round — accuracy (active return) divided by consistency (tracking error). The fundamental law says your total score depends on: aim quality (IC — how good is your research?), number of shots (BR — how many independent bets?), steadiness (TC — do constraints shake your hand?), and willingness to bet big (σ_A — aggressiveness). A great shooter with few shots can match a mediocre shooter with many — that\'s the IC-BR trade-off.',
los:[
{title:'Describe how value added by active management is measured.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Measuring Active Value Added</div><div class="formula-highlight-body">$$\\text{Active return} = R_P - R_B (portfolio - benchmark)$$</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">1</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Mean Active Return (Alpha)</div><div class="lo-step-desc">Average excess return over the benchmark over a meaningful time period</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">2</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Consistency (Information Ratio)</div><div class="lo-step-desc">Alpha per unit of tracking error — is the outperformance reliable or lumpy?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">3</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Attribution</div><div class="lo-step-desc">How much from security selection vs. sector allocation vs. timing?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">4</div></div><div class="lo-step-body"><div class="lo-step-title">Gross vs. Net</div><div class="lo-step-desc">Always evaluate after fees and transaction costs. Many managers show positive gross alpha but negative net alpha.</div></div></div></div>'},
{title:'Calculate and interpret the information ratio (ex post and ex ante) and contrast it to the Sharpe ratio.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Measure</div><div>Formula</div><div>Numerator</div><div>Denominator</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Information Ratio</div><div>$$IR = \\frac{\\bar{R}_A}{\\sigma(R_A)}$$</div><div>Active return (vs. benchmark)</div><div>Tracking error (active risk)</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Sharpe Ratio</div><div>$$SR = \\frac{\\bar{R}_P - R_f}{\\sigma_P}$$</div><div>Excess return (vs. risk-free)</div><div>Total portfolio volatility</div></div></div><div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Key Relationship</div><div class="formula-highlight-body">$$SR^2_P = SR^2_B + IR^2$$</div><div class="formula-highlight-note">A positive IR always improves the portfolio Sharpe ratio. But the higher the benchmark Sharpe, the harder it is for active management to meaningfully improve it.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>IR Level</div><div>Skill Assessment</div><div>Rarity</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">~0.5</div><div>Good</div><div>Top quartile managers</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">~0.75</div><div>Excellent</div><div>Top decile</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">&gt;1.0</div><div>Exceptional</div><div>Extremely rare; may not persist</div></div></div>'},
{title:'Describe and interpret the fundamental law of active portfolio management, including its component terms.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Fundamental Law of Active Management</div><div class="formula-highlight-body">$$E(R_A) = TC \\times IC \\times \\sqrt{B}R \\times \\sigma_A$$\n$$Optimal IR* = TC \\times IC \\times \\sqrt{B}R$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">IC (Information Coefficient)</div><div class="lo-icon-card-desc">Correlation between forecasted and actual returns. IC = 0.05–0.15 is excellent. Measures research quality.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">BR (Breadth)</div><div class="lo-icon-card-desc">Number of independent forecasting bets per year. More independent bets → higher IR (√BR effect).</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">TC (Transfer Coefficient)</div><div class="lo-icon-card-desc">0 to 1. How well can you implement insights? TC = 1 unconstrained; &lt;1 with long-only, sector limits, etc.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🎰</div><div class="lo-icon-card-title">σ_A (Active Risk)</div><div class="lo-icon-card-desc">Tracking error — how much active risk the manager takes. Amplifies both alpha AND tracking error.</div></div></div>'},
{title:'Explain how the IR may be useful in investment manager selection and choosing the level of active portfolio risk.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Application</div><div>How IR Is Used</div><div>Key Insight</div></div><div class="lo-compare-row lo-compare-3"><div>👔 Manager Selection</div><div>IR normalizes alpha by risk taken → single best skill measure</div><div>IR of 0.5 = good; 0.75 = excellent; 1.0+ = exceptional (and rare)</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Active Risk Level</div><div>Given a manager\'s IR, optimal σ_A depends on benchmark SR, risk aversion, constraints</div><div>More active risk amplifies alpha AND tracking error — IR gives the expected ratio</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Combining Managers</div><div>$$\\text{Combined } IR = \\sqrt{\\sum IR_i^2}$$</div><div style="color:#10B981;font-weight:700">Diversification of active bets improves overall IR</div></div></div>'},
{title:'Compare active management strategies, including market timing and security selection, and evaluate strategy changes using the fundamental law.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Strategy</div><div>Breadth (BR)</div><div>IC Needed for IR = 0.5</div><div>Achievability</div></div><div class="lo-compare-row lo-compare-4"><div>🌍 Market Timing</div><div>Low (~12 monthly calls/yr)</div><div style="color:#EF4444;font-weight:700">IC ≈ 0.14 (extremely high)</div><div style="color:#EF4444;font-weight:700">Very difficult — few can sustain this IC</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Security Selection</div><div>High (~100+ picks/yr)</div><div style="color:#10B981;font-weight:700">IC ≈ 0.05 (modest)</div><div style="color:#10B981;font-weight:700">More achievable — lower bar per bet</div></div><div class="lo-compare-row lo-compare-4"><div>🔀 Combined</div><div>Both (if independent)</div><div>Even lower per-bet IC needed</div><div>Best if timing and selection bets are truly independent</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The √BR effect:</strong> Security selection is generally more achievable than market timing because you get many more independent bets. You can be a mediocre stock picker across 200 stocks and outperform a good timer making 12 calls.</div></div>'},
{title:'Describe the practical strengths and limitations of the fundamental law.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Dimension</div><div>Strength</div><div>Limitation</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Framework</div><div style="color:#10B981;font-weight:700">Clear link: skill (IC) × opportunity (BR) × implementation (TC) → performance</div><div>Single-period; doesn\'t capture path-dependent effects</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Breadth</div><div>Shows value of more independent bets</div><div style="color:#EF4444;font-weight:700">Assumes bets are independent — in practice, sector picks are correlated → effective BR &lt; raw count</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 IC</div><div>Diagnoses why a strategy works or fails</div><div style="color:#EF4444;font-weight:700">Hard to measure ex ante, unstable over time</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Returns</div><div>Guides constraint and diversification decisions</div><div>Assumes normal distribution of active returns — ignores tail risk</div></div></div>'}
]},

'pm|etf':{
quickReview:['Creation/redemption: authorized participants (APs) exchange baskets of underlying securities for ETF shares. Keeps price ≈ NAV.','In-kind creation: AP delivers stocks → receives ETF shares. Avoids taxable events (tax advantage over mutual funds).','Tracking error sources: fees, sampling (not holding all index constituents), cash drag, rebalancing lag, securities lending income (can reduce TE).','Bid-ask spread: determined by underlying spread, creation/redemption costs, AP competition, volatility, ETF trading volume.','Premium/discount: ETF price vs. NAV. Persistent premiums/discounts signal AP mechanism issues (illiquid underlyings, market stress).','ETF risks: counterparty (synthetic ETFs), liquidity (underlying vs. ETF), concentration, closure, tracking.','Portfolio uses: core exposure, tactical tilts, transition management, cash equitization, completion portfolios, alternatives access.'],
analogy:'An ETF is like a <em>warehouse club membership card</em>. The card (ETF share) represents ownership of a diversified basket of goods (securities) stored in the warehouse. Authorized participants are the wholesale dealers who can enter the warehouse, assemble baskets of goods, and exchange them for cards (creation) — or return cards to get baskets back (redemption). This constant arbitrage keeps the card\'s trading price close to the actual value of what\'s in the warehouse.',
los:[
{title:'Explain the creation/redemption process of ETFs and the function of authorized participants.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Process</div><div>When Triggered</div><div>AP Action</div><div>Result</div></div><div class="lo-compare-row lo-compare-4"><div style="color:#10B981;font-weight:700">📦 Creation</div><div>ETF trades at premium to NAV</div><div>AP buys underlying securities → delivers basket to issuer → receives new ETF shares → sells on exchange</div><div>Premium narrows (more ETF shares supplied)</div></div><div class="lo-compare-row lo-compare-4"><div style="color:#EF4444;font-weight:700">📤 Redemption</div><div>ETF trades at discount to NAV</div><div>AP buys ETF shares on exchange → returns to issuer → receives underlying securities → sells them</div><div>Discount narrows (ETF shares removed)</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>In-kind process = tax efficiency.</strong> Securities are exchanged (not sold for cash), so no taxable event is triggered for the fund. This is the primary tax advantage of ETFs over mutual funds.</div></div>'},
{title:'Describe how ETFs are traded in secondary markets.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>ETFs</div><div>Mutual Funds</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Trading</div><div style="color:#10B981;font-weight:700">Continuous throughout the day on exchanges</div><div>Once daily at NAV (end of day)</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Price</div><div>Market-determined (supply/demand), arbitraged to NAV</div><div>Always at NAV</div></div><div class="lo-compare-row lo-compare-3"><div>💧 Liquidity</div><div>Two layers: on-screen (order book) + implied (underlying securities via creation/redemption)</div><div>Fund provides liquidity at NAV</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>An ETF can be more liquid than it appears</strong> if its underlyings are liquid. On-screen volume is not the full picture — implied liquidity via the creation/redemption mechanism provides the deeper pool.</div></div>'},
{title:'Describe sources of tracking error for ETFs.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Fees & Expenses</div><div class="lo-icon-card-desc">Drag return below index — largest and most predictable TE source</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Sampling / Optimization</div><div class="lo-icon-card-desc">Not holding all index constituents (especially bond ETFs with thousands of issues)</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">💵</div><div class="lo-icon-card-title">Cash Drag</div><div class="lo-icon-card-desc">Dividends received but not reinvested immediately; cash held for redemptions</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔄</div><div class="lo-icon-card-title">Rebalancing Lag</div><div class="lo-icon-card-desc">Timing differences between index and fund rebalancing + transaction costs</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Securities Lending</div><div class="lo-icon-card-desc">Can REDUCE tracking error by generating income that offsets fees</div></div></div>'},
{title:'Describe factors affecting ETF bid-ask spreads.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Factor</div><div>Narrows Spread</div><div>Widens Spread</div></div><div class="lo-compare-row lo-compare-3"><div>💧 Underlying Liquidity</div><div style="color:#10B981;font-weight:700">Highly liquid underlyings (S&P 500)</div><div style="color:#EF4444;font-weight:700">Illiquid underlyings (EM bonds, small-cap)</div></div><div class="lo-compare-row lo-compare-3"><div>📊 ETF Volume</div><div>High trading volume</div><div>Low trading volume</div></div><div class="lo-compare-row lo-compare-3"><div>🏦 AP Competition</div><div>Many active APs</div><div>Few APs willing to quote</div></div><div class="lo-compare-row lo-compare-3"><div>🌊 Volatility</div><div>Calm markets</div><div style="color:#EF4444;font-weight:700">High volatility, market stress</div></div></div>'},
{title:'Describe sources of ETF premiums and discounts to NAV.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Condition</div><div>Cause</div><div>Severity Signal</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Premium (price &gt; NAV)</div><div>Strong demand; APs can\'t create fast enough; stale NAV for international ETFs</div><div>Small (few bps) = normal. Large/persistent = structural issue.</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Discount (price &lt; NAV)</div><div>Selling pressure; redemption impaired; underlying market frozen</div><div style="color:#EF4444;font-weight:700">Large discount signals AP mechanism stress (e.g., bond ETFs in March 2020)</div></div></div>'},
{title:'Describe costs of owning an ETF.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Cost Type</div><div>Examples</div><div>Dominates When</div><div>Magnitude</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Explicit</div><div>Expense ratio, commissions, bid-ask spread</div><div>—</div><div>3-75+ bps/yr (expense); varies (spread)</div></div><div class="lo-compare-row lo-compare-4"><div>🔍 Implicit</div><div>Tracking error, premium/discount, market impact</div><div>—</div><div>Harder to measure but can be significant</div></div><div class="lo-compare-row lo-compare-4"><div>⏱️ Short Holding Period</div><div>—</div><div style="color:#EF4444;font-weight:700">Trading costs dominate (spread matters most)</div><div>Choose tight-spread ETFs for frequent traders</div></div><div class="lo-compare-row lo-compare-4"><div>📅 Long Holding Period</div><div>—</div><div style="color:#EF4444;font-weight:700">Expense ratio dominates (compounds over years)</div><div>Choose low-expense ETFs for long-term holders</div></div></div>'},
{title:'Describe types of ETF risk.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🤝</div><div class="lo-icon-card-title">Counterparty (Synthetic)</div><div class="lo-icon-card-desc">Synthetic ETFs use swaps — if counterparty defaults, ETF may not deliver index returns</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💧</div><div class="lo-icon-card-title">Liquidity</div><div class="lo-icon-card-desc">Illiquid underlyings can impair creation/redemption → wide spreads, persistent discounts</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">Concentration</div><div class="lo-icon-card-desc">Sector or single-country ETFs concentrate risk in narrow exposures</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🚪</div><div class="lo-icon-card-title">Closure</div><div class="lo-icon-card-desc">Small ETFs may close, forcing liquidation (tax consequences + reinvestment hassle)</div></div></div>'},
{title:'Identify and describe portfolio uses of ETFs.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏗️</div><div class="lo-icon-card-title">Core Exposure</div><div class="lo-icon-card-desc">Broad market beta at ultra-low cost (S&P 500, total bond)</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">Tactical Tilts</div><div class="lo-icon-card-desc">Overweight sectors, countries, or factors based on views</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Cash Equitization</div><div class="lo-icon-card-desc">Invest cash inflows immediately into market ETFs while selecting individual securities</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🔄</div><div class="lo-icon-card-title">Transition Management</div><div class="lo-icon-card-desc">Bridge between old and new allocations during manager changes</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🧩</div><div class="lo-icon-card-title">Completion Portfolios</div><div class="lo-icon-card-desc">Fill gaps in an active manager\'s style or sector exposure</div></div></div>'}
]},

'pm|multifactor':{
quickReview:['APT: expected return = risk-free + Σ(factor sensitivity × factor risk premium). No assumption about market portfolio.','Arbitrage opportunity: portfolio with zero cost, zero risk, positive return. Exists when APT pricing is violated.','Factor models: macroeconomic (GDP, inflation surprises), fundamental (P/B, size, momentum), statistical (PCA-derived).','Uses: risk decomposition, performance attribution, portfolio construction, risk budgeting.','Active risk = Σ(active factor exposures × factor volatilities) + security-specific risk. Tracking error ∝ active factor bets.','Multiple risk dimensions: size, value, momentum, quality, volatility — investors rewarded for bearing systematic risks.'],
analogy:'Multifactor models are like <em>nutrition labels for investments</em>. Instead of just saying "this food has 200 calories" (CAPM — one factor: market), the label breaks it down: protein (value), carbs (growth), fat (size), fiber (quality), vitamins (momentum). Two foods with the same calories can have very different nutritional profiles — and two portfolios with the same expected return can have very different risk exposures. The factor model reveals the hidden "ingredients" of return.',
los:[
{title:'Describe arbitrage pricing theory (APT), including its assumptions and its relation to multifactor models.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Arbitrage Pricing Theory</div><div class="formula-highlight-body">$$E(R_i) = r_f + \\beta_{i,1}\\times\\lambda_1 + \\beta_{i,2}\\times\\lambda_2 + ... + \\beta_{i,k}\\times\\lambda_k$$</div><div class="formula-highlight-note">βᵢⱼ = asset i\'s sensitivity to factor j | λⱼ = risk premium for factor j</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>CAPM</div><div>APT</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Factors</div><div>One (market portfolio)</div><div style="color:#10B981;font-weight:700">Multiple (unspecified — flexible)</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Assumptions</div><div>Market portfolio, utility maximization, normality</div><div style="color:#10B981;font-weight:700">Only: factor model + diversification + no arbitrage</div></div><div class="lo-compare-row lo-compare-3"><div>🔗 Relationship</div><div>Special case of APT</div><div>General framework — CAPM is nested within APT</div></div></div>'},
{title:'Define arbitrage opportunity and determine whether one exists.',explanation:'<div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Arbitrage opportunity:</strong> A portfolio with (1) zero net investment, (2) zero systematic risk, and (3) positive expected return. If a well-diversified portfolio\'s expected return doesn\'t match APT\'s prediction → arbitrage exists.</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">1</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Identify the Mispriced Asset</div><div class="lo-step-desc">Asset\'s expected return differs from what APT predicts given its factor sensitivities</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">2</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Construct Replicating Portfolio</div><div class="lo-step-desc">Long the "cheap" asset, short a combination of factor portfolios that matches its risk exposures</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">3</div></div><div class="lo-step-body"><div class="lo-step-title">Earn Risk-Free Profit</div><div class="lo-step-desc">Net return is positive with zero risk → arbitrage. Market participants exploit → prices adjust → arbitrage disappears.</div></div></div></div>'},
{title:'Calculate the expected return on an asset given factor sensitivities and factor risk premiums.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 APT Return Calculation — Worked Example</div><div class="formula-highlight-body">$$r_f = 3\\%, \\beta_GDP = 1.2, \\beta_inflation = -0.5, \\beta_credit = 0.8$$\n$$\\lambda_GDP = 4\\%, \\lambda_inflation = 2\\%, \\lambda_credit = 3\\%$$\n$$E(R) = 3\\% + 1.2(4\\%) + (-0.5)(2\\%) + 0.8(3\\%)$$\n$$= 3\\% + 4.8\\% - 1.0\\% + 2.4\\% = 9.2\\%$$</div><div class="formula-highlight-note">The asset is compensated for each systematic risk it bears. Negative β on inflation → benefits from inflation surprises → gives up some return premium.</div></div>'},
{title:'Describe and compare macroeconomic, fundamental, and statistical factor models.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Model Type</div><div>Factors</div><div>How Sensitivities Determined</div><div>Best For</div></div><div class="lo-compare-row lo-compare-4"><div>🌍 Macroeconomic</div><div>GDP surprise, inflation surprise, rate changes</div><div>Time-series regression</div><div>Linking returns to economic drivers; intuitive</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Fundamental</div><div>P/B, market cap, earnings yield, momentum</div><div style="color:#10B981;font-weight:700">Asset attributes (observable) → cross-sectional regression</div><div style="color:#10B981;font-weight:700">Most used in practice (Barra, Axioma)</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Statistical</div><div>PCA-extracted from return covariance</div><div>Purely data-driven (no economic interpretation)</div><div>Excellent for risk models; hard for intuitive construction</div></div></div>'},
{title:'Describe uses of multifactor models and interpret the output of analyses based on multifactor models.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Risk Decomposition</div><div class="lo-icon-card-desc">How much risk comes from value tilt vs. size tilt vs. idiosyncratic? Factor attribution of total risk.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Performance Attribution</div><div class="lo-icon-card-desc">Decompose active return into factor allocation effects vs. stock selection (true alpha).</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏗️</div><div class="lo-icon-card-title">Portfolio Construction</div><div class="lo-icon-card-desc">Target specific factor exposures: overweight momentum, be neutral on size, etc.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Risk Budgeting</div><div class="lo-icon-card-desc">Allocate risk budget across factors and managers. Active factor exposures = portfolio β − benchmark β.</div></div></div>'},
{title:'Describe the potential benefits of considering multiple risk dimensions when modeling asset returns.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Factor</div><div>Premium Rationale</div><div>Benefit of Including</div></div><div class="lo-compare-row lo-compare-3"><div>📏 Size</div><div>Small caps are riskier (less liquid, more volatile)</div><div>Explains small-cap outperformance missed by CAPM</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Value</div><div>Cheap stocks bear distress risk</div><div>Explains value premium CAPM can\'t capture</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Momentum</div><div>Behavioral (herding, underreaction) or risk-based</div><div>Strong empirical premium across markets</div></div><div class="lo-compare-row lo-compare-3"><div>⭐ Quality</div><div>Profitable, stable firms command a premium</div><div>Captures defensive characteristic not in market beta</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Low Volatility</div><div>Low-vol stocks earn more than CAPM predicts</div><div>Anomaly — violates CAPM\'s risk-return relationship</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Multi-dimensional benefits:</strong> Better risk measurement (explains more return variance), smarter diversification (across factors, not just assets), improved attribution (skill vs. factor tilts), and avoidance of unintended factor bets.</div></div>'},
{title:'Explain sources of active risk and interpret tracking risk and the information ratio.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Active Risk Decomposition</div><div class="formula-highlight-body">$$\\text{Active risk}^2 = \\sum(active factor exposure^2 \\times factor variance) + active specific risk^2$$\n$$Active factor exposure = portfolio \\beta - benchmark \\beta$$\n$$Tracking error (TE) = \\sigma(R_P - R_B)$$\n$$Information ratio = active \\frac{return}{TE}$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Risk Source</div><div>What Drives It</div><div>Reducible?</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Active Factor Risk</div><div>Deliberate or unintended tilts vs. benchmark (overweight value, underweight size)</div><div>By aligning factor exposures to benchmark (neutral positioning)</div></div><div class="lo-compare-row lo-compare-3"><div>🔍 Active Specific Risk</div><div>Over/underweight individual securities</div><div style="color:#10B981;font-weight:700">By holding more names (diversification reduces idiosyncratic risk)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Most active risk typically comes from factor bets, not stock selection.</strong> A manager who thinks they\'re stock-picking may actually be making a big value or size bet. Factor-aware construction is essential to know what you\'re really doing.</div></div>'}
]},

'pm|market-risk':{
quickReview:['VaR: maximum expected loss at a given confidence level over a given horizon. "5% VaR of $1M" = 5% chance of losing ≥$1M.','Parametric VaR = z_α × σ × √t × portfolio value. Assumes normal distribution. Quick but misses fat tails.','Historical simulation: rank past returns, pick the percentile. No distribution assumption but assumes past = future.','Monte Carlo: simulate thousands of scenarios from a model. Most flexible but computationally intensive and model-dependent.','VaR limitations: doesn\'t measure tail severity (use CVaR/ES), not subadditive (VaR of combined portfolio can exceed sum).','Sensitivity measures: duration, beta, delta, gamma. Scenario analysis: stress test specific events (2008 crisis, rate spike).','Risk constraints: risk budgets, position limits, scenario limits, stop-loss limits. Capital allocation uses RAROC.'],
analogy:'VaR is like a <em>weather forecast that says "there\'s a 5% chance of rain exceeding 2 inches"</em>. It tells you the threshold but NOT how bad the storm could be if it does rain that much — it could be 2.1 inches or a catastrophic flood. Conditional VaR (CVaR) answers the missing question: "If it does rain that much, what\'s the average rainfall?" That\'s why risk managers need both: VaR sets the alarm threshold, CVaR estimates the damage if the alarm goes off.',
los:[
{title:'Explain the use of value at risk (VaR) in measuring portfolio risk.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 Value at Risk (VaR)</div><div class="formula-highlight-body">"1-day 5% VaR = \\$2M" means:\nThere is a 5% probability of losing \\$2M or more in one day.</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Confidence Level</div><div class="lo-icon-card-desc">Typically 95% or 99%. Higher confidence → larger VaR number.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">⏱️</div><div class="lo-icon-card-title">Time Horizon</div><div class="lo-icon-card-desc">1 day for trading desks; 1 month for risk reporting; 10 days for regulatory (Basel).</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">Uses</div><div class="lo-icon-card-desc">Risk reporting, limit setting, capital allocation, regulatory compliance.</div></div></div>'},
{title:'Compare the parametric, historical simulation, and Monte Carlo methods for estimating VaR.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>How It Works</div><div>Strength</div><div>Weakness</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Parametric</div><div>$$VaR = z_\\alpha \\cdot \\sigma_P \\cdot \\sqrt{t} \\cdot V$$</div><div style="color:#10B981;font-weight:700">Fast, analytical, simple</div><div style="color:#EF4444;font-weight:700">Assumes normality + linear exposures → fails for options, fat tails</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Historical Simulation</div><div>Rank actual past returns; pick the percentile cutoff</div><div>No distribution assumption; captures real non-normality</div><div style="color:#EF4444;font-weight:700">Assumes past = future; limited by history length</div></div><div class="lo-compare-row lo-compare-4"><div>🎲 Monte Carlo</div><div>Simulate thousands of price paths from statistical model</div><div style="color:#10B981;font-weight:700">Most flexible — handles non-linear, non-normal, path-dependent</div><div>Computationally expensive; model-dependent</div></div></div>'},
{title:'Estimate and interpret VaR under the parametric, historical simulation, and Monte Carlo methods.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Method</div><div>Worked Example</div><div>Key Detail</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Parametric</div><div>σ_daily = 1.5%, portfolio = $100M, 95% → VaR = 1.645 × 1.5% × $100M = $2.47M. 10-day: × √10 = $7.80M</div><div>√t scaling assumes i.i.d. returns</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Historical</div><div>500 days of returns, sorted. 5% VaR = 25th worst day\'s loss applied to current portfolio</div><div>No parameters needed; data-driven</div></div><div class="lo-compare-row lo-compare-3"><div>🎲 Monte Carlo</div><div>10,000 simulated scenarios. Sort P&L. 5% VaR = 500th worst outcome.</div><div>Model generates scenarios; then same percentile logic</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Interpretation is the same regardless of method:</strong> "We are X% confident the loss will not exceed VaR over the stated horizon."</div></div>'},
{title:'Describe advantages and limitations of VaR.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Dimension</div><div>Advantage</div><div>Limitation</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Communication</div><div style="color:#10B981;font-weight:700">Single intuitive number; understood by boards and regulators</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Comparability</div><div>Comparable across portfolios and asset classes</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Tail Risk</div><div>—</div><div style="color:#EF4444;font-weight:700">Doesn\'t measure tail severity — only the threshold, not how bad it gets beyond</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Subadditivity</div><div>—</div><div style="color:#EF4444;font-weight:700">Not subadditive: VaR(A+B) can exceed VaR(A) + VaR(B) → not a coherent risk measure</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Inputs</div><div>—</div><div>Backward-looking inputs may miss regime changes; confidence level is arbitrary</div></div></div>'},
{title:'Describe extensions of VaR.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Extension</div><div>What It Measures</div><div>Formula / Logic</div><div>Use Case</div></div><div class="lo-compare-row lo-compare-4"><div>📊 CVaR / Expected Shortfall</div><div>Average loss GIVEN VaR is exceeded</div><div>E[Loss | Loss &gt; VaR]. If 5% VaR = $2M, CVaR = $3.5M</div><div style="color:#10B981;font-weight:700">Tail severity; coherent risk measure (subadditive)</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Incremental VaR</div><div>Change in portfolio VaR from adding a position</div><div>VaR(with position) − VaR(without)</div><div>Position-level risk budgeting</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Marginal VaR</div><div>Sensitivity of VaR to small change in position size</div><div>∂VaR / ∂w_i</div><div>Optimal risk allocation across positions</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Relative VaR</div><div>VaR of active return (portfolio − benchmark)</div><div>Ex-ante tracking error framework</div><div>Active risk budgeting</div></div></div>'},
{title:'Describe sensitivity risk measures and scenario risk measures and compare to VaR.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Measure Type</div><div>Examples</div><div>Strength</div><div>Limitation</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Sensitivity</div><div>Duration, beta, delta, gamma, DV01</div><div>Intuitive, quick, direct link to hedging</div><div style="color:#EF4444;font-weight:700">Local only (small changes); single-factor; hard to aggregate across asset classes</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Scenario</div><div>"What if 2008 repeats?" "What if rates +200bps + spreads +100bps?"</div><div>Captures non-linear, tail, and multi-factor effects</div><div style="color:#EF4444;font-weight:700">Subjective selection; infinite possible scenarios; no probability attached</div></div><div class="lo-compare-row lo-compare-4"><div>📈 VaR</div><div>Probabilistic aggregate loss estimate</div><div>Aggregate; comparable; probabilistic</div><div>Misses tails; distribution-dependent</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Use all three as complements.</strong> VaR gives the probabilistic overview. Sensitivities give the granular hedge-able exposures. Scenarios stress-test the extremes. No single measure is sufficient alone.</div></div>'},
{title:'Demonstrate how equity, fixed-income, and options exposure measures may be used in measuring and managing market risk and volatility risk.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Asset Class</div><div>Key Risk Measures</div><div>What They Capture</div><div>Stress Test Example</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Equity</div><div>Beta, factor exposures (size, value, momentum)</div><div>Systematic + factor-level risk</div><div>2008: −50%; COVID crash: −34%</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Fixed Income</div><div>Duration, key rate durations, DV01, convexity, spread duration</div><div>Rate risk (parallel + non-parallel) + credit risk</div><div>Rates +200bps → price Δ ≈ −duration × 2%</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Options</div><div>Delta, gamma, vega, theta</div><div>Directional, convexity, volatility, time decay</div><div>$$\\Delta P \\approx \\text{vega} \\times 10$$</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Integration:</strong> Convert all exposures to a common risk currency (VaR dollars) for enterprise-level measurement. A bank\'s trading desk combines equity beta, bond duration, and option Greeks into one VaR number.</div></div>'},
{title:'Describe the use of sensitivity risk measures and scenario risk measures.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Application</div><div>Sensitivity Measures</div><div>Scenario Analysis</div></div><div class="lo-compare-row lo-compare-3"><div>🏦 Limit Setting</div><div>Duration within ±0.5yr of benchmark; beta target ±0.1; delta limits per desk</div><div>Max loss under prescribed scenarios (CCAR, EBA stress tests)</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Position Sizing</div><div>DV01 guides bond position sizing relative to risk budget</div><div>Stress test informs how much exposure to hold before tail risk exceeds tolerance</div></div><div class="lo-compare-row lo-compare-3"><div>🛡️ Hedging</div><div>Duration → hedge with bond futures; delta → hedge with underlying</div><div>Scenarios reveal multi-factor exposures that single sensitivities miss</div></div></div>'},
{title:'Describe advantages and limitations of sensitivity and scenario risk measures.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Measure</div><div>Advantages</div><div>Limitations</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Sensitivity</div><div>Simple, intuitive, easily communicated, direct link to hedging actions</div><div style="color:#EF4444;font-weight:700">Local approximations (fail for large moves), single-factor, don\'t aggregate well</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Scenario</div><div>Captures non-linear + tail risks, narratively grounded, considers joint moves</div><div style="color:#EF4444;font-weight:700">Subjective selection, backward-looking bias, may miss novel risks, no probability</div></div></div>'},
{title:'Explain constraints used in managing market risks, including risk budgeting, position limits, scenario limits, and stop-loss limits.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Constraint</div><div>How It Works</div><div>Purpose</div><div>Drawback</div></div><div class="lo-compare-row lo-compare-4"><div>⚖️ Risk Budgets</div><div>Allocate total VaR/TE across desks or strategies</div><div>Each unit spends risk capital on best ideas</div><div>Requires accurate VaR estimation</div></div><div class="lo-compare-row lo-compare-4"><div>📏 Position Limits</div><div>Max exposure to single issuer, sector, or asset class</div><div>Prevent concentration risk</div><div>May be too rigid; miss opportunity cost</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Scenario Limits</div><div>Max loss under specific stress scenarios</div><div>"Survive a 2008-type event with &lt;20% drawdown"</div><div>Scenario selection is subjective</div></div><div class="lo-compare-row lo-compare-4"><div>🛑 Stop-Loss Limits</div><div>Exit position/strategy if cumulative losses exceed threshold</div><div>Prevents "hope and pray" risk management</div><div style="color:#EF4444;font-weight:700">Can force selling at the worst time (capitulation)</div></div></div>'},
{title:'Explain how risk measures may be used in capital allocation decisions.',explanation:'<div class="formula-highlight" style="--active-color:#64748B"><div class="formula-highlight-title" style="color:#64748B">📐 RAROC (Risk-Adjusted Return on Capital)</div><div class="formula-highlight-body">$$RAROC = Expected \\frac{Return}{Economic} Capital (VaR)$$</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">1</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Estimate Economic Capital</div><div class="lo-step-desc">Calculate VaR or regulatory capital for each business unit</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">2</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Calculate RAROC</div><div class="lo-step-desc">Expected return ÷ economic capital for each unit → compare efficiency on common basis</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">3</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Set Hurdle Rate</div><div class="lo-step-desc">Hurdle = cost of equity. Only pursue activities with RAROC &gt; hurdle.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">4</div></div><div class="lo-step-body"><div class="lo-step-title">Allocate Capital</div><div class="lo-step-desc">Shift capital toward highest-RAROC units → maximize risk-adjusted value creation</div></div></div></div>'},
{title:'Describe risk measures used by banks, asset managers, pension funds, and insurers.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Institution</div><div>Primary Risk Measures</div><div>Regulatory Framework</div></div><div class="lo-compare-row lo-compare-3"><div>🏦 Banks</div><div>VaR (trading book), credit VaR, CET1 ratio, leverage ratio, LCR/NSFR, stress test results</div><div>Basel III/IV, CCAR (US), EBA (EU)</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Asset Managers</div><div>Tracking error, IR, Sharpe, max drawdown, factor exposures, relative VaR</div><div>IPS constraints, regulatory AUM limits</div></div><div class="lo-compare-row lo-compare-3"><div>🏛️ Pension Funds</div><div>Surplus at risk (assets − liabilities VaR), funded ratio, duration mismatch, LDI metrics</div><div>ERISA (US), local pension regulation</div></div><div class="lo-compare-row lo-compare-3"><div>🛡️ Insurers</div><div>Combined ratio, RBC ratio, claims reserves, A/L duration match, catastrophe PML</div><div>Solvency II (EU), state regulation (US)</div></div></div>'}
]},

'pm|backtest':{
quickReview:['Backtesting: test an investment strategy on historical data before deploying real capital.','Steps: specify strategy rules → select historical period → apply rules mechanically → measure performance → analyze results.','Key metrics: total return, Sharpe ratio, max drawdown, turnover, capacity, hit rate, profit factor.','Problems: survivorship bias, look-ahead bias, data snooping/overfitting, transaction cost underestimation, regime change.','Historical scenario: apply a specific historical period\'s conditions to the current portfolio. Good for stress testing.','Monte Carlo vs. historical: Monte Carlo generates synthetic scenarios (more flexible, captures tail risk); historical uses actual past data (no model risk but limited by history).','Sensitivity analysis: vary key assumptions (costs, signal thresholds, holding periods) to test robustness.'],
analogy:'Backtesting is like <em>a dress rehearsal before opening night</em>. You perform the play (strategy) exactly as planned, but on a stage built from historical data instead of live markets. Problems: the audience (market conditions) may behave differently on opening night. Data snooping is like rewriting the script to get standing ovations in rehearsal — it guarantees a great rehearsal but tells you nothing about the real performance. The best dress rehearsals use realistic conditions and don\'t change the script mid-act.',
los:[
{title:'Describe objectives in backtesting an investment strategy.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">✅</div><div class="lo-icon-card-title">Validate</div><div class="lo-icon-card-desc">Confirm the strategy\'s logic produces positive risk-adjusted returns in historical data</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">Calibrate</div><div class="lo-icon-card-desc">Tune parameters: signal thresholds, rebalancing frequency, position sizing</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Estimate</div><div class="lo-icon-card-desc">Realistic performance expectations: return, risk, drawdowns, turnover</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🔍</div><div class="lo-icon-card-title">Identify Failures</div><div class="lo-icon-card-desc">Find scenarios where the strategy breaks down (regime sensitivity, tail events)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>A backtest is necessary but NOT sufficient.</strong> A strategy that fails in backtesting almost certainly fails live. One that succeeds in backtesting may or may not succeed live — overfitting is the primary danger.</div></div>'},
{title:'Describe and contrast steps and procedures in backtesting an investment strategy.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">1</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Define Strategy Rules</div><div class="lo-step-desc">Entry, exit, sizing — must be fully systematic and mechanical. No discretionary overrides.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">2</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Select Data & Universe</div><div class="lo-step-desc">Long enough to cover multiple regimes. Point-in-time data to avoid survivorship bias.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">3</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Apply Rules Mechanically</div><div class="lo-step-desc">Record all trades, positions, and returns. No hindsight adjustments.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">4</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Measure & Analyze</div><div class="lo-step-desc">Performance metrics, attribution, drawdown analysis, regime sensitivity</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">5</div></div><div class="lo-step-body"><div class="lo-step-title">Out-of-Sample Validation</div><div class="lo-step-desc">Test on data NOT used for development. Walk-forward analysis: roll in-sample/out-of-sample windows forward.</div></div></div></div>'},
{title:'Interpret metrics and visuals reported in a backtest.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Category</div><div>Metrics</div><div>What It Tells You</div><div>Red Flag If</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Return</div><div>CAGR, cumulative, monthly distribution</div><div>Magnitude and consistency of returns</div><div>Returns come from a few outlier periods</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Risk</div><div>Volatility, Sharpe, Sortino, max drawdown, drawdown duration</div><div>Risk-adjusted quality and worst-case behavior</div><div style="color:#EF4444;font-weight:700">Sharpe &gt; 2.0 (likely overfit); max DD recovery &gt; 2yrs</div></div><div class="lo-compare-row lo-compare-4"><div>⚡ Efficiency</div><div>Hit rate, profit factor (gross wins / gross losses)</div><div>Trade quality and consistency</div><div>High hit rate + tiny avg win, low hit rate + no massive winners</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Costs</div><div>Turnover, transaction costs as % of returns</div><div>Implementation feasibility</div><div style="color:#EF4444;font-weight:700">Turnover so high that costs consume the alpha</div></div></div>'},
{title:'Identify problems in a backtest of an investment strategy.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Bias</div><div>What Goes Wrong</div><div>Fix</div></div><div class="lo-compare-row lo-compare-3"><div>👻 Survivorship Bias</div><div>Data only includes surviving companies/funds → overstates returns (dead losers removed)</div><div>Use point-in-time databases that include delisted securities</div></div><div class="lo-compare-row lo-compare-3"><div>🔮 Look-Ahead Bias</div><div>Using information not yet available at decision time (e.g., full-year earnings before annual report published)</div><div>Use only data available as of each trading date; lag data appropriately</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">🎣 Data Snooping / Overfitting</div><div>Testing many variations, reporting only the winner → fits noise, not signal</div><div style="color:#10B981;font-weight:700">Out-of-sample testing; Bonferroni adjustments; limit degrees of freedom</div></div><div class="lo-compare-row lo-compare-3"><div>💸 Cost Underestimation</div><div>Ignoring bid-ask, market impact, slippage. High-turnover strategies most vulnerable.</div><div>Use realistic cost models; test at 2× estimated costs</div></div><div class="lo-compare-row lo-compare-3"><div>🔄 Regime Change</div><div>Past market structure may not repeat (e.g., pre- vs. post-electronic trading)</div><div>Test across multiple regimes; be skeptical of single-regime results</div></div></div>'},
{title:'Evaluate and interpret a historical scenario analysis.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">1</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Select Historical Event</div><div class="lo-step-desc">2008 financial crisis, 2020 COVID crash, 2022 rate shock, etc.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">2</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Extract Period Returns</div><div class="lo-step-desc">Asset class returns during that specific period</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">3</div><div class="lo-step-connector" style="background:#64748B;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Apply to Current Portfolio</div><div class="lo-step-desc">Apply historical returns to current portfolio weights → calculate the hypothetical loss</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#64748B">4</div></div><div class="lo-step-body"><div class="lo-step-title">Interpret with Caveats</div><div class="lo-step-desc">Concrete and relatable, but: past correlations may not repeat, portfolio may hold assets that didn\'t exist then, next crisis may look different.</div></div></div></div>'},
{title:'Contrast Monte Carlo and historical simulation approaches.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>Historical Simulation</div><div>Monte Carlo</div><div>Key Trade-off</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Data Source</div><div>Actual historical returns</div><div>Synthetic scenarios from statistical model</div><div>Real data vs. model-generated</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Distribution</div><div>No assumption — uses realized distribution</div><div>Must specify (normal, t, copula)</div><div style="color:#EF4444;font-weight:700">Historical = no model risk; MC = model risk</div></div><div class="lo-compare-row lo-compare-4"><div>🌊 Novel Scenarios</div><div style="color:#EF4444;font-weight:700">Cannot generate events never seen before</div><div style="color:#10B981;font-weight:700">Can produce tail events beyond history</div><div>MC captures "unknown unknowns" better</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Flexibility</div><div>Limited to actual history</div><div style="color:#10B981;font-weight:700">"What if" analysis — change any parameter</div><div>MC wins for options, path-dependent, tail risk</div></div></div>'},
{title:'Explain inputs and decisions in simulation and interpret a simulation.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📐</div><div class="lo-icon-card-title">Model Specification</div><div class="lo-icon-card-desc">Return distribution: normal, t-distribution, copula for dependencies. The most consequential choice.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Parameter Estimation</div><div class="lo-icon-card-desc">Mean returns, volatilities, correlations — from historical data or forward estimates.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🎲</div><div class="lo-icon-card-title">Number of Scenarios</div><div class="lo-icon-card-desc">More = more precise but slower. Typically 10,000+ for reliable tail estimates.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⏱️</div><div class="lo-icon-card-title">Time Horizon & Path</div><div class="lo-icon-card-desc">Daily vs. monthly steps. Does the strategy depend on the PATH or just the endpoint?</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Interpretation:</strong> Examine the distribution of outcomes — mean, median, percentiles (5th, 95th), probability of loss, probability of meeting a target. Simulation provides a <em>probability distribution</em> of results, not a single point estimate.</div></div>'},
{title:'Demonstrate the use of sensitivity analysis.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Input Varied</div><div>Test Question</div><div>What a Robust Strategy Shows</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Transaction Costs</div><div>Does the strategy survive at 2× estimated costs?</div><div>Returns degrade gradually, remain positive</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Signal Threshold</div><div>Is performance robust or cliff-edge at the chosen cutoff?</div><div>Similar returns across a range of thresholds</div></div><div class="lo-compare-row lo-compare-3"><div>⏱️ Holding Period</div><div>Daily vs. weekly vs. monthly rebalancing — which works?</div><div>Works across multiple frequencies</div></div><div class="lo-compare-row lo-compare-3"><div>📅 Lookback Window</div><div>Does signal construction depend on exact window length?</div><div>Stable performance across 6mo, 9mo, 12mo, etc.</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Robust vs. fragile:</strong> A robust strategy performs well across a range of reasonable assumptions. A fragile strategy works only under narrow conditions — likely overfit. Sensitivity analysis is the single best tool for distinguishing the two.</div></div>'}
]},
