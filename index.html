<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level II — Study Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
[data-theme="dark"] {
  --bg-primary: #0F1117; --bg-secondary: #161922; --bg-tertiary: #1E2130;
  --bg-card: #1A1D2B; --text-primary: #E8E9ED; --text-secondary: #9CA0B0;
  --text-muted: #5C6078; --border-color: #2A2D3E; --border-subtle: #22253A;
  --shadow-card: 0 8px 24px #00000040; --code-bg: #252838; --formula-bg: #1C1F30;
  --check-tick: #0F1117;
}
[data-theme="light"] {
  --bg-primary: #F4F5F7; --bg-secondary: #FFFFFF; --bg-tertiary: #E9EBF0;
  --bg-card: #FFFFFF; --text-primary: #1A1D2B; --text-secondary: #4A5068;
  --text-muted: #8890A6; --border-color: #D8DCE6; --border-subtle: #E2E5EE;
  --shadow-card: 0 8px 24px #0000000F; --code-bg: #EDF0F7; --formula-bg: #EDF0F7;
  --check-tick: #FFFFFF;
}
:root {
  --c-quant:#3B82F6;--c-quant-dim:#3B82F620;--c-econ:#10B981;--c-econ-dim:#10B98120;
  --c-fsa:#F59E0B;--c-fsa-dim:#F59E0B20;--c-corp:#A855F7;--c-corp-dim:#A855F720;
  --c-equity:#EF4444;--c-equity-dim:#EF444420;--c-fi:#14B8A6;--c-fi-dim:#14B8A620;
  --c-deriv:#6366F1;--c-deriv-dim:#6366F120;--c-alt:#F97316;--c-alt-dim:#F9731620;
  --c-pm:#64748B;--c-pm-dim:#64748B20;--c-ethics:#EAB308;--c-ethics-dim:#EAB30820;
  --sidebar-w:280px;--header-h:64px;--radius:12px;--radius-sm:8px;
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;transition:background var(--transition),color var(--transition);}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px}
.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-secondary);border-right:1px solid var(--border-color);display:flex;flex-direction:column;overflow:hidden;z-index:10;transition:background var(--transition),border-color var(--transition)}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text-primary);letter-spacing:-0.5px}
.sidebar-logo span{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);display:block;margin-top:2px}

/* Theme toggle */
.sidebar .theme-toggle{width:38px;height:38px;border-radius:10px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.sidebar .theme-toggle:hover{border-color:var(--text-muted);transform:scale(1.05)}
.theme-toggle svg{width:18px;height:18px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.theme-toggle .sun{display:none}
.theme-toggle .moon{display:block}
[data-theme="light"] .theme-toggle .sun{display:block}
[data-theme="light"] .theme-toggle .moon{display:none}

.sidebar-progress{padding:16px 20px;border-bottom:1px solid var(--border-color)}
.progress-label{display:flex;justify-content:space-between;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.progress-label .pct{color:var(--text-secondary)}
.progress-bar-track{height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--c-quant),var(--c-econ),var(--c-fsa),var(--c-equity),var(--c-ethics));transition:width 0.6s ease}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 10px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--bg-tertiary)}
.nav-item.active{background:var(--active-dim,var(--bg-tertiary))}
.nav-item.active .nav-label{color:var(--text-primary);font-weight:600}
.nav-dot{width:10px;height:10px;min-width:10px;border-radius:50%;background:var(--dot-color,var(--text-muted));opacity:0.6;transition:all var(--transition)}
.nav-item.active .nav-dot,.nav-item:hover .nav-dot{opacity:1;transform:scale(1.2)}
.nav-label{font-size:13px;font-weight:500;color:var(--text-secondary);transition:color var(--transition);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--dot-color,var(--text-muted));color:var(--bg-primary);opacity:0.7;min-width:20px;text-align:center}
.nav-item.active .nav-badge{opacity:1}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border-color);display:flex;flex-direction:column;gap:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-secondary);font-weight:500}
.toggle-switch{width:36px;height:20px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:10px;cursor:pointer;position:relative;transition:all var(--transition)}
.toggle-switch.on{background:var(--c-quant);border-color:var(--c-quant)}
.toggle-switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--text-primary);top:2px;left:2px;transition:transform var(--transition)}
.toggle-switch.on::after{transform:translateX(16px)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{height:var(--header-h);min-height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-bottom:1px solid var(--border-color);background:var(--bg-secondary);transition:background var(--transition),border-color var(--transition)}
.topic-title-area{display:flex;align-items:center;gap:14px}
.topic-number{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;letter-spacing:0.5px}
.topic-title{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.3px}
.header-stats{display:flex;align-items:center;gap:20px}
.stat-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);font-weight:500}
.stat-chip svg{opacity:0.6}

.subtopic-tabs-wrapper{background:var(--bg-secondary);border-bottom:1px solid var(--border-color);padding:0 32px;overflow-x:auto;white-space:nowrap;transition:background var(--transition),border-color var(--transition)}
.subtopic-tabs{display:inline-flex;gap:0;min-width:100%}
.subtab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition);white-space:nowrap;user-select:none}
.subtab:hover{color:var(--text-secondary)}
.subtab.active{color:var(--text-primary);border-bottom-color:var(--active-color,var(--text-primary))}
.content-scroll{flex:1;overflow-y:auto;padding:32px}
.content-inner{max-width:960px;margin:0 auto}

/* Welcome */
.welcome-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:24px}
.welcome-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.welcome-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--text-muted));opacity:0.7;transition:opacity var(--transition)}
.welcome-card:hover{border-color:var(--card-color,var(--text-muted));transform:translateY(-2px);box-shadow:var(--shadow-card)}
.welcome-card:hover::before{opacity:1}
.wc-number{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--card-color,var(--text-muted));margin-bottom:8px}
.wc-title{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:10px;color:var(--text-primary)}
.wc-meta{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:12px}
.wc-progress-mini{height:3px;background:var(--bg-tertiary);border-radius:2px;margin-top:14px;overflow:hidden}
.wc-progress-fill{height:100%;width:0%;border-radius:2px;transition:width 0.6s ease}

/* Content blocks */
.section-block{margin-bottom:32px}
.section-heading{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-heading .dot{width:8px;height:8px;border-radius:50%}

/* LO bento grid — summary cards */
.lo-list{list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.lo-item{display:flex;flex-direction:column;padding:0;border-radius:var(--radius);transition:all var(--transition);cursor:pointer;border:1px solid var(--border-color);background:var(--bg-card);overflow:hidden;position:relative}
.lo-item:hover{border-color:var(--active-color,var(--c-quant));box-shadow:var(--shadow-card);transform:translateY(-2px)}
.lo-item.checked{border-color:var(--active-color,var(--c-quant))}
.lo-item.checked::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--active-color,var(--c-quant))}
.lo-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-subtle);background:var(--bg-tertiary);transition:background var(--transition)}
.lo-item.checked .lo-header{background:var(--active-dim,var(--bg-tertiary))}
.lo-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text-muted);min-width:20px}
.lo-check-dot{width:8px;height:8px;min-width:8px;border-radius:50%;border:2px solid var(--border-color);margin-left:auto;transition:all var(--transition)}
.lo-item.checked .lo-check-dot{border-color:var(--active-color,var(--c-quant));background:var(--active-color,var(--c-quant))}
.lo-peek-icon{margin-left:6px;opacity:0;transition:opacity var(--transition);color:var(--text-muted)}
.lo-item:hover .lo-peek-icon{opacity:1}
.lo-peek-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.lo-content{flex:1;padding:12px 14px}
.lo-title{font-size:12.5px;line-height:1.5;color:var(--text-primary);font-weight:500}
.lo-item.checked .lo-title{color:var(--text-muted)}
.lo-summary{font-size:11.5px;line-height:1.5;color:var(--text-muted);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
@media(max-width:900px){.lo-list{grid-template-columns:1fr}}

/* Peek modal */
.peek-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:none;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity 0.2s ease}
.peek-overlay.open{display:flex;opacity:1}
[data-theme="light"] .peek-overlay{background:rgba(0,0,0,0.35)}
.peek-panel{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;width:100%;max-width:680px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.4);animation:peekIn 0.25s ease}
[data-theme="light"] .peek-panel{box-shadow:0 24px 80px rgba(0,0,0,0.15)}
@keyframes peekIn{from{opacity:0;transform:translateY(16px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.peek-top{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border-color);flex-shrink:0}
.peek-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;letter-spacing:0.5px}
.peek-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.peek-nav-btn{width:32px;height:32px;border-radius:8px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);color:var(--text-secondary)}
.peek-nav-btn:hover{background:var(--bg-card);border-color:var(--text-muted)}
.peek-nav-btn.disabled{opacity:0.3;pointer-events:none}
.peek-nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.peek-close{width:32px;height:32px;border-radius:8px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);color:var(--text-secondary);margin-left:8px}
.peek-close:hover{background:var(--bg-card);border-color:var(--text-muted);color:var(--text-primary)}
.peek-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.peek-body{flex:1;overflow-y:auto;padding:24px}
.peek-title{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.45;margin-bottom:16px;color:var(--text-primary)}
.peek-explanation{font-size:13.5px;line-height:1.7;color:var(--text-secondary)}
.peek-explanation p{margin-bottom:10px}
.peek-explanation p:last-child{margin-bottom:0}
.peek-bottom{display:flex;align-items:center;gap:12px;padding:14px 20px;border-top:1px solid var(--border-color);flex-shrink:0}
.peek-check-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-tertiary);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all var(--transition);font-family:'DM Sans',sans-serif}
.peek-check-btn:hover{border-color:var(--active-color,var(--c-quant));color:var(--text-primary)}
.peek-check-btn.is-checked{background:var(--active-color,var(--c-quant));border-color:var(--active-color,var(--c-quant));color:#fff}
.peek-check-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.peek-lo-count{font-size:12px;color:var(--text-muted);margin-left:auto;font-family:'JetBrains Mono',monospace}
@media(max-width:768px){.peek-panel{max-width:100%;max-height:100vh;height:100vh;border-radius:0;margin:0}.peek-overlay{padding:0}.peek-body{padding:16px}.peek-top{padding:12px 16px}.peek-bottom{padding:12px 16px}.peek-check-btn{flex:1;justify-content:center}}

/* Formula */
.formula-box{background:var(--formula-bg);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:12px 16px;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--text-primary);line-height:1.75;overflow-x:auto;white-space:pre-wrap}
.formula-box .label{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;display:block}

/* Analogy */
.analogy-box{background:linear-gradient(135deg,var(--active-dim,#3B82F620),transparent);border:1px solid var(--active-color,var(--c-quant));border-left:4px solid var(--active-color,var(--c-quant));border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:16px 18px;margin:16px 0}
.analogy-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--active-color,var(--c-quant));margin-bottom:6px;display:flex;align-items:center;gap:6px}
.analogy-text{font-size:13px;line-height:1.65;color:var(--text-secondary);font-style:italic}

.key-term{display:inline;font-weight:600;color:var(--active-color,var(--c-quant))}

/* Quick review */
.quick-review-box{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;display:none}
.quick-review-box.visible{display:block}
.qr-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.qr-title svg{opacity:0.5}
.qr-bullets{list-style:none;display:flex;flex-direction:column;gap:6px}
.qr-bullets li{font-size:13px;color:var(--text-secondary);padding-left:20px;position:relative;line-height:1.55}
.qr-bullets li::before{content:'→';position:absolute;left:0;color:var(--active-color,var(--text-muted))}

/* Placeholder */
.placeholder-state{text-align:center;padding:60px 20px}
.placeholder-icon{width:64px;height:64px;border-radius:50%;background:var(--bg-tertiary);margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.placeholder-icon svg{width:28px;height:28px;stroke:var(--text-muted);fill:none;stroke-width:1.5}
.placeholder-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text-secondary);margin-bottom:8px}
.placeholder-desc{font-size:13px;color:var(--text-muted);max-width:400px;margin:0 auto;line-height:1.6}

/* Welcome hero */
.intro-hero{text-align:center;padding:40px 20px 30px}
.intro-hero h1{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:12px;letter-spacing:-0.5px}
.intro-hero p{font-size:15px;color:var(--text-secondary);max-width:520px;margin:0 auto;line-height:1.65}
.stats-row{display:flex;justify-content:center;gap:32px;margin-top:28px}
.stat-block{text-align:center}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:var(--text-primary)}
.stat-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.35s ease forwards}

/* ── Mobile bar (hidden on desktop) ── */
.mobile-bar{display:none}

/* ── Sidebar overlay backdrop ── */
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9;opacity:0;transition:opacity 0.25s ease}
.sidebar-backdrop.open{opacity:1}
[data-theme="light"] .sidebar-backdrop{background:rgba(0,0,0,0.25)}

/* ══════════════════════════════════════════
   MOBILE RESPONSIVE — max-width: 768px
   ══════════════════════════════════════════ */
@media(max-width:768px){
  /* Sidebar: hidden by default, slides in as drawer */
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:11;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);width:280px;min-width:280px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:block;pointer-events:none}
  .sidebar-backdrop.open{pointer-events:auto}

  /* Mobile top bar */
  .mobile-bar{display:flex;align-items:center;gap:10px;padding:0 14px;height:52px;min-height:52px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);z-index:5;transition:background var(--transition),border-color var(--transition)}
  .mobile-bar-btn{width:36px;height:36px;border-radius:8px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--transition);flex-shrink:0}
  .mobile-bar-btn:active{background:var(--bg-tertiary)}
  .mobile-bar-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .mobile-bar-title{flex:1;font-family:'DM Serif Display',serif;font-size:16px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .mobile-bar-back{display:none}
  .mobile-bar-back.visible{display:flex}
  .mobile-bar-menu.hidden{display:none}
  .mobile-bar-progress{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);flex-shrink:0}

  /* Hide desktop header on mobile */
  .main-header{display:none}

  /* Subtabs: better touch targets */
  .subtopic-tabs-wrapper{padding:0 10px;-webkit-overflow-scrolling:touch}
  .subtab{padding:10px 14px;font-size:12px;min-height:40px}

  /* Content */
  .content-scroll{padding:16px 14px}
  .content-inner{max-width:100%}

  /* Welcome hero: scale down */
  .intro-hero{padding:24px 12px 20px}
  .intro-hero h1{font-size:24px}
  .intro-hero p{font-size:13px}
  .stats-row{gap:16px;flex-wrap:wrap}
  .stat-value{font-size:22px}
  .stat-label{font-size:10px}

  /* Welcome grid: single column */
  .welcome-grid{grid-template-columns:1fr;gap:10px;margin-top:16px}
  .welcome-card{padding:16px}
  .wc-title{font-size:15px}

  /* LO bento grid: single column */
  .lo-list{grid-template-columns:1fr;gap:10px}
  .lo-title{font-size:13px}
  .lo-summary{font-size:11px}

  /* Section heading */
  .section-heading{font-size:17px}

  /* Analogy box */
  .analogy-box{padding:12px 14px;margin:12px 0}
  .analogy-text{font-size:12px}

  /* Quick review */
  .quick-review-box{padding:14px 16px}
  .qr-bullets li{font-size:12px}

  /* Formula box */
  .formula-box{font-size:11px;padding:10px 12px}
}
/* ══ Flashcards ══ */
.fc-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--radius-sm);background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all var(--transition);width:100%;justify-content:center;letter-spacing:0.3px}
.fc-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,0.35)}
.fc-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* Flashcard overlay */
.fc-overlay{position:fixed;inset:0;background:var(--bg-primary);z-index:200;display:none;flex-direction:column;overflow:hidden;transition:opacity 0.2s ease}
.fc-overlay.open{display:flex}

/* FC Header */
.fc-header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border-color);background:var(--bg-secondary);flex-shrink:0}
.fc-header-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text-primary);flex:1}
.fc-header-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500}
.fc-close{width:36px;height:36px;border-radius:8px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--transition)}
.fc-close:hover{border-color:var(--text-muted);color:var(--text-primary)}
.fc-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* FC Deck Selector */
.fc-deck-view{flex:1;overflow-y:auto;padding:24px}
.fc-deck-inner{max-width:700px;margin:0 auto}
.fc-deck-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.fc-stat-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:14px;text-align:center}
.fc-stat-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--text-primary)}
.fc-stat-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
.fc-deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.fc-deck-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.fc-deck-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0.7}
.fc-deck-card:hover{border-color:var(--border-color);transform:translateY(-2px);box-shadow:var(--shadow-card)}
.fc-deck-name{font-family:'DM Serif Display',serif;font-size:15px;margin-bottom:8px;color:var(--text-primary)}
.fc-deck-meta{font-size:11px;color:var(--text-muted);display:flex;gap:12px}
.fc-deck-due{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;margin-top:10px}
.fc-deck-bar{height:3px;background:var(--bg-tertiary);border-radius:2px;margin-top:8px;overflow:hidden;display:flex}
.fc-deck-bar span{height:100%}

/* FC Study Session */
.fc-study{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative}
.fc-progress-bar{width:100%;max-width:500px;height:4px;background:var(--bg-tertiary);border-radius:2px;margin-bottom:24px;overflow:hidden}
.fc-progress-fill{height:100%;border-radius:2px;transition:width 0.3s ease}
.fc-card-wrapper{perspective:1000px;width:100%;max-width:500px;min-height:280px;cursor:pointer}
.fc-card{position:relative;width:100%;min-height:280px;transform-style:preserve-3d;transition:transform 0.5s ease}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--border-color);display:flex;flex-direction:column;overflow:hidden}
.fc-card-front{background:var(--bg-card)}
.fc-card-back{background:var(--bg-secondary);transform:rotateY(180deg)}
.fc-card-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 20px;border-bottom:1px solid var(--border-color);color:var(--text-muted)}
.fc-card-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-card-front .fc-card-body{font-size:15px;line-height:1.65;color:var(--text-primary);font-weight:500}
.fc-card-back .fc-card-body{font-size:14px;line-height:1.65;color:var(--text-secondary);text-align:left;align-items:flex-start;overflow-y:auto}
.fc-card-hint{font-size:11px;color:var(--text-muted);padding:8px 20px;text-align:center;border-top:1px solid var(--border-color)}
.fc-rating{display:flex;gap:8px;margin-top:20px;width:100%;max-width:500px}
.fc-rating-btn{flex:1;padding:12px 8px;border-radius:var(--radius-sm);border:1px solid var(--border-color);background:var(--bg-card);cursor:pointer;text-align:center;transition:all var(--transition);font-family:'DM Sans',sans-serif}
.fc-rating-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-card)}
.fc-rating-btn .label{font-size:12px;font-weight:600;display:block}
.fc-rating-btn .sub{font-size:10px;color:var(--text-muted);margin-top:2px;display:block}
.fc-rating-btn.again{border-color:#EF444460}.fc-rating-btn.again:hover{background:#EF444415;border-color:#EF4444}
.fc-rating-btn.hard{border-color:#F59E0B60}.fc-rating-btn.hard:hover{background:#F59E0B15;border-color:#F59E0B}
.fc-rating-btn.good{border-color:#10B98160}.fc-rating-btn.good:hover{background:#10B98115;border-color:#10B981}
.fc-rating-btn.easy{border-color:#3B82F660}.fc-rating-btn.easy:hover{background:#3B82F615;border-color:#3B82F6}
.fc-rating.hidden{display:none}
.fc-empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.fc-empty-icon{font-size:40px;margin-bottom:12px}
.fc-empty-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text-secondary);margin-bottom:6px}
.fc-done-btn{margin-top:16px;padding:10px 24px;border-radius:var(--radius-sm);background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);font-family:'DM Sans',sans-serif;transition:all var(--transition)}
.fc-done-btn:hover{border-color:var(--text-muted);color:var(--text-primary)}
@media(max-width:768px){.fc-header{padding:12px 14px}.fc-header-title{font-size:15px}.fc-deck-view{padding:16px}.fc-deck-stats{grid-template-columns:repeat(2,1fr);gap:8px}.fc-stat-val{font-size:20px}.fc-deck-grid{grid-template-columns:1fr}.fc-study{padding:16px}.fc-card-wrapper{min-height:240px}.fc-card{min-height:240px}.fc-card-front .fc-card-body{font-size:14px}.fc-rating-btn{padding:10px 6px}.fc-rating-btn .label{font-size:11px}}


/* ══ Section Stats Cards ══ */
.section-stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.section-stat{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border-color);flex:1;min-width:120px}

.section-stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text-primary);line-height:1.2}

.section-stat-btn{cursor:pointer;transition:all var(--transition)}.section-stat-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-card)}
.section-stat-clickable{cursor:pointer;transition:all var(--transition);position:relative}
.section-stat-clickable:hover{transform:translateY(-1px);box-shadow:var(--shadow-card)}
.section-stat-clickable .section-stat-expand{display:inline;font-size:9px;color:var(--text-muted);margin-left:4px;transition:transform var(--transition)}
.section-stat-detail{display:none;width:100%;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:12px 16px;margin-top:-8px;margin-bottom:14px}
.section-stat-detail.open{display:block}
.section-stat-detail-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.section-stat-detail-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.section-stat-detail-list li{font-size:12px;color:var(--text-secondary);padding:4px 0 4px 16px;position:relative;line-height:1.45;border-bottom:1px solid var(--border-subtle)}
.section-stat-detail-list li:last-child{border-bottom:none}

.section-stat-detail-list.concepts li::before{background:var(--active-color,#3B82F6);opacity:0.5}

.lo-diagram{margin:14px 0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-color);background:var(--bg-card)}

.lo-diagram .title{fill:var(--text-primary);font-size:11px;font-weight:600}
.lo-diagram-tabs{display:flex;border-bottom:1px solid var(--border-color);background:var(--bg-tertiary)}

<script>
const TOPICS=[{id:'quant',num:'01',name:'Quantitative Methods',color:'#3B82F6',dim:'#3B82F620',subtopics:[{id:'multi-reg',name:'Multiple Regression Basics',los:3},{id:'model-fit',name:'Evaluating Model Fit',los:3},{id:'misspec',name:'Model Misspecification',los:4},{id:'extensions',name:'Regression Extensions',los:3},{id:'timeseries',name:'Time-Series Analysis',los:14},{id:'ml',name:'Machine Learning',los:4},{id:'bigdata',name:'Big Data Projects',los:7}]},{id:'econ',num:'02',name:'Economics',color:'#10B981',dim:'#10B98120',subtopics:[{id:'fx',name:'Currency Exchange Rates',los:12},{id:'growth',name:'Economic Growth',los:12}]},{id:'fsa',num:'03',name:'Financial Statement Analysis',color:'#F59E0B',dim:'#F59E0B20',subtopics:[{id:'intercorp',name:'Intercorporate Investments',los:3},{id:'employee-comp',name:'Employee Compensation',los:5},{id:'multinational',name:'Multinational Operations',los:10},{id:'fin-inst',name:'Financial Institutions',los:6},{id:'quality',name:'Quality of Financial Reports',los:13},{id:'integration',name:'Integration of FSA Techniques',los:5}]},{id:'corp',num:'04',name:'Corporate Issuers',color:'#A855F7',dim:'#A855F720',subtopics:[{id:'dividends',name:'Dividends & Share Repurchases',los:14},{id:'esg',name:'ESG Considerations',los:4},{id:'cost-cap',name:'Cost of Capital: Advanced',los:6},{id:'restruct',name:'Corporate Restructurings',los:7}]},{id:'equity',num:'05',name:'Equity Valuation',color:'#EF4444',dim:'#EF444420',subtopics:[{id:'eq-process',name:'Applications & Processes',los:8},{id:'ddm',name:'Discounted Dividend Valuation',los:16},{id:'fcf',name:'Free Cash Flow Valuation',los:13},{id:'multiples',name:'Price & EV Multiples',los:18},{id:'residual',name:'Residual Income Valuation',los:11},{id:'private',name:'Private Company Valuation',los:9}]},{id:'fi',num:'06',name:'Fixed Income',color:'#14B8A6',dim:'#14B8A620',subtopics:[{id:'term-struct',name:'Term Structure & Rates',los:11},{id:'arb-free',name:'Arbitrage-Free Framework',los:9},{id:'embedded',name:'Bonds with Embedded Options',los:17},{id:'credit-models',name:'Credit Analysis Models',los:8},{id:'cds',name:'Credit Default Swaps',los:5}]},{id:'deriv',num:'07',name:'Derivatives',color:'#6366F1',dim:'#6366F120',subtopics:[{id:'forwards',name:'Pricing Forward Commitments',los:7},{id:'options',name:'Valuation of Contingent Claims',los:14}]},{id:'alt',num:'08',name:'Alternative Investments',color:'#F97316',dim:'#F9731620',subtopics:[{id:'commodities',name:'Commodities & Derivatives',los:10},{id:'re-overview',name:'Real Estate Overview',los:5},{id:'re-public',name:'Public Real Estate Securities',los:5},{id:'hedge-funds',name:'Hedge Fund Strategies',los:9}]},{id:'pm',num:'09',name:'Portfolio Management',color:'#64748B',dim:'#64748B20',subtopics:[{id:'econ-markets',name:'Economics & Investment Markets',los:11},{id:'active-mgmt',name:'Active Portfolio Management',los:6},{id:'etf',name:'ETF Mechanics & Applications',los:8},{id:'multifactor',name:'Using Multifactor Models',los:7},{id:'market-risk',name:'Measuring & Managing Market Risk',los:12},{id:'backtest',name:'Backtesting & Simulation',los:8}]},{id:'ethics',num:'10',name:'Ethical & Professional Standards',color:'#EAB308',dim:'#EAB30820',subtopics:[{id:'code',name:'Code of Ethics & Standards',los:2},{id:'guidance',name:'Guidance for Standards I–VII',los:2},{id:'application',name:'Application of Code & Standards',los:2}]}];

// ═══ CONTENT: TOPIC 01 — QUANTITATIVE METHODS ═══
const CONTENT={
'quant|multi-reg':{
quickReview:['Multiple regression extends simple regression to 2+ independent variables — same logic, more dimensions.','Y = b₀ + b₁X₁ + b₂X₂ + … + bₖXₖ + ε. Each bᵢ = marginal effect holding others constant.','Key assumptions: linearity, independence of errors, homoskedasticity, normality of residuals, no perfect multicollinearity.','Residual plots are the "health check" — look for patterns (curves, fans, clusters) that signal violations.'],
analogy:'Think of a multiple regression like a <em>recipe</em>. Simple regression says "more sugar → sweeter cake." Multiple regression says "sweetness depends on sugar, butter, AND baking time — each contributing independently." The coefficient on sugar tells you the effect of adding more sugar <em>while keeping butter and time unchanged</em>, just like a chef tweaking one ingredient at a time.',
los:[
{title:'Describe the types of investment problems addressed by multiple linear regression and the regression process.',explanation:'<p>Multiple regression is the workhorse of quantitative finance. It models how <span class="key-term">several independent variables jointly explain a dependent variable</span>. Typical applications:</p><p><strong>Cross-sectional:</strong> explaining stock returns across companies using factors like size, value, and momentum at a point in time. <strong>Time-series:</strong> modeling how macro variables (GDP growth, interest rates, inflation) drive bond returns over time. <strong>Forecasting:</strong> predicting next-quarter earnings from financial ratios.</p><p>The process: (1) specify the model based on theory, (2) estimate coefficients via OLS, (3) check assumptions with diagnostics, (4) evaluate fit and significance, (5) use for prediction or inference.</p>'},
{title:'Formulate a multiple linear regression model, describe the relation between dependent and independent variables, and interpret estimated regression coefficients.',explanation:'<div class="formula-box"><span class="label">Multiple Regression Model</span>Y = b₀ + b₁X₁ + b₂X₂ + … + bₖXₖ + ε</div><p><strong>b₀</strong> (intercept) = predicted Y when all X\'s are zero. <strong>bᵢ</strong> (slope) = expected change in Y for a one-unit increase in Xᵢ, <span class="key-term">holding all other variables constant</span>. This "holding constant" idea is the <em>partial slope</em> — it isolates each variable\'s unique contribution.</p><p>Example: regressing fund returns on market return and fund size, the coefficient on market return tells you market sensitivity <em>after accounting for</em> size differences.</p>'},
{title:'Explain the assumptions underlying a multiple linear regression model and interpret residual plots indicating potential violations.',explanation:'<p>OLS requires several assumptions for reliable estimates:</p><p><strong>1. Linearity</strong> — relationship between Y and X\'s is linear in parameters.<br><strong>2. Independence</strong> — residuals are independent of each other.<br><strong>3. Homoskedasticity</strong> — residual variance is constant across all levels of X.<br><strong>4. Normality</strong> — residuals are normally distributed (for valid tests in small samples).<br><strong>5. No perfect multicollinearity</strong> — no X is an exact linear combination of others.</p><div class="formula-box"><span class="label">Residual Plot Diagnostics</span>✓ Random scatter around zero → assumptions likely met\n✗ Funnel shape → heteroskedasticity\n✗ Curved pattern → non-linearity (misspecification)\n✗ Clusters/waves → serial correlation</div>'}
]},

'quant|model-fit':{
quickReview:['R² = proportion of variance in Y explained by the model. Adjusted R² penalizes for extra variables.','F-test checks if the model as a whole is significant (at least one slope ≠ 0).','Joint hypothesis tests (partial F-test) check if a subset of coefficients are simultaneously zero.','Predicted Ŷ = b₀ + b₁X₁ + … + bₖXₖ — plug in assumed values, but beware extrapolation.'],
analogy:'R² is like a <em>grade on how well your map matches the terrain</em>. An R² of 0.80 means your map captures 80% of the landscape — the other 20% is "uncharted territory" (residual variation). Adjusted R² is a harsher grader who penalizes you for adding unnecessary landmarks that clutter the map without improving accuracy.',
los:[
{title:'Evaluate how well a multiple regression model explains the dependent variable by analyzing ANOVA table results and measures of goodness of fit.',explanation:'<p>The <strong>ANOVA table</strong> decomposes total variation (SST) into explained (SSR) and unexplained (SSE):</p><div class="formula-box"><span class="label">ANOVA Decomposition</span>SST = SSR + SSE\nR² = SSR / SST\nAdjusted R² = 1 − [(1 − R²)(n − 1) / (n − k − 1)]\nF-stat = (SSR/k) / (SSE/(n − k − 1)) = MSR / MSE</div><p><strong>R²</strong> always increases with more variables — even useless ones. <strong>Adjusted R²</strong> corrects by penalizing complexity. If adjusted R² falls when adding a variable, it isn\'t helping.</p><p>The <strong>F-statistic</strong> tests: H₀: b₁ = b₂ = … = bₖ = 0. A large F (low p-value) means the model collectively explains significant variation.</p>'},
{title:'Formulate hypotheses on the significance of two or more coefficients and interpret joint hypothesis test results.',explanation:'<p>Sometimes you need to test whether <em>multiple</em> coefficients are simultaneously zero. Individual t-tests aren\'t enough because they ignore correlations between estimators.</p><div class="formula-box"><span class="label">Partial F-test</span>F = [(SSE_restricted − SSE_unrestricted) / q] / [SSE_unrestricted / (n − k − 1)]\n\nq = number of restrictions (variables tested)\ndf₁ = q,  df₂ = n − k − 1</div><p>Example: testing whether both "inflation" and "GDP growth" are zero in a bond return model. If the F-stat exceeds the critical value, at least one matters.</p>'},
{title:'Calculate and interpret a predicted value for the dependent variable, given estimated model and assumed values for independent variables.',explanation:'<div class="formula-box"><span class="label">Prediction</span>Ŷ = b̂₀ + b̂₁X₁ + b̂₂X₂ + … + b̂ₖXₖ</div><p>Plug in assumed values for each Xᵢ. The result is the <strong>point estimate</strong>. A <strong>prediction interval</strong> is wider than a confidence interval because it accounts for both estimation error and inherent randomness (ε).</p><p><strong>Warning:</strong> predictions are only reliable within the range of the original data. Extrapolating (predicting for X values far beyond the sample) is dangerous — the relationship may not hold.</p>'}
]},

'quant|misspec':{
quickReview:['Misspecification = wrong functional form, omitted variables, or extraneous variables → biased or inefficient estimates.','Heteroskedasticity: error variance isn\'t constant → wrong standard errors → unreliable t-tests. Use White-corrected SE.','Serial correlation: errors correlated across observations → understated SE → inflated t-stats. Use Newey-West SE.','Multicollinearity: X\'s highly correlated → coefficients unreliable, but model can still predict. Check VIF > 5–10.'],
analogy:'Model misspecification is like <em>using the wrong map for your terrain</em>. Omitted variables? You left out a mountain range. Wrong functional form? You drew straight roads where there are curves. Heteroskedasticity is like a map that\'s accurate in the city center but increasingly distorted at the edges — your confidence in directions varies by location.',
los:[
{title:'Describe how model misspecification affects regression results and how to avoid common forms.',explanation:'<p>Misspecification means the model is structurally wrong. Common forms:</p><p><strong>Omitted variable bias:</strong> leaving out a relevant variable correlated with an included one → the included variable absorbs the omitted one\'s effect, biasing its coefficient.<br><strong>Wrong functional form:</strong> linear model when the true relationship is quadratic or log-linear.<br><strong>Extraneous variables:</strong> including irrelevant variables → unbiased but less efficient (higher SE).</p><p><strong>Prevention:</strong> ground model in theory, check residual plots, use adjusted R² and AIC/BIC for selection, test with Ramsey\'s RESET.</p>'},
{title:'Explain the types of heteroskedasticity and how it affects statistical inference.',explanation:'<p><span class="key-term">Heteroskedasticity</span> = residual variance changes across observations.</p><p><strong>Unconditional:</strong> variance differs but isn\'t related to X variables — less serious.<br><strong>Conditional:</strong> variance is systematically related to X (e.g., larger firms → more volatile earnings) — this is the problematic form.</p><div class="formula-box"><span class="label">Impact & Fix</span>Impact: OLS coefficients still unbiased, but standard errors WRONG\n  → t-stats and F-stats unreliable\n  → confidence intervals misleading\n\nDetection: Breusch-Pagan test, White test\nFix: White\'s robust (heteroskedasticity-consistent) standard errors</div>'},
{title:'Explain serial correlation and how it affects statistical inference.',explanation:'<p><span class="key-term">Serial correlation</span> (autocorrelation) means errors in one period correlate with errors in another. Common in time-series data.</p><p><strong>Positive serial correlation</strong> (most common): a positive residual likely followed by another → OLS <em>underestimates</em> standard errors → t-statistics too high → too many false positives.</p><div class="formula-box"><span class="label">Durbin-Watson Test</span>DW ≈ 2(1 − r̂)  where r̂ = autocorrelation of residuals\n\nDW ≈ 2 → no serial correlation\nDW ≈ 0 → positive serial correlation\nDW ≈ 4 → negative serial correlation\n\nFix: Newey-West (Hansen) standard errors or add lagged variables</div>'},
{title:'Explain multicollinearity and how it affects regression analysis.',explanation:'<p><span class="key-term">Multicollinearity</span> = two or more X\'s are highly (but not perfectly) correlated. Like asking two witnesses who always agree — you can\'t tell who saw what.</p><p><strong>Effects:</strong> coefficients remain unbiased, but standard errors inflate → individual t-tests show variables as insignificant even though the overall F-test is significant. Classic red flag: high R² + significant F but few individually significant coefficients.</p><div class="formula-box"><span class="label">Detection & Remedies</span>Detection: Variance Inflation Factor (VIF)\n  VIF > 5  → potential concern\n  VIF > 10 → serious multicollinearity\n\nRemedies:\n  • Drop one correlated variable\n  • Combine into a composite\n  • Use PCA\n  • Increase sample size</div>'}
]},

'quant|extensions':{
quickReview:['Influence analysis: leverage (unusual X) + outlier (unusual Y) = influential point. Use Cook\'s D.','Dummy variables: k categories → k−1 dummies. Coefficients = difference from omitted base category.','Logistic regression: binary outcomes (default/no-default). Uses log-odds; coefficients interpreted via odds ratios.'],
analogy:'Dummy variables are like <em>light switches in a house</em>. Each switch is ON (1) or OFF (0). If you have 3 rooms, you need only 2 switches — because if the living room and bedroom are off, you know the kitchen must be on. That always-implied room is your base category.',
los:[
{title:'Describe influence analysis and methods of detecting influential data points.',explanation:'<p>Not all data points are equal. Some disproportionately "pull" the regression line:</p><p><strong>Leverage:</strong> extreme X values (far from the mean of X). High leverage = potential influence.<br><strong>Outlier:</strong> extreme residual (far from the fitted line in the Y direction).<br><strong>Influential point:</strong> if removed, significantly changes coefficients. Often both high-leverage AND an outlier.</p><div class="formula-box"><span class="label">Key Metrics</span>Leverage (hᵢᵢ): values > 2(k+1)/n → high leverage\nStudentized residual: |value| > 3 → likely outlier\nCook\'s Distance: Dᵢ > 0.5 → investigate; Dᵢ > 1 → likely influential</div>'},
{title:'Formulate and interpret a multiple regression model that includes qualitative independent variables.',explanation:'<p>Qualitative (categorical) variables are encoded as <span class="key-term">dummy variables</span> (0/1). For k categories, create k−1 dummies. The omitted category is the <strong>base case</strong> captured by the intercept.</p><div class="formula-box"><span class="label">Example: Credit Rating Effect on Yield</span>Yield = b₀ + b₁(Duration) + b₂(D_BBB) + b₃(D_BB) + ε\n\nIf A-rated (base):  Yield = b₀ + b₁·Duration\nIf BBB-rated:       Yield = (b₀+b₂) + b₁·Duration\nIf BB-rated:        Yield = (b₀+b₃) + b₁·Duration\n\n→ b₂ = yield premium of BBB over A\n→ b₃ = yield premium of BB over A</div><p><strong>Interaction terms</strong> (e.g., D_BBB × Duration) allow the slope to differ across categories.</p>'},
{title:'Formulate and interpret a logistic regression model.',explanation:'<p>When Y is binary (0/1) — default/no-default, recession/expansion — linear regression can predict outside [0,1]. <span class="key-term">Logistic regression</span> models the log-odds:</p><div class="formula-box"><span class="label">Logistic Regression</span>ln(p / (1−p)) = b₀ + b₁X₁ + b₂X₂ + … + bₖXₖ\n\nwhere p = P(Y=1|X)\n\nOdds ratio for Xᵢ = e^(bᵢ)\nIf b₁ = 0.5 → odds ratio = e^0.5 ≈ 1.65\n→ 1-unit increase in X₁ raises odds of Y=1 by 65%</div><p>Output is a probability (S-shaped curve). Evaluated with a <strong>confusion matrix</strong> (sensitivity, specificity, accuracy) rather than R².</p>'}
]},

'quant|timeseries':{
quickReview:['Linear trend: yₜ = b₀ + b₁t. Log-linear: ln(yₜ) = b₀ + b₁t → constant growth rate ≈ b₁.','Covariance stationarity: constant mean, variance, and covariance structure. Required for AR models.','AR(1): xₜ = b₀ + b₁xₜ₋₁ + εₜ. Stationary if |b₁| < 1. Mean-reverting level = b₀/(1−b₁).','Random walk: b₁ = 1 → unit root → non-stationary. First-difference to fix.','Dickey-Fuller: H₀ = unit root. Uses special critical values (NOT standard t-tables).','ARCH: volatility clusters — variance depends on past squared errors.','Cointegration: two I(1) series sharing a long-run equilibrium → can regress in levels.'],
analogy:'A stationary time series is like a <em>dog on a leash</em> — it wanders around but always stays near its owner (the mean). A random walk is a dog <em>off the leash</em> in an open field — it drifts wherever it pleases with no tendency to return. The Dickey-Fuller test asks: "Is this dog leashed or not?"',
los:[
{title:'Calculate and evaluate the predicted trend value for a time series, modeled as either a linear trend or a log-linear trend.',explanation:'<div class="formula-box"><span class="label">Trend Models</span>Linear:     yₜ = b₀ + b₁·t + εₜ     → constant absolute change\nLog-linear: ln(yₜ) = b₀ + b₁·t + εₜ  → constant % change (rate ≈ b₁)</div><p>To predict: plug in period number t. For log-linear, exponentiate: ŷₜ = e^(b₀+b₁·t). Linear suits fixed-amount growth; log-linear suits percentage growth.</p>'},
{title:'Describe factors determining whether a linear or log-linear trend should be used and evaluate limitations of trend models.',explanation:'<p>Choose <strong>linear</strong> when data grows by roughly constant amounts. Choose <strong>log-linear</strong> when growth is exponential (plot curves up, but ln(data) is linear).</p><p><strong>Limitations:</strong> trend models assume the trend continues indefinitely — they can\'t capture structural breaks or cyclical behavior. Residuals are often serially correlated, meaning the model leaves predictable information on the table.</p>'},
{title:'Explain the requirement for covariance stationarity and the significance of non-stationarity.',explanation:'<p><span class="key-term">Covariance stationarity</span> requires constant (1) mean, (2) variance, and (3) autocovariance structure over time.</p><p>Non-stationary series produce <strong>spurious regressions</strong> — high R² and significant t-stats between completely unrelated variables. It\'s like finding a "significant" link between ice cream sales and shark attacks — both just trend upward in summer.</p>'},
{title:'Describe the structure of an AR(p) model and calculate one- and two-period-ahead forecasts.',explanation:'<div class="formula-box"><span class="label">AR Models</span>AR(1): xₜ = b₀ + b₁·xₜ₋₁ + εₜ\nAR(2): xₜ = b₀ + b₁·xₜ₋₁ + b₂·xₜ₋₂ + εₜ\n\nOne-step forecast:  x̂ₜ₊₁ = b₀ + b₁·xₜ\nTwo-step forecast:  x̂ₜ₊₂ = b₀ + b₁·x̂ₜ₊₁  (chain forecasts)</div><p>Two-step uses the <em>predicted</em> value from step one, so uncertainty compounds with each step forward.</p>'},
{title:'Explain how autocorrelations of residuals test whether the AR model fits the time series.',explanation:'<p>If correctly specified, residuals should be white noise — no remaining autocorrelation. Check the <strong>ACF</strong> of residuals: any autocorrelation exceeding ±1.96/√n → the model needs more lags.</p><p>The <strong>Ljung-Box Q-statistic</strong> tests whether a group of autocorrelations are jointly zero. Significant Q → the model is missing something.</p>'},
{title:'Explain mean reversion and calculate a mean-reverting level.',explanation:'<p>A stationary AR(1) with |b₁| < 1 is <span class="key-term">mean-reverting</span>: above the long-run mean → tends to fall; below → tends to rise.</p><div class="formula-box"><span class="label">Mean-Reverting Level</span>Level = b₀ / (1 − b₁)\n\nExample: b₀ = 0.5, b₁ = 0.8\nLevel = 0.5 / 0.2 = 2.5\n\nThe closer |b₁| is to 1 → slower reversion (weak pull)\nThe closer |b₁| is to 0 → faster reversion (strong pull)</div>'},
{title:'Contrast in-sample and out-of-sample forecasts and compare forecasting accuracy via RMSE.',explanation:'<p><strong>In-sample:</strong> fitted values within the estimation period — always looks good. <strong>Out-of-sample:</strong> forecasts for unseen data — the true test.</p><div class="formula-box"><span class="label">RMSE</span>RMSE = √[ (1/n) · Σ(yₜ − ŷₜ)² ]\n\nLower RMSE = better forecast accuracy\nCompare across models on the SAME out-of-sample period</div><p>Lower in-sample RMSE but higher out-of-sample RMSE = <strong>overfitting</strong>.</p>'},
{title:'Explain the instability of coefficients of time-series models.',explanation:'<p>Time-series relationships shift due to structural breaks (policy changes, crises, regime shifts). Coefficients from 2010–2019 may fail post-2020.</p><p>Always test <strong>parameter stability</strong> by splitting data into subperiods and comparing coefficients, or use the Chow test for formal detection of structural breaks.</p>'},
{title:'Describe characteristics of random walk processes and contrast them to stationary processes.',explanation:'<div class="formula-box"><span class="label">Random Walk</span>No drift:   xₜ = xₜ₋₁ + εₜ       (b₁ = 1)\nWith drift: xₜ = b₀ + xₜ₋₁ + εₜ   (drifts by b₀/period)</div><p>Best forecast = today\'s value (plus drift). Variance grows without bound → non-stationary. Many financial prices behave like random walks, while returns are typically stationary.</p>'},
{title:'Describe implications of unit roots, when they occur, and how to transform for AR analysis.',explanation:'<p>A <span class="key-term">unit root</span> (b₁ = 1) means non-stationary. Can\'t use standard AR techniques (spurious regression risk). Common in: stock prices, exchange rates, GDP levels.</p><div class="formula-box"><span class="label">First-Differencing</span>If xₜ has a unit root, define: yₜ = xₜ − xₜ₋₁ = Δxₜ\n\nyₜ is typically stationary ("integrated of order 1" or I(1))\nFit AR model to yₜ instead</div>'},
{title:'Describe the unit root test steps and its relation to AR models.',explanation:'<div class="formula-box"><span class="label">Dickey-Fuller Test</span>Δxₜ = b₀ + δ·xₜ₋₁ + εₜ    where δ = b₁ − 1\n\nH₀: δ = 0  (unit root → non-stationary)\nH₁: δ < 0  (stationary)\n\n⚠ Critical values are NOT standard t-tables\n  Use Dickey-Fuller tables (e.g., −3.43 at 5%)</div><p>Fail to reject H₀ → series has a unit root → first-difference before modeling.</p>'},
{title:'Explain how to test and correct for seasonality and forecast using an AR model with a seasonal lag.',explanation:'<p>Seasonal patterns create autocorrelation at the seasonal lag (lag-4 for quarterly data).</p><div class="formula-box"><span class="label">AR with Seasonal Lag</span>xₜ = b₀ + b₁·xₜ₋₁ + b₄·xₜ₋₄ + εₜ  (quarterly)\n\nForecast: x̂ₜ₊₁ = b₀ + b₁·xₜ + b₄·xₜ₋₃</div><p>If the seasonal coefficient is significant, the model captures repeating within-year patterns.</p>'},
{title:'Explain ARCH and how ARCH models predict variance of a time series.',explanation:'<p><span class="key-term">ARCH</span> captures volatility clustering: calm follows calm; turbulence follows turbulence.</p><div class="formula-box"><span class="label">ARCH(1)</span>σ²ₜ = a₀ + a₁·ε²ₜ₋₁\n\nTest: regress squared residuals on their lag\nH₀: a₁ = 0 (no ARCH)\nIf significant → predicted variance = a₀ + a₁·ε²ₜ</div><p>After a big shock, expect continued high volatility. Crucial for risk management and option pricing.</p>'},
{title:'Explain how to analyze time-series variables for nonstationarity/cointegration before regression; determine an appropriate model.',explanation:'<p>Before regressing one time series on another, check both for unit roots:</p><p><strong>Both stationary:</strong> proceed normally.<br><strong>One stationary, one not:</strong> do NOT regress — unreliable.<br><strong>Both non-stationary:</strong> test for <span class="key-term">cointegration</span>. If cointegrated (shared long-run equilibrium), levels regression is valid. If not, first-difference both.</p><p>Cointegration is like two drunken friends stumbling home — each follows a random walk, but they stay together because they\'re linked arm-in-arm. The spread between them is stationary.</p>'}
]},

'quant|ml':{
quickReview:['Supervised: labeled data → predict target. Unsupervised: no labels → find structure/patterns.','Overfitting: model learns noise. Combat with cross-validation, regularization, simpler models.','Penalized regression (LASSO/Ridge), SVM, KNN, CART, ensemble/random forest — each for different problems.','Unsupervised: PCA (dimensionality reduction), K-means & hierarchical clustering (grouping).'],
analogy:'Supervised learning is like <em>studying with an answer key</em> — you see questions and correct answers, then try to generalize. Unsupervised learning is like <em>sorting a box of unlabeled foreign coins</em> by size, color, and weight without knowing their names. Overfitting is memorizing the answer key word-for-word: you ace the practice test but bomb the real exam.',
los:[
{title:'Describe supervised ML, unsupervised ML, and deep learning.',explanation:'<p><strong>Supervised:</strong> trained on labeled data (input–output pairs). Goal: map inputs to outputs. Examples: predicting returns (regression) or default (classification).</p><p><strong>Unsupervised:</strong> no labels. Goal: discover patterns. Examples: clustering stocks into peer groups, reducing 50 ratios to a few principal components.</p><p><strong>Deep learning:</strong> neural networks with many hidden layers that learn feature hierarchies automatically. Excels at unstructured data (text, images). Finance: NLP for sentiment analysis, pattern recognition in high-frequency data.</p>'},
{title:'Describe overfitting and identify methods of addressing it.',explanation:'<p><span class="key-term">Overfitting</span> = model captures noise instead of signal. Signs: excellent in-sample, poor out-of-sample.</p><div class="formula-box"><span class="label">Remedies</span>• Cross-validation: k folds, train on k−1, validate on 1, rotate\n• Regularization: LASSO (L1) / Ridge (L2) penalize large coefficients\n• Simpler models: fewer parameters, shallower trees\n• More data: dilutes noise\n• Early stopping: halt training before memorization\n• Ensemble methods: combine models to cancel individual errors</div>'},
{title:'Describe supervised ML algorithms and determine problems for which they are best suited.',explanation:'<p><strong>Penalized regression (LASSO/Ridge):</strong> regression + complexity penalty. LASSO shrinks to zero → feature selection. Best: many predictors, some irrelevant.</p><p><strong>SVM:</strong> finds widest separating "highway" between classes. Best: classification with clear margins, small-medium data.</p><p><strong>KNN:</strong> majority vote of k nearest neighbors. Simple but slow. Best: small datasets, non-linear boundaries.</p><p><strong>CART:</strong> if-then splits into a tree. Interpretable but overfits easily.</p><p><strong>Random Forest:</strong> many de-correlated trees → reduces variance. Best: most tabular prediction problems.</p>'},
{title:'Describe unsupervised ML algorithms and determine problems for which they are best suited.',explanation:'<p><strong>PCA:</strong> reduces many correlated variables to fewer uncorrelated components capturing most variance. Best: simplifying large feature sets, multicollinearity.</p><p><strong>K-means:</strong> partitions into k groups by nearest mean. Must choose k upfront. Best: grouping assets, identifying regimes.</p><p><strong>Hierarchical clustering:</strong> builds nested cluster tree (dendrogram). No need to pre-specify k. Best: exploring natural groupings when cluster count is unknown.</p>'}
]},

'quant|bigdata':{
quickReview:['Lifecycle: Conceptualize → Collect → Wrangle → Explore → Model → Communicate.','Wrangling: clean (missing values, outliers), transform (scale, encode), merge datasets.','Model evaluation: use out-of-sample testing. Metrics depend on task (RMSE for regression, F1/AUC for classification).','Text features: bag-of-words, TF-IDF, sentiment scores, named entity recognition.','Text pipeline: scrape → clean → tokenize → vectorize → model.'],
analogy:'A big data project is like <em>cooking a gourmet meal</em>. Decide the menu (conceptualize), shop for ingredients (collect), wash/chop/measure everything (wrangle), taste and adjust (explore), cook (model), and plate beautifully (communicate). Skip the prep work and even the best recipe fails.',
los:[
{title:'Identify and explain steps in a data analysis project.',explanation:'<p><strong>1. Conceptualization:</strong> define problem, research question, success metrics.<br><strong>2. Data collection:</strong> internal databases, APIs, web scraping, vendors.<br><strong>3. Preparation & wrangling:</strong> clean, transform, structure raw data.<br><strong>4. Exploration (EDA):</strong> visualize distributions, correlations, anomalies.<br><strong>5. Modeling:</strong> select algorithms, train, tune hyperparameters, validate.<br><strong>6. Communication:</strong> present findings with clear visuals and actionable conclusions.</p>'},
{title:'Describe objectives, steps, and examples of preparing and wrangling data.',explanation:'<p>Goal: transform messy raw data into clean, analysis-ready format.</p><p><strong>Cleaning:</strong> handle missing values (impute, drop, flag), remove duplicates, fix data types, identify outliers.<br><strong>Transforming:</strong> normalize/standardize, encode categoricals (one-hot, label), create derived variables (log returns from prices).<br><strong>Merging:</strong> join datasets on common keys (ticker + date).</p><p>Example: raw SEC filings → strip HTML → extract tables → parse numbers → handle fiscal year-end differences → merge with market data.</p>'},
{title:'Evaluate the fit of a machine learning algorithm.',explanation:'<div class="formula-box"><span class="label">Evaluation Metrics</span>Regression:  RMSE, MAE, R², out-of-sample R²\n\nClassification:\n  Accuracy   = (TP + TN) / Total\n  Precision  = TP / (TP + FP)\n  Recall     = TP / (TP + FN)\n  F1         = 2·Precision·Recall / (Precision + Recall)\n  ROC-AUC    = area under ROC curve</div><p>Always evaluate <strong>out-of-sample</strong>. The gap between in-sample and out-of-sample performance measures overfitting.</p>'},
{title:'Describe objectives, methods, and examples of data exploration.',explanation:'<p>EDA builds intuition before modeling. Methods: summary statistics, histograms, box plots, scatter matrices, correlation heatmaps, time-series plots.</p><p>Example: plotting daily returns reveals fat tails → normality assumption may underestimate risk. A P/E vs. forward returns scatter plot might reveal non-linearity needing transformation.</p>'},
{title:'Describe methods for extracting, selecting and engineering features from textual data.',explanation:'<p><strong>Bag-of-Words:</strong> count word frequencies → sparse matrix. Simple, ignores order.<br><strong>TF-IDF:</strong> weight by importance (frequent here but rare overall → high score).<br><strong>N-grams:</strong> capture phrases ("interest rate", "credit risk").<br><strong>Sentiment scores:</strong> map text to positive/negative via lexicons or models.<br><strong>NER:</strong> extract company names, people, locations automatically.</p><p>Feature selection is critical — raw text produces millions of features. Use chi-squared, mutual information, or LASSO to keep only informative ones.</p>'},
{title:'Describe objectives, steps, and techniques in model training.',explanation:'<p><strong>Steps:</strong> (1) split into train/validation/test, (2) select algorithm + initial hyperparameters, (3) fit on training data, (4) evaluate on validation, (5) tune hyperparameters (grid/random search), (6) final evaluation on held-out test set.</p><p><strong>Techniques:</strong> k-fold cross-validation, learning curves (bias vs. variance diagnosis), regularization, early stopping (neural networks).</p>'},
{title:'Describe preparing, wrangling, and exploring text-based data for financial forecasting.',explanation:'<p>Sources: news, filings, earnings calls, social media.</p><p><strong>Prep:</strong> scrape/download → remove HTML/boilerplate → handle encoding.<br><strong>Wrangle:</strong> tokenize → lowercase → remove stop words → stem/lemmatize ("running"→"run") → remove rare/common tokens.<br><strong>Explore:</strong> word clouds, topic modeling (LDA), sentiment trends over time.</p><p>The vectorized text becomes features for supervised models (predicting next-day returns from news sentiment) or unsupervised models (clustering earnings calls by theme).</p>'}
]},
