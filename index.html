'deriv|forwards':{
quickReview:['Forward price = spot × (1+r)ᵀ (no carry costs). With costs/benefits: F = (S − PV(benefits) + PV(costs)) × (1+r)ᵀ.','Equity forward: F = (S₀ − PV(dividends)) × (1+r)ᵀ. Value at time t: Vₜ = Sₜ − PV(remaining divs) − F/(1+r)^(T-t).','FRA: agreement on a future interest rate. Settled at expiration based on difference between agreed rate and market rate.','Fixed-income forward: F = (B₀ × (1+r)ᵀ − AI_T − PV(coupons)). Include accrued interest and intermediate coupons.','Interest rate swap: exchange fixed for floating. Value = PV(fixed) − PV(floating). At inception, fixed rate set so swap value = 0.','Currency swap: exchange principals + periodic interest in two currencies. Value depends on both interest rates and exchange rate.','Equity swap: one leg pays equity return, other pays fixed or floating. Value = PV(equity leg) − PV(fixed/floating leg).'],
analogy:'Forward pricing is like <em>reserving a hotel room for next summer</em>. The forward price reflects today\'s room rate, adjusted for what the hotel earns by having your deposit now (interest), minus what they\'d lose by holding the room empty (carry benefits like dividends). The "carry arbitrage model" says if the reservation price is wrong, someone can lock in a riskless profit by booking the room and simultaneously shorting it on the spot market — so the price must be set to prevent this.',
los:[
{title:'Describe how equity forwards and futures are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Equity Forward Pricing</div><div class="formula-highlight-body">$$Discrete dividends: F_0 = (S_0 - PV(D)) \\times (1+r)ᵀ$$\n$$Continuous yield (\\delta): F_0 = S_0 \\times e^{(r-\\delta}T)$$\nValue at time t:\n$$V_t = S_t - PV_t(remaining D) - \\frac{F_0}{1+r}^(T-t)$$\n$$At expiration: V_T = S_T - F_0$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>If F₀ is…</div><div>Arbitrage Action</div><div>Name</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Too high (F > no-arb)</div><div>Sell forward + buy spot (borrow to finance)</div><div>Cash-and-carry</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Too low (F < no-arb)</div><div>Buy forward + sell spot (lend the proceeds)</div><div>Reverse cash-and-carry</div></div></div>'},
{title:'Describe the carry arbitrage model without underlying cashflows and with underlying cashflows.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Asset Type</div><div>Forward Price</div><div>Carry Costs</div><div>Carry Benefits</div></div><div class="lo-compare-row lo-compare-4"><div>🥇 No Cash Flows (gold, zero-coupon)</div><div>$$F_0 = S_0(1+r)^T$$</div><div>Financing cost only</div><div>None → F &gt; S always</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Dividend-Paying Stock</div><div>$$F_0 = (S_0 - PV(D))(1+r)^T$$</div><div>Financing cost</div><div>Dividends reduce F below pure carry</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Coupon Bond</div><div>$$F_0 = (B_0 + AI_0)(1+r)^T - AI_T - FV(\\text{coupons})$$</div><div>Financing + accrued interest</div><div>Coupons reduce F</div></div><div class="lo-compare-row lo-compare-4"><div>🛢️ Commodity</div><div>$$F_0 = (S_0 + PV(c) - PV(y))(1+r)^T$$</div><div>Financing + storage + insurance</div><div>Convenience yield reduces F</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The forward price is NOT a forecast.</strong> It\'s determined by today\'s spot + the net cost of carrying the asset to delivery. Arbitrage enforces the relationship — if wrong, free money exists.</div></div>'},
{title:'Describe how interest rate forwards and futures are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Forward Rate Agreement (FRA)</div><div class="formula-highlight-body">FRA rate (implied forward):\n$$(1+z_{j+k})^(j+k) = (1+z_j)^j \\times (1+FRA(j,k))^k$$\nPayoff at settlement (to long/borrower):\n$$Payoff = N \\times (Mkt rate - FRA rate) \\times (\\frac{days}{360})$$\n$$/ (1 + Mkt rate \\times \\frac{days}{360})$$</div><div class="formula-highlight-note">Discounted because settled at START of the loan period, not at end. Example: 1×4 FRA at 3%, market rate at expiry = 3.5% → long receives compensation (locked in a cheaper borrowing rate).</div></div>'},
{title:'Describe how fixed-income forwards and futures are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Bond Forward Pricing</div><div class="formula-highlight-body">$$F_0 = [(B_0 + AI_0) \\times (1+r)ᵀ] - AI_T - FV(interim coupons)$$</div><div class="formula-highlight-note">B₀ = clean price | AI₀, AI_T = accrued interest at inception and delivery | Interim coupons earned during the contract reduce F₀</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #6366F1"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Accrued Interest</div><div class="lo-icon-card-desc">Must track AI at both inception (cost) and delivery (netted in price). Easy to miss on the exam.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Interim Coupons</div><div class="lo-icon-card-desc">Coupons received during the forward period belong to the spot holder, not the forward buyer → reduce F₀.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">CTD & Conversion Factors</div><div class="lo-icon-card-desc">Treasury futures: seller chooses the cheapest-to-deliver bond. Conversion factors adjust for coupon differences.</div></div></div>'},
{title:'Describe how interest rate swaps are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Interest Rate Swap</div><div class="formula-highlight-body">$$Par swap rate: C = (1 - DF_n) / \\sum(DF_i)$$\nValue after inception (to fixed payer):\n$$V = PV(floating) - PV(fixed) = (1 - DF_n) - C \\times \\sum(DF_i)$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Concept</div><div>Description</div><div>Key Insight</div></div><div class="lo-compare-row lo-compare-3"><div>📐 At Inception</div><div>Fixed rate set so PV(fixed leg) = PV(floating leg) → value = 0</div><div>The par swap rate makes both sides "fair" at trade date</div></div><div class="lo-compare-row lo-compare-3"><div>📊 After Inception</div><div>Rates change → PVs diverge → swap has positive value for one side</div><div>Value = difference in PVs of the two legs using current DFs</div></div><div class="lo-compare-row lo-compare-3"><div>🔗 Swap = Portfolio of FRAs</div><div>Each swap payment = an FRA on the corresponding period</div><div>Swap value = sum of individual FRA values</div></div></div>'},
{title:'Describe how currency swaps are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>Interest Rate Swap</div><div>Currency Swap</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Principal Exchange</div><div style="color:#EF4444;font-weight:700">No — only interest exchanged</div><div style="color:#10B981;font-weight:700">Yes — at inception AND maturity</div></div><div class="lo-compare-row lo-compare-3"><div>💱 Currencies</div><div>Same currency both legs</div><div>Different currencies for each leg</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Value Drivers</div><div>Interest rates only</div><div style="color:#EF4444;font-weight:700">Interest rates + exchange rates (more complex)</div></div></div><div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Currency Swap Value (pay USD, receive EUR)</div><div class="formula-highlight-body">$$V = PV(EUR CFs) \\times S_t - PV(USD CFs)$$</div><div class="formula-highlight-note">Convert EUR PV to USD at current spot rate. At inception: notionals set so values are equal → V = 0.</div></div>'},
{title:'Describe how equity swaps are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Equity Swap</div><div class="formula-highlight-body">Value (pay fixed, receive equity):\n$$V = (\\frac{S_t}{S_0}) \\times N - PV(remaining fixed payments) - PV(N)$$\n$$Equity leg resets to par at each payment \\to PV = (\\frac{S_t}{S_0}) \\times N$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #6366F1"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Synthetic Equity Exposure</div><div class="lo-icon-card-desc">Gain equity returns without owning shares — avoids custody, voting, and settlement complexities</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Tax Efficiency</div><div class="lo-icon-card-desc">Some jurisdictions tax swap returns differently than direct equity ownership</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Market Access</div><div class="lo-icon-card-desc">Access restricted markets or sectors where direct ownership is limited by regulation</div></div></div>'}
]},

'deriv|options':{
quickReview:['Binomial: model up/down moves, risk-neutral pricing. c = e^(−rT)[π×c_u + (1−π)×c_d] where π = risk-neutral prob.','European option value = PV of expected payoff under risk-neutral probabilities. American adds early exercise possibility.','BSM assumptions: continuous trading, no arb, lognormal prices, constant r and σ, no dividends (basic form).','BSM call: $$C = S_0 N(d_1) - Xe^{-rT}N(d_2)$$. S₀N(d₁) = leveraged stock position. Xe^(−rT)N(d₂) = PV of exercise cost.','Black model: for options on futures/forwards — replace S₀ with F₀e^(−rT).','Greeks: delta (∂V/∂S), gamma (∂²V/∂S²), vega (∂V/∂σ), theta (∂V/∂t), rho (∂V/∂r).','Delta hedge: hold Δ shares per option written. Rebalance as Δ changes. Gamma risk = Δ changes quickly.','Implied volatility: the σ that makes BSM price = market price. Volatility smile/skew = implied vol varies by strike.'],
analogy:'Options pricing is like <em>flood insurance in a river valley</em>. The BSM model is the insurance company\'s pricing formula. Delta is how much your policy payout changes if the river rises one inch. Gamma is how fast delta itself changes — the difference between a gentle slope and a cliff edge near the flood line. Vega is the price sensitivity to forecast uncertainty — stormier weather predictions (higher volatility) make all policies more expensive. And implied volatility is the market\'s consensus on how stormy the season will be, reverse-engineered from actual premium prices.',
los:[
{title:'Describe and interpret the binomial option valuation model and its component terms.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 One-Period Binomial Model</div><div class="formula-highlight-body">$$\\text{Stock: }S_u = S_0 \\times u, S_d = S_0 \\times d$$\n$$\\text{Payoffs: }c_u = max(0, S_u-X), c_d = max(0, S_d-X)$$\n$$\\text{Risk-neutral prob: }\\pi = \\frac{(1+r-d)}{u-d}$$\n$$\\text{Option value: }c = [\\pi\\times c_u + \\frac{(1-\\pi)\\times c_d}{1+r}$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Component</div><div>Meaning</div><div>Key Insight</div></div><div class="lo-compare-row lo-compare-3"><div>🎲 π (risk-neutral prob)</div><div>Probability of up-move in the risk-neutral world</div><div>NOT real-world probability — calibrated so stock earns r_f</div></div><div class="lo-compare-row lo-compare-3"><div>$$h = \\frac{c_u - c_d}{S_u - S_d}$$</div><div>Hedge ratio (delta) — shares per option to replicate</div><div>Replicating portfolio: long h shares + borrow → matches option payoff</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Why risk-neutral works:</strong> The replicating portfolio argument means options are priced consistently with the underlying — regardless of investors\' actual risk preferences. We only need no-arbitrage, not real-world probabilities.</div></div>'},
{title:'Describe how the value of a European option can be analyzed as the present value of the option\'s expected payoff at expiration.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Risk-Neutral Valuation</div><div class="formula-highlight-body">$$c = e^{-rT} \\times E*[max(0, S_T - X)]$$\n$$p = e^{-rT} \\times E*[max(0, X - S_T)]$$</div><div class="formula-highlight-note">E* = expectation under risk-neutral measure. The stock grows at the risk-free rate (not its actual expected return). Discount at r_f because we\'re in the risk-neutral world.</div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>This is the unifying principle</strong> of all option pricing — binomial, BSM, Monte Carlo. Each method is just a different way of computing this discounted expected payoff under risk-neutral probabilities.</div></div>'},
{title:'Identify an arbitrage opportunity involving options and describe the related arbitrage.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Key No-Arbitrage Bounds</div><div class="formula-highlight-body">$$Call lower bound: c \\geq max(0, S_0 - X\\times e^{-rT})$$\n$$Put lower bound: p \\geq max(0, X\\times e^{-rT} - S_0)$$\n$$Put-Call Parity: c + X\\times e^{-rT} = p + S_0$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>If Violated…</div><div>Arbitrage Action</div><div>Riskless Profit</div></div><div class="lo-compare-row lo-compare-3"><div>c + PV(X) &lt; p + S₀</div><div>Buy call + buy bond, sell put + sell stock</div><div>Left side is too cheap → buy it, sell the expensive right side</div></div><div class="lo-compare-row lo-compare-3"><div>c + PV(X) &gt; p + S₀</div><div>Sell call + sell bond, buy put + buy stock</div><div>Right side is too cheap → buy it, sell the expensive left side</div></div></div>'},
{title:'Calculate the no-arbitrage values of European and American options using a two-period binomial model.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#6366F1">1</div><div class="lo-step-connector" style="background:#6366F1;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Period 2: Compute Terminal Payoffs</div><div class="lo-step-desc">At each of 4 terminal nodes: payoff = max(0, S−X) for calls, max(0, X−S) for puts</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#6366F1">2</div><div class="lo-step-connector" style="background:#6366F1;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Period 1: Backward-Induct</div><div class="lo-step-desc">$$c = \\frac{\\pi c_u + (1-\\pi) c_d}{1+r}$$</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#6366F1">3</div></div><div class="lo-step-body"><div class="lo-step-title">Period 0: Root Node = Option Value</div><div class="lo-step-desc">$$c_0 = \\frac{\\pi c_{1,u} + (1-\\pi) c_{1,d}}{1+r}$$</div></div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>American vs. European</div><div>At Each Node</div><div>Key Rule</div></div><div class="lo-compare-row lo-compare-3"><div>🇪🇺 European</div><div>Backward-induct only — no early exercise</div><div>—</div></div><div class="lo-compare-row lo-compare-3"><div>🇺🇸 American Call (no dividend)</div><div style="color:#10B981;font-weight:700">Never early exercise — equals European</div><div>Time value is always positive → hold is always better</div></div><div class="lo-compare-row lo-compare-3"><div>🇺🇸 American Put</div><div style="color:#EF4444;font-weight:700">May early exercise if deep ITM</div><div>Node value = max(holding value, exercise value)</div></div></div>'},
{title:'Calculate and interpret the value of an interest rate option using a two-period binomial model.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Interest Rate Options</div><div class="formula-highlight-body">$$\\text{Caplet: }payoff = max(0, rate - strike) \\times Notional \\times period$$\n$$\\text{Floorlet: }payoff = max(0, strike - rate) \\times Notional \\times period$$</div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Key difference from equity options:</strong> The payoff is determined at one node but <em>paid one period later</em>. You must discount the payoff one extra period. Use the same interest rate tree as for bond valuation: V = [0.5×V_u + 0.5×V_d] / (1+r_node) at each node.</div></div>'},
{title:'Identify assumptions of the Black-Scholes-Merton option valuation model.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #6366F1"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Geometric Brownian Motion</div><div class="lo-icon-card-desc">Underlying follows continuous path; returns are lognormally distributed</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📏</div><div class="lo-icon-card-title">Constant r and σ</div><div class="lo-icon-card-desc">Risk-free rate and volatility are known and don\'t change (both violated in practice)</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🔄</div><div class="lo-icon-card-title">Frictionless Markets</div><div class="lo-icon-card-desc">No taxes, transaction costs, or short-selling restrictions</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">⏱️</div><div class="lo-icon-card-title">Continuous Trading</div><div class="lo-icon-card-desc">Can trade at any instant (needed for perfect replication). Discrete in reality.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🚫</div><div class="lo-icon-card-title">No Dividends (basic form)</div><div class="lo-icon-card-desc">Extensions handle dividends via continuous yield adjustment</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Every assumption is violated</strong> — vol isn\'t constant (smile/skew), rates change, trading is discrete. Yet BSM remains the standard because violations are manageable with modifications, and the model gives a useful common language.</div></div>'},
{title:'Interpret the components of the BSM model as applied to call options in terms of a leveraged position in the underlying.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 BSM Call Option</div><div class="formula-highlight-body">$$C = S_0N(d_1) - X\\times e^{-rT}\\times N(d_2)$$\n$$d_1 = \\frac{\\ln(S_0/X) + (r + \\sigma^2/2)T}{\\sigma\\sqrt{T}}$$\n$$d_2 = d_1 - \\sigma\\sqrt{T}$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Component</div><div>Interpretation</div><div>Role</div></div><div class="lo-compare-row lo-compare-3"><div>S₀N(d₁)</div><div>"Delta shares" — the replicating stock position</div><div>$$N(d_1) = \\Delta = \\text{hedge ratio}$$</div></div><div class="lo-compare-row lo-compare-3"><div>X×e^(−rT)×N(d₂)</div><div>Borrowing to finance the shares</div><div>N(d₂) ≈ risk-neutral prob option expires ITM</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>A call option IS a leveraged stock position:</strong> long N(d₁) shares, financed by borrowing PV(X)×N(d₂). This is why calls have positive delta and benefit from rising stock prices — they\'re synthetic leveraged long positions.</div></div>'},
{title:'Describe how the BSM model is used to value European options on equities and currencies.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Underlying</div><div>BSM Adjustment</div><div>What Changes in d₁</div><div>Why</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Equity (no div)</div><div>$$C = S_0 N(d_1) - Xe^{-rT}N(d_2)$$</div><div>Standard formula</div><div>Basic BSM</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Equity (continuous div yield δ)</div><div>$$C = S_0 e^{-\\delta T}N(d_1) - Xe^{-rT}N(d_2)$$</div><div>Use (r−δ) instead of r</div><div>Dividends reduce the effective stock price (leakage)</div></div><div class="lo-compare-row lo-compare-4"><div>💱 Currency (Garman-Kohlhagen)</div><div>$$C = S_0 e^{-r_f T}N(d_1) - Xe^{-r_d T}N(d_2)$$</div><div>r_f acts as continuous "dividend"</div><div>Holding foreign currency earns foreign interest → reduces call value</div></div></div>'},
{title:'Describe how the Black model is used to value European options on futures.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Black Model for Futures Options</div><div class="formula-highlight-body">$$C = e^{-rT} \\times [F_0N(d_1) - XN(d_2)]$$\n$$P = e^{-rT} \\times [XN(-d_2) - F_0N(-d_1)]$$\n$$d_1 = [\\ln(F_0/X) + \\frac{(\\sigma^2/2)T}{\\sigma\\sqrt{T}}, d_2 = d_1 - \\sigma\\sqrt{T}$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Difference from BSM</div><div>Black Model</div><div>Why</div></div><div class="lo-compare-row lo-compare-3"><div>Underlying input</div><div>F₀ replaces S₀</div><div>Futures price already incorporates carry costs</div></div><div class="lo-compare-row lo-compare-3"><div>Discounting</div><div>Entire expression × e^(−rT)</div><div>Futures require no upfront investment</div></div><div class="lo-compare-row lo-compare-3"><div>Cost-of-carry</div><div>Not needed</div><div>All carry embedded in the futures price</div></div></div>'},
{title:'Describe how the Black model is used to value European interest rate options and European swaptions.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Instrument</div><div>Black Model Application</div><div>Key Detail</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Caplet (call on rate)</div><div>$$V = N \\tau \\cdot e^{-rT}[FRA \\cdot N(d_1) - X \\cdot N(d_2)]$$</div><div>FRA = forward rate; X = cap strike. Cap = portfolio of caplets.</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Floorlet (put on rate)</div><div>Same structure with put payoff logic</div><div>Floor = portfolio of floorlets.</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Payer Swaption</div><div>Right to PAY fixed → call on swap rate. Black model with forward swap rate as F₀.</div><div>Annuity factor weights payoff across swap periods.</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Receiver Swaption</div><div>Right to RECEIVE fixed → put on swap rate.</div><div>Valuable when rates are expected to fall.</div></div></div>'},
{title:'Interpret each of the option Greeks.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Greek</div><div>Measures</div><div>Call / Put Sign</div><div>Highest When</div></div><div class="lo-compare-row lo-compare-4"><div>Δ Delta</div><div>∂V/∂S — price sensitivity to underlying</div><div>Call: 0 to +1. Put: −1 to 0.</div><div>Deep ITM (approaches ±1)</div></div><div class="lo-compare-row lo-compare-4"><div>Γ Gamma</div><div>∂Δ/∂S — rate of change of delta</div><div style="color:#10B981;font-weight:700">Always positive for long options</div><div>ATM, near expiration</div></div><div class="lo-compare-row lo-compare-4"><div>ν Vega</div><div>∂V/∂σ — sensitivity to volatility</div><div style="color:#10B981;font-weight:700">Always positive for long options</div><div>ATM, longer time to expiry</div></div><div class="lo-compare-row lo-compare-4"><div>Θ Theta</div><div>∂V/∂t — time decay</div><div style="color:#EF4444;font-weight:700">Usually negative for long options</div><div>ATM, near expiration (fastest decay)</div></div><div class="lo-compare-row lo-compare-4"><div>ρ Rho</div><div>∂V/∂r — interest rate sensitivity</div><div>Call: positive. Put: negative.</div><div>Long-dated, deep ITM</div></div></div>'},
{title:'Describe how a delta hedge is executed.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Delta Hedging</div><div class="formula-highlight-body">$$\\text{For each option written (short), hold } \\Delta \\text{ shares of underlying}$$\n$$\\text{Example: short 100 calls with } \\Delta = 0.6$$\n$$\\to \\text{Buy 60 shares. If stock rises \\$1: +\\$60 on shares, } {\\sim}{-}\\text{\\$60 on options.}$$</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#6366F1">1</div><div class="lo-step-connector" style="background:#6366F1;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Establish Initial Hedge</div><div class="lo-step-desc">Calculate delta × number of options → buy that many shares</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#6366F1">2</div><div class="lo-step-connector" style="background:#6366F1;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Rebalance as Delta Changes</div><div class="lo-step-desc">As stock price moves, Δ changes → must buy/sell shares to stay hedged ("dynamic hedging")</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#6366F1">3</div></div><div class="lo-step-body"><div class="lo-step-title">Cost = f(Gamma, Volatility)</div><div class="lo-step-desc">Higher gamma → more frequent rebalancing → higher hedging cost. This is the price of being short gamma.</div></div></div></div>'},
{title:'Describe the role of gamma risk in options trading.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Position</div><div>Gamma Sign</div><div>Large Moves Help/Hurt?</div><div>Analogy</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Long Options</div><div style="color:#10B981;font-weight:700">Positive gamma</div><div style="color:#10B981;font-weight:700">Help — each move makes position "more right"</div><div>Surfing: bigger waves = better rides</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Short Options</div><div style="color:#EF4444;font-weight:700">Negative gamma</div><div style="color:#EF4444;font-weight:700">Hurt — each move makes position "more wrong"</div><div>Swimming: bigger waves = more dangerous</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>The gamma trap:</strong> ATM options near expiration have extremely high gamma — delta swings wildly with small price moves. Option sellers near expiration face massive rebalancing risk. This is why option sellers demand theta (time decay premium) — it\'s compensation for bearing gamma risk.</div></div>'},
{title:'Define implied volatility and explain how it is used in options trading.',explanation:'<div class="formula-highlight" style="--active-color:#6366F1"><div class="formula-highlight-title" style="color:#6366F1">📐 Implied Volatility</div><div class="formula-highlight-body">$$\\text{Market price} = BSM(S, X, T, r, \\sigma_{\\text{implied}})$$\n$$\\text{Solve for } \\sigma_{\\text{implied}} \\text{ iteratively (no closed form)}$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #6366F1"><div class="lo-icon-card-emoji">😊</div><div class="lo-icon-card-title">Volatility Smile/Skew</div><div class="lo-icon-card-desc">IV varies by strike: OTM puts typically have higher IV → market prices crash risk above what BSM predicts</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📅</div><div class="lo-icon-card-title">Volatility Term Structure</div><div class="lo-icon-card-desc">IV varies by expiration: short-term IV spikes around events (earnings, elections)</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">VIX ("Fear Gauge")</div><div class="lo-icon-card-desc">30-day implied vol of S&P 500. Spikes during market stress. Used to gauge market sentiment.</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Traders quote in vol, not price.</strong> "Buying vol" = buying options expecting realized vol &gt; IV. "Selling vol" = the opposite. IV is more comparable across strikes and maturities than dollar prices.</div></div>'}
]},

'alt|commodities':{
quickReview:['Commodity sectors: energy, grains, industrial metals, precious metals, livestock, softs. Each has unique supply/demand dynamics.','Life cycle: production → processing → transportation → storage → trading → consumption. Physical constraints drive pricing.','Commodities differ from financial assets: no cash flows, storage costs, convenience yield, supply inelasticity, mean-reverting prices.','Futures participants: hedgers (producers/consumers), speculators (directional bets), arbitrageurs (spot-futures mispricing).','Contango: futures > spot (storage cost > convenience yield). Backwardation: futures < spot (convenience yield dominates).','Total return = spot return + roll return + collateral return. Roll return is negative in contango, positive in backwardation.','Commodity index construction: weighting method (production, liquidity, equal), roll methodology, rebalancing frequency all affect returns.'],
analogy:'Commodity futures are like <em>buying plane tickets in advance</em>. In contango (futures > spot), it\'s like peak-season pricing — future delivery costs more because everyone expects demand. In backwardation (futures < spot), it\'s like a flash sale for future flights — producers are locking in prices now because they\'re desperate to hedge. The "roll return" is the gain or loss you get when your old ticket expires and you buy the next one — great in a flash-sale market, costly in peak season.',
los:[
{title:'Compare characteristics of commodity sectors.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Sector</div><div>Examples</div><div>Key Driver</div><div>Distinctive Feature</div></div><div class="lo-compare-row lo-compare-4"><div>🛢️ Energy</div><div>Crude oil, natural gas, refined products</div><div>Geopolitics, OPEC, global growth</div><div style="color:#EF4444;font-weight:700">Largest sector; highest volatility</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Industrial Metals</div><div>Copper, aluminum, zinc, nickel</div><div>Industrial/construction demand</div><div>Cyclical with global manufacturing PMI</div></div><div class="lo-compare-row lo-compare-4"><div>🥇 Precious Metals</div><div>Gold, silver, platinum</div><div>Monetary demand, inflation fears</div><div>Store of value; safe-haven in crises</div></div><div class="lo-compare-row lo-compare-4"><div>🌾 Agriculture (Grains)</div><div>Corn, wheat, soybeans</div><div>Weather, seasonal planting/harvest</div><div>Government subsidies; supply shocks from weather</div></div><div class="lo-compare-row lo-compare-4"><div>☕ Softs</div><div>Coffee, sugar, cocoa, cotton</div><div>Weather, disease, concentrated regions</div><div>Tropical production → vulnerable to El Niño, frost</div></div><div class="lo-compare-row lo-compare-4"><div>🐄 Livestock</div><div>Cattle, hogs</div><div>Feed costs, disease outbreaks</div><div>Perishable; biological production cycle limits supply response</div></div></div>'},
{title:'Compare the life cycle of commodity sectors from production through trading or consumption.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Sector</div><div>Supply Chain</div><div>Bottleneck Risk</div></div><div class="lo-compare-row lo-compare-3"><div>🛢️ Energy</div><div>Exploration → extraction → refining → transport → storage → consumption</div><div>Long lead times, massive capex, geopolitical disruption at every stage</div></div><div class="lo-compare-row lo-compare-3"><div>🌾 Agriculture</div><div>Planting → growing (weather) → harvest → storage → processing → distribution</div><div>Seasonal production, year-round consumption → storage is critical</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Metals</div><div>Mining → smelting/refining → fabrication → manufacturing</div><div>5-10 year mine development → extreme supply inelasticity</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Physical supply chains drive pricing.</strong> Bottlenecks at any stage (shipping delays, refinery outages, drought) cause price spikes that financial models alone won\'t predict. Understanding the physical chain is essential for commodity analysis.</div></div>'},
{title:'Contrast the valuation of commodities with the valuation of equities and bonds.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>Equities / Bonds</div><div>Commodities</div><div>Valuation Implication</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Cash Flows</div><div>Dividends, coupons → DCF applicable</div><div style="color:#EF4444;font-weight:700">No cash flows</div><div>Can\'t use DCF; value from supply/demand balance</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ Storage Costs</div><div>Negligible</div><div>Warehousing, insurance, spoilage</div><div>Storage costs embedded in futures pricing</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Convenience Yield</div><div>No equivalent</div><div style="color:#10B981;font-weight:700">Physical holders benefit from having commodity on hand</div><div>Offsets storage costs; drives backwardation</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Price Behavior</div><div>Equities can grow indefinitely</div><div>Mean-reverting toward production costs</div><div>High prices → more supply; low prices → production cuts</div></div></div>'},
{title:'Describe types of participants in commodity futures markets.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🛡️</div><div class="lo-icon-card-title">Hedgers</div><div class="lo-icon-card-desc">Producers (sell futures to lock in prices) and consumers (buy futures to lock in costs). Trade to REDUCE risk.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🎲</div><div class="lo-icon-card-title">Speculators</div><div class="lo-icon-card-desc">Directional bets on price. Provide liquidity and accept the risk hedgers want to shed.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Arbitrageurs</div><div class="lo-icon-card-desc">Exploit spot-futures mispricing (cash-and-carry), cross-commodity spreads (crack, crush), or cross-exchange gaps.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏦</div><div class="lo-icon-card-title">Swap Dealers</div><div class="lo-icon-card-desc">Facilitate customized OTC exposures, warehouse risk, manage portfolios of commodity swaps.</div></div></div>'},
{title:'Analyze the relationship between spot prices and futures prices in markets in contango and backwardation.',explanation:'<div class="formula-highlight" style="--active-color:#F97316"><div class="formula-highlight-title" style="color:#F97316">📐 Futures-Spot Relationship</div><div class="formula-highlight-body">$$F \\approx S \\times (1 + r + storage - convenience yield)$$</div></div><div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Market State</div><div>Futures vs. Spot</div><div>Cause</div><div>Roll Return</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Contango</div><div style="color:#EF4444;font-weight:700">F &gt; S (curve slopes up)</div><div>Storage + financing &gt; convenience yield. Ample supply.</div><div style="color:#EF4444;font-weight:700">Negative (buy expensive next-month)</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Backwardation</div><div style="color:#10B981;font-weight:700">F &lt; S (curve slopes down)</div><div>Convenience yield dominates. Tight physical market.</div><div style="color:#10B981;font-weight:700">Positive (buy cheaper next-month)</div></div></div>'},
{title:'Compare theories of commodity futures returns.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Theory</div><div>Core Claim</div><div>Implication for Speculators</div></div><div class="lo-compare-row lo-compare-3"><div>🛡️ Insurance / Keynes-Hicks</div><div>Hedgers (net short) pay speculators a risk premium → F &lt; E(S_T)</div><div style="color:#10B981;font-weight:700">Speculators earn positive return in backwardation</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Hedging Pressure</div><div>Net hedging position determines who pays the premium</div><div>Producers dominate → backwardation. Consumers dominate → contango.</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Storage / Cost of Carry</div><div>F − S determined by cost of carry: F = S × (1 + r + c − y)</div><div>No directional return prediction — just a pricing relationship</div></div></div>'},
{title:'Describe, calculate, and interpret the components of total return for a fully collateralized commodity futures contract.',explanation:'<div class="formula-highlight" style="--active-color:#F97316"><div class="formula-highlight-title" style="color:#F97316">📐 Components of Futures Return</div><div class="formula-highlight-body">$$Total return = Spot return + Roll return + Collateral return$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Component</div><div>Formula</div><div>Driver</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Spot Return</div><div>(S₁ − S₀) / S₀</div><div>Change in the commodity spot price</div></div><div class="lo-compare-row lo-compare-3"><div>🔄 Roll Return</div><div>(Near-month − next-month) / near-month</div><div>Positive in backwardation; negative in contango (often the swing factor)</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Collateral Return</div><div>T-bill rate on notional posted as margin</div><div>Risk-free rate earned on the fully collateralized position</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Example:</strong> Spot +5%, roll −2%, collateral +4% → total = +7%. Roll return often dominates the difference between commodity futures returns and spot price changes.</div></div>'},
{title:'Contrast roll return in markets in contango and markets in backwardation.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Market</div><div>Rolling Mechanics</div><div>Effect on Return</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">📉 Backwardation</div><div>Expiring contract converges up to spot. Next-month contract is cheaper. Sell high, buy low.</div><div style="color:#10B981;font-weight:700">Positive roll return — like "buying wholesale, selling retail" each roll</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">📈 Contango</div><div>Expiring contract converges up to spot, but next-month is already higher. Sell at spot, buy more expensive.</div><div style="color:#EF4444;font-weight:700">Negative roll return — persistent headwind. This is why many commodity ETFs underperform spot indices over time.</div></div></div>'},
{title:'Describe how commodity swaps are used to obtain or modify exposure to commodities.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Swap Type</div><div>How It Works</div><div>Use Case</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Plain Vanilla</div><div>Pay fixed price, receive floating commodity price over specified period</div><div>Airline locks in jet fuel cost; producer locks in selling price</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Total Return Swap</div><div>One party pays total return on commodity index; other pays fixed/floating rate</div><div>Synthetic commodity exposure without holding futures or physical</div></div><div class="lo-compare-row lo-compare-3"><div>🔀 Basis Swap</div><div>Exchange one commodity price for another (e.g., WTI vs. Brent crude)</div><div>Manage geographic or quality basis risk</div></div></div>'},
{title:'Describe how the construction of commodity indexes affects index returns.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Construction Choice</div><div>Options</div><div>Impact on Returns</div><div>Example</div></div><div class="lo-compare-row lo-compare-4"><div>⚖️ Weighting</div><div>Production-weighted, liquidity-weighted, equal</div><div>Production-weighted → energy-heavy → more volatile, correlated with oil</div><div>S&P GSCI (energy ~60%) vs. BCOM (more balanced)</div></div><div class="lo-compare-row lo-compare-4"><div>🔄 Roll Methodology</div><div>Front-month, optimized, enhanced</div><div style="color:#EF4444;font-weight:700">Front-month suffers maximum contango drag; optimized strategies seek flatter curves</div><div>BCOM uses optimized roll; GSCI rolls front-month</div></div><div class="lo-compare-row lo-compare-4"><div>📅 Rebalancing</div><div>Annual, monthly, continuous</div><div>Affects sector weight drift and tracking</div><div>—</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Two investors "in commodities" via different indexes can have dramatically different returns</strong> due to weighting, roll methodology, and rebalancing differences. Always check the index construction before comparing performance.</div></div>'}
]},

'alt|re-overview':{
quickReview:['Real estate: tangible, illiquid, heterogeneous, location-dependent, capital-intensive, leveraged.','Economic drivers: GDP growth, employment, interest rates, demographics, supply pipeline, credit availability.','Property types: office, retail, industrial, multifamily — each with distinct demand drivers, lease structures, and cyclical sensitivity.','Due diligence: physical inspection, title/legal review, environmental assessment, tenant analysis, market study, financial analysis.','Indexes: appraisal-based (NCREIF — smooth, lagged), transaction-based (repeat-sales), REIT-based (real-time but includes capital market noise).'],
analogy:'Real estate investing is like <em>owning a toll bridge</em>. The tolls (rent) provide steady income, the bridge\'s value depends on traffic patterns (demand), and you can\'t pick it up and move it (location-fixed). Each bridge is unique (heterogeneous), takes years to build (supply inelastic in short run), and usually requires a big loan (leveraged). Appraisal-based indexes are like estimating traffic by counting cars once a quarter — they smooth out reality and lag the actual flow.',
los:[
{title:'Compare important real estate investment features for valuation purposes.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #F97316"><div class="lo-icon-card-emoji">🏠</div><div class="lo-icon-card-title">Heterogeneous</div><div class="lo-icon-card-desc">Every property is unique (location, condition, tenants) → comparables require significant judgment</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💧</div><div class="lo-icon-card-title">Illiquid</div><div class="lo-icon-card-desc">Transactions take months → liquidity premium required. Can\'t sell in a day like a stock.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">High Unit Value</div><div class="lo-icon-card-desc">Large indivisible investments → limits diversification for smaller investors</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Leveraged</div><div class="lo-icon-card-desc">Typically 50-80% LTV. Amplifies both returns and risks — doubles the upside AND the downside.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">Management Intensive</div><div class="lo-icon-card-desc">Requires active management (leasing, maintenance, capex) — unlike passive stock ownership</div></div></div>'},
{title:'Explain economic value drivers of real estate investments and their role in a portfolio.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Driver Category</div><div>Key Factors</div><div>How They Affect Value</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Demand Drivers</div><div>GDP growth, employment, population, household formation</div><div>Stronger economy → higher occupancy → higher rents → higher NOI</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Supply Factors</div><div>Construction pipeline, permits, land availability, regulatory barriers</div><div>More supply → higher vacancy → rent pressure. Supply-constrained markets hold value better.</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Capital Market</div><div>Interest rates, credit availability, cap rates, risk appetite</div><div>Lower rates → lower cap rates → higher property values (and vice versa)</div></div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Income Generation</div><div class="lo-icon-card-desc">Stable rental yields (4-7% typically)</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Inflation Hedge</div><div class="lo-icon-card-desc">Rents adjust with inflation over time</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔀</div><div class="lo-icon-card-title">Diversification</div><div class="lo-icon-card-desc">Low correlation with stocks/bonds (especially private RE)</div></div></div>'},
{title:'Discuss the distinctive investment characteristics of commercial property types.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Type</div><div>Lease Structure</div><div>Key Demand Driver</div><div>Current Trend</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 Office</div><div>Long (5-10yr), high tenant improvement costs</div><div>Employment, white-collar jobs</div><div style="color:#EF4444;font-weight:700">WFH disruption; hybrid model uncertainty</div></div><div class="lo-compare-row lo-compare-4"><div>🛒 Retail</div><div>Anchor + in-line; % rent clauses</div><div>Consumer spending, foot traffic</div><div style="color:#EF4444;font-weight:700">E-commerce disruption; shift to experiential</div></div><div class="lo-compare-row lo-compare-4"><div>🏭 Industrial/Logistics</div><div>Long leases, low management</div><div>E-commerce, supply chain</div><div style="color:#10B981;font-weight:700">Booming; last-mile demand; lower cap rates</div></div><div class="lo-compare-row lo-compare-4"><div>🏘️ Multifamily</div><div>Short (1yr), defensive</div><div>Demographics, household formation</div><div>Less cyclical; rent regulation risk in some markets</div></div><div class="lo-compare-row lo-compare-4"><div>🏨 Hospitality</div><div>No leases — daily re-leasing via room rates</div><div>GDP, travel, tourism</div><div style="color:#EF4444;font-weight:700">Most volatile; highest operating leverage</div></div></div>'},
{title:'Explain the due diligence process and valuation approaches for real estate investments.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F97316">1</div><div class="lo-step-connector" style="background:#F97316;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Physical Inspection</div><div class="lo-step-desc">Structural condition, environmental issues (asbestos, contamination), deferred maintenance, code compliance</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F97316">2</div><div class="lo-step-connector" style="background:#F97316;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Legal & Title Review</div><div class="lo-step-desc">Title search, zoning/entitlements, easements, liens, pending litigation</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F97316">3</div><div class="lo-step-connector" style="background:#F97316;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Market Analysis</div><div class="lo-step-desc">Supply pipeline, vacancy trends, comparable rents, absorption rates, submarket dynamics</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F97316">4</div><div class="lo-step-connector" style="background:#F97316;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Tenant & Financial Analysis</div><div class="lo-step-desc">Tenant credit quality, lease terms, rollover schedule, historical NOI, expense ratios, capex needs</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#F97316">5</div></div><div class="lo-step-body"><div class="lo-step-title">Valuation</div><div class="lo-step-desc">Income (V = NOI/cap rate, or DCF), sales comparison ($/sq ft from comps), cost approach (land + replacement − depreciation)</div></div></div></div>'},
{title:'Discuss real estate investment indexes, including their construction and potential biases.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Index Type</div><div>Data Source</div><div>Strength</div><div>Key Bias</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Appraisal-Based (NCREIF, IPD)</div><div>Quarterly property appraisals</div><div>Broad coverage, stable</div><div style="color:#EF4444;font-weight:700">Smoothing (understates vol), lagging (reflects past), selection bias</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Transaction-Based</div><div>Actual sale prices (repeat-sales, hedonic)</div><div>Less smoothing, real prices</div><div>Selection bias (only sold properties), small samples, irregular timing</div></div><div class="lo-compare-row lo-compare-4"><div>📈 REIT-Based (FTSE NAREIT)</div><div>Real-time stock market pricing</div><div style="color:#10B981;font-weight:700">High frequency, liquid, no lag</div><div>Includes capital market noise, leverage effects, management quality — not pure RE</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Appraisal smoothing is a big deal:</strong> It makes RE look less volatile and less correlated with other assets than it truly is. Unsmoothing adjustments approximately <em>double</em> the measured volatility. Investors relying on raw appraisal-based data underestimate RE risk.</div></div>'}
]},

'alt|re-public':{
quickReview:['Public RE securities: REITs (equity, mortgage, hybrid), REOCs, RE ETFs, CMBS. REITs must distribute 90%+ of income.','NAVPS: estimate net asset value per share from property values. NAVPS = (MV of assets − liabilities) / shares.','FFO = NI + depreciation − gains on sales. AFFO = FFO − recurring capex − straight-line rent adjustment. AFFO ≈ sustainable cash flow.','Valuation: NAV-based (premium/discount to NAV), income-based (P/FFO, P/AFFO), DCF (discount projected dividends/AFFO).','Public vs. private RE: public = liquid, diversified, transparent but correlated with equities. Private = illiquid, direct control, purer RE exposure.'],
analogy:'A REIT is like a <em>mutual fund that owns buildings instead of stocks</em>. FFO is the REIT\'s version of "operating earnings" — regular net income overstates depreciation (buildings don\'t depreciate like machines), so FFO adds it back. AFFO goes further by deducting maintenance capex — because even though the building doesn\'t "depreciate" to zero, the roof still needs replacing. P/AFFO is the REIT world\'s P/E ratio.',
los:[
{title:'Discuss types of publicly traded real estate securities.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Type</div><div>What It Owns</div><div>Income Source</div><div>Key Feature</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 Equity REIT</div><div>Physical properties (offices, malls, warehouses)</div><div>Rental income</div><div style="color:#10B981;font-weight:700">~90% of REIT market cap. Must distribute ≥90% of taxable income.</div></div><div class="lo-compare-row lo-compare-4"><div>🏦 Mortgage REIT</div><div>Mortgages and MBS</div><div>Interest spread (borrow short, lend long)</div><div style="color:#EF4444;font-weight:700">Highly rate-sensitive, more leveraged and volatile</div></div><div class="lo-compare-row lo-compare-4"><div>🔀 Hybrid REIT</div><div>Properties + mortgages</div><div>Rent + interest</div><div>Combined exposure</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ REOC</div><div>Properties (not structured as REIT)</div><div>Rent + development profits</div><div>No mandatory payout → more flexibility to reinvest, but no tax advantage</div></div><div class="lo-compare-row lo-compare-4"><div>📊 RE ETFs</div><div>Portfolio of REITs/RE stocks</div><div>Diversified RE returns</div><div>Liquid, diversified, low minimum</div></div></div>'},
{title:'Justify the use of NAVPS in valuation of publicly traded RE securities and estimate NAVPS based on forecasted cash NOI.',explanation:'<div class="formula-highlight" style="--active-color:#F97316"><div class="formula-highlight-title" style="color:#F97316">📐 Net Asset Value Per Share</div><div class="formula-highlight-body">$$NAVPS = (Property MV + Other assets - Liabilities) / Shares$$\n$$Property MV = \\frac{NOI}{Cap} rate (direct capitalization)$$</div><div class="formula-highlight-note">Example: NOI = $50M, cap rate = 5%, other assets = $10M, debt = $200M, shares = 20M. Property MV = $1,000M. NAV = ($1,000M + $10M − $200M) / 20M = $40.50/share.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>REIT Price vs. NAV</div><div>Signal</div><div>Possible Reason</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Price &lt; NAV (discount)</div><div>Potentially undervalued</div><div>Market doubts asset values, poor management, overleveraged</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Price &gt; NAV (premium)</div><div>Market expects growth or management value-add</div><div>Strong pipeline, superior management, platform value</div></div></div>'},
{title:'Describe the use of FFO and AFFO in REIT valuation.',explanation:'<div class="formula-highlight" style="--active-color:#F97316"><div class="formula-highlight-title" style="color:#F97316">📐 FFO and AFFO</div><div class="formula-highlight-body">$$FFO = NI + Depreciation (RE) - Gains on sales + Losses on sales$$\n$$AFFO = FFO - Recurring capex - Straight-line rent adjustment$$</div></div><div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Metric</div><div>What It Removes / Adds</div><div>Why</div><div>Quality as Cash Measure</div></div><div class="lo-compare-row lo-compare-4"><div>📊 NI</div><div>Standard GAAP net income</div><div>—</div><div style="color:#EF4444;font-weight:700">Poor — RE depreciation overstates economic decline</div></div><div class="lo-compare-row lo-compare-4"><div>📈 FFO</div><div>Adds back RE depreciation; removes sale gains/losses</div><div>Buildings don\'t depreciate to zero; sales aren\'t recurring</div><div style="color:#F59E0B;font-weight:700">Better — but ignores maintenance capex</div></div><div class="lo-compare-row lo-compare-4"><div>💰 AFFO</div><div>Deducts recurring capex + straight-line rent adjustment</div><div>The roof still needs replacing; straight-line rent isn\'t cash</div><div style="color:#10B981;font-weight:700">Best — closest to sustainable distributable cash</div></div></div>'},
{title:'Calculate and interpret the value of a REIT share using NAV, relative value (P/FFO and P/AFFO), and DCF approaches.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>Formula / Approach</div><div>Anchored To</div><div>Best For</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 NAV-Based</div><div>Compare price to NAVPS. Premium/discount analysis.</div><div>Asset values</div><div>REITs with transparent, valued property portfolios</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Relative Value</div><div>P/FFO and P/AFFO vs. peer REITs. Higher justified by growth/quality.</div><div>Peer market pricing</div><div>Quick screening, sector comparisons</div></div><div class="lo-compare-row lo-compare-4"><div>📈 DCF</div><div>$$V_0 = \\sum \\frac{AFFO_t}{(1+r)^t} + \\frac{TV}{(1+r)^n}$$</div><div>Fundamental cash flows</div><div>When growth rates and capex vary significantly from peers</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Triangulate:</strong> NAV anchors to asset value; multiples anchor to market pricing; DCF anchors to fundamentals. Use all three and investigate divergences.</div></div>'},
{title:'Explain advantages and disadvantages of investing in real estate through publicly traded securities compared to private vehicles.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>Public RE (REITs)</div><div>Private RE</div></div><div class="lo-compare-row lo-compare-3"><div>💧 Liquidity</div><div style="color:#10B981;font-weight:700">Trade daily on exchanges</div><div style="color:#EF4444;font-weight:700">Months to transact, lock-ups</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Correlation</div><div style="color:#EF4444;font-weight:700">Higher correlation with equity markets (short-term noise)</div><div style="color:#10B981;font-weight:700">Purer RE exposure; lower equity correlation</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Control</div><div>No control; passive investment</div><div style="color:#10B981;font-weight:700">Direct control over asset management decisions</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Transparency</div><div style="color:#10B981;font-weight:700">Mandatory SEC disclosure, audited financials</div><div>Opaque; appraisal-based valuations</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Minimum Investment</div><div style="color:#10B981;font-weight:700">Low — buy a single share</div><div style="color:#EF4444;font-weight:700">High — $1M+ for institutional funds</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Diversification</div><div style="color:#10B981;font-weight:700">Own pieces of many properties across sectors</div><div>Concentrated in fewer properties</div></div></div>'}
]},

'alt|hedge-funds':{
quickReview:['HF strategies classified by: equity-related, event-driven, relative value, opportunistic, specialist, multi-manager.','Equity strategies: long/short equity, market neutral, short-biased. Alpha from stock selection, beta can vary.','Event-driven: merger arb (buy target, short acquirer), distressed, activist. Catalysts drive returns, non-market risk.','Relative value: convertible arb, fixed-income arb, volatility arb. Profit from pricing discrepancies, convergence.','Opportunistic: global macro (top-down), managed futures/CTA (trend following). Flexible mandates.','Multi-manager: fund of funds, multi-strategy. Diversification, manager access, but added fees.','Factor models decompose HF returns into traditional (market, size, value) + alternative (momentum, vol selling, carry) factors.'],
analogy:'Hedge fund strategies are like <em>different fishing techniques</em>. Long/short equity is using both a rod AND a net — catching winners, throwing back losers. Merger arb is fishing in a very specific spot where two rivers merge (deal announcement), betting the waters will converge. Global macro is choosing which ocean to fish in based on weather patterns. And a fund of funds is hiring several expert fishermen and hoping their different techniques collectively fill the boat — though you\'re paying two layers of guide fees.',
los:[
{title:'Discuss how hedge fund strategies may be classified.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Category</div><div>Strategies</div><div>Common Return Driver</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Equity-Related</div><div>Long/short, market neutral, short-biased</div><div>Stock selection alpha; variable beta exposure</div></div><div class="lo-compare-row lo-compare-3"><div>⚡ Event-Driven</div><div>Merger arb, distressed debt, activist</div><div>Specific corporate events as catalysts</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Relative Value</div><div>Convertible arb, FI arb, volatility arb</div><div>Pricing discrepancy convergence</div></div><div class="lo-compare-row lo-compare-3"><div>🌍 Opportunistic</div><div>Global macro, managed futures/CTA</div><div>Macro trends, momentum across asset classes</div></div><div class="lo-compare-row lo-compare-3"><div>🔬 Specialist</div><div>Sector-focused (tech, healthcare), EM, ILS/reinsurance</div><div>Domain expertise, niche information advantage</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Multi-Manager</div><div>Fund of funds, multi-strategy</div><div>Diversification across strategies and managers</div></div></div>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of equity-related hedge fund strategies.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Strategy</div><div>Implementation</div><div>Return Profile</div><div>Portfolio Role</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Long/Short Equity</div><div>Buy undervalued, short overvalued. Net exposure varies.</div><div>Equity-like returns with lower drawdowns</div><div>Core HF allocation; alpha from stock selection</div></div><div class="lo-compare-row lo-compare-4"><div>⚖️ Market Neutral</div><div>Long/short with ~zero net market exposure (dollar or beta neutral)</div><div>Low volatility, low correlation</div><div>Low-correlation alpha source; pure skill extraction</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Short-Biased</div><div>Net short exposure. Profits in declining markets.</div><div style="color:#EF4444;font-weight:700">Structural headwind (markets trend up)</div><div>Crisis protection / portfolio insurance</div></div></div>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of event-driven hedge fund strategies.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Strategy</div><div>Implementation</div><div>Key Risk</div><div>Portfolio Role</div></div><div class="lo-compare-row lo-compare-4"><div>🤝 Merger Arbitrage</div><div>Buy target + short acquirer (stock deals). Profit = deal spread closing.</div><div style="color:#EF4444;font-weight:700">Deal breaks (regulatory, financing, vote) → left-tail risk</div><div>Steady income; low market correlation in normal times</div></div><div class="lo-compare-row lo-compare-4"><div>💀 Distressed Debt</div><div>Buy debt of bankrupt/near-bankrupt companies at deep discount</div><div>Illiquidity, long horizon, legal complexity</div><div>High-return potential from restructuring/recovery</div></div><div class="lo-compare-row lo-compare-4"><div>📢 Activist</div><div>Take significant stake, push for changes (board, strategy, buybacks)</div><div>Management resistance, execution risk</div><div>Alpha from governance improvement; catalyst-driven</div></div></div>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of relative value hedge fund strategies.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Strategy</div><div>Implementation</div><div>Key Risk</div><div>Portfolio Role</div></div><div class="lo-compare-row lo-compare-4"><div>🔄 Convertible Arb</div><div>Buy convertible bond (cheap option), delta-hedge by shorting the stock</div><div>Credit deterioration, liquidity withdrawal</div><div>Carry income + option mispricing alpha</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Fixed-Income Arb</div><div>Exploit yield curve/spread mispricings (on-the-run vs. off-the-run, swap spreads)</div><div style="color:#EF4444;font-weight:700">Small profits + high leverage → LTCM-type blowup risk</div><div>Steady returns in calm markets; dangerous in crises</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Volatility Arb</div><div>Trade implied vs. realized vol. Buy options when IV &lt; expected realized; sell when IV &gt; realized.</div><div>Realized vol exceeds IV (for vol sellers); model risk</div><div>Low correlation; pure vol exposure isolated via delta-hedging</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Relative value appears "safe" but isn\'t.</strong> Low vol in normal markets masks tail risk. During liquidity crises, all correlations go to 1 — convergence trades diverge violently, and leverage amplifies losses (LTCM 1998, quant crisis 2007).</div></div>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of opportunistic hedge fund strategies.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Strategy</div><div>Implementation</div><div>Crisis Behavior</div><div>Portfolio Role</div></div><div class="lo-compare-row lo-compare-4"><div>🌍 Global Macro</div><div>Top-down bets on FX, rates, equities, commodities. Discretionary or systematic.</div><div style="color:#10B981;font-weight:700">Crisis alpha — can profit from disruptions</div><div>Flexible alpha; low correlation; tail-risk protection</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Managed Futures / CTA</div><div>Systematic trend-following across all futures markets. Long uptrends, short downtrends.</div><div style="color:#10B981;font-weight:700">Positively convex — profits in extreme up AND down markets</div><div>Excellent crisis hedge; negative equity correlation in crashes</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Diversification powerhouses:</strong> Both strategies shine when traditional assets suffer. Managed futures in particular have delivered positive returns in every major equity market drawdown since the 1980s — making them a rare source of genuine crisis protection.</div></div>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of specialist hedge fund strategies.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏥</div><div class="lo-icon-card-title">Sector-Focused</div><div class="lo-icon-card-desc">Healthcare (biotech catalysts, FDA), technology (disruption), energy (commodity cycles). Deep domain expertise = edge.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Emerging Markets</div><div class="lo-icon-card-desc">Exploit inefficiencies in less-efficient markets. Higher return potential but political, liquidity, and currency risk.</div></div><div class="lo-icon-card" style="border-top:3px solid #F97316"><div class="lo-icon-card-emoji">🌪️</div><div class="lo-icon-card-title">Reinsurance / ILS</div><div class="lo-icon-card-desc">Catastrophe bonds. Returns driven by natural disasters — truly uncorrelated with financial markets.</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Portfolio role:</strong> Concentrated alpha from expertise, but higher idiosyncratic risk. Best as a complement to broader strategies, not a core allocation. Reinsurance/ILS provides genuinely unique diversification.</div></div>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of multi-manager hedge fund strategies.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Structure</div><div>How It Works</div><div>Fee Impact</div><div>Return Profile</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ Fund of Funds (FoF)</div><div>Invest in a portfolio of hedge funds. Due diligence + access advantages.</div><div style="color:#EF4444;font-weight:700">Double fee layer: FoF fees + underlying HF fees</div><div>Smoother but lower returns (fee drag)</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 Multi-Strategy (single firm)</div><div>One firm runs multiple strategy pods. Capital allocated dynamically.</div><div style="color:#10B981;font-weight:700">Single fee layer; better risk integration</div><div>More consistent, lower volatility</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>FoFs</strong> suit smaller allocators lacking direct access/expertise. <strong>Multi-strategy</strong> firms (Citadel, Millennium) provide institutional-quality diversification within one vehicle — increasingly the dominant model for large allocators.</div></div>'},
{title:'Describe how factor models may be used to understand hedge fund risk exposures.',explanation:'<div class="formula-highlight" style="--active-color:#F97316"><div class="formula-highlight-title" style="color:#F97316">📐 HF Factor Model</div><div class="formula-highlight-body">$$R_{HF} = \\alpha + \\beta_1(\\text{Equity}) + \\beta_2(\\text{Credit}) + \\beta_3(\\text{Vol}) + \\beta_4(\\text{Mom})$$\n$$+ \\beta_5(\\text{Size}) + \\beta_6(\\text{Value}) + \\cdots + \\varepsilon$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Factor Type</div><div>Examples</div><div>Available Cheaply?</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Traditional</div><div>Equity market, interest rates, credit spreads</div><div style="color:#10B981;font-weight:700">Yes — ETFs, index funds (~5-20 bps)</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Alternative</div><div>Vol selling, merger spread, trend/momentum, carry, liquidity</div><div style="color:#F59E0B;font-weight:700">Increasingly — factor/smart-beta ETFs (~30-80 bps)</div></div><div class="lo-compare-row lo-compare-3"><div>💎 True Alpha (α)</div><div>Manager skill after all factors explained</div><div style="color:#EF4444;font-weight:700">No — this is what justifies "2 and 20" fees</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>The critical question:</strong> If most of a fund\'s return is explained by β\'s (systematic factors), you\'re paying HF fees for exposures available far cheaper through ETFs. Only genuine α — the residual after all factor exposures — justifies premium fees.</div></div>'},
{title:'Evaluate the impact of an allocation to a hedge fund strategy in a traditional investment portfolio.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Dimension</div><div>Potential Benefit</div><div>Potential Cost</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Risk-Adjusted Return</div><div>Higher Sharpe ratio from uncorrelated alpha</div><div style="color:#EF4444;font-weight:700">Fee drag: "2 and 20" erodes gross returns significantly</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Drawdown Protection</div><div>Managed futures/macro reduce max drawdown</div><div>Lock-ups, gates, side pockets → can\'t exit when needed most</div></div><div class="lo-compare-row lo-compare-3"><div>🔀 Diversification</div><div>Access alternative risk premia (vol, merger, trend)</div><div>Complexity, opacity, manager selection risk (huge dispersion best vs. worst)</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Data Quality</div><div>—</div><div style="color:#EF4444;font-weight:700">Survivorship + backfill bias in HF indices overstate historical returns</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Framework:</strong> Compare Sharpe ratio, max drawdown, and tail risk with and without the HF allocation. Account for realistic fees, liquidity constraints, and the difficulty of selecting top-quartile managers — the median HF after fees may not improve the portfolio.</div></div>'}
]},
