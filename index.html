'corp|dividends':{
quickReview:['Regular cash dividends: expected, stable signal. Extra/special: one-time, no commitment. Liquidating: return of capital, not income.','Stock dividends & splits: no economic impact on wealth — same pie, more slices. Reverse splits signal distress.','Theories: MM irrelevance (perfect markets), bird-in-hand (dividends preferred), tax preference (low/no-dividend preferred due to capital gains tax advantage).','Signaling: dividend initiations/increases = management confidence. Cuts/omissions = severe negative signal (usually avoided at all costs).','Agency costs: dividends reduce free cash flow available for empire-building → disciplining mechanism for management.','Stable dividend: fixed $/share, only raised when sustainable. Constant payout: fixed % of earnings (volatile dividends).','Repurchase methods: open-market (most common, flexible), tender offer (fixed price or Dutch auction), direct negotiation.','Repurchase effect on EPS: accretive if earnings yield (E/P) > after-tax cost of funds used.'],
analogy:'Dividend policy is like a <em>restaurant\'s tipping policy</em>. A stable dividend is like a fixed service charge — customers (shareholders) know exactly what to expect. A constant payout ratio is like "tip whatever you feel" — it fluctuates with the meal quality (earnings). A share repurchase is like the restaurant buying back loyalty cards at a premium — fewer cards outstanding means each remaining card is worth more. And a dividend cut is like removing the service charge mid-meal — it signals the kitchen is in trouble.',
los:[
{title:'Describe the expected effect of regular cash dividends, extra dividends, liquidating dividends, stock dividends, stock splits, and reverse stock splits on shareholders\' wealth and financial ratios.',explanation:'<div class="formula-box"><span class="label">Dividend & Split Effects</span>Regular cash dividend: ↓ cash, ↓ retained earnings, ↓ share price by div amount\n  No net wealth change (cash received = price drop)\n\nExtra/special dividend: same mechanics, but one-time (no future expectation)\n\nLiquidating dividend: return of CAPITAL, not earnings\n  ↓ paid-in capital, signals partial/full wind-down\n\nStock dividend: more shares issued, price adjusts proportionally\n  No change in total wealth, ratios, or ownership %\n  Small stock div (<25%): transfer from RE to common stock + APIC\n\nStock split: same as stock dividend mechanically\n  2:1 split → 2× shares, ½ price. No accounting entry.\n\nReverse split: consolidate shares (e.g., 1:10)\n  Often signals distress (trying to meet minimum price requirements)</div>'},
{title:'Compare theories of dividend policy and explain implications of each for share value given a corporate dividend action.',explanation:'<div class="formula-box"><span class="label">Dividend Policy Theories</span>Modigliani-Miller (Dividend Irrelevance):\n  In perfect markets, dividend policy doesn\'t affect value\n  Investors can create "homemade dividends" by selling shares\n  Implication: dividend changes → no effect on share price\n\nBird-in-Hand (Gordon/Lintner):\n  Investors prefer certain dividends to uncertain capital gains\n  Higher dividends → lower required return → higher value\n  Implication: dividend increase → price increase\n\nTax Preference:\n  Capital gains taxed at lower rate / deferred vs. dividends\n  Investors prefer retention (buybacks) over dividends\n  Implication: dividend increase → price decrease</div><p>In practice, all three forces operate simultaneously. The net effect depends on the investor base\'s tax situation and risk preferences.</p>'},
{title:'Describe types of information (signals) that dividend initiations, increases, decreases, and omissions may convey.',explanation:'<p><span class="key-term">Signaling theory</span>: management has inside information about future prospects. Dividend changes convey that information credibly because they\'re costly to fake.</p><p><strong>Initiation/increase:</strong> management is confident in sustainable future cash flows. Positive signal — market typically reacts favorably. The increase is "sticky" — managers won\'t raise unless they can maintain it.</p><p><strong>Decrease/omission:</strong> extremely negative signal. Companies cut dividends only as a last resort (managers know the market reaction is severe). Implies cash flow problems are serious enough that maintaining the dividend risks financial distress.</p><p>The asymmetry is key: <strong>increases signal good news moderately; cuts signal bad news dramatically</strong>. This is why managers are reluctant to raise dividends — they\'re taking on a quasi-commitment.</p>'},
{title:'Explain how agency costs may affect a company\'s payout policy.',explanation:'<p><span class="key-term">Agency costs</span> arise when managers (agents) may not act in shareholders\' (principals\') best interest. Free cash flow in management\'s hands can be wasted on: empire-building acquisitions, excessive perks, pet projects with negative NPV.</p><p>Dividends serve as a <strong>disciplining mechanism</strong>: by committing to pay out cash, management has less to waste. This is especially relevant for mature companies with stable cash flows but limited growth opportunities.</p><p>Debt also disciplines (fixed interest payments), so leverage and dividends are partial substitutes. Companies with strong governance and aligned incentives face lower agency costs and may have less need for the dividend discipline mechanism.</p>'},
{title:'Explain factors that affect dividend policy in practice.',explanation:'<p>Practical considerations beyond theory:</p><p><strong>Investment opportunities:</strong> high-growth firms retain more (low payout). Mature firms with fewer projects pay more out.</p><p><strong>Expected earnings volatility:</strong> volatile earnings → lower target payout (to avoid cutting).</p><p><strong>Financial flexibility:</strong> need to maintain capacity for future investment, debt repayment, and emergencies.</p><p><strong>Tax considerations:</strong> shareholder tax status affects preference (tax-exempt institutions indifferent; high-income individuals may prefer buybacks).</p><p><strong>Flotation costs:</strong> raising new equity is expensive. Paying dividends then issuing shares is inefficient.</p><p><strong>Contractual/legal restrictions:</strong> debt covenants may limit dividends. Some jurisdictions restrict dividends to retained earnings.</p>'},
{title:'Calculate and interpret the effective tax rate on a given currency unit of corporate earnings under double taxation, dividend imputation, and split-rate tax systems.',explanation:'<div class="formula-box"><span class="label">Tax Systems</span>Double Taxation (Classical — US):\n  Corp tax: Earnings × t_c\n  Shareholder tax: Dividend × t_d\n  Effective rate = 1 − (1−t_c)(1−t_d)\n  Example: t_c=21%, t_d=20% → 1−(0.79)(0.80) = 36.8%\n\nDividend Imputation (Australia, partial credit):\n  Shareholder gets credit for corporate tax paid\n  Effective rate ≈ max(t_c, t_personal) — avoids double taxation\n\nSplit-Rate System (historical Germany):\n  Lower corporate rate on distributed earnings\n  Higher rate on retained earnings\n  Encourages dividend payments</div>'},
{title:'Compare stable dividend with constant dividend payout ratio, and calculate the dividend under each policy.',explanation:'<div class="formula-box"><span class="label">Payout Policies</span>Stable Dividend Policy:\n  Target: fixed $/share, increased only when sustainable\n  Dividend = previous dividend (or previous + small increase)\n  Advantage: predictable income stream, positive signal\n  Disadvantage: disconnect from current earnings\n\nConstant Payout Ratio:\n  Target: fixed % of earnings each period\n  Dividend = EPS × target payout ratio\n  Advantage: dividends track profitability\n  Disadvantage: volatile dividends, potential cuts in bad years\n\nExample: EPS = $4, target payout = 40%\n  Stable: $1.60/share (same as last year)\n  Constant payout: $4 × 0.40 = $1.60 (coincidence here)\n  If EPS drops to $2: stable stays $1.60, constant drops to $0.80</div>'},
{title:'Describe broad trends in corporate payout policies.',explanation:'<p>Key trends over recent decades:</p><p><strong>Fewer firms pay dividends:</strong> the proportion of listed companies paying dividends has declined, especially among younger/tech firms that prefer to retain and reinvest.</p><p><strong>Share repurchases have surged:</strong> buybacks now rival or exceed dividends as a payout mechanism in the US. They offer tax efficiency and flexibility (no "commitment" like a regular dividend).</p><p><strong>Total payout has remained substantial:</strong> while fewer firms pay dividends, those that do pay more. And adding buybacks, total shareholder payout as a % of earnings remains high.</p><p><strong>Global convergence:</strong> European and Asian firms have increasingly adopted buybacks alongside traditional dividends, though cultural and regulatory differences persist.</p>'},
{title:'Compare share repurchase methods.',explanation:'<div class="formula-box"><span class="label">Repurchase Methods</span>Open-Market Repurchase:\n  Company buys shares on the exchange like any investor\n  Most common method (~90%+ of buybacks)\n  Maximum flexibility — no obligation to complete\n  Spread over time → less price impact per trade\n\nFixed-Price Tender Offer:\n  Company offers to buy a set number of shares at a fixed price\n  Price is set at a premium to current market\n  Quick execution, strong signal of undervaluation\n\nDutch Auction Tender:\n  Company specifies a price RANGE\n  Shareholders bid the minimum price they\'d accept\n  Company buys at the lowest clearing price\n  Efficient price discovery\n\nDirect Negotiation:\n  Private purchase from a specific large shareholder\n  May include a premium ("greenmail" in hostile contexts)</div>'},
{title:'Calculate and compare the effect of a share repurchase on EPS when financed with surplus cash vs. debt.',explanation:'<div class="formula-box"><span class="label">EPS Impact of Repurchase</span>Key rule: repurchase is EPS-accretive if:\n  Earnings yield (E/P) > after-tax cost of funds\n\nCash-financed repurchase:\n  Cost of funds = foregone interest income × (1 − tax rate)\n  New EPS = (Earnings − lost after-tax interest) / (Shares − repurchased)\n  Usually accretive because cash earns very little\n\nDebt-financed repurchase:\n  Cost of funds = interest on new debt × (1 − tax rate)\n  New EPS = (Earnings − after-tax interest) / (Shares − repurchased)\n  Accretive if E/P > after-tax borrowing cost\n\nExample: 10M shares, EPS=$3, P=$40, borrow at 5%, tax=25%\n  E/P = 3/40 = 7.5% > 5%×(1−0.25) = 3.75% → ACCRETIVE</div>'},
{title:'Calculate the effect of a share repurchase on book value per share.',explanation:'<div class="formula-box"><span class="label">BVPS Impact</span>If repurchase price > pre-repurchase BVPS:\n  → BVPS DECREASES (buying shares above book value destroys BVPS)\n\nIf repurchase price < pre-repurchase BVPS:\n  → BVPS INCREASES (buying below book value is accretive to BVPS)\n\nIf repurchase price = BVPS:\n  → No change\n\nNew BVPS = (Total equity − repurchase cost) / (Shares − repurchased)\n\nExample: equity=$200M, 10M shares, BVPS=$20\n  Repurchase 1M shares at $25:\n  New equity = $200M − $25M = $175M\n  New shares = 9M\n  New BVPS = $175M / 9M = $19.44 (decreased)</div>'},
{title:'Explain the choice between paying cash dividends and repurchasing shares.',explanation:'<p>The decision depends on several factors:</p><p><strong>Favoring repurchases:</strong> tax efficiency (capital gains often taxed less and deferred), flexibility (no implicit commitment), signals undervaluation, offsets dilution from stock options, adjusts capital structure (if debt-financed).</p><p><strong>Favoring dividends:</strong> stable income for investors who need it (retirees, endowments), stronger commitment signal (harder to cut), some investor clienteles specifically want dividends, avoids potential market timing criticism.</p><p><strong>In practice:</strong> many companies do both — maintain a baseline dividend for stability and use repurchases for incremental payouts when cash flow permits. The mix depends on the investor base, tax environment, and management\'s view on valuation.</p>'},
{title:'Calculate and interpret dividend coverage ratios based on net income and free cash flow.',explanation:'<div class="formula-box"><span class="label">Dividend Coverage Ratios</span>NI-based coverage = Net Income / Dividends\n  (or equivalently: 1 / Payout Ratio)\n  Higher = more cushion to maintain dividends\n\nFCF-based coverage = FCFE / (Dividends + Repurchases)\n  More conservative — uses actual cash available to equity\n  FCFE = CFO − FCInv + Net Borrowing\n\nExample: NI=$500M, Dividends=$200M, FCFE=$350M\n  NI coverage = 500/200 = 2.5× (solid)\n  FCFE coverage = 350/200 = 1.75× (adequate)\n\nCoverage < 1.0× → dividend exceeds earnings/cash flow\n  → unsustainable without asset sales or new borrowing</div>'},
{title:'Identify characteristics of companies that may not be able to sustain their cash dividend.',explanation:'<p>Red flags for dividend sustainability:</p><p><strong>Coverage deterioration:</strong> payout ratio approaching or exceeding 100%. FCFE coverage falling below 1.0× for multiple periods.</p><p><strong>Rising leverage:</strong> increasing debt to maintain dividends — borrowing to pay shareholders is a classic late-stage warning sign.</p><p><strong>Declining earnings trend:</strong> structural (not cyclical) decline in core earnings with no clear path to recovery.</p><p><strong>Cash flow vs. earnings gap:</strong> NI looks healthy but CFO is weak — accrual-based earnings aren\'t converting to cash.</p><p><strong>Contractual constraints:</strong> debt covenants tightening, approaching minimum equity thresholds, regulatory capital requirements under pressure.</p><p><strong>Industry headwinds:</strong> secular decline in the business model (think: legacy media, some retail sectors) combined with heavy capex requirements.</p>'}
]},

'corp|esg':{
quickReview:['Ownership structures vary globally: dispersed (US/UK), concentrated (continental Europe, Asia), state-owned, family-controlled.','Concentrated ownership → potential for principal-principal conflicts (controlling vs. minority shareholders).','ESG analysis: identify material risk exposures (E: carbon, water; S: labor, data privacy; G: board, executive pay), then evaluate management quality.','Green bonds, sustainability-linked loans, and ESG integration in valuation are growing trends.'],
analogy:'ESG analysis is like a <em>home inspection before buying a house</em>. The financial statements are the listing brochure — they show the best angles. ESG analysis checks the foundation (governance), the plumbing (environmental liabilities), and the neighborhood (social factors). A beautiful house with a cracked foundation is a terrible investment, no matter how nice the kitchen looks.',
los:[
{title:'Describe global variations in ownership structures and the possible effects on corporate governance policies and practices.',explanation:'<p>Ownership structures differ dramatically across markets:</p><p><strong>Dispersed ownership (US, UK):</strong> many small shareholders, no single controlling block. Principal-agent problem: managers may not act in shareholders\' interest. Governance response: independent boards, executive compensation alignment, activist investors.</p><p><strong>Concentrated ownership (continental Europe, Asia, Latin America):</strong> controlling families, cross-holdings, pyramidal structures. Principal-principal problem: controlling shareholders may exploit minority shareholders through related-party transactions, tunneling, or dual-class shares.</p><p><strong>State-owned enterprises:</strong> government objectives (employment, national security) may conflict with profit maximization. Governance often weaker; political appointments to boards.</p><p>Analysts must understand the ownership context to assess governance quality and minority shareholder risk.</p>'},
{title:'Evaluate the effectiveness of a company\'s corporate governance policies and practices.',explanation:'<p>Effective governance evaluation covers:</p><p><strong>Board quality:</strong> independence (majority independent directors?), expertise (relevant industry/financial experience), diversity, separate chair/CEO roles, regular board refreshment, limited overboarding.</p><p><strong>Shareholder rights:</strong> one-share-one-vote vs. dual-class, poison pills, ability to call special meetings, proxy access, cumulative voting.</p><p><strong>Executive compensation:</strong> aligned with long-term value creation? Clawback provisions? Performance metrics tied to shareholder returns? Excessive pay relative to peers or performance is a red flag.</p><p><strong>Audit and risk oversight:</strong> independent audit committee, quality of external auditor, risk management framework, whistleblower protections.</p><p><strong>Transparency:</strong> quality and timeliness of disclosures, related-party transaction policies, insider trading policies.</p>'},
{title:'Describe how ESG-related risk exposures and investment opportunities may be identified and evaluated.',explanation:'<p>ESG integration follows a structured process:</p><p><strong>Identification:</strong> use materiality frameworks (SASB, GRI) to determine which ESG factors are financially material for the industry. Carbon emissions matter enormously for utilities but less for software companies. Data privacy is critical for tech but less for mining.</p><p><strong>Evaluation:</strong> assess the company\'s exposure relative to peers and its management of those risks. Key questions: Does the company measure and disclose relevant metrics? Has it set targets? What\'s its track record? How does it compare to industry best practice?</p><p><strong>Opportunities:</strong> ESG leadership can create value through: lower cost of capital (ESG-aware investors), reduced regulatory risk, stronger brand loyalty, better talent attraction, operational efficiency (energy savings), access to green financing.</p>'},
{title:'Evaluate ESG risk exposures and investment opportunities related to a company.',explanation:'<p>Applied ESG evaluation integrates qualitative and quantitative analysis:</p><p><strong>Environmental:</strong> carbon footprint and transition risk (stranded assets?), water usage in water-stressed regions, waste management, biodiversity impact. Quantify: carbon intensity per revenue, environmental capex as % of total, regulatory penalty history.</p><p><strong>Social:</strong> workforce management (turnover, safety incidents, diversity metrics), supply chain labor practices, community relations, product safety, data privacy/security. Quantify: employee satisfaction scores, safety record trends, customer complaint trends.</p><p><strong>Governance:</strong> board structure, ownership concentration, executive compensation alignment, related-party transactions, accounting quality, shareholder rights. Quantify: % independent directors, CEO pay ratio, insider ownership.</p><p>The integration into valuation may take the form of adjusting discount rates (higher for poor ESG), adjusting growth rates, or scenario analysis for regulatory/climate risks.</p>'}
]},

'corp|cost-cap':{
quickReview:['Top-down: country risk premium, industry beta. Bottom-up: company-specific leverage, size, liquidity.','Cost of debt: YTM on existing debt, credit spread approach (risk-free + spread), or debt rating approach.','ERP estimation: historical (arithmetic vs. geometric mean), forward-looking (dividend discount → implied ERP), survey-based.','Required return on equity: CAPM, Fama-French multifactor, build-up method (for private companies), bond yield + risk premium.','Private company: add size premium, specific-company risk premium, illiquidity premium to public-company rate.','Evaluate capital structure: optimal minimizes WACC. Compare D/E, interest coverage, and credit rating vs. peers.'],
analogy:'Cost of capital is like the <em>minimum rent a landlord charges</em>. If investors (landlords) could earn 8% elsewhere at similar risk, they demand at least 8% from your company (tenant). WACC is the blended rent for the whole building — a mix of the rate charged to debt-holders (who get the safe ground floor) and equity-holders (who get the penthouse with better views but more earthquake risk).',
los:[
{title:'Explain top-down and bottom-up factors that impact the cost of capital.',explanation:'<p><strong>Top-down factors</strong> (macro/market-level):</p><p>Risk-free rate (government bond yields), equity risk premium (market-wide compensation for equity risk), country risk premium (for emerging markets — political, legal, economic instability), industry risk (cyclicality, regulatory exposure, competitive dynamics).</p><p><strong>Bottom-up factors</strong> (company-specific):</p><p>Financial leverage (more debt → higher equity risk → higher cost of equity, but tax shield lowers debt cost), operating leverage (fixed vs. variable costs), company size (small-cap premium), liquidity (illiquid stocks demand higher return), business risk (revenue stability, diversification), credit quality.</p>'},
{title:'Compare methods used to estimate the cost of debt.',explanation:'<div class="formula-box"><span class="label">Cost of Debt Methods</span>1. Yield-to-Maturity approach:\n   Use YTM on the company\'s existing traded bonds\n   After-tax: r_d × (1 − t)\n   Best when liquid bonds exist\n\n2. Credit Spread approach:\n   r_d = risk-free rate + credit spread for the rating\n   Useful when the company has a credit rating\n\n3. Debt Rating approach:\n   Estimate a synthetic rating from financial ratios\n   (interest coverage → implied rating → spread)\n   Useful for unrated companies\n\nConsiderations:\n  Use marginal (not historical) cost for new financing decisions\n  Adjust for callable/convertible features if present\n  For floating-rate debt, estimate the expected average rate</div>'},
{title:'Explain historical and forward-looking approaches to estimating an equity risk premium.',explanation:'<div class="formula-box"><span class="label">Equity Risk Premium Estimation</span>Historical (ex post):\n  ERP = avg equity return − avg risk-free return\n  Arithmetic mean: better for single-period expected return\n  Geometric mean: better for long-run compounded return\n  Issues: survivorship bias, period sensitivity, non-stationary\n\nForward-looking (ex ante):\n  Implied ERP from Gordon model: ERP = (D₁/P₀ + g) − r_f\n  Macroeconomic model: ERP = expected equity return − r_f\n  Advantages: current, market-based, no historical bias\n\nSurvey-based:\n  Ask academics, CFOs, strategists for their ERP estimate\n  Issues: anchoring bias, wide dispersion</div><p>No single method is best. Practitioners typically triangulate across all three approaches.</p>'},
{title:'Compare methods used to estimate the required return on equity.',explanation:'<div class="formula-box"><span class="label">Required Return on Equity Methods</span>CAPM: r_e = r_f + β × ERP\n  Simple, widely used, single systematic risk factor\n\nFama-French (multifactor):\n  r_e = r_f + β_mkt×ERP + β_size×SMB + β_value×HML\n  Captures size and value premiums\n  (+momentum factor in Carhart 4-factor model)\n\nBuild-Up Method (private companies):\n  r_e = r_f + ERP + size premium + specific risk premium\n  No beta needed — useful when comparables are scarce\n\nBond Yield + Risk Premium:\n  r_e = company\'s bond YTM + equity risk premium over own debt\n  Simple, company-specific, but imprecise</div>'},
{title:'Estimate the cost of debt or required return on equity for a public company and a private company.',explanation:'<p><strong>Public company:</strong> standard CAPM or multifactor model using market data. Beta estimated from regression of stock returns on market returns. Cost of debt from traded bond yields or credit rating.</p><p><strong>Private company:</strong> no traded equity → no observable beta. Must estimate using:</p><div class="formula-box"><span class="label">Private Company Adjustments</span>1. Find comparable public companies\n2. Unlever their betas: β_asset = β_equity / [1 + (1−t)(D/E)]\n3. Relever to private company\'s target D/E\n4. Add premiums:\n   • Size premium (small firms earn higher returns)\n   • Specific-company risk premium (key-person, customer concentration)\n   • Illiquidity premium (can\'t sell shares easily)\n\nTotal: r_e = r_f + β_relevered × ERP + size + specific + illiquidity</div><p>Private company cost of equity is typically 3-8% higher than a comparable public company due to these premiums.</p>'},
{title:'Evaluate a company\'s capital structure and cost of capital relative to peers.',explanation:'<p>Capital structure evaluation benchmarks the company against peers and its own optimum:</p><p><strong>Leverage metrics:</strong> Debt/Equity, Debt/Capital, Debt/EBITDA, interest coverage (EBIT/Interest). Compare to industry medians and to the company\'s target range.</p><p><strong>Credit quality:</strong> current rating vs. peers. Is the company under- or over-levered relative to its rating? Could it take on more debt at a favorable rate?</p><p><strong>WACC comparison:</strong> estimate WACC at different leverage levels. The optimal capital structure minimizes WACC (maximizes firm value). Too little debt = missing tax shields. Too much debt = financial distress costs outweigh tax benefits.</p><p><strong>Practical constraints:</strong> debt capacity depends on asset tangibility, earnings stability, industry norms, management risk appetite, and covenant restrictions. The "optimal" leverage from a model may not be achievable in practice.</p>'}
]},

'corp|restruct':{
quickReview:['Types: investment actions (acquisitions, JVs, equity investments), divestments (spin-offs, carve-outs, asset sales), cost/BS restructuring (layoffs, debt refinancing).','Motivation: synergies, focus, unlocking value, financial distress, tax optimization, strategic repositioning.','Valuation: DCF of combined/restructured entity, comparable transactions, accretion/dilution analysis, sum-of-parts.','Impact on metrics: EPS (accretion/dilution), Net Debt/EBITDA (leverage change), WACC (capital structure shift).','Spin-offs: tax-free separation → market can value each piece independently. Often unlocks "conglomerate discount."','Cost restructuring: one-time charges (severance, write-downs) → improved ongoing margins. Check if "restructuring" is actually recurring.'],
analogy:'Corporate restructuring is like <em>renovating a house to sell</em>. An acquisition is adding a new wing (bigger, but will the addition match the original?). A spin-off is splitting a duplex into two separate homes (each might sell for more independently). Cost restructuring is gutting the kitchen and redoing it — painful and expensive upfront, but the house is worth more when it\'s done. And a balance sheet restructuring is refinancing the mortgage — same house, better terms.',
los:[
{title:'Explain types of corporate restructurings and issuers\' motivations for pursuing them.',explanation:'<div class="formula-box"><span class="label">Restructuring Types</span>INVESTMENT ACTIONS:\n  • Acquisitions: buy another company (horizontal, vertical, conglomerate)\n  • Joint Ventures: shared ownership of a new entity\n  • Equity investments: minority stakes for strategic access\n\nDIVESTMENT ACTIONS:\n  • Spin-off: distribute subsidiary shares to existing shareholders (tax-free)\n  • Carve-out/IPO: sell minority stake in subsidiary to public\n  • Asset sale: sell a division/unit for cash\n\nCOST/BALANCE SHEET RESTRUCTURING:\n  • Workforce reduction, facility closures\n  • Debt restructuring (refinance, exchange, renegotiate)\n  • Bankruptcy/reorganization</div><p><strong>Motivations:</strong> synergy capture, strategic focus, sum-of-parts value unlocking, financial distress resolution, tax optimization, responding to activist pressure, acquiring capabilities.</p>'},
{title:'Explain the initial evaluation of a corporate restructuring.',explanation:'<p>The initial evaluation framework asks:</p><p><strong>Strategic rationale:</strong> does the restructuring make strategic sense? Does it create value or just shuffle assets? Is management\'s stated rationale credible?</p><p><strong>Valuation impact:</strong> what is the expected change in firm value? Are projected synergies realistic and achievable? What\'s the track record of similar transactions?</p><p><strong>Execution risk:</strong> integration complexity (for acquisitions), organizational disruption, key-person retention, cultural compatibility, timeline realism.</p><p><strong>Financial impact:</strong> effect on EPS, leverage, WACC, credit rating. Can the company fund the transaction? Will it require dilutive equity issuance?</p><p><strong>Stakeholder impact:</strong> employee displacement, customer/supplier disruption, regulatory approval requirements, shareholder approval needed?</p>'},
{title:'Demonstrate valuation methods for, and interpret valuations of, companies involved in corporate restructurings.',explanation:'<p>Multiple valuation approaches are used in restructuring contexts:</p><p><strong>DCF of combined entity:</strong> project combined cash flows including synergies, discount at the new WACC. Compare combined value to sum of standalone values + premium paid.</p><p><strong>Comparable transactions:</strong> what have similar deals priced at? Use EV/EBITDA, EV/Revenue, or P/E multiples from recent comparable transactions.</p><p><strong>Sum-of-the-parts (SOTP):</strong> especially relevant for spin-offs and conglomerates. Value each segment independently using appropriate multiples or DCF, then sum. If SOTP > market cap → conglomerate discount exists → restructuring may unlock value.</p><p><strong>LBO analysis:</strong> for leveraged buyouts — can the deal generate target returns (typically 20%+ IRR) at the proposed leverage levels?</p>'},
{title:'Demonstrate how corporate restructurings affect an issuer\'s EPS, net debt to EBITDA ratio, and WACC.',explanation:'<div class="formula-box"><span class="label">Key Metric Impacts</span>EPS ACCRETION/DILUTION:\n  Accretive if: target\'s earnings yield > acquirer\'s cost of financing\n  Cash deal: almost always accretive (cash earns almost nothing)\n  Stock deal: accretive if target E/P > acquirer E/P\n\nNET DEBT / EBITDA:\n  Cash/debt acquisition → leverage increases (more debt, same equity)\n  Spin-off → depends on debt allocation\n  Debt restructuring → directly targets this metric\n\nWACC:\n  Acquisition may change business risk profile → new beta\n  Leverage change → new D/E → new WACC\n  Cross-border deals may introduce country risk premium</div><p>Analysts should model all three metrics pre- and post-transaction and assess whether the restructuring creates shareholder value on a risk-adjusted basis.</p>'},
{title:'Evaluate corporate investment actions, including equity investments, joint ventures, and acquisitions.',explanation:'<p><strong>Equity investments (minority stakes):</strong> lower commitment, strategic access (technology, market entry), limited control. Evaluate: strategic fit, purchase price vs. fair value, equity method accounting impact on financials.</p><p><strong>Joint ventures:</strong> shared risk and investment, access to partner capabilities. Evaluate: alignment of partner incentives, governance structure, exit provisions, accounting treatment (equity method), technology/IP sharing risks.</p><p><strong>Acquisitions:</strong> full control but highest risk and cost. Evaluate: synergy realism (revenue synergies are harder than cost synergies), premium paid vs. value created, integration plan, cultural fit, management retention, financing structure (cash vs. stock vs. debt).</p><p>For all three: compare the expected return on invested capital (ROIC) to WACC. If ROIC > WACC → value created.</p>'},
{title:'Evaluate corporate divestment actions, including sales and spin-offs.',explanation:'<p><strong>Asset/division sale:</strong> receive cash proceeds immediately. Evaluate: sale price vs. intrinsic value of the unit, tax implications (capital gains), use of proceeds (debt paydown, return to shareholders, reinvestment), impact on remaining business (loss of diversification, shared cost reallocation).</p><p><strong>Spin-off:</strong> no cash proceeds — shares distributed pro rata to existing shareholders. Evaluate: strategic focus improvement, removal of conglomerate discount, independent management can optimize for the spun-off business, tax-free (if structured properly). Research shows <span class="key-term">spin-offs tend to outperform</span> because focused companies are more efficiently managed and valued.</p><p>For both: assess whether the parent or the divested unit was the "problem." Sometimes the remaining parent, freed from a distraction, performs better. Sometimes the freed subsidiary thrives independently.</p>'},
{title:'Evaluate cost and balance sheet restructurings.',explanation:'<p><strong>Cost restructuring:</strong> workforce reductions, facility closures, process redesign. One-time charges (severance, write-downs, lease termination) → improved ongoing margins.</p><p>Evaluate: is the restructuring charge genuinely one-time, or does the company take "recurring restructuring" charges? (Red flag if frequent.) Are projected savings realistic? What\'s the payback period? Will cuts impair revenue-generating capacity?</p><p><strong>Balance sheet restructuring:</strong> debt-for-equity swaps, refinancing at lower rates, extending maturities, asset sales to reduce debt.</p><p>Evaluate: does the restructuring address the root cause (overleveraged) or just buy time? Impact on credit rating and borrowing costs. Dilution to existing shareholders (if equity issued). Covenant relief obtained.</p><p>For distressed companies: assess viability of the restructured entity. Is the core business sound, just burdened by an unsustainable capital structure? Or is the business itself impaired?</p>'}
]},
