'ethics|code':{
quickReview:['Six components of Code of Ethics: act with integrity, place client interests first, use reasonable care, practice in an ethical manner, promote integrity of capital markets, maintain and improve professional competence.','Seven Standards: I. Professionalism, II. Integrity of Capital Markets, III. Duties to Clients, IV. Duties to Employers, V. Investment Analysis/Recommendations, VI. Conflicts of Interest, VII. Responsibilities as CFA Member/Candidate.'],
analogy:'The Code of Ethics is like the <em>Hippocratic Oath for investment professionals</em>. Just as doctors swear to "first, do no harm," CFA charterholders pledge to put client interests above their own. The seven Standards are the specific rules that make the oath operational — they translate the broad principle of "act with integrity" into concrete, testable behaviors. The Code is the spirit; the Standards are the letter.',
los:[
{title:'Describe the six components of the Code of Ethics and the seven Standards of Professional Conduct.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">1. Integrity & Competence</div><div class="lo-icon-card-desc">Act with integrity, competence, diligence, and respect toward all stakeholders</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">👤</div><div class="lo-icon-card-title">2. Client Interests First</div><div class="lo-icon-card-desc">Place client interests and profession integrity above personal interests</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">🔍</div><div class="lo-icon-card-title">3. Reasonable Care</div><div class="lo-icon-card-desc">Use reasonable care and independent professional judgment</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">🤝</div><div class="lo-icon-card-title">4. Ethical Practice</div><div class="lo-icon-card-desc">Practice and encourage others to practice ethically</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">5. Market Integrity</div><div class="lo-icon-card-desc">Promote integrity and viability of global capital markets for society\'s benefit</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">📚</div><div class="lo-icon-card-title">6. Professional Competence</div><div class="lo-icon-card-desc">Maintain and improve professional competence continuously</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Standard</div><div>Focus</div><div>Key Sub-Standards</div></div><div class="lo-compare-row lo-compare-3"><div>I. Professionalism</div><div>Personal conduct</div><div>Knowledge of Law, Independence & Objectivity, Misrepresentation, Misconduct</div></div><div class="lo-compare-row lo-compare-3"><div>II. Capital Markets</div><div>Market integrity</div><div>Material Nonpublic Information, Market Manipulation</div></div><div class="lo-compare-row lo-compare-3"><div>III. Duties to Clients</div><div>Client protection</div><div>Loyalty/Prudence/Care, Fair Dealing, Suitability, Performance Presentation, Confidentiality</div></div><div class="lo-compare-row lo-compare-3"><div>IV. Duties to Employers</div><div>Employer relationship</div><div>Loyalty, Additional Compensation, Supervisor Responsibilities</div></div><div class="lo-compare-row lo-compare-3"><div>V. Investment Analysis</div><div>Research quality</div><div>Diligence & Reasonable Basis, Communication, Record Retention</div></div><div class="lo-compare-row lo-compare-3"><div>VI. Conflicts of Interest</div><div>Conflict management</div><div>Disclosure of Conflicts, Priority of Transactions, Referral Fees</div></div><div class="lo-compare-row lo-compare-3"><div>VII. CFA Responsibilities</div><div>Program integrity</div><div>Conduct in CFA Program, Reference to CFA Institute</div></div></div>'},
{title:'Explain the ethical responsibilities required of CFA Institute members and candidates by the Code and Standards.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">📜</div><div class="lo-icon-card-title">Stricter Rule</div><div class="lo-icon-card-desc">Follow whichever is stricter — local law OR the Code. If local law is weaker, follow the Code. If local law is tougher, follow local law.</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">👤</div><div class="lo-icon-card-title">Client First</div><div class="lo-icon-card-desc">Client interests override personal interests, employer interests, and even the profession\'s interests generally.</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">🛡️</div><div class="lo-icon-card-title">Independence</div><div class="lo-icon-card-desc">Don\'t let gifts, compensation, relationships, or pressure compromise judgment. Disclose potential conflicts.</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">🔬</div><div class="lo-icon-card-title">Diligence</div><div class="lo-icon-card-desc">Have a reasonable and adequate basis for all recommendations. Do the research — don\'t follow tips or rumors blindly.</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Market Integrity</div><div class="lo-icon-card-desc">Don\'t trade on MNPI, don\'t manipulate markets, report violations through appropriate channels.</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Continuous Learning</div><div class="lo-icon-card-desc">The competence obligation doesn\'t end at the charter — ongoing education is an ethical requirement.</div></div></div>'}

'ethics|guidance':{
quickReview:['Standard I: know the law (follow stricter of law vs. Code), maintain independence (refuse gifts that compromise), no misrepresentation, no misconduct.','Standard II: don\'t trade on MNPI (mosaic theory: combining public + non-material nonpublic is OK), no market manipulation.','Standard III: loyalty/prudence/care (fiduciary duty), fair dealing (not necessarily equal but fair), suitability (IPS), accurate performance, keep client info confidential.','Standard IV: loyalty to employer (don\'t compete, return materials on leaving), disclose additional compensation, supervisors must establish compliance procedures.','Standard V: have reasonable basis for recommendations, communicate risks/limitations, retain records for 7 years.','Standard VI: disclose all conflicts, client transactions take priority over personal, disclose referral fees.','Standard VII: don\'t cheat on the CFA exam, don\'t misrepresent CFA status or exaggerate the charter\'s meaning.'],
analogy:'The Guidance is like a <em>referee\'s rulebook with illustrated examples</em>. The Standards are the rules ("no handball"), and the Guidance shows exactly what counts as a violation and what doesn\'t, with case studies for every gray area. Mosaic theory is like putting together a jigsaw puzzle from many small public pieces — each piece is legal, and the completed picture (your investment conclusion) is your own analytical work product, not insider information.',
los:[
{title:'Demonstrate thorough knowledge of the CFA Institute Code of Ethics and Standards of Professional Conduct by applying them to specific situations.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Standard Tested</div><div>Key Rule</div><div>Exam Trap to Watch</div></div><div class="lo-compare-row lo-compare-3"><div>📊 II(A) — MNPI</div><div>Material nonpublic information cannot be acted upon</div><div style="color:#10B981;font-weight:700">Mosaic theory IS allowed: combining non-material nonpublic + public info to form a conclusion = legitimate research, NOT insider trading</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ III(B) — Fair Dealing</div><div>All clients must receive fair treatment — disseminate simultaneously</div><div>"Fair" ≠ identical. Larger clients may get more personalized service, but all must receive recommendations at the same time.</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 III(C) — Suitability</div><div>Recommendations must match client\'s IPS (objectives + constraints)</div><div>What\'s suitable for a young aggressive investor may be unsuitable for a retiree — even if it\'s a "good" investment.</div></div><div class="lo-compare-row lo-compare-3"><div>📋 VI(A) — Conflicts</div><div>All conflicts must be disclosed fully and prominently</div><div>Own the stock you\'re recommending? Firm does banking with the company? Referral fee? ALL must be disclosed.</div></div><div class="lo-compare-row lo-compare-3"><div>🔬 V(A) — Reasonable Basis</div><div>Every recommendation needs thorough analysis</div><div style="color:#EF4444;font-weight:700">Relying solely on a third-party report without independent verification = violation. You must exercise your own judgment.</div></div></div>'},
{title:'Recommend practices and procedures designed to prevent violations of the Code of Ethics and Standards of Professional Conduct.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Risk Area</div><div>Recommended Procedures</div><div>Why It Matters</div></div><div class="lo-compare-row lo-compare-3"><div>📊 MNPI / Info Barriers</div><div>"Chinese walls" between research & banking; restricted/watch lists; pre-clearance of employee trades</div><div>Prevents inadvertent trading on inside information</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Fair Dealing</div><div>Simultaneous dissemination; documented allocation procedures (especially IPOs); systematic order management</div><div>Ensures no client gets preferential early access</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Conflict Management</div><div>Mandatory conflict disclosure in all reports; personal trading policies (pre-approval, holding periods); gift/entertainment limits</div><div>Prevents hidden conflicts from influencing recommendations</div></div><div class="lo-compare-row lo-compare-3"><div>📁 Record Retention</div><div>Maintain research files for minimum 7 years; document the basis for all recommendations</div><div>Protects against allegations of insufficient basis; regulatory requirement</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Compliance Infrastructure</div><div>Designated compliance officer; written manual; regular training; whistleblower protections</div><div>Supervisors have an OBLIGATION to establish these — failure is itself a violation (IV.C)</div></div></div>'}
]},

'ethics|application':{
quickReview:['Level II ethics focuses on applying the Code & Standards to realistic, complex scenarios — not just identifying the rule.','Common tested scenarios: analyst receives MNPI inadvertently (must restrict trading, cannot share), supervisor fails to establish compliance system, analyst copy-pastes research without attribution.','Key distinction: violation vs. no violation often hinges on whether proper disclosure was made, whether the action was in the client\'s interest, and whether procedures were followed.','When in doubt: disclose, document, put clients first, comply with the stricter of law vs. Code, and escalate concerns.'],
analogy:'Applying the Code & Standards at Level II is like <em>being a judge, not just a law student</em>. At Level I, you memorize the rules. At Level II, you\'re presented with messy, real-world cases where the facts are ambiguous, multiple Standards may be at play, and reasonable people could disagree. Your job is to identify the most likely violation (or confirm no violation), cite the specific Standard, and explain your reasoning. The facts are designed to be tricky — look for the subtle detail that changes everything.',
los:[
{title:'Evaluate practices, policies, and conduct relative to the CFA Institute Code of Ethics and Standards of Professional Conduct.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EAB308">1</div><div class="lo-step-connector" style="background:#EAB308;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Identify ALL Relevant Standards</div><div class="lo-step-desc">Scenarios often involve multiple Standards simultaneously — e.g., misrepresentation + suitability failure + undisclosed conflict</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EAB308">2</div><div class="lo-step-connector" style="background:#EAB308;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Analyze Facts with Precision</div><div class="lo-step-desc">The correct answer often hinges on ONE specific detail: Was the info material? Was it public? Was disclosure made? Personal or client account?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EAB308">3</div><div class="lo-step-connector" style="background:#EAB308;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Apply the "Stricter Rule"</div><div class="lo-step-desc">If local law conflicts with the Code, follow whichever imposes the higher ethical standard</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EAB308">4</div></div><div class="lo-step-body"><div class="lo-step-title">Consider Intent AND Outcome</div><div class="lo-step-desc">Some violations are strict liability (MNPI doesn\'t require intent to defraud). Others depend on whether "reasonable care" was exercised.</div></div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Common L2 traps:</strong> Confusing "non-material" with "material" information; assuming verbal disclosure is sufficient (many Standards require written); forgetting the duty is to ALL clients (not just the one asking).</div></div>'},
{title:'Explain how the practices, policies, and conduct do or do not violate the CFA Institute Code of Ethics and Standards of Professional Conduct.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Scenario</div><div>Violation?</div><div>Standard & Reasoning</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Analyst learns from CEO in private meeting that earnings will miss by 20%, then recommends selling to clients</div><div style="color:#EF4444;font-weight:700">YES — Violation</div><div>II(A) MNPI: earnings miss is material (affects decisions) + nonpublic (private meeting). Must restrict trading + report to compliance.</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Analyst attends public conference, combines public presentations with her own analysis, downgrades a stock</div><div style="color:#10B981;font-weight:700">NO — Not a violation</div><div>Mosaic theory: all conference info was public, conclusion was her own analytical work product. Legitimate research.</div></div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Disclosure Cures</div><div class="lo-icon-card-desc">Proper disclosure resolves many potential conflict violations — but must be full, timely, and prominent</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📁</div><div class="lo-icon-card-title">Documentation Protects</div><div class="lo-icon-card-desc">Written records protect against allegations of insufficient basis for recommendations</div></div><div class="lo-icon-card" style="border-top:3px solid #EAB308"><div class="lo-icon-card-emoji">⭐</div><div class="lo-icon-card-title">Client = North Star</div><div class="lo-icon-card-desc">When in doubt: does this action serve the CLIENT\'s interest? If yes, you\'re likely on the right side.</div></div></div>'}
]},

function openQuicksheet(){showQuicksheet=true;currentTopic=null;currentSubtopic=0;closeMobileMenu();render();document.getElementById('contentScroll').scrollTop=0;}

function openMobileMenu(){
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('sidebarBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMobileMenu(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
  document.body.style.overflow='';
}
function renderMobileBar(){
  const bar=document.getElementById('mobileBar');
  if(!bar) return;
  const backBtn=document.getElementById('mobileBackBtn');
  const menuBtn=document.getElementById('mobileMenuBtn');
  const titleEl=document.getElementById('mobileTitle');
  const progEl=document.getElementById('mobileProgress');
  if(showQuicksheet){
    backBtn.classList.add('visible');
    menuBtn.classList.add('hidden');
    titleEl.textContent='Formula Quicksheet';
    progEl.textContent='';
  } else if(currentTopic===null){
    backBtn.classList.remove('visible');
    menuBtn.classList.remove('hidden');
    titleEl.textContent='CFA Level II';
    const done=Object.keys(checkedLOs).length;
    progEl.textContent=done>0?`${done}/${totalLOs}`:'';
  } else {
    backBtn.classList.add('visible');
    menuBtn.classList.add('hidden');
    const t=TOPICS[currentTopic];
    titleEl.textContent=t.name;
    const lc=t.subtopics.reduce((s,st)=>s+st.los,0),ch=countChecked(t);
    progEl.textContent=`${ch}/${lc}`;
  }
}

{title:'Currency Exchange Rates',body:`<div class="qs-formula">$$F_{f/d} = S_{f/d}\\!\\left[\\frac{1 + i_f\\!\\left(\\frac{\\text{Days}}{360}\\right)}{1 + i_d\\!\\left(\\frac{\\text{Days}}{360}\\right)}\\right]$$<br>$$\\%\\Delta S^e_{f/d} = i_f - i_d \\quad\\text{(Uncovered IRP)}$$<br>$$\\%\\Delta S_{f/d} \\cong \\pi_f - \\pi_d \\quad\\text{(Relative PPP)}$$<br>$$i = r + \\pi^e \\quad\\text{(Fisher Effect)}$$</div><h4>Mundell-Fleming (High Capital Mobility)</h4><table class="qs-table"><tr><th></th><th>Expan. Monetary</th><th>Restric. Monetary</th></tr><tr><td>Expan. Fiscal</td><td>Ambiguous</td><td>DC ↑</td></tr><tr><td>Restric. Fiscal</td><td>DC ↓</td><td>Ambiguous</td></tr></table>`},
{title:'Economic Growth',body:`<div class="qs-formula">$$F(K,L) = K^\\alpha L^{1-\\alpha} \\quad\\text{(Cobb-Douglas)}$$<br>$$\\frac{\\Delta Y}{Y} = \\frac{\\Delta A}{A} + \\alpha\\frac{\\Delta K}{K} + (1-\\alpha)\\frac{\\Delta L}{L}$$</div><h4>Neoclassical (Solow)</h4><div class="qs-formula">$$\\frac{\\Delta y}{y} = \\frac{\\theta}{1-\\alpha}$$<br>$$\\frac{\\Delta Y}{Y} = \\frac{\\theta}{1-\\alpha} + n$$</div><h4>Endogenous Growth</h4><div class="qs-formula">$$y_e = c \\cdot k_e$$<br>$$\\frac{\\Delta y_e}{y_e} = sc - \\delta - n$$</div><p>Higher savings permanently increase the growth rate.</p>`}
]},
{num:'03',name:'Financial Statement Analysis',color:'#F59E0B',sections:[
{title:'Intercorporate Investments',body:`<table class="qs-table"><tr><th>Ownership</th><th>Method</th></tr><tr><td>&lt;20%</td><td>Amortized cost / FVPL / FVOCI</td></tr><tr><td>20–50%</td><td>Equity method</td></tr><tr><td>&gt;50%</td><td>Acquisition (full consolidation)</td></tr></table><h4>Goodwill</h4><div class="qs-formula">$$\\text{Partial GW} = \\text{FV Consideration} - \\text{Acquirer's share of FV of net A/L}$$<br>$$\\text{Full GW} = \\text{FV of Entity} - \\text{FV of Entity's net A/L}$$</div>`},
{title:'Pension (DB Plans)',body:`<table class="qs-table"><tr><th>Component</th><th>IFRS</th><th>US GAAP</th></tr><tr><td>Service cost</td><td>P&L</td><td>P&L</td></tr><tr><td>Past service cost</td><td>P&L</td><td>OCI → amort</td></tr><tr><td>Net interest</td><td>P&L (net liab × r)</td><td>P&L (separate)</td></tr><tr><td>Remeasurement</td><td>OCI (no amort)</td><td>OCI → amort</td></tr></table><p>Higher discount rate → lower PBO & service cost. Higher compensation growth → higher PBO.</p>`},
{title:'Multinational Operations',body:`<table class="qs-table"><tr><th>Item</th><th>Current Rate</th><th>Temporal</th></tr><tr><td>Monetary A/L</td><td>Current</td><td>Current</td></tr><tr><td>Non-monetary</td><td>Current</td><td>Historical</td></tr><tr><td>Rev / SG&A</td><td>Average</td><td>Average</td></tr><tr><td>COGS / Depr</td><td>Average</td><td>Historical</td></tr><tr><td>FX G/L</td><td>Equity (CTA)</td><td>Income stmt</td></tr><tr><td>Exposure</td><td>Net assets</td><td>Net monetary</td></tr></table>`},
{title:'Financial Report Quality',body:`<p>Spectrum: GAAP + decision-useful → fictitious transactions.</p><h4>Beneish M-Score</h4><p>Higher M-score = more likely manipulation. Thresholds: $-1.78$ (3.8%), $-1.49$ (6.8%). DSRI, GMI, AQI, SGI, DEPI (+); SGAI, LEVI (−).</p><h4>Accruals</h4><div class="qs-formula">$$\\text{BS: } \\frac{NOA_{\\text{end}} - NOA_{\\text{beg}}}{\\text{Avg } NOA} \\qquad \\text{CF: } \\frac{NI - CFO - CFI}{\\text{Avg } NOA}$$</div>`},
{title:'DuPont & Modeling',body:`<div class="qs-formula">$$ROE = \\frac{NI}{Sales} \\times \\frac{Sales}{Assets} \\times \\frac{Assets}{Equity}$$<br>$$= \\underbrace{\\frac{NI}{EBT}}_{\\text{Tax}} \\times \\underbrace{\\frac{EBT}{EBIT}}_{\\text{Int}} \\times \\underbrace{\\frac{EBIT}{Sales}}_{\\text{Margin}} \\times \\underbrace{\\frac{Sales}{Assets}}_{\\text{Turn}} \\times \\underbrace{\\frac{Assets}{Eq}}_{\\text{Lev}}$$<br>$$ROIC = \\frac{NOPLAT}{\\text{Invested Capital}}$$</div>`}
]},
{num:'04',name:'Corporate Issuers',color:'#A855F7',sections:[
{title:'Dividends & Repurchases',body:`<div class="qs-formula">$$D_1 = D_0 + (E_1 \\times PR_T - D_0) \\times A \\quad\\text{(Stable)}$$<br>$$D = \\max\\!\\left(0,\\; E - \\text{CapBudget} \\times \\frac{Eq}{\\text{Cap}}\\right) \\;\\text{(Residual)}$$<br>$$\\text{FCFE Coverage} = \\frac{FCFE}{\\text{Div} + \\text{Repurchases}}$$</div><h4>Tax Systems</h4><div class="qs-formula">$$\\text{ETR}_{\\text{double}} = t_c + (1 - t_c)\\, t_i$$</div><p>Split-rate: lower $t_c$ on distributions. Imputation: shareholder gets credit for $t_c$ paid.</p>`},
{title:'Cost of Capital',body:`<div class="qs-formula">$$WACC = w_d\\, r_d(1-t) + w_p\\, r_p + w_e\\, r_e$$<br>$$\\text{CAPM: } r_e = r_f + \\beta(ERP)$$<br>$$\\text{Fama-French: } r_i = R_F + \\beta_1(ERM) + \\beta_2(SMB) + \\beta_3(HML)$$<br>$$\\text{Grinold-Kroner: } E(r_e) = \\frac{D_1}{P_0} + \\Delta PE - \\Delta S + i + g$$<br>$$\\text{GGM: } r_e = \\frac{D_1}{V_0} + g$$</div><h4>Private Company</h4><div class="qs-formula">$$r_e = r_f + \\beta(ERP) + SP + IP + SCRP$$</div>`},
{title:'Restructuring',body:`<div class="qs-formula">$$\\text{Takeover Premium} = \\frac{\\text{Deal Price} - \\text{Stock Price}}{\\text{Stock Price}}$$</div><table class="qs-table"><tr><th>Action</th><th>Examples</th></tr><tr><td>Investment</td><td>Equity stakes, JVs, acquisitions</td></tr><tr><td>Divestment</td><td>Sales, spin-offs</td></tr><tr><td>Restructuring</td><td>Cost restruct., sale-leaseback, LBO</td></tr></table>`}
]},
{num:'05',name:'Equity Valuation',color:'#EF4444',sections:[
{title:'Dividend Discount Models',body:`<div class="qs-formula">$$V_0 = \\frac{D_1}{r - g} = \\frac{D_0(1+g)}{r-g} \\quad\\text{(GGM)}$$<br>$$V_0 = \\sum_{t=1}^{n}\\frac{D_0(1+g_S)^t}{(1+r)^t} + \\frac{D_0(1+g_S)^n(1+g_L)}{(1+r)^n(r - g_L)}$$<br>$$V_0 = \\frac{D_0(1+g_L) + D_0 H(g_S - g_L)}{r - g_L} \\quad\\text{(H-model)}$$<br>$$V_0 = \\frac{E_1}{r} + PVGO$$<br>$$g = b \\times ROE$$</div>`},
{title:'Free Cash Flow',body:`<div class="qs-formula">$$FCFF = NI + NCC + Int(1-t) - FCInv - WCInv$$<br>$$FCFF = EBIT(1-t) + Dep - FCInv - WCInv$$<br>$$FCFF = CFO + Int(1-t) - FCInv$$<br>$$FCFE = FCFF - Int(1-t) + \\text{Net Borrowing}$$<br>$$V_{\\text{firm}} = \\frac{FCFF_1}{WACC - g}$$<br>$$V_{\\text{eq}} = \\frac{FCFE_1}{r - g}$$</div><h4>Fixed Debt Ratio</h4><div class="qs-formula">$$FCFE = NI - (1-DR)(FCInv - Dep) - (1-DR)(WCInv)$$</div>`},
{title:'Price & EV Multiples',body:`<div class="qs-formula">$$\\frac{P_0}{E_1} = \\frac{1-b}{r-g}$$<br>$$\\frac{P_0}{B_0} = \\frac{ROE - g}{r - g}$$<br>$$\\frac{P_0}{S_0} = \\frac{(E_0/S_0)(1-b)(1+g)}{r-g}$$<br>$$\\frac{D_0}{P_0} = \\frac{r-g}{1+g}$$<br>$$PEG = \\frac{P/E}{g \\times 100}$$<br>$$EV = \\text{Mkt Cap} + \\text{Debt} - \\text{Cash} + \\text{Pref} + \\text{MI}$$<br>$$SUE_t = \\frac{EPS_t - E(EPS_t)}{\\sigma[EPS_t - E(EPS_t)]}$$</div>`},
{title:'Residual Income',body:`<div class="qs-formula">$$RI_t = E_t - r \\cdot B_{t-1} = (ROE - r)B_{t-1}$$<br>$$V_0 = B_0 + \\sum_{t=1}^{\\infty}\\frac{RI_t}{(1+r)^t} = B_0 + \\frac{(ROE-r)}{r-g}\\,B_0$$<br>$$\\text{Justified } \\frac{P}{B} = 1 + \\frac{ROE - r}{r - g}$$<br>$$EVA = NOPAT - WACC \\times TC$$</div><p>$\\omega$ = persistence factor. $\\omega=0$: RI → 0. $\\omega=1$: RI persists.</p>`},
{title:'Private Company',body:`<div class="qs-formula">$$DLOC = 1 - \\frac{1}{1 + \\text{Control Premium}}$$<br>$$V_{\\text{intangibles}} = \\frac{RI \\times (1+g)}{r - g}$$<br>$$V_{\\text{business}} = WC + FA + \\text{Intangibles}$$</div>`}
]},
{num:'06',name:'Fixed Income',color:'#14B8A6',sections:[
{title:'Term Structure & Rates',body:`<div class="qs-formula">$$(1+z_B)^B = (1+z_A)^A(1+f_{A,B-A})^{B-A}$$<br>$$\\sum_{t=1}^{T} s_T \\cdot DF_t + DF_T = 1 \\quad\\text{(Swap rate)}$$</div><h4>Spreads</h4><div class="qs-formula">$$\\text{Swap spread} = \\text{Swap rate} - \\text{Treasury yield}$$<br>$$\\text{Z-spread: added to each spot rate so PV = Price}$$<br>$$\\text{TED} = \\text{LIBOR} - \\text{T-bill}$$<br>$$\\text{LIBOR-OIS} = \\text{LIBOR} - \\text{OIS}$$</div><p><span class="qs-highlight">Bullish steepening:</span> short rates fall faster. <span class="qs-highlight">Bearish flattening:</span> short rates rise more. <span class="qs-highlight">Bullish flattening:</span> long rates fall more.</p>`},
{title:'Arbitrage-Free Framework',body:`<div class="qs-formula">$$V = \\frac{C + 0.5(V_H + V_L)}{1+i}$$<br>$$i_{1,H} = i_{1,L}\\, e^{2\\sigma}$$</div><table class="qs-table"><tr><th>Model</th><th>Type</th><th>Mean Rev?</th><th>Neg Rates?</th></tr><tr><td>Vasicek</td><td>Equil.</td><td>Yes</td><td>Yes</td></tr><tr><td>CIR</td><td>Equil.</td><td>Yes</td><td>No</td></tr><tr><td>Ho-Lee</td><td>Arb-free</td><td>No</td><td>Yes</td></tr><tr><td>KWF</td><td>Arb-free</td><td>Yes</td><td>No</td></tr></table>`},
{title:'Embedded Options',body:`<div class="qs-formula">$$V_{\\text{callable}} = V_{\\text{straight}} - V_{\\text{call}}$$<br>$$V_{\\text{putable}} = V_{\\text{straight}} + V_{\\text{put}}$$<br>$$\\text{EffDur} = \\frac{PV_- - PV_+}{2\\,(\\Delta\\text{Curve})\\,(PV_0)}$$<br>$$\\text{EffConv} = \\frac{PV_- + PV_+ - 2\\,PV_0}{(\\Delta\\text{Curve})^2\\,(PV_0)}$$</div><h4>Convertibles</h4><div class="qs-formula">$$\\text{Conv Value} = P_{\\text{stock}} \\times \\text{Conv Ratio}$$<br>$$\\text{Min Value} = \\max(\\text{Straight Value},\\, \\text{Conv Value})$$</div>`},
{title:'Credit Analysis',body:`<div class="qs-formula">$$\\text{Expected Loss} = PD \\times LGD \\times EAD$$<br>$$CVA = \\sum_{t=1}^{n} PV(\\text{Expected Loss}_t)$$<br>$$P(\\text{survival to } t) = (1 - \\text{hazard rate})^t$$<br>$$\\text{Credit spread} \\approx PD \\times LGD$$</div><p>Structural: equity = call on assets ($K$ = debt). Reduced-form: hazard rate calibrated to market.</p>`},
{title:'Credit Default Swaps',body:`<div class="qs-formula">$$\\text{Upfront} \\approx (\\text{Spread} - \\text{Coupon}) \\times \\text{Duration}$$<br>$$\\text{CDS Price} = 100 - \\text{Upfront \\%}$$<br>$$\\%\\Delta\\text{CDS Price} = \\Delta\\text{Spread} \\times \\text{Duration}$$</div>`}
]},
{num:'07',name:'Derivatives',color:'#6366F1',sections:[
{title:'Forward Commitments',body:`<div class="qs-formula">$$F_0(T) = FV_{0,T}(S_0 + CC_0 - CB_0) \\quad\\text{or}\\quad S_0\\, e^{(r_c+CC-CB)T}$$<br>$$V_t(T) = PV_{t,T}[F_t(T) - F_0(T)]$$<br>$$V_T = S_T - F_0$$</div><h4>FRA</h4><div class="qs-formula">$$\\text{Settlement} = \\frac{NA[L_m - FRA_0]\\,t_m}{1 + D_m\\, t_m}$$<br>$$FRA_0 = \\left[\\frac{1+L_T t_T}{1+L_h t_h} - 1\\right]\\frac{1}{t_m}$$</div><h4>Swap Rate</h4><div class="qs-formula">$$r_{\\text{FIX}} = \\frac{1 - PV_{0,t_n}(1)}{\\sum_{j=1}^{n} PV_{0,t_j}(1)}$$</div>`},
{title:'Options (BSM & Binomial)',body:`<div class="qs-formula">$$c = S\\,N(d_1) - X e^{-rT}N(d_2)$$<br>$$p = Xe^{-rT}N(-d_2) - SN(-d_1)$$<br>$$d_1 = \\frac{\\ln(S/X) + (r + \\sigma^2/2)T}{\\sigma\\sqrt{T}}$$<br>$$d_2 = d_1 - \\sigma\\sqrt{T}$$</div><h4>Binomial</h4><div class="qs-formula">$$\\pi = \\frac{1+r-d}{u-d}$$<br>$$c = PV[\\pi c^+ + (1-\\pi)c^-]$$<br>$$h = \\frac{c^+-c^-}{S^+-S^-}$$<br>$$N_H = -\\frac{\\text{Portfolio Delta}}{\\Delta_H}$$</div><table class="qs-table"><tr><th>Greek</th><th>Call</th><th>Put</th></tr><tr><td>$\\Delta$</td><td>$0$ to $+1$</td><td>$-1$ to $0$</td></tr><tr><td>$\\Gamma$</td><td>+ (ATM max)</td><td>+ (ATM max)</td></tr><tr><td>$\\nu$</td><td>+ always</td><td>+ always</td></tr><tr><td>$\\Theta$</td><td>− usually</td><td>− usually</td></tr><tr><td>$\\rho$</td><td>+</td><td>−</td></tr></table>`}
]},
{num:'08',name:'Alternative Investments',color:'#F97316',sections:[
{title:'Real Estate',body:`<div class="qs-formula">$$\\text{Cap Rate} = \\frac{NOI}{\\text{Value}} = r - g$$<br>$$DSCR = \\frac{NOI}{\\text{Debt Service}}$$<br>$$NAVPS = \\frac{MV_{\\text{assets}} - MV_{\\text{liab}}}{\\text{Shares}}$$<br>$$FFO = NI + Dep_{RE} - \\text{Gains} + \\text{Losses}$$<br>$$AFFO = FFO - \\text{Non-cash rent} - \\text{Maint CapEx}$$</div><div class="qs-formula">$$HPR = \\frac{NOI - CapEx + (MV_{\\text{end}} - MV_{\\text{beg}})}{MV_{\\text{beg}}}$$</div>`},
{title:'Private Equity',body:`<div class="qs-formula">$$POST = PRE + \\text{Investment} = \\frac{\\text{Exit Value}}{ROI}$$<br>$$ROI = (1+IRR)^t = \\frac{\\text{Exit Value}}{POST}$$<br>$$\\frac{S_n}{S_e + S_n} = F \\quad\\text{(new share fraction)}$$</div><table class="qs-table"><tr><th>Metric</th><th>Formula</th></tr><tr><td>PIC</td><td>Paid-in / Committed</td></tr><tr><td>DPI</td><td>Cumul. Distributions / Invested</td></tr><tr><td>RVPI</td><td>Residual Value / Invested</td></tr><tr><td>TVPI</td><td>(Dist + Undist) / Invested</td></tr></table>`},
{title:'Commodities',body:`<p>$\\text{Basis} = S - F$. Backwardation: $S > F$. Contango: $S < F$.</p><p>Total return = Price return + Roll return + Collateral return. Roll return positive in backwardation, negative in contango.</p>`}
]},
{num:'09',name:'Portfolio Management',color:'#64748B',sections:[
{title:'Economics & Investment Markets',body:`<h4>Asset Pricing Layers</h4><div class="qs-formula">$$P_t^i = \\sum_{s=1}^{N} \\frac{E_t[CF_{t+s}^i]}{(1 + l_{t,s} + \\theta_{t,s} + \\pi_{t,s})^s}$$</div><p>$l$ = real risk-free, $\\theta$ = expected inflation, $\\pi$ = inflation uncertainty. Add $\\gamma$ for credit, $\\kappa$ for equity, $\\phi$ for liquidity (RE).</p><div class="qs-formula">$$BEI = \\text{Nominal yield} - \\text{TIPS yield}$$<br>$$\\approx E(\\pi) + \\text{inflation risk prem} - \\text{liquidity prem}$$</div>`},
{title:'Active Management & Fundamental Law',body:`<h4>Value Added</h4><div class="qs-formula">$$R_A = R_P - R_B = \\sum \\Delta w_i R_i$$</div><h4>Sharpe & Information Ratios</h4><div class="qs-formula">$$SR_P = \\frac{\\bar{R}_P - R_f}{\\sigma_P}$$<br>$$IR = \\frac{\\bar{R}_A}{\\sigma(R_A)}$$<br>$$SR_P^2 = SR_B^2 + IR^2$$</div><h4>Fundamental Law of Active Mgmt</h4><div class="qs-formula">$$E(R_A)^* = IC \\cdot \\sqrt{BR} \\cdot \\sigma_A \\quad\\text{(Basic)}$$<br>$$E(R_A) = TC \\cdot IC \\cdot \\sqrt{BR} \\cdot \\sigma_A \\quad\\text{(Full)}$$</div><h4>Active Security Returns</h4><div class="qs-formula">$$\\mu_i = IC \\cdot \\sigma_i \\cdot S_i$$<br>$$\\Delta w_i^* = \\frac{\\mu_i}{\\sigma_i^2} \\cdot \\frac{\\sigma_A}{IC\\sqrt{BR}}$$</div><h4>Optimal Active Risk & Weight</h4><div class="qs-formula">$$\\sigma_A^* = \\frac{IR}{SR_B} \\cdot \\sigma_B$$<br>$$\\Delta w_A^* = \\frac{\\sigma_A^*}{\\sigma_A}$$<br>$$E(R_A) = \\sigma_A^* \\cdot IR$$</div><h4>Information Coefficient</h4><div class="qs-formula">$$IC = \\frac{2N_c}{N} - 1$$</div><p>$N_c$ = number of correct forecasts, $N$ = total forecasts.</p><h4>Practical Breadth</h4><div class="qs-formula">$$BR = \\frac{N}{1 + (N-1)\\rho}$$</div><p>$N$ = number of securities, $\\rho$ = avg correlation of active returns. If $\\rho=0$, $BR=N$.</p><h4>Ex Post Performance</h4><div class="qs-formula">$$R_A = E(R_A | IC_R) + \\text{Noise}$$<br>$$\\text{Variation from realized IC} = TC^2$$<br>$$\\text{Variation from noise} = 1 - TC^2$$</div>`},
{title:'Multifactor Models',body:`<h4>APT</h4><div class="qs-formula">$$E(R_P) = R_F + \\lambda_1 \\beta_{P,1} + \\cdots + \\lambda_k \\beta_{P,k}$$</div><h4>Carhart 4-Factor</h4><div class="qs-formula">$$E[R_P] = R_F + \\beta_1 RMRF + \\beta_2 SMB + \\beta_3 HML + \\beta_4 WML$$</div><h4>Return Attribution</h4><div class="qs-formula">$$R_A = \\sum_{k=1}^{K}(\\beta_{P,k} - \\beta_{B,k}) \\cdot F_k + \\text{Selection}$$</div><h4>Risk Attribution</h4><div class="qs-formula">$$\\sigma_A^2 = \\text{Active Factor Risk} + \\text{Active Specific Risk}$$<br>$$\\text{Active Specific Risk} = \\sum (w_i^a)^2 \\sigma_{\\varepsilon_i}^2$$</div>`},
{title:'Value at Risk',body:`<div class="qs-formula">$$VaR = z_\\alpha \\cdot \\sigma_P \\cdot \\sqrt{t} \\cdot V$$</div><h4>Extensions</h4><div class="qs-formula">$$CVaR = E[\\text{Loss} \\mid \\text{Loss} > VaR]$$<br>$$IVaR = VaR_{\\text{with}} - VaR_{\\text{without}}$$<br>$$MVaR = \\frac{\\partial VaR}{\\partial w_i}$$<br>$$\\text{Relative VaR} = \\sigma(R_P - R_B) \\cdot z_\\alpha \\cdot \\sqrt{t}$$</div><h4>Sensitivity Measures</h4><div class="qs-formula">$$\\frac{\\Delta B}{B} \\approx -D\\frac{\\Delta y}{1+y} + \\frac{1}{2}C\\frac{(\\Delta y)^2}{(1+y)^2}$$<br>$$\\Delta c \\approx \\Delta_c \\cdot \\Delta S + \\frac{1}{2}\\Gamma_c(\\Delta S)^2$$</div><table class="qs-table"><tr><th>Method</th><th>Pro</th><th>Con</th></tr><tr><td>Parametric</td><td>Fast, simple</td><td>Assumes normality</td></tr><tr><td>Historical</td><td>No dist. needed</td><td>Past ≠ future</td></tr><tr><td>Monte Carlo</td><td>Most flexible</td><td>Model-dependent</td></tr></table><h4>Risk Constraints</h4><div class="qs-formula">$$RAROC = \\frac{\\text{Expected Return}}{\\text{Economic Capital (VaR)}}$$</div><p>Risk budgets, position limits, scenario limits, stop-loss limits. Capital allocation: pursue only if $RAROC > \\text{hurdle rate}$.</p>`},
{title:'ETF Mechanics',body:`<p><strong>Creation:</strong> AP delivers basket → receives ETF shares (premium narrows). <strong>Redemption:</strong> reverse (discount narrows). In-kind = tax efficient.</p><p>Tracking error sources: fees, sampling, cash drag, rebalancing. Spread = f(underlying liquidity, AUM, AP competition, volatility).</p>`},
{title:'Trading Costs',body:`<div class="qs-formula">$$\\text{Eff. Spread (buy)} = 2(P_{\\text{trade}} - P_{\\text{mid}})$$<br>$$\\text{Impl. Shortfall} = V_{\\text{hypothetical}} - V_{\\text{actual}}$$<br>$$\\text{VWAP cost (buy)} = VWAP_{\\text{trade}} - VWAP_{\\text{bench}}$$</div><p><strong>Explicit:</strong> commissions, taxes, fees. <strong>Implicit:</strong> spread, market impact, delay, opportunity cost. HFT, spoofing, wash trading, pump-and-dump = abusive.</p>`},
{title:'Backtesting & Simulation',body:`<p>Steps: design → simulate → analyze. Problems: survivorship bias, look-ahead bias, data snooping, cost underestimation, regime change.</p><p>Historical sim: no model risk but limited by history. Monte Carlo: novel scenarios but model-dependent. Sensitivity analysis: vary inputs → robust vs. fragile.</p>`}
]},
{num:'10',name:'Ethics',color:'#EAB308',sections:[
{title:'Standards Summary',body:`<table class="qs-table"><tr><th>Std</th><th>Key Rule</th></tr><tr><td>I(A)</td><td>Obey strictest law. Disassociate from violations.</td></tr><tr><td>I(B)</td><td>No gifts impairing independence.</td></tr><tr><td>I(C)</td><td>No misrepresentation. Cite sources.</td></tr><tr><td>II(A)</td><td>No acting on MNPI. Mosaic theory OK.</td></tr><tr><td>II(B)</td><td>No market manipulation.</td></tr><tr><td>III(A)</td><td>Client interests first. Fiduciary duty.</td></tr><tr><td>III(B)</td><td>Fair dealing. Simultaneous dissemination.</td></tr><tr><td>III(C)</td><td>Suitability via IPS. Portfolio context.</td></tr><tr><td>III(E)</td><td>Confidentiality (unless illegal/legally required).</td></tr><tr><td>V(A)</td><td>Reasonable basis. Independent verification.</td></tr><tr><td>VI(A)</td><td>Disclose all conflicts prominently.</td></tr><tr><td>VI(B)</td><td>Client transactions before personal.</td></tr><tr><td>VII(A)</td><td>No sharing confidential exam details.</td></tr></table>`}
]}

// ═══ PEEK MODAL ═══
let peekTopicId=null,peekSubId=null,peekLoIdx=0;

function openPeek(topicId,subId,loIdx){
  peekTopicId=topicId;peekSubId=subId;peekLoIdx=loIdx;
  renderPeek();
  document.getElementById('peekOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePeek(e){
  if(e&&e.target!==e.currentTarget) return;
  document.getElementById('peekOverlay').classList.remove('open');
  document.body.style.overflow='';
  render();
}

function navigatePeek(dir){
  const key=`${peekTopicId}|${peekSubId}`;
  const data=CONTENT[key];
  if(!data) return;
  const newIdx=peekLoIdx+dir;
  if(newIdx<0||newIdx>=data.los.length) return;
  peekLoIdx=newIdx;
  renderPeek();
}

function renderPeek(){
  const key=`${peekTopicId}|${peekSubId}`;
  const data=CONTENT[key];
  const t=TOPICS.find(x=>x.id===peekTopicId);
  const st=t?t.subtopics.find(x=>x.id===peekSubId):null;
  if(!data||!t||!st) return;
  const lo=data.los[peekLoIdx];
  const loKey=`${peekTopicId}|${peekSubId}|${peekLoIdx}`;
  const isChecked=!!checkedLOs[loKey];

  const numEl=document.getElementById('peekNum');
  numEl.textContent=`LO ${peekLoIdx+1} — ${st.name}`;
  numEl.style.background=t.dim;
  numEl.style.color=t.color;

  const kcKey=`${peekTopicId}|${peekSubId}|${peekLoIdx}`;
  const kc=KC[kcKey];
  const hasFH=lo.explanation.indexOf('formula-highlight')!==-1;
  const kcHtml=(!hasFH&&kc)?`<div class="formula-highlight" style="--active-color:${t.color}"><div class="formula-highlight-title" style="color:${t.color}">${kc.t}</div><div class="formula-highlight-body">${kc.b}</div></div>`:'';
  document.getElementById('peekBody').innerHTML=`<div class="peek-title">${lo.title}</div><div class="peek-explanation" style="--active-color:${t.color};--active-dim:${t.dim}">${kcHtml}${lo.explanation}</div>`;
  document.getElementById('peekBody').scrollTop=0;
  injectDiagrams(document.getElementById('peekBody'));
  typeset(document.getElementById('peekBody'));

  document.getElementById('peekPrev').classList.toggle('disabled',peekLoIdx===0);
  document.getElementById('peekNext').classList.toggle('disabled',peekLoIdx>=data.los.length-1);

  const checkBtn=document.getElementById('peekCheckBtn');
  checkBtn.classList.toggle('is-checked',isChecked);
  document.getElementById('peekCheckLabel').textContent=isChecked?'Studied ✓':'Mark as studied';
  if(isChecked){checkBtn.style.background=t.color;checkBtn.style.borderColor=t.color;checkBtn.style.color='#fff';}
  else{checkBtn.style.background='';checkBtn.style.borderColor='';checkBtn.style.color='';}

  document.getElementById('peekLoCount').textContent=`${peekLoIdx+1} / ${data.los.length}`;
}

function togglePeekCheck(){
  const loKey=`${peekTopicId}|${peekSubId}|${peekLoIdx}`;
  checkedLOs[loKey]=!checkedLOs[loKey];
  if(!checkedLOs[loKey]) delete checkedLOs[loKey];
  renderPeek();updateProgress();renderSidebar();
}

// Keyboard navigation for peek
document.addEventListener('keydown',function(e){
  if(!document.getElementById('peekOverlay').classList.contains('open')) return;
  if(e.key==='Escape') closePeek();
  if(e.key==='ArrowLeft') navigatePeek(-1);
  if(e.key==='ArrowRight') navigatePeek(1);
});

function toggleLO(key){checkedLOs[key]=!checkedLOs[key];if(!checkedLOs[key])delete checkedLOs[key];render();}
function toggleQuickReview(){quickReviewOn=!quickReviewOn;document.getElementById('toggleReview').classList.toggle('on',quickReviewOn);document.querySelectorAll('.quick-review-box').forEach(b=>b.classList.toggle('visible',quickReviewOn));}
function countChecked(topic){return Object.keys(checkedLOs).filter(k=>k.startsWith(topic.id+'|')).length;}
function updateProgress(){const d=Object.keys(checkedLOs).length,p=totalLOs>0?Math.round(d/totalLOs*100):0;document.getElementById('globalPct').textContent=p+'%';document.getElementById('globalBar').style.width=p+'%';}

let fcState = {}; // { 'quant|0': { ef:2.5, interval:1, reps:0, nextReview: Date, lastReview: Date, history:[] }, ... }

function fcGetState(topicId, idx) {
  const key = topicId + '|' + idx;
  if (!fcState[key]) {
    fcState[key] = { ef: 2.5, interval: 0, reps: 0, nextReview: Date.now(), lastReview: null, history: [] };
  }
  return fcState[key];
}

function fcReview(topicId, idx, quality) {
  // quality: 0=Again, 1=Hard, 2=Good, 3=Easy
  const s = fcGetState(topicId, idx);
  s.history.push({ date: Date.now(), q: quality });
  s.lastReview = Date.now();

  if (quality === 0) {
    s.reps = 0;
    s.interval = 1;
  } else {
    if (s.reps === 0) s.interval = 1;
    else if (s.reps === 1) s.interval = 3;
    else {
      if (quality === 1) s.interval = Math.max(1, Math.round(s.interval * 1.2));
      else if (quality === 2) s.interval = Math.round(s.interval * s.ef);
      else s.interval = Math.round(s.interval * s.ef * 1.3);
    }
    s.reps++;
  }

  // Adjust ease factor
  if (quality === 0) s.ef = Math.max(1.3, s.ef - 0.2);
  else if (quality === 1) s.ef = Math.max(1.3, s.ef - 0.15);
  else if (quality === 3) s.ef = s.ef + 0.15;

  s.nextReview = Date.now() + s.interval * 86400000; // interval in days → ms
}

function fcGetDueCards(topicId) {
  const cards = FLASHCARDS[topicId] || [];
  const now = Date.now();
  const due = [], notDue = [];
  cards.forEach((c, i) => {
    const s = fcGetState(topicId, i);
    if (s.nextReview <= now) due.push(i);
    else notDue.push(i);
  });
  return { due, notDue, total: cards.length };
}

function fcGlobalStats() {
  let totalCards = 0, dueNow = 0, mastered = 0, studied = 0;
  const now = Date.now();
  Object.keys(FLASHCARDS).forEach(tid => {
    const cards = FLASHCARDS[tid];
    cards.forEach((_, i) => {
      totalCards++;
      const s = fcGetState(tid, i);
      if (s.lastReview) studied++;
      if (s.nextReview <= now) dueNow++;
      if (s.interval >= 21) mastered++;
    });
  });
  return { totalCards, dueNow, mastered, studied };
}

// ═══ FLASHCARD UI ═══
let fcMode = 'decks'; // 'decks' | 'study'
let fcCurrentTopic = null;
let fcQueue = [];
let fcQueueIdx = 0;
let fcFlipped = false;
let fcSessionStats = { correct: 0, total: 0 };

function openFlashcards() {
  fcMode = 'decks';
  closeMobileMenu();
  document.getElementById('fcOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderFC();
}

function closeFlashcards() {
  document.getElementById('fcOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function startFCStudy(topicId) {
  fcCurrentTopic = topicId;
  const { due } = fcGetDueCards(topicId);
  fcQueue = due.length > 0 ? [...due] : FLASHCARDS[topicId].map((_, i) => i);
  fcQueueIdx = 0;
  fcFlipped = false;
  fcSessionStats = { correct: 0, total: 0 };
  fcMode = 'study';
  renderFC();
}

function renderFC() {
  const overlay = document.getElementById('fcOverlay');
  const header = document.getElementById('fcHeaderArea');
  const body = document.getElementById('fcBodyArea');

  if (fcMode === 'decks') {
    header.innerHTML = `<span class="fc-header-title">Flashcard Decks</span><button class="fc-close" onclick="closeFlashcards()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    const gs = fcGlobalStats();
    let h = `<div class="fc-deck-inner"><div class="fc-deck-stats">
      <div class="fc-stat-card"><div class="fc-stat-val">${gs.totalCards}</div><div class="fc-stat-label">Total Cards</div></div>
      <div class="fc-stat-card"><div class="fc-stat-val" style="color:#EF4444">${gs.dueNow}</div><div class="fc-stat-label">Due Now</div></div>
      <div class="fc-stat-card"><div class="fc-stat-val" style="color:#10B981">${gs.mastered}</div><div class="fc-stat-label">Mastered</div></div>
      <div class="fc-stat-card"><div class="fc-stat-val" style="color:#3B82F6">${gs.studied}</div><div class="fc-stat-label">Studied</div></div>
    </div><div class="fc-deck-grid">`;
    TOPICS.forEach(t => {
      const cards = FLASHCARDS[t.id];
      if (!cards) return;
      const { due, total } = fcGetDueCards(t.id);
      let masteredCount = 0;
      cards.forEach((_, i) => { if (fcGetState(t.id, i).interval >= 21) masteredCount++; });
      const pctMastered = total > 0 ? Math.round(masteredCount / total * 100) : 0;
      const pctDue = total > 0 ? Math.round(due.length / total * 100) : 0;
      const pctLearning = 100 - pctMastered - pctDue;
      h += `<div class="fc-deck-card" onclick="startFCStudy('${t.id}')" style="--card-color:${t.color}">
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${t.color};opacity:0.7"></div>
        <div class="fc-deck-name">${t.name}</div>
        <div class="fc-deck-meta"><span>${total} cards</span></div>
        <div class="fc-deck-due" style="color:${due.length > 0 ? '#EF4444' : '#10B981'}">${due.length > 0 ? due.length + ' due' : 'All caught up ✓'}</div>
        <div class="fc-deck-bar"><span style="width:${pctMastered}%;background:#10B981"></span><span style="width:${pctLearning}%;background:#3B82F6"></span><span style="width:${pctDue}%;background:#EF4444"></span></div>
      </div>`;
    });
    h += '</div></div>';
    body.className = 'fc-deck-view';
    body.innerHTML = h;
  } else {
    // Study mode
    const t = TOPICS.find(x => x.id === fcCurrentTopic);
    const cards = fcConceptMode ? fcConceptCards : FLASHCARDS[fcCurrentTopic];
    const sessionLabel = fcConceptMode ? fcConceptLabel : t.name;
    const closeFn = fcConceptMode ? 'closeFlashcards();fcConceptMode=false;' : 'fcBackToDecks()';
    const doneFn = fcConceptMode ? 'closeFlashcards();fcConceptMode=false;' : 'fcBackToDecks()';
    header.innerHTML = `<span class="fc-header-badge" style="background:${t.dim};color:${t.color}">${sessionLabel}</span><span class="fc-header-title">${fcConceptMode?'Concept Cards':'Study Session'}</span><button class="fc-close" onclick="${closeFn}"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;

    if (fcQueueIdx >= fcQueue.length) {
      body.className = 'fc-study';
      body.innerHTML = `<div class="fc-empty"><div class="fc-empty-icon">🎉</div><div class="fc-empty-title">Session Complete!</div><p style="color:var(--text-muted);font-size:13px;margin-top:8px">Reviewed ${fcSessionStats.total} card${fcSessionStats.total!==1?'s':''} · ${fcSessionStats.correct} correct (${fcSessionStats.total>0?Math.round(fcSessionStats.correct/fcSessionStats.total*100):0}%)</p><button class="fc-done-btn" onclick="${doneFn}">Done</button></div>`;
      return;
    }

    const ci = fcQueue[fcQueueIdx];
    const card = cards[ci];
    const statePrefix = fcConceptMode ? 'c:'+fcCurrentTopic+'|'+fcConceptLabel : fcCurrentTopic;
    const s = fcGetState(statePrefix, ci);
    const pct = Math.round((fcQueueIdx / fcQueue.length) * 100);

    body.className = 'fc-study';
    body.innerHTML = `
      <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${pct}%;background:${t.color}"></div></div>
      <div class="fc-card-wrapper" onclick="fcFlipCard()">
        <div class="fc-card ${fcFlipped ? 'flipped' : ''}" id="fcCard">
          <div class="fc-card-face fc-card-front">
            <div class="fc-card-label" style="color:${t.color}">${fcConceptMode?'Concept':'Question'} · Card ${fcQueueIdx+1}/${fcQueue.length}</div>
            <div class="fc-card-body">${card.q}</div>
            <div class="fc-card-hint">Tap to reveal answer</div>
          </div>
          <div class="fc-card-face fc-card-back">
            <div class="fc-card-label" style="color:${t.color}">Answer</div>
            <div class="fc-card-body">${card.a}</div>
          </div>
        </div>
      </div>
      <div class="fc-rating ${fcFlipped ? '' : 'hidden'}" id="fcRating">
        <button class="fc-rating-btn again" onclick="fcRate(0)"><span class="label" style="color:#EF4444">Again</span><span class="sub">&lt;1 min</span></button>
        <button class="fc-rating-btn hard" onclick="fcRate(1)"><span class="label" style="color:#F59E0B">Hard</span><span class="sub">${formatInterval(Math.max(1,Math.round(s.interval*1.2)))}</span></button>
        <button class="fc-rating-btn good" onclick="fcRate(2)"><span class="label" style="color:#10B981">Good</span><span class="sub">${formatInterval(Math.max(1,Math.round(s.interval*s.ef)))}</span></button>
        <button class="fc-rating-btn easy" onclick="fcRate(3)"><span class="label" style="color:#3B82F6">Easy</span><span class="sub">${formatInterval(Math.max(1,Math.round(s.interval*s.ef*1.3)))}</span></button>
      </div>`;
  }
}

function fcFlipCard() {
  fcFlipped = !fcFlipped;
  const card = document.getElementById('fcCard');
  if (card) card.classList.toggle('flipped', fcFlipped);
  const rating = document.getElementById('fcRating');
  if (rating) rating.classList.toggle('hidden', !fcFlipped);
}

function fcRate(quality) {
  const ci = fcQueue[fcQueueIdx];
  const statePrefix = fcConceptMode ? 'c:'+fcCurrentTopic+'|'+fcConceptLabel : fcCurrentTopic;
  fcReview(statePrefix, ci, quality);
  fcSessionStats.total++;
  if (quality >= 2) fcSessionStats.correct++;
  if (quality === 0) fcQueue.push(ci);
  fcQueueIdx++;
  fcFlipped = false;
  renderFC();
}

function fcBackToDecks() {
  fcMode = 'decks';
  renderFC();
}

// ═══ CONCEPT FLASHCARD STUDY (per-section) ═══
let fcConceptMode = false;
let fcConceptCards = [];
let fcConceptLabel = '';

function startConceptStudy(topicId, subId) {
  const key = topicId + '|' + subId;
  const stats = SECTION_STATS[key];
  if (!stats || !stats.conceptList || stats.conceptList.length === 0) return;
  const t = TOPICS.find(x => x.id === topicId);
  const st = t ? t.subtopics.find(x => x.id === subId) : null;
  
  fcConceptMode = true;
  fcConceptCards = stats.conceptList;
  fcConceptLabel = st ? st.name : key;
  fcCurrentTopic = topicId;
  fcQueue = fcConceptCards.map((_, i) => i);
  fcQueueIdx = 0;
  fcFlipped = false;
  fcSessionStats = { correct: 0, total: 0 };
  fcMode = 'study';
  
  document.getElementById('fcOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderFC();
}

// Override card access in study mode when in concept mode
function fcGetCurrentCard() {
  if (fcConceptMode && fcConceptCards.length > 0) {
    return fcConceptCards[fcQueue[fcQueueIdx]];
  }
  const cards = FLASHCARDS[fcCurrentTopic];
  return cards ? cards[fcQueue[fcQueueIdx]] : null;
}

function fcGetCurrentState() {
  const prefix = fcConceptMode ? 'c:' + fcCurrentTopic : fcCurrentTopic;
  const ci = fcQueue[fcQueueIdx];
  return fcGetState(prefix, ci);
}

function fcReviewCurrent(quality) {
  const prefix = fcConceptMode ? 'c:' + fcCurrentTopic : fcCurrentTopic;
  const ci = fcQueue[fcQueueIdx];
  fcReview(prefix, ci, quality);
}

function formatInterval(days) {
  if (days < 1) return '<1d';
  if (days === 1) return '1d';
  if (days < 30) return days + 'd';
  if (days < 365) return Math.round(days / 30) + 'mo';
  return Math.round(days / 365 * 10) / 10 + 'yr';
}

function renderSectionStats(topicId, subId, color) {
  const key = topicId + '|' + subId;
  const stats = SECTION_STATS[key];
  if (!stats) return '';
  const cCount = stats.conceptList ? stats.conceptList.length : stats.concepts;
  const fCount = stats.formulas;
  if (fCount === 0 && cCount === 0) return '';
  const uid = (topicId+subId).replace(/[^a-z]/g,'');

  let h = '<div class="section-stats">';
  // Formulas card
  if (fCount > 0) {
    const clickable = stats.formulaList && stats.formulaList.length > 0;
    h += `<div class="section-stat ${clickable?'section-stat-clickable':''}" ${clickable?'onclick="toggleStatDetail(\''+uid+'f\')"':''}><div class="section-stat-icon" style="background:${color}15;color:${color}"><svg viewBox="0 0 24 24"><path d="M4 7h6M4 12h8M4 17h6M17 3l-4 9h6l-4 9"/></svg></div><div class="section-stat-info"><div class="section-stat-val">${fCount}</div><div class="section-stat-label">Formulas${clickable?' <span class="section-stat-expand">▼</span>':''}</div></div></div>`;
  }
  // Concepts card
  if (cCount > 0) {
    const clickable = stats.conceptList && stats.conceptList.length > 0;
    h += `<div class="section-stat ${clickable?'section-stat-clickable':''}" ${clickable?'onclick="toggleStatDetail(\''+uid+'c\')"':''}><div class="section-stat-icon" style="background:${color}15;color:${color}"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></div><div class="section-stat-info"><div class="section-stat-val">${cCount}</div><div class="section-stat-label">Key Concepts${clickable?' <span class="section-stat-expand">▼</span>':''}</div></div></div>`;
  }
  // Study button
  if (stats.conceptList && stats.conceptList.length > 0) {
    h += `<div class="section-stat section-stat-btn" onclick="event.stopPropagation();startConceptStudy('${topicId}','${subId}')"><div class="section-stat-icon" style="background:${color}15;color:${color}"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="section-stat-info"><div class="section-stat-label" style="color:${color};font-weight:600">Study Concepts →</div></div></div>`;
  }
  h += '</div>';

  // Formula detail panel
  if (stats.formulaList && stats.formulaList.length > 0) {

// Tab switching for tabbed diagrams
function switchDiagramTab(id, idx) {
  const tabs = document.querySelectorAll('#'+id+'_tabs .lo-diagram-tab');
  const views = document.querySelectorAll('[id^="'+id+'_"]');
  tabs.forEach((t,i) => t.classList.toggle('active', i===idx));
  views.forEach(v => {
    if(v.id === id+'_tabs') return;
    v.classList.toggle('active', v.id === id+'_'+idx);
  });
}

// Inject diagrams after peek or content render
function injectDiagrams(containerEl) {
  if(!containerEl) return;
  // Check current context
  const key = peekTopicId && peekSubId !== null ? `${peekTopicId}|${peekSubId}|${peekLoIdx}` : null;
  if(key && DIAGRAMS[key]) {
    const expEl = containerEl.querySelector('.peek-explanation') || containerEl.querySelector('.lo-explanation');
    if(expEl) {
      const div = document.createElement('div');
      div.innerHTML = DIAGRAMS[key]();
      expEl.appendChild(div);
    }
  }
}
