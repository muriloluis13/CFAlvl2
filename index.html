<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level II — Study Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
[data-theme="dark"] {
  --bg-primary: #0F1117; --bg-secondary: #161922; --bg-tertiary: #1E2130;
  --bg-card: #1A1D2B; --text-primary: #E8E9ED; --text-secondary: #9CA0B0;
  --text-muted: #5C6078; --border-color: #2A2D3E; --border-subtle: #22253A;
  --shadow-card: 0 8px 24px #00000040; --code-bg: #252838; --formula-bg: #1C1F30;
  --check-tick: #0F1117;
}
[data-theme="light"] {
  --bg-primary: #F4F5F7; --bg-secondary: #FFFFFF; --bg-tertiary: #E9EBF0;
  --bg-card: #FFFFFF; --text-primary: #1A1D2B; --text-secondary: #4A5068;
  --text-muted: #8890A6; --border-color: #D8DCE6; --border-subtle: #E2E5EE;
  --shadow-card: 0 8px 24px #0000000F; --code-bg: #EDF0F7; --formula-bg: #EDF0F7;
  --check-tick: #FFFFFF;
}
:root {
  --c-quant:#3B82F6;--c-quant-dim:#3B82F620;--c-econ:#10B981;--c-econ-dim:#10B98120;
  --c-fsa:#F59E0B;--c-fsa-dim:#F59E0B20;--c-corp:#A855F7;--c-corp-dim:#A855F720;
  --c-equity:#EF4444;--c-equity-dim:#EF444420;--c-fi:#14B8A6;--c-fi-dim:#14B8A620;
  --c-deriv:#6366F1;--c-deriv-dim:#6366F120;--c-alt:#F97316;--c-alt-dim:#F9731620;
  --c-pm:#64748B;--c-pm-dim:#64748B20;--c-ethics:#EAB308;--c-ethics-dim:#EAB30820;
  --sidebar-w:280px;--header-h:64px;--radius:12px;--radius-sm:8px;
  --transition:0.25s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;transition:background var(--transition),color var(--transition);}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px}
.app{display:flex;height:100vh;height:100dvh}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-secondary);border-right:1px solid var(--border-color);display:flex;flex-direction:column;overflow:hidden;z-index:10;transition:background var(--transition),border-color var(--transition)}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text-primary);letter-spacing:-0.5px}
.sidebar-logo span{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);display:block;margin-top:2px}

/* Theme toggle */
.sidebar .theme-toggle{width:38px;height:38px;border-radius:10px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.sidebar .theme-toggle:hover{border-color:var(--text-muted);transform:scale(1.05)}
.theme-toggle svg{width:18px;height:18px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.theme-toggle .sun{display:none}
.theme-toggle .moon{display:block}
[data-theme="light"] .theme-toggle .sun{display:block}
[data-theme="light"] .theme-toggle .moon{display:none}

.sidebar-progress{padding:16px 20px;border-bottom:1px solid var(--border-color)}
.progress-label{display:flex;justify-content:space-between;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.progress-label .pct{color:var(--text-secondary)}
.progress-bar-track{height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--c-quant),var(--c-econ),var(--c-fsa),var(--c-equity),var(--c-ethics));transition:width 0.6s ease}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 10px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--bg-tertiary)}
.nav-item.active{background:var(--active-dim,var(--bg-tertiary))}
.nav-item.active .nav-label{color:var(--text-primary);font-weight:600}
.nav-dot{width:10px;height:10px;min-width:10px;border-radius:50%;background:var(--dot-color,var(--text-muted));opacity:0.6;transition:all var(--transition)}
.nav-item.active .nav-dot,.nav-item:hover .nav-dot{opacity:1;transform:scale(1.2)}
.nav-label{font-size:13px;font-weight:500;color:var(--text-secondary);transition:color var(--transition);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--dot-color,var(--text-muted));color:var(--bg-primary);opacity:0.7;min-width:20px;text-align:center}
.nav-item.active .nav-badge{opacity:1}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border-color);display:flex;flex-direction:column;gap:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-secondary);font-weight:500}
.toggle-switch{width:36px;height:20px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:10px;cursor:pointer;position:relative;transition:all var(--transition)}
.toggle-switch.on{background:var(--c-quant);border-color:var(--c-quant)}
.toggle-switch::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--text-primary);top:2px;left:2px;transition:transform var(--transition)}
.toggle-switch.on::after{transform:translateX(16px)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{height:var(--header-h);min-height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-bottom:1px solid var(--border-color);background:var(--bg-secondary);transition:background var(--transition),border-color var(--transition)}
.topic-title-area{display:flex;align-items:center;gap:14px}
.topic-number{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;letter-spacing:0.5px}
.topic-title{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.3px}
.header-stats{display:flex;align-items:center;gap:20px}
.stat-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);font-weight:500}
.stat-chip svg{opacity:0.6}

.subtopic-tabs-wrapper{background:var(--bg-secondary);border-bottom:1px solid var(--border-color);padding:0 32px;overflow-x:auto;white-space:nowrap;transition:background var(--transition),border-color var(--transition)}
.subtopic-tabs{display:inline-flex;gap:0;min-width:100%}
.subtab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition);white-space:nowrap;user-select:none}
.subtab:hover{color:var(--text-secondary)}
.subtab.active{color:var(--text-primary);border-bottom-color:var(--active-color,var(--text-primary))}
.content-scroll{flex:1;overflow-y:auto;padding:32px}
.content-inner{max-width:960px;margin:0 auto}

/* Welcome */
.welcome-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:24px}
.welcome-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.welcome-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--text-muted));opacity:0.7;transition:opacity var(--transition)}
.welcome-card:hover{border-color:var(--card-color,var(--text-muted));transform:translateY(-2px);box-shadow:var(--shadow-card)}
.welcome-card:hover::before{opacity:1}
.wc-number{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--card-color,var(--text-muted));margin-bottom:8px}
.wc-title{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:10px;color:var(--text-primary)}
.wc-meta{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:12px}
.wc-progress-mini{height:3px;background:var(--bg-tertiary);border-radius:2px;margin-top:14px;overflow:hidden}
.wc-progress-fill{height:100%;width:0%;border-radius:2px;transition:width 0.6s ease}

/* Content blocks */
.section-block{margin-bottom:32px}
.section-heading{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-heading .dot{width:8px;height:8px;border-radius:50%}

/* LO bento grid — summary cards */
.lo-list{list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.lo-item{display:flex;flex-direction:column;padding:0;border-radius:var(--radius);transition:all var(--transition);cursor:pointer;border:1px solid var(--border-color);background:var(--bg-card);overflow:hidden;position:relative}
.lo-item:hover{border-color:var(--active-color,var(--c-quant));box-shadow:var(--shadow-card);transform:translateY(-2px)}
.lo-item.checked{border-color:var(--active-color,var(--c-quant))}
.lo-item.checked::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--active-color,var(--c-quant))}
.lo-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-subtle);background:var(--bg-tertiary);transition:background var(--transition)}
.lo-item.checked .lo-header{background:var(--active-dim,var(--bg-tertiary))}
.lo-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text-muted);min-width:20px}
.lo-check-dot{width:8px;height:8px;min-width:8px;border-radius:50%;border:2px solid var(--border-color);margin-left:auto;transition:all var(--transition)}
.lo-item.checked .lo-check-dot{border-color:var(--active-color,var(--c-quant));background:var(--active-color,var(--c-quant))}
.lo-peek-icon{margin-left:6px;opacity:0;transition:opacity var(--transition);color:var(--text-muted)}
.lo-item:hover .lo-peek-icon{opacity:1}
.lo-peek-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.lo-content{flex:1;padding:12px 14px}
.lo-title{font-size:12.5px;line-height:1.5;color:var(--text-primary);font-weight:500}
.lo-item.checked .lo-title{color:var(--text-muted)}
.lo-summary{font-size:11.5px;line-height:1.5;color:var(--text-muted);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
@media(max-width:900px){.lo-list{grid-template-columns:repeat(2,1fr)}}

/* Peek modal */
.peek-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:none;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity 0.2s ease}
.peek-overlay.open{display:flex;opacity:1}
[data-theme="light"] .peek-overlay{background:rgba(0,0,0,0.35)}
.peek-panel{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;width:100%;max-width:680px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.4);animation:peekIn 0.25s ease}
[data-theme="light"] .peek-panel{box-shadow:0 24px 80px rgba(0,0,0,0.15)}
@keyframes peekIn{from{opacity:0;transform:translateY(16px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.peek-top{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border-color);flex-shrink:0}
.peek-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;letter-spacing:0.5px}
.peek-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.peek-nav-btn{width:32px;height:32px;border-radius:8px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);color:var(--text-secondary)}
.peek-nav-btn:hover{background:var(--bg-card);border-color:var(--text-muted)}
.peek-nav-btn.disabled{opacity:0.3;pointer-events:none}
.peek-nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.peek-close{width:32px;height:32px;border-radius:8px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);color:var(--text-secondary);margin-left:8px}
.peek-close:hover{background:var(--bg-card);border-color:var(--text-muted);color:var(--text-primary)}
.peek-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.peek-body{flex:1;overflow-y:auto;padding:24px}
.peek-title{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.45;margin-bottom:16px;color:var(--text-primary)}
.peek-explanation{font-size:13.5px;line-height:1.7;color:var(--text-secondary)}
.peek-explanation p{margin-bottom:10px}
.peek-explanation p:last-child{margin-bottom:0}
.peek-bottom{display:flex;align-items:center;gap:12px;padding:14px 20px;border-top:1px solid var(--border-color);flex-shrink:0}
.peek-check-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-tertiary);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all var(--transition);font-family:'DM Sans',sans-serif}
.peek-check-btn:hover{border-color:var(--active-color,var(--c-quant));color:var(--text-primary)}
.peek-check-btn.is-checked{background:var(--active-color,var(--c-quant));border-color:var(--active-color,var(--c-quant));color:#fff}
.peek-check-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.peek-lo-count{font-size:12px;color:var(--text-muted);margin-left:auto;font-family:'JetBrains Mono',monospace}
@media(max-width:768px){.peek-panel{max-width:100%;max-height:100vh;max-height:100dvh;height:100vh;height:100dvh;border-radius:0;margin:0}.peek-overlay{padding:0}.peek-body{padding:16px}.peek-top{padding:12px 16px;position:sticky;top:0;z-index:2;background:var(--bg-secondary)}.peek-bottom{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));position:sticky;bottom:0;z-index:2;background:var(--bg-secondary)}.peek-check-btn{flex:1;justify-content:center}.peek-close{width:36px;height:36px}.peek-nav-btn{width:36px;height:36px}}

/* Formula */
.formula-box{background:var(--formula-bg);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:12px 16px;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--text-primary);line-height:1.75;overflow-x:auto;white-space:pre-wrap}
.formula-box .label{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;display:block}

/* Analogy */
.analogy-box{background:linear-gradient(135deg,var(--active-dim,#3B82F620),transparent);border:1px solid var(--active-color,var(--c-quant));border-left:4px solid var(--active-color,var(--c-quant));border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:16px 18px;margin:16px 0}
.analogy-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--active-color,var(--c-quant));margin-bottom:6px;display:flex;align-items:center;gap:6px}
.analogy-text{font-size:13px;line-height:1.65;color:var(--text-secondary);font-style:italic}

.key-term{display:inline;font-weight:600;color:var(--active-color,var(--c-quant))}

/* Quick review */
.quick-review-box{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px;display:none}
.quick-review-box.visible{display:block}
.qr-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.qr-title svg{opacity:0.5}
.qr-bullets{list-style:none;display:flex;flex-direction:column;gap:6px}
.qr-bullets li{font-size:13px;color:var(--text-secondary);padding-left:20px;position:relative;line-height:1.55}
.qr-bullets li::before{content:'→';position:absolute;left:0;color:var(--active-color,var(--text-muted))}

/* Placeholder */
.placeholder-state{text-align:center;padding:60px 20px}
.placeholder-icon{width:64px;height:64px;border-radius:50%;background:var(--bg-tertiary);margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.placeholder-icon svg{width:28px;height:28px;stroke:var(--text-muted);fill:none;stroke-width:1.5}
.placeholder-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text-secondary);margin-bottom:8px}
.placeholder-desc{font-size:13px;color:var(--text-muted);max-width:400px;margin:0 auto;line-height:1.6}

/* Welcome hero */
.intro-hero{text-align:center;padding:40px 20px 30px}
.intro-hero h1{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:12px;letter-spacing:-0.5px}
.intro-hero p{font-size:15px;color:var(--text-secondary);max-width:520px;margin:0 auto;line-height:1.65}
.stats-row{display:flex;justify-content:center;gap:32px;margin-top:28px}
.stat-block{text-align:center}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:var(--text-primary)}
.stat-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.35s ease forwards}

/* ── Mobile bar (hidden on desktop) ── */
.mobile-bar{display:none}

/* ── Sidebar overlay backdrop ── */
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9;opacity:0;transition:opacity 0.25s ease}
.sidebar-backdrop.open{opacity:1}
[data-theme="light"] .sidebar-backdrop{background:rgba(0,0,0,0.25)}

/* ══════════════════════════════════════════
   MOBILE RESPONSIVE — max-width: 768px
   ══════════════════════════════════════════ */
@media(max-width:768px){
  /* Sidebar: hidden by default, slides in as drawer */
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:11;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);width:280px;min-width:280px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:block;pointer-events:none}
  .sidebar-backdrop.open{pointer-events:auto}

  /* Mobile top bar */
  .mobile-bar{display:flex;align-items:center;gap:10px;padding:0 14px;height:52px;min-height:52px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);z-index:5;transition:background var(--transition),border-color var(--transition)}
  .mobile-bar-btn{width:36px;height:36px;border-radius:8px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--transition);flex-shrink:0}
  .mobile-bar-btn:active{background:var(--bg-tertiary)}
  .mobile-bar-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .mobile-bar-title{flex:1;font-family:'DM Serif Display',serif;font-size:16px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .mobile-bar-back{display:none}
  .mobile-bar-back.visible{display:flex}
  .mobile-bar-menu.hidden{display:none}
  .mobile-bar-progress{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);flex-shrink:0}

  /* Hide desktop header on mobile */
  .main-header{display:none}

  /* Subtabs: better touch targets */
  .subtopic-tabs-wrapper{padding:0 10px;-webkit-overflow-scrolling:touch}
  .subtab{padding:10px 14px;font-size:12px;min-height:40px}

  /* Content */
  .content-scroll{padding:16px 14px;padding-bottom:max(32px,env(safe-area-inset-bottom))}
  .content-inner{max-width:100%}

  /* Welcome hero: scale down */
  .intro-hero{padding:24px 12px 20px}
  .intro-hero h1{font-size:24px}
  .intro-hero p{font-size:13px}
  .stats-row{gap:16px;flex-wrap:wrap}
  .stat-value{font-size:22px}
  .stat-label{font-size:10px}

  /* Welcome grid: single column */
  .welcome-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
  .welcome-card{padding:16px}

/* ══ Flashcards ══ */
.fc-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--radius-sm);background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all var(--transition);width:100%;justify-content:center;letter-spacing:0.3px}

/* Flashcard overlay */
.fc-overlay{position:fixed;inset:0;background:var(--bg-primary);z-index:200;display:none;flex-direction:column;overflow:hidden;transition:opacity 0.2s ease}

/* FC Header */
.fc-header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border-color);background:var(--bg-secondary);flex-shrink:0}
.fc-header-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text-primary);flex:1}
.fc-header-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500}
.fc-close{width:36px;height:36px;border-radius:8px;background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all var(--transition)}
.fc-close:hover{border-color:var(--text-muted);color:var(--text-primary)}
.fc-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* FC Deck Selector */
.fc-deck-view{flex:1;overflow-y:auto;padding:24px}
.fc-deck-inner{max-width:700px;margin:0 auto}
.fc-deck-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.fc-stat-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:14px;text-align:center}
.fc-stat-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--text-primary)}
.fc-stat-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
.fc-deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.fc-deck-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.fc-deck-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0.7}
.fc-deck-card:hover{border-color:var(--border-color);transform:translateY(-2px);box-shadow:var(--shadow-card)}
.fc-deck-name{font-family:'DM Serif Display',serif;font-size:15px;margin-bottom:8px;color:var(--text-primary)}
.fc-deck-meta{font-size:11px;color:var(--text-muted);display:flex;gap:12px}
.fc-deck-due{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;margin-top:10px}
.fc-deck-bar{height:3px;background:var(--bg-tertiary);border-radius:2px;margin-top:8px;overflow:hidden;display:flex}
.fc-deck-bar span{height:100%}

/* FC Study Session */
.fc-study{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative}
.fc-progress-bar{width:100%;max-width:500px;height:4px;background:var(--bg-tertiary);border-radius:2px;margin-bottom:24px;overflow:hidden}
.fc-progress-fill{height:100%;border-radius:2px;transition:width 0.3s ease}
.fc-card-wrapper{perspective:1000px;width:100%;max-width:500px;min-height:280px;cursor:pointer}
.fc-card{position:relative;width:100%;min-height:280px;transform-style:preserve-3d;transition:transform 0.5s ease}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--border-color);display:flex;flex-direction:column;overflow:hidden}
.fc-card-front{background:var(--bg-card)}
.fc-card-back{background:var(--bg-secondary);transform:rotateY(180deg)}
.fc-card-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 20px;border-bottom:1px solid var(--border-color);color:var(--text-muted)}
.fc-card-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-card-front .fc-card-body{font-size:15px;line-height:1.65;color:var(--text-primary);font-weight:500}
.fc-card-back .fc-card-body{font-size:14px;line-height:1.65;color:var(--text-secondary);text-align:left;align-items:flex-start;overflow-y:auto}
.fc-card-hint{font-size:11px;color:var(--text-muted);padding:8px 20px;text-align:center;border-top:1px solid var(--border-color)}
.fc-rating{display:flex;gap:8px;margin-top:20px;width:100%;max-width:500px}
.fc-rating-btn{flex:1;padding:12px 8px;border-radius:var(--radius-sm);border:1px solid var(--border-color);background:var(--bg-card);cursor:pointer;text-align:center;transition:all var(--transition);font-family:'DM Sans',sans-serif}
.fc-rating-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-card)}
.fc-rating-btn .label{font-size:12px;font-weight:600;display:block}
.fc-rating-btn .sub{font-size:10px;color:var(--text-muted);margin-top:2px;display:block}
.fc-rating-btn.again{border-color:#EF444460}.fc-rating-btn.again:hover{background:#EF444415;border-color:#EF4444}
.fc-rating-btn.hard{border-color:#F59E0B60}.fc-rating-btn.hard:hover{background:#F59E0B15;border-color:#F59E0B}
.fc-rating-btn.good{border-color:#10B98160}.fc-rating-btn.good:hover{background:#10B98115;border-color:#10B981}
.fc-rating-btn.easy{border-color:#3B82F660}.fc-rating-btn.easy:hover{background:#3B82F615;border-color:#3B82F6}
.fc-rating.hidden{display:none}
.fc-empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.fc-empty-icon{font-size:40px;margin-bottom:12px}
.fc-empty-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text-secondary);margin-bottom:6px}
.fc-done-btn{margin-top:16px;padding:10px 24px;border-radius:var(--radius-sm);background:var(--bg-tertiary);border:1px solid var(--border-color);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);font-family:'DM Sans',sans-serif;transition:all var(--transition)}
.fc-done-btn:hover{border-color:var(--text-muted);color:var(--text-primary)}
@media(max-width:768px){.fc-header{padding:12px 14px}.fc-header-title{font-size:15px}.fc-deck-view{padding:16px}.fc-deck-stats{grid-template-columns:repeat(2,1fr);gap:8px}.fc-stat-val{font-size:20px}.fc-deck-grid{grid-template-columns:1fr}.fc-study{padding:16px}.fc-card-wrapper{min-height:240px}.fc-card{min-height:240px}.fc-card-front .fc-card-body{font-size:14px}.fc-rating-btn{padding:10px 6px}.fc-rating-btn .label{font-size:11px}}


/* ══ Section Stats Cards ══ */
.section-stats{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.section-stat{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border-color);flex:1;min-width:120px}
.section-stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-stat-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.section-stat-info{display:flex;flex-direction:column}
.section-stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--text-primary);line-height:1.2}
.section-stat-label{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted)}
@media(max-width:768px){.section-stats{gap:8px}.section-stat{padding:8px 10px;min-width:100px}.section-stat-val{font-size:16px}.section-stat-icon{width:28px;height:28px}}

.section-stat-btn{cursor:pointer;transition:all var(--transition)}.section-stat-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-card)}
.section-stat-clickable{cursor:pointer;transition:all var(--transition);position:relative}
.section-stat-clickable:hover{transform:translateY(-1px);box-shadow:var(--shadow-card)}
.section-stat-clickable .section-stat-expand{display:inline;font-size:9px;color:var(--text-muted);margin-left:4px;transition:transform var(--transition)}
.section-stat-detail{display:none;width:100%;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:12px 16px;margin-top:-8px;margin-bottom:14px}
.section-stat-detail.open{display:block}
.section-stat-detail-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.section-stat-detail-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.section-stat-detail-list li{font-size:12px;color:var(--text-secondary);padding:4px 0 4px 16px;position:relative;line-height:1.45;border-bottom:1px solid var(--border-subtle)}
.section-stat-detail-list li:last-child{border-bottom:none}
.section-stat-detail-list li::before{content:'';position:absolute;left:0;top:10px;width:6px;height:6px;border-radius:50%}
.section-stat-detail-list.formulas li::before{background:var(--active-color,#3B82F6)}
.section-stat-detail-list.concepts li::before{background:var(--active-color,#3B82F6);opacity:0.5}

/* ══ Interactive Diagrams ══ */
.lo-diagram{margin:14px 0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-color);background:var(--bg-card)}
.lo-diagram svg{display:block;width:100%;height:auto}

.lo-diagram .axis{stroke:var(--text-muted);stroke-width:1;fill:none}

.lo-diagram .label{fill:var(--text-muted);font-size:10px}
.lo-diagram .title{fill:var(--text-primary);font-size:11px;font-weight:600}
.lo-diagram-tabs{display:flex;border-bottom:1px solid var(--border-color);background:var(--bg-tertiary)}
.lo-diagram-tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition);user-select:none}
.lo-diagram-tab:hover{color:var(--text-secondary)}
.lo-diagram-tab.active{color:var(--text-primary);border-bottom-color:var(--active-color,#3B82F6)}
.lo-diagram-view{display:none;padding:4px}
.lo-diagram-view.active{display:block}

/* ══ Rich Visual Components ══ */

/* Steps / Process Flow */
.lo-steps{display:flex;flex-direction:column;gap:0;margin:14px 0}
.lo-step{display:flex;gap:12px;position:relative}
.lo-step-line{width:24px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.lo-step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;z-index:1}
.lo-step-connector{width:2px;flex:1;min-height:16px}
.lo-step:last-child .lo-step-connector{display:none}
.lo-step-body{flex:1;padding-bottom:16px}
.lo-step:last-child .lo-step-body{padding-bottom:0}
.lo-step-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:3px;line-height:24px}
.lo-step-desc{font-size:12px;color:var(--text-secondary);line-height:1.55}

/* Comparison Grid / Table */
.lo-compare{margin:14px 0;border:1px solid var(--border-color);border-radius:var(--radius-sm);overflow:hidden}
.lo-compare-header{display:grid;background:var(--bg-tertiary);border-bottom:1px solid var(--border-color);font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-muted)}
.lo-compare-header>div{padding:10px 14px}
.lo-compare-row{display:grid;border-bottom:1px solid var(--border-subtle);transition:background var(--transition)}
.lo-compare-row:last-child{border-bottom:none}
.lo-compare-row:hover{background:var(--bg-tertiary)}
.lo-compare-row>div{padding:10px 14px;font-size:12px;color:var(--text-secondary);line-height:1.5}
.lo-compare-row>div:first-child{font-weight:600;color:var(--text-primary)}
.lo-compare-2{grid-template-columns:1fr 1fr}
.lo-compare-3{grid-template-columns:1fr 1fr 1fr}
.lo-compare-4{grid-template-columns:140px 1fr 1fr 1fr}

/* Icon Cards Row */
.lo-icon-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:14px 0}
.lo-icon-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:14px;text-align:center;transition:all var(--transition)}
.lo-icon-card:hover{border-color:var(--active-color,var(--c-quant));transform:translateY(-1px)}
.lo-icon-card-emoji{font-size:24px;margin-bottom:6px}
.lo-icon-card-title{font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
.lo-icon-card-desc{font-size:11px;color:var(--text-muted);line-height:1.45}

/* Callout / Tip Box */
.lo-callout{display:flex;gap:10px;margin:12px 0;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-color)}
.lo-callout-warn{background:#EF444410;border-color:#EF444440}

.lo-callout-info{background:#3B82F610;border-color:#3B82F640}
.lo-callout-icon{font-size:16px;flex-shrink:0;line-height:1.4}
.lo-callout-text{font-size:12px;line-height:1.55;color:var(--text-secondary)}
.lo-callout-text strong{color:var(--text-primary)}

/* Enhanced Formula Box */
.formula-highlight{background:var(--formula-bg);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:16px;margin:14px 0;position:relative;overflow:hidden}
.formula-highlight::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px}
.formula-highlight-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.formula-highlight-body{font-size:13px;line-height:2.0;color:var(--text-primary);white-space:pre-wrap;overflow-x:auto}
.formula-highlight-body .katex-display{margin:4px 0;text-align:left}
.formula-highlight-body .katex-display>.katex{text-align:left}
.formula-highlight-body .katex{font-size:1.05em}
.formula-highlight-note{font-family:'DM Sans',sans-serif;font-size:11.5px;color:var(--text-muted);margin-top:10px;font-style:italic;line-height:1.5}

/* Tag Pills */
.lo-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.lo-tag{font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.3px}

/* Mini Analogy (inline) */
.lo-mini-analogy{display:flex;gap:10px;margin:12px 0;padding:12px 14px;background:linear-gradient(135deg,var(--active-dim,#3B82F620),transparent);border-radius:var(--radius-sm);border:1px solid var(--active-color,var(--c-quant));border-left:3px solid var(--active-color,var(--c-quant))}
.lo-mini-analogy-icon{font-size:18px;flex-shrink:0}
.lo-mini-analogy-text{font-size:12px;color:var(--text-secondary);line-height:1.55;font-style:italic}

@media(max-width:768px){

  .lo-compare-header,.lo-compare-row{min-width:400px}
  .lo-icon-cards{grid-template-columns:repeat(2,1fr);gap:8px}

}
