'fi|term-struct':{
quickReview:['Spot rate = YTM on a zero-coupon bond. Forward rate = implied rate between two future dates. YTM = weighted average of spot rates.','Bootstrapping: derive spot rates from the par curve by iteratively stripping coupons.','Rolling down the yield curve: buy longer-maturity bonds and sell before maturity as they "roll" to lower yields (works in upward-sloping, stable curves).','Swap rate curve: preferred over government curve for valuation because it reflects interbank credit risk, has more maturities, and is less affected by supply/demand of government bonds.','Swap spread = swap rate − Treasury yield for same maturity. Reflects credit/liquidity premium.','Theories: pure expectations (forwards = expected future spots), liquidity preference (premium for longer maturities), segmented markets (supply/demand in each segment), preferred habitat (investors will leave segment for sufficient premium).','Key rate durations measure sensitivity to shifts at specific maturities — useful for non-parallel yield curve changes.'],
analogy:'The yield curve is like a <em>hiking trail elevation profile</em>. Spot rates are the actual elevation at each point. Forward rates are the slope between two points — they tell you how steep the climb is from here to there. Rolling down the yield curve is like walking downhill — you gain altitude for free if the trail stays the same shape. The expectations theory says the trail\'s current shape predicts future terrain; the liquidity preference theory says hikers demand extra reward for committing to longer, more uncertain trails.',
los:[
{title:'Describe relationships among spot rates, forward rates, yield to maturity, expected and realized returns on bonds, and the shape of the yield curve.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Rate</div><div>Definition</div><div>What It Tells You</div><div>Notation</div></div><div class="lo-compare-row lo-compare-4"><div>📍 Spot Rate (zₙ)</div><div>YTM on an n-period zero-coupon bond</div><div>The "true" discount rate for a CF at maturity n</div><div>z₁, z₂, z₃…</div></div><div class="lo-compare-row lo-compare-4"><div>📅 Forward Rate f(j,k)</div><div>Implied rate from period j to k</div><div>The market-implied "break-even" rate for the future interval</div><div>$$(1+z_k)^k = (1+z_j)^j \\times (1+f_{j,k})^{k-j}$$</div></div><div class="lo-compare-row lo-compare-4"><div>📊 YTM</div><div>Single rate that discounts all CFs to market price</div><div>Weighted average of spot rates (weights = PV of each CF)</div><div>IRR of the bond</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Expected return = YTM only if:</strong> (1) reinvestment rate equals YTM for the entire holding period, AND (2) the bond is held to maturity. Otherwise, realized return will differ. The yield curve\'s shape reflects both expected future rates AND risk premiums.</div></div>'},
{title:'Describe how zero-coupon rates (spot rates) may be obtained from the par curve by bootstrapping.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">1</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">z₁ = par yield for 1-year bond</div><div class="lo-step-desc">No stripping needed — a 1-year par bond IS a zero-coupon in practice</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">2</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Solve for z₂</div><div class="lo-step-desc">$$100 = \\frac{C}{1+z_1} + \\frac{100+C}{(1+z_2)^2}$$. Use known $z_1$ to solve for $z_2$.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">3</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Solve for z₃</div><div class="lo-step-desc">3-year par bond: use z₁ and z₂ (now known) to isolate z₃. Continue iteratively.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">4</div></div><div class="lo-step-body"><div class="lo-step-title">Continue for All Maturities</div><div class="lo-step-desc">Each step uses all previously derived spot rates to strip the next one — building the curve one point at a time.</div></div></div></div>'},
{title:'Describe the assumptions concerning the evolution of spot rates in relation to forward rates implicit in active bond portfolio management.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Manager\'s View</div><div>Position</div><div>Logic</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Rates will rise LESS than forwards predict</div><div>Buy longer-duration bonds (extend)</div><div>You\'ll earn more than the forward rate implies — the break-even is not reached</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Rates will rise MORE than forwards predict</div><div>Shorten duration</div><div>Longer bonds will underperform vs. rolling short-term investments</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">Rates will evolve exactly as forwards predict</div><div>Indifferent to maturity</div><div>All maturities earn the same return — this is the break-even scenario</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The forward curve is the break-even:</strong> the rate path that makes all maturities earn the same return. Active managers bet against forwards — they must have a view that differs from what\'s priced in.</div></div>'},
{title:'Describe the strategy of rolling down the yield curve.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Roll Return</div><div class="formula-highlight-body">$$\\text{Roll return} \\approx (yield at purchase maturity - yield at shorter maturity) \\times remaining duration$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Condition</div><div>Roll-Down Works?</div><div>Why</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Upward-sloping + stable curve</div><div>✅ Yes — free capital gain</div><div>Bond "rolls" to lower yield → higher price as it ages</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Curve flattens or inverts</div><div>❌ No — gain disappears or reverses</div><div>No yield advantage from shorter maturity, or curve moves against you</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Rates shift upward</div><div>❌ No — price loss offsets roll gain</div><div>The entire curve moving up hurts all bond prices</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">⛰️</div><div class="lo-mini-analogy-text">Like walking downhill on a trail — you gain altitude for free. But only if the trail stays the same shape. If the hill suddenly flattens or rises, the strategy fails.</div></div>'},
{title:'Explain the swap rate curve and why and how market participants use it in valuation.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #14B8A6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">More Maturities</div><div class="lo-icon-card-desc">Swap rates exist for virtually any maturity — continuous curve, unlike patchy government bond maturities</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Cross-Country Comparable</div><div class="lo-icon-card-desc">Reflects interbank credit (AA-rated) consistently across countries — better for global comparisons</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🛡️</div><div class="lo-icon-card-title">Less Distorted</div><div class="lo-icon-card-desc">Government curves affected by QE, fiscal policy, and supply/demand. Swap curve reflects pure credit/rate dynamics.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">Primary Hedging Tool</div><div class="lo-icon-card-desc">Swaps are how banks and corporates actually hedge — so the swap curve is the natural valuation benchmark</div></div></div>'},
{title:'Calculate and interpret the swap spread for a given maturity.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Swap Spread</div><div class="formula-highlight-body">$$\\text{Swap spread} = Swap rate - Treasury yield (same maturity)$$\n$$\\text{Example: }5-year swap rate = 3.50\\%, 5-year Treasury = 3.10\\%$$\n$$\\text{Swap spread} = 40 bps$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Spread Movement</div><div>Signal</div><div>Drivers</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Widening</div><div>Market stress, credit concerns rising</div><div>Bank counterparty risk ↑, liquidity hoarding, flight to Treasuries</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Narrowing</div><div>Improving conditions, risk appetite rising</div><div>Bank health improving, abundant liquidity, risk-on environment</div></div></div>'},
{title:'Describe short-term interest rate spreads used to gauge economy-wide credit risk and liquidity risk.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Spread</div><div>Formula</div><div>What It Measures</div><div>Crisis Behavior</div></div><div class="lo-compare-row lo-compare-4"><div>📊 TED Spread</div><div>LIBOR (or SOFR equiv.) − T-bill rate</div><div>Banking system stress vs. sovereign credit</div><div style="color:#EF4444;font-weight:700">Spiked to 450+ bps in 2008</div></div><div class="lo-compare-row lo-compare-4"><div>🏦 LIBOR-OIS</div><div>LIBOR − overnight indexed swap rate</div><div>Interbank lending risk specifically</div><div style="color:#EF4444;font-weight:700">Purest counterparty risk measure</div></div><div class="lo-compare-row lo-compare-4"><div>📄 CP Spread</div><div>Commercial paper rate − T-bill rate</div><div>Corporate short-term funding stress</div><div style="color:#EF4444;font-weight:700">Widens when money markets freeze</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>All three are real-time barometers of financial system health.</strong> They widen during crises (2008, 2020) as counterparty risk and liquidity hoarding increase. Narrowing signals the system is healing.</div></div>'},
{title:'Explain traditional theories of the term structure and describe implications for forward rates and yield curve shape.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Theory</div><div>Core Claim</div><div>Forwards Reflect</div><div>Upward Slope Means</div></div><div class="lo-compare-row lo-compare-4"><div>🔮 Pure Expectations</div><div>Forward rates = expected future spot rates</div><div>Market\'s rate expectations only</div><div>Market expects rates to rise</div></div><div class="lo-compare-row lo-compare-4"><div>💧 Liquidity Preference</div><div>Forwards = expected spots + liquidity premium</div><div>Expectations + premium for longer maturities</div><div>Rate expectations + term premium (can invert only if large rate cuts expected)</div></div><div class="lo-compare-row lo-compare-4"><div>📦 Segmented Markets</div><div>Supply/demand in each maturity segment sets rates independently</div><div>Nothing about other segments</div><div>More demand for short bonds → lower short rates</div></div><div class="lo-compare-row lo-compare-4"><div>🏠 Preferred Habitat</div><div>Like segmented, but investors WILL switch segments for sufficient compensation</div><div>Segment preferences + required premium to switch</div><div>Modified segmented — more realistic</div></div></div>'},
{title:'Explain how a bond\'s exposure to yield curve factors can be measured and used to manage yield curve risks.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Yield Curve Factor</div><div>What Changes</div><div>Measured By</div></div><div class="lo-compare-row lo-compare-3"><div>📏 Level (parallel shift)</div><div>All rates move up/down by the same amount</div><div>Effective duration (captures ~90% of curve risk)</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Slope (steepening/flattening)</div><div>Short and long rates move differently</div><div>Key rate durations at specific maturities (2y, 5y, 10y, 30y)</div></div><div class="lo-compare-row lo-compare-3"><div>🦋 Curvature (butterfly)</div><div>Middle rates move differently from short + long</div><div>Barbell vs. bullet key rate duration profiles</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Barbell vs. bullet:</strong> Both can have the same effective duration but very different key rate profiles. A barbell (short + long maturities) is more exposed to curvature changes than a bullet (concentrated at intermediate maturity). Duration-matching alone doesn\'t eliminate non-parallel risk.</div></div>'},
{title:'Explain the maturity structure of yield volatilities and their effect on price volatility.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Maturity</div><div>Yield Volatility</div><div>Price Volatility</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Short-Term</div><div style="color:#EF4444;font-weight:700">Higher (central bank policy directly affects short end)</div><div>Lower (low duration → small price impact per bp)</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Long-Term</div><div>Lower (anchored by long-run expectations)</div><div style="color:#EF4444;font-weight:700">Higher (high duration → large price impact per bp)</div></div></div><div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Key Relationship</div><div class="formula-highlight-body">$$Price Volatility = Duration \\times Yield Volatility$$</div><div class="formula-highlight-note">Even though long-term yield volatility is lower, the duration effect dominates → long bonds have higher price volatility. Duration-matching doesn\'t eliminate risk if yield volatilities differ across the curve.</div></div>'},
{title:'Explain how key economic factors are used to establish a view on benchmark rates, spreads, and yield curve changes.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏦</div><div class="lo-icon-card-title">Monetary Policy</div><div class="lo-icon-card-desc">Central bank rate path drives the short end. Hawkish → short rates ↑ → curve flattens. Dovish → curve steepens.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Inflation Expectations</div><div class="lo-icon-card-desc">Drive the long end. Rising inflation expectations → higher long-term rates → curve steepens.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Economic Growth</div><div class="lo-icon-card-desc">Strong growth → higher real rates + tighter credit spreads. Weak growth → lower rates + wider spreads.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💳</div><div class="lo-icon-card-title">Fiscal Policy</div><div class="lo-icon-card-desc">Large deficits → more bond supply → upward pressure on yields (especially long end).</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Global Factors</div><div class="lo-icon-card-desc">Foreign demand for domestic bonds, global risk appetite, currency expectations all affect the curve.</div></div></div>'}
]},

'fi|arb-free':{
quickReview:['Arbitrage-free: every bond is priced consistently with the spot curve — no riskless profit possible.','Binomial tree: model interest rate evolution with up/down moves calibrated to match the current term structure + assumed volatility.','Backward induction: start at maturity (par + coupon), average up/down node values, discount back one period. Repeat.','Pathwise valuation: enumerate all possible rate paths, value the bond along each, average across paths.','Monte Carlo: simulate thousands of random rate paths — needed for path-dependent securities (MBS).','Term structure models: equilibrium (CIR, Vasicek — derive curve from assumptions) vs. arbitrage-free (Ho-Lee, BDT — calibrate to observed curve).'],
analogy:'The arbitrage-free framework is like <em>pricing airline tickets consistently</em>. If a round-trip ticket costs less than two separate one-way tickets on the same flights, there\'s an arbitrage — buy the round-trip and sell the legs. The binomial tree is the airline\'s pricing engine: it models how fares might change at each decision point (up or down), then works backward from the destination to ensure today\'s prices are internally consistent.',
los:[
{title:'Explain what is meant by arbitrage-free valuation of a fixed-income instrument.',explanation:'<div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Arbitrage-free valuation</strong> means pricing a bond so that no riskless profit can be earned by trading it against other bonds or the spot curve. Each cash flow is discounted at the appropriate spot rate for its maturity — not a single YTM.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Concept</div><div>How It Works</div><div>If Violated</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Law of One Price</div><div>Identical CFs must have identical PVs regardless of which bond they come from</div><div>Trader strips the cheap bond and sells CFs individually at higher implied prices</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Stripping/Reconstitution</div><div>Coupon bonds can be decomposed into zero-coupon components and reassembled</div><div>If sum of strips ≠ bond price → buy cheap, sell expensive → riskless profit</div></div></div>'},
{title:'Calculate the arbitrage-free value of an option-free, fixed-rate coupon bond.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Arbitrage-Free Bond Value</div><div class="formula-highlight-body">$$V = \\frac{C}{1+z_1} + \\frac{C}{1+z_2}^2 + ... + \\frac{(C+FV)}{1+z_n}ⁿ$$</div><div class="formula-highlight-note">Discount each CF at its OWN spot rate — NOT at a single YTM. Each CF gets the rate for its specific maturity.</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">Ex</div></div><div class="lo-step-body"><div class="lo-step-title">Example: 3-year, 5% coupon, par = $100</div><div class="lo-step-desc">z₁ = 3%, z₂ = 3.5%, z₃ = 4%. V = 5/1.03 + 5/1.035² + 105/1.04³ = 4.854 + 4.668 + 93.351 = <strong>$102.87</strong></div></div></div></div>'},
{title:'Describe a binomial interest rate tree framework.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #14B8A6"><div class="lo-icon-card-emoji">🌳</div><div class="lo-icon-card-title">Discrete Time Steps</div><div class="lo-icon-card-desc">At each node, rates can move up or down — modeled over discrete periods (e.g., 1 year each)</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Risk-Neutral Probabilities</div><div class="lo-icon-card-desc">Typically 50/50 up/down. Not real-world probabilities — they\'re "risk-neutral" for pricing purposes.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">Node Relationship</div><div class="lo-icon-card-desc">Adjacent nodes related by: r_up = r_down × e^(2σ). Volatility determines the spread between up and down.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">✅</div><div class="lo-icon-card-title">Calibrated to Market</div><div class="lo-icon-card-desc">Tree is calibrated so it reproduces current observed bond prices — ensuring no-arbitrage.</div></div></div>'},
{title:'Describe the process of calibrating a binomial interest rate tree to match a specific term structure.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">1</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Set Current Short Rate</div><div class="lo-step-desc">Period 1 rate = observed 1-period rate from the market. This is the root node.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">2</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Choose Trial Rates for Period 2</div><div class="lo-step-desc">Select up/down rates separated by 2σ. The volatility parameter determines the spread.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">3</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Price the 2-Period Benchmark Bond</div><div class="lo-step-desc">Use backward induction with trial rates. Compare model price to market price.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">4</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Iterate Until Match</div><div class="lo-step-desc">Adjust trial rates until model price = market price. Now period 2 nodes are locked.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">5</div></div><div class="lo-step-body"><div class="lo-step-title">Repeat for Each Period</div><div class="lo-step-desc">Add period 3, 4, etc. — each time matching the next benchmark bond while using all previously calibrated nodes.</div></div></div></div>'},
{title:'Describe backward induction and calculate the value of a fixed-income instrument at each node.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Backward Induction</div><div class="formula-highlight-body">$$At maturity: V = par + coupon$$\nAt each prior node:\n$$V = [0.5 \\times V_up + 0.5 \\times V_down + \\frac{coupon}{1 + r_node}$$</div><div class="formula-highlight-note">Example: r_node = 4%, V_up = 98, V_down = 101, C = 3 → V = [0.5(98) + 0.5(101) + 3] / 1.04 = 102.5 / 1.04 = 98.56</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Step</div><div>Action</div><div>Key Point</div></div><div class="lo-compare-row lo-compare-3"><div>🏁 Start at Maturity</div><div>All terminal nodes = par + final coupon</div><div>Known with certainty</div></div><div class="lo-compare-row lo-compare-3"><div>⬅️ Work Backward</div><div>Average up/down values, add coupon, discount at node rate</div><div>Each node uses the SHORT RATE at that specific node</div></div><div class="lo-compare-row lo-compare-3"><div>🌳 Root Node</div><div>Final value = today\'s arbitrage-free bond price</div><div>Incorporates all possible rate paths</div></div></div>'},
{title:'Compare pricing using the zero-coupon yield curve with pricing using an arbitrage-free binomial lattice.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>Spot Curve Approach</div><div>Binomial Tree Approach</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Method</div><div>Discount each CF at corresponding spot rate</div><div>Average across rate paths via backward induction</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Option-Free Bonds</div><div style="color:#10B981;font-weight:700">Same price — both are arbitrage-free</div><div style="color:#10B981;font-weight:700">Same price — equivalent for plain bonds</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Bonds with Options</div><div style="color:#EF4444;font-weight:700">Cannot model option exercise decisions</div><div style="color:#10B981;font-weight:700">Can model call/put exercise at each node</div></div><div class="lo-compare-row lo-compare-3"><div>⚡ Complexity</div><div style="color:#10B981;font-weight:700">Simple — just discount CFs</div><div>More complex — build and calibrate the tree</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The tree\'s advantage</strong> emerges ONLY for bonds with embedded options — callable, putable, or convertible. For option-free bonds, the spot curve is simpler and gives the same answer.</div></div>'},
{title:'Describe pathwise valuation in a binomial interest rate framework and calculate the value along each path.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Enumerate All Paths</div><div class="lo-step-desc">For n periods, there are 2ⁿ possible paths through the tree (e.g., UU, UD, DU, DD for 2 periods)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Value Along Each Path</div><div class="lo-step-desc">For each path, discount the bond\'s cash flows at the specific sequence of rates along that path</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div></div><div class="lo-step-body"><div class="lo-step-title">Average Across All Paths</div><div class="lo-step-desc">Bond value = simple average of values across all paths. Equivalent to backward induction for option-free bonds.</div></div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Path dependence matters:</strong> For bonds with embedded options, the option may be exercised along some paths but not others. Pathwise valuation must track option exercise decisions at each point — making it computationally heavier but necessary for path-dependent securities.</div></div>'},
{title:'Describe a Monte Carlo forward-rate simulation and its application.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Feature</div><div>Binomial Tree</div><div>Monte Carlo Simulation</div></div><div class="lo-compare-row lo-compare-3"><div>📊 # of Paths</div><div>2ⁿ (manageable for small n)</div><div style="color:#10B981;font-weight:700">Thousands to millions (simulate randomly)</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Path Dependence</div><div style="color:#EF4444;font-weight:700">Difficult to handle</div><div style="color:#10B981;font-weight:700">Handles naturally — each path tracked individually</div></div><div class="lo-compare-row lo-compare-3"><div>🏠 Key Application</div><div>Callable/putable bonds</div><div style="color:#10B981;font-weight:700">MBS — prepayment depends on the entire rate path, not just current rate</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Why MBS needs Monte Carlo:</strong> Homeowners\' prepayment behavior depends on the <em>path</em> of rates (burnout effect — if rates were low before, many have already refinanced). A binomial tree can\'t capture this history efficiently. Monte Carlo generates full rate paths and tracks prepayment behavior along each one.</div></div>'},
{title:'Describe term structure models and how they are used.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Model Type</div><div>Examples</div><div>How It Works</div><div>Used For</div></div><div class="lo-compare-row lo-compare-4"><div>🔬 Equilibrium</div><div>Vasicek, CIR (Cox-Ingersoll-Ross)</div><div>Derive the yield curve from assumptions about rate dynamics (mean reversion, volatility)</div><div>Understanding rate behavior; academic research</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Arbitrage-Free</div><div>Ho-Lee, BDT (Black-Derman-Toy)</div><div>Calibrate to the observed curve — guarantee today\'s prices are exactly reproduced</div><div style="color:#10B981;font-weight:700">Pricing derivatives and structured products</div></div></div><div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Model</div><div>Mean Reversion?</div><div>Negative Rates?</div><div>Key Feature</div></div><div class="lo-compare-row lo-compare-4"><div>Vasicek</div><div>✅ Yes</div><div style="color:#EF4444;font-weight:700">Allows negative rates</div><div>Simple, analytically tractable</div></div><div class="lo-compare-row lo-compare-4"><div>CIR</div><div>✅ Yes</div><div style="color:#10B981;font-weight:700">Rates stay positive</div><div>More realistic, but less tractable</div></div><div class="lo-compare-row lo-compare-4"><div>Ho-Lee</div><div>❌ No</div><div>Allows negative rates</div><div>Simplest arb-free; parallel shifts</div></div><div class="lo-compare-row lo-compare-4"><div>BDT</div><div>✅ Yes</div><div style="color:#10B981;font-weight:700">Rates stay positive</div><div>Matches curve + vol structure</div></div></div>'}
]},

'fi|embedded':{
quickReview:['V(callable) = V(straight) − V(call option). V(putable) = V(straight) + V(put option).','Higher volatility → higher option value → lower callable bond value, higher putable bond value.','OAS = spread added to all tree rates so model price = market price. Removes option effect — "option-adjusted."','Effective duration: callable < straight (call caps upside). Putable < straight duration too (put creates floor).','One-sided durations: duration differs for rate rises vs. falls (asymmetry from embedded option).','Callable bonds have negative convexity at low yields (price ceiling from call). Putable bonds have enhanced positive convexity.','Convertible bond = straight bond + call option on stock. Floor = max(conversion value, straight bond value).'],
analogy:'A callable bond is like <em>renting an apartment with a landlord break clause</em>. The landlord (issuer) can terminate the lease (call the bond) whenever rates drop — leaving you to reinvest at worse terms. You get a higher rent (yield) to compensate for this risk. A putable bond flips it: the tenant (investor) can leave whenever rates rise — so you accept lower rent for that flexibility. The OAS strips out these options to reveal the "pure credit spread" underneath.',
los:[
{title:'Describe fixed-income securities with embedded options.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Security</div><div>Who Holds the Option</div><div>When It\'s Exercised</div><div>Investor Impact</div></div><div class="lo-compare-row lo-compare-4"><div>📞 Callable Bond</div><div>Issuer (investor is short)</div><div>Rates fall → issuer refinances at lower cost</div><div style="color:#EF4444;font-weight:700">Caps upside; reinvestment risk</div></div><div class="lo-compare-row lo-compare-4"><div>🛡️ Putable Bond</div><div>Investor (investor is long)</div><div>Rates rise → investor sells back at par</div><div style="color:#10B981;font-weight:700">Price floor; downside protection</div></div><div class="lo-compare-row lo-compare-4"><div>🔄 Convertible Bond</div><div>Investor (investor is long)</div><div>Stock price rises above conversion price</div><div style="color:#10B981;font-weight:700">Equity upside + bond floor</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Capped Floater</div><div>Issuer (investor is short)</div><div>Reference rate exceeds cap rate</div><div style="color:#EF4444;font-weight:700">Limits coupon upside</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Floored Floater</div><div>Investor (investor is long)</div><div>Reference rate falls below floor</div><div style="color:#10B981;font-weight:700">Guarantees minimum coupon</div></div></div>'},
{title:'Explain the relationships between callable/putable bond values, the straight bond, and the embedded option.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Value Relationships</div><div class="formula-highlight-body">$$V(callable) = V(straight) - V(call option to issuer)$$\n$$V(putable) = V(straight) + V(put option to investor)$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Bond Type</div><div>Relative to Straight</div><div>Why</div></div><div class="lo-compare-row lo-compare-3"><div>📞 Callable</div><div style="color:#EF4444;font-weight:700">Always worth LESS</div><div>Investor gives up an option to the issuer → must be compensated with higher yield</div></div><div class="lo-compare-row lo-compare-3"><div>🛡️ Putable</div><div style="color:#10B981;font-weight:700">Always worth MORE</div><div>Investor receives an option → willing to accept lower yield</div></div></div>'},
{title:'Describe how the arbitrage-free framework can be used to value a bond with embedded options.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">1</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Build & Calibrate the Binomial Tree</div><div class="lo-step-desc">Calibrate to the current term structure so the tree is arbitrage-free</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">2</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Backward-Induct as Usual</div><div class="lo-step-desc">$$V = \\frac{0.5 V_{up} + 0.5 V_{down} + C}{1+r}$$</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">3</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Apply Option Constraint at Each Node</div><div class="lo-step-desc">$$V_{\\text{callable}} = \\min(V, \\text{call price})$$ $$V_{\\text{putable}} = \\max(V, \\text{put price})$$</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">4</div></div><div class="lo-step-body"><div class="lo-step-title">Root Node = Bond Value</div><div class="lo-step-desc">Reflects the option constraint at every possible decision point across all rate paths</div></div></div></div>'},
{title:'Explain how interest rate volatility affects the value of a callable or putable bond.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>If Volatility ↑</div><div>Option Value</div><div>Callable Bond Value</div><div>Putable Bond Value</div></div><div class="lo-compare-row lo-compare-4"><div>🌊 Higher volatility</div><div style="color:#10B981;font-weight:700">↑ (more likely to finish in-the-money)</div><div style="color:#EF4444;font-weight:700">↓ (investor is short the call → hurts)</div><div style="color:#10B981;font-weight:700">↑ (investor is long the put → helps)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Why callables yield more:</strong> Investors demand compensation for being short an option whose value increases with volatility. The higher yield on a callable bond IS the option premium — paid through coupon income rather than upfront.</div></div>'},
{title:'Explain how changes in the level and shape of the yield curve affect the value of a callable or putable bond.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Change</div><div>Callable Impact</div><div>Putable Impact</div><div>Why</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Rates fall sharply</div><div style="color:#EF4444;font-weight:700">Doesn\'t appreciate as much as straight (call caps upside)</div><div>Appreciates fully (put not relevant)</div><div>Call is in-the-money → issuer likely to exercise</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Rates rise sharply</div><div>Falls fully (call not relevant)</div><div style="color:#10B981;font-weight:700">Doesn\'t fall as much as straight (put provides floor)</div><div>Put is in-the-money → investor exercises</div></div><div class="lo-compare-row lo-compare-4"><div>📏 Curve flattens</div><div>Call option value ↓ (less refinancing benefit)</div><div>—</div><div>Less incentive for issuer to call and reissue</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Curve steepens</div><div style="color:#EF4444;font-weight:700">Call option value ↑</div><div>—</div><div>Greater rate differential → more incentive to call</div></div></div>'},
{title:'Calculate the value of a callable or putable bond from an interest rate tree.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Tree Valuation with Options</div><div class="formula-highlight-body">At each node, compute V_unconstrained first:\n$$V = [0.5 \\times V_up + 0.5 \\times V_down + \\frac{C}{1 + r}$$\nThen apply the option:\n$$\\text{Callable: }V_node = min(V_unconstrained, call price)$$\n$$\\text{Putable: }V_node = max(V_unconstrained, put price)$$</div><div class="formula-highlight-note">Root node = the bond\'s arbitrage-free value including the embedded option effect.</div></div>'},
{title:'Explain the calculation and use of option-adjusted spreads.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Option-Adjusted Spread (OAS)</div><div class="formula-highlight-body">$$OAS = constant spread added to EVERY rate in the tree$$\n$$such that: model value (with option logic) = market price$$\n$$Nominal spread = OAS + option cost$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Bond Type</div><div>Nominal vs. OAS</div><div>Interpretation</div></div><div class="lo-compare-row lo-compare-3"><div>📞 Callable</div><div>Nominal spread &gt; OAS</div><div>Part of the yield compensates for the short option, not just credit risk</div></div><div class="lo-compare-row lo-compare-3"><div>🛡️ Putable</div><div>Nominal spread &lt; OAS</div><div>The option benefit offsets some credit spread — true credit risk is higher than nominal suggests</div></div><div class="lo-compare-row lo-compare-3"><div>📄 Straight</div><div>Nominal ≈ OAS</div><div>No option → nominal spread is approximately the pure credit spread</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>OAS enables apples-to-apples:</strong> By stripping out the option effect, OAS isolates the credit component of spread. Compare OAS across callables, putables, and straights to find relative value — higher OAS for same credit = cheaper bond.</div></div>'},
{title:'Explain how interest rate volatility affects option-adjusted spreads.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>If Assumed Vol ↑</div><div>Option Value</div><div>OAS for Callable</div></div><div class="lo-compare-row lo-compare-3"><div>🌊 Higher volatility</div><div>↑ (call worth more)</div><div style="color:#EF4444;font-weight:700">↓ Lower (more of spread attributed to option, less to credit)</div></div><div class="lo-compare-row lo-compare-3"><div>🌊 Lower volatility</div><div>↓ (call worth less)</div><div style="color:#10B981;font-weight:700">↑ Higher (less attributed to option, more to credit)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>OAS is model-dependent.</strong> The choice of volatility assumption directly impacts the OAS calculation. Two analysts using different volatility inputs will get different OAS values for the same bond. Always check which volatility underlies a quoted OAS.</div></div>'},
{title:'Calculate and interpret effective duration of a callable or putable bond.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Effective Duration</div><div class="formula-highlight-body">$$EffDur = (V- - \\frac{V+}{2 \\times V_0 \\times \\Delta y}$$</div><div class="formula-highlight-note">V- = value if curve shifts down by Δy | V+ = value if curve shifts up | Must re-build the tree for each shift (option exercise changes with rates)</div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Cannot use modified duration</strong> for bonds with options — modified duration assumes CFs don\'t change with rates, but embedded options change the CF profile when rates shift. Must use effective duration (which revalues with the tree).</div></div>'},
{title:'Compare effective durations of callable, putable, and straight bonds.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Bond</div><div>Duration vs. Straight</div><div>At Low Rates</div><div>At High Rates</div></div><div class="lo-compare-row lo-compare-4"><div>📄 Straight</div><div>Baseline</div><div>Normal duration</div><div>Normal duration</div></div><div class="lo-compare-row lo-compare-4"><div>📞 Callable</div><div style="color:#EF4444;font-weight:700">≤ Straight</div><div>Approaches zero (price capped by call → barely moves when rates fall further)</div><div>≈ Straight (call is far out-of-the-money)</div></div><div class="lo-compare-row lo-compare-4"><div>🛡️ Putable</div><div style="color:#10B981;font-weight:700">≤ Straight</div><div>≈ Straight (put is far out-of-the-money)</div><div>Approaches zero (price floored by put → barely falls when rates rise further)</div></div></div>'},
{title:'Describe the use of one-sided durations and key rate durations for bonds with embedded options.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Measure</div><div>What It Captures</div><div>Why It Matters for Embedded Options</div></div><div class="lo-compare-row lo-compare-3"><div>⬇️ One-Sided Duration (rates ↓)</div><div>Price sensitivity to rate decreases only</div><div>For callable: much lower than upside duration (call truncates gain). The asymmetry is hidden in standard two-sided duration.</div></div><div class="lo-compare-row lo-compare-3"><div>⬆️ One-Sided Duration (rates ↑)</div><div>Price sensitivity to rate increases only</div><div>For putable: much lower than downside duration (put creates floor). Again, two-sided duration masks this.</div></div><div class="lo-compare-row lo-compare-3"><div>🔑 Key Rate Durations</div><div>Sensitivity at specific maturities (2y, 5y, 10y, 30y)</div><div>Callable bonds are most affected by rates at the call date — not uniform shifts. Key rate durations reveal this concentrated exposure.</div></div></div>'},
{title:'Compare effective convexities of callable, putable, and straight bonds.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Effective Convexity</div><div class="formula-highlight-body">$$EffConv = (V- + V+ - \\frac{2V_0}{V_0 \\times \\Delta y^2}$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Bond</div><div>Convexity</div><div>What It Means</div></div><div class="lo-compare-row lo-compare-3"><div>📄 Straight</div><div style="color:#10B981;font-weight:700">Positive</div><div>Price gains &gt; losses for equal rate moves — good for investors</div></div><div class="lo-compare-row lo-compare-3"><div>📞 Callable (low yields)</div><div style="color:#EF4444;font-weight:700">NEGATIVE</div><div>Price ceiling from call → gains compressed but losses not. Bad for investors.</div></div><div class="lo-compare-row lo-compare-3"><div>🛡️ Putable</div><div style="color:#10B981;font-weight:700">ENHANCED positive</div><div>Price floor from put → losses compressed but gains not. Extra protection.</div></div></div>'},
{title:'Calculate the value of a capped or floored floating-rate bond.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Capped & Floored Floaters</div><div class="formula-highlight-body">$$V(capped floater) = V(straight floater) - V(cap)$$\n$$V(floored floater) = V(straight floater) + V(floor)$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Type</div><div>Investor\'s Option Position</div><div>Value vs. Par</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Capped Floater</div><div style="color:#EF4444;font-weight:700">Short the cap (gives up upside)</div><div>Below par (cap reduces value)</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Floored Floater</div><div style="color:#10B981;font-weight:700">Long the floor (keeps minimum coupon)</div><div>Above par (floor adds value)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Tree valuation:</strong> At each node, apply the cap/floor constraint to the coupon before backward-inducting. If reference rate &gt; cap → coupon = cap rate. If reference rate &lt; floor → coupon = floor rate.</div></div>'},
{title:'Describe defining features of a convertible bond.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #14B8A6"><div class="lo-icon-card-emoji">🔢</div><div class="lo-icon-card-title">Conversion Ratio</div><div class="lo-icon-card-desc">Number of shares received per bond (e.g., 25 shares per $1,000 bond)</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Conversion Price</div><div class="lo-icon-card-desc">Par / conversion ratio = effective price paid per share if converted (e.g., $1,000/25 = $40)</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Conversion Value</div><div class="lo-icon-card-desc">$$\\text{Conv Value} = P_{stock} \\times \\text{Conv Ratio}$$</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Market Conversion Premium</div><div class="lo-icon-card-desc">Bond price − conversion value = premium paid for the conversion privilege</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">Straight Value (Bond Floor)</div><div class="lo-icon-card-desc">Value without conversion option — the bond\'s value purely as a fixed-income instrument</div></div></div>'},
{title:'Calculate and interpret the components of a convertible bond\'s value.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Convertible Bond Value</div><div class="formula-highlight-body">$$V(convertible) = V(straight bond) + V(call option on stock)$$\n$$Minimum value = max(straight value, conversion value)$$\n$$Market conv \\frac{premium}{share} = (Bond \\frac{price}{Conv} ratio) - Stock price$$\n$$Premium payback = Mkt conv premium per \\frac{share}{Coupon - Dividend per share}$$</div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Two floors:</strong> The straight bond value protects against stock decline (bond characteristics still pay). The conversion value protects against missing equity upside. The convertible\'s minimum value = whichever floor is higher.</div></div>'},
{title:'Describe how a convertible bond is valued in an arbitrage-free framework.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">1</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Model Interest Rate Uncertainty</div><div class="lo-step-desc">Interest rates evolve stochastically → affects the bond floor (straight value)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">2</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Model Equity Price Uncertainty</div><div class="lo-step-desc">Stock price evolves stochastically → affects conversion value</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">3</div><div class="lo-step-connector" style="background:#14B8A6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Optimal Exercise at Each Node</div><div class="lo-step-desc">Holder decides: convert to shares (if conversion value &gt; hold value) or continue holding the bond</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#14B8A6">4</div></div><div class="lo-step-body"><div class="lo-step-title">Issuer\'s Call Decision</div><div class="lo-step-desc">If callable-convertible, issuer may force conversion by calling → adds another decision layer</div></div></div></div>'},
{title:'Compare the risk-return characteristics of a convertible bond with those of a straight bond and the underlying common stock.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Stock Price Zone</div><div>Convertible Behavior</div><div>Delta (Equity Sensitivity)</div><div>Analogy</div></div><div class="lo-compare-row lo-compare-4"><div style="color:#10B981;font-weight:700">High (deep in-the-money)</div><div>Tracks the stock closely — equity-like</div><div>High (near 1.0)</div><div>Almost pure equity; bond floor irrelevant</div></div><div class="lo-compare-row lo-compare-4"><div style="color:#F59E0B;font-weight:700">Near conversion price</div><div>Hybrid — captures upside, retains floor</div><div>Moderate (~0.5)</div><div>"Best of both worlds" zone</div></div><div class="lo-compare-row lo-compare-4"><div style="color:#EF4444;font-weight:700">Low (deep out-of-the-money)</div><div>Trades near straight bond value — bond-like</div><div>Low (near 0)</div><div>Almost pure bond; conversion option worthless</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Trade-off:</strong> Lower return than stock in strong rallies (you pay a premium for the floor). Better protection than stock in declines (bond floor catches you). Lower yield than straight bonds (you pay for the equity option through reduced coupon).</div></div>'}
]},

'fi|credit-models':{
quickReview:['Expected loss = PD × LGD × EAD. Credit valuation adjustment (CVA) = PV of expected losses across all periods.','Structural models (Merton): equity = call option on firm assets. Default when assets < liabilities at maturity.','Reduced-form models: default is an exogenous event with a hazard rate. More flexible, can be calibrated to market data.','Credit spread = compensation for expected loss + credit risk premium. Spread = PD × LGD (approximate).','Term structure of credit spreads: typically upward-sloping (longer exposure = more risk), but can invert for distressed issuers.','Securitized debt credit analysis: focus on collateral quality, credit enhancement, waterfall structure, servicer quality — NOT issuer balance sheet.'],
analogy:'Credit analysis is like <em>insurance underwriting</em>. The probability of default (PD) is like the probability of an accident. Loss given default (LGD) is how expensive the claim will be. Exposure at default (EAD) is the policy amount. The credit spread is the insurance premium the market charges. Structural models predict accidents from the driver\'s behavior (firm\'s asset value); reduced-form models use actuarial tables (statistical hazard rates) without looking under the hood.',
los:[
{title:'Explain expected exposure, loss given default, probability of default, and the credit valuation adjustment.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Credit Risk Components</div><div class="formula-highlight-body">$$Expected Loss = PD \\times LGD \\times EAD$$\n$$CVA = \\sum [PD_t \\times LGD \\times EAD_t \\times DF_t] for all periods$$\n$$Fair value of risky bond = Risk-free value - CVA$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🎲</div><div class="lo-icon-card-title">PD (Probability of Default)</div><div class="lo-icon-card-desc">Likelihood of default over a given period. Estimated from ratings, models, or market prices (CDS spreads).</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💔</div><div class="lo-icon-card-title">LGD (Loss Given Default)</div><div class="lo-icon-card-desc">1 − recovery rate. How much you lose when default occurs. Varies by seniority (secured > unsecured).</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📦</div><div class="lo-icon-card-title">EAD (Exposure at Default)</div><div class="lo-icon-card-desc">Amount owed when default occurs. For bonds = par + accrued interest. For revolvers, may include drawn + undrawn.</div></div><div class="lo-icon-card" style="border-top:3px solid #14B8A6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">CVA (Credit Valuation Adj.)</div><div class="lo-icon-card-desc">PV of all expected losses across the bond\'s life. Subtracted from risk-free value to get the fair risky price.</div></div></div>'},
{title:'Explain credit scores and credit ratings.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Tool</div><div>How It Works</div><div>Strength</div><div>Weakness</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Credit Scores (Altman Z)</div><div>Quantitative model using financial ratios → default probability</div><div>Automated, consistent, objective</div><div style="color:#EF4444;font-weight:700">Backward-looking, model-dependent, can\'t capture qualitative factors</div></div><div class="lo-compare-row lo-compare-4"><div>🏛️ Credit Ratings (S&P, Moody\'s)</div><div>Qualitative + quantitative assessment by agency analysts</div><div>Comprehensive, incorporates forward-looking judgment</div><div style="color:#EF4444;font-weight:700">Can lag market signals (CDS spreads move first), potential conflicts of interest</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Investment grade:</strong> BBB−/Baa3 and above. <strong>High yield:</strong> BB+/Ba1 and below. The IG/HY boundary is critical — many institutional mandates prohibit holding HY, so downgrades across this line force selling and amplify spread widening ("fallen angel" effect).</div></div>'},
{title:'Calculate the expected return on a bond given transition in its credit rating.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Expected Return with Rating Transition</div><div class="formula-highlight-body">$$E(Return) = \\sum [Prob_i \\times Return_i] for all possible ratings i$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Transition</div><div>Spread Impact</div><div>Return Impact</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">⬆️ Upgrade</div><div>Spread narrows</div><div>Price rises → positive excess return</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">➡️ No Change</div><div>Spread unchanged</div><div>Earns the coupon yield (carry)</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">⬇️ Downgrade</div><div>Spread widens</div><div>Price falls → lower/negative return</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">💀 Default</div><div>—</div><div>Recovery × face value − purchase price (usually large loss)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Use the rating transition matrix</strong> — it gives the probability of moving from any current rating to every other rating (and default) over 1 year. Weight each return by its probability to get the expected return.</div></div>'},
{title:'Explain structural and reduced-form models of corporate credit risk, including assumptions, strengths, and weaknesses.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>Structural (Merton)</div><div>Reduced-Form (Jarrow-Turnbull)</div><div>Key Difference</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Default Trigger</div><div>Firm value falls below debt at maturity</div><div>Exogenous random event with a hazard rate</div><div>Structural = endogenous; Reduced-form = statistical</div></div><div class="lo-compare-row lo-compare-4"><div>💎 Key Insight</div><div style="color:#10B981;font-weight:700">Equity = call option on firm assets (strike = debt)</div><div>Hazard rate calibrated to market prices (CDS, bonds)</div><div>Structural has economic intuition; RF is more flexible</div></div><div class="lo-compare-row lo-compare-4"><div>✅ Strengths</div><div>Economic intuition, links to firm fundamentals and capital structure</div><div>Flexible, tractable, uses observable market data directly</div><div>—</div></div><div class="lo-compare-row lo-compare-4"><div>❌ Weaknesses</div><div style="color:#EF4444;font-weight:700">Firm value unobservable, assumes simple single debt maturity</div><div style="color:#EF4444;font-weight:700">Less economic intuition — default is a "black box"</div><div>—</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🚗</div><div class="lo-mini-analogy-text">Structural = predicting accidents from the driver\'s behavior (watching the car swerve). Reduced-form = using actuarial tables (statistical hazard rates) without looking under the hood.</div></div>'},
{title:'Calculate the value of a bond and its credit spread, given assumptions about credit risk parameters.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 Risky Bond Valuation</div><div class="formula-highlight-body">$$V(risky) = V(risk-free) - CVA$$\n$$Credit spread \\approx PD \\times LGD (annualized approximation)$$</div><div class="formula-highlight-note">Example: 1-year zero, PD = 2%, recovery = 40%, r_f = 3%.\nLGD = 60%. Expected loss = 2% × 60% = 1.2%.\nCredit spread ≈ 120 bps. Risky yield ≈ 3% + 1.2% = 4.2%.</div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Actual spreads &gt; PD × LGD</strong> because spreads also include a <em>credit risk premium</em> (compensation for bearing systematic default risk) and a <em>liquidity premium</em>. The PD × LGD approximation captures expected loss but not the risk premium for bearing that loss.</div></div>'},
{title:'Interpret changes in a credit spread.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">↑ PD Change</div><div class="lo-icon-card-desc">Deteriorating fundamentals (earnings decline, leverage rise) → spread widens</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💔</div><div class="lo-icon-card-title">↑ LGD Change</div><div class="lo-icon-card-desc">Collateral value declining, more senior debt issued ahead of you → higher loss if default</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🌊</div><div class="lo-icon-card-title">Risk Premium Change</div><div class="lo-icon-card-desc">Market-wide risk aversion shift (systematic). Spread widens even if company is unchanged.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">💧</div><div class="lo-icon-card-title">Liquidity Change</div><div class="lo-icon-card-desc">Less trading activity → wider bid-ask → liquidity premium embedded in spread increases</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Key skill:</strong> Decompose spread changes into fundamental (company-specific PD/LGD) vs. market-driven (systematic risk premium, liquidity). A spread widening during a market sell-off may be a buying opportunity if fundamentals haven\'t changed.</div></div>'},
{title:'Explain the determinants of the term structure of credit spreads and interpret a term structure of credit spreads.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Issuer Type</div><div>Typical Credit Spread Curve Shape</div><div>Why</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Investment Grade</div><div>Upward-sloping</div><div>Longer exposure → more cumulative default risk → higher spread for longer maturities</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">High Yield / Distressed</div><div>Can be flat or INVERTED</div><div>Near-term default risk is so high that short spreads exceed long (if you survive the short term, you\'re probably okay)</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Determinants:</strong> credit quality trend (improving → flatter), macroeconomic outlook, supply/demand at each maturity, liquidity differences across the curve. An inverting credit curve for a previously IG issuer is a strong distress signal.</div></div>'},
{title:'Compare the credit analysis required for securitized debt to the credit analysis of corporate debt.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Focus Area</div><div>Corporate Debt</div><div>Securitized Debt (ABS/MBS/CLO)</div><div>Key Difference</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 Issuer</div><div>Analyze the company: financials, industry, management, cash flows</div><div>Issuer is an SPV with no operations — irrelevant</div><div>Corporate = issuer risk; Securitized = collateral risk</div></div><div class="lo-compare-row lo-compare-4"><div>📦 Collateral</div><div>General assets of the firm (unsecured) or specific collateral</div><div style="color:#10B981;font-weight:700">Pool quality, diversity, performance history — THIS is what matters</div><div>ABS credit is entirely about the pool</div></div><div class="lo-compare-row lo-compare-4"><div>🛡️ Enhancement</div><div>Seniority, covenants</div><div>Subordination, overcollateralization, reserve accounts, excess spread</div><div>Multiple layers of protection in securitized</div></div><div class="lo-compare-row lo-compare-4"><div>💧 Structure</div><div>Simple: one bond, one issuer</div><div style="color:#EF4444;font-weight:700">Complex: waterfall payment priority across tranches, servicer role</div><div>Must understand the waterfall to assess each tranche\'s risk</div></div></div>'}
]},

'fi|cds':{
quickReview:['CDS: buyer pays periodic premium (spread) to seller; seller pays par − recovery if reference entity defaults.','Credit event triggers: bankruptcy, failure to pay, restructuring (varies by market).','CDS pricing: spread reflects PD and LGD. Upfront payment = PV of (market spread − coupon) × duration.','CDS to manage credit: buy protection to hedge bond exposure; sell protection to gain credit exposure without buying bonds.','Basis trade: exploit CDS spread vs. bond spread differences. Negative basis = CDS < bond spread → buy bond + buy CDS protection.'],
analogy:'A CDS is like <em>fire insurance on a house you may or may not own</em>. The protection buyer pays annual premiums; if the house (reference entity) burns down (defaults), the seller pays the claim. You can insure your own house (hedging) or someone else\'s (speculation). The CDS spread is the insurance premium rate — higher for riskier houses. And unlike home insurance, CDS is traded in a market where the "premium" fluctuates daily with perceived fire risk.',
los:[
{title:'Describe credit default swaps (CDS), single-name and index CDS, and the parameters that define a given CDS product.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Parameter</div><div>Description</div><div>Typical Value</div></div><div class="lo-compare-row lo-compare-3"><div>🏢 Reference Entity</div><div>Company or sovereign whose credit risk is transferred</div><div>Any rated entity (e.g., Ford, Republic of Italy)</div></div><div class="lo-compare-row lo-compare-3"><div>📦 Notional Principal</div><div>Face amount of protection (not exchanged)</div><div>$10M–$100M+ per contract</div></div><div class="lo-compare-row lo-compare-3"><div>💰 CDS Spread (Coupon)</div><div>Annual premium paid by buyer in bps</div><div>Standardized at 100 or 500 bps (+ upfront payment)</div></div><div class="lo-compare-row lo-compare-3"><div>📅 Tenor</div><div>Contract length</div><div>5 years (most liquid); 1, 3, 7, 10y also traded</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Settlement</div><div>Physical delivery or cash (via ISDA auction)</div><div>Cash settlement via auction is now standard</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Type</div><div>Coverage</div><div>Use</div></div><div class="lo-compare-row lo-compare-3"><div>👤 Single-Name CDS</div><div>One specific reference entity</div><div>Company-specific hedging or views</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Index CDS (CDX, iTraxx)</div><div>Basket of 100+ reference entities</div><div style="color:#10B981;font-weight:700">Diversified credit exposure, very liquid, macro credit views</div></div></div>'},
{title:'Describe credit events and settlement protocols with respect to CDS.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Credit Event</div><div>Definition</div><div>US Market</div><div>European Market</div></div><div class="lo-compare-row lo-compare-4"><div>💀 Bankruptcy</div><div>Legal insolvency filing</div><div style="color:#10B981;font-weight:700">Included</div><div style="color:#10B981;font-weight:700">Included</div></div><div class="lo-compare-row lo-compare-4"><div>⛔ Failure to Pay</div><div>Missed interest/principal beyond grace period</div><div style="color:#10B981;font-weight:700">Included</div><div style="color:#10B981;font-weight:700">Included</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Restructuring</div><div>Forced change in payment terms (maturity, coupon, currency)</div><div style="color:#EF4444;font-weight:700">Often excluded (XR)</div><div style="color:#10B981;font-weight:700">Included (modified restructuring)</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Settlement</div><div>Mechanics</div><div>Current Practice</div></div><div class="lo-compare-row lo-compare-3"><div>📦 Physical Delivery</div><div>Buyer delivers any deliverable obligation, receives par from seller</div><div>Historical method; "cheapest-to-deliver" issue arises</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Cash Settlement (Auction)</div><div>ISDA conducts auction to determine recovery → buyer receives par − recovery</div><div style="color:#10B981;font-weight:700">Now standard — transparent, market-determined recovery</div></div></div>'},
{title:'Explain the principles underlying and factors that influence the market\'s pricing of CDS.',explanation:'<div class="formula-highlight" style="--active-color:#14B8A6"><div class="formula-highlight-title" style="color:#14B8A6">📐 CDS Pricing</div><div class="formula-highlight-body">$$CDS spread \\approx PD \\times LGD (simplified)$$\n$$\\text{Precise: }PV(premium leg) = PV(protection leg)$$\nUpfront payment (standardized coupons):\n$$Upfront \\approx (Market spread - Coupon) \\times Duration$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🎲</div><div class="lo-icon-card-title">Credit Quality (PD)</div><div class="lo-icon-card-desc">Higher PD → higher CDS spread. Deteriorating fundamentals widen spreads.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💔</div><div class="lo-icon-card-title">Recovery Rate (1−LGD)</div><div class="lo-icon-card-desc">Lower expected recovery → higher LGD → higher spread needed to compensate.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Risk-Free Rates</div><div class="lo-icon-card-desc">Higher rates → lower PV of protection payments → affects pricing mechanics.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🌊</div><div class="lo-icon-card-title">Supply/Demand</div><div class="lo-icon-card-desc">Heavy hedging demand (many bondholders buying protection) can push CDS spreads above bond spreads.</div></div></div>'},
{title:'Describe the use of CDS to manage credit exposures and to express views regarding changes in the shape and/or level of the credit curve.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Strategy</div><div>CDS Position</div><div>Profit When</div><div>Use Case</div></div><div class="lo-compare-row lo-compare-4"><div>🛡️ Hedge Bond</div><div>Buy protection</div><div>Default occurs or spreads widen (offsets bond loss)</div><div>Bondholder wants to remove credit risk while keeping the bond</div></div><div class="lo-compare-row lo-compare-4"><div>📉 Short Credit</div><div>Buy protection (naked)</div><div>Spreads widen or default (profit without owning the bond)</div><div>Speculative bet on credit deterioration</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Long Credit</div><div>Sell protection</div><div>Spreads narrow (earn premium income + capital gain)</div><div>Gain credit exposure without buying bonds — synthetic long</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Curve Steepener</div><div>Buy short-dated protection + sell long-dated</div><div>Short-term spreads widen more than long-term</div><div>Bet that near-term risk is underpriced vs. long-term</div></div><div class="lo-compare-row lo-compare-4"><div>📏 Curve Flattener</div><div>Sell short-dated protection + buy long-dated</div><div>Long-term spreads widen more than short-term</div><div>Bet that long-term risk is underpriced</div></div></div>'},
{title:'Describe the use of CDS to take advantage of valuation disparities among separate markets.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Strategy</div><div>How It Works</div><div>When to Use</div></div><div class="lo-compare-row lo-compare-3"><div>➖ Negative Basis Trade</div><div>Buy bond + buy CDS protection. Net position ≈ risk-free + positive carry.</div><div style="color:#10B981;font-weight:700">CDS spread &lt; bond spread → locked-in arbitrage-like profit with credit hedged</div></div><div class="lo-compare-row lo-compare-3"><div>➕ Positive Basis Trade</div><div>Sell bond (or short) + sell CDS protection. Earn the basis.</div><div>CDS spread &gt; bond spread → more complex, funding-dependent</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Capital Structure Arb</div><div>CDS on debt + equity position to exploit debt-equity pricing mismatch</div><div>CDS implies higher PD than equity price suggests → buy protection + buy equity (bet on convergence)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Basis trades are not risk-free:</strong> Negative basis can widen further before converging (mark-to-market losses), funding costs may change, and the bond may have different terms than the CDS deliverable obligations. These are convergence trades, not true arbitrage.</div></div>'}
]},
