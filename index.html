'pm|econ-markets':{
quickReview:['Market values change via 3 channels: (1) default-free rates, (2) expected cash flow timing/magnitude, (3) risk premiums.','Expectations AND changes in expectations drive prices. Anticipated events are already priced; only surprises move markets.','Higher long-run GDP growth → higher equilibrium real short-term rates. Higher growth volatility → higher risk premiums.','Business cycle effects: expansion → rising short rates, flatter curve, tighter credit spreads. Recession → opposite.','Break-even inflation (BEI) = nominal yield − TIPS yield. Affected by inflation expectations + inflation risk premium + liquidity premium.','Equity risk premium linked to consumption hedging: equities that pay off when consumption is low are more valuable → lower ERP.','Cyclical effects on multiples: P/Es expand in early recovery (expectations improve before earnings), compress in late cycle.'],
analogy:'Economics and investment markets are like <em>weather and agriculture</em>. The business cycle is the season — spring (early recovery) brings hope and planting (rising multiples on low earnings). Summer (expansion) is the harvest — earnings boom but expectations are already high. Autumn (late cycle) brings the first chill — rates rise, spreads widen, the market senses winter. And winter (recession) clears the field for next year\'s planting. The key insight: <em>you don\'t profit from the weather itself, but from correctly predicting how it will change</em>.',
los:[
{title:'Explain the notion that economic factors must affect default-free rates, expected cash flows, or risk premiums to affect market values.',explanation:'<p>All asset price changes trace back to three fundamental channels:</p><div class="formula-box"><span class="label">Three Channels of Value Impact</span>V = Σ E(CF_t) / (1 + r_f + RP)^t\n\n1. Default-free interest rates (r_f):\n   Central bank policy, inflation expectations, real growth\n   → Affects discount rate for ALL assets\n\n2. Expected cash flows E(CF):\n   Earnings, dividends, coupons, rents\n   → Affected by economic growth, sector trends, company-specific\n\n3. Risk premiums (RP):\n   Credit spread, equity risk premium, liquidity premium\n   → Affected by uncertainty, risk appetite, volatility</div><p>An economic factor that doesn\'t change any of these three channels has NO effect on asset prices — no matter how dramatic the headline.</p>'},
{title:'Explain the role of expectations and changes in expectations in market valuation.',explanation:'<p>Markets are forward-looking — <strong>current prices already reflect consensus expectations</strong>. Only <em>surprises</em> (changes in expectations) move prices.</p><p>Example: if the market expects 3% GDP growth and it comes in at 3% → no price reaction. If it comes in at 4% → positive surprise → prices adjust. The magnitude of the price move depends on how much the surprise changes the three channels (rates, cash flows, risk premiums).</p><p>This is why a company can report "good earnings" and see its stock fall — if the market expected even better. Valuation is about the gap between reality and expectations, not reality alone.</p>'},
{title:'Explain the relationship between long-term economic growth rate, growth volatility, and average real short-term interest rates.',explanation:'<p><strong>Higher trend growth → higher equilibrium real rates.</strong> In a fast-growing economy, the return on investment is higher → investors demand higher rates on safe assets (why accept 1% risk-free when the economy grows at 4%?).</p><p><strong>Higher growth volatility → higher real rates</strong> (through a precautionary savings channel — but this is debated) AND <strong>higher risk premiums</strong> (more uncertainty → investors demand more compensation for bearing risk).</p><p>This framework helps explain cross-country differences: fast-growing, volatile emerging markets tend to have higher real rates and risk premiums than stable, slow-growing developed markets.</p>'},
{title:'Explain how the phase of the business cycle affects policy and short-term rates, the slope of the term structure, and relative bond performance.',explanation:'<div class="formula-box"><span class="label">Business Cycle & Fixed Income</span>EARLY EXPANSION:\n  Policy: accommodative (low rates). Curve: steep (short low, long rising)\n  → Long bonds outperform (riding steep curve)\n\nLATE EXPANSION:\n  Policy: tightening (raising rates). Curve: flattening\n  → Short bonds outperform (less rate sensitivity)\n\nRECESSION:\n  Policy: easing (cutting rates). Curve: steepening\n  → Long bonds rally hard (rates falling + flight to quality)\n\nKey: the CHANGE in policy matters most for returns,\nnot the level. Anticipate the pivot.</div>'},
{title:'Describe the factors that affect yield spreads between non-inflation-adjusted and inflation-indexed bonds.',explanation:'<div class="formula-box"><span class="label">Break-Even Inflation (BEI)</span>BEI = Nominal yield − TIPS (real) yield\n\nBEI ≈ Expected inflation + Inflation risk premium − Liquidity premium\n\nExpected inflation: core driver\nInflation risk premium: compensation for inflation uncertainty\n  (positive — investors dislike inflation surprises)\nLiquidity premium: TIPS are less liquid than nominals\n  → TIPS yield slightly higher → BEI slightly understates\n  expected inflation</div><p>Changes in BEI reflect shifts in inflation expectations AND/OR changes in the inflation risk premium — distinguishing the two requires additional analysis.</p>'},
{title:'Explain how the phase of the business cycle affects credit spreads and performance of credit-sensitive instruments.',explanation:'<p><strong>Expansion:</strong> improving fundamentals → falling default rates → credit spreads tighten → credit bonds outperform Treasuries. Investment-grade and high-yield both benefit, but HY benefits more (higher spread = more compression potential).</p><p><strong>Late cycle/recession:</strong> deteriorating fundamentals → rising defaults → spreads widen → credit bonds underperform. HY suffers most. Flight to quality into Treasuries.</p><p>Credit spreads are <strong>countercyclical</strong>: tightest at cycle peaks (when risk is actually highest), widest at troughs (when forward returns are best). This creates a value opportunity for contrarian credit investors willing to buy during maximum fear.</p>'},
{title:'Explain how the characteristics of markets for a company\'s products affect credit quality.',explanation:'<p>A company\'s credit quality depends on the stability and profitability of its product markets:</p><p><strong>Favorable for credit:</strong> stable demand (essential goods, utilities), high barriers to entry (patents, regulation, network effects), pricing power (strong brand, limited substitutes), diversified customer base, long-term contracts.</p><p><strong>Unfavorable for credit:</strong> cyclical demand (autos, construction), commoditized products (price competition), rapid technological change (obsolescence risk), concentrated customers, short-term/spot contracts.</p><p>Credit analysts assess "business risk" through this lens — a company with stable product market characteristics can support more leverage than one with volatile, competitive markets.</p>'},
{title:'Explain the relationship between consumption hedging properties of equity and the equity risk premium.',explanation:'<p>The <span class="key-term">consumption CAPM</span> framework: assets that pay off when consumption is already high (good times) are less valuable than assets that pay off when consumption is low (bad times).</p><p>Equities generally do well when the economy is strong (consumption high) and poorly in recessions (consumption low). This means equities are <strong>poor consumption hedges</strong> — they fail precisely when investors need money most. Investors demand a high equity risk premium as compensation.</p><p>Defensive stocks (utilities, staples) are better consumption hedges → lower required return. Cyclical stocks are worse → higher required return. The ERP reflects this aggregate consumption risk.</p>'},
{title:'Explain how the phase of the business cycle affects short-term and long-term earnings growth expectations.',explanation:'<p><strong>Early recovery:</strong> short-term earnings growth expectations surge (low base, operating leverage). Long-term expectations improve moderately. Biggest gap between short-term (high) and long-term (modest) growth.</p><p><strong>Mid-expansion:</strong> short-term expectations normalize as the base rises. Long-term expectations stable or slightly optimistic.</p><p><strong>Late cycle:</strong> short-term expectations may still be positive but decelerating. Long-term expectations start declining (margin pressure, rate headwinds).</p><p><strong>Recession:</strong> short-term expectations collapse. But long-term expectations may actually stabilize or improve (looking through the trough to recovery).</p><p>Stock prices respond most to changes in <em>long-term</em> growth expectations — these drive the terminal value component that dominates DCF models.</p>'},
{title:'Describe cyclical effects on valuation multiples.',explanation:'<p>P/E ratios are <strong>countercyclical</strong>: highest when earnings are lowest (recession troughs), lowest when earnings peak (cycle tops).</p><p>This seems paradoxical but makes sense: at the trough, the market looks forward to recovery → prices are supported by expected future earnings, but current E is depressed → high P/E. At the peak, the market anticipates decline → prices moderate, but current E is elevated → low P/E.</p><p><strong>Implication:</strong> using current P/E to assess "cheapness" is misleading through the cycle. A low P/E at the cycle peak may signal overvaluation (earnings about to fall). A high P/E at the trough may signal undervaluation (earnings about to recover). Use normalized or cyclically-adjusted earnings (Shiller CAPE) for better cross-cycle comparisons.</p>'},
{title:'Describe the economic factors affecting investment in commercial real estate.',explanation:'<p>Commercial RE is driven by:</p><p><strong>Demand side:</strong> GDP growth (drives space demand), employment growth (especially for office), consumer spending (retail), trade volume (industrial/logistics), population/household formation (multifamily).</p><p><strong>Supply side:</strong> construction pipeline, zoning/permits, construction costs, land availability. Supply is slow to respond (2-3 year lag) → creates boom-bust cycles.</p><p><strong>Capital markets:</strong> interest rates (cap rates track long-term rates with a spread), credit availability (lending standards), investor risk appetite, foreign capital flows.</p><p><strong>Inflation:</strong> RE is a partial inflation hedge — rents adjust over time, but with a lag (depending on lease length). Short-lease properties (multifamily, hotels) hedge inflation faster than long-lease (office).</p>'}
]},

'pm|active-mgmt':{
quickReview:['Value added = active return = R_portfolio − R_benchmark. Information ratio = active return / active risk (tracking error).','IR vs. Sharpe: Sharpe measures total risk-adjusted return; IR measures skill at generating active return per unit of active risk.','Fundamental law: E(R_A) = TC × IC × √BR × σ_A. Transfer coefficient, info coefficient, breadth, aggressiveness.','IC = correlation between forecasts and actual outcomes. BR = number of independent bets. TC = ability to implement (constraints reduce TC).','Market timing: few large bets (low BR, need high IC). Security selection: many small bets (high BR, lower IC needed).','Limitations: assumes independent bets (often correlated), IC hard to measure, constraints reduce TC below 1.'],
analogy:'Active management is like <em>target shooting</em>. The information ratio is your score per round — accuracy (active return) divided by consistency (tracking error). The fundamental law says your total score depends on: aim quality (IC — how good is your research?), number of shots (BR — how many independent bets?), steadiness (TC — do constraints shake your hand?), and willingness to bet big (σ_A — aggressiveness). A great shooter with few shots can match a mediocre shooter with many — that\'s the IC-BR trade-off.',
los:[
{title:'Describe how value added by active management is measured.',explanation:'<div class="formula-box"><span class="label">Measuring Active Value Added</span>Active return = R_P − R_B (portfolio return − benchmark return)\n\nValue added is assessed over time:\n  Average active return (mean alpha)\n  Consistency of alpha (information ratio)\n  Attribution: how much from security selection vs. allocation?\n\nGross vs. net: always evaluate after fees and transaction costs\n  Many managers show positive gross alpha but negative net alpha</div>'},
{title:'Calculate and interpret the information ratio (ex post and ex ante) and contrast it to the Sharpe ratio.',explanation:'<div class="formula-box"><span class="label">Information Ratio vs. Sharpe Ratio</span>Information Ratio (IR) = mean active return / tracking error\n  Ex post: IR = R̄_A / σ(R_A)   [realized]\n  Ex ante: IR = E(R_A) / σ_A   [expected]\n\nSharpe Ratio = (R̄_P − R_f) / σ_P\n\nKey differences:\n  Sharpe: total return vs. risk-free, total risk\n  IR: active return vs. benchmark, active risk\n\nRelationship: SR²_P = SR²_B + IR²\n  → A positive IR always improves the Sharpe ratio\n  → The higher the benchmark Sharpe, the harder to improve it</div>'},
{title:'Describe and interpret the fundamental law of active portfolio management, including its component terms.',explanation:'<div class="formula-box"><span class="label">Fundamental Law of Active Management</span>E(R_A) = TC × IC × √BR × σ_A\n\nTC = Transfer Coefficient (0 to 1)\n  How well can you implement your insights?\n  TC = 1 if unconstrained; <1 with long-only, sector limits, etc.\n\nIC = Information Coefficient\n  Correlation between forecasted and actual returns\n  IC = 0.05 to 0.15 is excellent for most managers\n\nBR = Breadth\n  Number of independent forecasting "bets" per year\n\nσ_A = Active Risk (aggressiveness)\n  How much tracking error the manager takes\n\nOptimal IR* = TC × IC × √BR</div>'},
{title:'Explain how the IR may be useful in investment manager selection and choosing the level of active portfolio risk.',explanation:'<p><strong>Manager selection:</strong> IR is the single best measure of active management skill — it normalizes alpha by the risk taken to achieve it. An IR of 0.5 is good; above 0.75 is excellent; above 1.0 is exceptional (and rare).</p><p><strong>Choosing active risk level:</strong> once you\'ve selected a manager with a given IR, the optimal active risk depends on: (1) the benchmark Sharpe ratio (higher → less room to add value), (2) the investor\'s risk aversion, (3) portfolio constraints. More active risk amplifies both alpha AND tracking error — the IR tells you the expected ratio.</p><p>Combining multiple managers: if their active returns are uncorrelated, the combined portfolio\'s IR = √(Σ IR²ᵢ) — diversification of active bets improves the overall IR.</p>'},
{title:'Compare active management strategies, including market timing and security selection, and evaluate strategy changes using the fundamental law.',explanation:'<div class="formula-box"><span class="label">Strategy Comparison via Fundamental Law</span>Market Timing:\n  Few bets (BR low, e.g., 12/year for monthly calls)\n  Must have high IC to compensate → very hard\n  IC needed for IR=0.5: IC = 0.5/√12 ≈ 0.14 (extremely high)\n\nSecurity Selection:\n  Many bets (BR high, e.g., 100+ stock picks/year)\n  Can have lower IC per bet → more achievable\n  IC needed for IR=0.5: IC = 0.5/√100 = 0.05 (modest)\n\n→ Security selection is generally more achievable than timing\n→ Combining both can improve BR if bets are independent</div>'},
{title:'Describe the practical strengths and limitations of the fundamental law.',explanation:'<p><strong>Strengths:</strong> provides a clear framework linking skill (IC), opportunity (BR), implementation (TC), and risk appetite (σ_A) to expected performance. Helps diagnose why a strategy works or fails. Guides decisions about constraints, diversification, and manager combination.</p><p><strong>Limitations:</strong> assumes bets are independent (in practice, stock picks within a sector are correlated → effective BR is lower than raw count). IC is hard to measure ex ante and unstable over time. TC is difficult to estimate precisely. The square root of BR means adding bets has diminishing returns. The model is single-period and doesn\'t capture path-dependent effects. And it assumes normally distributed active returns (ignoring tail risk).</p>'}
]},

'pm|etf':{
quickReview:['Creation/redemption: authorized participants (APs) exchange baskets of underlying securities for ETF shares. Keeps price ≈ NAV.','In-kind creation: AP delivers stocks → receives ETF shares. Avoids taxable events (tax advantage over mutual funds).','Tracking error sources: fees, sampling (not holding all index constituents), cash drag, rebalancing lag, securities lending income (can reduce TE).','Bid-ask spread: determined by underlying spread, creation/redemption costs, AP competition, volatility, ETF trading volume.','Premium/discount: ETF price vs. NAV. Persistent premiums/discounts signal AP mechanism issues (illiquid underlyings, market stress).','ETF risks: counterparty (synthetic ETFs), liquidity (underlying vs. ETF), concentration, closure, tracking.','Portfolio uses: core exposure, tactical tilts, transition management, cash equitization, completion portfolios, alternatives access.'],
analogy:'An ETF is like a <em>warehouse club membership card</em>. The card (ETF share) represents ownership of a diversified basket of goods (securities) stored in the warehouse. Authorized participants are the wholesale dealers who can enter the warehouse, assemble baskets of goods, and exchange them for cards (creation) — or return cards to get baskets back (redemption). This constant arbitrage keeps the card\'s trading price close to the actual value of what\'s in the warehouse.',
los:[
{title:'Explain the creation/redemption process of ETFs and the function of authorized participants.',explanation:'<div class="formula-box"><span class="label">Creation/Redemption Process</span>CREATION (when ETF trades at premium to NAV):\n  AP buys underlying securities in the market\n  AP delivers basket to ETF issuer\n  ETF issuer creates new ETF shares → gives to AP\n  AP sells ETF shares → premium narrows\n\nREDEMPTION (when ETF trades at discount to NAV):\n  AP buys ETF shares in the market\n  AP returns ETF shares to issuer\n  Issuer delivers underlying securities → to AP\n  AP sells securities → discount narrows\n\nKey: process is IN-KIND (securities, not cash)\n  → No taxable event for the fund → tax efficiency</div>'},
{title:'Describe how ETFs are traded in secondary markets.',explanation:'<p>ETFs trade on exchanges like stocks — continuously throughout the day at market-determined prices. This contrasts with mutual funds (priced once daily at NAV). ETF prices are determined by supply/demand in the secondary market, but arbitrage from APs keeps prices close to NAV.</p><p>Liquidity has two layers: (1) <strong>on-screen liquidity</strong> — the visible order book and trading volume of the ETF itself. (2) <strong>implied liquidity</strong> — the liquidity of the underlying securities (accessible via creation/redemption). An ETF can be more liquid than it appears if its underlyings are liquid.</p>'},
{title:'Describe sources of tracking error for ETFs.',explanation:'<p>Tracking error = standard deviation of (ETF return − index return). Sources:</p><p><strong>Fees and expenses:</strong> drag return below the index (largest and most predictable source).</p><p><strong>Sampling/optimization:</strong> some ETFs don\'t hold all index constituents (especially bond ETFs with thousands of issues) → return deviates from index.</p><p><strong>Cash drag:</strong> dividends received but not immediately reinvested; cash held for redemptions.</p><p><strong>Rebalancing:</strong> timing differences between index and fund rebalancing. Transaction costs during rebalancing.</p><p><strong>Securities lending:</strong> can <em>reduce</em> tracking error by generating income that offsets fees.</p><p><strong>Fair value pricing:</strong> for international ETFs, stale prices of underlying securities in different time zones.</p>'},
{title:'Describe factors affecting ETF bid-ask spreads.',explanation:'<p>The ETF bid-ask spread reflects the <strong>cost of creating/redeeming</strong> plus a profit margin for market makers:</p><p><strong>Narrower spreads:</strong> highly liquid underlyings (S&P 500 ETF), high ETF trading volume, strong AP competition, low volatility, large fund size.</p><p><strong>Wider spreads:</strong> illiquid underlyings (EM bonds, small-cap), low ETF volume, few APs, high volatility, market stress, time zone mismatches (international ETFs during US hours).</p><p>The spread is a cost to investors — for large trades, compare the total cost (spread + market impact) to the creation/redemption cost to determine the cheapest execution method.</p>'},
{title:'Describe sources of ETF premiums and discounts to NAV.',explanation:'<p><strong>Premiums</strong> (price > NAV): strong demand for ETF shares, APs unable to create shares quickly enough (market stress, illiquid underlyings), stale NAV for international ETFs trading after foreign market close.</p><p><strong>Discounts</strong> (price < NAV): selling pressure, redemption mechanism impaired, market stress (APs widen spreads to protect themselves), underlying securities hard to sell.</p><p>Small premiums/discounts (a few bps) are normal and transient. Persistent or large premiums/discounts (>1%) signal structural issues — either the underlying market is illiquid or the AP mechanism is stressed. During the March 2020 crisis, many bond ETFs traded at significant discounts as the underlying bond market froze.</p>'},
{title:'Describe costs of owning an ETF.',explanation:'<div class="formula-box"><span class="label">Total Cost of ETF Ownership</span>Explicit costs:\n  Management fee (expense ratio): 0.03% to 0.75%+\n  Trading commissions (now mostly zero for retail)\n  Bid-ask spread (per round-trip trade)\n\nImplicit costs:\n  Tracking error (deviation from index return)\n  Premium/discount (buying at premium = overpaying)\n  Market impact (for large trades)\n\nHolding period matters:\n  Short-term: trading costs dominate (spread matters most)\n  Long-term: expense ratio dominates (compounds over years)\n\n→ Low-expense ETFs favor long holders\n→ Tight-spread ETFs favor frequent traders</div>'},
{title:'Describe types of ETF risk.',explanation:'<p><strong>Tracking risk:</strong> returns deviate from the target index. <strong>Counterparty risk:</strong> synthetic ETFs use swaps — if the counterparty defaults, the ETF may not deliver index returns. <strong>Liquidity risk:</strong> illiquid underlyings can impair creation/redemption, leading to wide spreads and discounts. <strong>Concentration risk:</strong> sector or single-country ETFs concentrate risk. <strong>Closure risk:</strong> small ETFs may close, forcing liquidation (usually at NAV but with potential tax consequences and reinvestment hassle). <strong>Regulatory risk:</strong> changes in tax treatment, fund structure rules, or short-selling restrictions can affect ETF functionality.</p>'},
{title:'Identify and describe portfolio uses of ETFs.',explanation:'<p>ETFs serve many portfolio construction roles:</p><p><strong>Core exposure:</strong> broad market beta at ultra-low cost (S&P 500, total bond market). <strong>Tactical tilts:</strong> overweight/underweight sectors, countries, or factors based on views. <strong>Cash equitization:</strong> invest cash inflows immediately into market ETFs while selecting individual securities. <strong>Transition management:</strong> bridge between old and new portfolio allocations during manager changes. <strong>Completion portfolios:</strong> fill gaps in an active manager\'s style or sector exposure. <strong>Rebalancing:</strong> efficiently adjust allocations. <strong>Liquidity sleeve:</strong> hold liquid ETFs alongside illiquid alternatives for near-term spending needs. <strong>Alternatives access:</strong> commodity, real estate, and factor exposure without direct investment.</p>'}
]},

'pm|multifactor':{
quickReview:['APT: expected return = risk-free + Σ(factor sensitivity × factor risk premium). No assumption about market portfolio.','Arbitrage opportunity: portfolio with zero cost, zero risk, positive return. Exists when APT pricing is violated.','Factor models: macroeconomic (GDP, inflation surprises), fundamental (P/B, size, momentum), statistical (PCA-derived).','Uses: risk decomposition, performance attribution, portfolio construction, risk budgeting.','Active risk = Σ(active factor exposures × factor volatilities) + security-specific risk. Tracking error ∝ active factor bets.','Multiple risk dimensions: size, value, momentum, quality, volatility — investors rewarded for bearing systematic risks.'],
analogy:'Multifactor models are like <em>nutrition labels for investments</em>. Instead of just saying "this food has 200 calories" (CAPM — one factor: market), the label breaks it down: protein (value), carbs (growth), fat (size), fiber (quality), vitamins (momentum). Two foods with the same calories can have very different nutritional profiles — and two portfolios with the same expected return can have very different risk exposures. The factor model reveals the hidden "ingredients" of return.',
los:[
{title:'Describe arbitrage pricing theory (APT), including its assumptions and its relation to multifactor models.',explanation:'<div class="formula-box"><span class="label">Arbitrage Pricing Theory</span>E(R_i) = r_f + β_{i,1}×λ₁ + β_{i,2}×λ₂ + ... + β_{i,k}×λ_k\n\nβ_{i,j} = asset i\'s sensitivity to factor j\nλ_j = risk premium for factor j\n\nAssumptions:\n  1. Returns driven by a factor model\n  2. Idiosyncratic risk can be diversified away\n  3. No arbitrage opportunities persist\n  (Does NOT require: market portfolio, utility assumptions, normality)\n\nRelation to CAPM: CAPM is a special case of APT with one factor</div>'},
{title:'Define arbitrage opportunity and determine whether one exists.',explanation:'<p>An <span class="key-term">arbitrage opportunity</span> is a portfolio with: (1) zero net investment, (2) zero systematic risk, (3) positive expected return. Under APT, if a well-diversified portfolio\'s expected return doesn\'t match the factor model\'s prediction, an arbitrage exists.</p><p>Test: construct a portfolio long the "cheap" asset and short a combination of the factor portfolios that replicates its risk exposures. If the net return is positive with zero risk → arbitrage. Market participants exploit this → prices adjust → arbitrage disappears.</p>'},
{title:'Calculate the expected return on an asset given factor sensitivities and factor risk premiums.',explanation:'<div class="formula-box"><span class="label">APT Return Calculation</span>E(R) = r_f + β₁×λ₁ + β₂×λ₂ + β₃×λ₃\n\nExample: r_f=3%, β_GDP=1.2, β_inflation=−0.5, β_credit=0.8\n  λ_GDP=4%, λ_inflation=2%, λ_credit=3%\n\nE(R) = 3% + 1.2(4%) + (−0.5)(2%) + 0.8(3%)\n     = 3% + 4.8% − 1.0% + 2.4% = 9.2%</div><p>The asset is compensated for each systematic risk it bears. Negative beta on inflation → benefits from inflation surprises → gives up some return.</p>'},
{title:'Describe and compare macroeconomic, fundamental, and statistical factor models.',explanation:'<div class="formula-box"><span class="label">Factor Model Types</span>MACROECONOMIC:\n  Factors: GDP surprise, inflation surprise, interest rate changes\n  Sensitivities estimated via regression\n  Intuitive, but few factors and noisy estimation\n\nFUNDAMENTAL:\n  Factors: P/B, market cap, earnings yield, momentum\n  Sensitivities = asset attributes (observable)\n  Cross-sectional regression: returns ~ attributes\n  Most used in practice (Barra, Axioma)\n\nSTATISTICAL:\n  Factors extracted via PCA from return covariance matrix\n  Factors have no economic interpretation\n  Purely data-driven, excellent for risk models\n  Hard to use for intuitive portfolio construction</div>'},
{title:'Describe uses of multifactor models and interpret the output of analyses based on multifactor models.',explanation:'<p><strong>Risk decomposition:</strong> break portfolio risk into factor contributions (how much risk comes from value tilt vs. size tilt vs. idiosyncratic?). <strong>Performance attribution:</strong> decompose active return into factor allocation effects vs. stock selection. <strong>Portfolio construction:</strong> target specific factor exposures (e.g., overweight momentum, neutral on size). <strong>Risk budgeting:</strong> allocate risk budget across factors and managers.</p><p>Output interpretation: factor exposure reports show βᵢ to each factor. Active factor exposures = portfolio β − benchmark β. Large active exposures explain most of the tracking error. Security-specific (idiosyncratic) risk is the unexplained remainder — reducible by diversification.</p>'},
{title:'Describe the potential benefits of considering multiple risk dimensions when modeling asset returns.',explanation:'<p>A single factor (market beta) misses important risk-return dimensions: <strong>size</strong> (small caps earn a premium), <strong>value</strong> (cheap stocks outperform over time), <strong>momentum</strong> (recent winners continue winning), <strong>quality</strong> (profitable, stable companies command a premium), <strong>low volatility</strong> (low-vol stocks earn more than CAPM predicts).</p><p>Benefits of multi-dimensional modeling: better risk measurement (explains more return variance), smarter diversification (diversify across factor exposures, not just assets), improved performance attribution (distinguish skill from factor tilts), more precise risk budgeting, and avoidance of unintended factor bets.</p>'},
{title:'Explain sources of active risk and interpret tracking risk and the information ratio.',explanation:'<div class="formula-box"><span class="label">Active Risk Decomposition</span>Active risk² = Σ(active factor exposure² × factor variance)\n              + active specific risk²\n\nActive factor exposure = portfolio β − benchmark β\nActive specific risk = from over/underweight individual securities\n\nTracking error (TE) = σ(R_P − R_B) = active risk\n  Measures dispersion of active returns around zero\n  TE of 2% → ~68% chance active return is within ±2%\n\nInformation ratio = active return / TE\n  Measures active return per unit of active risk taken</div><p>Most active risk typically comes from factor bets, not stock selection — which is why factor-aware portfolio construction is essential.</p>'}
]},

'pm|market-risk':{
quickReview:['VaR: maximum expected loss at a given confidence level over a given horizon. "5% VaR of $1M" = 5% chance of losing ≥$1M.','Parametric VaR = z_α × σ × √t × portfolio value. Assumes normal distribution. Quick but misses fat tails.','Historical simulation: rank past returns, pick the percentile. No distribution assumption but assumes past = future.','Monte Carlo: simulate thousands of scenarios from a model. Most flexible but computationally intensive and model-dependent.','VaR limitations: doesn\'t measure tail severity (use CVaR/ES), not subadditive (VaR of combined portfolio can exceed sum).','Sensitivity measures: duration, beta, delta, gamma. Scenario analysis: stress test specific events (2008 crisis, rate spike).','Risk constraints: risk budgets, position limits, scenario limits, stop-loss limits. Capital allocation uses RAROC.'],
analogy:'VaR is like a <em>weather forecast that says "there\'s a 5% chance of rain exceeding 2 inches"</em>. It tells you the threshold but NOT how bad the storm could be if it does rain that much — it could be 2.1 inches or a catastrophic flood. Conditional VaR (CVaR) answers the missing question: "If it does rain that much, what\'s the average rainfall?" That\'s why risk managers need both: VaR sets the alarm threshold, CVaR estimates the damage if the alarm goes off.',
los:[
{title:'Explain the use of value at risk (VaR) in measuring portfolio risk.',explanation:'<div class="formula-box"><span class="label">Value at Risk (VaR)</span>VaR = minimum loss at a given confidence level over a given horizon\n\n"1-day 5% VaR = $2M" means:\n  There is a 5% probability of losing $2M or more in one day\n  (Or: 95% confident the loss won\'t exceed $2M)\n\nThree parameters:\n  1. Confidence level (typically 95% or 99%)\n  2. Time horizon (1 day for trading, 1 month for risk reporting)\n  3. Currency/unit of measurement\n\nUse: risk reporting, limit setting, capital allocation, regulatory compliance (Basel)</div>'},
{title:'Compare the parametric, historical simulation, and Monte Carlo methods for estimating VaR.',explanation:'<div class="formula-box"><span class="label">VaR Estimation Methods</span>PARAMETRIC (variance-covariance):\n  VaR = z_α × σ_P × √t × V\n  Assumes: normal distribution, linear exposures\n  Fast, analytical. Fails for: options, fat tails\n\nHISTORICAL SIMULATION:\n  Rank historical portfolio returns, find percentile\n  No distribution assumption\n  Relies on past being representative of future\n\nMONTE CARLO:\n  Simulate thousands of price paths from statistical model\n  Most flexible — handles non-linear, non-normal\n  Computationally expensive, model-dependent</div>'},
{title:'Estimate and interpret VaR under the parametric, historical simulation, and Monte Carlo methods.',explanation:'<p><strong>Parametric example:</strong> σ_daily = 1.5%, portfolio = $100M, 95% confidence → VaR = 1.645 × 1.5% × $100M = $2.47M. Scale to 10-day: $2.47M × √10 = $7.80M.</p><p><strong>Historical:</strong> 500 days of returns, sorted. 5% VaR = the 25th worst day\'s loss applied to current portfolio value.</p><p><strong>Monte Carlo:</strong> simulate 10,000 portfolio return scenarios from a model. Sort simulated P&L. 5% VaR = the 500th worst outcome.</p><p>Interpretation is the same regardless of method: "We are X% confident the loss will not exceed VaR over the stated horizon."</p>'},
{title:'Describe advantages and limitations of VaR.',explanation:'<p><strong>Advantages:</strong> intuitive single number, comparable across portfolios and asset classes, widely understood by non-quants (boards, regulators), basis for regulatory capital (Basel).</p><p><strong>Limitations:</strong> doesn\'t measure tail severity (only the threshold), not subadditive (VaR of A+B can exceed VaR(A) + VaR(B) — violates a "coherent risk measure" property), confidence level is arbitrary, backward-looking inputs may miss regime changes, assumes static portfolio (no trading during the horizon).</p>'},
{title:'Describe extensions of VaR.',explanation:'<p><strong>Conditional VaR (CVaR / Expected Shortfall):</strong> the average loss GIVEN that VaR is exceeded. Measures tail severity. Subadditive → coherent risk measure. Example: if 5% VaR = $2M and CVaR = $3.5M, when losses exceed $2M, they average $3.5M.</p><p><strong>Incremental VaR:</strong> change in portfolio VaR from adding a position. Used for position-level risk budgeting.</p><p><strong>Marginal VaR:</strong> sensitivity of VaR to a small change in position size. Guides optimal risk allocation.</p><p><strong>Relative VaR / Ex-ante tracking error:</strong> VaR of the active return (portfolio − benchmark). Used for active risk budgeting.</p>'},
{title:'Describe sensitivity risk measures and scenario risk measures and compare to VaR.',explanation:'<p><strong>Sensitivity measures:</strong> duration (bond price sensitivity to yields), beta (equity sensitivity to market), delta/gamma (option sensitivity to underlying). Advantages: intuitive, quick, asset-class specific. Limitations: local (small changes only), single-factor, don\'t aggregate across asset classes easily.</p><p><strong>Scenario measures:</strong> estimate portfolio loss under specific scenarios (historical: "what if 2008 repeats?" or hypothetical: "what if rates rise 200bps while credit spreads widen 100bps?"). Advantages: capture non-linear effects, tail risks, multiple simultaneous moves. Limitations: scenario selection is subjective, infinite possible scenarios.</p><p><strong>Vs. VaR:</strong> VaR is probabilistic and aggregate but misses tails. Sensitivity measures are precise but narrow. Scenarios capture extreme events but are cherry-picked. Use all three as complements.</p>'},
{title:'Demonstrate how equity, fixed-income, and options exposure measures may be used in measuring and managing market risk and volatility risk.',explanation:'<p><strong>Equity:</strong> beta measures systematic exposure. Factor exposures (size, value, momentum) provide granular risk mapping. Stress test with historical drawdowns (2008: −50%, COVID: −34%).</p><p><strong>Fixed income:</strong> duration (parallel shift), key rate durations (non-parallel), DV01 (dollar value of 1bp). Convexity captures second-order effects. Spread duration for credit risk.</p><p><strong>Options:</strong> delta (directional exposure), gamma (convexity/non-linearity), vega (volatility exposure), theta (time decay). Greeks aggregate across the portfolio to give net exposures.</p><p>Integration: convert all exposures to a common risk currency (VaR dollars) for enterprise-level risk measurement.</p>'},
{title:'Describe the use of sensitivity risk measures and scenario risk measures.',explanation:'<p><strong>Sensitivity measures in practice:</strong> duration is used to set interest rate risk limits (e.g., "portfolio duration must be within ±0.5 years of benchmark"). Beta targets constrain equity market exposure. Delta limits cap directional options exposure.</p><p><strong>Scenario analysis in practice:</strong> regulatory stress tests (CCAR, EBA) require banks to model losses under prescribed adverse scenarios. Asset managers stress test portfolios against historical crises and hypothetical scenarios (e.g., trade war escalation, pandemic). Results inform position sizing and hedging decisions.</p>'},
{title:'Describe advantages and limitations of sensitivity and scenario risk measures.',explanation:'<p><strong>Sensitivity advantages:</strong> simple, intuitive, easily communicated, direct link to hedging actions (duration → hedge with bond futures). <strong>Limitations:</strong> local approximations (fail for large moves), single-factor (don\'t capture joint moves), don\'t aggregate easily across asset classes.</p><p><strong>Scenario advantages:</strong> capture non-linear and tail risks, intuitive (narratively grounded), consider multiple simultaneous moves, useful for communication with boards/clients. <strong>Limitations:</strong> subjective scenario selection (what to include?), backward-looking bias (historical scenarios), may miss novel risks, no probability attached (how likely is the scenario?).</p>'},
{title:'Explain constraints used in managing market risks, including risk budgeting, position limits, scenario limits, and stop-loss limits.',explanation:'<div class="formula-box"><span class="label">Risk Management Constraints</span>Risk budgets: allocate total VaR/tracking error across desks/strategies\n  Each unit gets a "risk budget" to spend on their best ideas\n\nPosition limits: maximum exposure to a single issuer, sector,\n  or asset class (in $ or % of portfolio)\n\nScenario limits: max acceptable loss under specific stress scenarios\n  "Portfolio must survive a 2008-type event with < 20% drawdown"\n\nStop-loss limits: exit a position or strategy if cumulative losses\n  exceed a threshold. Prevents "hope and pray" risk management.\n  Drawback: can force selling at the worst time (capitulation)</div>'},
{title:'Explain how risk measures may be used in capital allocation decisions.',explanation:'<p><span class="key-term">Risk-adjusted return on capital (RAROC)</span> = expected return / economic capital (VaR or regulatory capital). Used to compare the efficiency of different businesses or strategies on a common risk-adjusted basis.</p><p>Capital allocation process: (1) estimate VaR or economic capital for each business unit. (2) Calculate RAROC. (3) Allocate capital to units with highest RAROC. (4) Set hurdle rate = cost of equity capital. (5) Only pursue activities with RAROC > hurdle rate.</p><p>This ensures the firm earns an adequate return on the risk capital it deploys — rather than maximizing return without regard to risk consumption.</p>'},
{title:'Describe risk measures used by banks, asset managers, pension funds, and insurers.',explanation:'<div class="formula-box"><span class="label">Risk Measures by Institution Type</span>Banks: VaR (trading book), credit VaR, regulatory capital ratios\n  (CET1, leverage), stress test results, LCR/NSFR\n\nAsset managers: tracking error, information ratio, drawdown,\n  factor exposures, Sharpe ratio, relative VaR\n\nPension funds: surplus at risk (assets − liabilities VaR),\n  funded ratio, liability-driven investing (LDI) metrics,\n  duration mismatch between assets and liabilities\n\nInsurers: combined ratio, RBC ratio, claims reserves adequacy,\n  asset-liability duration match, catastrophe exposure (PML)</div>'}
]},

'pm|backtest':{
quickReview:['Backtesting: test an investment strategy on historical data before deploying real capital.','Steps: specify strategy rules → select historical period → apply rules mechanically → measure performance → analyze results.','Key metrics: total return, Sharpe ratio, max drawdown, turnover, capacity, hit rate, profit factor.','Problems: survivorship bias, look-ahead bias, data snooping/overfitting, transaction cost underestimation, regime change.','Historical scenario: apply a specific historical period\'s conditions to the current portfolio. Good for stress testing.','Monte Carlo vs. historical: Monte Carlo generates synthetic scenarios (more flexible, captures tail risk); historical uses actual past data (no model risk but limited by history).','Sensitivity analysis: vary key assumptions (costs, signal thresholds, holding periods) to test robustness.'],
analogy:'Backtesting is like <em>a dress rehearsal before opening night</em>. You perform the play (strategy) exactly as planned, but on a stage built from historical data instead of live markets. Problems: the audience (market conditions) may behave differently on opening night. Data snooping is like rewriting the script to get standing ovations in rehearsal — it guarantees a great rehearsal but tells you nothing about the real performance. The best dress rehearsals use realistic conditions and don\'t change the script mid-act.',
los:[
{title:'Describe objectives in backtesting an investment strategy.',explanation:'<p>Backtesting objectives: <strong>validate</strong> that a strategy\'s logic produces positive risk-adjusted returns in historical data, <strong>calibrate</strong> parameters (signal thresholds, rebalancing frequency, position sizing), <strong>estimate</strong> realistic performance expectations (return, risk, drawdowns, turnover), <strong>identify</strong> scenarios where the strategy fails (regime sensitivity), and <strong>build confidence</strong> before committing real capital.</p><p>A backtest is NOT a guarantee of future performance — it\'s a necessary but insufficient condition for deployment. A strategy that fails in backtesting almost certainly fails live; one that succeeds may or may not.</p>'},
{title:'Describe and contrast steps and procedures in backtesting an investment strategy.',explanation:'<div class="formula-box"><span class="label">Backtesting Steps</span>1. Define strategy rules precisely (entry, exit, sizing)\n   → Must be fully systematic/mechanical\n2. Select historical data period\n   → Long enough to cover multiple regimes\n3. Establish the investment universe and rebalancing schedule\n4. Apply rules mechanically to historical data\n   → NO discretionary overrides\n5. Record all trades, positions, returns\n6. Measure performance metrics\n7. Analyze results — attribution, drawdown analysis, regime sensitivity\n8. Out-of-sample validation (test on data NOT used for development)</div><p><strong>Walk-forward analysis:</strong> divide history into in-sample (develop) and out-of-sample (validate) windows. Roll forward and repeat. More robust than a single in-sample/out-of-sample split.</p>'},
{title:'Interpret metrics and visuals reported in a backtest.',explanation:'<div class="formula-box"><span class="label">Key Backtest Metrics</span>Return: CAGR, cumulative return, monthly/annual return distribution\nRisk: volatility, Sharpe ratio, Sortino ratio, max drawdown, drawdown duration\nEfficiency: hit rate (% of profitable trades), profit factor (gross wins/gross losses)\nCosts: turnover, transaction costs as % of returns\nCapacity: how much AUM before market impact degrades returns?\n\nKey visuals:\n  Equity curve (cumulative wealth over time)\n  Drawdown chart (underwater plot)\n  Rolling Sharpe ratio (is performance consistent?)\n  Return distribution histogram (skew, kurtosis)</div>'},
{title:'Identify problems in a backtest of an investment strategy.',explanation:'<p>Common backtesting pitfalls:</p><p><strong>Survivorship bias:</strong> using data that only includes surviving companies/funds (winners) — overstates returns. Use point-in-time databases.</p><p><strong>Look-ahead bias:</strong> using information that wasn\'t available at the decision point (e.g., using annual earnings data before the report was published). Use only data available as of each trading date.</p><p><strong>Data snooping / overfitting:</strong> testing many strategy variations and reporting only the best one. The "winning" version likely fit noise. Corrective: out-of-sample testing, Bonferroni-type adjustments for multiple testing.</p><p><strong>Transaction cost underestimation:</strong> ignoring bid-ask spreads, market impact, and slippage. High-turnover strategies are most vulnerable.</p><p><strong>Regime change:</strong> past market structure may not repeat (e.g., strategies that worked before electronic trading may fail after).</p>'},
{title:'Evaluate and interpret a historical scenario analysis.',explanation:'<p><strong>Historical scenario analysis:</strong> apply a specific historical period\'s market conditions to the current portfolio. "What would happen to today\'s portfolio if we replayed the 2008 financial crisis?"</p><p>Process: identify the historical event, extract the asset class returns during that period, apply those returns to current portfolio weights, calculate the portfolio loss.</p><p><strong>Interpretation:</strong> provides a concrete, relatable stress test. Limitations: past correlations may not repeat, the portfolio may hold assets that didn\'t exist during the historical event, the scenario is backward-looking (the next crisis may look different). Most useful as one input among many, not as a standalone risk assessment.</p>'},
{title:'Contrast Monte Carlo and historical simulation approaches.',explanation:'<div class="formula-box"><span class="label">Monte Carlo vs. Historical Simulation</span>HISTORICAL SIMULATION:\n  Uses actual historical returns — no model needed\n  Captures real-world non-normality, correlations\n  Limited by: length of history, regime changes, no new scenarios\n  Good for: well-established strategies with long data histories\n\nMONTE CARLO SIMULATION:\n  Generates synthetic scenarios from a statistical model\n  Can produce scenarios never seen historically (tail events)\n  Allows "what if" analysis (change parameters)\n  Limited by: model risk (wrong model → wrong results)\n  Good for: options, path-dependent strategies, tail risk analysis</div>'},
{title:'Explain inputs and decisions in simulation and interpret a simulation.',explanation:'<p>Key simulation decisions: <strong>model specification</strong> (return distribution — normal, t-distribution, copula for dependencies), <strong>parameter estimation</strong> (mean returns, volatilities, correlations — from historical data or forward estimates), <strong>number of scenarios</strong> (more = more precise but slower; typically 10,000+), <strong>time horizon and steps</strong> (daily, monthly, multi-year), <strong>path dependency</strong> (does the strategy depend on the path, not just the endpoint?).</p><p>Interpretation: examine the distribution of outcomes — mean, median, percentiles (5th, 95th), probability of loss, probability of meeting a target. Simulation provides a probability distribution of results, not a single point estimate.</p>'},
{title:'Demonstrate the use of sensitivity analysis.',explanation:'<p><strong>Sensitivity analysis</strong> varies one input at a time while holding others constant, observing the impact on output (return, risk, strategy performance).</p><p>Applications: vary transaction cost assumptions (does the strategy survive at 2× estimated costs?), vary the signal threshold (is performance robust or cliff-edge?), vary the holding period (daily vs. weekly vs. monthly rebalancing), vary the lookback window for signal construction.</p><p>A <strong>robust strategy</strong> performs well across a range of reasonable assumptions. A <strong>fragile strategy</strong> works only under narrow conditions — likely overfit. Sensitivity analysis is the single best tool for distinguishing the two.</p>'}
]},

'ethics|code':{
quickReview:['Six components of Code of Ethics: act with integrity, place client interests first, use reasonable care, practice in an ethical manner, promote integrity of capital markets, maintain and improve professional competence.','Seven Standards: I. Professionalism, II. Integrity of Capital Markets, III. Duties to Clients, IV. Duties to Employers, V. Investment Analysis/Recommendations, VI. Conflicts of Interest, VII. Responsibilities as CFA Member/Candidate.'],
analogy:'The Code of Ethics is like the <em>Hippocratic Oath for investment professionals</em>. Just as doctors swear to "first, do no harm," CFA charterholders pledge to put client interests above their own. The seven Standards are the specific rules that make the oath operational — they translate the broad principle of "act with integrity" into concrete, testable behaviors. The Code is the spirit; the Standards are the letter.',
los:[
{title:'Describe the six components of the Code of Ethics and the seven Standards of Professional Conduct.',explanation:'<div class="formula-box"><span class="label">Code of Ethics (6 Components)</span>1. Act with integrity, competence, diligence, and respect\n2. Place the integrity of the investment profession and\n   client interests above personal interests\n3. Use reasonable care and independent professional judgment\n4. Practice and encourage others to practice in a professional\n   and ethical manner\n5. Promote the integrity and viability of global capital markets\n   for the ultimate benefit of society\n6. Maintain and improve professional competence</div><div class="formula-box"><span class="label">Standards of Professional Conduct (7 Standards)</span>I.   Professionalism\n     A. Knowledge of the Law  B. Independence & Objectivity\n     C. Misrepresentation  D. Misconduct\n\nII.  Integrity of Capital Markets\n     A. Material Nonpublic Information  B. Market Manipulation\n\nIII. Duties to Clients\n     A. Loyalty, Prudence & Care  B. Fair Dealing\n     C. Suitability  D. Performance Presentation\n     E. Preservation of Confidentiality\n\nIV.  Duties to Employers\n     A. Loyalty  B. Additional Compensation Arrangements\n     C. Responsibilities of Supervisors\n\nV.   Investment Analysis, Recommendations & Actions\n     A. Diligence & Reasonable Basis\n     B. Communication with Clients\n     C. Record Retention\n\nVI.  Conflicts of Interest\n     A. Disclosure of Conflicts  B. Priority of Transactions\n     C. Referral Fees\n\nVII. Responsibilities as CFA Member or Candidate\n     A. Conduct in CFA Program  B. Reference to CFA Institute</div>'},
{title:'Explain the ethical responsibilities required of CFA Institute members and candidates by the Code and Standards.',explanation:'<p>Members and candidates must:</p><p><strong>Comply with applicable law AND the Code & Standards</strong> — whichever is stricter governs. If local law is less strict than the Code, follow the Code. If local law is stricter, follow local law.</p><p><strong>Place client interests first:</strong> always act in the best interest of the client. This overrides personal interests, employer interests, and even the interests of the investment profession generally.</p><p><strong>Maintain independence and objectivity:</strong> do not let gifts, compensation, relationships, or pressure compromise professional judgment. Disclose potential conflicts.</p><p><strong>Exercise diligence:</strong> have a reasonable and adequate basis for all investment actions and recommendations. This means doing the research — not blindly following tips, rumors, or third-party reports without independent verification.</p><p><strong>Promote market integrity:</strong> do not trade on material nonpublic information (MNPI), do not manipulate markets, and report observed violations through appropriate channels.</p><p><strong>Continuous improvement:</strong> the competence obligation doesn\'t end at the charter — ongoing education and staying current with industry developments is an ethical requirement.</p>'}
]},

'ethics|guidance':{
quickReview:['Standard I: know the law (follow stricter of law vs. Code), maintain independence (refuse gifts that compromise), no misrepresentation, no misconduct.','Standard II: don\'t trade on MNPI (mosaic theory: combining public + non-material nonpublic is OK), no market manipulation.','Standard III: loyalty/prudence/care (fiduciary duty), fair dealing (not necessarily equal but fair), suitability (IPS), accurate performance, keep client info confidential.','Standard IV: loyalty to employer (don\'t compete, return materials on leaving), disclose additional compensation, supervisors must establish compliance procedures.','Standard V: have reasonable basis for recommendations, communicate risks/limitations, retain records for 7 years.','Standard VI: disclose all conflicts, client transactions take priority over personal, disclose referral fees.','Standard VII: don\'t cheat on the CFA exam, don\'t misrepresent CFA status or exaggerate the charter\'s meaning.'],
analogy:'The Guidance is like a <em>referee\'s rulebook with illustrated examples</em>. The Standards are the rules ("no handball"), and the Guidance shows exactly what counts as a violation and what doesn\'t, with case studies for every gray area. Mosaic theory is like putting together a jigsaw puzzle from many small public pieces — each piece is legal, and the completed picture (your investment conclusion) is your own analytical work product, not insider information.',
los:[
{title:'Demonstrate thorough knowledge of the CFA Institute Code of Ethics and Standards of Professional Conduct by applying them to specific situations.',explanation:'<p>The exam tests application through <span class="key-term">scenario-based questions</span> — "given this situation, which Standard is most likely violated?" Key areas frequently tested:</p><p><strong>MNPI / Mosaic Theory (II.A):</strong> material nonpublic information cannot be acted upon. But the <em>mosaic theory</em> allows analysts to combine individually non-material nonpublic information with public information to form an investment conclusion — this is legitimate research, not insider trading.</p><p><strong>Fair Dealing (III.B):</strong> all clients must receive fair treatment — disseminate recommendations simultaneously, don\'t favor certain clients with early access. "Fair" doesn\'t mean identical treatment; larger clients may get more personalized service, but all must receive recommendations at the same time.</p><p><strong>Suitability (III.C):</strong> recommendations must be appropriate for the client\'s objectives, constraints, and circumstances (documented in an IPS). What\'s suitable for a young aggressive investor may be unsuitable for a retiree.</p><p><strong>Conflicts of Interest (VI.A):</strong> if you own the stock you\'re recommending, if your firm does banking business with the company, if you receive referral fees — all must be disclosed fully and prominently.</p><p><strong>Reasonable Basis (V.A):</strong> every recommendation must be supported by thorough analysis. Relying solely on a third-party report without independent verification violates this standard — you must exercise your own judgment.</p>'},
{title:'Recommend practices and procedures designed to prevent violations of the Code of Ethics and Standards of Professional Conduct.',explanation:'<p>Preventive compliance practices:</p><div class="formula-box"><span class="label">Recommended Procedures</span>MNPI / Information Barriers:\n  • "Chinese walls" between research and banking\n  • Restricted lists, watch lists\n  • Pre-clearance of employee trades\n\nFair Dealing:\n  • Simultaneous dissemination of recommendations\n  • Documented allocation procedures (especially IPOs)\n  • Systematic order management (not ad hoc)\n\nConflict Management:\n  • Mandatory conflict disclosure in all reports\n  • Personal trading policies (pre-approval, holding periods)\n  • Gift/entertainment policies with dollar limits\n\nRecord Retention:\n  • Maintain research files for minimum 7 years\n  • Document the basis for all recommendations\n\nCompliance Infrastructure:\n  • Designated compliance officer\n  • Written compliance manual\n  • Regular training and attestation\n  • Whistleblower protections</div>'}
]},

'ethics|application':{
quickReview:['Level II ethics focuses on applying the Code & Standards to realistic, complex scenarios — not just identifying the rule.','Common tested scenarios: analyst receives MNPI inadvertently (must restrict trading, cannot share), supervisor fails to establish compliance system, analyst copy-pastes research without attribution.','Key distinction: violation vs. no violation often hinges on whether proper disclosure was made, whether the action was in the client\'s interest, and whether procedures were followed.','When in doubt: disclose, document, put clients first, comply with the stricter of law vs. Code, and escalate concerns.'],
analogy:'Applying the Code & Standards at Level II is like <em>being a judge, not just a law student</em>. At Level I, you memorize the rules. At Level II, you\'re presented with messy, real-world cases where the facts are ambiguous, multiple Standards may be at play, and reasonable people could disagree. Your job is to identify the most likely violation (or confirm no violation), cite the specific Standard, and explain your reasoning. The facts are designed to be tricky — look for the subtle detail that changes everything.',
los:[
{title:'Evaluate practices, policies, and conduct relative to the CFA Institute Code of Ethics and Standards of Professional Conduct.',explanation:'<p>Level II ethics questions present <strong>detailed scenarios</strong> and ask you to evaluate whether conduct violates the Code & Standards. Approach:</p><p><strong>1. Identify all relevant Standards</strong> — scenarios often involve multiple Standards simultaneously (e.g., an analyst who misrepresents performance AND fails suitability AND has an undisclosed conflict).</p><p><strong>2. Analyze the facts carefully</strong> — the correct answer often depends on a single specific detail (Was the information material? Was it public? Was disclosure made? Was the trade in a client account or personal account?).</p><p><strong>3. Apply the "stricter rule" principle</strong> — if local law conflicts with the Code, follow whichever imposes the higher ethical standard.</p><p><strong>4. Consider intent AND outcome</strong> — some violations are strict liability (trading on MNPI doesn\'t require intent to defraud). Others depend on whether "reasonable care" was exercised.</p><p>Common Level II traps: confusing "non-material" with "material" information, assuming verbal disclosure is sufficient (many Standards require written), forgetting that the duty is to ALL clients (not just the one asking).</p>'},
{title:'Explain how the practices, policies, and conduct do or do not violate the CFA Institute Code of Ethics and Standards of Professional Conduct.',explanation:'<p>Explaining violations (or non-violations) requires citing the <strong>specific Standard</strong> and linking it to the <strong>specific facts</strong>:</p><p><strong>Example — Violation:</strong> "An analyst at Firm X learned from the CEO of Company Y during a private meeting that Y would miss its earnings target by 20%. The analyst then recommended selling Y shares to clients. This violates <em>Standard II(A) — Material Nonpublic Information</em> because the earnings miss is material (would affect an investor\'s decision) and nonpublic (shared in a private meeting, not yet disclosed to the market). The analyst should have restricted trading in Y and reported the information to compliance."</p><p><strong>Example — No Violation:</strong> "An analyst attended a public industry conference where several presenters discussed rising input costs across the sector. Based on her own analysis of public data plus these conference observations, she concluded Company Z would face margin pressure and downgraded her recommendation. This does NOT violate Standard II(A) because the information from the conference was public, and her investment conclusion was based on the <em>mosaic theory</em> — combining public information with her own analytical expertise."</p><p><strong>Key patterns:</strong> disclosure cures many potential conflicts (but must be full, timely, and prominent). Documentation protects against allegations of insufficient basis. And the fiduciary duty to clients is the North Star — when in doubt, ask "does this action serve the client\'s interest?"</p>'}
]},

let currentTopic=null,currentSubtopic=0,quickReviewOn=false,checkedLOs={},darkMode=false;
const totalLOs=TOPICS.reduce((s,t)=>s+t.subtopics.reduce((s2,st)=>s2+st.los,0),0);

function toggleTheme(){darkMode=!darkMode;document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');}

// ═══ MOBILE MENU ═══
function openMobileMenu(){
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('sidebarBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMobileMenu(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
  document.body.style.overflow='';
}
function renderMobileBar(){
  const bar=document.getElementById('mobileBar');
  if(!bar) return;
  const backBtn=document.getElementById('mobileBackBtn');
  const menuBtn=document.getElementById('mobileMenuBtn');
  const titleEl=document.getElementById('mobileTitle');
  const progEl=document.getElementById('mobileProgress');
  if(currentTopic===null){
    backBtn.classList.remove('visible');
    menuBtn.classList.remove('hidden');
    titleEl.textContent='CFA Level II';
    const done=Object.keys(checkedLOs).length;
    progEl.textContent=done>0?`${done}/${totalLOs}`:'';
  } else {
    backBtn.classList.add('visible');
    menuBtn.classList.add('hidden');
    const t=TOPICS[currentTopic];
    titleEl.textContent=t.name;
    const lc=t.subtopics.reduce((s,st)=>s+st.los,0),ch=countChecked(t);
    progEl.textContent=`${ch}/${lc}`;
  }
}

function renderSidebar(){
  const nav=document.getElementById('sidebarNav');
  let h=`<div class="nav-item ${currentTopic===null?'active':''}" style="--dot-color:#888;--active-dim:#88888815;" onclick="goHome()"><div class="nav-dot" style="background:#888"></div><span class="nav-label">⌂ Overview</span></div>`;
  TOPICS.forEach((t,i)=>{const lc=t.subtopics.reduce((s,st)=>s+st.los,0),ch=countChecked(t);h+=`<div class="nav-item ${currentTopic===i?'active':''}" style="--dot-color:${t.color};--active-dim:${t.dim}" onclick="selectTopic(${i})"><div class="nav-dot"></div><span class="nav-label">${t.name}</span><span class="nav-badge">${ch}/${lc}</span></div>`;});
  nav.innerHTML=h;
}
function goHome(){currentTopic=null;currentSubtopic=0;closeMobileMenu();render();}
function selectTopic(i){currentTopic=i;currentSubtopic=0;closeMobileMenu();render();document.getElementById('contentScroll').scrollTop=0;}
function selectSubtopic(i){currentSubtopic=i;renderContent();document.getElementById('contentScroll').scrollTop=0;}
function render(){renderSidebar();renderHeader();renderMobileBar();renderSubtabs();renderContent();updateProgress();}

function renderHeader(){
  const n=document.getElementById('topicNum'),ti=document.getElementById('topicTitle'),s=document.getElementById('headerStats');
  if(currentTopic===null){n.style.display='none';ti.textContent='Welcome';s.innerHTML='';return;}
  const t=TOPICS[currentTopic],lc=t.subtopics.reduce((a,b)=>a+b.los,0),ch=countChecked(t);
  n.style.display='';n.textContent=`TOPIC ${t.num}`;n.style.background=t.dim;n.style.color=t.color;ti.textContent=t.name;
  s.innerHTML=`<div class="stat-chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>${ch}/${lc} LOs</div><div class="stat-chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>${t.subtopics.length} sections</div>`;
}
function renderSubtabs(){
  const w=document.getElementById('subtabsWrapper'),tb=document.getElementById('subtabs');
  if(currentTopic===null){w.style.display='none';return;}w.style.display='';
  const t=TOPICS[currentTopic];tb.innerHTML=t.subtopics.map((st,i)=>`<div class="subtab ${i===currentSubtopic?'active':''}" style="--active-color:${t.color}" onclick="selectSubtopic(${i})">${st.name}</div>`).join('');
}
function renderContent(){
  const el=document.getElementById('contentInner');
  if(currentTopic!==null){el.style.setProperty('--active-color',TOPICS[currentTopic].color);el.style.setProperty('--active-dim',TOPICS[currentTopic].dim);}
  else{el.style.setProperty('--active-color','#888');el.style.setProperty('--active-dim','#88888820');}
  if(currentTopic===null)return renderWelcome(el);
  const t=TOPICS[currentTopic],st=t.subtopics[currentSubtopic],key=`${t.id}|${st.id}`,data=CONTENT[key];
  if(data)renderRich(el,key,t,st,data);else renderPlaceholder(el,t,st);
}
function renderWelcome(el){
  const d=Object.keys(checkedLOs).length;
  el.innerHTML=`<div class="intro-hero fade-in"><h1>CFA Level II Study Manual</h1><p>An interactive, analogy-driven guide through every Learning Outcome. Track your progress, toggle quick-review mode, and master each topic at your own pace.</p><div class="stats-row"><div class="stat-block"><div class="stat-value">${TOPICS.length}</div><div class="stat-label">Topics</div></div><div class="stat-block"><div class="stat-value">${TOPICS.reduce((s,t)=>s+t.subtopics.length,0)}</div><div class="stat-label">Sections</div></div><div class="stat-block"><div class="stat-value">${totalLOs}</div><div class="stat-label">Learning Outcomes</div></div><div class="stat-block"><div class="stat-value">${d}</div><div class="stat-label">Completed</div></div></div></div><div class="welcome-grid">${TOPICS.map((t,i)=>{const lc=t.subtopics.reduce((s,st)=>s+st.los,0),ch=countChecked(t),p=lc>0?Math.round(ch/lc*100):0;return`<div class="welcome-card fade-in" style="--card-color:${t.color};animation-delay:${i*0.04}s" onclick="selectTopic(${i})"><div class="wc-number">TOPIC ${t.num}</div><div class="wc-title">${t.name}</div><div class="wc-meta"><span>${t.subtopics.length} sections</span><span>·</span><span>${lc} LOs</span></div><div class="wc-progress-mini"><div class="wc-progress-fill" style="width:${p}%;background:${t.color}"></div></div></div>`;}).join('')}</div>`;
}

function stripHtml(s){return s.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim();}

function renderRich(el,key,t,st,data){
  const bolt=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;
  const bulb=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>`;
  const peekSvg=`<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;
  let h=`<div class="fade-in"><div class="quick-review-box ${quickReviewOn?'visible':''}"><div class="qr-title">${bolt} QUICK REVIEW — ${st.name}</div><ul class="qr-bullets">${data.quickReview.map(b=>`<li>${b}</li>`).join('')}</ul></div><div class="section-block">${renderSectionStats(t.id, st.id, t.color)}<div class="section-heading"><div class="dot" style="background:${t.color}"></div>Learning Outcomes</div><ul class="lo-list">`;
  data.los.forEach((lo,i)=>{const k=`${t.id}|${st.id}|${i}`,c=checkedLOs[k];const preview=stripHtml(lo.explanation).slice(0,120)+'…';h+=`<li class="lo-item ${c?'checked':''}" onclick="openPeek('${t.id}','${st.id}',${i})"><div class="lo-header"><span class="lo-num">LO ${i+1}</span><div class="lo-check-dot"></div><span class="lo-peek-icon">${peekSvg}</span></div><div class="lo-content"><div class="lo-title">${lo.title}</div><div class="lo-summary">${preview}</div></div></li>`;});
  h+=`</ul></div><div class="analogy-box"><div class="analogy-tag">${bulb} ANALOGY</div><div class="analogy-text">${data.analogy}</div></div></div>`;
  el.innerHTML=h;
}

function renderPlaceholder(el,t,st){
  const bolt=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;
  const peekSvg=`<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>`;
  el.innerHTML=`<div class="fade-in"><div class="quick-review-box ${quickReviewOn?'visible':''}"><div class="qr-title">${bolt} QUICK REVIEW — ${st.name}</div><ul class="qr-bullets"><li>Content coming soon.</li></ul></div><div class="section-block"><div class="section-heading"><div class="dot" style="background:${t.color}"></div>Learning Outcomes</div><ul class="lo-list">${Array.from({length:st.los},(_,i)=>{const k=`${t.id}|${st.id}|${i}`;return`<li class="lo-item ${checkedLOs[k]?'checked':''}" onclick="openPeek('${t.id}','${st.id}',${i})"><div class="lo-header"><span class="lo-num">LO ${i+1}</span><div class="lo-check-dot"></div><span class="lo-peek-icon">${peekSvg}</span></div><div class="lo-content"><div class="lo-title">Learning Outcome ${i+1} — content coming soon</div></div></li>`;}).join('')}</ul></div><div class="placeholder-state"><div class="placeholder-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><div class="placeholder-title">Content Under Construction</div><div class="placeholder-desc">Ask me to populate this section with explanations, analogies, formulas, and examples for every Learning Outcome.</div></div></div>`;

// ═══ PEEK MODAL ═══
let peekTopicId=null,peekSubId=null,peekLoIdx=0;

function openPeek(topicId,subId,loIdx){
  peekTopicId=topicId;peekSubId=subId;peekLoIdx=loIdx;
  renderPeek();
  document.getElementById('peekOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePeek(e){
  if(e&&e.target!==e.currentTarget) return;
  document.getElementById('peekOverlay').classList.remove('open');
  document.body.style.overflow='';
  render();
}

function navigatePeek(dir){
  const key=`${peekTopicId}|${peekSubId}`;
  const data=CONTENT[key];
  if(!data) return;
  const newIdx=peekLoIdx+dir;
  if(newIdx<0||newIdx>=data.los.length) return;
  peekLoIdx=newIdx;
  renderPeek();
}

function renderPeek(){
  const key=`${peekTopicId}|${peekSubId}`;
  const data=CONTENT[key];
  const t=TOPICS.find(x=>x.id===peekTopicId);
  const st=t?t.subtopics.find(x=>x.id===peekSubId):null;
  if(!data||!t||!st) return;
  const lo=data.los[peekLoIdx];

  const isChecked=!!checkedLOs[loKey];

  const numEl=document.getElementById('peekNum');
  numEl.textContent=`LO ${peekLoIdx+1} — ${st.name}`;

  document.getElementById('peekBody').innerHTML=`<div class="peek-title">${lo.title}</div><div class="peek-explanation" style="--active-color:${t.color};--active-dim:${t.dim}">${lo.explanation}</div>`;
  document.getElementById('peekBody').scrollTop=0;
  injectDiagrams(document.getElementById('peekBody'));

  document.getElementById('peekPrev').classList.toggle('disabled',peekLoIdx===0);
  document.getElementById('peekNext').classList.toggle('disabled',peekLoIdx>=data.los.length-1);

  const checkBtn=document.getElementById('peekCheckBtn');

  else{checkBtn.style.background='';checkBtn.style.borderColor='';checkBtn.style.color='';}

  document.getElementById('peekLoCount').textContent=`${peekLoIdx+1} / ${data.los.length}`;
}

// ═══ SM-2 SPACED REPETITION ENGINE ═══
let fcState = {}; // { 'quant|0': { ef:2.5, interval:1, reps:0, nextReview: Date, lastReview: Date, history:[] }, ... }

function fcGetState(topicId, idx) {
  const key = topicId + '|' + idx;
  if (!fcState[key]) {
    fcState[key] = { ef: 2.5, interval: 0, reps: 0, nextReview: Date.now(), lastReview: null, history: [] };
  }
  return fcState[key];
}

function fcReview(topicId, idx, quality) {
  // quality: 0=Again, 1=Hard, 2=Good, 3=Easy
  const s = fcGetState(topicId, idx);
  s.history.push({ date: Date.now(), q: quality });
  s.lastReview = Date.now();

  if (quality === 0) {
    s.reps = 0;
    s.interval = 1;
  } else {
    if (s.reps === 0) s.interval = 1;
    else if (s.reps === 1) s.interval = 3;
    else {
      if (quality === 1) s.interval = Math.max(1, Math.round(s.interval * 1.2));
      else if (quality === 2) s.interval = Math.round(s.interval * s.ef);
      else s.interval = Math.round(s.interval * s.ef * 1.3);
    }
    s.reps++;
  }

  // Adjust ease factor
  if (quality === 0) s.ef = Math.max(1.3, s.ef - 0.2);
  else if (quality === 1) s.ef = Math.max(1.3, s.ef - 0.15);
  else if (quality === 3) s.ef = s.ef + 0.15;

  s.nextReview = Date.now() + s.interval * 86400000; // interval in days → ms
}

function fcGetDueCards(topicId) {
  const cards = FLASHCARDS[topicId] || [];
  const now = Date.now();
  const due = [], notDue = [];
  cards.forEach((c, i) => {
    const s = fcGetState(topicId, i);
    if (s.nextReview <= now) due.push(i);
    else notDue.push(i);
  });
  return { due, notDue, total: cards.length };
}

function fcGlobalStats() {
  let totalCards = 0, dueNow = 0, mastered = 0, studied = 0;
  const now = Date.now();
  Object.keys(FLASHCARDS).forEach(tid => {
    const cards = FLASHCARDS[tid];
    cards.forEach((_, i) => {
      totalCards++;
      const s = fcGetState(tid, i);
      if (s.lastReview) studied++;
      if (s.nextReview <= now) dueNow++;
      if (s.interval >= 21) mastered++;
    });
  });
  return { totalCards, dueNow, mastered, studied };
}
