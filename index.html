'econ|fx':{
quickReview:['Bid-offer spread: bid is dealer\'s buying price, offer is selling price. Spread widens with volatility, illiquidity, and emerging-market currencies.','Triangular arbitrage: convert through three currencies to exploit mispricing. Profit = difference between the two paths around the triangle.','Forward premium/discount: F > S → base currency trades at a forward premium (its interest rate is lower).','Covered Interest Rate Parity (CIP): F/S = (1+i_d)/(1+i_f). Enforced by arbitrage — almost always holds.','Uncovered IRP: E(S₁)/S₀ = (1+i_d)/(1+i_f). Relies on expectations — frequently violated (carry trade profits).','PPP: exchange rates adjust so identical goods cost the same across countries. Relative PPP links inflation differentials to currency depreciation.','Carry trade: borrow low-yield currency, invest in high-yield. Profits when uncovered IRP fails — but crash risk is severe.','Balance of payments: current account deficits → capital inflows needed → currency pressure depends on sustainability.'],
analogy:'Currency markets are like a <em>balance scale with weights on both sides</em>. Interest rates, inflation, and trade flows are the weights. Covered interest parity says the scale must balance (arbitrage ensures it). Uncovered interest parity says it <em>should</em> balance, but in practice the scale tips — which is why carry trades can be profitable (until the scale suddenly snaps back).',
los:[
{title:'Calculate and interpret the bid–offer spread on a spot or forward currency quotation and describe factors affecting the spread.',explanation:'<p>The <span class="key-term">bid</span> is the price at which the dealer will buy the base currency; the <span class="key-term">offer (ask)</span> is the price at which the dealer will sell it. The spread is the dealer\'s compensation.</p><div class="formula-box"><span class="label">Bid-Offer Spread</span>Spread = Offer − Bid\n% Spread = (Offer − Bid) / Offer × 100\n\nFactors widening the spread:\n  • Higher volatility\n  • Lower liquidity (exotic/EM currencies)\n  • Larger trade sizes\n  • Political/economic uncertainty\n  • Off-hours trading</div><p>For forward quotes, the spread is typically wider than spot because forward contracts carry additional uncertainty about future rates.</p>'},
{title:'Identify a triangular arbitrage opportunity and calculate its profit, given bid–offer quotations for three currencies.',explanation:'<p><span class="key-term">Triangular arbitrage</span> exploits inconsistencies among three currency pairs. If the cross rate implied by two pairs differs from the quoted cross rate, you can profit by trading around the triangle.</p><div class="formula-box"><span class="label">Triangular Arbitrage Steps</span>Given: USD/EUR, USD/GBP, EUR/GBP\n\n1. Start with currency A\n2. Convert A → B at the bid\n3. Convert B → C at the bid\n4. Convert C → A at the bid\n5. If ending amount > starting amount → arbitrage profit\n\nAlways use bid rates when selling, offer rates when buying.\nTry BOTH directions around the triangle — only one may be profitable.</div>'},
{title:'Explain spot and forward rates and calculate the forward premium/discount for a given currency.',explanation:'<p>The <strong>spot rate</strong> is for immediate delivery (T+2). The <strong>forward rate</strong> is a locked-in rate for future delivery.</p><div class="formula-box"><span class="label">Forward Premium/Discount</span>Forward premium (base) = (F − S) / S × (360/days) × 100\n\nIf F > S → base currency at a forward premium\n         (base currency interest rate < price currency rate)\nIf F < S → base currency at a forward discount\n\nForward points = F − S (often quoted in pips)</div><p>The forward rate reflects interest rate differentials, not a forecast of future spot rates.</p>'},
{title:'Calculate the mark-to-market value of a forward contract.',explanation:'<p>After inception, a forward\'s value changes as spot rates and interest rates move. To mark-to-market, calculate the present value of the gain or loss if you were to close the position now.</p><div class="formula-box"><span class="label">Mark-to-Market Value (to long party)</span>Vₜ = (FPₜ − FP₀) × contract size / (1 + r × days/360)\n\nFPₜ = current forward price for remaining maturity\nFP₀ = original contracted forward price\nr = appropriate discount rate\ndays = remaining days to settlement</div><p>If the forward price has moved in your favor, the contract has positive value (you\'d receive money to close).</p>'},
{title:'Explain international parity conditions: covered and uncovered interest rate parity, forward rate parity, purchasing power parity, and the international Fisher effect.',explanation:'<p>These conditions link exchange rates, interest rates, and inflation across countries:</p><div class="formula-box"><span class="label">Parity Conditions</span>Covered Interest Rate Parity (CIP):\n  F/S = (1 + iₐ) / (1 + i_b)     [enforced by arbitrage — holds]\n\nUncovered Interest Rate Parity (UIP):\n  E(S₁)/S₀ = (1 + iₐ) / (1 + i_b)  [based on expectations — often fails]\n\nForward Rate Parity:\n  F = E(S₁)                        [forward rate = expected future spot]\n\nRelative Purchasing Power Parity:\n  %ΔS ≈ πₐ − π_b                   [currency depreciates by inflation differential]\n\nInternational Fisher Effect:\n  iₐ − i_b = πₐ(expected) − π_b(expected)  [real rates equalize]</div>'},
{title:'Describe relations among the international parity conditions.',explanation:'<p>The parity conditions form a linked chain: if any two hold, the others follow logically. CIP links spot, forward, and interest rates. UIP links spot expectations and interest rates. PPP links exchange rates and inflation. The Fisher effect links interest rates and inflation.</p><p>In practice: <strong>CIP</strong> holds tightly (arbitrage-enforced). <strong>PPP</strong> holds in the long run (decades) but fails short-term. <strong>UIP</strong> is frequently violated — high-interest currencies don\'t depreciate as predicted, which is why the carry trade can be profitable.</p>'},
{title:'Evaluate the use of the current spot rate, forward rate, PPP, and uncovered interest parity to forecast future spot exchange rates.',explanation:'<p><strong>Spot rate:</strong> assumes no change — surprisingly competitive as a short-term forecast (random walk).<br><strong>Forward rate:</strong> CIP guarantees it\'s consistent with current interest rates, but it\'s a poor predictor of future spot — it reflects hedging costs, not forecasts.<br><strong>PPP:</strong> useful for long-run equilibrium estimates (5–10 years) but poor for short-term.<br><strong>UIP:</strong> empirically reversed — high-interest currencies tend to appreciate in the short run (carry trade), contradicting UIP.</p><p>Bottom line: no method reliably forecasts FX rates. Short-term is nearly unpredictable; long-term gravitates toward PPP.</p>'},
{title:'Explain approaches to assessing the long-run fair value of an exchange rate.',explanation:'<p>Two main approaches:</p><p><strong>Macroeconomic balance approach:</strong> estimates the exchange rate that would bring the current account to a "sustainable" level. If the current account deficit is too large, the currency is overvalued.</p><p><strong>External sustainability approach:</strong> calculates the exchange rate needed to stabilize the country\'s net foreign asset position (or bring it to a target level).</p><p>Both are model-dependent and better suited for identifying large misalignments than for precise forecasts. They\'re most useful for long-horizon investors and central banks.</p>'},
{title:'Describe the carry trade and its relation to UIP and calculate carry trade profit.',explanation:'<p>The <span class="key-term">carry trade</span>: borrow in a low-interest-rate currency, convert to and invest in a high-interest-rate currency. Profit = interest differential (if exchange rates don\'t move against you).</p><div class="formula-box"><span class="label">Carry Trade Return</span>Return ≈ (i_high − i_low) + %ΔS(high-yield currency)\n\nIf UIP held: %ΔS would exactly offset the interest differential → zero profit\nIn practice: UIP fails → carry trades are often profitable\n\nRisk: "up the stairs, down the elevator"\n  — slow steady gains, then sudden large losses when\n    high-yield currencies crash (unwinding)</div>'},
{title:'Explain how balance of payments flows affect currency exchange rates.',explanation:'<p>The balance of payments has two main accounts:</p><p><strong>Current account:</strong> trade in goods/services, income, transfers. A deficit means the country imports more than it exports → sells its currency to buy foreign goods → downward pressure.</p><p><strong>Capital/financial account:</strong> investment flows. A current account deficit must be financed by capital inflows (foreign investment). If foreigners are willing to invest (attracted by returns), the currency can stay strong despite a trade deficit.</p><p>Sustainability matters: a deficit financed by volatile short-term capital flows is fragile. One financed by stable FDI is more resilient.</p>'},
{title:'Explain the potential effects of monetary and fiscal policy on exchange rates.',explanation:'<p><strong>Expansionary monetary policy</strong> (lower rates, QE): reduces interest rates → capital outflows → currency depreciates. But if it boosts growth expectations, it may attract equity investment → partial offset.</p><p><strong>Restrictive monetary policy</strong> (higher rates): attracts foreign capital → currency appreciates.</p><p><strong>Expansionary fiscal policy</strong> (higher spending/lower taxes): ambiguous. Higher growth → appreciate. But larger deficits → higher borrowing → potentially higher rates (crowding out) → appreciate short-term. Long-term debt sustainability concerns → depreciate.</p><p>The <strong>Mundell-Fleming model</strong> combines both: the effect depends on whether the country has high or low capital mobility and fixed vs. floating exchange rates.</p>'},
{title:'Describe objectives of central bank intervention and capital controls, and describe their effectiveness.',explanation:'<p><strong>Central bank intervention:</strong> buying/selling domestic currency in FX markets to influence the exchange rate. Objectives: reduce volatility, resist misalignment, build reserves, maintain competitiveness.</p><p>Effectiveness: limited unless backed by fundamental policy changes. Sterilized intervention (offsetting the money supply impact) is largely ineffective. Unsterilized intervention works but changes monetary conditions.</p><p><strong>Capital controls:</strong> restricting cross-border capital flows (taxes on inflows, limits on outflows). Can provide short-term breathing room but create distortions, reduce market efficiency, and signal weakness.</p>'},
{title:'Describe warning signs of a currency crisis.',explanation:'<p>A <span class="key-term">currency crisis</span> is a sudden, sharp depreciation. Warning signs include:</p><p><strong>Macro:</strong> large and growing current account deficit, fiscal deficit, rapid domestic credit growth, real exchange rate significantly overvalued relative to PPP.</p><p><strong>Financial:</strong> banking sector weakness, declining foreign exchange reserves, rising short-term foreign-currency debt, over-reliance on short-term capital inflows.</p><p><strong>Structural:</strong> fixed or pegged exchange rate with inconsistent domestic policies, moral hazard (implicit government guarantees), capital account liberalization without strong institutions.</p><p>History shows crises often arrive suddenly after a long period of stability — the "this time is different" phase.</p>'}
]},

'econ|growth':{
quickReview:['Growth factors: labor force growth, capital accumulation, and total factor productivity (TFP/technology).','Sustainable growth rate of equity market ≈ GDP growth rate long-term. Matters for equity and bond investors.','Capital deepening (more capital per worker) faces diminishing returns. Technological progress does not.','Solow (neoclassical): growth converges to steady state driven by savings and population. Only tech sustains long-run per-capita growth.','Endogenous growth theory: R&D and human capital investment generate self-sustaining growth without diminishing returns.','Convergence hypothesis: poorer countries grow faster than rich ones (conditional on similar institutions).','Trade liberalization: raises productivity via specialization, but creates winners and losers (displacement).'],
analogy:'Economic growth is like <em>filling a swimming pool</em>. Capital deepening is adding more hoses (more capital per worker) — it helps at first, but eventually the hoses get in each other\'s way (diminishing returns). Technological progress is like increasing the water pressure in every hose — it never runs into diminishing returns and is the only way to keep filling the pool faster indefinitely.',
los:[
{title:'Compare factors favoring and limiting economic growth in developed and developing economies.',explanation:'<p><strong>Developing economies</strong> — growth-favoring: low base (catch-up potential), young demographics, capital-scarce (high marginal returns to investment), technology adoption from abroad. Limiting: weak institutions, corruption, poor infrastructure, political instability, low human capital.</p><p><strong>Developed economies</strong> — growth-favoring: strong institutions, rule of law, deep capital markets, high human capital, innovation capacity. Limiting: aging populations, diminishing returns to capital, regulatory burden, slower productivity growth at the frontier.</p>'},
{title:'Describe the relation between long-run stock market appreciation and sustainable economic growth rate.',explanation:'<p>Over the very long run, aggregate <strong>equity market returns ≈ nominal GDP growth + dividend yield</strong>. If an economy grows at 5% nominally and pays 2% dividends, the long-run expected equity return is roughly 7%.</p><p>This matters because unsustainable above-GDP earnings growth implies rising profit share (which can\'t continue indefinitely). Analysts projecting terminal growth rates above sustainable GDP growth are being implicitly optimistic about market structure.</p>'},
{title:'Explain why potential GDP and its growth rate matter for equity and fixed income investors.',explanation:'<p><strong>Potential GDP</strong> = the output level consistent with full employment and stable inflation. Its growth rate sets the ceiling for sustainable non-inflationary growth.</p><p><strong>For equity investors:</strong> potential GDP growth drives long-run earnings growth. Higher potential growth → higher justified P/E ratios.</p><p><strong>For fixed income investors:</strong> potential GDP growth influences the equilibrium real interest rate. Higher potential growth → higher neutral real rates → higher bond yields. Also, if actual GDP exceeds potential → inflation pressure → central bank tightening → bond prices fall.</p>'},
{title:'Contrast capital deepening and technological progress and explain how each affects growth and labor productivity.',explanation:'<div class="formula-box"><span class="label">Growth Accounting</span>ΔY/Y = ΔA/A + α·(ΔK/K) + (1−α)·(ΔL/L)\n\nΔA/A = total factor productivity (TFP) growth\nα·(ΔK/K) = contribution of capital\n(1−α)·(ΔL/L) = contribution of labor\n\nLabor productivity: ΔY/L = ΔA/A + α·Δ(K/L)</div><p><strong>Capital deepening</strong> (↑K/L): more machines per worker → higher output per worker, but subject to <em>diminishing marginal returns</em>. Each additional unit of capital adds less.</p><p><strong>Technological progress</strong> (↑A): increases output for ANY given level of K and L. Not subject to diminishing returns. It\'s the only source of <em>sustained</em> per-capita growth in the long run.</p>'},
{title:'Demonstrate forecasting potential GDP based on growth accounting relations.',explanation:'<div class="formula-box"><span class="label">Forecasting Potential GDP Growth</span>Method 1 — Labor Productivity:\n  ΔY/Y = ΔL/L + Δ(Y/L)/(Y/L)\n  = labor force growth + labor productivity growth\n\nMethod 2 — Growth Accounting:\n  ΔY/Y = ΔA/A + α·(ΔK/K) + (1−α)·(ΔL/L)\n\nExample: TFP growth = 1%, capital growth = 3%, labor growth = 1%, α = 0.3\n  ΔY/Y = 1% + 0.3(3%) + 0.7(1%) = 1% + 0.9% + 0.7% = 2.6%</div><p>This framework allows analysts to decompose and forecast growth from its fundamental drivers.</p>'},
{title:'Explain how natural resources affect economic growth and evaluate the argument that limited resources constrain growth.',explanation:'<p>The <strong>"resource curse"</strong> paradox: resource-rich countries often grow slower due to Dutch Disease (real appreciation hurting manufacturing), rent-seeking, institutional decay, and volatility.</p><p>The argument that finite resources cap growth ignores substitution, efficiency gains, and technological innovation. Historically, commodity prices have trended down in real terms as technology finds alternatives and improves extraction. The binding constraint is usually institutions and policy, not geology.</p>'},
{title:'Explain how demographics, immigration, and labor force participation affect economic growth rate and sustainability.',explanation:'<p><strong>Demographics:</strong> a growing working-age population directly boosts GDP growth (more labor). Aging populations (Japan, Europe) face a shrinking workforce → slower growth + fiscal pressure from pensions/healthcare.</p><p><strong>Immigration:</strong> can offset demographic decline by adding workers. Skilled immigration boosts productivity; all immigration expands the labor force and tax base.</p><p><strong>Labor force participation:</strong> the share of working-age population actually working. Rising female participation, later retirement ages, and policies reducing youth unemployment all boost potential GDP.</p>'},
{title:'Explain how investment in physical capital, human capital, and technological development affects economic growth.',explanation:'<p><strong>Physical capital:</strong> infrastructure, factories, equipment. Essential but faces diminishing returns. Developing countries benefit most from capital investment; developed countries need more targeted (R&D) spending.</p><p><strong>Human capital:</strong> education, training, health. Raises labor productivity and supports innovation. Returns are highest in early-stage education (primary/secondary) for developing economies.</p><p><strong>Technology:</strong> the ultimate growth driver. Requires R&D investment, strong institutions (IP protection, universities, venture capital), and openness to ideas. Technology is non-rival — once invented, it benefits everyone.</p>'},
{title:'Compare classical, neoclassical, and endogenous growth theory.',explanation:'<div class="formula-box"><span class="label">Growth Theories Compared</span>Classical (Malthus/Ricardo):\n  Population grows → resources per capita shrink → subsistence\n  Prediction: long-run stagnation (failed for modern economies)\n\nNeoclassical (Solow):\n  Savings/investment → capital accumulation → growth\n  BUT diminishing returns → reaches steady state\n  Only exogenous technology sustains per-capita growth\n  Predicts convergence (poor countries catch up)\n\nEndogenous (Romer/Lucas):\n  R&D and human capital investment → increasing returns\n  Knowledge spillovers sustain growth without diminishing returns\n  No natural convergence — policy choices matter\n  Explains why rich countries can keep growing fast</div>'},
{title:'Explain and evaluate convergence hypotheses.',explanation:'<p><strong>Absolute convergence:</strong> all countries converge to the same income level — poorer countries grow faster. Evidence: mostly rejected. Many poor countries haven\'t converged.</p><p><strong>Conditional convergence:</strong> countries converge to their own steady state, determined by savings rates, population growth, and institutions. Countries with similar fundamentals converge. Better supported empirically.</p><p><strong>Club convergence:</strong> economies converge within "clubs" that share similar initial conditions and institutions. Rich democracies converge with each other; resource-dependent autocracies may converge with each other at lower levels.</p>'},
{title:'Describe the economic rationale for governments to provide incentives to private investment in technology and knowledge.',explanation:'<p>Knowledge has two special properties: it\'s <strong>non-rival</strong> (one person using it doesn\'t reduce others\' ability to use it) and partly <strong>non-excludable</strong> (hard to prevent spillovers). This creates a positive externality — the social return to R&D exceeds the private return.</p><p>Without intervention, the private sector underinvests in R&D (free-rider problem). Government tools: patent protection (create excludability), R&D tax credits, direct research funding, public universities, subsidies for high-tech industries.</p>'},
{title:'Describe the expected impact of removing trade barriers on capital investment, profits, employment, wages, and growth.',explanation:'<p><strong>Capital investment:</strong> increases as firms scale up for larger markets and specialize in comparative advantages. FDI rises as barriers fall.</p><p><strong>Profits:</strong> increase for export-oriented and competitive firms; decrease for previously protected inefficient firms.</p><p><strong>Employment:</strong> shifts toward competitive sectors. Net effect depends on labor market flexibility. Short-term: displacement in protected sectors. Long-term: higher total employment if labor markets adjust.</p><p><strong>Wages:</strong> rise for workers in expanding sectors; may fall in contracting sectors. Skilled workers in developing countries often gain most.</p><p><strong>Growth:</strong> trade liberalization generally boosts long-run growth via specialization, technology transfer, and competitive pressure — but the transition creates winners and losers.</p>'}
]},

'fsa|intercorp':{
quickReview:['IFRS classification: financial assets (FVPL, FVOCI, amortized cost), associates (equity method, 20-50%), JVs (equity method under IFRS), business combinations (acquisition method), SPE/VIE (consolidate if control).','Equity method: investment on BS at cost ± share of earnings − dividends. Income = investor\'s % of investee NI.','Acquisition method: 100% of subsidiary\'s assets/liabilities at fair value on parent BS, with goodwill = purchase price − net fair value.','Key impact: method choice dramatically affects revenue, assets, liabilities, and leverage ratios — same economic reality, different pictures.'],
analogy:'Intercorporate investments are like <em>different levels of friendship</em>. Owning <20% of a company is like being acquaintances — you just record gifts received (dividends). Owning 20-50% is like being close friends — you share in their ups and downs (equity method). Owning >50% is like marriage — everything merges into one household (consolidation). The accounting method must match the depth of the relationship.',
los:[
{title:'Describe the classification, measurement, and disclosure under IFRS for investments in financial assets, associates, joint ventures, business combinations, and SPE/VIEs.',explanation:'<div class="formula-box"><span class="label">IFRS Investment Classification</span>Financial assets (<20%, no significant influence):\n  • FVPL: trading securities — gains/losses in income\n  • FVOCI: available-for-sale — gains/losses in OCI\n  • Amortized cost: held-to-collect debt\n\nAssociates (20-50%, significant influence):\n  • Equity method: BS = cost ± cumulative share of NI − dividends\n\nJoint Ventures:\n  • Equity method under IFRS (no proportionate consolidation)\n\nBusiness Combinations (>50%, control):\n  • Acquisition method: full consolidation at fair value\n  • Goodwill = price paid − fair value of net identifiable assets\n\nSPE/VIE: consolidate if investor controls (bears risks/rewards)</div>'},
{title:'Compare and contrast IFRS and US GAAP in classification, measurement, and disclosure of intercorporate investments.',explanation:'<p>Key differences:</p><p><strong>Financial assets:</strong> IFRS uses the business model + cash flow characteristics test. US GAAP classifies as trading, available-for-sale, or held-to-maturity with somewhat different criteria.</p><p><strong>Associates:</strong> both use equity method for 20-50% influence — largely similar.</p><p><strong>Joint ventures:</strong> IFRS requires equity method. US GAAP also uses equity method (proportionate consolidation not permitted under either).</p><p><strong>Business combinations:</strong> both use acquisition method. Differences in goodwill impairment: IFRS uses a one-step approach; US GAAP also moved to a simplified one-step approach. IFRS tests at the cash-generating unit level; US GAAP at the reporting unit level.</p><p><strong>VIE/SPE:</strong> US GAAP focuses on variable interests and primary beneficiary. IFRS uses a broader control model.</p>'},
{title:'Analyze how different accounting methods for intercorporate investments affect financial statements and ratios.',explanation:'<p>The same economic investment looks dramatically different depending on the method:</p><div class="formula-box"><span class="label">Impact on Key Metrics</span>                    Equity Method    Consolidation\nRevenue             Not affected      ↑ (add 100% of sub)\nTotal assets        Lower             ↑ (add all sub assets)\nTotal liabilities   Lower             ↑ (add all sub debt)\nNet income          Same*             Same*\nLeverage (D/E)      Lower             Higher\nMargins             Higher            Lower (bigger revenue base)\nROE                 Higher            Same*\n\n* assuming no minority interest complications</div><p>Switching from equity method to consolidation (crossing the 50% threshold) inflates the balance sheet and revenue, lowers margins, and increases apparent leverage — even though the underlying business hasn\'t changed.</p>'}
]},

'fsa|employee-comp':{
quickReview:['Compensation types: salary, bonuses, stock options, restricted stock/RSUs, ESPPs, defined-benefit pensions, defined-contribution pensions.','Share-based comp: expense recognized over vesting period at grant-date fair value. Dilutes EPS via higher share count.','Forecasting share-based comp: project expense from unvested grants + estimate future grants. Model diluted shares for valuation.','Post-employment benefits: DB plans create a net pension asset/liability on BS. Pension cost flows through income + OCI.','Valuation considerations: adjust for off-BS pension obligations, normalize pension income/expense, compare funded status across peers.'],
analogy:'Employee compensation is like <em>paying for a house in installments</em>. Stock options are the mortgage — the company promises future value that it recognizes as expense gradually over the vesting period. A defined-benefit pension is like a lifetime maintenance contract on the house — the company promises to keep paying regardless of what it costs, and the actual cost keeps changing based on interest rates and life expectancy.',
los:[
{title:'Contrast types of employee compensation.',explanation:'<p>Compensation comes in many forms, each with distinct accounting treatment:</p><p><strong>Cash-based:</strong> salary, bonuses, commissions — expensed when earned. Straightforward.</p><p><strong>Share-based:</strong> stock options (right to buy at a fixed price), restricted stock/RSUs (shares that vest over time), ESPPs (discounted share purchases). These align employee and shareholder interests but create accounting complexity.</p><p><strong>Post-employment:</strong> defined-contribution plans (company contributes a fixed amount — no ongoing obligation) vs. defined-benefit plans (company promises a specific retirement payment — creates long-term liability). DB plans are the bigger analytical challenge because costs and obligations fluctuate with actuarial assumptions.</p>'},
{title:'Explain how share-based compensation affects the financial statements.',explanation:'<p><span class="key-term">Share-based compensation expense</span> is recognized over the vesting period based on the grant-date fair value (typically Black-Scholes for options, market price for restricted stock).</p><div class="formula-box"><span class="label">Financial Statement Impact</span>Income Statement: ↑ compensation expense → ↓ operating income\nBalance Sheet: offset to additional paid-in capital (equity)\nCash Flow: expense is non-cash → added back in CFO\n  (but actual option exercises create real dilution)\nEPS: denominator ↑ (diluted shares include in-the-money options)\n  via treasury stock method\n\nKey point: SBC reduces reported earnings but does NOT reduce\ncash flow — this gap can overstate cash flow quality.</div>'},
{title:'Explain how to forecast share-based compensation expense and shares outstanding in a financial statement model and their use in valuation.',explanation:'<p>Forecasting SBC requires modeling two things:</p><p><strong>1. Expense:</strong> project the amortization of existing unvested grants (use disclosure schedules) + estimate new grants each year based on historical granting patterns (as % of revenue or headcount). Total SBC expense = amortization of old + amortization of new.</p><p><strong>2. Diluted shares:</strong> estimate future option exercises (treasury stock method: (shares × (price − strike)) / price) + RSU vesting. Both increase shares outstanding over time.</p><p>For valuation: some analysts deduct SBC from cash flows (treating it as a real cost); others ignore it and adjust only the share count. The CFA curriculum emphasizes that <span class="key-term">SBC is a real economic cost</span> — ignoring it overstates intrinsic value.</p>'},
{title:'Explain how post-employment benefits affect the financial statements.',explanation:'<p>Defined-benefit plans create complex BS and IS effects:</p><div class="formula-box"><span class="label">Balance Sheet</span>Funded status = Fair value of plan assets − PV of benefit obligation\n  Surplus → net pension asset\n  Deficit → net pension liability\n\nIncome Statement (pension cost components):\n  • Service cost (in operating income) — PV of new benefits earned\n  • Net interest cost/income (in financing) — discount rate × net obligation\n  • Past service cost (from plan amendments)\n\nOCI captures:\n  • Remeasurements: actuarial gains/losses + asset return vs. expected</div><p>Key assumptions that management can tweak: <strong>discount rate</strong> (↑ rate → ↓ obligation → looks healthier), <strong>salary growth rate</strong>, <strong>expected return on assets</strong>. Analysts must scrutinize these for aggressive vs. conservative positioning.</p>'},
{title:'Explain financial modeling and valuation considerations for post-employment benefits.',explanation:'<p>When building models or comparing companies with DB plans:</p><p><strong>Normalize pension expense:</strong> separate the "operating" component (service cost) from "financing" components (interest cost, expected return). Only service cost belongs in operating income for valuation.</p><p><strong>Adjust the balance sheet:</strong> treat the net pension liability as debt (or the net asset as an investment). This affects enterprise value and leverage ratios. An underfunded plan is effectively a loan from employees.</p><p><strong>Compare across peers:</strong> different discount rate assumptions make plans look more or less funded. Normalize to a common rate before comparing funded status. Also compare actual asset allocation (equity-heavy plans are riskier).</p><p><strong>Cash flow implications:</strong> required contributions to underfunded plans are real cash outflows that reduce FCFE. These can be large and should be modeled explicitly.</p>'}
]},

'fsa|multinational':{
quickReview:['Presentation (reporting) currency = parent\'s FS currency. Functional currency = currency of primary economic environment. Local currency = where subsidiary operates.','If functional = local ≠ presentation → current rate method (translate at current rate, equity at historical, CTA in OCI).','If functional = presentation ≠ local → temporal method (monetary items at current, non-monetary at historical, gains/losses in income).','Current rate method: all assets/liabilities at closing rate → no ratio distortion. Temporal: mixed rates → ratios change.','Hyperinflation: IFRS restates to price-level first, then translates. US GAAP uses temporal method directly.'],
analogy:'Currency translation is like <em>converting a recipe from metric to imperial</em>. The current rate method is like converting every measurement at today\'s exchange rate — the recipe\'s proportions stay perfect, but the numbers all shift together. The temporal method converts some at today\'s rate and others at the rate from when you first wrote the recipe — the proportions get distorted, and you have to account for the "measurement gain or loss" in the final dish.',
los:[
{title:'Compare and contrast presentation (reporting) currency, functional currency, and local currency.',explanation:'<p><strong>Local currency:</strong> the currency of the country where the subsidiary operates (e.g., JPY for a Japanese subsidiary).</p><p><strong>Functional currency:</strong> the currency of the primary economic environment in which the subsidiary generates and spends cash. This is a judgment call — it may be the local currency OR the parent\'s currency, depending on where the business is really "rooted."</p><p><strong>Presentation (reporting) currency:</strong> the currency in which the parent prepares its consolidated financial statements (e.g., USD for a US-based parent).</p><p>The choice of functional currency determines which translation method is used — this is a critical analytical decision.</p>'},
{title:'Describe foreign currency transaction exposure, including accounting for and disclosures about transaction gains and losses.',explanation:'<p><span class="key-term">Transaction exposure</span> arises when a company has receivables or payables denominated in a foreign currency. Between the transaction date and settlement date, exchange rate changes create gains or losses.</p><p>These gains/losses are recognized in the <strong>income statement</strong> each period. Example: a US company sells goods for €1M when EUR/USD = 1.10 (records $1.1M receivable). At quarter-end, EUR/USD = 1.15 → receivable is now $1.15M → $50K gain in income.</p><p>Companies disclose their foreign currency risk exposures, hedging strategies, and the net impact of transaction gains/losses in the notes.</p>'},
{title:'Analyze how changes in exchange rates affect the translated sales of the subsidiary and parent company.',explanation:'<p>When a foreign subsidiary\'s revenue is translated into the parent\'s presentation currency, the translated amount depends on the exchange rate used (average rate for the period under both methods).</p><p>If the subsidiary\'s local currency <strong>appreciates</strong> vs. the parent\'s currency → translated revenue <strong>increases</strong> (same local sales convert to more parent-currency units). If it depreciates → translated revenue decreases.</p><p>This creates the illusion of growth (or decline) that has nothing to do with actual business performance. Analysts must decompose revenue changes into: organic growth, acquisition effects, and currency translation effects.</p>'},
{title:'Compare the current rate method and the temporal method, evaluate how each affects the parent\'s BS and IS, and determine which method is appropriate.',explanation:'<div class="formula-box"><span class="label">Translation Methods</span>CURRENT RATE METHOD (functional = local):\n  Assets & liabilities → closing (current) rate\n  Equity → historical rate\n  Revenue & expenses → average rate\n  Translation adjustment → OCI (CTA in equity)\n\nTEMPORAL METHOD (functional = parent currency):\n  Monetary items (cash, receivables, payables) → current rate\n  Non-monetary items (inventory, PP&E) → historical rate\n  Revenue & most expenses → average rate\n  COGS & depreciation → historical rate\n  Translation gain/loss → INCOME STATEMENT</div><p>Use current rate when the subsidiary operates independently in its local market. Use temporal when the subsidiary is essentially an extension of the parent.</p>'},
{title:'Calculate translation effects and evaluate the translation of a subsidiary\'s BS and IS into the parent\'s presentation currency.',explanation:'<p>The calculation involves applying the appropriate rates to each line item. Under the <strong>current rate method</strong>, the CTA (cumulative translation adjustment) is the "plug" that makes the translated BS balance — it accumulates in equity through OCI.</p><p>Under the <strong>temporal method</strong>, the remeasurement gain/loss flows through the income statement and can create significant earnings volatility.</p><p>Key exam skill: given a subsidiary\'s local-currency statements and exchange rates (historical, average, closing), translate each line item and identify the balancing figure (CTA for current rate, or remeasurement gain/loss for temporal).</p>'},
{title:'Analyze how the current rate method and the temporal method affect financial statements and ratios.',explanation:'<div class="formula-box"><span class="label">Ratio Impact Summary</span>When foreign currency DEPRECIATES vs. parent:\n\n                    Current Rate    Temporal\nCurrent ratio       No change*      Mixed (monetary items shift)\nDebt/equity          ↓              ↑ (loss hits retained earnings)\nGross margin        No change*      ↓ (COGS at old, higher rates)\nNet margin          No change*      ↓ (remeasurement loss in IS)\n\n* Current rate preserves local-currency ratios because\n  all items translate at the same (or similar) rate.</div><p>The current rate method is "ratio-neutral" — it preserves the subsidiary\'s local ratios. The temporal method distorts ratios because different rates apply to different items.</p>'},
{title:'Analyze how alternative translation methods for subsidiaries in hyperinflationary economies affect financial statements and ratios.',explanation:'<p>Hyperinflation (roughly >100% cumulative over 3 years) creates a special problem: translating at current rates produces meaningless numbers because the local currency has collapsed.</p><p><strong>IFRS approach:</strong> first restate the subsidiary\'s financials to current purchasing power using a price index, then translate everything at the current rate. This "inflation-adjusts" before translating.</p><p><strong>US GAAP approach:</strong> use the temporal method directly (treat functional currency as the parent\'s). This effectively remeasures everything into the stable parent currency.</p><p>Both approaches aim to avoid the absurdity of translating historical-cost assets at a massively depreciated current rate, but they produce different results — IFRS tends to show higher asset values.</p>'},
{title:'Describe how multinational operations affect a company\'s effective tax rate.',explanation:'<p>Companies operating in multiple countries face different tax rates in each jurisdiction. The <strong>effective tax rate</strong> (income tax expense / pre-tax income) is a blended rate reflecting the geographic mix of profits.</p><p>Profit shifting toward low-tax jurisdictions (Ireland, Singapore, etc.) lowers the effective rate. Changes in the geographic mix — or in any country\'s tax laws — alter the effective rate year-to-year.</p><p>Analysts should watch for: unsustainably low effective rates (aggressive tax planning that may reverse), one-time tax benefits/charges, and deferred tax liabilities that may never be paid if profits remain offshore.</p>'},
{title:'Explain how changes in the components of sales affect the sustainability of sales growth.',explanation:'<p>For a multinational, revenue growth can be decomposed into:</p><div class="formula-box"><span class="label">Revenue Growth Decomposition</span>Total growth = Volume growth + Price growth + Currency effect + Acquisitions\n\nSustainable: organic volume growth (real demand increasing)\nSomewhat sustainable: pricing power (can it persist?)\nNot sustainable: favorable currency translation (will reverse)\nOne-time: acquisition-driven growth (won\'t repeat next year)</div><p>Analysts must strip out currency effects and acquisitions to evaluate the <em>underlying</em> health of the business. A company showing 10% growth — but 7% from currency tailwinds — has only 3% real growth.</p>'},
{title:'Analyze how currency fluctuations potentially affect financial results, given a company\'s countries of operation.',explanation:'<p>Currency effects depend on the <strong>mismatch</strong> between where revenue is earned and where costs are incurred:</p><p>A US company with European revenue but US costs benefits when EUR strengthens (revenue translates up, costs unchanged). A US company with both European revenue AND European costs has a natural hedge — both sides move together.</p><p>Also consider: <strong>competitive effects</strong> — if a Japanese exporter\'s yen strengthens, its products become more expensive abroad, potentially reducing volume even before translation effects hit. And <strong>balance sheet exposure</strong> — foreign-currency debt creates gains/losses as rates move.</p>'}
]},

'fsa|fin-inst':{
quickReview:['Financial institutions differ: highly leveraged, opaque assets, heavy regulation, systemic interconnection.','CAMELS: Capital adequacy, Asset quality, Management, Earnings, Liquidity, Sensitivity to market risk.','Bank analysis: NIM (net interest margin), provision for loan losses, efficiency ratio, NPL ratio, CET1 ratio.','Insurance analysis: combined ratio (<100% = underwriting profit), reserve adequacy, investment portfolio risk, RBC ratio.'],
analogy:'Analyzing a bank is like <em>inspecting an iceberg</em>. The small visible part above water is the equity; the massive submerged part is the deposits and borrowed funds (leverage). CAMELS is your sonar scan — it maps the full shape of the iceberg, checking whether the part you can\'t see is solid ice or riddled with cracks (bad loans, liquidity gaps).',
los:[
{title:'Describe how financial institutions differ from other companies.',explanation:'<p>Financial institutions (banks, insurers, broker-dealers) are fundamentally different from industrial companies:</p><p><strong>Leverage:</strong> banks operate with 10-15x leverage (vs. 2-3x for industrials). Small asset losses can wipe out equity.</p><p><strong>Opaque assets:</strong> loan books are hard to value — quality depends on borrower creditworthiness, which is uncertain. Unlike inventory, you can\'t inspect a loan portfolio.</p><p><strong>Regulation:</strong> capital requirements (Basel III), liquidity rules, stress tests — regulation shapes strategy and constrains growth.</p><p><strong>Interconnection:</strong> banks are linked through interbank lending, derivatives, and payment systems. One failure can cascade (systemic risk).</p><p><strong>Earnings character:</strong> revenue comes from spread income (NIM) and fee income, not product sales. "Inventory" is money itself.</p>'},
{title:'Describe key aspects of financial regulations of financial institutions.',explanation:'<p>Key regulatory frameworks:</p><p><strong>Capital adequacy (Basel III):</strong> minimum capital ratios — CET1 (common equity tier 1) ≥ 4.5%, Tier 1 ≥ 6%, Total capital ≥ 8% of risk-weighted assets. Plus buffers: conservation buffer (2.5%), countercyclical buffer (0-2.5%), and G-SIB surcharge for systemically important banks.</p><p><strong>Liquidity:</strong> LCR (Liquidity Coverage Ratio) — enough liquid assets to survive 30 days of stress. NSFR (Net Stable Funding Ratio) — stable funding for long-term assets.</p><p><strong>Insurance (Solvency II in EU, RBC in US):</strong> capital requirements based on risk profile — underwriting, market, credit, and operational risk.</p>'},
{title:'Explain the CAMELS approach to analyzing a bank, including key ratios and its limitations.',explanation:'<div class="formula-box"><span class="label">CAMELS Framework</span>C — Capital Adequacy: CET1 ratio, leverage ratio, tangible equity/assets\nA — Asset Quality: NPL ratio, provision/NPL coverage, loan loss reserves\nM — Management: governance quality, risk culture, strategy execution\nE — Earnings: NIM, ROA, ROE, efficiency ratio (non-interest exp/revenue)\nL — Liquidity: loan-to-deposit ratio, LCR, funding mix (stable vs. wholesale)\nS — Sensitivity: duration gap, interest rate risk, FX exposure, VaR</div><p><strong>Limitations:</strong> CAMELS is backward-looking (based on reported data), management quality is subjective, doesn\'t fully capture off-balance-sheet risks, and may miss rapid deterioration between reporting dates. It\'s a framework, not a crystal ball.</p>'},
{title:'Analyze a bank based on financial statements and other factors.',explanation:'<p>Key analytical steps for banks:</p><p><strong>Income analysis:</strong> decompose revenue into net interest income (spread × volume) and non-interest income (fees, trading). Assess NIM trends, fee income stability, and trading revenue volatility.</p><p><strong>Credit quality:</strong> track NPL ratios, provision expense trends, charge-off rates, and reserve adequacy (reserves/NPLs). Rising provisions signal deteriorating loan quality.</p><p><strong>Capital position:</strong> CET1 ratio vs. regulatory minimums and peers. Tangible book value per share as a floor valuation metric.</p><p><strong>Efficiency:</strong> efficiency ratio = non-interest expense / total revenue. Lower = more efficient. Benchmark against peers.</p>'},
{title:'Describe other factors to consider in analyzing a bank.',explanation:'<p>Beyond financials, consider:</p><p><strong>Regulatory environment:</strong> upcoming capital requirements, stress test results, consent orders or restrictions. Regulatory actions can force capital raises or limit dividends.</p><p><strong>Business model:</strong> retail vs. wholesale banking, geographic concentration, fee vs. spread reliance. Diversified models are generally more stable.</p><p><strong>Risk culture and governance:</strong> history of risk management failures, board independence, compensation structures that may encourage excessive risk-taking.</p><p><strong>Macro environment:</strong> interest rate cycle (rising rates generally help NIM but may hurt credit quality), economic outlook (recession → loan losses), competitive dynamics (fintech disruption).</p>'},
{title:'Describe key ratios and other factors to consider in analyzing an insurance company.',explanation:'<div class="formula-box"><span class="label">Insurance Key Metrics</span>Underwriting:\n  Combined ratio = (claims + expenses) / premiums earned\n  < 100% → underwriting profit\n  > 100% → underwriting loss (may be offset by investment income)\n\nProfitability:\n  ROE, operating ratio, investment yield\n\nReserves:\n  Reserve adequacy — are loss reserves sufficient?\n  Reserve development — prior-year reserves strengthened or released?\n\nCapital:\n  RBC ratio (risk-based capital), financial strength ratings (AM Best)\n\nLife insurance specific:\n  Embedded value, sensitivity to interest rates, mortality assumptions</div><p>Key concerns: reserve manipulation (under-reserving to inflate earnings), catastrophe exposure, asset-liability duration mismatch, and reinsurance counterparty risk.</p>'}
]},

'fsa|quality':{
quickReview:['Quality spectrum: reporting quality (GAAP compliance, transparency) vs. earnings quality (sustainable, cash-backed).','High-quality earnings: persistent, backed by cash flows, from core operations, not inflated by aggressive assumptions.','Accruals vs. cash: high accruals ratio signals lower earnings quality. Earnings mean-revert faster when accrual-heavy.','Balance sheet quality: assets not overstated (impairment delays, aggressive capitalization), liabilities not understated (off-BS items).','Cash flow quality: high CFO relative to net income, operating (not investing/financing) sources, not inflated by working capital tricks.'],
analogy:'Financial report quality is like <em>food labeling</em>. Reporting quality asks: "Is the label accurate and complete?" Earnings quality asks: "Is the food actually nutritious?" A company can have perfectly GAAP-compliant statements (accurate label) but unsustainable earnings inflated by one-time gains and aggressive assumptions (junk food dressed up as health food). The analyst\'s job is to read past the label.',
los:[
{title:'Demonstrate the use of a conceptual framework for assessing the quality of a company\'s financial reports.',explanation:'<p>A quality assessment framework has two dimensions:</p><p><strong>1. Reporting quality</strong> (the "container"): Are the financial statements GAAP/IFRS compliant? Are disclosures transparent and complete? Is there evidence of bias or manipulation? Ranges from: compliant & transparent → compliant but biased → non-compliant → fraudulent.</p><p><strong>2. Earnings quality</strong> (the "content"): Even if reporting is clean, are the earnings high-quality? Are they sustainable, backed by cash, from core operations? Ranges from: high-quality & sustainable → adequate → low-quality & unsustainable.</p><p>The framework forces you to ask two separate questions: "Can I trust the numbers?" AND "Even if accurate, are the earnings real and repeatable?"</p>'},
{title:'Explain potential problems that affect the quality of financial reports.',explanation:'<p>Problems range from aggressive-but-legal to outright fraud:</p><p><strong>Revenue recognition:</strong> premature recognition (bill-and-hold, channel stuffing), fictitious revenues, round-tripping transactions.</p><p><strong>Expense manipulation:</strong> capitalizing operating expenses (inflating assets and earnings), understating depreciation, delaying impairments, underestimating warranty/litigation reserves.</p><p><strong>Classification shifting:</strong> moving recurring expenses to "non-recurring" to inflate core operating income. Moving operating cash outflows to investing/financing sections.</p><p><strong>One-time gain abuse:</strong> selling assets to create gains that mask declining operating performance.</p><p><strong>Related-party transactions:</strong> non-arm\'s-length deals that inflate revenue or hide costs.</p>'},
{title:'Describe how to evaluate the quality of a company\'s financial reports.',explanation:'<p>Evaluation toolkit:</p><p><strong>Quantitative checks:</strong> compare revenue growth vs. receivables growth (divergence → potential stuffing), compare earnings vs. CFO (persistent gap → accrual concern), analyze accruals ratios, check for unusual changes in accounting estimates or methods.</p><p><strong>Qualitative checks:</strong> read the auditor\'s report (qualified opinions, emphasis of matter), review management discussion for consistency with financials, check for frequent restatements, high CFO/auditor turnover, related-party disclosures.</p><p><strong>Red flags:</strong> revenue growing faster than industry with no clear explanation, margins improving while peers\' decline, large "other" or "miscellaneous" line items, complex corporate structures with many special-purpose entities.</p>'},
{title:'Evaluate the quality of a company\'s financial reports.',explanation:'<p>Putting it all together requires a holistic assessment:</p><p>Start with the <strong>auditor\'s report</strong> — is it clean? Then examine <strong>accounting policies</strong> — are they conservative or aggressive relative to peers? Check for <strong>consistency</strong> — any unexplained changes in methods or estimates? Analyze <strong>trends</strong> — are accruals growing, is the gap between earnings and cash flow widening?</p><p>Compare the company\'s choices to industry norms: if it capitalizes more, depreciates slower, or recognizes revenue earlier than peers, that\'s a quality concern. The goal is to determine where on the spectrum — from high-quality transparent reporting to potential earnings management — the company falls.</p>'},
{title:'Describe indicators of earnings quality.',explanation:'<p>High-quality earnings have these characteristics:</p><p><strong>Persistent:</strong> driven by recurring, core operations — not one-time items, asset sales, or accounting changes.</p><p><strong>Cash-backed:</strong> earnings closely tracked by operating cash flows. If NI >> CFO consistently, something is accruing that isn\'t converting to cash.</p><p><strong>Conservative recognition:</strong> revenue and expense recognition policies at or more conservative than peers.</p><p><strong>Low accruals:</strong> minimal gap between accrual-based earnings and cash-based earnings. High accruals = more estimation, more room for manipulation, faster mean reversion.</p>'},
{title:'Describe the concept of sustainable (persistent) earnings.',explanation:'<p><span class="key-term">Sustainable earnings</span> are the level of earnings a company can maintain into the future from its ongoing operations. They exclude:</p><p>One-time gains/losses (asset sales, litigation settlements), restructuring charges (supposedly non-recurring but often recurring), effects of accounting changes, below-the-line items (discontinued operations).</p><p>Why it matters: <strong>valuation multiples should be applied to sustainable earnings</strong>. If you apply a 15x P/E to earnings inflated by a one-time gain, you\'ll dramatically overvalue the company. Normalized/sustainable earnings give a truer base for valuation.</p>'},
{title:'Explain mean reversion in earnings and how the accruals component affects the speed of mean reversion.',explanation:'<p><span class="key-term">Mean reversion</span> = abnormally high (or low) earnings tend to return toward a normal level over time. Companies with high ROE attract competition → margins compress. Companies with low ROE restructure or exit → performance improves.</p><div class="formula-box"><span class="label">Earnings = Cash Component + Accruals Component</span>Key finding (Sloan, 1996):\n  The CASH component of earnings is MORE persistent\n  The ACCRUALS component is LESS persistent\n\n→ Companies with high accruals see faster mean reversion\n→ Companies with cash-backed earnings sustain performance longer\n\nAccruals ratio = (NI − CFO) / Average total assets\nHigh ratio → lower quality → faster reversion</div>'},
{title:'Evaluate the earnings quality of a company.',explanation:'<p>To evaluate earnings quality, combine several lenses:</p><p><strong>1. Cash flow vs. earnings:</strong> is CFO consistently near or above NI? If NI >> CFO → accrual-heavy, lower quality.</p><p><strong>2. Accruals analysis:</strong> compute the accruals ratio. Rising over time → concern. Compare to peers.</p><p><strong>3. Revenue quality:</strong> is revenue growth backed by unit volume or just price increases? Is receivables growth tracking revenue?</p><p><strong>4. Expense quality:</strong> are expenses being properly matched? Is SG&A declining as a % of revenue (efficiency) or being capitalized (manipulation)?</p><p><strong>5. Recurring vs. non-recurring:</strong> what % of earnings comes from "special items" that management calls one-time? If it\'s every year, it\'s not one-time.</p>'},
{title:'Evaluate the cash flow quality of a company.',explanation:'<p>Cash flow quality assessment:</p><p><strong>Source:</strong> is CFO coming from actual operations (collecting from customers, paying suppliers) or from working capital manipulation (stretching payables, securitizing receivables)?</p><p><strong>Sustainability:</strong> can the CFO level be maintained? One-time sources (liquidating inventory, delaying payments) inflate CFO temporarily.</p><p><strong>Classification:</strong> check for items that may be misclassified. Some companies move operating outflows to investing (capitalizing expenses) or financing (factoring receivables as "borrowing").</p><p><strong>CFO/NI ratio:</strong> should be ≥ 1 over time. Persistent values < 1 → earnings are accruing but not converting to cash — a major quality red flag.</p>'},
{title:'Describe indicators of balance sheet quality.',explanation:'<p>A high-quality balance sheet has:</p><p><strong>Assets not overstated:</strong> timely impairments, conservative inventory valuation (no obsolete stock carried at cost), receivables reflecting collectability (adequate allowances), intangibles/goodwill properly tested.</p><p><strong>Liabilities not understated:</strong> all obligations on the balance sheet (watch for off-BS leases, guarantees, purchase commitments, underfunded pensions). Adequate reserves for litigation, warranties, environmental liabilities.</p><p><strong>Completeness:</strong> special purpose entities consolidated when appropriate. Derivative positions properly reflected.</p>'},
{title:'Evaluate the balance sheet quality of a company.',explanation:'<p>Evaluation steps:</p><p><strong>Asset quality:</strong> What % of assets are "hard" (cash, PP&E) vs. "soft" (goodwill, deferred tax assets, capitalized development costs)? High soft-asset proportion → higher write-off risk. Check: goodwill/total assets, intangibles/total assets.</p><p><strong>Off-balance-sheet items:</strong> review notes for operating lease commitments (now mostly on-BS under IFRS 16/ASC 842), unconsolidated VIEs, purchase obligations, contingent liabilities. Calculate adjusted leverage including these items.</p><p><strong>Fair value assumptions:</strong> for Level 2 and Level 3 assets, how sensitive are valuations to assumptions? Large Level 3 portfolios (mark-to-model) are inherently uncertain.</p>'},
{title:'Describe indicators of cash flow quality.',explanation:'<p>Indicators of <strong>high</strong> cash flow quality:</p><p>CFO consistently exceeds NI, cash flows come from the core business (not asset sales classified as operating), working capital changes are stable and predictable, capex levels are sufficient to maintain productive capacity.</p><p>Indicators of <strong>low</strong> cash flow quality:</p><p>CFO boosted by non-sustainable sources (stretching payables, reducing inventory below optimal levels, selling receivables), capex repeatedly below depreciation (asset base deteriorating), large discrepancy between reported CFO and "true" operating cash generation.</p>'},
{title:'Describe sources of information about risk.',explanation:'<p>Risk information comes from multiple sources:</p><p><strong>Financial statements:</strong> leverage ratios, liquidity ratios, interest coverage, debt maturity profile. Off-BS commitments in the notes.</p><p><strong>Auditor\'s report:</strong> going concern opinions, key audit matters, emphasis of matter paragraphs.</p><p><strong>MD&A (Management Discussion & Analysis):</strong> management\'s discussion of risk factors, known trends, uncertainties, and liquidity. Required to discuss material risks.</p><p><strong>Market-based:</strong> credit ratings (Moody\'s, S&P, Fitch), CDS spreads (market-implied default risk), stock price volatility, short interest.</p><p><strong>Regulatory filings:</strong> SEC risk factor disclosures, bank stress test results, insurance regulatory filings.</p>'}
]},

'fsa|integration':{
quickReview:['Framework: define purpose → collect data → analyze (adjust, normalize, compare) → interpret → conclude/recommend.','Reporting choices create comparability issues: capitalize vs. expense, FIFO vs. weighted average, depreciation methods, revenue timing.','Adjustments: operating leases (pre-IFRS 16), pension obligations, stock-based compensation, non-recurring items.','Accounting changes affect trends: compare old vs. new basis before drawing conclusions from ratio shifts.','Modifications: normalize earnings (remove one-time items), adjust BS for off-BS items, reclassify cash flow items for better comparability.'],
analogy:'Integration of FSA techniques is like being a <em>forensic detective assembling a crime scene</em>. Each financial statement is a witness with its own perspective. The balance sheet tells you what\'s there now, the income statement tells you what happened, and the cash flow statement tells you what\'s real. Your job is to cross-reference all three, spot inconsistencies, adjust for distortions, and piece together the true story — then present your case.',
los:[
{title:'Demonstrate the use of a framework for analysis of financial statements, given a particular problem, question, or purpose.',explanation:'<p>The analytical framework adapts to the question being asked:</p><p><strong>Equity valuation (comparables):</strong> standardize accounting policies across peers, normalize earnings, calculate multiples on a comparable basis. Adjust for differences in capitalization vs. expensing, revenue recognition timing, pension accounting.</p><p><strong>Credit analysis:</strong> focus on leverage, coverage, and liquidity ratios. Adjust for off-balance-sheet obligations. Stress-test under downside scenarios.</p><p><strong>Comprehensive leverage picture:</strong> add operating leases, pension deficits, purchase commitments, and guarantees to reported debt. Recalculate D/E and coverage ratios.</p><p><strong>Management credibility:</strong> compare MD&A forward guidance with subsequent results. Check if accounting estimates (reserve levels, depreciation lives) are consistently aggressive.</p>'},
{title:'Identify financial reporting choices and biases that affect quality and comparability, and explain how they may affect financial decisions.',explanation:'<p>Common choices that undermine comparability:</p><p><strong>Revenue:</strong> percentage of completion vs. completed contract (IFRS converging, but judgment remains). Gross vs. net revenue recognition for intermediaries.</p><p><strong>Expenses:</strong> capitalize vs. expense development costs (IFRS allows capitalization; US GAAP generally expenses). Different depreciation methods and useful life estimates. FIFO vs. weighted average for inventory.</p><p><strong>Classification:</strong> interest paid in CFO (US GAAP) vs. choice of CFO or CFF (IFRS). Similar flexibility for interest and dividends received.</p><p>These choices can make an aggressive company look more profitable, less leveraged, and more cash-generative than a conservative peer — leading to flawed valuation, credit, and investment decisions if not adjusted.</p>'},
{title:'Evaluate the quality of a company\'s financial data and recommend adjustments to improve quality and comparability.',explanation:'<p>Adjustment categories:</p><p><strong>Standardize accounting methods:</strong> if Company A uses FIFO and Company B uses weighted average, adjust inventory and COGS to a common basis. If one capitalizes development costs and the other expenses them, adjust to a common policy.</p><p><strong>Remove non-recurring items:</strong> strip out restructuring charges, asset sale gains, litigation settlements. Calculate "clean" operating earnings.</p><p><strong>Adjust for off-BS items:</strong> capitalize remaining operating leases if significant and not already on-BS. Add unfunded pension obligations to debt.</p><p><strong>Normalize:</strong> use mid-cycle earnings for cyclical companies. Adjust for unsustainable margins or one-time tax benefits. The goal: make the numbers reflect ongoing economic reality.</p>'},
{title:'Evaluate how a given change in accounting standards, methods, or assumptions affects financial statements and ratios.',explanation:'<p>When an accounting change occurs (new standard adoption, voluntary method change, or estimate revision), the analyst must:</p><p><strong>1. Understand the mechanical impact:</strong> what line items change and by how much? Example: IFRS 16 moved operating leases onto the BS → higher assets, higher liabilities, higher EBITDA, lower lease expense but higher depreciation + interest.</p><p><strong>2. Assess trend distortion:</strong> does the change make prior periods non-comparable? Were prior periods restated, or was a cumulative adjustment applied? Analysts may need to manually restate prior periods for apples-to-apples comparison.</p><p><strong>3. Evaluate management motivation:</strong> was the change required by a new standard, or voluntary? Voluntary changes toward more aggressive policies are a red flag.</p>'},
{title:'Analyze and interpret how balance sheet modifications, earnings normalization, and cash flow modifications affect financial statements, ratios, and overall financial condition.',explanation:'<p>The integration step: combine all adjustments and assess the overall picture:</p><p><strong>Balance sheet modifications:</strong> adding off-BS liabilities (pensions, leases, guarantees) to reported figures. Reclassifying items for analytical purposes. Impact: leverage ratios typically worsen, asset quality metrics change.</p><p><strong>Earnings normalization:</strong> removing one-time items, adjusting for accounting changes, calculating sustainable operating earnings. Impact: often lowers "headline" earnings but gives a truer base for valuation multiples.</p><p><strong>Cash flow modifications:</strong> reclassifying items for comparability (e.g., moving SBC addback out of CFO, adjusting for cash flow from securitizations). Impact: often lowers reported CFO but reflects true operating cash generation.</p><p>The integrated view typically reveals a less flattering but more accurate picture — which is exactly what investors need for sound decisions.</p>'}
]},
