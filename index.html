'econ|fx':{
quickReview:['Bid-offer spread: bid is dealer\'s buying price, offer is selling price. Spread widens with volatility, illiquidity, and emerging-market currencies.','Triangular arbitrage: convert through three currencies to exploit mispricing. Profit = difference between the two paths around the triangle.','Forward premium/discount: F > S → base currency trades at a forward premium (its interest rate is lower).','Covered Interest Rate Parity (CIP): F/S = (1+i_d)/(1+i_f). Enforced by arbitrage — almost always holds.','Uncovered IRP: E(S₁)/S₀ = (1+i_d)/(1+i_f). Relies on expectations — frequently violated (carry trade profits).','PPP: exchange rates adjust so identical goods cost the same across countries. Relative PPP links inflation differentials to currency depreciation.','Carry trade: borrow low-yield currency, invest in high-yield. Profits when uncovered IRP fails — but crash risk is severe.','Balance of payments: current account deficits → capital inflows needed → currency pressure depends on sustainability.'],
analogy:'Currency markets are like a <em>balance scale with weights on both sides</em>. Interest rates, inflation, and trade flows are the weights. Covered interest parity says the scale must balance (arbitrage ensures it). Uncovered interest parity says it <em>should</em> balance, but in practice the scale tips — which is why carry trades can be profitable (until the scale suddenly snaps back).',
los:[
{title:'Calculate and interpret the bid–offer spread on a spot or forward currency quotation and describe factors affecting the spread.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Bid-Offer Spread</div><div class="formula-highlight-body">$$\\text{Spread} = \\text{Offer} - \\text{Bid}$$\n$$\\%\\text{ Spread} = \\frac{\\text{Offer} - \\text{Bid}}{\\text{Offer}} \\times 100$$\nExample: EUR/USD bid 1.0845, offer 1.0850\n$$\\text{Spread} = 0.0005 = 5 \\text{ pips}$$\n$$\\%\\text{ Spread} = \\frac{5}{10{,}850} = 0.046\\%$$</div><div class="formula-highlight-note">The bid is what the dealer pays for the base currency; the offer is what the dealer charges. You always transact at the worse price.</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🌊</div><div class="lo-icon-card-title">Volatility</div><div class="lo-icon-card-desc">Higher uncertainty → dealer demands wider spread for risk</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏜️</div><div class="lo-icon-card-title">Liquidity</div><div class="lo-icon-card-desc">Exotic/EM currencies have wider spreads than EUR/USD or USD/JPY</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📦</div><div class="lo-icon-card-title">Trade Size</div><div class="lo-icon-card-desc">Very large or very small orders → wider spreads</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🕐</div><div class="lo-icon-card-title">Time of Day</div><div class="lo-icon-card-desc">Off-hours (low overlap between sessions) → wider spreads</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Forward spreads</strong> are wider than spot spreads because they embed additional uncertainty about future interest rate differentials.</div></div>'},
{title:'Identify a triangular arbitrage opportunity and calculate its profit, given bid–offer quotations for three currencies.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">1</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Start with Currency A</div><div class="lo-step-desc">e.g., begin with $1,000,000 USD</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">2</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Convert A → B</div><div class="lo-step-desc">Sell USD, buy EUR at the dealer\'s offer for EUR (you buy at the ask)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">3</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Convert B → C</div><div class="lo-step-desc">Sell EUR, buy GBP using EUR/GBP bid rate (you sell at the bid)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">4</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Convert C → A</div><div class="lo-step-desc">Sell GBP, buy USD using GBP/USD bid rate</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">5</div></div><div class="lo-step-body"><div class="lo-step-title">Compare</div><div class="lo-step-desc">If ending USD > $1,000,000 → arbitrage profit. Try both directions!</div></div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Key rule:</strong> When <em>selling</em> a currency, use the <strong>bid</strong>. When <em>buying</em>, use the <strong>offer (ask)</strong>. You always transact at the price that favors the dealer. Try BOTH directions around the triangle — only one may be profitable.</div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🔺</div><div class="lo-mini-analogy-text">Like price differences between three shops — if buying in shop A, converting at shop B, and selling at shop C yields more than you started with, there\'s an arbitrage. The triangle "leaks" profit because the three pairs are momentarily inconsistent.</div></div>'},
{title:'Explain spot and forward rates and calculate the forward premium/discount for a given currency.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Rate</div><div>Definition</div><div>Settlement</div></div><div class="lo-compare-row lo-compare-3"><div>📍 Spot Rate (S)</div><div>Current exchange rate for immediate delivery</div><div>T+2 business days</div></div><div class="lo-compare-row lo-compare-3"><div>📅 Forward Rate (F)</div><div>Locked-in rate for future delivery</div><div>Any agreed future date (30d, 90d, 1yr…)</div></div></div><div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Forward Premium/Discount</div><div class="formula-highlight-body">$$F premium (base) = (F - S) / S \\times (\\frac{360}{days}) \\times 100$$</div><div class="formula-highlight-note">F > S → base currency at forward premium (its interest rate is lower). F < S → forward discount. The forward rate reflects interest rate differentials, NOT a forecast of future spot.</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Scenario</div><div>Forward vs. Spot</div><div>Interest Rate Relationship</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">Premium</div><div>F > S</div><div>Base currency rate < price currency rate</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">Discount</div><div>F < S</div><div>Base currency rate > price currency rate</div></div></div>'},
{title:'Calculate the mark-to-market value of a forward contract.',explanation:'<div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 Mark-to-Market Value (Long Party)</div><div class="formula-highlight-body">$$V_t = (FP_t - FP_0) \\times contract \\frac{size}{1 + r \\times \\frac{days}{360}}$$</div><div class="formula-highlight-note">FPₜ = current forward price for remaining maturity | FP₀ = original contracted price | r = discount rate | days = remaining to settlement</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Find the New Forward Rate</div><div class="lo-step-desc">Get the current forward rate for the remaining time to maturity (not the original maturity)</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Calculate the Gain/Loss</div><div class="lo-step-desc">Difference between new forward price and your locked-in price × contract size</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div></div><div class="lo-step-body"><div class="lo-step-title">Discount to Present Value</div><div class="lo-step-desc">Discount the gain/loss at the appropriate rate for the remaining days</div></div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🎟️</div><div class="lo-mini-analogy-text">Like a concert ticket bought early: if the show sells out, your ticket has positive value (you could sell it for more). The mark-to-market is the PV of what you\'d gain by closing your position today.</div></div>'},
{title:'Explain international parity conditions: covered and uncovered interest rate parity, forward rate parity, purchasing power parity, and the international Fisher effect.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Parity</div><div>Formula</div><div>Links</div><div>Holds?</div></div><div class="lo-compare-row lo-compare-4"><div>🔒 CIP</div><div>$$F/S = (1+i_a)/(1+i_b)$$</div><div>Spot, forward, interest rates</div><div style="color:#10B981;font-weight:700">Yes — arbitrage enforced</div></div><div class="lo-compare-row lo-compare-4"><div>🔓 UIP</div><div>$$E(S_1)/S_0 = (1+i_a)/(1+i_b)$$</div><div>Expected spot, interest rates</div><div style="color:#EF4444;font-weight:700">Often fails (carry trade)</div></div><div class="lo-compare-row lo-compare-4"><div>📅 Forward Rate Parity</div><div>$$F = E(S_1)$$</div><div>Forward rate = expected future spot</div><div style="color:#F59E0B;font-weight:700">Weak — poor predictor</div></div><div class="lo-compare-row lo-compare-4"><div>🛒 Relative PPP</div><div>%ΔS ≈ πₐ − π_b</div><div>Exchange rates, inflation</div><div style="color:#F59E0B;font-weight:700">Long-run only (decades)</div></div><div class="lo-compare-row lo-compare-4"><div>🎣 Int\'l Fisher</div><div>$$i_a - i_b = E(\\pi_a) - E(\\pi_b)$$</div><div>Interest rates, expected inflation</div><div style="color:#F59E0B;font-weight:700">Approximately, long-run</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The chain:</strong> CIP links spot↔forward↔interest rates. UIP links spot expectations↔interest rates. PPP links exchange rates↔inflation. Fisher links interest rates↔inflation. If any two hold, the others logically follow.</div></div>'},
{title:'Describe relations among the international parity conditions.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">CIP ↔ UIP</div><div class="lo-icon-card-desc">CIP uses the forward rate; UIP substitutes the expected future spot. If $$F = E(S_1)$$, both give the same result</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">UIP ↔ PPP</div><div class="lo-icon-card-desc">UIP links rates to expected FX changes; PPP links inflation to FX changes. Combined via the Fisher effect</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔗</div><div class="lo-icon-card-title">Fisher ↔ PPP</div><div class="lo-icon-card-desc">If real rates equalize (Fisher) and PPP holds, then nominal rate differentials = expected inflation differentials</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Condition</div><div>Empirical Evidence</div><div>Practical Implication</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">CIP</div><div>Holds tightly (arbitrage-enforced)</div><div>Used for pricing forwards — no free lunch here</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">PPP</div><div>Holds over decades, fails short-term</div><div>Useful for long-run equilibrium estimates only</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">UIP</div><div>Frequently violated — empirically reversed</div><div>Why carry trades can be profitable</div></div></div>'},
{title:'Evaluate the use of the current spot rate, forward rate, PPP, and uncovered interest parity to forecast future spot exchange rates.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>Approach</div><div>Best Horizon</div><div>Verdict</div></div><div class="lo-compare-row lo-compare-4"><div>📍 Spot Rate</div><div>Assume no change (random walk)</div><div>Short-term (days–weeks)</div><div style="color:#10B981;font-weight:700">Surprisingly competitive — hard to beat</div></div><div class="lo-compare-row lo-compare-4"><div>📅 Forward Rate</div><div>CIP-derived; reflects hedging cost</div><div>Short-term</div><div style="color:#F59E0B;font-weight:700">Consistent with rates but poor predictor</div></div><div class="lo-compare-row lo-compare-4"><div>🛒 PPP</div><div>Equilibrium from inflation differentials</div><div>Long-run (5–10 years)</div><div style="color:#F59E0B;font-weight:700">Useful anchor; useless short-term</div></div><div class="lo-compare-row lo-compare-4"><div>🔓 UIP</div><div>Expected depreciation = rate differential</div><div>Should work all horizons</div><div style="color:#EF4444;font-weight:700">Empirically reversed short-term</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Bottom line:</strong> No method reliably forecasts FX rates. Short-term is nearly a random walk. Long-term gravitates toward PPP. The forward rate is a hedging cost, not a crystal ball.</div></div>'},
{title:'Explain approaches to assessing the long-run fair value of an exchange rate.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Approach</div><div>How It Works</div><div>Strengths & Limits</div></div><div class="lo-compare-row lo-compare-3"><div>⚖️ Macroeconomic Balance</div><div>Estimate the FX rate that would bring the current account to a "sustainable" level given economic fundamentals</div><div>Intuitive; model-dependent, "sustainable" is debatable</div></div><div class="lo-compare-row lo-compare-3"><div>🏦 External Sustainability</div><div>Calculate the FX rate needed to stabilize the country\'s net foreign asset/liability position (or bring it to a target)</div><div>Forward-looking; target NFA position is subjective</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Reduced-Form Econometric</div><div>Regress real exchange rates on fundamentals (terms of trade, productivity, NFA, gov spending)</div><div>Data-driven; sensitive to model specification and sample period</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>All three</strong> are better at identifying <em>large misalignments</em> (±20%+) than precise fair values. Most useful for sovereign wealth funds, central banks, and long-horizon asset allocators.</div></div>'},
{title:'Describe the carry trade and its relation to UIP and calculate carry trade profit.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Carry Trade Return</div><div class="formula-highlight-body">$$Return \\approx (i_high - i_low) + \\%\\DeltaS (high-yield currency)$$</div><div class="formula-highlight-note">If UIP held: %ΔS would exactly offset the interest differential → zero profit. In practice: UIP fails → carry trades are often profitable.</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#EF4444">1</div><div class="lo-step-connector" style="background:#EF4444;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Borrow Low-Yield Currency (e.g., JPY at 0.5%)</div><div class="lo-step-desc">Take a loan denominated in the funding currency</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">2</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Convert & Invest in High-Yield Currency (e.g., AUD at 4.5%)</div><div class="lo-step-desc">Convert JPY → AUD at spot, invest at the higher rate</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div></div><div class="lo-step-body"><div class="lo-step-title">Earn the Spread (4.0%) ± FX Change</div><div class="lo-step-desc">If AUD doesn\'t depreciate (or appreciates), you pocket the interest differential plus any FX gain</div></div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>"Up the stairs, down the elevator"</strong> — carry trades earn slow, steady gains, then suffer sudden catastrophic losses when the high-yield currency crashes. The distribution has negative skew and fat tails — exactly the kind of risk VaR underestimates.</div></div>'},
{title:'Explain how balance of payments flows affect currency exchange rates.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📦</div><div class="lo-icon-card-title">Current Account</div><div class="lo-icon-card-desc">Trade in goods/services, income, transfers. Deficit → sell domestic currency to buy imports → downward pressure</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Capital/Financial Account</div><div class="lo-icon-card-desc">Investment inflows/outflows. CA deficit must be financed by capital inflows — FDI, portfolio investment, bank lending</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Financing Source</div><div>Stability</div><div>Currency Implication</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ FDI (factories, acquisitions)</div><div style="color:#10B981;font-weight:700">High — sticky, long-term</div><div>Supports currency even with CA deficit</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Portfolio Investment (stocks, bonds)</div><div style="color:#F59E0B;font-weight:700">Medium — can reverse</div><div>Vulnerable to sentiment shifts</div></div><div class="lo-compare-row lo-compare-3"><div>🏦 Short-Term Bank Lending</div><div style="color:#EF4444;font-weight:700">Low — "hot money"</div><div>Fragile; sudden stops → currency crisis</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">⚖️</div><div class="lo-mini-analogy-text">The BoP always balances (CA deficit = capital surplus). The question is <em>how</em> it balances: a deficit funded by stable FDI is a company borrowing to invest; a deficit funded by hot money is a company borrowing to pay rent.</div></div>'},
{title:'Explain the potential effects of monetary and fiscal policy on exchange rates.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Policy</div><div>Mechanism</div><div>Short-Run FX Effect</div><div>Complications</div></div><div class="lo-compare-row lo-compare-4"><div>🕊️ Expansionary Monetary</div><div>↓ rates → capital outflows</div><div style="color:#EF4444;font-weight:700">Depreciation</div><div>May boost growth expectations → attract equity inflows (partial offset)</div></div><div class="lo-compare-row lo-compare-4"><div>🦅 Restrictive Monetary</div><div>↑ rates → attract foreign capital</div><div style="color:#10B981;font-weight:700">Appreciation</div><div>May slow economy → reduce equity appeal long-term</div></div><div class="lo-compare-row lo-compare-4"><div>💸 Expansionary Fiscal</div><div>↑ growth + ↑ deficits → ↑ rates (crowding out)</div><div style="color:#F59E0B;font-weight:700">Ambiguous</div><div>Short-term: appreciate (higher rates). Long-term: depreciate (debt concerns)</div></div><div class="lo-compare-row lo-compare-4"><div>✂️ Restrictive Fiscal</div><div>↓ deficits → ↓ borrowing needs</div><div style="color:#F59E0B;font-weight:700">Ambiguous</div><div>Lower rates → depreciate, but improved sustainability → appreciate</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Mundell-Fleming model:</strong> The net effect depends on <em>capital mobility</em> (high vs. low) and <em>exchange rate regime</em> (fixed vs. floating). With high capital mobility and floating rates: monetary policy is powerful for FX; fiscal policy effects are partially offset by FX changes.</div></div>'},
{title:'Describe objectives of central bank intervention and capital controls, and describe their effectiveness.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Tool</div><div>How It Works</div><div>Effectiveness</div></div><div class="lo-compare-row lo-compare-3"><div>🏦 Sterilized Intervention</div><div>Buy/sell FX AND offset the money supply impact (e.g., sell bonds to mop up liquidity)</div><div style="color:#EF4444;font-weight:700">Largely ineffective — doesn\'t change fundamentals. May work via signaling</div></div><div class="lo-compare-row lo-compare-3"><div>🏦 Unsterilized Intervention</div><div>Buy/sell FX and LET the money supply change</div><div style="color:#F59E0B;font-weight:700">More effective — actually changes monetary conditions. But sacrifices monetary independence</div></div><div class="lo-compare-row lo-compare-3"><div>🚧 Capital Controls</div><div>Restrict cross-border flows: taxes on inflows, limits on outflows, minimum holding periods</div><div style="color:#F59E0B;font-weight:700">Short-term breathing room. Create distortions, signal weakness, reduce efficiency</div></div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">Reduce Volatility</div><div class="lo-icon-card-desc">Smooth short-term FX swings without targeting a level</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🛡️</div><div class="lo-icon-card-title">Resist Misalignment</div><div class="lo-icon-card-desc">Lean against speculative overshoot</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💎</div><div class="lo-icon-card-title">Build Reserves</div><div class="lo-icon-card-desc">Accumulate FX reserves as insurance against future crises</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🏭</div><div class="lo-icon-card-title">Maintain Competitiveness</div><div class="lo-icon-card-desc">Prevent appreciation from hurting export sector</div></div></div>'},
{title:'Describe warning signs of a currency crisis.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">CA Deficit</div><div class="lo-icon-card-desc">Large and growing current account deficit relative to GDP</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💳</div><div class="lo-icon-card-title">Fiscal Deficit</div><div class="lo-icon-card-desc">Government spending far exceeds revenue → unsustainable borrowing</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏦</div><div class="lo-icon-card-title">Declining Reserves</div><div class="lo-icon-card-desc">Central bank burning reserves to defend the peg — finite ammunition</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Overvalued Real FX Rate</div><div class="lo-icon-card-desc">Significantly above PPP — competitiveness eroding</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔥</div><div class="lo-icon-card-title">Credit Boom</div><div class="lo-icon-card-desc">Rapid domestic credit growth → asset bubbles → banking fragility</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🏃</div><div class="lo-icon-card-title">Hot Money Dependence</div><div class="lo-icon-card-desc">CA deficit financed by short-term capital flows that can reverse instantly</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Structural trigger:</strong> fixed or pegged exchange rate with inconsistent domestic policies (loose fiscal/monetary policy + peg = ticking bomb). Add capital account liberalization without strong institutions, and you have the recipe for every major FX crisis (1997 Asia, 1998 Russia, 2001 Argentina, 2018 Turkey). Crises arrive suddenly after long periods of stability — the "this time is different" phase.</div></div>'}
]},

'econ|growth':{
quickReview:['Growth factors: labor force growth, capital accumulation, and total factor productivity (TFP/technology).','Sustainable growth rate of equity market ≈ GDP growth rate long-term. Matters for equity and bond investors.','Capital deepening (more capital per worker) faces diminishing returns. Technological progress does not.','Solow (neoclassical): growth converges to steady state driven by savings and population. Only tech sustains long-run per-capita growth.','Endogenous growth theory: R&D and human capital investment generate self-sustaining growth without diminishing returns.','Convergence hypothesis: poorer countries grow faster than rich ones (conditional on similar institutions).','Trade liberalization: raises productivity via specialization, but creates winners and losers (displacement).'],
analogy:'Economic growth is like <em>filling a swimming pool</em>. Capital deepening is adding more hoses (more capital per worker) — it helps at first, but eventually the hoses get in each other\'s way (diminishing returns). Technological progress is like increasing the water pressure in every hose — it never runs into diminishing returns and is the only way to keep filling the pool faster indefinitely.',
los:[
{title:'Compare factors favoring and limiting economic growth in developed and developing economies.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Factor</div><div>Developing — Favoring</div><div>Developing — Limiting</div><div>Developed</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Capital</div><div style="color:#10B981;font-weight:700">Capital-scarce → high marginal returns to investment</div><div style="color:#EF4444">Weak financial systems → poor capital allocation</div><div>Diminishing returns → lower marginal product</div></div><div class="lo-compare-row lo-compare-4"><div>👥 Demographics</div><div style="color:#10B981;font-weight:700">Young population → growing workforce</div><div style="color:#EF4444">Low human capital, brain drain</div><div>Aging populations → shrinking workforce + fiscal burden</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Technology</div><div style="color:#10B981;font-weight:700">Can adopt existing tech (leap-frog)</div><div style="color:#EF4444">Low absorptive capacity, IP barriers</div><div>At the frontier → must innovate (harder, slower)</div></div><div class="lo-compare-row lo-compare-4"><div>🏛️ Institutions</div><div style="color:#10B981;font-weight:700">Catch-up potential if reforms succeed</div><div style="color:#EF4444">Corruption, weak rule of law, instability</div><div>Strong institutions, but regulatory burden may slow dynamism</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏃</div><div class="lo-mini-analogy-text">Developing economies are like sprinters starting far behind — they can close the gap quickly by copying what leaders do. Developed economies are lead runners — already fast, and every marginal improvement is harder to find.</div></div>'},
{title:'Describe the relation between long-run stock market appreciation and sustainable economic growth rate.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Long-Run Equity Returns</div><div class="formula-highlight-body">$$E(R_equity) \\approx Nominal GDP Growth + Dividend Yield$$</div><div class="formula-highlight-note">Example: 5% nominal GDP growth + 2% dividend yield ≈ 7% long-run equity return. This is the ceiling for sustainable aggregate earnings growth.</div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Key insight:</strong> Earnings can grow faster than GDP temporarily (rising profit margins, share buybacks, new listings), but not forever. Terminal growth rates in DCF models above sustainable GDP growth implicitly assume an ever-rising profit share — which is unrealistic.</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">GDP Sets the Speed Limit</div><div class="lo-icon-card-desc">Aggregate corporate profits can\'t grow faster than the economy forever</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Dilution Matters</div><div class="lo-icon-card-desc">New share issuance dilutes existing holders — per-share growth < aggregate growth</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Country ≠ Market</div><div class="lo-icon-card-desc">Multinationals earn abroad; local GDP may not reflect index earnings</div></div></div>'},
{title:'Explain why potential GDP and its growth rate matter for equity and fixed income investors.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Investor Type</div><div>Why Potential GDP Matters</div><div>Key Implications</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Equity Investors</div><div>Potential GDP growth drives long-run earnings growth</div><div>Higher potential growth → higher justified P/E ratios, higher terminal values</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Fixed Income Investors</div><div>Potential growth influences the equilibrium real rate (r*)</div><div>Higher potential growth → higher neutral rates → higher bond yields</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Output gap</strong> = Actual GDP − Potential GDP. Positive gap (overheating) → inflation pressure → central bank tightening → bond prices fall, equity multiples compress. Negative gap (slack) → disinflation → easing → lower rates, higher multiples.</div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🛣️</div><div class="lo-mini-analogy-text">Potential GDP is the speed limit on the economic highway. Drive above it → you get a speeding ticket (inflation). Drive below it → wasted capacity (unemployment). Investors need to know the speed limit to position for the policy response.</div></div>'},
{title:'Contrast capital deepening and technological progress and explain how each affects growth and labor productivity.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Growth Accounting Equation</div><div class="formula-highlight-body">$$\\frac{\\Delta Y}{Y} = \\frac{\\Delta A}{A} + \\alpha\\cdot (\\frac{\\Delta K}{K}) + (1-\\alpha)\\cdot (\\frac{\\Delta L}{L})$$\nLabor productivity growth:\n$$\\Delta(\\frac{Y}{L}) = \\frac{\\Delta A}{A} + \\alpha\\cdot \\Delta(\\frac{K}{L})$$</div><div class="formula-highlight-note">A = TFP | K = capital | L = labor | α = capital\'s share of output (~0.3 typically)</div></div><div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Growth Source</div><div>Mechanism</div><div>Diminishing Returns?</div><div>Analogy</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ Capital Deepening</div><div>↑ K per worker → ↑ output per worker</div><div style="color:#EF4444;font-weight:700">Yes — each extra machine adds less</div><div>Adding more hoses to fill a pool — they crowd each other</div></div><div class="lo-compare-row lo-compare-4"><div>💡 Technological Progress (TFP)</div><div>↑ output from ANY given K and L combination</div><div style="color:#10B981;font-weight:700">No — the only source of sustained per-capita growth</div><div>Increasing water pressure — every hose becomes more effective</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Why this matters:</strong> Countries that grow solely via capital deepening (e.g., Soviet Union) eventually hit a wall. Only those that also improve TFP (technology + efficiency) achieve sustained living standard improvements.</div></div>'},
{title:'Demonstrate forecasting potential GDP based on growth accounting relations.',explanation:'<div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 Two Methods to Forecast Growth</div><div class="formula-highlight-body">Method 1 — Labor Productivity Approach:\n$$\\frac{\\Delta Y}{Y} = \\frac{\\Delta L}{L} + \\frac{\\Delta(\\frac{Y)}{L})}{\\frac{Y}{L}}$$\n$$= labor force growth + labor productivity growth$$\nMethod 2 — Growth Accounting:\n$$\\frac{\\Delta Y}{Y} = \\frac{\\Delta A}{A} + \\alpha\\cdot (\\frac{\\Delta K}{K}) + (1-\\alpha)\\cdot (\\frac{\\Delta L}{L})$$</div></div><div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">1</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Estimate Input Growth</div><div class="lo-step-desc">Project labor force growth (demographics), capital stock growth (investment rates), and TFP trend</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">2</div><div class="lo-step-connector" style="background:#3B82F6;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Apply Weights</div><div class="lo-step-desc">α ≈ 0.3 for capital, (1−α) ≈ 0.7 for labor in most developed economies</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#3B82F6">3</div></div><div class="lo-step-body"><div class="lo-step-title">Sum the Components</div><div class="lo-step-desc">e.g., TFP 1% + 0.3×3%(capital) + 0.7×1%(labor) = 1% + 0.9% + 0.7% = <strong>2.6%</strong></div></div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>TFP is the residual:</strong> in practice, TFP growth is calculated as the "Solow residual" — the growth left over after accounting for capital and labor contributions. It captures technology, efficiency, institutional quality, and measurement error.</div></div>'},
{title:'Explain how natural resources affect economic growth and evaluate the argument that limited resources constrain growth.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🏭</div><div class="lo-icon-card-title">Dutch Disease</div><div class="lo-icon-card-desc">Resource exports → real exchange rate appreciation → manufacturing sector hollowed out</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">👑</div><div class="lo-icon-card-title">Rent-Seeking</div><div class="lo-icon-card-desc">Easy resource wealth attracts corruption and conflict over rents rather than productive activity</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🎢</div><div class="lo-icon-card-title">Volatility</div><div class="lo-icon-card-desc">Commodity price swings → boom-bust cycles → difficult to plan long-term investment</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Institutional Decay</div><div class="lo-icon-card-desc">Governments funded by resource rents → less accountable to citizens → weaker institutions</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Do finite resources cap growth?</strong> No — history shows substitution, efficiency gains, and innovation overcome scarcity. Commodity prices have trended <em>down</em> in real terms over centuries. The binding constraint is almost always institutions and policy, not geology. Norway and Botswana show resources can be a blessing with the right institutions.</div></div>'},
{title:'Explain how demographics, immigration, and labor force participation affect economic growth rate and sustainability.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Factor</div><div>Mechanism</div><div>Growth Impact</div><div>Example</div></div><div class="lo-compare-row lo-compare-4"><div>👶 Demographics</div><div>Working-age population growth → direct labor input increase</div><div style="color:#10B981;font-weight:700">Young population → growth tailwind</div><div>India\'s demographic dividend vs. Japan\'s aging crisis</div></div><div class="lo-compare-row lo-compare-4"><div>✈️ Immigration</div><div>Adds workers + expands tax base; skilled immigrants boost productivity</div><div style="color:#10B981;font-weight:700">Offsets aging; enriches human capital</div><div>US/Canada tech sector; Gulf states\' labor force</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Participation Rate</div><div>% of working-age population actually in the labor force</div><div style="color:#3B82F6;font-weight:700">Rising participation → growth boost</div><div>Rising female participation; later retirement ages</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Aging population double hit:</strong> (1) Shrinking workforce directly lowers ΔL/L in the growth equation. (2) Rising dependency ratio (retirees/workers) → fiscal pressure from pensions and healthcare → higher taxes or deficits → crowding out investment.</div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">⏳</div><div class="lo-mini-analogy-text">Demographics are the slowest-moving but most predictable force in economics. Today\'s birth rates determine the labor force in 20 years — like watching a glacier approach. Immigration is the pressure valve that can speed it up or slow it down.</div></div>'},
{title:'Explain how investment in physical capital, human capital, and technological development affects economic growth.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏗️</div><div class="lo-icon-card-title">Physical Capital</div><div class="lo-icon-card-desc">Infrastructure, factories, equipment. Essential but faces diminishing returns. Highest impact in capital-scarce developing economies.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🎓</div><div class="lo-icon-card-title">Human Capital</div><div class="lo-icon-card-desc">Education, training, health. Raises labor productivity and innovation capacity. ROI highest in primary/secondary education for developing nations.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔬</div><div class="lo-icon-card-title">Technological Development</div><div class="lo-icon-card-desc">The ultimate growth driver. Non-rival and non-diminishing. Requires R&D, IP protection, universities, venture capital, and openness to ideas.</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Investment Type</div><div>Diminishing Returns?</div><div>Key Requirement</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Physical Capital</div><div style="color:#EF4444;font-weight:700">Yes — additional machines add less each time</div><div>Efficient financial system to allocate capital well</div></div><div class="lo-compare-row lo-compare-3"><div>🎓 Human Capital</div><div style="color:#F59E0B;font-weight:700">Partially — basic education has huge returns, advanced less clear</div><div>Quality education systems, healthcare, nutrition</div></div><div class="lo-compare-row lo-compare-3"><div>🔬 Technology</div><div style="color:#10B981;font-weight:700">No — knowledge spillovers generate increasing returns</div><div>Strong institutions (patents, academic freedom, VC ecosystem)</div></div></div>'},
{title:'Compare classical, neoclassical, and endogenous growth theory.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Theory</div><div>Key Mechanism</div><div>Long-Run Prediction</div><div>Policy Implication</div></div><div class="lo-compare-row lo-compare-4"><div>📜 Classical (Malthus)</div><div>Population growth → resources per capita shrink</div><div style="color:#EF4444;font-weight:700">Stagnation at subsistence</div><div>None — doom is inevitable (proven wrong)</div></div><div class="lo-compare-row lo-compare-4"><div>📐 Neoclassical (Solow)</div><div>Savings → capital accumulation, but diminishing returns</div><div style="color:#F59E0B;font-weight:700">Steady state; only exogenous tech sustains per-capita growth</div><div>Savings rate affects level, not long-run growth rate. Convergence expected.</div></div><div class="lo-compare-row lo-compare-4"><div>🚀 Endogenous (Romer/Lucas)</div><div>R&D + human capital → knowledge spillovers → increasing returns</div><div style="color:#10B981;font-weight:700">Self-sustaining growth — no diminishing returns on knowledge</div><div>Government policy matters hugely: R&D subsidies, education, IP protection</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Critical distinction:</strong> In Solow, technology falls from the sky (exogenous) and there\'s natural convergence. In endogenous theory, technology is a <em>choice</em> driven by incentives — and rich countries can keep pulling ahead if they invest in R&D. This explains why the "convergence" predicted by Solow hasn\'t materialized for many developing nations.</div></div>'},
{title:'Explain and evaluate convergence hypotheses.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Hypothesis</div><div>Prediction</div><div>Empirical Support</div><div>Why It Fails/Holds</div></div><div class="lo-compare-row lo-compare-4"><div>🌍 Absolute Convergence</div><div>ALL poor countries grow faster and catch up to rich ones</div><div style="color:#EF4444;font-weight:700">Mostly rejected</div><div>Many poor countries haven\'t converged — institutions, conflict, corruption block catch-up</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 Conditional Convergence</div><div>Countries converge to their OWN steady state (determined by savings, population, institutions)</div><div style="color:#10B981;font-weight:700">Well supported</div><div>Countries with similar fundamentals do converge — controlling for differences resolves the puzzle</div></div><div class="lo-compare-row lo-compare-4"><div>🏘️ Club Convergence</div><div>Countries converge within "clubs" sharing similar initial conditions</div><div style="color:#10B981;font-weight:700">Supported</div><div>Rich democracies converge with each other; failed states converge at lower levels</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏁</div><div class="lo-mini-analogy-text">Absolute convergence says all runners finish at the same speed regardless of training. Conditional convergence says runners with the same training regimen converge — but a couch potato won\'t catch an Olympic athlete just by being further behind.</div></div>'},
{title:'Describe the economic rationale for governments to provide incentives to private investment in technology and knowledge.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔓</div><div class="lo-icon-card-title">Non-Rival</div><div class="lo-icon-card-desc">One firm using knowledge doesn\'t reduce another\'s ability to use it — unlike physical capital</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🌊</div><div class="lo-icon-card-title">Spillovers</div><div class="lo-icon-card-desc">Social return to R&D exceeds private return — ideas leak to competitors, other industries, future inventors</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🆓</div><div class="lo-icon-card-title">Free-Rider Problem</div><div class="lo-icon-card-desc">Firms underinvest because they can\'t capture all the benefits — competitors free-ride on their innovation</div></div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Government Tool</div><div>How It Works</div><div>Creates Incentive By…</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Patent Protection</div><div>Grant temporary monopoly on inventions</div><div>Making knowledge excludable → private returns ↑</div></div><div class="lo-compare-row lo-compare-3"><div>💰 R&D Tax Credits</div><div>Reduce after-tax cost of research</div><div>Lowering the hurdle rate for innovation projects</div></div><div class="lo-compare-row lo-compare-3"><div>🏫 Public Universities</div><div>Government-funded basic research</div><div>Producing knowledge that no single firm would fund</div></div><div class="lo-compare-row lo-compare-3"><div>🏭 Direct Subsidies</div><div>Grants or subsidies for high-tech industries</div><div>Bridging the gap between private and social returns</div></div></div>'},
{title:'Describe the expected impact of removing trade barriers on capital investment, profits, employment, wages, and growth.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Variable</div><div>Short-Term Effect</div><div>Long-Term Effect</div><div>Winners vs. Losers</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ Capital Investment</div><div>Reallocation toward competitive sectors</div><div style="color:#10B981;font-weight:700">↑ Firms scale up for larger markets; FDI rises</div><div>Export-oriented firms invest; protected firms divest</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Profits</div><div>Mixed — competitive firms gain, sheltered firms lose</div><div style="color:#10B981;font-weight:700">↑ Net gain from specialization and scale</div><div>Winners: exporters, consumers. Losers: previously protected industries</div></div><div class="lo-compare-row lo-compare-4"><div>👷 Employment</div><div style="color:#EF4444;font-weight:700">Displacement in protected sectors</div><div style="color:#10B981;font-weight:700">↑ if labor markets flexible</div><div>Workers in competitive sectors gain; displaced workers may suffer</div></div><div class="lo-compare-row lo-compare-4"><div>💵 Wages</div><div>Rise in expanding sectors; fall in contracting</div><div style="color:#10B981;font-weight:700">↑ Average wages (productivity gains)</div><div>Skilled workers in developing countries often gain most</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Growth</div><div>Adjustment costs, transition pain</div><div style="color:#10B981;font-weight:700">↑ via specialization, tech transfer, competition</div><div>Economy-wide gains, but politically difficult transition</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>The core logic:</strong> Trade liberalization is like letting each country do what it\'s best at (comparative advantage). Total output rises, but the gains aren\'t distributed equally — creating political tension even when the net economic effect is positive.</div></div>'}
]},
