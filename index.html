'fi|term-struct':{
quickReview:['Spot rate = YTM on a zero-coupon bond. Forward rate = implied rate between two future dates. YTM = weighted average of spot rates.','Bootstrapping: derive spot rates from the par curve by iteratively stripping coupons.','Rolling down the yield curve: buy longer-maturity bonds and sell before maturity as they "roll" to lower yields (works in upward-sloping, stable curves).','Swap rate curve: preferred over government curve for valuation because it reflects interbank credit risk, has more maturities, and is less affected by supply/demand of government bonds.','Swap spread = swap rate − Treasury yield for same maturity. Reflects credit/liquidity premium.','Theories: pure expectations (forwards = expected future spots), liquidity preference (premium for longer maturities), segmented markets (supply/demand in each segment), preferred habitat (investors will leave segment for sufficient premium).','Key rate durations measure sensitivity to shifts at specific maturities — useful for non-parallel yield curve changes.'],
analogy:'The yield curve is like a <em>hiking trail elevation profile</em>. Spot rates are the actual elevation at each point. Forward rates are the slope between two points — they tell you how steep the climb is from here to there. Rolling down the yield curve is like walking downhill — you gain altitude for free if the trail stays the same shape. The expectations theory says the trail\'s current shape predicts future terrain; the liquidity preference theory says hikers demand extra reward for committing to longer, more uncertain trails.',
los:[
{title:'Describe relationships among spot rates, forward rates, yield to maturity, expected and realized returns on bonds, and the shape of the yield curve.',explanation:'<div class="formula-box"><span class="label">Rate Relationships</span>Spot rate (zₙ): YTM on an n-period zero-coupon bond\nForward rate (f(j,k)): implied rate from period j to k\n  (1+z_k)^k = (1+z_j)^j × (1+f(j,k))^(k-j)\n\nYTM: single rate that discounts all coupons + par to market price\n  → weighted average of spot rates (weights = PV of each CF)\n\nExpected return = YTM only if: reinvestment rate = YTM AND\n  held to maturity. Otherwise, realized return differs.\n\nYield curve shape reflects: expected future rates + risk premiums</div>'},
{title:'Describe how zero-coupon rates (spot rates) may be obtained from the par curve by bootstrapping.',explanation:'<p><span class="key-term">Bootstrapping</span> extracts spot rates from the par curve (yields on coupon bonds priced at par):</p><div class="formula-box"><span class="label">Bootstrapping Process</span>1. z₁ = par yield for 1-year bond (no stripping needed)\n2. For 2-year par bond: 100 = C/(1+z₁) + (100+C)/(1+z₂)²\n   Solve for z₂\n3. For 3-year: use z₁ and z₂ to solve for z₃\n... continue iteratively\n\nEach step uses previously derived spot rates to isolate the next one.</div>'},
{title:'Describe the assumptions concerning the evolution of spot rates in relation to forward rates implicit in active bond portfolio management.',explanation:'<p>Active managers take positions based on their view of how rates will evolve vs. what forwards imply:</p><p>If you believe <strong>rates will rise less than forwards predict</strong> → buy longer-duration bonds (you\'ll earn more than the forward rate implies). If you believe <strong>rates will rise more than forwards predict</strong> → shorten duration. The forward curve represents the "break-even" scenario — the rate path that would make all maturities earn the same return.</p>'},
{title:'Describe the strategy of rolling down the yield curve.',explanation:'<p><strong>Rolling down:</strong> buy a bond with maturity longer than your investment horizon. As time passes, it "rolls" to a shorter maturity with a lower yield (in an upward-sloping curve) → price increases → capital gain on top of coupon income.</p><div class="formula-box"><span class="label">Roll Return</span>Roll return ≈ (yield at purchase maturity − yield at shorter maturity)\n              × remaining duration\n\nWorks when: curve is upward-sloping AND stable\nFails when: curve flattens/inverts or shifts up</div>'},
{title:'Explain the swap rate curve and why and how market participants use it in valuation.',explanation:'<p>The <span class="key-term">swap rate curve</span> plots fixed rates on interest rate swaps across maturities. Preferred over government curves because:</p><p><strong>Availability:</strong> swap rates exist for many more maturities (continuous curve). <strong>Comparability:</strong> reflects interbank credit (AA-rated), consistent across countries. <strong>Less distorted:</strong> government bond supply/demand (QE, fiscal policy) can distort Treasury curves. <strong>Hedging:</strong> swaps are the primary hedging tool for banks and corporates.</p><p>Used to discount cash flows for derivatives pricing, corporate bond relative value, and as a benchmark for floating-rate instruments.</p>'},
{title:'Calculate and interpret the swap spread for a given maturity.',explanation:'<div class="formula-box"><span class="label">Swap Spread</span>Swap spread = Swap rate − Treasury yield (same maturity)\n\nExample: 5-year swap rate = 3.50%, 5-year Treasury = 3.10%\n  Swap spread = 40 bps\n\nReflects: credit risk premium (interbank > sovereign),\n  liquidity differences, supply/demand factors\n\nWidening spread → market stress, credit concerns\nNarrowing spread → improving conditions, risk appetite</div>'},
{title:'Describe short-term interest rate spreads used to gauge economy-wide credit risk and liquidity risk.',explanation:'<p>Key spreads: <strong>TED spread</strong> = LIBOR (now SOFR-based equivalents) − T-bill rate. Measures banking system stress. <strong>LIBOR-OIS spread</strong> = LIBOR − overnight indexed swap rate. Measures interbank lending risk specifically. <strong>Commercial paper spread</strong> = CP rate − T-bill rate. Measures corporate short-term funding stress.</p><p>All widen during crises (2008, 2020) as counterparty risk and liquidity hoarding increase. They\'re real-time barometers of financial system health.</p>'},
{title:'Explain traditional theories of the term structure and describe implications for forward rates and yield curve shape.',explanation:'<div class="formula-box"><span class="label">Term Structure Theories</span>Pure Expectations:\n  Forward rates = expected future spot rates\n  Curve shape purely reflects rate expectations\n  → Upward slope = market expects rate increases\n\nLiquidity Preference:\n  Forward rates = expected spots + liquidity premium\n  Investors demand premium for longer maturities\n  → Curve biased upward (can still invert if rate cuts expected)\n\nSegmented Markets:\n  Supply/demand within each maturity segment determines rates\n  No substitution across segments → curve can take any shape\n\nPreferred Habitat:\n  Like segmented markets but investors WILL switch segments\n  if compensated sufficiently → modified segmented theory</div>'},
{title:'Explain how a bond\'s exposure to yield curve factors can be measured and used to manage yield curve risks.',explanation:'<p>Yield curve changes decompose into: <strong>level</strong> (parallel shift), <strong>slope</strong> (steepening/flattening), and <strong>curvature</strong> (butterfly). <span class="key-term">Key rate durations</span> measure sensitivity at specific maturities (2y, 5y, 10y, 30y).</p><p>A bond\'s effective duration captures level risk. Key rate durations capture non-parallel risk. Example: a barbell portfolio (short + long maturities) has the same effective duration as a bullet (intermediate) but very different key rate duration profiles — the barbell is more exposed to curvature changes.</p>'},
{title:'Explain the maturity structure of yield volatilities and their effect on price volatility.',explanation:'<p><strong>Short-term rates are more volatile</strong> than long-term rates (central bank policy directly affects the short end). However, <strong>long-term bond prices are more volatile</strong> because they have higher duration (greater sensitivity to rate changes).</p><p>Price volatility = Duration × Yield volatility. Even though long-term yield volatility is lower, the duration effect dominates → long bonds have higher price volatility. This matters for risk management: matching duration doesn\'t eliminate risk if yield volatilities differ across the curve.</p>'},
{title:'Explain how key economic factors are used to establish a view on benchmark rates, spreads, and yield curve changes.',explanation:'<p>Building an interest rate view:</p><p><strong>Monetary policy:</strong> central bank rate path → drives short end. Hawkish → short rates up → curve flattens. Dovish → short rates down → curve steepens.</p><p><strong>Inflation expectations:</strong> drive the long end. Rising inflation expectations → higher long-term rates.</p><p><strong>Economic growth:</strong> strong growth → higher real rates, tighter credit spreads. Weak growth → lower rates, wider spreads.</p><p><strong>Fiscal policy:</strong> large deficits → more bond supply → upward pressure on yields (especially long end).</p><p><strong>Global factors:</strong> foreign demand for domestic bonds, global risk appetite, currency expectations.</p>'}
]},

'fi|arb-free':{
quickReview:['Arbitrage-free: every bond is priced consistently with the spot curve — no riskless profit possible.','Binomial tree: model interest rate evolution with up/down moves calibrated to match the current term structure + assumed volatility.','Backward induction: start at maturity (par + coupon), average up/down node values, discount back one period. Repeat.','Pathwise valuation: enumerate all possible rate paths, value the bond along each, average across paths.','Monte Carlo: simulate thousands of random rate paths — needed for path-dependent securities (MBS).','Term structure models: equilibrium (CIR, Vasicek — derive curve from assumptions) vs. arbitrage-free (Ho-Lee, BDT — calibrate to observed curve).'],
analogy:'The arbitrage-free framework is like <em>pricing airline tickets consistently</em>. If a round-trip ticket costs less than two separate one-way tickets on the same flights, there\'s an arbitrage — buy the round-trip and sell the legs. The binomial tree is the airline\'s pricing engine: it models how fares might change at each decision point (up or down), then works backward from the destination to ensure today\'s prices are internally consistent.',
los:[
{title:'Explain what is meant by arbitrage-free valuation of a fixed-income instrument.',explanation:'<p><span class="key-term">Arbitrage-free valuation</span> means pricing a bond so that no riskless profit can be earned by trading it against other bonds or the spot curve. Each cash flow is discounted at the appropriate spot rate for its maturity. If a bond\'s market price differs from its arbitrage-free value, a trader can earn a riskless profit by stripping or reconstituting the bond.</p>'},
{title:'Calculate the arbitrage-free value of an option-free, fixed-rate coupon bond.',explanation:'<div class="formula-box"><span class="label">Arbitrage-Free Bond Value</span>V = C/(1+z₁) + C/(1+z₂)² + ... + (C+FV)/(1+zₙ)ⁿ\n\nDiscount each cash flow at the corresponding spot rate\nNOT at a single YTM — each CF gets its own rate\n\nExample: 3-year, 5% coupon, par=$100\n  z₁=3%, z₂=3.5%, z₃=4%\n  V = 5/1.03 + 5/1.035² + 105/1.04³\n    = 4.854 + 4.668 + 93.351 = $102.87</div>'},
{title:'Describe a binomial interest rate tree framework.',explanation:'<p>A <span class="key-term">binomial tree</span> models interest rate evolution over discrete time steps. At each node, rates can move up or down with specified probabilities (typically 50/50 risk-neutral). The up and down rates are calibrated so that: (1) the tree matches the current term structure (no-arbitrage condition), and (2) the volatility matches the assumed interest rate volatility. Adjacent nodes are related by: r_u = r_d × e^(2σ).</p>'},
{title:'Describe the process of calibrating a binomial interest rate tree to match a specific term structure.',explanation:'<p>Calibration ensures the tree is <strong>arbitrage-free</strong> — it reproduces today\'s observed bond prices. Process: (1) set the current short rate from the market. (2) For period 2, choose trial rates for up/down nodes. (3) Price a 2-period benchmark bond using backward induction. (4) Adjust rates until the model price matches the market price. (5) Repeat for each successive period, always matching the next benchmark bond. The volatility parameter determines the spread between up and down nodes.</p>'},
{title:'Describe backward induction and calculate the value of a fixed-income instrument at each node.',explanation:'<div class="formula-box"><span class="label">Backward Induction</span>At maturity nodes: value = par + coupon\n\nAt each prior node:\n  V = [0.5×V_up + 0.5×V_down + coupon] / (1 + r_node)\n\nWork backward from maturity to today.\nToday\'s value = the root node value.\n\nExample at a node where r=4%, V_up=98, V_down=101, C=3:\n  V = [0.5(98) + 0.5(101) + 3] / 1.04 = 102.5/1.04 = 98.56</div>'},
{title:'Compare pricing using the zero-coupon yield curve with pricing using an arbitrage-free binomial lattice.',explanation:'<p>For <strong>option-free bonds</strong>, both methods give the same price — they\'re equivalent arbitrage-free approaches. The spot curve discounts each CF at the appropriate zero rate; the binomial tree averages across interest rate paths to achieve the same result.</p><p>The binomial tree\'s advantage emerges for <strong>bonds with embedded options</strong> — it can model the option exercise decision at each node, which the spot curve approach cannot. The tree is more flexible but computationally heavier.</p>'},
{title:'Describe pathwise valuation in a binomial interest rate framework and calculate the value along each path.',explanation:'<p><span class="key-term">Pathwise valuation</span>: enumerate every possible path through the tree (2ⁿ paths for n periods). For each path, discount the bond\'s cash flows at the rates along that specific path. The bond\'s value = average of values across all paths.</p><p>Equivalent to backward induction for option-free bonds. For bonds with embedded options, pathwise valuation must account for whether the option is exercised along each path — making it path-dependent.</p>'},
{title:'Describe a Monte Carlo forward-rate simulation and its application.',explanation:'<p><strong>Monte Carlo simulation</strong>: generate thousands of random interest rate paths from a stochastic model. Value the security along each path, then average. Essential for <span class="key-term">path-dependent securities</span> like mortgage-backed securities (MBS), where prepayment behavior depends on the rate path, not just the current rate. Binomial trees can\'t handle path-dependence efficiently — Monte Carlo can.</p>'},
{title:'Describe term structure models and how they are used.',explanation:'<div class="formula-box"><span class="label">Term Structure Models</span>EQUILIBRIUM MODELS (derive the curve from assumptions):\n  Vasicek: mean-reverting, allows negative rates\n  CIR (Cox-Ingersoll-Ross): mean-reverting, rates stay positive\n  → Both produce an internally consistent curve shape\n\nARBITRAGE-FREE MODELS (calibrate to observed curve):\n  Ho-Lee: simplest, parallel shifts, matches current curve exactly\n  BDT (Black-Derman-Toy): mean-reverting, matches curve + volatility\n  → Guarantee today\'s prices are reproduced</div><p>Equilibrium models are used for understanding rate dynamics. Arbitrage-free models are used for pricing derivatives and structured products.</p>'}
]},

'fi|embedded':{
quickReview:['V(callable) = V(straight) − V(call option). V(putable) = V(straight) + V(put option).','Higher volatility → higher option value → lower callable bond value, higher putable bond value.','OAS = spread added to all tree rates so model price = market price. Removes option effect — "option-adjusted."','Effective duration: callable < straight (call caps upside). Putable < straight duration too (put creates floor).','One-sided durations: duration differs for rate rises vs. falls (asymmetry from embedded option).','Callable bonds have negative convexity at low yields (price ceiling from call). Putable bonds have enhanced positive convexity.','Convertible bond = straight bond + call option on stock. Floor = max(conversion value, straight bond value).'],
analogy:'A callable bond is like <em>renting an apartment with a landlord break clause</em>. The landlord (issuer) can terminate the lease (call the bond) whenever rates drop — leaving you to reinvest at worse terms. You get a higher rent (yield) to compensate for this risk. A putable bond flips it: the tenant (investor) can leave whenever rates rise — so you accept lower rent for that flexibility. The OAS strips out these options to reveal the "pure credit spread" underneath.',
los:[
{title:'Describe fixed-income securities with embedded options.',explanation:'<p><strong>Callable bonds:</strong> issuer has the right to redeem before maturity (typically when rates fall → refinance at lower cost). <strong>Putable bonds:</strong> investor has the right to sell back at par (protection when rates rise → bond price would otherwise fall). <strong>Convertible bonds:</strong> investor can convert to a specified number of equity shares. <strong>Capped/floored floaters:</strong> floating-rate bonds with maximum (cap) or minimum (floor) coupon rates.</p>'},
{title:'Explain the relationships between callable/putable bond values, the straight bond, and the embedded option.',explanation:'<div class="formula-box"><span class="label">Value Relationships</span>V(callable) = V(straight) − V(call option to issuer)\n  → Callable always worth LESS than straight\n  → Investor is short the call option\n\nV(putable) = V(straight) + V(put option to investor)\n  → Putable always worth MORE than straight\n  → Investor is long the put option\n\nAs option value ↑, callable value ↓ and putable value ↑</div>'},
{title:'Describe how the arbitrage-free framework can be used to value a bond with embedded options.',explanation:'<p>Use a binomial interest rate tree calibrated to the current term structure. At each node, determine whether the option would be exercised: for a callable, if the computed value exceeds the call price, set the node value equal to the call price (issuer calls). For a putable, if the computed value falls below the put price, set the node value to the put price (investor puts). Then backward-induct as usual. The resulting value reflects the option constraint at every decision point.</p>'},
{title:'Explain how interest rate volatility affects the value of a callable or putable bond.',explanation:'<p>Higher volatility → higher option value (more likely the option finishes in-the-money).</p><p><strong>Callable:</strong> investor is short the call → higher volatility hurts the investor → <strong>callable bond value decreases</strong>.</p><p><strong>Putable:</strong> investor is long the put → higher volatility helps the investor → <strong>putable bond value increases</strong>.</p><p>This is why callable bonds are quoted at a higher yield (investor demands compensation for short option position) and putables at a lower yield.</p>'},
{title:'Explain how changes in the level and shape of the yield curve affect the value of a callable or putable bond.',explanation:'<p><strong>Level changes:</strong> when rates fall significantly, callable bonds don\'t appreciate as much as straights (call caps the upside). When rates rise significantly, putable bonds don\'t fall as much (put provides a floor).</p><p><strong>Shape changes:</strong> a flatter curve reduces the value of the call option (less benefit from calling and refinancing). A steeper curve increases the call option value. The yield curve shape affects the probability distribution of future rates in the tree, which directly impacts option exercise probabilities.</p>'},
{title:'Calculate the value of a callable or putable bond from an interest rate tree.',explanation:'<p>Apply backward induction with the option constraint:</p><div class="formula-box"><span class="label">Tree Valuation with Options</span>At each node, compute V_unconstrained first:\n  V = [0.5×V_up + 0.5×V_down + C] / (1+r)\n\nCallable: V_node = min(V_unconstrained, call price)\nPutable:  V_node = max(V_unconstrained, put price)\n\nThe root node gives the bond\'s value including the option.</div>'},
{title:'Explain the calculation and use of option-adjusted spreads.',explanation:'<div class="formula-box"><span class="label">Option-Adjusted Spread (OAS)</span>OAS = the constant spread added to every rate in the\nbinomial tree such that model value = market price\n\nIterate: add trial OAS to all tree rates → revalue bond\n  (with option logic) → adjust OAS until price matches\n\nOAS isolates the CREDIT component of spread:\n  Nominal spread = OAS + option cost\n  For callable: nominal spread > OAS (option cost is positive)\n  For putable: nominal spread < OAS (option benefit to investor)</div><p>OAS allows apples-to-apples comparison across bonds with different embedded options.</p>'},
{title:'Explain how interest rate volatility affects option-adjusted spreads.',explanation:'<p>Higher assumed volatility → higher option value → for a callable bond, the call option is worth more → to match the same market price, the OAS must be <strong>lower</strong> (more of the spread is attributed to the option, less to credit).</p><p>Conversely, lower assumed volatility → lower option value → higher OAS. This means <strong>OAS is model-dependent</strong> — the choice of volatility assumption directly impacts the OAS calculation. Analysts must be aware of which volatility assumption underlies a quoted OAS.</p>'},
{title:'Calculate and interpret effective duration of a callable or putable bond.',explanation:'<div class="formula-box"><span class="label">Effective Duration</span>EffDur = (V₋ − V₊) / (2 × V₀ × Δy)\n\nV₋ = value if curve shifts down by Δy\nV₊ = value if curve shifts up by Δy\nV₀ = current value\n\nMust revalue with the tree (not just reprice) because the\noption exercise changes with rate shifts.</div>'},
{title:'Compare effective durations of callable, putable, and straight bonds.',explanation:'<p><strong>Callable duration ≤ straight duration:</strong> the call caps upside appreciation when rates fall → price response is truncated on the downside of rates → lower duration. At very low rates, callable approaches zero duration (price can\'t rise above call price).</p><p><strong>Putable duration ≤ straight duration:</strong> the put creates a price floor when rates rise → price response is truncated on the upside of rates → lower duration at high rate levels. Putable duration approaches zero at very high rates (price can\'t fall below put price).</p>'},
{title:'Describe the use of one-sided durations and key rate durations for bonds with embedded options.',explanation:'<p><span class="key-term">One-sided durations</span> measure duration separately for rate increases vs. decreases. For callable bonds: duration for rate decreases < duration for rate increases (call truncates the upside). This asymmetry is hidden in standard (two-sided) effective duration.</p><p><strong>Key rate durations</strong> decompose sensitivity across the curve — especially important for callable bonds, which are most affected by the rate at the call date maturity rather than uniform curve shifts.</p>'},
{title:'Compare effective convexities of callable, putable, and straight bonds.',explanation:'<div class="formula-box"><span class="label">Effective Convexity</span>EffConv = (V₋ + V₊ − 2V₀) / (V₀ × Δy²)\n\nStraight bonds: positive convexity (price gains > losses for equal rate changes)\nCallable bonds: NEGATIVE convexity at low yields (price ceiling)\nPutable bonds: ENHANCED positive convexity (price floor)\n\nNegative convexity = bad for investors (gains compressed, losses not)</div>'},
{title:'Calculate the value of a capped or floored floating-rate bond.',explanation:'<div class="formula-box"><span class="label">Capped and Floored Floaters</span>V(capped floater) = V(straight floater) − V(cap)\n  Cap limits the upside coupon → investor is short the cap\n  → Capped floater < par\n\nV(floored floater) = V(straight floater) + V(floor)\n  Floor guarantees minimum coupon → investor is long the floor\n  → Floored floater > par</div><p>Value using a binomial tree: at each node, apply the cap/floor constraint to the coupon before backward-inducting.</p>'},
{title:'Describe defining features of a convertible bond.',explanation:'<p>A <span class="key-term">convertible bond</span> gives the holder the right to convert the bond into a predetermined number of common shares. Key terms: <strong>conversion ratio</strong> (shares per bond), <strong>conversion price</strong> (par / conversion ratio), <strong>conversion value</strong> (share price × conversion ratio), <strong>market conversion premium</strong> (bond price − conversion value), <strong>straight value</strong> (value without conversion option = bond floor).</p>'},
{title:'Calculate and interpret the components of a convertible bond\'s value.',explanation:'<div class="formula-box"><span class="label">Convertible Bond Value</span>V(convertible) = V(straight bond) + V(call option on stock)\n\nMinimum value = max(straight value, conversion value)\n  Straight value = floor from bond characteristics\n  Conversion value = floor from equity value\n\nMarket conversion premium = (Bond price / Conv ratio) − Stock price\nPremium payback period = Market conv premium per share / \n                          (Coupon income − Dividend income per share)</div>'},
{title:'Describe how a convertible bond is valued in an arbitrage-free framework.',explanation:'<p>Requires a model that integrates both interest rate uncertainty and equity price uncertainty. Typically uses a combined binomial tree or simulation where: (1) interest rates evolve stochastically (affecting the bond floor), (2) the stock price evolves stochastically (affecting conversion value), (3) at each node, the holder optimally decides whether to convert or hold. The issuer\'s call provision adds another decision layer. This is computationally intensive — simplified models approximate by valuing the straight bond and the equity option separately.</p>'},
{title:'Compare the risk-return characteristics of a convertible bond with those of a straight bond and the underlying common stock.',explanation:'<p>Convertibles sit between bonds and equities in the risk-return spectrum:</p><p><strong>Equity-like behavior</strong> (when stock price is high, "in the money"): convertible tracks the stock closely, high delta, low bond sensitivity. Conversion value dominates.</p><p><strong>Bond-like behavior</strong> (when stock price is low, "out of the money"): convertible trades near its straight value, low delta, behaves like a regular bond. Straight value provides a floor.</p><p><strong>Hybrid zone</strong> (near conversion price): convertible captures some equity upside while retaining bond floor protection — the "best of both worlds" zone that makes convertibles attractive.</p><p>Risk profile: lower return than stock in strong rallies (premium cost), but better protection in declines (bond floor). Lower yield than straight bonds (investor pays for the equity option through reduced coupon).</p>'}
]},

'fi|credit-models':{
quickReview:['Expected loss = PD × LGD × EAD. Credit valuation adjustment (CVA) = PV of expected losses across all periods.','Structural models (Merton): equity = call option on firm assets. Default when assets < liabilities at maturity.','Reduced-form models: default is an exogenous event with a hazard rate. More flexible, can be calibrated to market data.','Credit spread = compensation for expected loss + credit risk premium. Spread = PD × LGD (approximate).','Term structure of credit spreads: typically upward-sloping (longer exposure = more risk), but can invert for distressed issuers.','Securitized debt credit analysis: focus on collateral quality, credit enhancement, waterfall structure, servicer quality — NOT issuer balance sheet.'],
analogy:'Credit analysis is like <em>insurance underwriting</em>. The probability of default (PD) is like the probability of an accident. Loss given default (LGD) is how expensive the claim will be. Exposure at default (EAD) is the policy amount. The credit spread is the insurance premium the market charges. Structural models predict accidents from the driver\'s behavior (firm\'s asset value); reduced-form models use actuarial tables (statistical hazard rates) without looking under the hood.',
los:[
{title:'Explain expected exposure, loss given default, probability of default, and the credit valuation adjustment.',explanation:'<div class="formula-box"><span class="label">Credit Risk Components</span>Probability of Default (PD): likelihood of default over a period\nLoss Given Default (LGD): 1 − recovery rate\nExposure at Default (EAD): amount owed when default occurs\n\nExpected Loss = PD × LGD × EAD\n\nCredit Valuation Adjustment (CVA):\n  CVA = Σ [PV of expected loss in each period]\n      = Σ [PD_t × LGD × EAD_t × DF_t]\n\nFair value of risky bond = Risk-free value − CVA</div>'},
{title:'Explain credit scores and credit ratings.',explanation:'<p><strong>Credit scores</strong> (e.g., Altman Z-score): quantitative models using financial ratios to predict default probability. Automated, consistent, but backward-looking and model-dependent.</p><p><strong>Credit ratings</strong> (Moody\'s, S&P, Fitch): qualitative + quantitative assessment by rating agencies. AAA (highest quality) to D (default). Investment grade: BBB−/Baa3 and above. High yield: BB+/Ba1 and below. Ratings are opinions, not guarantees — they can lag market signals (CDS spreads often move before rating changes).</p>'},
{title:'Calculate the expected return on a bond given transition in its credit rating.',explanation:'<div class="formula-box"><span class="label">Expected Return with Rating Transition</span>Expected return = Σ [Probability_i × Return_i] for all possible ratings\n\nReturn_i depends on the new credit spread for rating i:\n  If upgraded: spread narrows → price rises → positive return\n  If unchanged: earns the coupon yield\n  If downgraded: spread widens → price falls → lower/negative return\n  If default: recovery rate × face value − purchase price\n\nUse the rating transition matrix (probability of moving from current rating to each other rating over 1 year).</div>'},
{title:'Explain structural and reduced-form models of corporate credit risk, including assumptions, strengths, and weaknesses.',explanation:'<div class="formula-box"><span class="label">Credit Risk Models</span>STRUCTURAL (Merton, 1974):\n  Firm value follows a stochastic process\n  Default occurs when firm value < debt at maturity\n  Equity = call option on firm assets (strike = debt)\n  Strengths: economic intuition, links to firm fundamentals\n  Weaknesses: unobservable firm value, assumes simple debt\n\nREDUCED-FORM (Jarrow-Turnbull, Duffie-Singleton):\n  Default modeled as random event with hazard rate\n  Hazard rate can vary over time, calibrated to market prices\n  Strengths: flexible, tractable, uses market data\n  Weaknesses: less economic intuition, default is "exogenous"</div>'},
{title:'Calculate the value of a bond and its credit spread, given assumptions about credit risk parameters.',explanation:'<p>Using the CVA approach:</p><div class="formula-box"><span class="label">Risky Bond Valuation</span>V(risky) = V(risk-free) − CVA\n\nCredit spread ≈ PD × LGD (annualized approximation)\n\nExample: 1-year zero, PD=2%, recovery=40%, r_f=3%\n  LGD = 60%, Expected loss = 2%×60% = 1.2%\n  Credit spread ≈ 1.2% = 120 bps\n  Risky yield ≈ 3% + 1.2% = 4.2%</div>'},
{title:'Interpret changes in a credit spread.',explanation:'<p>Credit spread changes reflect: changes in <strong>PD</strong> (deteriorating/improving fundamentals), changes in <strong>LGD</strong> (collateral values, seniority), changes in <strong>risk premium</strong> (market risk appetite, liquidity conditions). Spread widening doesn\'t always mean the company is worse — it can reflect market-wide risk aversion (systematic component). Decomposing spread changes into fundamental vs. market-driven components is a key analytical skill.</p>'},
{title:'Explain the determinants of the term structure of credit spreads and interpret a term structure of credit spreads.',explanation:'<p>The credit spread curve typically <strong>slopes upward</strong> for investment-grade issuers (longer exposure to default risk). But for <strong>high-yield/distressed issuers</strong>, the curve can <strong>invert</strong> — near-term default risk is so high that short-term spreads exceed long-term (if you survive the short term, you\'re probably okay).</p><p>Determinants: credit quality trend, macroeconomic outlook, supply/demand for corporate bonds at each maturity, liquidity differences across the curve.</p>'},
{title:'Compare the credit analysis required for securitized debt to the credit analysis of corporate debt.',explanation:'<p><strong>Corporate debt:</strong> analyze the issuer — financial statements, industry position, management, cash flows, leverage. It\'s about the company\'s ability and willingness to pay.</p><p><strong>Securitized debt (ABS, MBS, CLOs):</strong> the issuer is an SPV — analyze the <strong>collateral pool</strong> (quality, diversity, performance history), <strong>credit enhancement</strong> (subordination, overcollateralization, reserve accounts), <strong>waterfall structure</strong> (payment priority across tranches), and <strong>servicer quality</strong>. The SPV itself has no operating business — all credit analysis is about the collateral and structure.</p>'}
]},

'fi|cds':{
quickReview:['CDS: buyer pays periodic premium (spread) to seller; seller pays par − recovery if reference entity defaults.','Credit event triggers: bankruptcy, failure to pay, restructuring (varies by market).','CDS pricing: spread reflects PD and LGD. Upfront payment = PV of (market spread − coupon) × duration.','CDS to manage credit: buy protection to hedge bond exposure; sell protection to gain credit exposure without buying bonds.','Basis trade: exploit CDS spread vs. bond spread differences. Negative basis = CDS < bond spread → buy bond + buy CDS protection.'],
analogy:'A CDS is like <em>fire insurance on a house you may or may not own</em>. The protection buyer pays annual premiums; if the house (reference entity) burns down (defaults), the seller pays the claim. You can insure your own house (hedging) or someone else\'s (speculation). The CDS spread is the insurance premium rate — higher for riskier houses. And unlike home insurance, CDS is traded in a market where the "premium" fluctuates daily with perceived fire risk.',
los:[
{title:'Describe credit default swaps (CDS), single-name and index CDS, and the parameters that define a given CDS product.',explanation:'<p>A <span class="key-term">CDS</span> is a contract where the protection buyer pays a periodic spread (premium) to the protection seller. If a credit event occurs, the seller compensates the buyer.</p><div class="formula-box"><span class="label">CDS Parameters</span>Reference entity: the company/sovereign whose credit is protected\nNotional principal: face amount of protection\nCDS spread (coupon): annual premium in bps (e.g., 150 bps)\nTenor: typically 5 years (most liquid point)\nSettlement: physical delivery (deliver defaulted bond) or cash\n\nSingle-name CDS: one reference entity\nIndex CDS (e.g., CDX, iTraxx): basket of 100+ reference entities\n  → diversified credit exposure, very liquid</div>'},
{title:'Describe credit events and settlement protocols with respect to CDS.',explanation:'<p><strong>Credit events</strong> that trigger CDS payment: <strong>bankruptcy</strong> (legal insolvency filing), <strong>failure to pay</strong> (missed interest/principal beyond grace period), <strong>restructuring</strong> (forced change in payment terms — included in European contracts, often excluded in US).</p><p><strong>Settlement:</strong> physical delivery (buyer delivers any deliverable obligation, receives par) or cash settlement (buyer receives par − recovery value, determined by ISDA auction). Cash settlement via auction is now standard — ensures transparent, market-determined recovery.</p>'},
{title:'Explain the principles underlying and factors that influence the market\'s pricing of CDS.',explanation:'<div class="formula-box"><span class="label">CDS Pricing</span>CDS spread ≈ PD × LGD (simplified)\n\nPrecise pricing: PV of premium payments = PV of expected loss payments\n  (premium leg = protection leg)\n\nUpfront payment (standardized coupons at 100 or 500 bps):\n  Upfront ≈ (CDS spread − coupon) × duration\n\nFactors:\n  • Credit quality of reference entity (PD)\n  • Expected recovery rate (1 − LGD)\n  • Risk-free interest rates\n  • Market risk appetite / supply-demand for protection</div>'},
{title:'Describe the use of CDS to manage credit exposures and to express views regarding changes in the shape and/or level of the credit curve.',explanation:'<p><strong>Hedging:</strong> bondholder buys CDS protection → offsets default risk. Net position ≈ risk-free bond (earns the CDS basis).</p><p><strong>Going short credit:</strong> buy CDS protection without owning the bond → profit if spreads widen or default occurs (naked CDS).</p><p><strong>Curve trades:</strong> buy short-dated protection and sell long-dated protection → profit if the credit curve steepens. Or vice versa for flattening bets. Index CDS allow broad credit market views; single-name for company-specific views.</p>'},
{title:'Describe the use of CDS to take advantage of valuation disparities among separate markets.',explanation:'<p><strong>Basis trade:</strong> exploit the difference between CDS spread and bond spread (the "basis"). <strong>Negative basis</strong> (CDS spread < bond spread): buy the bond + buy CDS protection → earn the positive carry with default hedged. <strong>Positive basis</strong> (CDS spread > bond spread): sell the bond + sell CDS protection → arbitrage if funding allows.</p><p><strong>Capital structure arbitrage:</strong> use CDS on debt + equity positions to exploit mismatch between credit and equity market pricing. Example: if CDS spreads imply higher default probability than equity prices suggest → buy CDS protection + buy equity (bet on convergence).</p>'}
]},

'deriv|forwards':{
quickReview:['Forward price = spot × (1+r)ᵀ (no carry costs). With costs/benefits: F = (S − PV(benefits) + PV(costs)) × (1+r)ᵀ.','Equity forward: F = (S₀ − PV(dividends)) × (1+r)ᵀ. Value at time t: Vₜ = Sₜ − PV(remaining divs) − F/(1+r)^(T-t).','FRA: agreement on a future interest rate. Settled at expiration based on difference between agreed rate and market rate.','Fixed-income forward: F = (B₀ × (1+r)ᵀ − AI_T − PV(coupons)). Include accrued interest and intermediate coupons.','Interest rate swap: exchange fixed for floating. Value = PV(fixed) − PV(floating). At inception, fixed rate set so swap value = 0.','Currency swap: exchange principals + periodic interest in two currencies. Value depends on both interest rates and exchange rate.','Equity swap: one leg pays equity return, other pays fixed or floating. Value = PV(equity leg) − PV(fixed/floating leg).'],
analogy:'Forward pricing is like <em>reserving a hotel room for next summer</em>. The forward price reflects today\'s room rate, adjusted for what the hotel earns by having your deposit now (interest), minus what they\'d lose by holding the room empty (carry benefits like dividends). The "carry arbitrage model" says if the reservation price is wrong, someone can lock in a riskless profit by booking the room and simultaneously shorting it on the spot market — so the price must be set to prevent this.',
los:[
{title:'Describe how equity forwards and futures are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-box"><span class="label">Equity Forward Pricing</span>No-arbitrage forward price (discrete dividends):\n  F₀ = (S₀ − PV(D)) × (1+r)ᵀ\n\nContinuous dividend yield (δ):\n  F₀ = S₀ × e^((r−δ)T)   or   F₀ = S₀ × (1+r)ᵀ/(1+δ)ᵀ\n\nValue of long forward at time t:\n  Vₜ = Sₜ − PV_t(remaining D) − PV_t(F₀)\n     = Sₜ − PV_t(D) − F₀/(1+r)^(T−t)\n\nAt expiration: V_T = S_T − F₀</div><p>If F₀ > no-arbitrage price → sell forward, buy spot (cash-and-carry). If F₀ < → buy forward, sell spot (reverse cash-and-carry).</p>'},
{title:'Describe the carry arbitrage model without underlying cashflows and with underlying cashflows.',explanation:'<div class="formula-box"><span class="label">Carry Arbitrage Model</span>WITHOUT cash flows (gold, zero-coupon bond):\n  F₀ = S₀ × (1+r)ᵀ\n  Carry cost = financing cost (interest on borrowed funds)\n  No carry benefits → forward price > spot price\n\nWITH cash flows (dividend-paying stock, coupon bond):\n  F₀ = (S₀ + PV(costs) − PV(benefits)) × (1+r)ᵀ\n  Costs: storage, insurance (commodities)\n  Benefits: dividends, coupons, convenience yield\n  → Benefits reduce the forward price below "pure" financing cost</div><p>The key insight: the forward price is NOT a forecast of the future spot. It\'s determined by today\'s spot + the cost of carrying the asset to delivery.</p>'},
{title:'Describe how interest rate forwards and futures are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-box"><span class="label">Forward Rate Agreement (FRA)</span>FRA rate (implied forward): derived from spot curve\n  (1+z_{j+k})^(j+k) = (1+z_j)^j × (1+FRA(j,k))^k\n\nFRA payoff at settlement (to long/borrower):\n  Payoff = Notional × (Market rate − FRA rate) × (days/360)\n           / (1 + Market rate × days/360)\n  (Discounted because settled at start, not end of loan period)\n\nExample: 1×4 FRA at 3%, market rate at expiry = 3.5%\n  → Long receives compensation (borrowed cheaper than market)</div>'},
{title:'Describe how fixed-income forwards and futures are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-box"><span class="label">Bond Forward Pricing</span>F₀ = (B₀(1+r)ᵀ − AI_T − FV(coupons during contract))\n\nor equivalently:\nF₀ = [(B₀ + AI₀) × (1+r)ᵀ − AI_T − FV(interim coupons)]\n\nB₀ = clean bond price\nAI = accrued interest (at inception and delivery)\nCoupons earned during the contract period reduce F₀\n\nValue at time t:\nVₜ = Bₜ + AIₜ − PV_t(remaining coupons) − PV_t(F₀ + AI_T)</div><p>Key complexity: accrued interest and interim coupons must be tracked carefully. Treasury futures add the cheapest-to-deliver (CTD) bond and conversion factors.</p>'},
{title:'Describe how interest rate swaps are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-box"><span class="label">Interest Rate Swap</span>Fixed-for-floating swap: fixed payer pays fixed rate, receives floating (e.g., SOFR)\n\nAt inception: swap rate set so PV(fixed leg) = PV(floating leg) → value = 0\n\nSwap fixed rate (par swap rate):\n  C = (1 − DF_n) / Σ(DF_i)   where DF = discount factors\n\nValue after inception (to fixed payer):\n  V = PV(floating payments) − PV(fixed payments)\n    = (1 − DF_n) − C × Σ(DF_i)  [using updated DFs]\n\nAlternatively: swap = portfolio of FRAs\n  Value = sum of values of individual FRAs</div>'},
{title:'Describe how currency swaps are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-box"><span class="label">Currency Swap</span>Exchange notional principals at inception AND maturity\n(unlike interest rate swaps which only exchange interest)\n\nPeriodic: pay interest in one currency, receive in another\n\nAt inception: notionals set so values are equal at spot rate\n  → Swap value = 0\n\nValue after inception (pay USD, receive EUR):\n  V = PV(EUR CFs) × S_t − PV(USD CFs)\n  (Convert EUR PV to USD at current spot rate)\n\nCurrency swaps are affected by BOTH interest rate changes\nand exchange rate changes → more complex than IRS</div>'},
{title:'Describe how equity swaps are priced, and calculate and interpret their no-arbitrage value.',explanation:'<div class="formula-box"><span class="label">Equity Swap</span>One leg pays return on equity index (or stock)\nOther leg pays fixed rate or floating rate\n\nEquity return leg: (S_t/S_{t-1} − 1) × Notional each period\n  → Resets to par at each payment date\n  → PV of equity leg = current index/price × (N/S₀)\n\nValue (pay fixed, receive equity):\n  V = (Sₜ/S₀) × N − PV(remaining fixed payments) − PV(N)\n\nAt inception: fixed rate set so V = 0\nAfter inception: moves with equity performance and rates</div><p>Equity swaps allow synthetic equity exposure without owning shares — useful for tax efficiency, leverage, or accessing restricted markets.</p>'}
]},

'deriv|options':{
quickReview:['Binomial: model up/down moves, risk-neutral pricing. c = e^(−rT)[π×c_u + (1−π)×c_d] where π = risk-neutral prob.','European option value = PV of expected payoff under risk-neutral probabilities. American adds early exercise possibility.','BSM assumptions: continuous trading, no arb, lognormal prices, constant r and σ, no dividends (basic form).','BSM call: C = S₀N(d₁) − Xe^(−rT)N(d₂). S₀N(d₁) = leveraged stock position. Xe^(−rT)N(d₂) = PV of exercise cost.','Black model: for options on futures/forwards — replace S₀ with F₀e^(−rT).','Greeks: delta (∂V/∂S), gamma (∂²V/∂S²), vega (∂V/∂σ), theta (∂V/∂t), rho (∂V/∂r).','Delta hedge: hold Δ shares per option written. Rebalance as Δ changes. Gamma risk = Δ changes quickly.','Implied volatility: the σ that makes BSM price = market price. Volatility smile/skew = implied vol varies by strike.'],
analogy:'Options pricing is like <em>flood insurance in a river valley</em>. The BSM model is the insurance company\'s pricing formula. Delta is how much your policy payout changes if the river rises one inch. Gamma is how fast delta itself changes — the difference between a gentle slope and a cliff edge near the flood line. Vega is the price sensitivity to forecast uncertainty — stormier weather predictions (higher volatility) make all policies more expensive. And implied volatility is the market\'s consensus on how stormy the season will be, reverse-engineered from actual premium prices.',
los:[
{title:'Describe and interpret the binomial option valuation model and its component terms.',explanation:'<div class="formula-box"><span class="label">One-Period Binomial Model</span>Stock moves: S_u = S₀ × u  or  S_d = S₀ × d\nOption payoffs: c_u = max(0, S_u − X), c_d = max(0, S_d − X)\n\nRisk-neutral probability: π = (1+r−d)/(u−d)\n\nOption value: c = [π×c_u + (1−π)×c_d] / (1+r)\n\nAlternative (hedge ratio / replicating portfolio):\n  h = (c_u − c_d) / (S_u − S_d)   [delta/hedge ratio]\n  c = h×S₀ − PV(h×S_d − c_d)       [stock − borrowing]</div><p>The model builds a riskless portfolio (long Δ shares, short 1 option) and prices by no-arbitrage. Risk preferences don\'t matter — hence "risk-neutral" pricing.</p>'},
{title:'Describe how the value of a European option can be analyzed as the present value of the option\'s expected payoff at expiration.',explanation:'<p>Under risk-neutral pricing: the option value equals the <strong>discounted expected payoff</strong>, where the expectation is taken under risk-neutral probabilities (not real-world probabilities).</p><div class="formula-box"><span class="label">Risk-Neutral Valuation</span>c = e^(−rT) × E*[max(0, S_T − X)]\np = e^(−rT) × E*[max(0, X − S_T)]\n\nE* = expectation under risk-neutral measure\n(stock grows at risk-free rate, not its actual expected return)</div><p>This works because the replicating portfolio argument ensures options are priced consistently with the underlying — regardless of investors\' risk preferences.</p>'},
{title:'Identify an arbitrage opportunity involving options and describe the related arbitrage.',explanation:'<p>Option arbitrage exploits violations of no-arbitrage bounds:</p><div class="formula-box"><span class="label">Key No-Arbitrage Bounds</span>Lower bound (European call): c ≥ max(0, S₀ − X×e^(−rT))\nLower bound (European put):  p ≥ max(0, X×e^(−rT) − S₀)\n\nPut-call parity: c + X×e^(−rT) = p + S₀\n  Violation → arbitrage by buying the cheap side, selling the expensive side\n\nExample: if c + PV(X) < p + S₀:\n  Buy call + bond, sell put + stock → riskless profit</div>'},
{title:'Calculate the no-arbitrage values of European and American options using a two-period binomial model.',explanation:'<p>Extend the one-period model: build a two-step tree (four possible end states). Work backward from period 2 to period 0:</p><div class="formula-box"><span class="label">Two-Period Binomial</span>Period 2: compute payoffs at each terminal node\nPeriod 1: at each node, c = [π×c_u + (1−π)×c_d]/(1+r)\nPeriod 0: c = [π×c₁_u + (1−π)×c₁_d]/(1+r)\n\nAmerican options: at each node, compare:\n  Holding value (continue) vs. Exercise value (S−X for call)\n  Node value = max(holding value, exercise value)\n\nAmerican call on non-dividend stock: never early exercise\n  (time value always positive → American call = European call)\nAmerican put: MAY be optimal to exercise early\n  (deep in-the-money put → exercise and invest proceeds)</div>'},
{title:'Calculate and interpret the value of an interest rate option using a two-period binomial model.',explanation:'<div class="formula-box"><span class="label">Interest Rate Option (Binomial Tree)</span>Interest rate call (caplet): payoff = max(0, rate − strike) × notional × period\nInterest rate put (floorlet): payoff = max(0, strike − rate) × notional × period\n\nKey difference from equity options:\n  Payoff determined at one node but PAID one period later\n  → Must discount payoff one extra period\n\nUse the interest rate tree (same as for bonds):\n  At each terminal node: compute payoff\n  Discount back: V = [0.5×V_u + 0.5×V_d] / (1+r_node)</div>'},
{title:'Identify assumptions of the Black-Scholes-Merton option valuation model.',explanation:'<p>BSM assumptions:</p><p><strong>1.</strong> Underlying price follows geometric Brownian motion (continuous, lognormally distributed returns). <strong>2.</strong> Risk-free rate is constant and known. <strong>3.</strong> Volatility (σ) is constant and known. <strong>4.</strong> Markets are frictionless (no taxes, transaction costs, or restrictions on short selling). <strong>5.</strong> No arbitrage opportunities. <strong>6.</strong> Continuous trading is possible. <strong>7.</strong> No dividends (in the basic form — can be adjusted).</p><p>In reality, every assumption is violated to some degree — volatility isn\'t constant (smile/skew), rates change, and trading is discrete. But BSM remains the standard framework because violations are manageable with modifications.</p>'},
{title:'Interpret the components of the BSM model as applied to call options in terms of a leveraged position in the underlying.',explanation:'<div class="formula-box"><span class="label">BSM Call Option</span>C = S₀N(d₁) − X×e^(−rT)×N(d₂)\n\nd₁ = [ln(S₀/X) + (r + σ²/2)T] / (σ√T)\nd₂ = d₁ − σ√T\n\nInterpretation:\n  S₀N(d₁) = "delta shares" — the replicating stock position\n  X×e^(−rT)×N(d₂) = borrowing (bond position) to finance shares\n\n→ A call option IS a leveraged stock position:\n   long N(d₁) shares, financed by borrowing PV(X)×N(d₂)</div><p>N(d₂) ≈ risk-neutral probability the option expires in-the-money. N(d₁) = delta = hedge ratio.</p>'},
{title:'Describe how the BSM model is used to value European options on equities and currencies.',explanation:'<div class="formula-box"><span class="label">BSM Variations</span>Equity with continuous dividend yield (δ):\n  C = S₀e^(−δT)N(d₁) − Xe^(−rT)N(d₂)\n  d₁ uses (r−δ) instead of r\n\nCurrency options (Garman-Kohlhagen):\n  C = S₀e^(−r_f×T)N(d₁) − Xe^(−r_d×T)N(d₂)\n  r_f = foreign risk-free rate (treat as continuous "dividend")\n  r_d = domestic risk-free rate\n\nThe foreign interest rate acts like a dividend yield —\nholding foreign currency earns interest, reducing call value</div>'},
{title:'Describe how the Black model is used to value European options on futures.',explanation:'<div class="formula-box"><span class="label">Black Model for Futures Options</span>C = e^(−rT) × [F₀N(d₁) − XN(d₂)]\nP = e^(−rT) × [XN(−d₂) − F₀N(−d₁)]\n\nd₁ = [ln(F₀/X) + (σ²/2)T] / (σ√T)\nd₂ = d₁ − σ√T\n\nKey differences from standard BSM:\n  • F₀ replaces S₀ (no need to track dividends/carry)\n  • Entire expression discounted at r (futures require no upfront cost)\n  • No cost-of-carry adjustment needed</div><p>The Black model is the standard for pricing options on commodity futures, bond futures, and interest rate futures.</p>'},
{title:'Describe how the Black model is used to value European interest rate options and European swaptions.',explanation:'<div class="formula-box"><span class="label">Interest Rate Options & Swaptions</span>Caplet (call on rate):\n  Value = (Notional × period) × e^(−rT) × [FRA×N(d₁) − X×N(d₂)]\n  FRA = forward rate, X = cap strike rate\n  Cap = portfolio of caplets\n\nSwaption (option to enter a swap):\n  Payer swaption: right to PAY fixed → call on swap rate\n  Receiver swaption: right to RECEIVE fixed → put on swap rate\n  Valued using Black model with forward swap rate as F₀\n  Annuity factor weights the payoff across swap periods</div>'},
{title:'Interpret each of the option Greeks.',explanation:'<div class="formula-box"><span class="label">The Greeks</span>Delta (Δ): ∂V/∂S — sensitivity to underlying price\n  Call delta: 0 to +1 (positive). Put delta: −1 to 0 (negative)\n  At-the-money ≈ 0.5 for calls, −0.5 for puts\n\nGamma (Γ): ∂Δ/∂S = ∂²V/∂S² — rate of change of delta\n  Highest at-the-money, near expiration\n  Always positive for long options\n\nVega (ν): ∂V/∂σ — sensitivity to volatility\n  Always positive for long calls AND puts\n  Highest at-the-money, with longer time to expiry\n\nTheta (Θ): ∂V/∂t — time decay (usually negative for long)\n  Options lose value as expiration approaches\n\nRho (ρ): ∂V/∂r — sensitivity to interest rates\n  Positive for calls, negative for puts (usually small)</div>'},
{title:'Describe how a delta hedge is executed.',explanation:'<p>A <span class="key-term">delta hedge</span> creates a position that is insensitive to small changes in the underlying price:</p><div class="formula-box"><span class="label">Delta Hedging</span>For each option written (short), hold Δ shares of underlying\n\nExample: short 100 calls with Δ=0.6\n  → Buy 60 shares to delta-hedge\n  → If stock rises $1: gain $60 on shares, lose ~$60 on options\n\nRebalancing: as S changes, Δ changes → must adjust shares\n  Called "dynamic hedging" — requires continuous rebalancing\n  In practice: rebalance periodically (daily, when Δ shifts)\n\nCost of hedging ≈ related to gamma and volatility\n  (higher gamma → more frequent, costly rebalancing)</div>'},
{title:'Describe the role of gamma risk in options trading.',explanation:'<p><span class="key-term">Gamma risk</span> is the risk that delta changes rapidly, making the delta hedge inaccurate between rebalancing points.</p><p><strong>High gamma</strong> (at-the-money, near expiration): delta changes rapidly with small price moves → hedging error is large → must rebalance frequently → costly. This is the "gamma trap" that option sellers fear near expiration.</p><p><strong>Low gamma</strong> (deep in/out of the money, long-dated): delta is relatively stable → hedge holds well between rebalances.</p><p>Long gamma (long options): benefits from large moves in either direction — each move makes the position "more right." Short gamma (short options): hurts from large moves — each move makes the position "more wrong." This asymmetry is why option sellers demand a premium (theta) for bearing gamma risk.</p>'},
{title:'Define implied volatility and explain how it is used in options trading.',explanation:'<p><span class="key-term">Implied volatility (IV)</span> is the volatility that, when plugged into BSM, produces the observed market price. It\'s solved numerically (no closed-form inverse of BSM).</p><div class="formula-box"><span class="label">Implied Volatility</span>Market price = BSM(S, X, T, r, σ_implied)\nSolve for σ_implied iteratively\n\nVolatility smile: IV varies by strike price\n  (OTM puts often have higher IV → "skew")\n\nVolatility term structure: IV varies by expiration\n  (short-term IV often higher around events like earnings)\n\nVIX = market-implied 30-day volatility of S&P 500\n  "Fear gauge" — spikes during market stress</div><p>Traders quote options in terms of implied vol rather than price — it\'s more comparable across strikes and maturities. "Buying vol" means buying options expecting realized vol to exceed IV. "Selling vol" is the opposite bet.</p>'}
]},
