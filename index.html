'corp|dividends':{
quickReview:['Regular cash dividends: expected, stable signal. Extra/special: one-time, no commitment. Liquidating: return of capital, not income.','Stock dividends & splits: no economic impact on wealth — same pie, more slices. Reverse splits signal distress.','Theories: MM irrelevance (perfect markets), bird-in-hand (dividends preferred), tax preference (low/no-dividend preferred due to capital gains tax advantage).','Signaling: dividend initiations/increases = management confidence. Cuts/omissions = severe negative signal (usually avoided at all costs).','Agency costs: dividends reduce free cash flow available for empire-building → disciplining mechanism for management.','Stable dividend: fixed $/share, only raised when sustainable. Constant payout: fixed % of earnings (volatile dividends).','Repurchase methods: open-market (most common, flexible), tender offer (fixed price or Dutch auction), direct negotiation.','Repurchase effect on EPS: accretive if earnings yield (E/P) > after-tax cost of funds used.'],
analogy:'Dividend policy is like a <em>restaurant\'s tipping policy</em>. A stable dividend is like a fixed service charge — customers (shareholders) know exactly what to expect. A constant payout ratio is like "tip whatever you feel" — it fluctuates with the meal quality (earnings). A share repurchase is like the restaurant buying back loyalty cards at a premium — fewer cards outstanding means each remaining card is worth more. And a dividend cut is like removing the service charge mid-meal — it signals the kitchen is in trouble.',
los:[
{title:'Describe the expected effect of regular cash dividends, extra dividends, liquidating dividends, stock dividends, stock splits, and reverse stock splits on shareholders\' wealth and financial ratios.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Action</div><div>Cash Impact</div><div>Wealth Impact</div><div>Signal</div></div><div class="lo-compare-row lo-compare-4"><div>💵 Regular Cash Dividend</div><div>↓ cash, ↓ retained earnings</div><div>Neutral (price drops by div amount)</div><div>Stability, confidence in ongoing cash flow</div></div><div class="lo-compare-row lo-compare-4"><div>🎁 Extra/Special Dividend</div><div>Same mechanics, one-time</div><div>Neutral</div><div>No future commitment implied</div></div><div class="lo-compare-row lo-compare-4"><div>🏚️ Liquidating Dividend</div><div>Return of CAPITAL, not earnings</div><div>↓ paid-in capital</div><div style="color:#EF4444;font-weight:700">Partial/full wind-down of business</div></div><div class="lo-compare-row lo-compare-4"><div>📄 Stock Dividend / Split</div><div>No cash changes hands</div><div>Zero — same pie, more slices</div><div>Mildly positive (signals management confidence)</div></div><div class="lo-compare-row lo-compare-4"><div>🔻 Reverse Split</div><div>No cash changes hands</div><div>Zero — same pie, fewer slices</div><div style="color:#EF4444;font-weight:700">Often signals distress (meet min price requirements)</div></div></div>'},
{title:'Compare theories of dividend policy and explain implications of each for share value given a corporate dividend action.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Theory</div><div>Core Claim</div><div>If Dividends ↑</div><div>Assumptions</div></div><div class="lo-compare-row lo-compare-4"><div>🔬 MM Irrelevance</div><div>Dividend policy doesn\'t affect firm value</div><div style="color:#F59E0B;font-weight:700">No price effect</div><div>Perfect markets, no taxes, no transaction costs</div></div><div class="lo-compare-row lo-compare-4"><div>🐦 Bird-in-Hand</div><div>Investors prefer certain dividends to uncertain capital gains</div><div style="color:#10B981;font-weight:700">Price ↑ (lower required return)</div><div>Investors are risk-averse, dividends less risky than future gains</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Tax Preference</div><div>Capital gains taxed lower/deferred → investors prefer retention</div><div style="color:#EF4444;font-weight:700">Price ↓ (tax-disadvantaged)</div><div>Differential taxation of dividends vs. capital gains</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>In practice:</strong> All three forces operate simultaneously. The net effect depends on the investor base\'s tax situation and risk preferences. Tax-exempt institutions are indifferent; high-income individuals may prefer buybacks.</div></div>'},
{title:'Describe types of information (signals) that dividend initiations, increases, decreases, and omissions may convey.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Action</div><div>Signal</div><div>Market Reaction</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">🚀 Initiation</div><div>Management confident in sustainable future cash flows</div><div>Positive — company has "arrived" as a dividend payer</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">📈 Increase</div><div>Earnings outlook strong; increase is "sticky" (quasi-commitment)</div><div>Moderately positive</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">📉 Decrease</div><div>Cash flow problems serious enough to risk the severe market reaction</div><div>Strongly negative</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">⛔ Omission</div><div>Company in serious financial difficulty — last resort</div><div>Very strongly negative</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Key asymmetry:</strong> increases signal good news <em>moderately</em>; cuts signal bad news <em>dramatically</em>. This is why managers are extremely reluctant to raise dividends — they\'re taking on a commitment that\'s very painful to break.</div></div>'},
{title:'Explain how agency costs may affect a company\'s payout policy.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🏗️</div><div class="lo-icon-card-title">Empire Building</div><div class="lo-icon-card-desc">Managers use free cash flow on value-destroying acquisitions to grow their domain</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🎩</div><div class="lo-icon-card-title">Excessive Perks</div><div class="lo-icon-card-desc">Corporate jets, lavish offices, inflated headcount — all easier with large cash reserves</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🧪</div><div class="lo-icon-card-title">Pet Projects</div><div class="lo-icon-card-desc">Negative-NPV investments that managers pursue for prestige or personal interest</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Dividends as discipline:</strong> By committing to pay out cash, management has less to waste. Debt also disciplines (fixed interest payments), so leverage and dividends are partial substitutes. Companies with strong governance and aligned incentives face lower agency costs and less need for the dividend discipline mechanism.</div></div>'},
{title:'Explain factors that affect dividend policy in practice.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🚀</div><div class="lo-icon-card-title">Investment Opportunities</div><div class="lo-icon-card-desc">High-growth firms retain more (low payout). Mature firms with fewer projects pay more out.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🌊</div><div class="lo-icon-card-title">Earnings Volatility</div><div class="lo-icon-card-desc">Volatile earnings → lower target payout to avoid painful dividend cuts in bad years</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🔧</div><div class="lo-icon-card-title">Financial Flexibility</div><div class="lo-icon-card-desc">Need capacity for future investment, debt repayment, and emergencies</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Tax Considerations</div><div class="lo-icon-card-desc">Shareholder tax status drives preference — tax-exempt institutions are indifferent; high-income prefer buybacks</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📝</div><div class="lo-icon-card-title">Contractual Constraints</div><div class="lo-icon-card-desc">Debt covenants may limit dividends. Some jurisdictions restrict dividends to retained earnings.</div></div></div>'},
{title:'Calculate and interpret the effective tax rate on a given currency unit of corporate earnings under double taxation, dividend imputation, and split-rate tax systems.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>System</div><div>How It Works</div><div>Formula / Example</div><div>Double Tax?</div></div><div class="lo-compare-row lo-compare-4"><div>🏛️ Classical (US)</div><div>Corp pays tax, then shareholder pays tax on dividends received</div><div>$$1 - (1-t_c)(1-t_d)$$ e.g. 36.8\\%</div><div style="color:#EF4444;font-weight:700">Yes — full double taxation</div></div><div class="lo-compare-row lo-compare-4"><div>🇦🇺 Imputation (Australia)</div><div>Shareholder gets credit for corp tax already paid ("franking credits")</div><div>Effective ≈ max(t_c, t_personal). Avoids double taxation.</div><div style="color:#10B981;font-weight:700">No — credit eliminates it</div></div><div class="lo-compare-row lo-compare-4"><div>🔀 Split-Rate (historical)</div><div>Lower corp rate on distributed earnings, higher on retained</div><div>Encourages payout. Different rates apply depending on retention vs. distribution.</div><div style="color:#F59E0B;font-weight:700">Reduced on distributed earnings</div></div></div>'},
{title:'Compare stable dividend with constant dividend payout ratio, and calculate the dividend under each policy.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>Stable Dividend</div><div>Constant Payout Ratio</div><div>Hybrid (Target Adjustment)</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Rule</div><div>Fixed $/share, increased only when sustainable</div><div>Fixed % of earnings each period</div><div>Gradually adjust toward target ratio</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Dividend Behavior</div><div>Smooth, predictable</div><div style="color:#EF4444;font-weight:700">Volatile — tracks earnings directly</div><div>Moderate smoothing toward a target</div></div><div class="lo-compare-row lo-compare-4"><div>✅ Advantage</div><div>Predictable income; positive signal</div><div>Dividends reflect profitability</div><div>Balance of stability and earnings link</div></div><div class="lo-compare-row lo-compare-4"><div>❌ Disadvantage</div><div>Disconnect from current earnings</div><div>Potential cuts in bad years → negative signal</div><div>More complex to communicate</div></div></div><div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 Example: EPS drops from $4 to $2, Target payout = 40%</div><div class="formula-highlight-body">Stable: dividend stays at $1.60/share (same as last year)\n$$Constant payout: $2 \\times 40\\% = $0.\\frac{80}{share} (cut in half!)$$</div></div>'},
{title:'Describe broad trends in corporate payout policies.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">Fewer Dividend Payers</div><div class="lo-icon-card-desc">Proportion of listed companies paying dividends has declined, especially younger/tech firms that prefer retention</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Buyback Surge</div><div class="lo-icon-card-desc">Share repurchases now rival or exceed dividends in the US. Offer tax efficiency and flexibility.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Total Payout Stable</div><div class="lo-icon-card-desc">Dividends + buybacks as % of earnings remains substantial. Those that pay, pay more.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Global Convergence</div><div class="lo-icon-card-desc">European and Asian firms increasingly adopt buybacks alongside traditional dividends</div></div></div>'},
{title:'Compare share repurchase methods.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>How It Works</div><div>Signal Strength</div><div>Flexibility</div></div><div class="lo-compare-row lo-compare-4"><div>🏪 Open-Market</div><div>Company buys shares on the exchange like any investor. ~90%+ of buybacks.</div><div>Moderate</div><div style="color:#10B981;font-weight:700">Maximum — no obligation to complete</div></div><div class="lo-compare-row lo-compare-4"><div>🎯 Fixed-Price Tender</div><div>Offer to buy a set number of shares at a fixed premium to market</div><div style="color:#10B981;font-weight:700">Strong (premium signals undervaluation)</div><div>Low — committed once announced</div></div><div class="lo-compare-row lo-compare-4"><div>🔨 Dutch Auction</div><div>Company specifies price range; shareholders bid minimum price they\'d accept; buys at lowest clearing price</div><div>Moderate</div><div>Medium — efficient price discovery</div></div><div class="lo-compare-row lo-compare-4"><div>🤝 Direct Negotiation</div><div>Private purchase from a specific large shareholder</div><div>Varies</div><div>Targeted — may include greenmail premium</div></div></div>'},
{title:'Calculate and compare the effect of a share repurchase on EPS when financed with surplus cash vs. debt.',explanation:'<div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 EPS Accretion/Dilution Rule</div><div class="formula-highlight-body">Repurchase is EPS-ACCRETIVE if:\nEarnings yield (E/P) > after-tax cost of funds</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Financing</div><div>Cost of Funds</div><div>Typical Result</div></div><div class="lo-compare-row lo-compare-3"><div>💵 Cash-Financed</div><div>Foregone after-tax interest income (very low)</div><div style="color:#10B981;font-weight:700">Almost always accretive (cash earns almost nothing)</div></div><div class="lo-compare-row lo-compare-3"><div>💳 Debt-Financed</div><div>$$r_d^{*} = r_d \\times (1 - t)$$</div><div>Accretive if E/P > r_d × (1−t)</div></div></div><div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 Worked Example</div><div class="formula-highlight-body">$$10M shares, EPS = $3, P = $40, borrow at 5\\%, tax = 25\\%$$\n$$\\frac{E}{P} = \\frac{3}{40} = 7.5\\%$$\n$$After-tax cost = 5\\% \\times (1-0.25) = 3.75\\%$$\n7.5% > 3.75% → ACCRETIVE</div></div>'},
{title:'Calculate the effect of a share repurchase on book value per share.',explanation:'<div class="formula-highlight" style="--active-color:#F59E0B"><div class="formula-highlight-title" style="color:#F59E0B">📐 BVPS After Repurchase</div><div class="formula-highlight-body">$$\\text{New BVPS} = \\frac{\\text{Total equity} - \\text{Repurchase cost}}{\\text{Shares} - \\text{Repurchased}}$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Scenario</div><div>BVPS Effect</div><div>Intuition</div></div><div class="lo-compare-row lo-compare-3"><div>Repurchase price > pre-repurchase BVPS</div><div style="color:#EF4444;font-weight:700">BVPS decreases</div><div>Buying above book → destroying book value per remaining share</div></div><div class="lo-compare-row lo-compare-3"><div>Repurchase price < pre-repurchase BVPS</div><div style="color:#10B981;font-weight:700">BVPS increases</div><div>Buying below book → accretive to remaining shareholders\' book value</div></div><div class="lo-compare-row lo-compare-3"><div>Repurchase price = BVPS</div><div>No change</div><div>Neutral — perfectly at book value</div></div></div><div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 Example</div><div class="formula-highlight-body">$$Equity = $200M, 10M shares, BVPS = $20$$\nRepurchase 1M shares at $25 (above BVPS):\n$$\\text{New equity} = $200M - $25M = $175M$$\n$$\\text{New shares} = 9M$$\n$$\\text{New BVPS} = $\\frac{175M}{9M} = $19.44 (↓ decreased)$$</div></div>'},
{title:'Explain the choice between paying cash dividends and repurchasing shares.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Factor</div><div>Favors Dividends</div><div>Favors Repurchases</div></div><div class="lo-compare-row lo-compare-3"><div>💰 Tax Efficiency</div><div>Tax-exempt investors are indifferent</div><div style="color:#10B981;font-weight:700">Capital gains taxed lower and deferred</div></div><div class="lo-compare-row lo-compare-3"><div>🔄 Flexibility</div><div>Stronger commitment signal (harder to cut)</div><div style="color:#10B981;font-weight:700">No implicit future obligation</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Valuation Signal</div><div>Stability of ongoing cash flows</div><div style="color:#10B981;font-weight:700">Management believes stock is undervalued</div></div><div class="lo-compare-row lo-compare-3"><div>👥 Investor Base</div><div style="color:#10B981;font-weight:700">Retirees, endowments need income</div><div>Growth investors prefer reinvestment or buybacks</div></div><div class="lo-compare-row lo-compare-3"><div>📋 Dilution Offset</div><div>Doesn\'t address option dilution</div><div style="color:#10B981;font-weight:700">Offsets dilution from stock-based comp</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>In practice:</strong> Many companies do both — maintain a baseline dividend for stability and use repurchases for incremental payouts when cash flow permits. The mix depends on investor base, tax environment, and management\'s view on valuation.</div></div>'},
{title:'Calculate and interpret dividend coverage ratios based on net income and free cash flow.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Dividend Coverage Ratios</div><div class="formula-highlight-body">$$NI-based: Coverage = Net \\frac{Income}{Dividends} (= \\frac{1}{Payout} Ratio)$$\n$$FCF-based: Coverage = \\frac{FCFE}{Dividends + Repurchases}$$\n$$where FCFE = CFO - FCInv + Net Borrowing$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Metric</div><div>Worked Example</div><div>Interpretation</div></div><div class="lo-compare-row lo-compare-3"><div>NI Coverage</div><div>\$500M NI / \$200M Div = 2.5×</div><div style="color:#10B981;font-weight:700">Solid — earnings 2.5× dividends</div></div><div class="lo-compare-row lo-compare-3"><div>FCFE Coverage</div><div>\$350M FCFE / \$200M Div = 1.75×</div><div style="color:#10B981;font-weight:700">Adequate — cash flow supports dividend</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Coverage &lt; 1.0×</strong> means the dividend exceeds earnings or cash flow → unsustainable without asset sales or new borrowing. FCF-based is the more conservative (and reliable) measure because it uses actual cash available to equity holders.</div></div>'},
{title:'Identify characteristics of companies that may not be able to sustain their cash dividend.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📉</div><div class="lo-icon-card-title">Coverage Deterioration</div><div class="lo-icon-card-desc">Payout ratio approaching or exceeding 100%. FCFE coverage falling below 1.0× for multiple periods.</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💳</div><div class="lo-icon-card-title">Rising Leverage</div><div class="lo-icon-card-desc">Increasing debt to maintain dividends — borrowing to pay shareholders is a classic late-stage warning sign.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Declining Earnings Trend</div><div class="lo-icon-card-desc">Structural (not cyclical) decline in core earnings with no clear path to recovery.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Cash Flow Gap</div><div class="lo-icon-card-desc">NI looks healthy but CFO is weak — accrual-based earnings aren\'t converting to cash.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">📝</div><div class="lo-icon-card-title">Contractual Constraints</div><div class="lo-icon-card-desc">Debt covenants tightening, approaching minimum equity thresholds, regulatory capital under pressure.</div></div><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🌪️</div><div class="lo-icon-card-title">Industry Headwinds</div><div class="lo-icon-card-desc">Secular business model decline combined with heavy capex requirements.</div></div></div>'}
]},

'corp|esg':{
quickReview:['Ownership structures vary globally: dispersed (US/UK), concentrated (continental Europe, Asia), state-owned, family-controlled.','Concentrated ownership → potential for principal-principal conflicts (controlling vs. minority shareholders).','ESG analysis: identify material risk exposures (E: carbon, water; S: labor, data privacy; G: board, executive pay), then evaluate management quality.','Green bonds, sustainability-linked loans, and ESG integration in valuation are growing trends.'],
analogy:'ESG analysis is like a <em>home inspection before buying a house</em>. The financial statements are the listing brochure — they show the best angles. ESG analysis checks the foundation (governance), the plumbing (environmental liabilities), and the neighborhood (social factors). A beautiful house with a cracked foundation is a terrible investment, no matter how nice the kitchen looks.',
los:[
{title:'Describe global variations in ownership structures and the possible effects on corporate governance policies and practices.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Structure</div><div>Where Common</div><div>Core Agency Conflict</div><div>Governance Response</div></div><div class="lo-compare-row lo-compare-4"><div>🏢 Dispersed</div><div>US, UK</div><div style="color:#EF4444;font-weight:700">Principal-Agent: managers vs. shareholders</div><div>Independent boards, exec comp alignment, activist investors</div></div><div class="lo-compare-row lo-compare-4"><div>👨‍👩‍👧 Concentrated / Family</div><div>Continental Europe, Asia, LatAm</div><div style="color:#EF4444;font-weight:700">Principal-Principal: controlling vs. minority shareholders</div><div>Minority protections, limits on related-party deals, dual-class restrictions</div></div><div class="lo-compare-row lo-compare-4"><div>🏛️ State-Owned</div><div>China, Middle East, many EM</div><div style="color:#EF4444;font-weight:700">Government objectives (employment, security) vs. profit maximization</div><div>Often weaker governance; political board appointments; less transparency</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Concentrated ownership risks:</strong> tunneling (transferring value to controlling shareholder), pyramidal structures (control with minimal capital), dual-class shares (voting power ≠ economic interest). Analysts must assess minority shareholder risk in the ownership context.</div></div>'},
{title:'Evaluate the effectiveness of a company\'s corporate governance policies and practices.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Board Quality</div><div class="lo-icon-card-desc">Majority independent? Relevant expertise? Diversity? Separate chair/CEO? Limited overboarding? Regular refreshment?</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🗳️</div><div class="lo-icon-card-title">Shareholder Rights</div><div class="lo-icon-card-desc">One-share-one-vote? Proxy access? No poison pills? Ability to call special meetings?</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">💰</div><div class="lo-icon-card-title">Executive Compensation</div><div class="lo-icon-card-desc">Aligned with long-term value? Clawback provisions? Performance metrics tied to shareholder returns?</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🔍</div><div class="lo-icon-card-title">Audit & Risk Oversight</div><div class="lo-icon-card-desc">Independent audit committee? Quality external auditor? Risk framework? Whistleblower protections?</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Transparency</div><div class="lo-icon-card-desc">Timely disclosures? Related-party transaction policies? Insider trading policies?</div></div></div>'},
{title:'Describe how ESG-related risk exposures and investment opportunities may be identified and evaluated.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">1</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Identify Material Factors</div><div class="lo-step-desc">Use SASB/GRI materiality frameworks. Carbon matters hugely for utilities, barely for software. Data privacy is critical for tech, less for mining.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">2</div><div class="lo-step-connector" style="background:#10B981;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Evaluate Exposure vs. Peers</div><div class="lo-step-desc">Does the company measure/disclose relevant metrics? Has it set targets? What\'s its track record? How does it compare to industry best practice?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#10B981">3</div></div><div class="lo-step-body"><div class="lo-step-title">Identify Opportunities</div><div class="lo-step-desc">ESG leadership → lower cost of capital, reduced regulatory risk, stronger brand, better talent, operational efficiency, green financing access.</div></div></div></div>'},
{title:'Evaluate ESG risk exposures and investment opportunities related to a company.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Pillar</div><div>Key Risks</div><div>Quantifiable Metrics</div><div>Valuation Integration</div></div><div class="lo-compare-row lo-compare-4"><div>🌍 Environmental</div><div>Carbon footprint, transition risk (stranded assets), water stress, waste, biodiversity</div><div>Carbon intensity / revenue, environmental capex %, regulatory penalty history</div><div>Scenario analysis for carbon tax, stranded asset write-downs</div></div><div class="lo-compare-row lo-compare-4"><div>👥 Social</div><div>Workforce management, supply chain labor, community relations, product safety, data privacy</div><div>Employee turnover, safety incident rate, diversity metrics, customer complaint trends</div><div>Adjust growth rate for brand/reputation risk</div></div><div class="lo-compare-row lo-compare-4"><div>🏛️ Governance</div><div>Board structure, ownership concentration, exec comp alignment, related-party transactions, accounting quality</div><div>% independent directors, CEO pay ratio, insider ownership, audit quality</div><div>Adjust discount rate higher for poor governance</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏠</div><div class="lo-mini-analogy-text">Financial statements = the listing brochure (best angles). ESG = the home inspection — checking the foundation (governance), plumbing (environmental liabilities), and neighborhood (social factors). A beautiful house with a cracked foundation is a terrible investment.</div></div>'}
]},

'corp|cost-cap':{
quickReview:['Top-down: country risk premium, industry beta. Bottom-up: company-specific leverage, size, liquidity.','Cost of debt: YTM on existing debt, credit spread approach (risk-free + spread), or debt rating approach.','ERP estimation: historical (arithmetic vs. geometric mean), forward-looking (dividend discount → implied ERP), survey-based.','Required return on equity: CAPM, Fama-French multifactor, build-up method (for private companies), bond yield + risk premium.','Private company: add size premium, specific-company risk premium, illiquidity premium to public-company rate.','Evaluate capital structure: optimal minimizes WACC. Compare D/E, interest coverage, and credit rating vs. peers.'],
analogy:'Cost of capital is like the <em>minimum rent a landlord charges</em>. If investors (landlords) could earn 8% elsewhere at similar risk, they demand at least 8% from your company (tenant). WACC is the blended rent for the whole building — a mix of the rate charged to debt-holders (who get the safe ground floor) and equity-holders (who get the penthouse with better views but more earthquake risk).',
los:[
{title:'Explain top-down and bottom-up factors that impact the cost of capital.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Level</div><div>Factors</div><div>How They Affect Cost of Capital</div></div><div class="lo-compare-row lo-compare-3"><div>🌍 Top-Down (Macro)</div><div>Risk-free rate, equity risk premium, country risk premium, industry cyclicality</div><div>Set the baseline: higher macro risk → higher cost for everyone in that market/industry</div></div><div class="lo-compare-row lo-compare-3"><div>🏢 Bottom-Up (Company)</div><div>Financial leverage, operating leverage, company size, liquidity, business risk, credit quality</div><div>Differentiate within an industry: riskier firm → higher cost vs. peers</div></div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">⚖️</div><div class="lo-icon-card-title">Financial Leverage</div><div class="lo-icon-card-desc">More debt → higher equity risk (magnified returns) but tax shield lowers debt cost. Net effect on WACC depends on level.</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📏</div><div class="lo-icon-card-title">Size</div><div class="lo-icon-card-desc">Small-cap firms earn higher returns historically → small-cap premium added to cost of equity</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">💧</div><div class="lo-icon-card-title">Liquidity</div><div class="lo-icon-card-desc">Illiquid stocks demand higher return → illiquidity premium (especially for private companies)</div></div></div>'},
{title:'Compare methods used to estimate the cost of debt.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>How It Works</div><div>Best When</div><div>Limitation</div></div><div class="lo-compare-row lo-compare-4"><div>📈 YTM Approach</div><div>Use YTM on the company\'s existing traded bonds. After-tax: $$r_d \\times (1-t)$$</div><div>Liquid bonds with similar maturity to target</div><div>Bond may have embedded options; illiquid bonds have stale prices</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Credit Spread</div><div>$$r_d = r_f + \\text{credit spread}$$</div><div>Company has a public credit rating</div><div>Spread varies by maturity and market conditions</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Debt Rating (Synthetic)</div><div>Estimate a synthetic rating from financial ratios (interest coverage → implied rating → spread)</div><div>Unrated companies or private firms</div><div>Approximate; relies on ratio-to-rating mapping</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Key principles:</strong> Use marginal (not historical) cost for new financing decisions. Adjust for callable/convertible features if present. For floating-rate debt, estimate the expected average rate over the relevant horizon.</div></div>'},
{title:'Explain historical and forward-looking approaches to estimating an equity risk premium.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Approach</div><div>Method</div><div>Advantage</div><div>Key Issue</div></div><div class="lo-compare-row lo-compare-4"><div>📜 Historical (Arithmetic Mean)</div><div>Average (equity return − risk-free) over long period</div><div>Better for single-period expected return</div><div>Period-sensitive, survivorship bias, non-stationary</div></div><div class="lo-compare-row lo-compare-4"><div>📜 Historical (Geometric Mean)</div><div>Compound annual (equity − risk-free) over long period</div><div>Better for long-run compounded return</div><div>Same issues; arithmetic vs. geometric choice matters</div></div><div class="lo-compare-row lo-compare-4"><div>🔮 Forward-Looking (Implied)</div><div>$$ERP = (D_1/P_0 + g) - r_f$$</div><div style="color:#10B981;font-weight:700">Current, market-based, no historical bias</div><div>Sensitive to growth rate assumption</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Survey-Based</div><div>Ask academics, CFOs, strategists</div><div>Captures expert judgment</div><div>Anchoring bias, wide dispersion</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>No single method is best.</strong> Practitioners typically triangulate across all three approaches. The forward-looking implied ERP is gaining popularity because it reflects current market conditions rather than a potentially irrelevant historical average.</div></div>'},
{title:'Compare methods used to estimate the required return on equity.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>Formula</div><div>Best For</div><div>Limitation</div></div><div class="lo-compare-row lo-compare-4"><div>📐 CAPM</div><div>$$r_e = r_f + \\beta \\times ERP$$</div><div>Public companies with observable β</div><div>Single factor; β unstable over time</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Fama-French</div><div>$$r_e = r_f + \\beta_{mkt} ERP + \\beta_{size} SMB + \\beta_{val} HML$$</div><div>Capturing size and value premiums</div><div>More data-intensive; factors may not persist</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Build-Up</div><div>$$r_e = r_f + ERP + SP + SCRP + IP$$</div><div style="color:#10B981;font-weight:700">Private companies (no observable β)</div><div>Subjective premium estimates</div></div><div class="lo-compare-row lo-compare-4"><div>💳 Bond Yield + RP</div><div>$$r_e = YTM_{\\text{bond}} + \\text{equity risk premium}$$</div><div>Simple company-specific estimate</div><div>Imprecise; equity premium hard to calibrate</div></div></div>'},
{title:'Estimate the cost of debt or required return on equity for a public company and a private company.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Step</div><div>Public Company</div><div>Private Company</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Beta</div><div>Regression of stock returns on market returns</div><div>No traded equity → use comparable public betas, unlevered, then relever</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Base Cost of Equity</div><div>CAPM or multifactor model directly</div><div>CAPM with relevered beta from comparables</div></div><div class="lo-compare-row lo-compare-3"><div>➕ Additional Premiums</div><div>None typically (already in market price)</div><div style="color:#EF4444;font-weight:700">+ Size premium + specific-company risk + illiquidity premium (total: 3-8% above public comparable)</div></div></div><div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 Private Company Process</div><div class="formula-highlight-body">1. Find comparable public companies\n$$2. Unlever betas: \\beta_asset = \\beta_equity / [1 + (1-t)(D/E)]$$\n3. Relever to private company\'s target D/E\n$$4. r_e = r_f + \\beta_relev \\times ERP + size + specific + illiquidity$$</div></div>'},
{title:'Evaluate a company\'s capital structure and cost of capital relative to peers.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">1</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Benchmark Leverage Metrics</div><div class="lo-step-desc">D/E, D/Capital, Debt/EBITDA, interest coverage (EBIT/Interest) vs. industry medians and company\'s own target range</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">2</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Assess Credit Quality</div><div class="lo-step-desc">Current rating vs. peers. Under- or over-levered relative to its rating? Room to take on more debt at favorable rates?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">3</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Estimate WACC at Different Leverage Levels</div><div class="lo-step-desc">Optimal capital structure minimizes WACC. Too little debt = missing tax shields. Too much = distress costs outweigh benefits.</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">4</div></div><div class="lo-step-body"><div class="lo-step-title">Consider Practical Constraints</div><div class="lo-step-desc">Debt capacity depends on asset tangibility, earnings stability, industry norms, management risk appetite, and covenant restrictions.</div></div></div></div>'}
]},

'corp|restruct':{
quickReview:['Types: investment actions (acquisitions, JVs, equity investments), divestments (spin-offs, carve-outs, asset sales), cost/BS restructuring (layoffs, debt refinancing).','Motivation: synergies, focus, unlocking value, financial distress, tax optimization, strategic repositioning.','Valuation: DCF of combined/restructured entity, comparable transactions, accretion/dilution analysis, sum-of-parts.','Impact on metrics: EPS (accretion/dilution), Net Debt/EBITDA (leverage change), WACC (capital structure shift).','Spin-offs: tax-free separation → market can value each piece independently. Often unlocks "conglomerate discount."','Cost restructuring: one-time charges (severance, write-downs) → improved ongoing margins. Check if "restructuring" is actually recurring.'],
analogy:'Corporate restructuring is like <em>renovating a house to sell</em>. An acquisition is adding a new wing (bigger, but will the addition match the original?). A spin-off is splitting a duplex into two separate homes (each might sell for more independently). Cost restructuring is gutting the kitchen and redoing it — painful and expensive upfront, but the house is worth more when it\'s done. And a balance sheet restructuring is refinancing the mortgage — same house, better terms.',
los:[
{title:'Explain types of corporate restructurings and issuers\' motivations for pursuing them.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Category</div><div>Actions</div><div>Typical Motivation</div></div><div class="lo-compare-row lo-compare-3"><div>🏗️ Investment Actions</div><div>Acquisitions, joint ventures, equity investments</div><div>Synergy capture, market entry, technology access, scale</div></div><div class="lo-compare-row lo-compare-3"><div>✂️ Divestment Actions</div><div>Spin-offs (tax-free), carve-outs (partial IPO), asset sales (cash)</div><div>Strategic focus, unlock conglomerate discount, raise cash, activist pressure</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Cost Restructuring</div><div>Workforce reduction, facility closures, process redesign</div><div>Improve margins, respond to competitive pressure, post-merger integration</div></div><div class="lo-compare-row lo-compare-3"><div>💳 Balance Sheet Restructuring</div><div>Debt refinancing, debt-equity swaps, maturity extension</div><div>Reduce interest burden, avoid covenant breach, address distress</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏠</div><div class="lo-mini-analogy-text">Acquisition = adding a wing. Spin-off = splitting a duplex into two homes. Cost restructuring = gutting the kitchen. Balance sheet restructuring = refinancing the mortgage. Each changes the house differently.</div></div>'},
{title:'Explain the initial evaluation of a corporate restructuring.',explanation:'<div class="lo-steps"><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">1</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Strategic Rationale</div><div class="lo-step-desc">Does the restructuring make strategic sense? Does it create value or just shuffle assets? Is management\'s stated rationale credible?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">2</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Valuation Impact</div><div class="lo-step-desc">Expected change in firm value? Are projected synergies realistic? Track record of similar transactions?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">3</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Execution Risk</div><div class="lo-step-desc">Integration complexity, organizational disruption, key-person retention, cultural compatibility, timeline realism</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">4</div><div class="lo-step-connector" style="background:#A855F7;opacity:0.2"></div></div><div class="lo-step-body"><div class="lo-step-title">Financial Impact</div><div class="lo-step-desc">Effect on EPS, leverage, WACC, credit rating. Funding source — dilutive equity? Debt capacity?</div></div></div><div class="lo-step"><div class="lo-step-line"><div class="lo-step-dot" style="background:#A855F7">5</div></div><div class="lo-step-body"><div class="lo-step-title">Stakeholder Impact</div><div class="lo-step-desc">Employee displacement, customer/supplier disruption, regulatory approval requirements, shareholder vote needed?</div></div></div></div>'},
{title:'Demonstrate valuation methods for, and interpret valuations of, companies involved in corporate restructurings.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Method</div><div>How It Works</div><div>Best For</div><div>Key Judgment</div></div><div class="lo-compare-row lo-compare-4"><div>📈 DCF (Combined)</div><div>Project combined cash flows including synergies, discount at new WACC</div><div>All restructurings — most theoretically rigorous</div><div>Synergy estimates → usually overstated</div></div><div class="lo-compare-row lo-compare-4"><div>🔍 Comparable Transactions</div><div>What similar deals priced at (EV/EBITDA, EV/Revenue from recent deals)</div><div>M&A pricing with active deal market</div><div>Each deal has unique circumstances</div></div><div class="lo-compare-row lo-compare-4"><div>🧩 Sum-of-the-Parts</div><div>Value each segment independently, then sum</div><div style="color:#10B981;font-weight:700">Spin-offs, conglomerates (SOTP &gt; market cap = discount)</div><div>Appropriate multiple for each segment</div></div><div class="lo-compare-row lo-compare-4"><div>💳 LBO Analysis</div><div>Can the deal generate target IRR (20%+) at proposed leverage?</div><div>Leveraged buyouts</div><div>Debt capacity and exit multiple assumptions</div></div></div>'},
{title:'Demonstrate how corporate restructurings affect an issuer\'s EPS, net debt to EBITDA ratio, and WACC.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Metric</div><div>Accretion / Dilution Rule</div><div>Cash/Debt Acquisition</div><div>Spin-Off</div></div><div class="lo-compare-row lo-compare-4"><div>📊 EPS</div><div>Accretive if target\'s earnings yield &gt; acquirer\'s cost of financing</div><div>Cash deals almost always accretive; stock deals depend on relative E/P</div><div>Split earnings across parent + spun-off entity</div></div><div class="lo-compare-row lo-compare-4"><div>💳 Net Debt / EBITDA</div><div>Cash/debt → leverage ↑ (more debt, same equity)</div><div style="color:#EF4444;font-weight:700">↑ Increases</div><div>Depends on debt allocation between entities</div></div><div class="lo-compare-row lo-compare-4"><div>📐 WACC</div><div>New business risk profile → new beta; leverage change → new D/E</div><div>May ↑ or ↓ depending on target\'s risk vs. acquirer\'s</div><div>Both entities get their own WACC (often different)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>EPS accretion ≠ value creation.</strong> A deal can be EPS-accretive but value-destructive if the acquirer overpays. Always assess whether the return on invested capital exceeds the cost of capital — not just whether EPS goes up.</div></div>'},
{title:'Evaluate corporate investment actions, including equity investments, joint ventures, and acquisitions.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Action</div><div>Commitment Level</div><div>Key Evaluation Criteria</div><div>Primary Risk</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Equity Investment</div><div>Low — minority stake</div><div>Strategic fit, price vs. fair value, equity method accounting impact</div><div>Limited control; dependent on investee management</div></div><div class="lo-compare-row lo-compare-4"><div>🤝 Joint Venture</div><div>Medium — shared</div><div>Partner incentive alignment, governance structure, exit provisions, IP sharing risks</div><div>Partner conflict; unclear decision-making; IP leakage</div></div><div class="lo-compare-row lo-compare-4"><div>💍 Acquisition</div><div style="color:#EF4444;font-weight:700">Highest — full control</div><div>Synergy realism, premium paid vs. value created, integration plan, cultural fit, financing structure</div><div>Overpayment; integration failure; culture clash</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Value creation test:</strong> For all three, compare expected ROIC to WACC. ROIC &gt; WACC → value created. Revenue synergies are harder to achieve than cost synergies — discount them more heavily.</div></div>'},
{title:'Evaluate corporate divestment actions, including sales and spin-offs.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Action</div><div>Key Features</div><div>Evaluation Focus</div></div><div class="lo-compare-row lo-compare-3"><div>💵 Asset/Division Sale</div><div>Cash proceeds received immediately. Clean break.</div><div>Sale price vs. intrinsic value; tax implications (cap gains); use of proceeds (delever? return to shareholders?); shared cost reallocation impact</div></div><div class="lo-compare-row lo-compare-3"><div>🔄 Spin-Off</div><div>No cash — shares distributed pro rata. Tax-free if structured properly.</div><div>Focus improvement; removal of conglomerate discount; independent management can optimize; research shows spin-offs tend to outperform</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Key question:</strong> Was the parent or the divested unit the "problem"? Sometimes the remaining parent, freed from a distraction, performs better. Sometimes the freed subsidiary thrives independently. The market can finally value each piece on its own merits.</div></div>'},
{title:'Evaluate cost and balance sheet restructurings.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Type</div><div>Mechanics</div><div>Evaluation Checklist</div></div><div class="lo-compare-row lo-compare-3"><div>✂️ Cost Restructuring</div><div>One-time charges (severance, write-downs, lease termination) → improved ongoing margins</div><div>Is the charge genuinely one-time? (Red flag if frequent.) Are projected savings realistic? Payback period? Will cuts impair revenue-generating capacity?</div></div><div class="lo-compare-row lo-compare-3"><div>💳 Balance Sheet Restructuring</div><div>Debt-equity swaps, refinancing at lower rates, maturity extension, asset sales to reduce debt</div><div>Does it address the root cause (overleveraged) or just buy time? Credit rating impact? Shareholder dilution? Covenant relief obtained?</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Distressed companies:</strong> Assess viability of the restructured entity. Is the core business sound but burdened by unsustainable debt? Or is the business itself impaired? A capital structure fix only works if the underlying operations can generate sufficient cash flow.</div></div>'}
]},

'equity|eq-process':{
quickReview:['Intrinsic value = PV of all future cash flows. Market price may differ → perceived mispricing → investment opportunity.','Going concern assumes indefinite operation. Liquidation value = asset disposal value − liabilities. Going concern > liquidation normally.','Absolute models (DCF, DDM, RI) estimate intrinsic value directly. Relative models (P/E, EV/EBITDA) compare to peers.','Sum-of-parts: value each segment separately → sum. Conglomerate discount = market cap < SOTP (diversification penalty).','Model choice depends on: dividend predictability, FCF stability, earnings quality, comparability of peers, data availability.'],
analogy:'Equity valuation is like <em>appraising a house</em>. The absolute approach (DCF) is like estimating value from expected future rental income. The relative approach (multiples) is like looking at what similar houses on the street sold for. Both have flaws — the rental estimate depends on assumptions about occupancy and rent growth; the comparable sale might have had a desperate seller. The best appraisers use both and triangulate.',
los:[
{title:'Define valuation and intrinsic value and explain sources of perceived mispricing.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Concept</div><div>Definition</div><div>Key Insight</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Valuation</div><div>Estimating the worth of an asset based on fundamental characteristics</div><div>It\'s an estimate — not a precise number. Always a range, never a point.</div></div><div class="lo-compare-row lo-compare-3"><div>💎 Intrinsic Value</div><div>The "true" value given complete understanding of all investment characteristics</div><div>Unobservable — different analysts get different estimates from different models/inputs</div></div><div class="lo-compare-row lo-compare-3"><div>⚡ Perceived Mispricing</div><div>When analyst\'s intrinsic value estimate ≠ market price</div><div>Could be real (market is wrong) OR apparent (your model is wrong)</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Sources of perceived mispricing:</strong> Different information (you know something the market doesn\'t), different models (DCF vs. multiples can give different answers), or different inputs/assumptions (your growth estimate differs from consensus). Humility required — the market is often right.</div></div>'},
{title:'Explain the going concern assumption and contrast going concern value to liquidation value.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Concept</div><div>Basis</div><div>When It Applies</div></div><div class="lo-compare-row lo-compare-3"><div>🏭 Going Concern Value</div><div>PV of all future cash flows — assumes company operates indefinitely</div><div>Normal case: operating business creates value above sum of its parts</div></div><div class="lo-compare-row lo-compare-3"><div>🔨 Liquidation Value</div><div>Net proceeds from selling all assets and settling all liabilities</div><div>Distressed, bankrupt, or when assets are worth more separately</div></div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>When liquidation &gt; going concern:</strong> the company is worth more dead than alive. This is a catalyst for activist investors, hostile takeovers, or voluntary wind-down. It signals the management is destroying value by continuing to operate.</div></div>'},
{title:'Describe definitions of value and justify which is most relevant to public company valuation.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Definition</div><div>What It Means</div><div>Determined By</div><div>Relevance</div></div><div class="lo-compare-row lo-compare-4"><div>💎 Intrinsic Value</div><div>Analyst\'s estimate of true fundamental worth</div><div>DCF, multiples, and analyst assumptions</div><div style="color:#10B981;font-weight:700">Most relevant for public equity valuation</div></div><div class="lo-compare-row lo-compare-4"><div>📈 Market Value</div><div>Current price × shares outstanding</div><div>Supply and demand in the market</div><div>What you can actually buy/sell at today</div></div><div class="lo-compare-row lo-compare-4"><div>⚖️ Fair Market Value</div><div>Price in an arm\'s-length transaction between willing parties</div><div>Negotiation between informed buyers/sellers</div><div>Legal/tax purposes</div></div><div class="lo-compare-row lo-compare-4"><div>🏗️ Investment Value</div><div>Value to a specific buyer (includes synergies)</div><div>Strategic fit with the buyer</div><div>M&A — justifies premiums over market price</div></div></div>'},
{title:'Describe applications of equity valuation.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📊</div><div class="lo-icon-card-title">Stock Selection</div><div class="lo-icon-card-desc">Buy if intrinsic &gt; price; sell if intrinsic &lt; price. The core of active investing.</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🤝</div><div class="lo-icon-card-title">Corporate Events</div><div class="lo-icon-card-desc">M&A pricing, IPO valuation, spin-off analysis, fairness opinions for board decisions</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">📋</div><div class="lo-icon-card-title">Strategy Evaluation</div><div class="lo-icon-card-desc">Does a proposed strategy create value? Compare firm value before and after the strategic change.</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">📢</div><div class="lo-icon-card-title">Communication</div><div class="lo-icon-card-desc">Sell-side target prices, investor presentations, proxy statement valuations</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Compliance</div><div class="lo-icon-card-desc">Tax/estate purposes, compensation (equity-based comp requires valuation), regulatory filings</div></div></div>'},
{title:'Describe questions that should be addressed in conducting an industry and competitive analysis.',explanation:'<div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Growth Prospects</div><div class="lo-icon-card-desc">What is the industry\'s secular trend? Growth, mature, or decline stage?</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⚔️</div><div class="lo-icon-card-title">Porter\'s Five Forces</div><div class="lo-icon-card-desc">Rivalry, buyer power, supplier power, threat of substitutes, threat of new entrants</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🏰</div><div class="lo-icon-card-title">Competitive Position</div><div class="lo-icon-card-desc">Does the company have a sustainable moat? Brand, scale, network effects, switching costs, IP?</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🌍</div><div class="lo-icon-card-title">Macro Sensitivity</div><div class="lo-icon-card-desc">How sensitive is the business to interest rates, GDP cycles, commodity prices, FX?</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🏛️</div><div class="lo-icon-card-title">Regulatory Risk</div><div class="lo-icon-card-desc">Antitrust, environmental regulation, industry-specific licensing, political risk</div></div></div>'},
{title:'Contrast absolute and relative valuation models and describe examples of each.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Feature</div><div>Absolute (Intrinsic)</div><div>Relative (Multiples)</div><div>Key Difference</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Approach</div><div>Estimate intrinsic value directly from fundamentals</div><div>Value by comparison to similar companies</div><div>Absolute = standalone; Relative = comparative</div></div><div class="lo-compare-row lo-compare-4"><div>🔧 Models</div><div>DDM, FCFF/FCFE, Residual Income</div><div>P/E, P/B, P/S, P/CF, EV/EBITDA, EV/Sales</div><div>Different toolkit</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Inputs</div><div>Forecast cash flows + discount rate</div><div>Comparable companies + their multiples</div><div>DCF needs more assumptions</div></div><div class="lo-compare-row lo-compare-4"><div>⚠️ Key Risk</div><div>Garbage-in-garbage-out (sensitive to assumptions)</div><div>Assumes peers are correctly valued on average</div><div>Both can be very wrong</div></div></div><div class="lo-mini-analogy"><div class="lo-mini-analogy-icon">🏠</div><div class="lo-mini-analogy-text">Absolute = estimating a house\'s value from expected future rental income. Relative = looking at what similar houses on the street sold for. The best appraisers use both and triangulate.</div></div>'},
{title:'Describe sum-of-the-parts valuation and conglomerate discounts.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Sum-of-the-Parts (SOTP)</div><div class="formula-highlight-body">$$\\text{SOTP Value} = \\sum (Value of each segment) - Corporate overhead$$\n$$\\text{Conglomerate Discount} = (SOTP - Market Cap) / SOTP$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">🔄</div><div class="lo-icon-card-title">Capital Misallocation</div><div class="lo-icon-card-desc">Internal capital markets may fund weak divisions at the expense of strong ones</div></div><div class="lo-icon-card" style="border-top:3px solid #F59E0B"><div class="lo-icon-card-emoji">🔍</div><div class="lo-icon-card-title">Complexity/Opacity</div><div class="lo-icon-card-desc">Harder for analysts to understand → lower multiple assigned</div></div><div class="lo-icon-card" style="border-top:3px solid #A855F7"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">No Pure-Play Comp</div><div class="lo-icon-card-desc">Investors can\'t get targeted exposure → prefer focused peers</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Catalyst:</strong> When SOTP &gt; market cap, it signals a conglomerate discount — a potential spin-off or breakup could unlock value. This is a common activist investor thesis.</div></div>'},
{title:'Explain broad criteria for choosing an appropriate valuation approach.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Model</div><div>Best For</div><div>Requires</div><div>Avoid When</div></div><div class="lo-compare-row lo-compare-4"><div>💰 DDM</div><div>Dividend-paying, mature, predictable payout</div><div>Stable dividend history, clear payout policy</div><div>Non-payers, erratic dividends, high growth</div></div><div class="lo-compare-row lo-compare-4"><div>💧 FCFF/FCFE</div><div>Most corporate valuations; volatile/no dividends</div><div>Forecastable capex, margins, working capital</div><div>Early-stage firms with no meaningful cash flows yet</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Residual Income</div><div>Banks, negative-FCF firms, book-value-rich companies</div><div>Meaningful book value, clean accounting</div><div>Firms with distorted book values (heavy intangibles)</div></div><div class="lo-compare-row lo-compare-4"><div>📊 Multiples</div><div>Quick screen, abundant comparables, terminal value</div><div>Good peer group with similar risk/growth</div><div>Truly unique companies with no real comparables</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Best practice:</strong> Use multiple approaches and triangulate. If DCF says $50, multiples say $45, and RI says $48, you have a defensible range of $45-50 — much more useful than a single point estimate.</div></div>'}
]},

'equity|ddm':{
quickReview:['DDM: V₀ = Σ Dₜ/(1+r)ᵗ. Value = PV of all expected future dividends.','Gordon Growth: V₀ = D₁/(r−g). Requires r > g, constant growth forever. Best for stable, mature firms.','Implied g = (D₁/P₀) − r rearranged: g = r − D₁/P₀. PVGO = P₀ − E₁/r.','Justified P/E: leading = (1−b)/(r−g) where b = retention ratio; trailing = (1−b)(1+g)/(r−g).','H-model: V₀ = D₀(1+g_L)/(r−g_L) + D₀×H×(g_S−g_L)/(r−g_L) where H = half-life of high-growth period.','Sustainable g = b × ROE = (retention rate)(return on equity). DuPont: ROE = margin × turnover × leverage.','Terminal value = D_{n+1}/(r−g_L) at the horizon. Often dominates total value → assumptions are critical.'],
analogy:'The DDM is like valuing a <em>fruit tree</em>. The tree\'s value equals the present value of all future fruit harvests (dividends). The Gordon Growth Model assumes the harvest grows at a constant rate forever — fine for a mature apple tree, but absurd for a sapling that might grow fast then stabilize. Multi-stage models handle this: the sapling (growth phase) eventually becomes a mature tree (stable growth).',
los:[
{title:'Compare dividends, free cash flow, and residual income as inputs to DCF models and identify situations for which each is suitable.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Input</div><div>What It Measures</div><div>Best Suited For</div><div>Poorly Suited For</div></div><div class="lo-compare-row lo-compare-4"><div>💰 Dividends</div><div>Actual cash paid to shareholders</div><div>Mature firms with stable, predictable payouts; clear relation to earnings</div><div>Non-payers, erratic payers, firms where divs ≪ capacity to pay</div></div><div class="lo-compare-row lo-compare-4"><div>💧 FCFE/FCFF</div><div>Cash the firm <em>could</em> pay (even if it doesn\'t)</div><div>Most corporate valuations; firms with no dividends or where divs don\'t reflect capacity</div><div>Early-stage firms with no meaningful positive cash flows</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Residual Income</div><div>Accounting profit − equity charge (NI − r×BV)</div><div>Banks (hard to define capex), negative FCF firms, when book value is meaningful</div><div>Firms with distorted book values or poor accounting quality</div></div></div>'},
{title:'Calculate and interpret the value of common stock using the DDM for single and multiple holding periods.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 DDM — Holding Period Models</div><div class="formula-highlight-body">$$Single period: V_0 = (D_1 + \\frac{P_1}{1 + r}$$\n$$Multiple periods: V_0 = \\frac{\\sum[D_t}{1+r}ᵗ] + \\frac{P_n}{1+r}ⁿ$$\n$$Infinite horizon: V_0 = \\frac{\\sum[D_t}{1+r}ᵗ] for t = 1 to \\infty$$</div><div class="formula-highlight-note">Key insight: even in multi-period models, the terminal price Pₙ is itself the PV of dividends from n+1 onward. ALL equity value ultimately derives from dividends.</div></div>'},
{title:'Calculate the value of common stock using the Gordon growth model and explain its assumptions.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Gordon Growth Model (GGM)</div><div class="formula-highlight-body">$$V_0 = \\frac{D_1}{r - g} = \\frac{D_0(1+g)}{r - g}$$</div></div><div class="lo-icon-cards"><div class="lo-icon-card" style="border-top:3px solid #3B82F6"><div class="lo-icon-card-emoji">📈</div><div class="lo-icon-card-title">Constant Growth</div><div class="lo-icon-card-desc">Dividends grow at rate g forever — must be sustainable (≤ nominal GDP growth)</div></div><div class="lo-icon-card" style="border-top:3px solid #EF4444"><div class="lo-icon-card-emoji">⚠️</div><div class="lo-icon-card-title">r > g Required</div><div class="lo-icon-card-desc">Otherwise value is infinite or negative — model breaks down</div></div><div class="lo-icon-card" style="border-top:3px solid #10B981"><div class="lo-icon-card-emoji">🎯</div><div class="lo-icon-card-title">Best For</div><div class="lo-icon-card-desc">Mature companies: utilities, consumer staples, REITs — stable dividends, growth near GDP rate</div></div></div>'},
{title:'Calculate the value of non-callable fixed-rate perpetual preferred stock.',explanation:'<div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 Perpetual Preferred Stock</div><div class="formula-highlight-body">$$V = \\frac{D}{r}$$</div><div class="formula-highlight-note">Simply a perpetuity — fixed dividend, no growth. Example: $5 annual dividend, required return 8% → V = $5 / 0.08 = $62.50</div></div>'},
{title:'Describe strengths and limitations of the Gordon growth model and justify its selection.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Aspect</div><div>Strengths</div><div>Limitations</div></div><div class="lo-compare-row lo-compare-3"><div>🔧 Simplicity</div><div style="color:#10B981;font-weight:700">Simple, intuitive, quick estimate</div><div>Oversimplifies — constant growth rarely holds</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Sensitivity</div><div>Transparent — easy to see what drives value</div><div style="color:#EF4444;font-weight:700">Extremely sensitive to (r−g). Small changes → huge value swings</div></div><div class="lo-compare-row lo-compare-3"><div>🎯 Applicability</div><div>Good terminal value formula in multi-stage models</div><div>Cannot handle non-dividend payers, high-growth firms, or variable growth</div></div></div><div class="lo-callout lo-callout-tip"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Justified for:</strong> mature utilities, large consumer staples, REITs — firms with long dividend track records and growth near GDP. For everything else, use the GGM only as the terminal value in a multi-stage model.</div></div>'},
{title:'Calculate and interpret the implied growth rate of dividends using the Gordon growth model and current stock price.',explanation:'<div class="formula-highlight" style="--active-color:#10B981"><div class="formula-highlight-title" style="color:#10B981">📐 Implied Growth Rate</div><div class="formula-highlight-body">$$g = r - (\\frac{D_1}{P_0})$$</div><div class="formula-highlight-note">Example: P₀ = $50, D₁ = $2, r = 10% → g = 10% − (2/50) = 10% − 4% = 6%</div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>Interpretation:</strong> The implied g tells you what growth rate the <em>market</em> is pricing in. If your analysis suggests g should be 8% but the market implies 6%, the stock may be undervalued — the market is underestimating future growth.</div></div>'},
{title:'Calculate and interpret PVGO and the component of leading P/E related to PVGO.',explanation:'<div class="formula-highlight" style="--active-color:#3B82F6"><div class="formula-highlight-title" style="color:#3B82F6">📐 Present Value of Growth Opportunities</div><div class="formula-highlight-body">$$PVGO = \\frac{P_0 - (E_1 )}{r})$$\n$$\\text{Leading }\\frac{P}{E} = \\frac{P_0}{E_1} = (\\frac{1}{r}) + \\frac{PVGO}{E_1}$$\nFirst term: no-growth P/E | Second term: growth premium</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>PVGO Scenario</div><div>Interpretation</div><div>Example</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">PVGO large relative to P₀</div><div>Market expects significant value creation from reinvestment</div><div>Tech growth stock: 70%+ of price is PVGO</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">PVGO small</div><div>Stock priced mostly as an earnings stream, little growth premium</div><div>Mature utility: most value from current earnings</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">PVGO ≈ 0 or negative</div><div>Market thinks reinvestment destroys value (ROE &lt; r)</div><div>Firm investing at below cost of capital</div></div></div>'},
{title:'Calculate and interpret justified leading and trailing P/Es using the Gordon growth model.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Justified P/E Ratios</div><div class="formula-highlight-body">$$\\text{Leading }\\frac{P}{E} (\\frac{P_0}{E_1}) = \\frac{(1-b)}{r-g}$$\n$$\\text{Trailing }\\frac{P}{E} (\\frac{P_0}{E_0}) = \\frac{(1-b)(1+g)}{r-g}$$\n$$where b = retention ratio, g = b \\times ROE$$</div></div><div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>If This ↑</div><div>Justified P/E Goes…</div><div>Why</div></div><div class="lo-compare-row lo-compare-3"><div>📈 Growth rate (g)</div><div style="color:#10B981;font-weight:700">↑ Higher</div><div>More future value → investors pay more per dollar of current earnings</div></div><div class="lo-compare-row lo-compare-3"><div>📉 Required return (r)</div><div style="color:#EF4444;font-weight:700">↓ Lower</div><div>Higher discount rate → lower PV of future cash flows per dollar of earnings</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Payout ratio (1−b)</div><div style="color:#10B981;font-weight:700">↑ Higher (if ROE = r)</div><div>More distributed today; but if ROE &gt; r, higher retention creates more value</div></div></div>'},
{title:'Estimate a required return based on any DDM, including the Gordon growth model and the H-model.',explanation:'<div class="formula-highlight" style="--active-color:#A855F7"><div class="formula-highlight-title" style="color:#A855F7">📐 Implied Required Return</div><div class="formula-highlight-body">$$From GGM: r = \\frac{D_1}{P_0} + g$$\nFrom H-model:\n$$r = \\frac{D_0}{P_0} \\times [(1+g_L) + H\\times(g_S - g_L)] + g_L$$</div><div class="formula-highlight-note">These provide a market-implied cost of equity — useful for cross-checking CAPM estimates. If GGM-implied r &gt; CAPM r, the stock may be cheaper than the market thinks.</div></div>'},
{title:'Evaluate whether a stock is overvalued, fairly valued, or undervalued based on a DDM estimate.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Comparison</div><div>Signal</div><div>Action</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#10B981;font-weight:700">V₀ > P₀</div><div>Undervalued</div><div>Buy / overweight</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#F59E0B;font-weight:700">V₀ ≈ P₀</div><div>Fairly valued</div><div>Hold / market weight</div></div><div class="lo-compare-row lo-compare-3"><div style="color:#EF4444;font-weight:700">V₀ < P₀</div><div>Overvalued</div><div>Sell / underweight</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">⚠️</div><div class="lo-callout-text"><strong>Always stress-test:</strong> How sensitive is V₀ to your r and g assumptions? A stock that\'s "undervalued" at g=6% might be overvalued at g=4%. Build in a margin of safety before acting on the signal.</div></div>'},
{title:'Explain the growth phase, transition phase, and maturity phase of a business.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Phase</div><div>Growth Rate</div><div>Payout / Reinvestment</div><div>ROE vs. r</div></div><div class="lo-compare-row lo-compare-4"><div>🚀 Growth</div><div style="color:#10B981;font-weight:700">High — well above GDP</div><div>Low payout, high reinvestment to fuel expansion</div><div>ROE &gt;&gt; r (competitive advantage period)</div></div><div class="lo-compare-row lo-compare-4"><div>🔄 Transition</div><div>Decelerating — competition intensifies</div><div>Payout increasing as reinvestment needs decline</div><div>ROE converging toward r</div></div><div class="lo-compare-row lo-compare-4"><div>🏔️ Maturity</div><div>Low, stable — near GDP growth rate</div><div>High payout; reinvestment only to maintain position</div><div>ROE ≈ r (no excess returns)</div></div></div>'},
{title:'Explain the assumptions and justify the selection of the two-stage DDM, H-model, three-stage DDM, or spreadsheet modeling.',explanation:'<div class="lo-compare lo-compare-4"><div class="lo-compare-header lo-compare-4"><div>Model</div><div>Growth Assumption</div><div>Best For</div><div>Formula / Key Feature</div></div><div class="lo-compare-row lo-compare-4"><div>2️⃣ Two-Stage</div><div>High growth → abrupt switch to stable</div><div>Finite competitive advantage period</div><div>Explicit high-g dividends + GGM terminal value</div></div><div class="lo-compare-row lo-compare-4"><div>🔻 H-Model</div><div>Growth declines linearly from g_S to g_L</div><div>Gradually fading growth advantage</div><div>$$V_0 = \\frac{D_0(1+g_L) + D_0 H(g_S - g_L)}{r - g_L}$$</div></div><div class="lo-compare-row lo-compare-4"><div>3️⃣ Three-Stage</div><div>Growth → transition → maturity</div><div>Young, high-growth firms with extended runways</div><div>Most realistic; most inputs required</div></div><div class="lo-compare-row lo-compare-4"><div>📋 Spreadsheet</div><div>Fully flexible year-by-year forecasts</div><div>Complex situations, non-linear transitions</div><div>Maximum flexibility; no formula constraints</div></div></div>'},
{title:'Describe terminal value and explain alternative approaches to determining terminal value in a DDM.',explanation:'<div class="lo-compare lo-compare-3"><div class="lo-compare-header lo-compare-3"><div>Approach</div><div>Formula</div><div>Key Risk</div></div><div class="lo-compare-row lo-compare-3"><div>📐 Gordon Growth</div><div>$$TV = \\frac{D_{n+1}}{r - g_L}$$</div><div>Extremely sensitive to g_L. A 0.5% change can shift value 20%+</div></div><div class="lo-compare-row lo-compare-3"><div>📊 Multiple-Based</div><div>$$TV = E_n \\times \\text{target P/E}$$</div><div>Embeds current market conditions into a long-term estimate</div></div></div><div class="lo-callout lo-callout-warn"><div class="lo-callout-icon">🚩</div><div class="lo-callout-text"><strong>Terminal value typically represents 60-80% of total estimated value.</strong> This means the assumptions about the distant future dominate the valuation — yet these are the assumptions we\'re least confident about. Always run sensitivity analysis on terminal value inputs.</div></div>'},
{title:'Calculate and interpret the value of common shares using the two-stage DDM, H-model, and three-stage DDM.',explanation:'<div class="formula-highlight" style="--active-color:#EF4444"><div class="formula-highlight-title" style="color:#EF4444">📐 Two-Stage DDM</div><div class="formula-highlight-body">$$V_0 = \\sum_{t=1}^{n}\\frac{D_0(1+g_S)^t}{(1+r)^t} + \\frac{D_0(1+g_S)^n(1+g_L)}{(1+r)^n(r-g_L)}$$</div><div class="formula-highlight-note">Stage 1: discount each high-growth dividend explicitly. Stage 2: GGM terminal value at period n, discounted back to today.</div></div><div class="lo-callout lo-callout-info"><div class="lo-callout-icon">💡</div><div class="lo-callout-text"><strong>H-model and three-stage:</strong> Same logic — sum PV of near-term dividends + PV of terminal value — but layer in transition dynamics. The H-model assumes linear decay from g_S to g_L over 2H years; the three-stage models each phase explicitly.</div></div>'},
