'alt|commodities':{
quickReview:['Commodity sectors: energy, grains, industrial metals, precious metals, livestock, softs. Each has unique supply/demand dynamics.','Life cycle: production → processing → transportation → storage → trading → consumption. Physical constraints drive pricing.','Commodities differ from financial assets: no cash flows, storage costs, convenience yield, supply inelasticity, mean-reverting prices.','Futures participants: hedgers (producers/consumers), speculators (directional bets), arbitrageurs (spot-futures mispricing).','Contango: futures > spot (storage cost > convenience yield). Backwardation: futures < spot (convenience yield dominates).','Total return = spot return + roll return + collateral return. Roll return is negative in contango, positive in backwardation.','Commodity index construction: weighting method (production, liquidity, equal), roll methodology, rebalancing frequency all affect returns.'],
analogy:'Commodity futures are like <em>buying plane tickets in advance</em>. In contango (futures > spot), it\'s like peak-season pricing — future delivery costs more because everyone expects demand. In backwardation (futures < spot), it\'s like a flash sale for future flights — producers are locking in prices now because they\'re desperate to hedge. The "roll return" is the gain or loss you get when your old ticket expires and you buy the next one — great in a flash-sale market, costly in peak season.',
los:[
{title:'Compare characteristics of commodity sectors.',explanation:'<div class="formula-box"><span class="label">Commodity Sectors</span>Energy: crude oil, natural gas, refined products\n  → Largest sector, geopolitically sensitive, high volatility\n\nIndustrial metals: copper, aluminum, zinc, nickel\n  → Driven by industrial/construction demand, cyclical\n\nPrecious metals: gold, silver, platinum\n  → Store of value, inflation hedge, monetary demand\n\nAgriculture (grains): corn, wheat, soybeans\n  → Weather-dependent, seasonal, government subsidies\n\nSofts: coffee, sugar, cocoa, cotton\n  → Concentrated production regions, weather/disease risk\n\nLivestock: cattle, hogs\n  → Feed cost sensitive, perishable, disease risk</div>'},
{title:'Compare the life cycle of commodity sectors from production through trading or consumption.',explanation:'<p>Each commodity follows a production-to-consumption chain with distinct characteristics:</p><p><strong>Energy:</strong> exploration → extraction → refining → transportation → storage → consumption. Long lead times, massive capital requirements, geopolitical risk at every stage.</p><p><strong>Agriculture:</strong> planting → growing (weather risk) → harvest → storage → processing → distribution. Seasonal production, year-round consumption → storage is critical.</p><p><strong>Metals:</strong> mining → smelting/refining → fabrication → manufacturing. Long mine development cycles (5-10 years) create supply inelasticity — demand can shift quickly, supply cannot.</p><p>Understanding the physical supply chain is essential because <strong>bottlenecks at any stage</strong> (shipping delays, refinery outages, drought) can cause price spikes that financial models alone won\'t predict.</p>'},
{title:'Contrast the valuation of commodities with the valuation of equities and bonds.',explanation:'<p>Commodities differ fundamentally from financial assets:</p><p><strong>No cash flows:</strong> commodities don\'t pay dividends or coupons → can\'t use DCF directly. Value derives from expected future supply/demand balance and utility of physical possession.</p><p><strong>Storage costs:</strong> holding physical commodities costs money (warehousing, insurance, spoilage). Financial assets have negligible storage costs.</p><p><strong>Convenience yield:</strong> physical holders benefit from having the commodity on hand (can meet unexpected demand, avoid production disruption). This yield partially offsets storage costs and has no financial asset equivalent.</p><p><strong>Mean-reverting prices:</strong> commodity prices tend toward production costs long-term (high prices stimulate supply, low prices cut production). Equities can grow indefinitely.</p>'},
{title:'Describe types of participants in commodity futures markets.',explanation:'<p><strong>Hedgers:</strong> producers (farmers, miners, oil companies) sell futures to lock in prices; consumers (airlines, food processors) buy futures to lock in costs. They trade to <em>reduce</em> risk, not to profit from price changes.</p><p><strong>Speculators:</strong> take directional positions based on price forecasts. They provide liquidity and accept the risk hedgers want to shed. Range from day traders to macro funds.</p><p><strong>Arbitrageurs:</strong> exploit mispricing between spot and futures (cash-and-carry), between related commodities (crack spread, crush spread), or between exchanges. They keep prices efficient.</p><p><strong>Swap dealers/intermediaries:</strong> facilitate customized OTC exposures and manage portfolios of commodity risk.</p>'},
{title:'Analyze the relationship between spot prices and futures prices in markets in contango and backwardation.',explanation:'<div class="formula-box"><span class="label">Contango vs. Backwardation</span>Futures price ≈ Spot × (1 + r + storage − convenience yield)\n\nCONTANGO (futures > spot):\n  Storage costs + financing > convenience yield\n  Normal for commodities with ample supply and cheap storage\n  Futures curve slopes upward → "normal contango"\n\nBACKWARDATION (futures < spot):\n  Convenience yield > storage costs + financing\n  Signals tight physical market / strong near-term demand\n  Futures curve slopes downward\n  → "Normal backwardation" (Keynes): hedgers pay speculators\n    a risk premium via below-expected-spot futures prices</div>'},
{title:'Compare theories of commodity futures returns.',explanation:'<div class="formula-box"><span class="label">Theories of Commodity Returns</span>Insurance theory (Keynes/Hicks):\n  Hedgers (net short) pay speculators a risk premium\n  → Futures price < expected future spot\n  → Speculators earn positive return (backwardation)\n\nHedging pressure hypothesis:\n  Net hedging position determines which side pays premium\n  If producers dominate (net short) → backwardation\n  If consumers dominate (net long) → contango\n\nStorage theory:\n  Futures-spot relationship driven by cost of carry\n  F = S × (1 + r + c − y)\n  where c = storage cost, y = convenience yield</div>'},
{title:'Describe, calculate, and interpret the components of total return for a fully collateralized commodity futures contract.',explanation:'<div class="formula-box"><span class="label">Components of Futures Return</span>Total return = Spot return + Roll return + Collateral return\n\nSpot (price) return: change in spot price\n  = (S₁ − S₀) / S₀\n\nRoll return: gain/loss from rolling expiring contracts\n  = (near-month price − next-month price) / near-month price\n  Positive in backwardation (buy cheaper next-month)\n  Negative in contango (buy more expensive next-month)\n\nCollateral return: interest earned on margin/collateral\n  (T-bill rate on the notional amount posted as collateral)\n\nExample: spot +5%, roll −2%, collateral +4% → total = +7%</div>'},
{title:'Contrast roll return in markets in contango and markets in backwardation.',explanation:'<p><strong>Backwardation → positive roll return:</strong> the futures curve slopes down. As the near-month contract approaches expiry, its price converges UP toward spot. When you roll, you sell the expiring contract (which has risen) and buy the next-month contract at a lower price. You\'re repeatedly "buying low, selling high."</p><p><strong>Contango → negative roll return:</strong> the curve slopes up. The expiring contract converges UP to spot, but the next-month contract is already higher. You sell at spot and buy more expensive. This "roll cost" is a persistent headwind — it\'s why many commodity ETFs underperform spot price indices over time.</p>'},
{title:'Describe how commodity swaps are used to obtain or modify exposure to commodities.',explanation:'<p>A <span class="key-term">commodity swap</span> exchanges a fixed price for a floating commodity price over a specified period. Example: an airline enters a swap to pay a fixed jet fuel price and receive the market (floating) price — effectively locking in its fuel cost.</p><p><strong>Total return swaps:</strong> one party pays the total return on a commodity index, the other pays a fixed or floating rate. Allows synthetic commodity exposure without holding futures or physical commodities.</p><p><strong>Basis swaps:</strong> exchange one commodity price for another (e.g., WTI vs. Brent crude). Used to manage geographic or quality basis risk.</p>'},
{title:'Describe how the construction of commodity indexes affects index returns.',explanation:'<p>Key construction decisions that drive return differences:</p><p><strong>Weighting:</strong> production-weighted (S&P GSCI — energy-heavy), liquidity-weighted, equal-weighted, or fundamental. Energy-heavy indexes are more volatile and correlated with oil.</p><p><strong>Roll methodology:</strong> when and how contracts are rolled affects roll return. Front-month rolling (most common) suffers maximum contango drag. Optimized roll strategies select contracts with flattest curves to minimize roll cost.</p><p><strong>Rebalancing frequency:</strong> annual vs. monthly vs. continuous. Affects tracking and the degree to which sector weights drift.</p><p>Two investors "in commodities" via different indexes can have dramatically different returns due to these construction choices.</p>'}
]},

'alt|re-overview':{
quickReview:['Real estate: tangible, illiquid, heterogeneous, location-dependent, capital-intensive, leveraged.','Economic drivers: GDP growth, employment, interest rates, demographics, supply pipeline, credit availability.','Property types: office, retail, industrial, multifamily — each with distinct demand drivers, lease structures, and cyclical sensitivity.','Due diligence: physical inspection, title/legal review, environmental assessment, tenant analysis, market study, financial analysis.','Indexes: appraisal-based (NCREIF — smooth, lagged), transaction-based (repeat-sales), REIT-based (real-time but includes capital market noise).'],
analogy:'Real estate investing is like <em>owning a toll bridge</em>. The tolls (rent) provide steady income, the bridge\'s value depends on traffic patterns (demand), and you can\'t pick it up and move it (location-fixed). Each bridge is unique (heterogeneous), takes years to build (supply inelastic in short run), and usually requires a big loan (leveraged). Appraisal-based indexes are like estimating traffic by counting cars once a quarter — they smooth out reality and lag the actual flow.',
los:[
{title:'Compare important real estate investment features for valuation purposes.',explanation:'<p>Real estate differs from stocks and bonds in ways that affect valuation:</p><p><strong>Heterogeneity:</strong> every property is unique (location, condition, tenants) → comps require judgment. <strong>Illiquidity:</strong> transactions take months → liquidity premium required. <strong>High unit value:</strong> large indivisible investments → limits diversification. <strong>Leverage:</strong> typically 50-80% LTV → amplifies returns and risks. <strong>Asymmetric information:</strong> local knowledge matters enormously. <strong>Management intensity:</strong> requires active management (leasing, maintenance, capex) unlike passive stock ownership.</p><p>These features mean real estate can\'t be valued with simple models — it requires property-level analysis.</p>'},
{title:'Explain economic value drivers of real estate investments and their role in a portfolio.',explanation:'<p><strong>Value drivers:</strong> rental income growth (tied to GDP, employment, inflation), cap rate compression/expansion (tied to interest rates and risk appetite), supply/demand balance (new construction pipeline vs. absorption), location quality, and tenant creditworthiness.</p><p><strong>Portfolio role:</strong> income generation (stable rental yields), inflation hedging (rents adjust with prices over time), diversification (low correlation with stocks/bonds, especially private RE), and return enhancement (leveraged equity returns). Private RE provides the most diversification benefit; REITs correlate more with equities.</p>'},
{title:'Discuss the distinctive investment characteristics of commercial property types.',explanation:'<div class="formula-box"><span class="label">Property Type Characteristics</span>Office: long leases (5-10yr), tenant quality varies, WFH disruption\n  Cyclical with employment, high TI (tenant improvement) costs\n\nRetail: anchor tenants + in-line shops, % rent clauses\n  E-commerce disruption, location critical, experiential shift\n\nIndustrial/Logistics: long leases, low management, booming\n  E-commerce beneficiary, last-mile demand, lower cap rates\n\nMultifamily/Residential: short leases (1yr), defensive\n  Demand driven by demographics, less cyclical, rent regulation risk\n\nHospitality: no leases — daily "re-leasing" via room rates\n  Most volatile, GDP/travel sensitive, high operating leverage</div>'},
{title:'Explain the due diligence process and valuation approaches for real estate investments.',explanation:'<p><strong>Due diligence:</strong> physical inspection (structural, environmental, deferred maintenance), legal review (title, zoning, entitlements, easements), market analysis (supply pipeline, vacancy trends, comparable rents), tenant analysis (credit quality, lease terms, rollover schedule), and financial analysis (historical NOI, expense ratios, capex needs).</p><p><strong>Valuation approaches:</strong> income (direct capitalization: V = NOI/cap rate; DCF: V = PV of projected cash flows + reversion), sales comparison (price per sq ft from comparable transactions), cost approach (land value + replacement cost − depreciation). Income approach is most common for institutional investors; sales comparison for residential.</p>'},
{title:'Discuss real estate investment indexes, including their construction and potential biases.',explanation:'<div class="formula-box"><span class="label">Real Estate Indexes</span>Appraisal-based (NCREIF, IPD):\n  Based on quarterly property appraisals\n  Biases: smoothing (understates volatility), lagging (appraisals\n  reflect past, not current values), sample selection\n\nTransaction-based (repeat-sales, hedonic):\n  Based on actual sale prices\n  Less smoothing, but: selection bias (only sold properties),\n  small samples, irregular timing\n\nREIT-based (FTSE NAREIT):\n  Real-time market pricing, high frequency\n  Includes capital market noise (sentiment, liquidity),\n  leverage effects, management quality — not pure RE</div><p>Appraisal-based indexes make RE look less volatile and less correlated with other assets than it truly is. Unsmoothing adjustments approximately double the measured volatility.</p>'}
]},

'alt|re-public':{
quickReview:['Public RE securities: REITs (equity, mortgage, hybrid), REOCs, RE ETFs, CMBS. REITs must distribute 90%+ of income.','NAVPS: estimate net asset value per share from property values. NAVPS = (MV of assets − liabilities) / shares.','FFO = NI + depreciation − gains on sales. AFFO = FFO − recurring capex − straight-line rent adjustment. AFFO ≈ sustainable cash flow.','Valuation: NAV-based (premium/discount to NAV), income-based (P/FFO, P/AFFO), DCF (discount projected dividends/AFFO).','Public vs. private RE: public = liquid, diversified, transparent but correlated with equities. Private = illiquid, direct control, purer RE exposure.'],
analogy:'A REIT is like a <em>mutual fund that owns buildings instead of stocks</em>. FFO is the REIT\'s version of "operating earnings" — regular net income overstates depreciation (buildings don\'t depreciate like machines), so FFO adds it back. AFFO goes further by deducting maintenance capex — because even though the building doesn\'t "depreciate" to zero, the roof still needs replacing. P/AFFO is the REIT world\'s P/E ratio.',
los:[
{title:'Discuss types of publicly traded real estate securities.',explanation:'<p><strong>Equity REITs:</strong> own and operate properties. Income from rent. Most common type (~90% of REIT market cap). Must distribute ≥90% of taxable income as dividends (US) → high yields.</p><p><strong>Mortgage REITs:</strong> invest in mortgages and MBS, not physical property. Income from interest spread. Highly sensitive to interest rates and credit risk. More leveraged and volatile.</p><p><strong>Hybrid REITs:</strong> combine equity and mortgage exposure.</p><p><strong>REOCs:</strong> real estate operating companies — not structured as REITs, so no mandatory payout but also no tax advantages. More flexibility to retain and reinvest earnings.</p><p><strong>RE ETFs/mutual funds:</strong> hold portfolios of REITs/RE stocks. Provide diversified, liquid RE exposure.</p>'},
{title:'Justify the use of NAVPS in valuation of publicly traded RE securities and estimate NAVPS based on forecasted cash NOI.',explanation:'<div class="formula-box"><span class="label">Net Asset Value Per Share</span>NAVPS = (Estimated MV of RE assets + Other assets − Liabilities)\n        / Shares outstanding\n\nEstimate property MV via direct capitalization:\n  Property value = NOI / Cap rate\n\nExample: NOI = $50M, cap rate = 5%, other assets = $10M,\n  debt = $200M, shares = 20M\n  Property MV = 50/0.05 = $1,000M\n  NAV = ($1,000M + $10M − $200M) / 20M = $40.50/share\n\nIf REIT trades at $35 → 13.6% discount to NAV → potentially undervalued</div><p>NAV is used because RE assets are tangible with estimable market values — unlike most companies where "asset value" is less meaningful.</p>'},
{title:'Describe the use of FFO and AFFO in REIT valuation.',explanation:'<div class="formula-box"><span class="label">FFO and AFFO</span>FFO = Net Income\n      + Depreciation & amortization (RE-related)\n      − Gains on property sales\n      + Losses on property sales\n\nAFFO = FFO\n       − Recurring/maintenance capital expenditures\n       − Straight-line rent adjustment\n\nFFO: removes D&A (RE doesn\'t depreciate like equipment)\n  and removes sale gains/losses (not recurring)\n\nAFFO: further deducts what you MUST spend to maintain\n  the properties → closer to sustainable distributable cash flow</div><p>AFFO is the better measure of ongoing cash-generating ability, but FFO is more standardized and widely reported.</p>'},
{title:'Calculate and interpret the value of a REIT share using NAV, relative value (P/FFO and P/AFFO), and DCF approaches.',explanation:'<div class="formula-box"><span class="label">REIT Valuation Methods</span>1. NAV-based: compare price to NAVPS\n   Premium to NAV → market expects growth/management value\n   Discount to NAV → market sees risk/overvalued assets\n\n2. Relative value:\n   P/FFO and P/AFFO multiples vs. peer REITs\n   Higher P/FFO justified by: higher growth, better assets, lower risk\n\n3. DCF: project dividends or AFFO, discount at required return\n   V₀ = Σ[AFFO_t/(1+r)^t] + TV/(1+r)^n\n   Terminal value via cap rate or exit multiple</div><p>Best practice: use all three and triangulate. NAV anchors to asset value; multiples anchor to market; DCF anchors to fundamentals.</p>'},
{title:'Explain advantages and disadvantages of investing in real estate through publicly traded securities compared to private vehicles.',explanation:'<p><strong>Public RE advantages:</strong> liquidity (trade daily), lower minimums, diversification (own pieces of many properties), transparency (mandatory disclosure), professional management, no direct property management burden.</p><p><strong>Public RE disadvantages:</strong> higher correlation with equity markets (especially short-term), market sentiment affects pricing (may trade at irrational premiums/discounts), limited control, management fees/structure costs, potential for leverage and strategy drift.</p><p><strong>Private RE advantages:</strong> direct control, purer real estate exposure (less equity market noise), potential for higher returns through active management, tax benefits (depreciation pass-through).</p><p><strong>Private RE disadvantages:</strong> illiquid, high minimum investment, less diversified, opaque, appraisal-based valuations (stale), higher fees.</p>'}
]},

'alt|hedge-funds':{
quickReview:['HF strategies classified by: equity-related, event-driven, relative value, opportunistic, specialist, multi-manager.','Equity strategies: long/short equity, market neutral, short-biased. Alpha from stock selection, beta can vary.','Event-driven: merger arb (buy target, short acquirer), distressed, activist. Catalysts drive returns, non-market risk.','Relative value: convertible arb, fixed-income arb, volatility arb. Profit from pricing discrepancies, convergence.','Opportunistic: global macro (top-down), managed futures/CTA (trend following). Flexible mandates.','Multi-manager: fund of funds, multi-strategy. Diversification, manager access, but added fees.','Factor models decompose HF returns into traditional (market, size, value) + alternative (momentum, vol selling, carry) factors.'],
analogy:'Hedge fund strategies are like <em>different fishing techniques</em>. Long/short equity is using both a rod AND a net — catching winners, throwing back losers. Merger arb is fishing in a very specific spot where two rivers merge (deal announcement), betting the waters will converge. Global macro is choosing which ocean to fish in based on weather patterns. And a fund of funds is hiring several expert fishermen and hoping their different techniques collectively fill the boat — though you\'re paying two layers of guide fees.',
los:[
{title:'Discuss how hedge fund strategies may be classified.',explanation:'<p>Hedge funds are classified by investment approach and risk profile:</p><div class="formula-box"><span class="label">Strategy Classification</span>EQUITY-RELATED: long/short, market neutral, short-biased\nEVENT-DRIVEN: merger arb, distressed debt, activist\nRELATIVE VALUE: convertible arb, FI arb, volatility arb\nOPPORTUNISTIC: global macro, managed futures/CTA\nSPECIALIST: sector-specific (tech, healthcare, energy)\nMULTI-MANAGER: fund of funds, multi-strategy</div><p>Classification helps investors understand the return drivers, risk exposures, and portfolio role of each strategy — though many funds blend multiple approaches.</p>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of equity-related hedge fund strategies.',explanation:'<p><strong>Long/short equity:</strong> buy undervalued stocks, short overvalued ones. Net exposure varies (net long, neutral, or net short). Alpha from stock selection; beta exposure is a choice, not a given. Most common HF strategy.</p><p><strong>Market neutral:</strong> long/short with near-zero net market exposure (dollar-neutral or beta-neutral). Returns purely from stock selection spread. Low volatility, low correlation with markets.</p><p><strong>Short-biased:</strong> net short exposure. Profits in declining markets. Structural headwind (markets trend up long-term). Acts as portfolio hedge/insurance.</p><p><strong>Portfolio role:</strong> long/short provides equity-like returns with lower drawdowns; market neutral provides low-correlation alpha; short-biased provides crisis protection.</p>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of event-driven hedge fund strategies.',explanation:'<p><strong>Merger arbitrage:</strong> buy the target, short the acquirer (in stock deals). Profit = deal spread closing. Risk: deal breaks (regulatory, financing, shareholder vote). Returns: steady, low correlation, but left-tail risk from deal failures.</p><p><strong>Distressed debt:</strong> buy debt of companies in or near bankruptcy at deep discounts. Profit from restructuring, recovery, or liquidation. Requires deep credit/legal expertise. Illiquid, long horizon, potentially high returns.</p><p><strong>Activist:</strong> take significant stake, push for changes (board seats, strategic shifts, buybacks, M&A). Catalyst is the activist\'s own actions. Returns depend on management receptivity and execution.</p><p><strong>Portfolio role:</strong> non-market return sources, but clustered risk around specific events. Merger arb adds steady income; distressed adds recovery upside; activist adds alpha from governance improvement.</p>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of relative value hedge fund strategies.',explanation:'<p><strong>Convertible arbitrage:</strong> buy convertible bond (underpriced option), delta-hedge by shorting the underlying stock. Profit from option mispricing + carry (coupon income > borrow cost). Risk: credit deterioration, liquidity withdrawal.</p><p><strong>Fixed-income arbitrage:</strong> exploit yield curve mispricings, on-the-run/off-the-run spreads, swap spreads. Small profits, high leverage. Risk: sudden spread widening (LTCM scenario).</p><p><strong>Volatility arbitrage:</strong> trade implied vs. realized volatility. Buy options when implied < expected realized, sell when implied > realized. Delta-hedge to isolate pure vol exposure.</p><p><strong>Portfolio role:</strong> low correlation with traditional assets, steady returns in normal markets. BUT: liquidity/credit crises can cause severe losses (spreads blow out, leverage kills). Not a "safe" strategy despite appearing market-neutral.</p>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of opportunistic hedge fund strategies.',explanation:'<p><strong>Global macro:</strong> top-down bets on macroeconomic trends across currencies, interest rates, equities, and commodities. Discretionary (George Soros) or systematic (model-driven). Very flexible mandates. Returns: potentially high, crisis-alpha (can profit from disruptions), low correlation. Risk: concentrated bets can go wrong spectacularly.</p><p><strong>Managed futures / CTA:</strong> systematic trend-following across futures markets (equities, bonds, commodities, FX). Go long in uptrends, short in downtrends. Returns: positively convex (do well in extreme up AND down markets). Negative correlation during equity market crises — excellent crisis hedge. Risk: whipsaws in trendless/choppy markets.</p><p><strong>Portfolio role:</strong> diversification powerhouse. Global macro provides flexible alpha; managed futures provide convex crisis protection. Both shine when traditional strategies suffer.</p>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of specialist hedge fund strategies.',explanation:'<p><strong>Specialist strategies</strong> focus on specific sectors or niche markets where deep domain expertise creates an information advantage:</p><p><strong>Sector-focused:</strong> healthcare (biotech catalysts, FDA approvals), technology (disruption themes), energy (commodity cycles, E&P). Returns driven by sector knowledge and event catalysts.</p><p><strong>Emerging markets:</strong> exploit inefficiencies in less-efficient markets. Higher return potential but also higher political, liquidity, and currency risk.</p><p><strong>Reinsurance/ILS:</strong> invest in insurance-linked securities (catastrophe bonds). Returns driven by natural disaster events — truly uncorrelated with financial markets.</p><p><strong>Portfolio role:</strong> concentrated alpha from expertise, but higher idiosyncratic risk. Best as a complement to broader strategies, not a core allocation.</p>'},
{title:'Discuss investment characteristics, strategy implementation, and portfolio role of multi-manager hedge fund strategies.',explanation:'<div class="formula-box"><span class="label">Multi-Manager Structures</span>Fund of Funds (FoF):\n  Invest in a portfolio of hedge funds\n  Diversification across strategies and managers\n  Due diligence and access advantages\n  Double fee layer: FoF fees + underlying HF fees (1.5+15 / 2+20)\n  Returns: smoother but lower (fee drag)\n\nMulti-Strategy (single firm):\n  One firm runs multiple strategy pods\n  Capital allocated dynamically across strategies\n  Single fee layer, better risk management integration\n  Examples: Citadel, Millennium, Balyasny\n  Returns: more consistent, lower volatility</div><p><strong>Portfolio role:</strong> diversified HF exposure with lower manager-specific risk. FoFs suit smaller allocators who lack direct access/expertise. Multi-strategy provides institutional-quality diversification within one vehicle.</p>'},
{title:'Describe how factor models may be used to understand hedge fund risk exposures.',explanation:'<p>Factor models decompose hedge fund returns into systematic exposures:</p><div class="formula-box"><span class="label">HF Factor Model</span>R_HF = α + β₁(Equity) + β₂(Credit) + β₃(Vol) + β₄(Momentum)\n       + β₅(Size) + β₆(Value) + ... + ε\n\nTraditional factors: equity market, interest rates, credit spreads\nAlternative factors: vol selling, merger spread, trend/momentum,\n  carry, liquidity\n\nα = true manager skill (after all factor exposures explained)\nIf most return is explained by β\'s → paying HF fees for\n  exposures available cheaper through ETFs/factor funds</div><p>Factor analysis reveals whether a fund delivers genuine alpha or just repackaged beta. Many "2 and 20" funds are mostly delivering factor exposures available for 20 bps in an ETF.</p>'},
{title:'Evaluate the impact of an allocation to a hedge fund strategy in a traditional investment portfolio.',explanation:'<p>Adding hedge funds to a 60/40 portfolio can:</p><p><strong>Potential benefits:</strong> improve risk-adjusted returns (higher Sharpe), reduce drawdowns (especially with managed futures/macro), access alternative risk premia (vol selling, merger spreads), provide alpha from manager skill.</p><p><strong>Potential costs:</strong> fee drag (2 and 20 erodes gross returns), illiquidity (lock-ups, gates, side pockets), complexity and opacity, manager selection risk (dispersion between best and worst is huge), survivorship and backfill bias in reported HF indices.</p><p><strong>Evaluation framework:</strong> compare the portfolio Sharpe ratio, max drawdown, and tail risk metrics with and without the HF allocation. Account for realistic fees, liquidity constraints, and the difficulty of selecting top-quartile managers (median HF may not improve the portfolio).</p>'}
]},
